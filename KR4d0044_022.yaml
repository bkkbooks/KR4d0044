body:
  text: 公是集巻二十二宋劉敞撰五言律詩銅陵阻風驚浪乘風疾浮雲映水低巻帆高卧熟看鷁退飛迷山逺㣲分樹村深略辨雞蒹葭縈客恨極望正萋萋螳蜋𤣥蟬無所營風露正淒清執翳機何密當車勇自輕将迷黄雀患已變玉琴聲得䘮還相召南華所以驚雨中入省簡書無暇日風雨送殘秋車馬常侵旦泥塗空自愁平生本迂拙嵗暮强淹留㑹将投劾去偃息謝交游旅居雨中塵垢厭淟涊風雨為驅除稍稍煩襟盡蕭蕭秋氣初堪憂忘陋巷匡坐讀羣書半夜梁山操悲歌問起予雨中蕭蕭過軒雨物色送春歸樹綠初成蓋垣青半長衣吟懐空擾擾愁思動依依想似江南景草長鶯亂飛北牕聞雨泄雲霏棟宇危葉墮霜枝忽忽時空晩蕭蕭坐自悲竟無高枕興還有閉闗宜生事安蓬藋商歌恣所為送因甫宰湘鄉相思恨不見今子去長沙幸有國百里可憐天一涯春風洞庭水殊俗楚人家囘首傷卑濕知君髪易華挽仁宗皇帝歌四首漢恩隆四世商歴盛三宗與子孫能繼寧民戸可封雲歸疑厭代鼎就莫攀龍廟樂兼韶武應傳盛徳容措刑文武後四十有餘年幾與華胥比寜知帝力然占齡無協夢棄躧趣登山後世稱稽古應參堯舜篇不陣威逾逺無為俗自柔詩書通月窟簫勺靖炎陬畢陌宫車晩蒼梧草露秋定知千嵗後民尚是軒邱謳歌歸命啟遏密罄宗堯陵寝略依漢衣冠深塟橋空㸔同軌至非復總章朝西望新宫柏悲風亦後凋太一齋居適野性所喜采真今更諳地偏塵土少人遠井泉甘長日眠高枕㣲風酒半酣從來天尺五信有此城南城南晩歸高秋變揺落逺水露澄明飛鳥江中墮孤帆木末征逆風吹㡌側疎雨逐雲行興盡聊當反塗窮眼自驚獨酌憶和甫開牕一杯酒獨酌靜無言明蟾不可駐流水自東奔野犬迎虛吠舟人爭渡喧悵然此時意不醉已消魂履冰昔聞小旻戒今踐薄冰行涌水怒愁裂寒蛟蟠畏驚遲遲但覺逺戰戰尚思輕誰斷孤疑志窮源更北征燒殘樹古樹荒祠側他年雷震餘蛟龍從此逝螻蟻至今居錯節摧犀甲燒㾗蠧漆書㑹看妨要路終勝斷溝渠䨇樹吾廬雙好樹簇簇近浮烟急雨仍堪倚斜陽不廢眠山童勤掃葉稚子莫驚蟬俗態輕幽寂柴門賴素偏題巷北桃花深巷山桃樹無人亦自芳青苔何限地紅蕚可憐香俗眼輕幽僻隂天逼艶陽殷勤謀一醉容易送春光杜祁公挽詞二首天下蒼生望朝端百辟師辭榮如棄躧得道去乘箕無復臨雍問空餘罷市悲㑹書廊廟語世世奉蕭規第五㢘莫比留侯功不居遺風何峻極雅尚得冲虚平昔常開閤深慙晩曳裾千金論一字永慨䄂中書某去年方與公相識後累得公書皆草書親筆勁媚可愛送人之洛逢人問嵩少千里駕征軒倦馬夜未寝鳴蟬秋尚煩風煙新洛邑冠蓋上東門合有西賓問歸時許共論聖俞墜馬傷臂以其好言兵調之知兵心自許見謂百夫雄上馬常慷慨墮車寜困窮誠非代大匠疑欲作三公匹似陳湯病猶成絶域功烽火壬午嵗自闗中河北至青州皆設之于是烽火通齊秦矣齊秦誰謂遠烽火自相通消息雌雄國闗防百二同流光下滄海飛㷔避驚鴻不及承平日空悲垂白翁得貢甫巢縣書云阻風别離常作惡衰老異他時望望風波苦悠悠見女悲江空人迹絶天逈鳥飛遲若復無雙鯉何由慰我思曬書先祖賜書法帖甚多藏書不滿萬幽蠧亦時除上有朝廷副多從秦漢餘山川迷禹穴雲海隔崐墟持此遺清白歸來林下居卲少卿挽詞二首湖海青雲噐朝廷白首郎蹉跎遇已晩零落意仍傷屢擁行臺節頻腰太守章東南滿遺愛不獨一桐鄉廣桞非高葢空山異昔歸善人天不與行道涕交揮髣髴音容在留連義故違安居自傳世閭里尚光輝君為三轉運又累典大藩致仕而終鎮潼觀察留後贈侍中李君挽詞君讓節旄守澶淵其先人亦嘗守澶淵築壇辭将鉞分土繼緇衣忌滿名猶誤宜年報尚非離鴻哀斷續埋玉想光輝冥漠金貂贈空看鹵簿歸侍讀右丞贈尚書李公挽詞扶陽詩禮學世世有知名玉樹芳榮早金華地望清川沈終合劍風折欲分荆蕭瑟烏衣巷偏傷道路情再見禁卒住桂陽二首古亦苗民患今仍禁旅過祅氛半翼軫殺氣覆山河御史暴公子将軍馬伏波不應淹日月頻獻凱旋歌肅肅巻征甲蕭蕭出郢門蛟螭雄歩驟鷹隼急飛翻數有蠻夷警遥憐賦税煩唐虞兩階舞帝肯用昌言丁右丞挽詞二首再歴三公府終崇萬乘師優游邇臣表簡淡古人為愛士常推轂傳家不遺危平生赤松願猶復白駒悲司籍歸良史調鐘待一䕫遽聞麟掩袂猶觖鳳來儀絶筆流風在遺音後世知春原國人送黄鳥寄哀詩國殤屢聞戎馬入輒有國殤詩多壘非吾責亡民痛爾為請纓慙肉食無敵怪王師聞道臨洮野天隂戰骨悲暮角落日孤城閉高風暮角愁邉聲亂歸馬物色向新秋尚有單于怨仍傳出塞憂時平翻感激不語㸔層樓題天池館二首誰人畫素屏中座對滄溟雲氣隨蛟蜃波濤湧戸庭風高鵬解羽天近客浮星㑹有湯湯意無琴亦自聼粉墨勢回環滄波入座間溟茫朝百谷迢遞隔三山怪獸有時化孤槎何日還乘桴古人勇向壁毎慙顔自長平至陳州河水絶清清川百里餘凈淥照空虚落日金波蕩㣲風霧縠舒塋心看白石明目數游魚洗耳非吾事兹身與世疎金山館出塞二千里荒亭無四鄰貪烏飢攫肉狡急投人短短西隅日冥冥北路塵腰間丈二組空愧漢廷臣庶幾堂雨夜偃几作短夜催㣲月流雲濕太空瀟瀟鳴竹雨颯颯舞松風形影明燈裏歡娯隠几中吾衰儻未甚正復夢周公春晩芳菲不少住白日定空長庭樹暗新綠春衣生晩凉悠悠向時節細細到壼觴誰使風前絮來參醉後狂鐡漿館稍出盧龍塞回看萬壑青曠原開磧口别道入松亭此館以南屬奚山溪深險以北屬契丹稍平衍漸近磧矣别一道自松亭闗入幽州甚徑易敵常祕不欲使漢知敵馬寒隨草奚車夕戴星奚人以車帳為生晝夜移徙忽悲田子㤗寂寞向千齡凉雨晩雨蕭蕭急秋隂處處高風雲愁宇宙淮海怒波濤貧有匣中劒飢餘井上桃誰能㪚積靄萬里度鴻毛風雨寄張野人天地初開㤗雲雷未厭屯泥深長閉戸謀拙苦憂貧狼籍千株雪空亡一半春仍愁三徑裏草色斷幽人張好周易隂陽之說故詩有㤗屯狼藉空亡之語孤壘二首孤壘敞新觀層軒臨暮霞分明魚意樂徙倚客愁賖遠近見百里高低有萬家春風甚不遠更種滿城花落日含古意高臺多遠心魚龍潛凍水蟋蟀有哀音江漢南浮遠闗山北望深張衡四愁意歴歴起登臨連日西南風戲作連日風且曀端居突不黔西南人殆絶甲子雨還兼巫峽雲屢起洞庭波正添誰能誅屏翳試使後飛㢘離騷日後飛㢘使奔屬雨中送孜入京兼呈諸親舊江外五年别齋中三日留何能慰衰疾正足亂羇愁澤國𤓰時雨淮山桂樹秋思歸欲招隠一一謝交遊對雪朔雪似迎春霏霏㪚玉塵稍看人迹絶坐對物華新地暖消還疾風高舞正頻郊扉聊自卧誤怪洛城人對雪憶隠直淅淅度牕竹紛紛綴館梅怕消愁寂寞看舞愛徘徊寡和思吾友相望共酒杯時披白鶴􅌁西北上高臺八月十六日夜月不减冰輪滿㣲増玉漏長過雲收薄潤重露濕清光歴歴素娥影菲菲丹桂芳枯槎容客載醉過羽人傍秋霽望月明蟾此夜新竚立爽精神幾夕隔霖雨相看如故人風生疑折桂雲過欲埋輪應有闗山客長歌淚滿巾送張噐著作昔年聞子虚上國重相如老厭諸侯客晩陪東觀書絃歌魯儒習風俗楚人餘感激青雲氣功名亦未疎江行寄隠直自念復遠適與君仍解攜天文鶉首尾地勢陜東西江漢饒風雨闗山盛鼔鼙離憂各易老秋意欲悽悽新梅寄春卿給事徂嵗嗟無奈新花笑自如雪􅀈消去未春色復歸初欲折意空逺少留香有餘一枝寄驛使浪語故愁予禦冬漂泊愁多病差池嵗復闌老驚時月疾貧畏雪霜寒外物闗身足空堂寓膝寛敢希王佐略聊取一枝安春日小園憶張六不見張公子春遊分寂寥獨行愁楚澤何處榜呉橈芳樹皆宜笑垂楊總細腰一樽成强醉四望欲魂銷雪後遊小園園林過新雪草木㪚芳華物色皆疑似春歸亦有涯逕泥生沮洳凍乳滴楂枒所適從吾樂淹留見暮霞納凉明教臺呈太守榻移隨樹影杯側見山岑白鳥渇求水𤣥蟬清噪林道書無近語天籟有遺音向北新開逕行苔過竹隂臨淵亭寄輦下親舊蠶魚山迤邐比有蠶尾山又有魚山濟汶水交流信羙終非土思鄉更倚樓露滋黄菊晩風起白雲秋長嘯澄潭上誰憐公子牟丁酉五月郭守恩戰殁武戡走入壁守恩勇将有智略敵兵得漢巧五月戰西河壮士平原死孤城殺氣多猶聞疏勒守無復魯陽戈不反東流水㴞㴞奈爾何聞舅氏以祕書監致政謹獻拙詩為賀今日王朝士多稱賢大夫恩榮隨几杖官職上蓬壼行路歎或泣都城畫有圖他時辟雍問惇史記訏謨得和書自越入京時寓商丘遥想行舟處春江花正繁殊方更回首不語獨銷魂寡和愁郢客雅遊思兔園吾能事應聘見爾大梁門送杜横州小郡横山外居民半島夷路偏逢客少地濕見秋遲銅鼔侵城角蠻旌接使麾平生聞義勇好祭伏波祠送余江州潮汐通城下東南仍上游懐章趨便道疊鼔送華舟巻旆鷹隼急落帆江漢秋心知戀魏闕頻上庾家樓冬至卽事南極日差永幽人喜不勝陽生漸堙鬱隂老尚慿陵風解呉山雪江流蜀地冰衝寒彊乘興屣履過鄰僧晏公挽詞三首望苑牧英雋巖廊奉徳音功如四支重化以二南深安仰嗟維石能傳賴碎金浮雲送哀挽慘澹更為霖簡易能容士精誠樂與賢如何五湖上非復赤松年几几空遺舄悠悠不問天獨應春輟相令望故依然衮韍三司舊笳簫一品榮獨傷去國意仍以撫封行落日白駒影空林黄鳥聲公歸那不復悽愴國人情鄰幾挽詞二首其叔為之主那知一樽酒流涕寝門前非復平生日空看東逝川詩書遺素業山水閟空弦人物陳留古當慿耆舊傳忘年一傾葢適意兩虚舟老去翻相失人生固若浮蕭條蒿里餞零落竹林游知與不知者同時俱涕流聖俞挽詞孤宦衆人後空名三十年交游一時絶詩筆四方傳歸旐江湖永藏書日月邉應封史通子他日慰窮泉聖俞預修唐書書成未上而亡議者欲請于朝賜一子官以追寵之洗竹舍側萬竿綠蕭蕭終嵗佳翠深疑魍魎根老畏龍蛇翦剔扶霜節分張及馬撾世無嵇阮輩竟負野人家爆竹節物隨時俗端憂見旅情土風猶記楚辭賦謾譏傖烈火琅玕碎深堂霹靂鳴但令休鬼瞰非敢願高明嵗暮憶隠直嵗窮浩長歎心事如波瀾高卧老将至相思天正寒浮雲紛霰雪陋巷獨瓢簞裏飯非無意悠悠行路難雪中與長文景仁㑹西閣梁山風與雪嵗暮自崢嶸誤逐滄浪叟飛來白玉京屯雲紫㣲閣疊壁九重城更挹浮丘袂端令俗眼驚梅澤國春還早山梅臘競花繽紛迷雪意浩蕩逼年華驛使紅塵逺江風短日斜芳菲恐易失愁思亂悲笳立春日雪中遊䝉谷冰解泉應動雲寒雪更飛谷中知律變林下覺春歸風物如游蜀衣冠似浴沂瑶林與碧樹處處競芳菲墨竹羇游念此君子墨慰幽人洒落不經思蒼筤如出塵交加月下影濃澹霧中筠試作呉山想蕭蕭意亦真夕陽過雨風景好斜陽林下明倦游宜几杖卻埽稱柴荆宿蝶依花靜歸禽觸葉驚逍遥共兹世聊復得吾生寄題歙州流盃池公子愛客意髙山流水間清波無斷續翠斝自廻還野興四時得棠隂終日間何當竹林賞醉耳聼潺潺答張給事途中㣲雪見寄四韻空行萬里塞不見六花飛自比庭回三十餘程未嘗見雪今日傳清唱端來㸃客衣度闗迷馬色拂樹㪚春暉不减山隂興從軍中夜歸雪後飛塵暫消凍春意亦冲融野水涓涓綠林梢靡靡紅躍魚輕泮凍鳴鶴舞和風出處驚時節悠悠看嵗窮古北口對月萬古闗山月遥憐此夜看蛾眉空自嫵叢桂不勝寒他日刀頭問何時客寝安因之千里夢共下白雲端新月花外驚新月春殘復滿弓餘香輕墜露疎影細寒風火禁通方俗年華思老翁清光堪半夜稍醉玉壼空雪後病愈至射堂作病失千峯雪晴開萬影新鴈飛天欲暖風起野無塵弱桞悲羌笛辛夷思楚人攀條復顧影頗似去年春目疾呈深甫久思廢耳目乃復困觀瞻黙坐但慿几幽居長下簾𤣥黄迷宇宙明晦錯烏蟾萬事形骸外人将不汝嫌新晴二首雨餘春更好日出望還新暄鳥啼驚客林花笑向人年華如過鴈世事劇飛塵置酒陶嘉月㴞㴞醉任真薄雲開早景宿潤减飛塵好在松筠色依然鳥雀馴避人深卻埽炙背暖生春未得獻天子潛書報近鄰秦淮對月舊熟秦淮水今浮萬里船泬寥明月夜淡泊始秋天靜境他時絶清光度曉圓無人漫詠史回首憶先賢晩泊對月川光晩都白岸色逺全青明月隨孤劒浮槎送客星南飛鵲擾擾北鴈嚮冥冥誰謂悲歌短能吟酒易醒欲雪寄貢甫欲雪天地閉積雲江海昏著書成寂寞玩嵗覺崩奔鴻鴈自嘯侣􅜇常在原離憂紛滿眼浪作種庭萱初雪三日風振海中宵雪覆城已看秋落漠更逼嵗崢嶸原隰龍沙磧樓臺白玉京知誰錯吹律物物驟堪驚殘雪積素不可巻潛陽方未蘇勁風吹强起明月照全無封蟄龍蛇病傷根竹栢枯誰能開白日后土正泥塗望雪山朔風何處雪徑度江南山半出青天外猶臨庭户間崔嵬海潮湧泱漭暮雲還壮觀感人意長謡如可攀戯賀叚生驃騎門下士蹉跎已白頭知人家監誤彈劒起吹愁忽逐侏儒飽遥聞祿仕優還鄉問耆舊當憶負薪謳生夲㑹稽人娶妻上國居李師門下十年得官公是集巻二十二

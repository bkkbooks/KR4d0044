body:
  text: 公是集卷四宋劉敞撰五言古詩雜詩二十二首五都貨財地車馬趨市闤平明側肩入薄暮掉臂旋意氣何所期盛衰俯仰間乃知藝利合厚薄未可原張陳父子遊一旦復相殘萬古稱凶終此獨何足言大火序炎夏盛陽劇炮燔空桐疾風來書景中變寒皇天自平分四氣尚相干涼燠異朝夕萬事誰獨堅宛彼風中籜衆芳自此殘至理冥變化履霜用為歎至人邁龍德世豈識潛升昔在周道衰伯陽起西征胡為委一世畏此網與罾川竭山亦摧喟然吾何稱豈不懷徘徊民言憯無懲亹亹強著書後賢以為經崑崙邈人境日月相蔽虧上有仙聖居帝閽俯崔嵬王毋坐少廣有娥閟瑶臺弱水不可梁大荒曠無崖周穆昔好遊超絶僅能陪方朔偷桃兒沈濁何乃來青鳥通其使雄鳥為之媒靈化信難測真契從此推勿以隋侯珠彈雀千仞峯勿以和氏璧投人昏夜中彈雀不可期投人未必容大賢惡皎皎所以明若蒙積薪莫自高失馬莫自悲薪積常先焚馬失常復歸人情習所近物理豈易推君看禍福間紛糾如纆徽朱暉乘餘香三月覺徂暑流光不相待時節猶逆旅煌煌園中花零落會見汝啼鴂鳴空林良辰竟何許秋風吹賓鴻千里飛一息水闊稻粱寡天寒霜雪逼豈不抱逺志憔悴傷顔色􅀈鴯乘春暉采采華羽翼側身襲人間慧巧誰怵愓出入金玉堂戶牖初不隔上無飲啄患下有居處益胡為事高逺骯髒莫自適駑駘不下廏騏驥行萬里勞逸誰為多芻豢復誰美天機信其冝人事亦何恥世無王樂徒駿骨或空死悠悠浮空雲明暉何倐忽造物固難恃變化亦倉猝響莫為雷霆明莫為日月日月易遮蔽雷霆易奔絶古風不可復習俗已久敝咄嗟忠與信流蕩為詐術詐忠惑其君詐愚安其身色厲內以荏行違貌取仁三年始橫流後來更日新至公棄塗炭正道敗荆榛已矣千載後誰能反其身毁巢鳯不至竭澤龍不遊賢者有所歸得非龍鳯儔周公下白屋聖德被九州趙禹謝賓客漢朝以為優澆淳不相襲用舍何其繆苟循一身利不為萬姓謀哀彼杖杜詩死生遺道周皇天不絶命百姓何震愆歲暮霜雪至悠悠事南遷羇鳥哀去巢遊魚樂懷淵如何道旁子逝將不復還西望周鄭郊顧想河洛間伯魚不可作涕流為淪漣㸑桐深竈下埋劍古獄間怨聲動旁人憤氣凌彼天當時頗見旌後世稱為賢自古聞知音此事或偶然嶰山有竒竹老棄隂崖巔太丘有神鼎逃匿千丈淵光景閟不見音容杳無傳豈能向時俗干進心拳拳世貴一人敵又稱朱絲弦吾欲評其風願君詠此篇鑿井取泉飲上山采薇食豈不信憔悴所願皆我力泉也非難致薇也亦易得志士恥徒飽衆人苟所獲犧牲畏芻拳樊籠害羽翼悟理冝在早無為晚更惑蛟龍蟠深泥魚龜頗同調變化且何有蝘蜓亦可笑煌煌千金珠百仞閟其耀風雷在所遇隱顯始獨妙屈身天地間微物安得料伯夷逃西山尼父居九夷世苟不我用我方從此辭道悠豈忌逺義豐不云飢世非乏賢士為問從者誰由也實好勇叔齊固同時捨此乃無人籧篨而戚施逺矣千歲後愴焉我心悲道薄德亦散功名為時須用力世所賢守正衆云愚智者競蒿目小人復邇圖悠悠三季後此風益已渝安知治未病舐痔而多車堯舜無能名越哉巳矣夫雍門妙絃歌哀響激人耳偉哉孟嘗君慷慨淚如水當生復念死誰謂悲能已絲桐信感人世固乏之子昔者有化人來集周王庭咫尺逝萬里頃刻超百齡五音蕩心神耳亂不可聽衆采眩其目不分丹與青飄鷂惑真偽恍忽迷窈冥馳思八極表詎知日與星未嘗出户牖自疑涉天廷左右莫覺悟兀然殆遺形祈招作悲歌聖賢用為經翩翩丹穴鳥志在萬里外營營持罦叟何事守蒿艾聲音可得聞羽翮不能害嗟彼雉與首身自此碎詠古詩十二首虹霓明西方五色相屬聫浮雲萬里來泱鬱天宇間白日晦無象盛陽變為寒洚水彌九土陵谷相貿遷盈虛叵前測物理有固然長離乘風起四顧求所棲路窮臨蒼梧復排層霄飛豈不願安處不知所可依罾繳充徑隧鴟梟正鳴悲瞑夫抱同律曠絶將何希趙國棄鳴犢孔聖為之回西伯善養老伯夷以為歸馳驅西楚郊徘徊太皥墟周漢多封君不祀既忽諸三墳基皇德八索總道樞若人豈欺我虞夏亦典謨萬里如浮雲古風訖無餘往矣不可追喟然為躊躇遊鱗泳泉下黃鵠巢林端得失不相及天理庸自全有虞垂衣裳西母獻厥環周穆賓崑丘車轍萬里間宗廟頽為墟閶闔不可攀祈招作悲詩萬里用為歎靈山生神芝一年再三秀絢彩奪霞露熒煌寄巖岫真人勸我餐可以躋萬壽自古王子喬祕此莫輕授采之豈辭逺時逝不可又歲晏懷所思終焉不盈袖元鈞運洪爐晝夜不少停萬物更相禪一氣紛異形駒掇出竈下久竹為青寧孰知范氏犧晚就南畝耕至人友造化逝與一世冥善惡故不屑寵辱何足驚東遊滄海濱回首面大荒豁逹三齊風連山鬱蒼蒼在漢田橫氏不忍南面王磊落五百賢從死忽若亡壯士不必成令名固為長異體同一心萬年尚耿光天道不可聞自昔孔子徒籍籍秦漢間將非愚且誣大河決東郡火德以為符哀哉冀州壤兆民散為魚公孫雖前覺執政疾魯儒世無異物神終竟遺泥塗萇𢎞謀周室憤血死猶碧子胥殞吳門江水為之逆精能動天地忠不諭兩國九鼎既西逝姑蘇亦東側偷容習為俗萬世未遽易形勢驅使然生民豈惡直麒麟不可羈安得書春秋鳯凰云難致孰使鳴岐周無田于甫田歲月忽已遒如非行邁謀自冝道路修安知吹鳴律燕谷成良疇不見託秋駕崑墟亦能遊通都天下衢名化交百廛鳴雞側肩入日暮掉臂還有生寄無窮過若空中煙俯仰異去就況乃多厯年留候獨悟此解組從列仙萬户如脫屣故為絶世賢南山有樛木葛虆蔓其封上枝結紛菲下枝散蒙蘢下能使上好上亦令下通寧知力不足歲暮摧烈風苦成任兩國德孰與棟隆君苟以此始又當以此終讀峴山詩寄獻八舅龍圖道悠寄先覺神契無近知彼美羊公意今在峴山詩陵谷非一變榮名獨至兹當時偶然語正與來者期慷慨激悲歌崔嵬構叢祠懷哉千歲後慰此江漢思公亦蹈前人方為帝王師奮筆成不朽何啻中亭碑偶作二首蓬蒿附髙原芙蕖植汙池物生自有性不為髙下移貴在世所用未可以為師賤在衆不識未可以為嗤州來薄千乘巢父輕九州齊景登牛山涕泗獨交流左右同來人嗚咽不息收共知富貴樂變化不可留四顧更悲嘆萬類莽悠悠歌舞未終曲回首已可愁或指白楊下荒草古時丘危辭才感拂耿耿相應酬豈識逹觀士笑爾若蜉蝣蒙示容齋詩輒為五言仰續逸唱逹人與道運投迹繫所逢在治信若鳯處幽固猶龍外物紛屢變中扃豁兼容乃知雲夢區未足嬰其胸明公蹈康濟茲世已陶鎔優遊就偃息暇豫奏時雍髙齋危舍字數畝環崇墉虛軒便炎夏奧室冝隆冬采真混出處造適觀羲農玩名肆獨樂怙勢輕萬鍾越人起丹穴子房去赤松材為用見循道以世難從古事何昭昭斯民積顒顒獨應甘棠樹方使來者封得汝州舍弟新詩魯人貴韶濩海鳥眩以憂豈不盛鐘鼓性違理自愁憶在田野時終歲頗優遊食魚出有車夏葛冬亦裘弄翰不自量著書望孔周處身笑汲汲視世良悠悠誤及時君門過緣名字求軒冕非已好簿書反自羞因欲飾所短強為妻子謀精神敝蹇淺學殖誰勸修歸卧常喟然歲月屢以流愧爾從軍詩氣完語更遒豈獨古人風逺與王粲儔實為平生賞若慰鍾儀囚我年向四十蒼髮已滿頭篋中無寸書磨滅悲蜉蝣念此可以驚如何復淹留昔買吳下田頗聞利鋤耰汝宦何時歸相與尋滄洲處使有茅屋出使有漁舟知命贊易篇沒身記春秋但令文章顯不愧時俗偷世事非所了咄哉無夷猶續黃子溫讀陶淵明詩十首四海方蕩潏匡山得三隱若人獨秀士逸響露深藴江漢東南流滔滔未之盡羽輕鮮知福地重每貪禍有以羲皇民居然北窗卧此意俗莫悟將非首陽餓長梧有高韻千載不可及五柳遺世名于今亦獨立悲哉市朝士夸競常汲汲子綦委天樂窮逹兩已忘九歅爾何知梱也安得祥一吟責子篇千古如相望追俗情易合玩竒當企爾柴桑彼何者髙唱屢在此凡有三柴桑縣令不俯眉吾又悲揚子州縣徒勞人著作非所務道殊豈自強氣直已多忤屢招遂長往歸歟彼何暮昔在八州牧功業濟衰晉吾聞賢者後鮮不祚休運如何竟廖廓天道蓋難問孟嘗實超邁舉世少其並風流自有鍾若士復孤迥祖述酒中趣乃知外家性吾今乞食士因詠乞食詩諒無乞食怨復想乞食時貧賤自古然豈愧世上兒曩遊潯陽郭懷古愴來暮不意陳蔡間起豫欣有遇彼此共一時悵然感佳句晝寢三首日出百事集人生亦多憂曲肱試少息乃得逍遙遊圉圉為潛魚因之乘波流翻翻為飛鳥爰以凌空遊在已孰是非于物任沈浮觀化悟獨樂真偽竟悠悠成敗勞耳目是非喪神慮我生天地間安得棄之去始疑昏逾明漸覺夢勝寤但可寐無聰安知歲云暮神交既倜儻魄定奚憂懼此以遣朝昏因之保吾素久思謝時俗奔走難自諧逍遙衡門下雖陋得我懷汲彼井底泉掃兹風中埃歊蒸為之去襟抱蕭然開養心貴能適造適不及排胡為車馬客一往忘歸來晝寢上府公長日無所為髙卧聊自如清風拂庭樹蕭蕭窗户虛曠逸追羲皇粹和反華胥暢然物外遊謂若天下無方今少陽交田野東作初壯者固不暇老者日競趨胡為乃自便徐徐以于于從吏代力耕飽食良自娛事賢庇敏政宿官特多餘念兹寄幽間未覺勞簿書但恨不可雕正當砭其愚六月二十六日西閣晝寢馳騖聖不足治安愚有餘願言從物役即事實燕居清切掖垣峻深沈雲閣虛食有萬錢膳架多四部書低頭悟素餐遊日慚古初非吏復非隱人言定何如平生山林尚自與功名疏何為出不反視此歲月徂秋風隕髙林蟋蟀鳴階除行矣浮扁舟季鷹不欺余苦雨二首洪河滔冀州大陸日夜摧天時普隂沴飛雨皆北來崩騰亂雲霧頃刻不暫開通衢為深淵髙堂生蒼苔稼穡日以沒民生一何哀微禹既已矣我其為魚哉獨坐空堂上漏濕無與娛晨炊煙不然敗竈將生魚被服蛙蠙衣出入螺蚌居里閭杳相絶滔滔水漸車安得雙羽翰超然謝泥塗久雨三首繁隂過五日積雨迷九天衣冠亦泥塗陵陸成深淵忘屨已乘橇舍車始思船曰余蹈滄海良知時適然清渠彼涓流通逵此夷坦風雲瞬息間江漢倏生眼淵源詎能問浩蕩頗可憚白日蔽九霄吾行幸當返巖巖蓬萊巔赫赫崑崙墟上帝嚴紫垣羣仙亦深居髙出雲電外俯視風雨除安知昏墊民汩沒才闔廬石林亭成宴府僚作五言吾愛謝宣城適意安獨往雖聮鳯池步不廢山泉賞吾慕應休璉感事能屬書頗嬰下流謗獨占仁智居寥寥二賢後忽忽千載餘若士不可追此風或在豫延石象衆山決泉瀉交渠林壤使我欣不知歲月徂薜蘿分蔽虧松竹相扶疏時時四方客顧此亦踟蹰儻遇鍾子期知子情所攄自京師泛舟還郡作三首秋夜何迢迢一夢八九覺孤舟寄風雨短燭才自照冥冥髙雲過寂寂山鬼嘯展轉誰與歡漂泊未可料昔我自兹邁春華巧相笑今我復來此落葉紛滿道客行無逺近勞苦略同調一歲再羇旅人生豈長少良無二頃田詎得守蓬藋昔在馬少遊抗志安故土共後龎德公迹不踐城府出乘欵段馬身與麋鹿伍鄉里稱善人妻子同隴畝人生資衣食既足尚何取致求多贏餘筋力但自苦常隂貫秋序洚水彌平陸居人逐飛鳥往往巢樹木四顧何茫茫江海忽在目古語乃信然髙陵或為谷乘桴義無憾斷髮憂可辱辨冕績禹功誰其悲濡足西陽池新舟邀府公遊泛昔賢濟川意固與斯人共曠代屬明德至樂下及衆池臺固舊賞舟楫為新用忽疑江湖景稍信風瀾縱追參鳬雁泳厯覽魚鱉動頗已寓高興矧今結輿誦嘯歌一時適顧盻萬全重好勇知未能乘桴自欣從贈馬惲供奉朝廷功名次晉國在第一受遺先皇帝事與周召匹丹青爛勳伐終始最密勿宗族宜甄庸百世皆寵秋公孫非遐胄何乃尚淹屈官名雖供奉冗散真士卒努力習文華家貧傳清德翰飛終不髙好事見心骨人生繫逢遇進退豈定律古者如爾徒萬户自可必今者如爾徒富貴亦未失主張有真宰時態莽回聿咄嗟元功世頗復困蓬蓽吁彼山野人奚由自奮出出城城角東積水如江湖壤田甚多居民捕魚種蓮芡自給從丙申巳來四年矣出城得自便下馬事幽討曠野荒不耕蒺藜牛滿道往往逢飢人羣背掘野草不惟黃頭兒亦有白髮老問之指積水此去殊浩浩室廬久漂蕩樹木多立稿食此且賖死堯年亦久潦不能去墳墓更欲依蒲藻昨來計蓮芡頗不減粳稻明年當大種妻子或相保夢中誰謂夏夜短一夕夢九逝夢中如平生歡笑隨母氏覺來拊形軀獨在人間世上呼聲連天灑泣血滿地何忍留我生哀哀抱微志癭木樽先民任天真吾得見其器其器云如何蓋若刳木類不戕生以戚不傷材以蔽不以逺見遺不以枯見棄因其無用姿授以有用意取彼自然象廓此閎然制豈無雕磨工不欲敗淳粹豈無青黃文不欲增巧偽其髙豈無蓋不設簋簠制其下豈無舟不著雞鳥麗任真肆穫落肯慕金玉貴兒童誚敦朴婦女驚醜異豈若輕薄子形容混兹世矜愚以相高飾貌以自喜淳風陷衰薄古道喪簡易自非窊樽民慎勿同一醉泛舟長嘯望江漢緬懷滄浪行因浮扁舟去共盡幽人情春日天氣佳近郊潁水清雜花亂繽紛好鳥相嚶鳴解纜相沿泝凌風恣縱橫適心故真樂徇物皆虛名興盡相與歸夕陽半東城過士建中屯田居此君年六十請致仕所居蔽風雨而已市朝隱非一躁靜理不同多君金閨彥逺有山林風千鍾卧名利三徑入蒿蓬似是於陵子又云張長公相望千年外獨得環堵中自古用先進誰當駐飛鴻出城簡服謝車馬逍遙理輕䇿平原草樹美百里見秋色稍知人境殊似與囂塵隔悠悠出岫雲杳杳歸林翮煩腸寬鬱紆逺相俱幽寂孤煙起晴縹去水照心白所期尚臯壤生事視耕植適野非昔賢于焉如有獲泛舟三首冰泮池水緑春意亦已歸長楊特多思浩蕩隨風飛弄舟不用楫漾漾陶春暉回還無終極孰謂江湖非舉觴屬坐人行樂常苦稀一醉捐百慮念子勿相違乘日復來遊北林稍芳菲當令魚與鳥識我心無機雪消泉似漲冰解舟可通操篙不憚冷環渚故無窮歌詠淹短日醉酣輕朔風何須萬乘相始辨鴟夷翁方池亦通舟水色涵碧霄解舟不用楫漾漾隨風飄中河乍縱橫顧眄幽興饒白鳥逃人飛赤鯉時復跳稍與外物逺解襟歌且謡安知抱憂思謂我士也驕初到毗陵獻歲涉重江仲春安我居衆物已熙熙新花生繞廬解裝慰羇旅置此琴與書稍稍道吾真幽襟得軒虛頗聞蘭陵俗尚有荀卿餘文章幸仰止夙好今欲攄膏雨復應候帶經得耕鋤歌成擬焱氏賦就期相如出處方自爾名聲亦從渠無煩畏礨民屑屑俎豆豫雨後城下雨餘百川漲逺水浮林梢忽怪有帆席何為出鳥巢登臨非吾土虛爽慰南交稍見暝煙起隂蟲啼草茅下汴畏途心多驚強寢終不安雖是仗忠信猶有行路難古今惡隨波今乃知所患胡為出溷濁幽興悠然寬望九華山九華非人境聞譽不相識南浮大江波始見蒼翠色是時雨初霽積靄尚融液九峯若驚龍並躍雲外碧森然聳牙角未謂真是石問名審其實歡喜愜所適恢竒一何甚逺想始開闢造化競淫巧斧斤恣雕刻不然何其功不與嵩華敵我行宇宙間若此曽未覿中國名山川幾何亢斯迹徘徊不能去塵土愧行役平生樂間曠時俗況迫厄誰為隱君子攜手宅巖隙雞冠花秋至天地間百芳變枯草愛爾得雄名宛然出陳寶未甘階墀陋肯與時節老赤玉刻縝栗丹芝謝凋稿鮮鮮雲葉卷粲粲鳬翁好由來名實副何必榮華早君看先春花浮浪難自保此花白露後益殷鮮可愛玉書云赤如雞冠陳郎中竹園蒼竿十餘畝歲晚色更好詰曲逗逺村深沈象晴島鳴禽自相應風葉不待掃何事主人心白頭三署老浮雲髙雲乘飇風泱漭縱所適大哉九霄闊俾爾萬里客豈無一掬潤浩蕩洗南國應龍潛冀州回首空眇默公是集卷四

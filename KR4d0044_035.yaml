body:
  text: 公是集卷三十五宋劉敞撰序送從父弟斁序斁為蘇州户曹掾二父舊治也吾聞富者送人以財仁者送人以言吾非仁者以吾一日長乎爾莫爾告也不可昔者莊生有言吾甚善之其言曰形莫若就德莫若和就不欲入和不欲出又曰內直者與天為徒外屈者與人為徒嗚呼知此可以無怠矣就而入者不可以羣和而出者則掩上也內而不直則其中不立外而不屈則衆厚怨之夫智無小也學而己矣官無小也敏而已矣知學不病知敏不匱居處恭執事敬與人忠雖之夷狄猶足恃也又況泰伯季子之國伯父叔父之所舊治者哉爾其以此矣送王舒序由中國入揚越五千餘里其地隘絶號為一人守險萬人莫攻蓋自秦漢亂時則然今宋德一致夷以為郡縣人民反習筆墨嵗貢士比中州為多南北人往來商貨財吏送故迎新旦暮不絶若夷徑然然猶山行不能度車馬依草木巖壁極上復下斗絶無漸毒蛇狼虎據要處為害或時瘴霧昏暗發于草莽早衰暮年易以致病其川行不能勝百石下瀨漂激聲氣洶駭船石礧浪隱轔乘波水奔逝不能正目篙工一舉手不得所輒碎散沈溺不可援拯故北人去者常惴焉今王生治裝正歸閩中無難色出門取道無畏辭豈王生其土人能習之哉其怚音粗悍不避虎狼灘瀨之惡甘從事哉王生之意思于歸見其親猶方壞水決菑揵簣土不能遏故接淅而行尚何顧險乎雖然王生惡得勿重其身哉親憂亦憂親喜亦喜曽子也事親有道而信乎友孟子也王生不道曽氏孟子則已苟道之王生欲行者何以異兹吾聞吳越多竒士者也王生如得其人而與之游吾又將賀王生之信于友而獲乎上也送江鄰幾序古今為左氏者衆矣功名之士則尚權變詞辨之士則貴文章數家則隆䜟緯小學則工文字亦徒祿利存焉若夫大不為功名細不為詞辨不僞于䜟緯不衒于文字居今之世無有祿利之勸而治左氏者惟獨鄰幾鄰幾之學則可謂得乎其性而出乎其心矣雖然吾聞君子之學者貴其為道也非貴其為名也貴其適于聖人也非貴其愈于衆人也夫澶漫而無家閉絶而無宗此今世之儒固非矣有家以相訾也有宗以相奪也此漢世之儒庸是乎然則鄰幾何說焉故謂鄰幾盍為春秋夫春秋者五帝之所以化三王之所以治禮可以起義可以制者也一之于仲尼則得之一之于左氏則失之而鄰幾猶固以不然昔蘧伯玉蓋年五十而五十化鄰幾􅀢以吾言置于耳東南將有賢者乎吾願子評之將無賢者乎吾願子復之子之化也何必五十吾敢以此為贈送梅聖俞序昔者邊鄙無事士大夫恥言兵聖俞獨先注孫子十三篇獻之可謂知權矣及其有事士大夫爭言兵或因以取富貴聖俞更閉匿不省利害可謂知道矣夫聖俞前非勇也知天下忘戰之必有憂也後非怯也知功名之說勝則隳教化也聖俞之任其身不輕矣世人其若聖俞何哉某少聖俞十六嵗然聖俞與我為友所以從之游常恐不足今聖俞應聘許昌某以事留京師不得偕行也古者贈人以言吾何以贈子乎明子之趣以示人不欺耳嗚呼世有君子者以我為知言矣于聖俞無負焉送蘇安上序莊子曰得者時也失者順也可謂盡于理矣今夫學者守一先生之言則自以為有餘其以干于世則自以為足矣濟天下不幸而不得則自以為不若人是以有憤怨之色是以有鄙倍之氣是以有戚嗟之聲若是其得也不足以便人其失也足以傷身豈不可憐哉曩者安上嘗舉于鄉名稱甚高亦得矣而曽不喜其意乃恥所以舉者非巳之學也今斥于有司名稱甚屈亦失矣而曾不憾其意乃推所以失者非己之時也苟不安于道達于命逺于利能若是哉嗚呼明安上之意以語衆人乃得笑焉明安上之意以語賢者吾庶乎無取友之過吾請以此為上賮送王生序王生嘗過劉子劉子弗謝也聞其將之京師受業太學往送之門而告之曰吾聞贈人以其幣也弗若以其道也資人以其貨也弗若以其言也今子進于藝矣而逺行吾母以贈子雖然子之學也將學于道乎將學于利乎將道與利兼存之乎其母乃貌為道而情為利乎何子之汲汲不憚煩哉反修而身反寧而親反友而兄弟夫道已至矣人有非子者乎且夫古之君子之學也慎其所以為號其仕也慎其所以為名是以其號可傳其名可信也今之君子則不然其學也託號于仁其仕也寄名于義是以其號不可傳其名不可信也故學者至乎鄉原而不自覺仕者至乎兼愛而不自恥嗚呼慎之哉道術既為天下裂矣子母寡吾德而輕吾言哉榮子之量爾送楊鬱林序鬱林名郡也太守尊官也其任不輕矣然而當拜者輒以炎瘴霧露為解天子以謂此皆全軀保妻子之臣無憂國之風皆置不用而詔丞相擇刺史之賢者使舉竒偉倜儻之士以充其選于是大人部荆州詔書先至則以楊侯聞天子可焉遂自郡從事遷廷尉丞假五品服以行别賜錢十萬衆皆榮之然楊侯既受命退而治裝泛然不以為喜聞嶺海之說風土之異漠然不以為憂如他日焉人皆曰楊侯矯亢人也嗚呼前世之所以能治也為官擇人後世之所以不治也為人擇官彼庸庸之臣志得意滿坐而養交以叨富貴真若長者一旦有境外之事憂畏首鼠堅以死避世常有之夫不可使往春秋貶焉若無君子何以矯也吾以楊侯矯世之君子春秋之徒歟推此心也雖在山海之外而加千乘之國其有難治哉于其行序以贈之送邵賢良序墨譏儒以言命夫儒者豈好言命哉古之賢多所說而不見鈎用多為善而不得升舉幸而說合善取則齟齬乖戾卒敗其功而後已是類有若天為之者故推其窮而歸于命孔子之相魯也孟子之仕齊也賈誼之用漢也樂毅之用燕也功施矣而不待究名達矣而不得遂皆天也苟出于天者又曷怨乎今邵氏舉賢良天下之人舉賢良者不獨一邵氏然而邵氏無媒援于世猶奮于畎畝之中則邵氏誠賢良也今之時太平而士務進故山海之士無伏匿以不伏匿之士遭舉賢良之時士至者必多然而有司擇之邵氏之外不能滿三可謂精矣夫合天下之士觸有司之情雖十冊之其勢不為人後亦明甚于是而不獲命也是功施而不得究名達而不得遂者類也事雖失圖其自致卓然之風猶足以暴于後生昔公孫子前舉賢良不見用後舉賢良為第一夫公孫子非愚于前智于後也曩日之畫猶今日之務也前見絀而後見寵者遇不遇之時異也已適不適雖智無益已適當遇言必見可皆非人力所能為也而命非乎故惜邵氏之未逄者宜推之于命而致乎勿憂致乎勿憂者本乎儒者之道者也送劉初平序讀書而講道據權而涖事其功德易以及民孰若士大夫耶然而天下緤組垂紱爵上聞者無不慕山林之士而願與之齊為山林者嚻然若固當也此其故何哉豈朝廷之士真可薄山林之士真可高彼何豫之而不辭此何受之而不讓乎亦曰不汙于利不近于恥不親于憂不煩于事苟異乎此者無不慕焉如此雖糠粃乎堯舜無非者矣若劉生者豈真士大夫所慕者耶其游遍公卿無往而不若舊相識使汙于利近于恥親于憂煩于事而能爾乎往者朝廷喜求才拔草野有出茅屋任諫大夫者後太平益厭懈人亦益近薄故蒲草圭璧往往流于瞽叟而詔書亦輒以先生處士寵之欲以致後人今劉君好史書語當世事有權變乂博識多前知為士大夫所稱而未聞有以舉應詔者何耶事固有難知者哉行矣入於越誠將見范公願以告曰斯道也將亡矣苟相天下也而能勿興此乎送焦千之序君子之學也至于自得而己耳智足以經天下而不慮論足以合當世而不言仁足以懷萬物而不憂非可憂而不憂也憂其所憂不憂其所不憂今世之士皆不憂其憂而憂其所不憂舜之陶伊尹之耕太公之漁至矣當是之時洚水滔天懷山襄陵下民其咨而舜不慮桀作淫侈慢神虐民並告無辜而伊尹不言紂脯鬼侯醢鄂侯殘賊仁義而太公不憂此一聖二賢豈自逺于人哉德有守任有職以道援天下枉尺直尋而不為者也夫不汲汲于世者固世所汲汲焉不汲汲于世者乃可以大行王者不作聖人之道衷于是乎有宋墨之學以救攻止鬬有蘇張之學以排患折難有孫吳之學以强國勝兵有商管之學以長材足用外託號于仁以邀利內寄名于忠以干權嗟乎道之所以不明也學者衆而達者寡得之者喜失之者憂吾安知夫得之非失而失之非得歟吾又安知夫喜之非憂而憂之非喜歟是以君子慎所學惟至于自得而已耳焦生既學于歐陽公因北游京師京師賢智之所聚也伎能之所試也變化之所出也生其務自得毋枉道憂天下之憂以翹于人憂天下之憂以翹于人人將謂生宋墨也孰與勿學吾亟得見焦生于歐陽公之門美生之志足以造于道而不流于俗于其行也贈之以言送謝希樂學士赴闕序學者稱仁義必歸堯舜堯舜聖人也當時之行事在二典者孔子叙之矣其君臣之言吁命以成不忮不疑熏然太和以有鳳鳥之符嗚呼何純古粹至若此爰及商周其道德雖不與堯舜偕比然史之所載聖人述焉後世誦以為經師師相傳由百世之下等百世之盛莫之失也及兩漢受命史臣奮力以書于策然由無聖人裁之褒貶不中學者不宗師況又無兩漢之美者可道也哉今天下康乂無異于古而天子以堯舜為法所踐所言合符前王則史官左右所記注得不宜盛而推之于聖人乎前日謝公處此任天下共美之今公之朝也人又以宜代天子言者也夫代天子言者豈不欲制度詔令如堯舜三王坦然措之六經乎嗚呼人今以堯舜之道責公公雖欲强而辭讓不可公能思之裁之推之明之則史之所記宜在彼二者之間矣此可謂國家大務凡號儒者得勿喜乎苟志之及乎此母留公行三月某日序送福州文學蜀人范宗韓序蓋君子之仕也辭貴不辭賤辭富不辭貧夫文學之位可謂賤矣其祿可謂貧矣是范生所不得辭也范生蜀人為古文章有名或薦于上上以福州文學處之范生于是攜其妻東南出巴峽以趨海濵嗚呼太平以來治貴和同四方之士未有特超而起者也及其多事而年少羣不逞之人逃奔蠻夷為之謀主以病中國由是隱居之賢以名高見疑稍稍就吏矣其祿雖寵囚之實也其籍雖仕竄之實也豈可謂非命也哉吾嘗游福州識張宜太和詡詡老儒也其為人介而不别同而不流是以不為世俗知亦不為世俗患子往從之乎又何陋哉送潘況序士不遇者隱可也古之所謂隱者非求異于人將以同于人是故擇可以託者名焉因可以利者惠焉資可以養者食焉彼且索之以其智任之以其材則術深矣守之以其誠達之以其識則志廣矣詹何之釣至于可以為邦庖丁之解牛合桑林之舞嚴君平之卜筮蜀人以化世豈知所以隱哉潘生始以進士舉既不偶故去而治醫夫醫者世特患其無常潘生之醫合色脈立經紀平權衡序清濁其有所治猶掇之也可謂深矣是其所以索之者固精任之者固良守之者固明達之者固逺歟是古隱者之志也夫士屈首受書出于蓬蒿之下者必有濟天下之心幸而在位拘文法顧利害至于白首或未能活一人今以醫故嵗所活輒數十百千此兩者責就為深功孰為多潘生之隱于醫可以無譏矣于其行序以贈之送從兄赴選序從兄居鄉里執耒耜耕者殆三十年衣食未嘗充旱乾水溢稍喪其土則乞于鄉黨鄰里以養其親家君聞而憐之適曽上郊推恩得任子弟從兄以是為郎又三年將西之京師見豫于襄濆海上其色焦然其髮班班然其足踽然病矣嗚呼前此者兄知勞力而已後此者又將勞心古之人所謂生為役者一身而二任焉其有不病乎雖然吾聞之惟知道者可以不憂兄其亟為學其猶可及壯也送新安尉張詵序古者諸侯制有其國惟卿命于天子命于天子者不名于春秋以尊之也今也不然公卿大夫出為方伯州牧者得行古諸侯之事不得行古諸侯之權其吏也天子置之諸侯之所得為者貢士而己貢士多者數千人少猶數百人拔其尤者聞于上其大率十取一然而㑹于尚書者亦不減數千人有司雜試其藝第其能者而聞于上其大率亦十取一然而進于天子者裁數百人萬取千焉千取百焉不為不精矣天子又親試其言而校之退其不中程者録其中程者則益加少矣故凡拔于卿考于尚書策之廷中非其才千百人之尤也莫至焉如是而以為士以佐諸侯以治天子之民其不輕而重也亦明矣是春秋所不名者類也然而或以為小者彼自侈其才而負其氣不度栁下惠以豫觀之不然夫天下有事執干戈之卒瞋目語難破堅陷敵出萬死一生之計奮不顧後可以朝弛擔而暮析圭儒者辨武厲精馳意應變語竒以恫愒當世之權可以立談而取公侯勢激之然也及其無事將考以文采詢以制度與之揖讓以行禮可者斯與之焉不假時以為勢不資辨以徼用其言必合于先王其德必蓄于其躬故仕者難也不得以卑為恥然則能勿重乎今晉卿既自能力于其術以取尤于千百人又能順天子佐諸侯治其社稷人民之事是栁下惠之智也苟順是而行之其獲于邑人而得于諸侯聞于天子也易矣其于高爵若詔擯而上諸堂孰能禦之吾知天子之命大夫士于春秋有重也故為之序以贈送湖南安撫某使君序苗民之頑不率帝命蓋自古記之矣以堯為君以舜為相而有三危之誅以舜為君以禹為相而有羣后之師此非其德不至力不足也不得已也然則聖朝獨得已而己之乎夫苗夷異類異焉其暴虎也其貪狼也其捷猱㹨也山林之與居鳥獸之與羣其險阻幽絶非人境也然而驅中國之士衣三注之甲負弩荷戈加糧糗其上夜則冒霧露晝則負赤日日夜不休與之馳逐是以難也然則雖欲急成功安可得哉今者上策莫若修堯舜之義明布其德而彼將自服其次嚴兵以守之絶其抄略之路而勿為深入之師其次誘而致之使去其冗則因可取也若夫恥不能追而探其巢不為致人而致于人釁于勇而嗇于禍可進而不可退是以用師僥幸也非國家之利也願使君不為昔者三苗之事益贊于禹故其功烈垂于後世而莫得過焉世不可誣安知後來者之非益也將在使君所以達之而已何畏乎有苗送湖南運使慎學士序景祐四年七月詔以某叔父為湖南轉運使明日詣閣門疏曰荆湖去京師蓋數千里其地于古為三苗有彭蠡洞庭大澤之險而其南蠻夷與國為境凡風雨明晦率常蒸毒易以疾病而臣母老不可往惟陛下哀憐未報又上奏曰臣不敢憚逺恐羈縻南方以為老母憂則死有餘恨臣本三司判官今誠得罷所領獨校讐祕閣資以其暇奉親不勝幸甚制曰可更以慎公為湖南轉運使當是時尚書郎在荆湖察獄者以不迎親之官為㑹稽太守劾舉見責問而叔父以母老故辭內外任以求在左右朝廷以為美談而慎公在書館三十年前後佐大司農為外郡守亦十餘嵗勤勞久矣乃得此任士大夫以為少而公處之無愠色嗚呼古所謂各行其志者歟孝者念其親而忠者念其公者歟念其親者忘其祿念其公者遂忘其親歟詩曰是用作歌將母來諗念親之謂也又曰豈不懷歸畏此簡書念公之謂也天子以此命其臣而其臣又用此以報天子欲求內外之不治風俗之不劭不可得也若夫吏道之端民事之情教化之本徴賦之法孰為賢而不識此者未足以贈也故于公之行語所可頌者為來者法焉公是集卷三十五

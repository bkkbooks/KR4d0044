body:
  text: 公是集卷五十三宋劉敞撰墓志銘大中大夫行刑部侍郎致仕上柱國賜紫金魚袋俞公墓志銘公諱獻卿字諫臣其先河間人晉永嘉之亂徙居黟歙公之父曰某贈工部尚書尚書之父曰某某之父曰某皆蓄德不仕慶詒其後尚書取閔氏贈太原郡君實生二子長曰獻可官至某官天章閣待制其季則公公之初學師友某兄強力敏捷儒術自任其後遂相繼成進士名聞天下云拜夀州芍陂尉臨事明察善鈎人情推顯至于隱故盜賊不敢發發又輒得人有告其師浮屠出遊者公揣其有姧使吏拘之而索其室得浮屠之尸一縣大驚以為有神轉昭州軍事推官陳進亂嶺南象州危甚吏民莫自堅其太守欲背城奔使公往護之公至為説利害復教使堅壁治兵為不可攻太守急聽其言得免誅賊亦不至官兵之在宣州公部昭民往輸之粟及事平議留昭民伐山林以治官府曰役病矣不可以不示信請期三日許之民聞公令知不久役皆勸功趣事事如其素陳進死上功第一賞未行丁尚書憂喪畢轉大理寺丞為本寺詳斷官選殿中丞知廬州慎縣又換杭州仁和縣丁母夫人憂服除改太常博士知南雄州潮陽吏民不相能訟繫不決一郡恟恟徙公知潮陽鐫其曲直潮陽又多水害公親相地勢築防金山百姓便之轉屯田員外郎大臣薦可為郡守厯兩院御史領左軍巡使舉察稱職拜三司鹽鐵判官上初即位公疏言民力不足其弊在取之太繁用之太奢可減冗食及諸無益引先帝為法纍數百言天子嘉之罷清衛兵及省浮屠老子祠醮公本謀也淮南二浙一嵗耗鹽十三萬尚書經費不足公往示之至則條廢舊弊以新法從事吏盡償所負又增五百萬石以兄為鹽鐵副使改開封府推官會陜西言兵食不足轉運使非其人朝議換之上亦重其選宰相數奏進擬無合意者召公問狀公不辭讓因入言之天子識公名曰是前使淮南者可奏公至部三日得半年之儲終嵗餘二年之食雖一切方略然其百姓富者不病貧者不擾云涇原塞外武延川本羌地諸將請築保鑿濠守之公奏以謂生事不可許已而寇果至殺掠吏士塞所鑿濠而去轉兵部員外郎遷京西召對邊事薦趙某可將帥賜三品服以兄沒當葬求為東南官改福建召還判鹽鐵勾院轉刑部郎中居二年命直史館知荆南府進諌言事上聽不倦喜曰卿不當往荆州即日拜三司户部副使厯度支鹽鐵三部轉右諌議大夫復出荆南滿嵗授直集賢學士知杭州登石作堤以捍江濤水不為災召回判三班院及銀臺門下省出為宣州元昊畔西邊大擾詔書問所欲施公條上十餘事朝廷稱其知時務徙知應天府改工部侍郎以疾請老天子憂之以為刑部侍郎致仕聞其居杭州即從徙二子官吳中以便奉養慶厯五年四月十七日終于所居享年七十有六明年某月某日葬歙州某縣之某原從先人居夫人馮翊郡君錢氏柔淑知禮是配是宜子四人長希楚某官次希元進士及第早夭次希及次希忠皆將作監主簿女三人長適祕書丞江杞其二未嫁公為人高明剛嚴論議立規矩似不能容物至典法持獄平易寬恕不肯妄有輕重其在京西錢丞相為許州厚賓客之奉嵗費千萬執政素不説又疑其有私公奏事至京師開其端問公公對曰無他世稱公長者纍階至大中大夫勳至上柱國爵至開國伯食邑至九百户所與交遊同僚多厯兩府事而公獨不遂可謂命矣銘曰俞之先世基德相繼其大而章自公兄弟雍雍在家矯矯在官厯試以難富貴不愆忠而好謀天子是咨功濟西方國人不知辭老而休亦不踰距其風孔高以憚進取仲尼有言積善餘慶公實有子嗣武其盛尚書屯田郎中提舉兖州仙源縣景靈宫王公墓志銘公諱沖字景儒其先自太原遷宋居虞城祖化贈太傅考礪贈太師中書令于今為顯家故弗論著也公少則好學論議依名節慷慨自喜不與衆浮沈士友多憚之祥符中舉服勤詞學成進士名得試校書郎知興國軍永興縣父喪解官服除選于吏部試判優等為武安軍掌書記授武昌軍崇陽氏陳廣與人鬬鬭者以他疾死而吏劾廣殺人議置大辟廣亦不能自明公擲其狀以聞有詔下旁郡覆廣獄廣卒無事轉運使竒其意欲為之請賞公辭不受天聖初改著作佐郎知夀州霍邱縣吏積不治盜賊放橫公使其百姓鄰伍相收司而以耳目一切糾發老姧宿逋中盡服禽無脫者徙蜀州晉源改祕書丞知陳留當是時章獻太后垂簾聽朝而中人用事者羅崇勳之徒交通縣豪借之意氣以漁奪細民吏不敢何公獨以法繩之請謁無所聽大姓田滋等由此懼造飛語以姧利事汙公太后果怒下公吏使中人雜治之訊掠甚急欲公自誣服公義不屈寧必死不肯少自下獄遂不具然猶坐除名徙雷州景祐初上始親政盡斥逐羅崇勳等諸附麗之者亦貶廢言事者多以公不辜聞天子亦自識其名復起為衛尉寺丞又詔盡雪向罪後勿用以為負改著作佐郎知越州會稽縣都巡檢使張懷信所部兵亂百姓恟懼欲逃入山谷間公䇿其不足虞固請徹城門兵以堅衆心郡中由是安康定初復為祕書丞通判乾州自元昊畔邊將數戰不利而民力以屈公上備邊禦戎等䇿及言復鄭國渠以實關中事遂施行通判華州月餘擢知乾州遷太常博士知洋州真符縣言民家失火舉族焚死公視其狀曰必仇者為之教吏推迹其人與三日期賊果得一郡大驚以為神明郡故無學公為立黌舍收其才子弟得二三十人親教養之吏觀聽悅喜由此彬彬然興于學與西州等矣遷屯田員外郎知泰州明年改都官嵗飢發常平倉以食飢者凡所活數萬人使者上其治為淮南第一賜緋衣魚符改職方領南京留司御史臺就遷屯田郎中提舉兖州仙源縣景靈宫受詔未行嘉祐元年十一月甲子以疾終年六十八後三年十月甲子葬某原初公起黃綬至二千石更四縣五州所居見紀未嘗官京師一為陳留以剛直幾不免猶濱于死及復召士大夫翕然向仰之兾其且大用然遂汩沒不進未能如其意稱其量也自以道終不行而公長兄年九十矣以太子賓客謝事家居故求為留司官以優遊相從鄉閭間怡怡如也有終焉之規嗚呼可謂篤于義知所進退不失其正者矣性不妄悅人謂窮困益堅于時人鮮所合而范文正公特知之數薦于朝其為政也勇于當事興利若不及去惡如恐失之亦以此故仕嘗難進易退然其處之晏然未嘗以見色辭喜讀書屬文尤長于詩詩凡千餘篇讀之其志可見也夫人葉氏封馮翊縣君三子長漢臣進士及第為長舉令次真臣試將作監主簿皆能世其家者也次某尚幼三女長適大理寺丞尚穎次適祕書丞孫圭其季未嫁某也公之甥也故于公之葬得敘其志而銘其哀銘曰為道者有言白則涅矣剛則缺矣嗟嗟舅氏涅而不變缺而不卷硜硜其聲矯矯其行極晦而明其辱則榮孰不公侯孰不耄期人也天歟其止于斯我葬舅氏悠悠我思銘以藏之以寫我悲故尚書虞部員外郎分司南京贈光祿卿杜君墓志銘君諱惟則字定國姓杜氏其先蜀人少舉進士不遇而其兄以尚書郎守睦州當先帝即位四方賀受命君亦奉其兄章上禮有司天子嘉之召試學士院得試祕書省校書郎調含山縣主簿南雄州司理參軍稍遷德清江都令川薦者言改大理寺丞知南安縣徙知雷州是時瓊管有大獄太守坐擊者千八百人吏民恫恐上下莫自安百姓廢業而夷獠素易吏狙伺重輕轉運使患之以獄事屬君君帆海風一日至郡下條其情狀悉罷遣千人百餘人而取其尤桀惡當坐者具獄上廷尉朝廷是之吏民賴以安改太子中舍通判濠州賜緋衣銀章又改殿中丞通判杭州乾興中轉國子博士知處州遷尚書虞部員外郎年老自表分司南京因家于雍邱君為人溫厚和易與人交尚義久而益恭其言必踐之不為虛詞以導悅人亦未嘗斥人過至于仕宦視公事如私視百姓如家人苟可以便之必啇度處畫使得其宜而後已不求為名故所至見愛去之輒見思及其謝事歸居也鄉里慕仰之稱為誠長者曽祖某祖某皆不仕考某贈太僕卿夫人某氏封某縣君四子長某早卒次子某次舜元次叔元三人者天聖八年同嵗進士而君夫人尚皆夀考無恙兄弟既成名還家拜慶一縣往賀之車馬塞里巷士大夫以為榮君隨其少子官淮隂明年十一月某甲子卒享年八十二未及歸葬夫人長子次子諸婦諸孫相繼又卒貧不能自還且三十年叔元乃克舉君之喪葬于某鄉某原而盡祔其餘實嘉祐五年七月甲子云叔元固善士孝慈有志節自其宦于朝數以令請贈君官至光祿卿然叔元之事親其設心以謂必已之所自盡者然後慊于義是以其得反葬為艱且久矣銘曰以仕必才耶致位一州不為卑矣以夀必仁耶至于耄期不云微矣嗟嗟杜君樂易信厚長者之規矣實有良子實收實食謂天不可信于此乎視納銘其邱以詔後世故朝散大夫尚書刑部郎中致仕上柱國賜紫金魚袋張公墓志銘公諱沔字楚望姓張氏其先出留候子房三國之分紘仕孫氏由是為江南人其後居鄱陽者曰子員子員生瑶瑶徙建安之浦城瑶生厲厲生大王父從晟從晟生曽王父贇贇生王父靄靄生考瓌自王父而上皆仕南唐不及見天下之平公考見天下之平而早世不及仕故不聞于時公之孤八嵗矣雖幼知感慕沈靜不戲狎異于他兒少長發其家書讀之勤志強力期以文學成名當是時楊文公以文章名一世于公鄉里外姻也因起從之遊遊楊氏之門者常數十百人而公以才見稱祥符初舉進士甲科得試校書郎知撫州臨州縣再調睦州遂安縣治皆有聲用薦者言改大理寺丞知平陽縣遷殿中丞母憂去官服除知溧水縣轉太常博士通判溫州賜緋衣銀魚莊獻稱制張旻以舊德用驕僭亂法公上書請出旻補外事雖不即行然士大夫欣然向之擢御史臺推直官轉尚書屯田都官員外郎嘗奉使決大獄朝中稱其平丞相李文忠公善之拜侍御史數月呂文靖復入相二人者不相能爭于上前以謂故事三院由中丞薦不當以執政用出公知信州既至又移福州嵗餘乃復召還言事引大體正得失而已不苛細充開封府判官轉兵部員外郎改三司鹽鐵判官出為淮南轉運使賜金紫轉工部郎中復入為鹽鐵判官假諌議大夫使契丹還言敵情慢疑有非常宜敕邊為備既而敵果以兵臨境求關南地如公䇿慶厯二年加直史館知陜州明年轉刑部郎中元昊入涇原敗葛懷敏數十萬之師關中震驚兵少不足自守朝議不暇逺發使中貴人即崤澠之間遮四路歸戍悉還補其闕兵久乘塞自以得生歸與妻子相見復驅之就死地人人怨呼以言相激拔刃彍弩且欲絶河橋為變中貴人無若之何疾馳入陜以詔書屬公而去吏民駭懼奔逃公單馬出城矯詔諭之曰賊已出境受詔諸軍趣還營毋得差池衆見公之易也帖然皆斂兵就道莫復喧譁于是范文正經略關中梁丞相奉使延州皆奏議以公權事合變消亂止禍宜厚其賞朝廷不能用契丹復修好除邊關備徙公河北轉運使初保州以被邊故戍兵廩賜厚他處及張昷之為轉運使議有所增損軍中怨之相率殺守佐閉城反諸將聞變爭欲急攻城大兵會城下幾十餘萬公獨不聽曰兵驕故作亂耳民不反也攻城必多所殘百姓何罪且城未易攻與之相反覆諸將不能奪乃登東關門呼首惡者諭以禍福使出降衆皆踊躍投兵杖再拜曰公活我願見詔書面縛後旬餘天子為遣近臣受其降卒全一城者公本謀也猶以事不先覺貶秩知汝州富丞相宣撫河北封敕不下曰張某有謀功乃當賞祭何奪之位然天子以輩例皆貶故不許公為人溫恕仁讓在朝廷恂恂無所競稱為博厚長者至臨急變勇鋭堅決以身蹈不測處之不疑其治軍旅應變畫䇿能任大事雖宿將無以校得失百姓賴以安豈所謂仁者必有勇耶移知宿州初陳恭公有所愛吏私屬公公不應及其在位因事左遷公都官員外郎監宣州鋭士大夫由此惡之不平于其免相也乃復得工部郎中知廣德軍又遷刑部郎中江南東路轉運使召還判三司户部勾院未幾自請治明州有詔視三路轉運使嵗滿當入朝因上章請老子蘇天子許焉用其少子為州從事以便奉養初公以材進數試繁劇有異效世許其任公卿其後失意更不遷而新進常輩名位顧多超處其右自丞相以下數稱其功理其枉然遂終不用十有餘年他人為公恨而公處之晏然未嘗置色辭性亷不治家人活業仰俸祿以生而厚于宗族鄉黨賓客所資養周給稱其意厚薄初不計有無及其歸家居也囊篋無餘資所居才蔽風雨飲食或日闕亦不以纍其志改其樂嘉祐五年某月某甲子無疾卒享年七十有八積階朝散大夫勳上柱國夫人魏氏封某縣君子三人皆孝謹諷太子中舍詵太常博士誨則州從事者也女五人皆嫁名家明年某月某日葬某縣某鄉之穹隆山吾聞有隂德者有陽報不在其身在其子孫若公之德多矣殆亦其後且大乎銘曰仕繫其逄進退有時嗟我張公長者之規排難寢兵洞然至誠不伐不矜棄功與名富貴磨滅令德則長惠之在人世以不忘穹隆之葬公則有子宜爾子孫尚食廟祀朝散大夫殿中丞知汝州葉縣騎都尉陳君墓志銘君諱耿字仲操真定人祖日審交父曰昌業世世傳鄭氏禮皆不仕君受學父祖祥符初以經中第得上元尉厯永定軍司理參軍霸州録事參軍甘泉令遷建雄軍節度推官知永濟縣丞相沂公鎮魏善其政奏徙大名大名治城內事尤劇嵗滿課最得見上拜權永清軍節度判官初丞相率其屬連奏舉君可京官必得之而才稍遷丞相以為賞薄知其有親更敕其弟子融辟君監光州㭟場便奉養數月以憂免其後服除為蘇州觀察支使達官巨人薦君材能于朝者前後十餘章改祕書省著作佐郎知霍丘頃之移閬中遷太子左贊善大夫代還除葉縣未行又遷中氶慶厯八年十一月五日卒于家享年七十五君為人亷直不阿勢附俗而內恕有愛故長于為政其在永定軍人有殺死于路者賊不得其子疑怨家所為詣吏辨訴吏以子言名捕訴者按之證逮訩訩囚無以自明君察其不真訟繫待訊而急自守丞請捕賊守丞怒曰司理侮法耶何敢為死罪解脫遣他掾與司理雜治囚笞掠數百千囚不勝痛誣服具獄待報君猶守之不聼人皆為君懼明年博野縣捕得真殺人者舉郡大驚衆乃皆伏及為永濟縣當契丹使往來道自先帝與戎約和結兄弟嵗時聘問一以敵國禮待之使者入境天子使中貴人候迓饋勞冠蓋相屬其有求市令所司調與之以見中國廣大厚其歡心而少從旁縣賦取蹴迫令長稽緩不如意輒劾以違制文移倉猝百姓騷擾嵗嵗苦之略比軍興而縣吏鄉典亦利得其勢侵漁細民其敝蓋久及君至為設方略飲食供張百物皆豫儲待後使者過縣有所調取不復及民民便安之王丞相由此知君其始至閬中嵗大旱郡守希轉運使意不聽民訴災民遮君自言君即詣府請之猶不許因趨出悉取民所訴狀屬吏以令蠲其租而公文上轉運使轉運使初不悅後無如之何文丞相守成都聞而嘉之更分遣官屬行視兩川郡縣之被災者皆奏除其租獨閬中由君免于流亡而上恩浸淫至于東西川十有餘萬户矣君晚升朝贈其父大理寺丞母崔氏仙遊縣君位雖不大顯世守榮焉娶薛氏封高平縣君先君卒子五人女四人初君仕官過汝隂樂之築室焉君既沒三嵗十二月丙申諸子裔竒京蘇等乃以君及高平之喪葬懷音鄉之高原以成君志竒舉進士與豫同嵗孝友慈祥豫甚知之故豫得銘其葬庶幾不朽云銘曰學如其才有以顯親仕如其職有以便民夀爾厥年夫又何怨卜處于此實惟君存蓋古别子百世不遷尚越其延施于後昆翰林學士吳君前夫人趙氏墓志銘翰林學士吳君長文之元配趙夫人者兾州言都人父立仕為遂平令家頗饒于財憐其子為擇所從至年二十翰林君尚未仕治孔氏書王氏易通達有聞而遂平賢之以女豫之夫人既歸吳氏事尊章逮及祖姑婉嫕敏恪執勤左右夙夜不懈雖退居其宫未嘗有隋色吳氏甚貧夫人不敢有私財自其所齎服玩器用百物者苟可以備家費緩急無所愛以故族人無內外小大皆歸其賢翰林以經明選于禮部調回福州古田尉廣信軍判官夫人皆隨以往人謂其去舅姑之側當少假豫自寬而夫人滋益恭猶其故時也觀其志不為逺近有所輟作雖賢士大夫或不能矣寶元二年八月二十二日以疾終年二十二其後翰林以亷能升王朝又舉賢良對䇿直言天子用為諌臣遂掌制命召為學士顯貴得封其凄縣郡君而夫人不及封人皆為之恨夫人凡生一男二女男曰璟有至性其幼也未能識其母長而思慕悲哀有過于人者今補太廟室長長女嫁祕書省著作佐郎胡稷臣而亡其次嫁泉州司法參軍王孝寬初吳氏自齊之禹城徙北海九世矣由曽祖而下藳肂未葬翰林卜其地得東阿之魚山鄉孟柵原為吉嘉祐四年十月告于朝遷曽祖妣王考以葬而舉夫人之喪以從曰生不與我同其樂矣死若有知也其祔于祖姑尚獲其志焉銘曰女得其歸婦宜其家不幸不淑悲如之何夫也塋之子也承之祔于祖姑萬世其寧之公是集卷五十三

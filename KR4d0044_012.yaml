body:
  text: 公是集卷十二宋劉敞撰五言古詩同聖俞寄金山曇頻次韻是時豫方欲請東南一郡我雖遊都城心亦無所住誤得世俗償形骸寓冠屨少時侍吾親遊覽愛北顧至今頗思之想見江上鶩白頭曇道人夙昔竟未遇聞其最安禪無念無作故勞生有喧寂得意無早暮塵埃未易厭臯壤固多趣若復乘桴行從君款幽素送僧歸君山羇旅頭髮白寤寐君山青逺遊負雅志舉俗笑獨醒西風吹新秋幽興浮洞庭忽見九疑峯如列枕上屏遼遼伯牙意寂然誰為聽歸客適我願歡然叩柴扃振錫循東道泛槎問南星瀟湘落君手去矣鴻冥冥橘柚雨初熟杜蘭晚更馨上方試回顧笑指江漢萍入山連山何叢叢相背復相向盤溪殆千曲險石彌萬狀或疑天地翻斗起渤碣浪蹙沓更騰凌變化倐竒壯舟車未為用夷夏永觖望鑿空伊誰氏重譯肇霸王茫茫千萬嵗冉冉道交喪薄伐策已卑割據事逾妄衣冠慘分裂玉帛敝辭讓至仁有柔服逺馭恥懲創非無一丸泥不乏萬人將齊讎紓九世魯錦輕百兩羊腸勞躋攀魚齒困沿並彼岐亦云岨易簡德固曠大哉天作詩因見聖者量治渠旱久溝畎廢忽雨浸我廬晨興不及屨出門自手鋤一直復一曲水流若江湖蚯蚓為蛟龍蟻封即邱墟生理避燥濕一室足有餘人事戒偷安未能輕須臾豈恨規摹小所傷筋力劬衰疾實使然不勝一匹雛伊昔論五帝每嫌盡信書及兹始欲歎微禹吾其魚東門行古曲言貧士不安其居妻子留之今改言時薄不恤賢士士欲逺逰猶顧念舊國拂衣趨長道撫劍獨歎息并嵗不易衣期旦曾一食悠悠風俗薄顧我若異域積金要能笑彈鋏輕下客豈辭蓬蒿居未與塵世隔黃鵠非池禽東南舉六翮出門尚徘徊悲鳴念舊國何日復來還為君涕沾臆步登南門呈府公秋至久獨醒今旦始一醉非公愛賓客何以強茲意清風與人期蕭瑟萬里至落日髙城西參差數間地顧茲景方夕悟彼嵗亦逝造適常若希開懷欲誰忌暢然就酩酊更盡酒中味小雨春陽轉為旱惠澤積不泄稼穡亦已晚泉湧為之竭吁嗟叫蒼天閶闔不可越精誠憑土龍神化空恍惚今旦微風來朝陰度城闕霏霏墮疏潤稍稍漏白日塵埃暫掃地草樹才沐髮終宜雲漢枯尚喜雷電發帝方復威令世莫患妖魃寧作成湯時彌年困飢渴淮上微雨寄天隱彥文海風吹微雲載雨淮上來灑掃區宇間削然無塵埃四月雖徂暑幽襟為之開思我同心人閟兹千里懷悠悠日巳逺勤勤首屢回安得乘輕飇相從孝王臺細雨小雨滿前軒濃陰不時卷隨風氣潛潤竟日花微泫池光慘淡昏樓危依微辨寒添夕景長坐逼秋容晚楚客歌泬寥吟懷孰云淺吳九秋過西池作詩持國和之邀豫同賦三山凌波濤雲漢邈氛埃世無乘槎客安得窮昭回天門洞閶闔海池含風雷淵淪蛟龍室焜炫金銀臺西皓何蕭條百芳日已摧誰能瑩心賞喟子懷仙才時變感所思駐車載徘徊已秋孰願夏覽物彌歡哀韓生肆爽言觀變均齊諧而我拘俗者俊遊日已乖欲濯纓上塵何時與君偕讀雜説小書長日無與語聊及齊諧書紛紜六合外莽眇三皇初近既難必有逺亦非必無古今夢寐間過事蚉虻如達生齊萬物曲士拘一隅苟以忘吾憂焉能識其餘初到淮西讀書申申堂寄友稟性實無用干名謬所望中為祿仕逼誤有世俗償組綬見羈縻簿書正搶攘語言畏時忌談笑憂事妨往者託山林未能下羲皇邇來失吾真終日幾發狂期會非本務米鹽豈大方灑心賴篇籍發興依松篁朋友素所畏道路阻且長怨極倘見思寄聲慰離腸夜讀漢書明燈一編書往古千嵗事值歡輒孤笑觸憤還纍欷四旁寂無聲童僕正熟寐歡憤雖不同均非平和氣可憐自戕伐忽忽老將至反愛童僕愚冥然不識字和永叔寒夜會飲寄江十昔與江翁别酣歌國門道黃花落酒樽白髮藉霜草本謂此行逺定知此樂難豈意二三子復為今夕歡主人文章伯談道輒忘倦每至絶倒處恨不使君見鳥迹上古書龍頭冢中器其人骨已朽感此相與醉呼問西飛雲遊子何當返寒風吟枯梧嵗月益已晚吾聞太華峰乃有神仙居莫逐秦時人獨結山中廬永叔出所收古文碑碣及龍頭銅鎗示客以張飲興也三日同景仁鄰幾濟川晦叔景案原缺一字吕祕校劉判官會南曹飲五君皆尚書外郎劉吕修唐書官秋氣迎節至立秋前一日涼雨乘髙風車馬散北闕冠蓋會南宫從吏殆成隱玩嵗復將窮簿書幸無他談笑偶多同郎選冠一時史才映羣公著書駭深妙聞道惴顓蒙但願竊餘論常此樽不空寄迹三署老不慙顔與馮期鄰幾飲不至醉作江侯詩并解座客秋雲樂邂逅拂我榻上塵江侯舊多信今作叵信人我求江侯意因得江侯真乘興本當出興盡便回輪已諾雖可嘉將非俗中倫棄言似不誠未害方外羣江侯不為名名者實之賓江侯不為貌貌疏意自親作詩解江侯飢渴夜復晨十月二日邀鄰幾飲裴二如晦來遂留至夕晚下渠石閣方轡得傾蓋天寒畏干人巵酒自相對裴侯非宿約來預心賞會吾季方家居四坐客解帶獻酬雜嘲謔歡笑以為快幸無俗中士形迹一不怪蟋蟀鳴髙堂嵗月聿已邁于今鮮吏責無所憂其外但當勤來顧數醉此庭內良無德與汝聊足紓慷慨和貢甫瓜步詩江介多悲風川廣不可越畏塗非吾土遊子愴明發羣山起楚蜀衆水會溟渤地險自適然天衷豈端設憑陵三雄際偃蹇五國末非無英雄姿于此智勇竭疑城尚虎踞戎馬餘飲窟人謀雖工拙神物有豫奪請陳真人朔頗事丹浦伐風雲掃氛埃雷雨救焚暍禹功東漸海漢使南誚越太平自茲始盛德信貽厥和江十雨中與持國師直飲旦上天祿閣暮直承明廬避喧雖足慰取適固已疏佳雨及我暇兹晨殊晏如紾絺委冠帶髙枕睨庭除熏風散微涼潤氣浮郊墟沸聲湧江瀨暝色晦綺疏驚電時爍目疾雷不廢書商歌勤金石塵谷盈蛙魚此樂不可改古人良起豫惜無同音賞幽獨成離居聞君逹亹亹樽酒會朋裾髙賢卧家巷固多長者車寧無寂寞者閉關講玄虛不飲憶昔常好飲非以酒多味親友惠兹適笑語坦無畏不知天地廣豈問嵗月逝爾來顧可憐自覺不如意秋風正蕭騷萬物盡憔悴頗欲濯旅懷無人共昏醉獨遊何時歡白眼向兹世石頭城石頭非人力翠壁百仞髙上盤巉巖雲下激􅐓湧濤攀躋猿猱苦遊涌魚鱉勞乃知百萬師未易損一毛混茫有開鑿形勢豈一朝太古至德世斯民各逍遙艱難非所嬰秦漢仍寂寥發揮自孫氏力控劉與曹基業何崔巍謀謨亦雄豪龍蟠與虎踞勢足萬古牢德義苟不修忽焉亡其操繽紛不一姓氣象何蕭條往者遊獵區盡為黍稷苗前事不可忘後來鑒孔昭客行倦煩促勝槩愜所遭眇然抱幽想慷慨成鬱陶古人若騰波逝者日已滔壯觀誰與論悠悠背行舠直舍留道粹廣淵君實聖民伯初飲是日鄰幾濟川宴王金吾園亭不預會戲作五言寄之校讎中祕書聞子宴城隅大第丞相府主人執金吾浮雲駐清唱回雪舞妖姝金罍溢醇液犀筯厭鮮腴髙談鬱不發應接固已劬我從四五公置酒此石渠開窗掃殘雪列俎焚枯魚谹言規姚姒小説本虞初不知敝緼寒未覺膏粱殊從容忽竟日此樂亦誰如長安事交遊貧富固有徒不恨我失君恨子不顧豫回頭成陳迹萬事與化俱題詩寄餘歡毋乃笑其迂過聖俞飲積雨不出門局促如井蛙初晴強人意今日來君家下馬笑握手掃階去塵沙銀瓶撥醅酒紫碗雙井茶黃雀隨素魴安榴雜木瓜舉非一方物逺或萬里遐不知王侯宅此味何以加扶疏庭下槐燦爛盤中花春事豈不多遊覽何必賒與公平生親總角見髮華飲當外形骸語當恕喧譁縱心倒所詣相對白日斜江韓亦我徒但恨宿約差願使公多財此樂寧有涯招鄰幾聖俞和叔于東齋飲觀孔雀白鷴及周亞夫玉印赫連勃勃龍雀刀辟邪宫璽數物又使女奴奏伎行酒聖俞首示長篇因而報之前日俱逺别夢中每難期何言一堂上相與同宴嬉幸勿卑陋巷陋巷何獨卑幸勿辭樽酒樽酒安足辭君看籠中禽亦有山林思習習不如意焉用文章為君尋古人物信有陵谷悲擾擾不自適會為後世嗤促節無窄袖緩歌逐鳴絲自美亦自惡貴賤吾不知縱談劇虛舟快飲若漏巵人生但如此為樂自一時誰言冬夜長俯仰星漢移念無千金夀愧子勤稱詩答黃寺丞紫薇五言紫薇異衆木名與星垣同應是天上花偶然落塵中豔色麗朝日繁香散清風㛹娟雖自喜幽寂逝將終主人謫仙籍浩歌滄浪翁卜居抗靜節搴秀憐芳叢猗狔庭中華固為悅已容如何又將去含意默忡忡青苔侵履綦搖落知嵗窮獨賴君子德庶幾甘棠封曲陽亭送别海濱寂寥地送别何須頻數上曲陽亭自然愁旅人晴日排寒色清光湛奫淪微風海上來滿目飛魚鱗孤雲去無所野鳥鳴相馴信美非吾土送目倦南津寄貢弟徑雲翔空林積雨荒茂草哀鳴聞離獸驚棲見羇鳥時逝運自頽物壯勢還老感至境寥愴悲來色枯稿玩此豈有極辨之苦不早如何復傷别咫尺成逺道和弟自京師來四海無風濤五年再相逢會合如此難況我罹百凶悲端素填膺觸事淚滿胸欲言不能語豈知涕所從良久得仰視恍忽如夢中非復平昔遊豈復平昔容危生若霜葉凛凛待烈風不有親戚歡其如憂患攻破啼強為笑意氣徒衰翁慰爾友于情急難義所隆送秦州通判陸學秦地天下險秦兵天下強曩在景祐末叛國正陸梁渡河窺中原不見飛鳥翔漢將雖城守覆沒猶相望時秦獨髙枕毫髮無所傷豈惟形勢然固亦任使良近者敵已弱旄頭滅無光尚須得猛士分命修封疆陸子吳中賢英英富文章作人易感激遇事殊軒昻舊知軍中樂復愛邊地涼不忍京塵間著書鬢毛蒼拜疏如終軍請纓督羣羌大笑朱買臣衣錦憐故鄉旌旗導前車絲竹嗚後房指呼百夫走談笑千里康雖云半刺史其實專一方古來成功名竒偶不可常得時或幸會微賤升廟堂況君閲詩書智策未易量協心得元帥展意輸所長朝廷酹勳閥曽不矜銀黃他日重見君非復東觀郎貢甫在京口阻潮未渡向晦月消魄楚濤為之衰坳堂無深涉客子緩歸期吟繞沙步闊眺賞秋山時大川奔南島落日明西垂登髙既易賦懷古豈難詩喟彼一帶阻積此三嵗思何當命海若利涉慰調飢淮西延平以詩見寄因書陜城即事用酬來唱陜郊古云重雄勝地所該羣山左右顧大河西北來府署憑中髙一日萬景開是時八九月秋色清池臺樽酒雨餘酌笙歌雲際回追歡緬前會真樂非昔陪賓客雖日過禮俗多嫌猜于焉備廚傳安得忘形骸神交與心賞懷舊何悠哉送獻臣是時獻臣侍親之淮南豫亦且侍行臨荆州獻臣先從東門出故有此作風土樂荆楚塵埃倦都洛東遊欣邂逅勿復驚離索尚悔不同舟令人慙李郭送客不及欲折楊栁枝贈言别所思日落飛鳥息孤帆奔何之行人樂前途何以寬我懷還將别離思吹示橫笛兒送鄰幾日沒崑邱峯月出滄海波區區三萬里相望能幾何一出仍一處一合復一離正爾人間世無復歡笑時子行何匆匆將老思所試恨我無羽翰不能省君治黃河從天來太華出雲上登臨若相思寄聲問無恙送彥猷蒼蒼南山桂嵗暮獨華滋非無棟梁用道逺莫致之黃雀巢其巔螻蟻穴其卑全生亦以遂匠石空復悲兩唐邁青節千嵗接光輝圭璋固特達鴻鵠佳羽儀庶幾朝廷老出入王者師何事江湖間浮沈衆人為我實牛馬走不能強縶維欲往路苦艱愴兹四愁詩送直溫終軍西入關棄繻笑路旁丈夫貴成名用此還故鄉雖無魯儒操意氣殊激昻稚齡如頽波詎忍鬢髮蒼古人汝南秀契闊升我堂宿昔夢生翼已排九門翔未盡復來歸帝閽隔微茫髙卧三年喑忽隨南風揚萬里快超詣豈知道路長努力戒後時相勸不可忘送孜生遭遇爵位輕治平進取難不見明經士白首成一官憐爾吾家駒學問知所安得名萬衆中奮迅生羽翰天子臨廣廷公卿肅衣冠傳呼署甲乙誰不傾目觀我時忝陪侍趨拜玉座前鄂秀莩亦榮不自知欣歡勿言勢尚卑無以地固寒鸞鳯曽棘棲蛟龍亦泥蟠孟軻稱三樂富貴不與焉恨我不如爾千鍾益悲歎奈何方逺别浩蕩江湖間臨分豈自勝流涕空汍瀾送楊十一公緼之延平寡欲求易給縱心居常安一為淮陽卧及再芳嵗單處事非事事居官豈官官念以拙者效而為朝責寬故人懷英邁撫轡辱盤桓心期謝外奬談笑用為歡淹泊遂將永望舒毁其團别君感匏繫更欲愁且歎送王國卿功名世所濟時節不可遲夙昔聞斯語至今良獨疑筋力與時背進取將願違譬如寶燕石無用于重資不恨歲月晚畏為豪俊嗤見君復感歎吾道其如台古之英賢人隱顯亦不齊出處各努力悠悠慰我思送子南南師鼓琴者餘力推步精千里求知音徒步入王城能髙頗自負一一遊公卿朝廷富貴人寵辱心若驚聞至必解榻招邀劇生平以兹祿命術獨得當時名朱絃與素徽棄置莫為聽往往默自撫或疑非斷聲紅塵車馬中隨俗翻營營振衣忽長歎吾巳知時情卷槖郤東下野風蕭然清且賫山水意永待鍾期生公是集卷十二

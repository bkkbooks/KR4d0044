body:
  text: 公是集巻二十七宋劉敞撰五言絶句蒲三首青青水中蒲根葉自勾帶今我不如彼望君萬里外青青水中蒲秀色宜三春常苦秋氣早飄飄悲路人青青水中蒲誰能移之陸婦人繫所徇憔悴甘獨宿順州聞角北山三千里歸來已近邊如何聞鼓角晨坐更悽然瑞竹雙榦同本往來者因以瑞名聳節偶相並雪霜終不迷應将古人比孤竹有夷齊暮冬寄鹽城弟二首流水應無極東流向海城殷勤囑雙鯉為寄别離情海上春常早相思正一涯北風吹雪盡遙想折梅花東樓所謂觀風樓也能懷望鄉思慎勿上東樓海氣常常霧淮聲故故愁鼎池前太守鑿此池深八九尺得扃葢如新鼎下有物如藥青鼎受一斗餘色役人不知棄水中藥下有丹砂可一升皆太守取去或云是金鼎子因號鼎池丹成雞犬去鼎在陵谷遷惟有千年鶴時來浴水邊嘯臺髙臺映水末極望有層軒覽物惟長嘯逢人未始言酒舫悠悠轉小棹漾漾逐浮萍載酒和嘉月投篇弔獨醒杏源在射堂西面略可通小船兩旁種花有杏最巨故名淺水通漁艇低花損㡌簷東風日夜起幽興此中添蓮池在射堂東東池種蓮子紅白間稀疎夏木陰成後君看錦不如漁臺在鼎池上北即城濠常觀魚于此陳漁何處好層觀倚髙城快意屠門嚼安知萬里鯨花嶼在鼎池孤嶼曲池中芳菲四面同春愁隨雀舫繚繞未曽窮袁真人祠絳節朝何所白蜺空此堂神仙詎學得客到彊焚香丹井在真人祠清源秪數尺知是鍊丹餘安得棲真子相邀肘後書竹岡其下丹井層岡南面起仰見檀欒姿詰曲成幽洞因堪象武夷武夷有毛洞也大楸使宅堂前長楸蔭栢堂小枝猶合抱得地遂天年斧斤安敢到紅玉誰家女四首燕中記所見紅玉誰家女雙曈如水流映花看漢使不覺墜搔頭紅玉誰家女眀豔奪青春羞人不得語含笑卻成嚬翠霞金縷衣獨立翳斜暉無奈春風蕩吹人只欲飛春風能吹衣不能解人意使我為朝雲與君從此逝清明後鴈留滯江南久今來萬里歸春風稍和暖作意入雲飛憶闗中諸弟好去北歸鴈憑將千里書潼闗何日到送目故愁予立春日宿髙陽闗以病酒不飲復用前韻月色初元夜花香翦綵春而公髙陽客翻作獨醒人寄書區脫逢歸驛作書憑寄聲那知夢識路先入大梁城雨後回文綠水池光冷青苔砌色寒竹深啼鳥亂庭暗落花殘芍藥跗蕚晴相照芳香暖競飄波翻蜀地錦霞萃赤城標萱花種萱不種蘭自謂憂可忘綠葉何萋萋春愁更茫茫疊韻圖書如蘧廬吏事累志意招邀即逍遙醉寐自棄置山行荒徑惑東西回環極翠㣲空持征鳥意長作準繩飛池上修竹仍封雪交渠已泮冰那知四時改獨有醉騰騰過分水嶺去去百憂集回頭歸路迷紛然萬行淚自逐水東西草蟲扇子洒落烟紈薄肖翹物象竒坐愁冰鑑釋深恐夏蟲疑雄州留寄醉翁沙漠惟逢雪燕谿不見春聊將曽折栁留待未歸人馬上口占冰澗縱横水風松髙下聲逺遊應易老跋馬更凝情冬至寒事欲無幾春歸方有期嘉辰正須醉愛日為君遲南齋病卧香巻風飄幌燈昬雨映簾客愁渾不寐更覺漏聲添對月口號今夜閨中月應憐破鏡輝南飛烏與鵲為我報將歸戲題薄宦遭百舌不如歸去來提壺沽美酒泥滑滑如苔戲呈叔恬府辟入幕不諧得宛丘簿聞道珠履客今朝黄綬歸定知髙士貴一府莫言非東池避暑二首涼風千箇竹疎雨萬枝蓮自是清無寐非闗醉不眠翠石琅玕色長楊風雨聲不湏醉劇飲此地有餘清古北口守嵗二首春渡遼東海星回幕北天悠悠鄉國别明日便經年山盡寒隨盡燕北諸山盡干此春歸客亦歸一杯分嵗酒送臘强依依公是集巻二十七

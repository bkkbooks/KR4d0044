body:
  text: 公是集巻三十四宋劉敞撰表揚州謝上表一介之材善無所取千里之地任為不輕仰戴恩華退増慙懼臣聞事上之行莫若愛君愛君之臣莫重去國汲黯遺言李息望之致意本朝古今美談賢哲餘事況臣本以薄技遘兹昌辰幸得出入周衛之中優游侍從之末持槖簪筆庶乎寡尤帶劍佩衡足以自効豈其輕去嚴宻之奉偷得便安之私盖引嫌避親中外著令因事補吏朝廷通規幸䝉賜可之事殆殊共治之選伏遇皇帝陛下天度容物聖資盡人撥其忠誠非有違象魏之意察其淺識猶足寄民社之安沛然徳音委以符竹敢不勤恤人隠奉宣上恩自飭固陋之心庶幾樂易之政進四銘表律鐘鼎鸞刀臣某言臣伏見周世宗使其臣王朴定雅樂當時稱為精及太祖聞之以為聲髙一律非和音也雖有此詔未及改創陛下稽古之徳自誠而明深究禮樂之本而以述作為務故敇有司宿儒據周漢舊典乃魏晉以來百家之説参覈是非以立鐘律前後二十餘年及得其真至詳至慎無以加矣律初就以校尺寸與司天景表正合可謂得天及以鑄鐘考其聲下王朴一律如太祖之素由此觀之國家制作之美通于神明盖所謂性與天道不可得而聞者也陛下又因以興神鼎鸞刀奏事郊廟皆出于聖慮稽合典訓所以藏萬世示子孫器之寳也古者作器必銘銘之義天子合徳臣幸得召赴崇政殿從士大夫之後周旋器寳之側目覩其狀耳聞其聲竊不勝其愚謹獻律鐘鼎鸞刀之銘四章以發明令徳之指而庶幾不朽之地揚子雲曰銘哉銘哉有意于慎臣以子雲為知言也干冒旒扆臣無任恐懼待罪之至謝加學士表常人之情得所求而喜智者之慮過其任而憂今邊備雖嚴帥責差易學者雖衆儒選實難豈有貪就應聲之求忽忘非分之任怔忪失據欣懼兼懐固欲辭榮不獲承命伏念臣猥以薄技起于諸生内之無子産潤色之才外之無山甫将明之用久典訓誥洊臨藩垣七年于兹微效不立猶以陪外廷之末聞長者之風間䝉分章平議臣之奏時引大體正宗廟之儀苟圖納志非敢忤物然而讒人飾詞以巧詆法吏挾怨以中傷當是之時幾無以免聖心先覺公議尚存浸潤之説不行震驚之衆為止風波可畏天幸實多内私自憐懼久得罪輒匄十里之守庶警一麾之行不謂皇帝陛下生成曲全覆露無己進増金華之講増重儒林之光委以西州適其素願望非所及幸不可涯夫匹夫一飯之恩庸士然諾之信猶能捐生出死成功立名況臣連數十城之封兼四千石之重于以宣明威信撫養細民盡其愚忠庶無大悔以此圖報敢為虛言序易外傳序余讀周易表其彖象爻辭盖聖人之意微矣非通材達識孰能言之傳曰仁者見之謂之仁智者見之謂之智以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占四者所從得之殊其稱君子一也然易之書最為深至天道性命變化之數自孔子罕言後世無述焉以為傳其人不待告告非其人雖言不著云爾學者或有謂易之辭非為數者此以目聴何異及論剛柔始交而生屯分泰之體而成則莫能通習于所可見而蔽于所不能覩然後知易非一家之術也夫君子所居而安者易之序也所樂而玩者爻之辭也是以自天祐之吉无不利以其窮理盡性能自鏡得失也余以為仲尼有云垂之空言不如見之行事深切著明故采五帝以來明君賢相忠臣良士下及亡國喪家興壊成敗禍福善惡之理附之彖象爻辭以見白黑其説主王氏也而時有不同亦微辨而不斥後有觀者總而理之得以自省焉春秋權衡序劉子作春秋權衡權衡之書始出未有能讀者自序其首曰權準也衡平也物雖重必準于權權雖移必平于衡故權衡者天下之功器也所以使輕重無隠也所以使低昻適中也察之者易知執之者易從也不準則無以知輕重不平則輕重雖出不信故權衡者天下之至信也凡議春秋亦若此矣春秋一也而傳之者三家其善惡相反其褒貶相戾則是何也非以其無準失輕重耶且昔董仲舒江公劉歆之徒盖常相與争此三家矣上道堯舜下據周孔是非之議不可勝陳至于今未決則是何也非以其低昂不平耶故利臆説者害公議便私學者妨大道此儒者之大禁也誠準之以其權則童子不欺平之以其衡則市人不惑今此新書之謂也雖然非達學通人則亦必不能觀之矣耳牽于所聞而目迷于所習懐恐見破之私意而無從善服義之公心故亦譬之權衡矣或利其寡而視權如盈或利其多而視權如縮若此者非權衡之過也人事之變也雖然以俟君子耳孔子不云乎知我者以春秋罪我者亦以春秋于權衡何傷哉于是卒定其書為十七巻顔魯公文集序魯公極忠不避難臨難不違義是塵垢糠粃猶祇飾而誦習之将以勸事君況其所自造之文乎然魯公沒且三百年未有祖述其書者其在舊史施之行事盖僅有存焉而雜出傳記流于簡牘則百而一二銘載功業藏于山川則十而一二非好學不倦周流天下則不能遍知而盡見彼簡牘者有盡而山川者有壊不幸而不傳則又至于千萬而一二未可知也吳興沈侯哀魯公之忠而又佳其文懼久而有不傳與雖傳而不廣也于是採掇遺逸輯而編之得詩賦銘記凡若干篇為五十巻學者可觀焉盖君子多見則守之以約沈侯好學喜聚書至三萬巻若是多矣然猶常汲汲而不足者至其集魯公之文使必傳于天下必信于後世可謂守之以約而尚友者乎予是以序其意時㑹堂詩序州城北帶廣阜古所謂崑崙岡也其木宜茶與䝉頂比故或謂之蜀岡太守嵗貢蜀岡茶以火前采之發輕使馳至京師不過十日為天下先自禹抑洪水分九牧淮海惟揚州其任土之法若瑶琨金木篠簜齒革羽毛織貝諸奇物當備輸王府天子為其逺費民力皆止不以為常貢常貢獨茶至節易矣然猶嵗所上不過三數斤所以御于至尊者貴精不貴衍也世或説䝉頂茶宜久服能輕身除疾郤老誠有是者豈非臣子至願哉貍首之詩以時㑹為樂者固諸侯之事也于是築堂蜀江之陽命曰時㑹将率官屬修職貢于此焉且使來者世世勿忘服也嘉祐二年十二月右正言知制誥知揚州軍州事劉某題辭張氏雜義序韓文公作歐陽詹哀辭言閩之人舉進士自詹始明詹以來未有舉進士者也舉進士由詹而始則當時雖有舉者必未甚多也詹死于今三百年而閩之舉進士為特盛焉自流寓他處及占名數京師入太學為胄子者不數人其舉以鄉里者嵗常不下六七百人其衆居天下五分之一閩之進士可謂多矣凡讀書作文章被儒服無不舉進士者其不舉進士獨侯官張宜宜為人龎眉而甚古少言語有誠慤不為狎侮治毛氏詩孔氏書王氏易鄭氏禮左氏春秋皆通其訓話名其家法轉以相解條分節斷剖芒析亳不可以辯給奪也其言三代制度出于經者不啻如眼見乃不説魏晉時事不知有格律詩賦也吾嘗與共讀詔令數事時方立今王后宜驚曰是于古不可上如何若行耶吾曰公所言周公法也國家承厯代之弊亦雜用漢唐禮不純出于周此所謂損益可知者也宜于是悦然解觀其意非周公仲尼之制雖出于天子猶以為大不可其篤信好道而不阿世可見于此矣性便講解多新意異義務與聖人合而不求黨同間嘗邀其著書宜時年四十餘謙讓未肯當也然吾樂其道固窮而不戚絶俗而不詭雖古君子不過也自吾與宜别而遊于上國且七年矣求其在貧賤而用心若宜者盖未有由是知古君子亦止于此而已耳傳曰舉逸民夫宜之事父母孝與友信于鄉里和用其身端閩人皆知之而無爵禄之勸宜可謂逸民也己矣此固聖王所欲舉也因記憶宜所言詩書雜義嵗久頗不存得其十事為一巻以傳之其徒以達執事者庶幾于宜有所發云衡字公甫序古之人有聖智者出然後制器濟用以為天下利而洪荒之風革矣前聖作之後聖因之以至于多且備宫室棟宇養生之大物也丘墓宗廟奉祀之大歸也城郭溝池守國之大防也車輅所以行陸也舟梁所以行水也險阻由是而通耒耜鎡錤筐筥杵臼所以資農作也薄槌以時蠶機杼以成絲絲麻布帛所以資女功也衣食由是而有鈇鉞干戈介胄矛㦸所以衛民人也常旂旟旐所以表師帥也鼓鼙鐃鐲所以警進退也姧暴由是而戢網罟畢翳所以給畋漁也災害由是而除衣裳韠舄所以周身也冕弁巾冠所以飾首也天子之鎮圭諸侯之五瑞所以班國也佩玉于身觸以衝牙組綬咸異所以節行也貴賤由是而衰喪期有數喪制有别齊斬苴枲以杖履輔其隆以日月致其殺所以厚人道也孝思由是而篤珪璧琮璜凡用玉者所以禮神修好也誠慤由是而交鼐鼎錡釜所以致烹餁也俎豆簠簋所以旅飲食也爵勺奠彛所以㪺酒醴也賔祭由是而供金石絲竹匏土革木舞以干戚羽旄象其君徳所以諧音樂也和樂由是而合莞簟几杖所以佚四體也尊少由是而分射侯既抗正鵠既設弓矢以中所以習射也禮容由是而攷節符印璽所以孚逺近也命令由是而質府庫之藏鍵閉筦籥以固之所以謹出納也作偽由是而察五行之産五材之用或文也或素也或有象也或無象也或貴其聲也或貴其色也或貴其徳也視其所施而己大小有宜上下有稱于以尊尊而親親老老而賔賔敬鬼神而利民事國家制度于是乎始罔滛為異器以啟奇邪是以作而可法用而可觀惟度量權衡齊衆之器也多寡天下之物誠信天下之民本之同律㕘之同度數以適規短方圓以定準繩平直法于王府同于四海之内凡出于人力者莫不得所以程百器以役百工是以先王務審之今吾族子者衡其名子平其字矣嘗得進士第冠多士于天子之廷是尊儒之重選也六朞而拜四官籍在外朝職在書府出守大邦世人猶以為淹相見于江之南固請于予曰為我推衡平之義而易字焉予不得其辭而告之曰衡平而物得輕重物得輕重而民得其情天下之公所由出也字曰公甫可乎公甫曰衡也不得叔父之言為不自安今朋友以為衡也者将告之曰是吾叔父之言也鄭野甫字序鳥獸與人雜生于世鳥獸之形有頭足毛羽之異吾人者因其形之一類槩以其物稱之人之形同莫可辨者古之人以名人出其父祖之命以為識别後之人因名配字以義類相符非謂有勸沮之殊欲令人人行其名字也故有因義以配物有因物以配義有因名之文損益藏顯而字乃反之有因名之物遂以其實配之是以因義以配物如耕之於伯牛如由之于子路因物以配義如赤子于子華師之于子張字反名如商之于子夏偃之于子游物配實如長之于子長予之于宰我是其意也今之人不究本初以意起事或謂此名也宜充之以是道彼字也可行之于終身雖失古人之心猶未離乎告人以善也然而以名字自守于吾道之門固矣狹矣鄭子名叔熊其友字以正夫子欲聞其説也命予為言其理以易之夫子學于古道智深而見博又以行誼自潛不待正夫字然後勸也請字之曰野甫以附于因物以配義者如曰不己質哉為賦白駒之卒章曰生芻一束其人如玉其人如玉者謂其來自外也斁字序古之人重冠重冠故重相字字之也者傳其名也傳其名者主成其徳故字表徳者也若名則非表徳者也古之人有名狗名鰌名黑臀名籧篨皆賢人也周公之子名禽孔子之子名鯉聖人之命其子亦無擇焉然則惡乎擇擇乎字而己帝乙愛其子字之受徳使其人充其字而守之其祥淑豈短哉今斁之名者厭也不擇也然則孰字之宜宜乎思昔箕子之言者思曰睿孔子之言者曰不思罔周書之言者曰罔念狂嗚呼思則睿也不思罔也罔念狂也今爾何監非時箕孔周書致身之迪且思豈一端而已哉将為子思乎孝将為弟思乎順将為兄思乎愛将為友思乎信将為長思乎惠是由爾身出者也人其斁爾乎是故言人思其中也行人思其度也徳人思其永也居人思其親也樹木人思其不伐也如是焉曰罔未之有其不曰睿亦未之有其字斁曰思惟無斁劉景烈字解序劉侯外戚公子也而過人者三其弓七鈞而射百步末可以斃牛兵無長短劍無單復應敵施巧倐忽不可知如神居士大夫間而恂恂不失節似儒者子是以嘉之夫士有英邁之氣而非功名之時則畧為不用資功名之時而無信任之勢則效為不見今劉侯其天材多矣又有肺腑之親而四方敵國尚多恣雎者設使因其時奮其氣功名豈遂少哉而久處未試予以是惜之他日因燕飲酒言曰吾名永年而字昌齡以為釋可也以為訓則不可幸有以易之予曰然使貴而可以永年則安有齊梁之君使富而可以永年則安有范中行之臣齊梁之貴范中行之富而忽然不聞彼可以永年者安在哉在功名而已矣天地無窮而人之生有涯夫以有涯遊無窮之中而無以自别也蠢然作盭然止而己矣雖萬物何辨焉嗟乎此智勇士捐筋力忘利害而不顧以求就功名者也故一託于義而終身安之金石象其聲丹青狀其貌簡策敘其實若是可以永年矣字子以景烈如何座客相和唱善劉侯拜且謝曰謹受教請銘之心不敢須臾忘因序其語授之公是集巻三十四

body:
  text: 公是集卷二十八宋劉敞撰七言絶句題行者店石楠無限荒山秪一家竹園蔬圃寄生涯老翁手種石楠樹三十餘年看好花翠鍾亭二首空城風雨晦如秋漠漠長江天際流故倚髙樓望行色南山不見使人愁江外羣山如畫圖輕烟殘雪入荆吳東風醉問春多少逺郭垂楊十萬株李氏池上醉中詩春塘泉脈活龍鱗宿雨花枝覆錦茵薄俗不容白眼客醉鄉自有葛天民中秋夜作淒風白露墮清秋月上江湖開客愁世事紛紛欲如髮醉醒任意判悠悠思鄉嶺絶壑參差半倚天據鞍環顧一悽然亂山不復知南北惟記長安白日邊宿麃子嶺穹廬中此嶺無水往來驛人常擔水自隨也千山雪繞帳廬寒一半冰消塞井乾憶卧衡門甘泌水可憐孤枕未曽安摸斗嶺盤峯回棧幾千層徑欲凌雲攬玉繩浪得虛名夸鄙俗古來天險絶階升狎鷗亭波光栁色交相亂野客沙禽特共閒未醉那宜徑歸去夕陽猶在杏花山黃河輕車重馬自相騰橫度長河百丈冰貝闕珠宫應浪語黃沙際海谷為陵過臨潢口號雲消歸路暖無塵試學章臺走馬身塞栁關榆莫相惱小園桃李解迎人寄張四二首城下清淮百丈深樓前明月冷鎔金何似關山望處景因人寄示隴頭吟清秋千里夢相思潁水滄浪各一涯洗耳君方避堯舜濯纓吾請學鴟夷寄聖民十月十一日方到跋馬望君秋暮時君來何後菊花期齊中故有金鈴酒猶可籬邊倒接籬汶陽有金鈴菊酒味殊勝也送蕭山和弟江上蒼山百里國鑑中明府校書郎臘梅冬笋知時節驛騎回時早寄將絶句送和弟行東臯兼過獻臣二首落日濃霞輝碧潭淮南風物似江南榜船載酒隨鳧雁物色詩懷著意探西風滿眼荻飛花楚澤秋光一半差庖鱉好期張仲友捲帆應帶海山槎渭城舉世幾人歌渭城流傳江浦是新聲栁色青青人送别可憐今古不勝情虎丘和孫可述崑閬乘沙不可攀蓬萊涉海去無還寧知勝絶神仙境近在青林紺宇間畫屏二首滔滔江湖萬千頃何為飛來入軒屏大潦不增旱不減靜聽無聲視無影六月炎蒸百慮煩舉目一見心暫閒市人悠悠那得識此意髙山流水間自西橋至紫溫載酒作樂即事呈府公四首欲暖水流初泛泛半閒人意正悠悠清觴自可輕捐日髙管無端吹暮愁淡烟蒼翠籠髙樹密竹交加隱曲堤水調向終人欲醉夕陽稍近戍樓西潛鱗畏樂勿復躍舒鴈避船爭亂飛乘興正須勤一到㑹令魚鳥見忘機主人宿望功名際下客素心江海中舟楫由來歸𫝊說滄浪元自屬漁翁雷琴三百年中天下工密移山水入號鐘世間㑹有孫枝在自是知音不可逢豫所寶琴大厯年中雷震斷到今三百年矣晚步城上寄貢甫雨過行尋舊履綦江南山色逺相隨池塘芳草新無限還引新詩入夢思雪後見山樓春寒天氣似江南閒倚髙樓酒半酣盡借前山作屏障更煩佳雪洗烟嵐送人遊蘇州莫倚春風爛漫遊姑蘇臺上特多愁傾城人逐鴟夷去惟有空江日夜流重登見山樓有感髙軒送目萬重山不盡東西千里間長嘯何由生羽翼徑排雲霧看人寰答鍾元達覔藕栽二首紅妝翠蓋出汚塗水面風吹醉欲扶自是凌波有仙種文君莫訝茂陵姝漸㸃青錢浮水面猶將素節混泥沙送君百頃風潭上莫笑元非十丈花新年雪消冰解漏青春醉眼驚看物物新已識年華似飛鳥直將身世委天均果園巷訪楊寺丞雪霽江城氣色春果園巷口靜無塵林間水上俱通馬徑入誰能問主人聞江十吳九得洛相酒戲呈二首洛城春酒碧霞光東閣遙分東觀郎陳俠應嗤伯松拙魏侯元惜次公狂衆人皆醉屈原醒天祿寥寥白髮生束縕君當游相國那能我自勝公榮朝謁武信殿三首旌旗千里自天來投策黃河飲馬回聖主醳兵方外服東巡日觀望蓬萊原廟衣冠渭北遊侍臣世世祀春秋敵馬何由向南牧萬神相與衛軒丘天下安危寄老臣幄中談笑靜邊塵丹青未備雲臺像笳管猶悲道路人微雨登城二首雨映寒空半有無重樓閒上倚城隅淺深山色髙低樹一片江南水墨圖日午風髙新雨晴殘花飛絮兩輕輕垂鞭緩轡饒閒望時復林間布穀鳴簷下簷下渠泉朝暮聲樓頭山色四時青此中故有無窮意正要悠悠醉復醒圍棋調鄰幾華髮仙翁共奕棋樵柯爛盡忘歸時洞中日月遲如此世上榮枯詎得知見召西陽池泛舟仍示雅章因成二絶希笑覽也畫舫欲隨波上下行人先似水西東翠萍卻是多情物漂泊不離芳沼中習池幾度共芳菲爛醉池頭到落暉臨去主人雖不召山公能不少依依順州馬上望古北諸山平原不盡對羣峯翠壁回環幾萬重背日映雲何所似秋江千丈碧芙蓉伯勞伯勞東去燕西歸可惜春光相見稀惟有歌聲留别恨畫梁三日更塵飛同河中府簽判劉狀元廷平訪華陰雲臺觀陳搏先生故居是日雲霧不盡見諸峯平舒道上望諸峯翠出浮雲幾萬重過客仍迷五里霧真人與致二茅龍題戚化源畫清濟貫濁河圖濁河清濟坐中分沙浪澄波兩逼真自畫壁來多少日能知清濁幾何人西樓西樓獨上不能回繞郭新花正盛開誰信不曽騎馬出春光自到眼前來興慶池送江淮陳度支是日微涼芙蕖滿地水浮空不意江湖入望中獨把一杯送歸客可憐羇思滿秋風九疑山圖蒼梧南岸碧嵯峨直上雲衢不甚多天使九峯迷萬世可憐虞舜不悲歌送智慈海上忘機是白鷗暫來非為稻梁謀乘風又作滄浪别怊悵居人浪得愁西掖聞鶯宫樹陰陰翠蓋成熏風盡日語流鶯秪應欲助歸田興故作林間舊友聲遊龍山七澤髙秋霜葉紅龍山一望夕陽中愁來乘興時時往楚老相疑是孟公孟嘉在荆州遇興輒造此山盡日乃反出城水映朱扉樹繞城午天暄煦僕姑鳴馬蹄款􅀈春泥燕自愛乘涼半日行琵琶亭江頭明月琵琶亭一曲悲歌萬古情欲識當時斷腸處只應江水是遺聲過湖城誦雋不疑傳作北闕公卿如堵牆誰持一語判興亡君知京兆人無及正用春秋侍帝旁晚步城頭雪色連雲色池面冰光亂日光泥滑應須勞杖履幽期恐後野梅芳石牌磯長江激水成飛電蒼石橫波起疾雷自覺心能仗忠信布帆無恙御風來送張嶽同年長安道側風塵裏傾蓋相逢許白頭誤在盧前已深愧莫隨時態作沈浮答劉同年寄青䭀术煎松湯并詩自無金骨凌風相心愧仙翁度世方一聽山中白雲曲已如揮手謝華陽遣思淮上秋光凝客恨城頭暮色滯斜暉獨醒未必能勝醉逺望山來可當歸楊無敵廟在古口北西流不返日滔滔隴上猶歌七尺刀慟哭應知賈誼意世人生死兩鴻毛雪中詣相國寺西風卷雪白如沙索漠空林開白花病僧迎客興不淺自啓軒窗煎越茶栁河相望不容三日行多岐無奈百長亭欲知河栁春來緑正似山松雪後青神山在鹿兒峽北林立衆峯俱到天傳聞此地有神仙名山三在蠻夷國方土之書猶信然早春野泊夀寧觀小徑連村行幾曲垂楊未緑草成蹊門前野水還如帶恐是仙源使客迷依韻奉和梅堯臣四首陰雲著地無精光細雨翳日看微茫千里江山在何處心憐社燕衝風翔而今四海雖休兵猶有防秋在戌城征婦裁衣欲寄逺時將蟻子候陰晴春草更緑春林衰長安游客未成衣淒淒計欲變寒色一夜無語看燈輝欲掃鵬翅還北溟欲引羲轡來東瀛從兹陰翳永絶滅康衢不使泥塗生春草春草綿綿不可名水邊原上亂抽榮似嫌車馬繁華處才入城門不見生寄王閣使十月十一日冀州相别十一月十一日聞過古北口憶醉離亭舞翠娥舉觴同聽渭城歌故人卻出陽關見愁問行雲奈若何興化寺花蟠桃浪占三千嵗琪樹虛傳十二城爭似此花常在眼風吹日炙四時榮古北口自古北口即奚人地皆山居谷汲耕牧其中而無城郭疑此則春秋之山戎病燕者也齊桓公束馬懸車涉辟耳之溪見登山之神取其戎菽冬蔥布于諸侯蓋近之矣口占一篇因以傳疑束馬懸車北度燕亂山重復水潺湲本羞管仲令君霸無用俞兒走馬前直舍竹下殘雪二首阿閣三階敵井幹宫牆十仞逼雲端故留殘雪侵春事欲伴孤篁老嵗寒重疊空階委玉塵蕭疏碧篠束浮筠池寒自稱孤髙節不共陽林競早春十一月十五日朝拜章武殿雪中口占呈聖民學士原廟衣冠月出游侍祠義比漢諸侯應有海神朝絳闕勿驚飛雪滿崑丘嵗暮雪中寄隱直前年季冬與隱直相㑹京師凡十餘日長安積雪深三尺窮巷相看共一樽物色嵗華還倣佛異方回首重消魂秋夜見月微風送雨江南去涼月銜雲海上來暑氣頓除秋暗入忽疑浮漢弄昭回别彥文兔園風物共追遊直自霜秋到麥秋何故臨岐猶有恨未曽攜手上商丘登新河橋詩此河受三十六陂水朝陽破霧水浮空極目江湖一望中三十六陂冰雪解魚龍鱗鬛動春風小園弱栁低花俱有意淺沙深竹總無塵從今不恨交遊絶還倚東風作主人雪霽行小園力掃牆根通野徑少留林下訪初春魂翻眼眩看梅杏幾處攀條輒誤人正月二日雪後到小園新年已覺有春光宿雪無多映夕陽竹箭晴來依舊碧栁條暖去不勝黃納涼明教臺呈太守臺下井泉冰冷滑城隅川色劒光鋩多慚簿領相寬假全得南風一日涼聞張隱直率范十九佑之遊邊寄之三首莫怪黃河來積石又疑弱水隔崑崙若嫌古記難全信他日君歸與細言未甘海上乘桴去猶託隆中竟日眠努力英雄樹功業鄙夫洗耳太平年紅旗白羽尚紛紛渭北洮河十萬軍厯覽山川窮勝負朝廷肯棄奉春君說髙祖料胸奴者題淨嚴觀春波亭滿目烟蕪蘸緑漪江淹遺恨楚江湄仁人四海皆兄弟何必東風悵别離初雪冥冥濃雪半空黑烈烈北風吹日回海水翻從九天落龍沙卻渡五湖來野人寄枸杞青蒿爛蒸香薺白魚肥碎㸃青蒿涼餅滑宿酒初消春睡起細履幽畦掇芳辣答杜九重過東門船戲作共醉江南日落春悲歌一曲思離人卻尋陳迹愁先亂況復青青栁色新牡丹三首刻成紅玉萬枝香排出華燈四照光聞道閬風有琪樹可能一二敵芬芳宫女妝花不必勻淺紅深紫自爭新已能含笑驚愁眼枉是無言對暮春密密芳華亂夕暉碧油幕下覺春遲何時謝絶人間事看盡東風爛漫時題慧禮師雙樹院雙樹婆娑三百年江南秀色上參天不知昔日誰來種正為道人開法緣慧禮初露止此樹下講經論四衆之今成屋五十餘間佛事甚盛也揚州聞歌二首淮南舊有于遮舞隋俗今傳水調聲白雪陽春長寡和著書愁絶郢中生半夜暖風吹朔雪東城南陌曉來春郊光野氣望不極栁意梅香愁向人遍閲齊房題名獨不見永叔戲作七言十二樓居五碧城祠官多識漢名卿蓬萊仙客飛升早不向丹臺稍刻名自東門泛舟至竹西亭登崑丘入䝉谷戲題二首泛泛扁舟春水平緣蘋白芷欲齊生王孫自喜山中客莫唱淮南招隱聲萬竿蒼翠隔晴川寂寞蕪城三百年此地重聞歌吹發揚州風物故依然養雞耆舊漂零漢汝南長鳴獨與古無慙蕭蕭風雨思君子欲倚空窗聽爾談受詔俟代先遣家人南歸發後一日寄內七言年長漸難禁逺别宵長初信有相思天寒展轉不得寐一夜風吹庭樹枝一百五多葉白牡丹答陳度支二首玉色天香無與儔猝風暴雨判多愁君知大半春將過初識人間第一流嵩少雨晴寒食時年年驛使按瑤墀塵埃落莫長安陌笑倚春風不自知安福院二首溪流婉轉樹䝉蘢復閣虛廊小徑通下馬解鞍一長嘯便疑身已出塵中三十六陂秋水來龍蛇奔走起風雷老僧與置南軒地㑹是憑欄心目開此院在鄭門外三十六陂水出其下草樹幽邃有溪山之賞豫勸寺僧鑿兩牆為軒可以盡觀覽之勝也題新開花呈永叔野客賞春憐物華不將手觴新開花且留林下引狂蝶看舞東風傾緑霞東山刺史獨孤及所游獨孤刺史提千騎飛蓋歡游向此中髙岸如今已成谷還如峴首憶羊公五色薔薇春來百花次第發紅白無數競芳菲解向人間占五色風流不盡是薔薇黃薔薇緑葉黃花相映深水邊臺畔結浮陰何人解賞傾城態一笑春風與萬金嶰林已看秀色動髙林㑹見翛翛滿翠岑不學渭川千畝富欲聞嶰谷鳳凰音杜鶻花嫩紅輕紫仙姿貴合是山中寂寞開九陌風塵肯相顧可憐空使下山來公是集卷二十八

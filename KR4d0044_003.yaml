body:
  text: 公是集卷三宋劉敞撰騷逐伯强文并序寶元二年豫羇旅淮南醫來言曰今兹歲多疾疫豫因作文以逐伯强伯强厲也能為疫者故逐之皇皇上天兮浩浩后土厥生孔繁兮其施甚溥陶陶仲夏兮草木蕃廡鳥獸孳息兮我民樂胥我民孔靈兮上帝是仁天子孔聖兮百工日新上無粃政兮下無悖人鄰里其集兮樂哉欣欣伯强何為兮孰畀以政反世五福兮持極以令我民不怡兮既喪其盛白黑眩瞀兮孰察其正謂壽反天兮謂康反病仁義無益兮苟且為幸嗟爾子强兮其獨何心絶世和氣兮俾民不任上天孔神兮大德曰生天不可長罔兮民不可久侵天誅誠加兮靡所避雷公驅兮風伯逝嗟爾子强兮何所詣南有蠻兮為寇為逋西羌戎兮恃艱自虞天子孔仁兮靡焉畢屠子强往兮代天伐誅嗟中國兮不可久留子不去兮顛倒思豫屈原嘏辭并序梅聖俞在江南作文祝于屈原譏原好嘏辭民習尚之因以鬭傷溺死一歲不為輒降疾殃失愛民之道其意誠善也然競渡非屈原意民言不競渡則歲輒惡者訛也故為原作嘏辭以報祝明聖俞禁競渡得神意維時仲夏吉日維午神歆既祠錫辭以嘏曰朕之初生皇揆豫度嘉朕以名終身是守抑豈不淑不幸逢遇離愍被憂天不可訴宗國為墟寧敢自賊惟朕忍生豈不永年悁悁荆人是拯是憐赴水蹈波歲不廢㫋既招朕魂巫祝昔先豈朕是私將德是傳淪胥及溺初亦不悛其後風靡民益輕死匪朕之心是豈為義婦弔其夫母傷其子人訊其端指豫以詈豫亦念之其本有自昔朕婞直不為衆下世豫尚之謂豫好怒昔朕不容自投于江世豫尚之謂豫棄躬既習而鬭既逺益謬被朕僞名汓朕以咎朕生不時亂世是遘民之秉彞嘉是直道從仁于井朕亦不取汝禁其俗幸懷朕忠好競以誣一何不聰我實鬼神民焉是主其祀其禱豫之所厚豫懼天明焉事戲豫豫憫橫流焉事競渡豫懷堯舜焉事狎侮汝惟賢人曾不豫怒徇俗雷同譏豫以好履常徇直切諫盡節人神所扶未必皆福去邪即正何以有罰曾非豫懷可禁其僞毋使佞臣指豫為戒錫爾多福畀爾龎眉使爾忠言于君畢宜寄胡二因甫我思友人兮在江之臯去我無所兮遠哉遙遙世豈無美士兮莫慰我勞願為白鶴兮從之逍遙河之水并序自河決商胡八年于兹矣用事者議塞之與勿塞至今未決而河頗為害豫至河北問河之曲折作河之水二章以告病河之水兮一直而一曲嗟湯湯兮安所屬河之水兮一濁而一清嗟湯湯兮何時平彼山詩郡縣多曠土往往徑三四十里無一人耕者問之曰逃矣或十年或七八年或五六年或四三年嗚呼百姓非樂去墳墓違君長也凡有不得已朝廷詔書欲招徠之甚赦其罪戾捐其租粟濟其不及恩至深矣猶莫有至者異乎豫所聞作彼山之詩道所以不來之意彼山之阻兮虎豹兟兟我旋而歸兮虎來即人彼山之澳兮雄虺攸伏我息而作兮虺將起陸深不可游兮髙不可飛我後而悔兮安庸歸武溪深武溪之水兮日夜而東流淺不可厲兮深不可游武溪之山兮髙下而相乘卑不可越兮危不可憑母水于憾兮毋山于仇庚武溪兮曷云其尤懷歸詩淮水悠悠兮去我無舟匪我無舟兮此焉優游淮水洋洋兮去我無梁匪淮無梁兮此焉翺翔淮水東注兮惟禹之績古人不可及兮吾獨淹留其何得四言古詩魏京詩并序上二十年始建北京以章明先帝巡狩之德以達孝思于下于是野之處士或相與議曰蓋文王都豐武王都鎬之間不能數百里文武之位不過侯伯而詩乃以聖人之德天子之事歌之有如聖朝德位相侔述作相繼而無遹駿蒸哉之詩此乃處士之罪非公卿之過也乃考聲撰辭以繼大雅垂之無窮其文曰皇作大都大都雄雄奄定北國四方來同皇曰卿士在昔聖考祗遹文武維慈幼老天監在上既有明德乃命于下罔有不服匪允命之亦章慶之匪允服之亦保育之時維玁狁侮豫之疆靡度靡虞跳呼以狂業業蒸黎載震載驚侵魏及澶羣心不寧帝奮厥武百萬其士匪怒以棘于三十里如虎如貔如霆如雷靡有遠邇天子其來天子來止士增其喜孰偷其生以不奮興驅之渾渾攘之賁賁靡有輈張殱厥鯨鯤或獻其寶或請其命帝振于旅惟時既定屹屹魏土山河之固匪山河則固惟上帝伊怒既閟爾弓既櫜爾矛玁狁臣此四方是休皇曰卿士聖考之德允于孝思孝思惟則爾視京魏以作我都以赫厥靈俾後勿踰皇曰卿士惟帝時功時亦惟人惟寇萊公爾慎爾止弼豫于治期爾前人用迪爾事皇曰卿士惟帝作武垂是萬年莫敢豫侮泰山之封后土之禪豫監若兹惟天是眷翼翼之土天子國之穆穆原廟聖人則之孰為强暴敢不來覲俾怛于威于忠是訓顯顯天子孝德自躬率是休烈覃之北戎河水東注昭哉禹績時萬斯年天子之德古怨詩鴻鴈飛矣雍雍其族孰是人斯惸惸其獨鴻鴈飛矣或羣或伍孰是人斯惸惸其處天兮地兮戴且履兮孰是人斯莫我視兮日兮月兮出兮沒兮孰是人斯遠我忽兮雜詩效阮步兵浮雲泱鬱逮天未雨習習和風長我稷黍乾道變化羣龍以序元首永康股肱是輔其輔惟何惟伊及吕其康惟何惟堯及禹我食既豐我衣惟楚無有後艱既歌且舞我徂何往于彼淮濱俯玩其流清波磷磷扶搖起鷴四海揚塵孰能髙蹈獨潔其身衆人惑惑賢者葆真獨寐寤歌忘我賤貧四皓歌四皓之意傷秦之虐而劉項之暴又甚故往而不反也漢已平天下又恥髙祖侮豫故云爾與汝攜手南山之阿富貴多憂孰知其他大風橫厲江海蕩波嗟汝鱗介傷如之何髙巖有薇深谷有芝人生實難委曲何為閔雨詩并狀臣伏見春首以來天久不雨厯官李用晦治大衍軌革太醫趙從古治黃帝六氣咸以謂風旱歲惡而然陛下焦心勞意側躬修德撤蕃樂損膳議獄宥過以迎導善氣爰及言事得罪者唐介杜樞之徒復特見甄序小大之臣莫不欣然人情悅則天氣和矣乃三月已已日入而雨至于庚午詩不云乎益之以霡霂既優既渥既霑既足生我百榖以此見我聖人之德與天相符言出而物應行發而神助雖水旱之占有常數者猶不能違之況其眇者乎竊觀詩書所載盛德之君至誠動天之速未有及陛下者也臣不勝鼓舞之至謹撰閔雨詩一首十三章章六句投進以聞干冒天威臣無任云云堪輿絪緼一晦一明或沈而毁或亢而暘自古已然世習為常民生冥冥靡究靡知其幸而吉不幸而災猖狂妄行惟所遇之天命降監在我元聖兼覆廣裕四方既定惟民之恤無所疵病伊年暮春旱久不雨人曰時哉厯有常數禹湯之賢莫能弗遇帝獨喟息是豈足言化育萬物若容以埏患在誠薄不能動天退而齊心淵默以居鐘鼓不設宴游不娛左右肅然一懷瞿瞿疏獄省刑與物更始內恕孔悲引咎在已爰及四海愚智咸喜追悟讜直褒進淹滯聲色無忤式序在位嬖習權近懾威屏氣已已乃雨若有鬼神凄凄其風淹淹其雲自東徂西罄無不均匪震匪拔匪溢匪泄生我百榖區萌畢達以享以食小大胥悅天子之德視雨之施肇自京師達于四裔無有蠻貊孚我君惠天子之政視雨之時養老長幼速哉熙熙更化易俗而民不知天子之慶視雨之積自天降康時萬時億眉壽無疆以靖四國公是集卷三

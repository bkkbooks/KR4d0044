body:
  text: 公是集巻十五宋劉敞撰五言古詩效陶潛體出門逢一士抱書亦南山問其何為爾欲語輒復歎少小貴詩書志業覬孔顔爾來三十載鬢髪倐已斑唐虞不可待世譽亦恥干寧赴巖谷老行行未遽還其言乃可感使我再凄然人生歸有命窮逹何足言勸爾飲此酒唐虞在其間懶詩分表難强營俗中彌不堪始覺懶亦真功名焉可貪婆婆玩流光幽寂信所諳束帶愁逢迎燕處倦交談碌碌史隱間將為兹世慚菖蒲香清自足愛味厚非所倫如何缺缺徒反以花為真花竒不可見舉世皆忌辛誰將擢仙骨願比芝苖珍登薦福寺山亭時事如不聞煩襟尚鬰怫高亭一何壯俾我遺外物是時夏景初竹樹雨飄拂燕雀飛簷楹喧爭互强倔世紛類如此小大何得失始知絶羣動方外真有佛此地可終隱不惟謝炎鬱逍遥鞭其後豈恨久蟠屈九曲池廣陵春欲歸九曲池先暖積雪未全消流波已全滿宫城落喬木岸竹排纖簳古事無足悲登臨苦日短和永叔夜坐鼓琴二首衆人于五音醜正不醜隨所以匣中琴寂寂少人知淳和太平風簡淡邃古時得意亦忘言居然見無為非公藴真樂此道誰復期知音古亦少况乃今人乎至和動殊類此則今世無舜韶舞百獸事可觀于書但非耳目接便自疑其虚誰謂今之人反不如獸歟大音蓋希聲聾俗或萬殊中孚有不化嗟嗟乎豚魚苦寒行驅馬涉長磧千里徑無草天寒日光淡積雪常杲杲勁風裂肌膚狐狢甚魯縞况我被甲鎧寢遲起常早崔嵬陟高山日落尚逺道人生各有命豈憚事遐討飲冰傷心骨重研如巨棗義深自最勵身賤寧要好親戚何可逄功名未自保少年慕壯健我獨貴疎老送霍邱謝寺丞吾聞歐公客必皆當世賢衆中一見子始信斯言然綵衣得意歸笑語春風前輕賫尚方履去影裊翩翩百里不足仕桂枝淹華年故須多種秫爛醉揮鳴絃答黄寺丞濠梁雜詠閉門委餘事久矣卧幽寂忽枉臨濠篇如逮問魚客山川盡寫倣人物多在昔形倨遊自逺善行固無迹吁嗟相知晚起予遽多益乃悟文字工足兼造化力熒煌淮夷珠磊落荆山璧他人竭澤求吾子希世得禽微戒輕彈路暗慎虛擲如何忽在此詠歎生感激蠙珠荆山濠梁事實黄所賦也因以為興答黄寺丞九月十三日見寄兹年見二毛秋至獨多悲况乃霜露繁悟彼歳月馳衡門靜無轍幽徑荒不治眷眷武夷翁傾蓋成舊知每枉林下步笑言輒移時目擊良已久鳯歌復見詒諒君徜徉意當以振其衰生槐苒苒庭下槐蒼蒼山中檜臭味久矣殊榮枯莫相待胡為寓形生曾不異風概擢榦初無根交隂忽成籟死生詣膠漆㓜壯姿姿態本同非不佳末異終恐害吾意造化巧淫樂為狡獪玩此三公才比之女蘿輩不然世俗薄苟合耻剛介妄彼特立姿樂附柔弱類誰能極物理且以嘲大塊陶冶如吾言庸庸亦何怪櫻桃東風吹陳根萬木含芳華客愁獨不改浩蕩津無涯朝光破浮隱暄鳥聲交加櫻桃此時盛滿樹紛彤霞當户仍拂簾參差自相遮日高卧未起顧見驚且嗟此復幾日繁譬如空中花非無一樽酒玩之到景斜多慮使意衰悵然奈爾何摘櫻桃此花前日時素雪揺東風已驚變濃緑忽更垂繁紅俛仰物三換歳華終無窮因笑樹下人未悟成老翁磊落火齊珠參差珊瑚叢贈逺限道路成蹊縱兒童春隂朝日送風光宿雲濃不巻微隂助惆悵旅思増婉婉新花秀且含芳草緑更逺樂賞及融怡春暉未應晚除草二首昔歳有壯志恥事一室中獨願埽萬里指麾走羣雄少壯意更衰棄書學老農羈旅無田園飄如野間蓬徘徊陳蔡間呰窳見楚風託足不期廣所存一畝宫秋草日蕪没荷鋤事兒童歎息念變化古人頗固窮中庭不踰畝百草何荒蕪緑葉間紫莖薫蕕互相渝所憐薄筋力豈愛不埽除賢者曾蒿萊吾徒亦何如公侵藩垣出蔓也自難圖下牀值蛇蟒依隱行鬱紆至使蚊蚋多不堪匝肌膚古人遺我言芳蘭戒必鋤努力蔑小惠作詩感躊躇早發襄城之龍山呈曼叔鳥啼齋前樹促駕吾當西朝從良友别夕赴幽人期方以㑹合喜敢曰道路疲予戇昧時利百事棄不為惟有好賢心未媿緇衣詩敔來速嘗新酒徒咢無與同徒歌無與和徒行莫之友徒語無所破慷慨一無徒始覺從君過欣聞酒新釀堂有佳客座歡從尊罍罄醉聽冠巾墮庶可效名士因君讀楚些日醉犀首從横時無事猶飲酒我生太平際日醉亦何有太平多賢才臺閣固其藪濟世圖功名汲汲常恐後我寧樂自放甘與物俱朽顧惟人間迹澶漫獨已久智謀乏施設筋力倦奔走幸為朝廷知而免職亊守人當自量度快意安所受何能强繩檢希世視自負晶熒流霞波泔淡白玉斗歡來無虚席嘲笑命賓友殘冬雖餘幾自足數開口浩歌迎春風安用獨醒叟寒蘆雖居江上城不識江邊路故移蘆葦叢粗慰江湖趣翠華侵硯席疎影入牖户歳寒待爾共好尚與時迕勿以比蒹葭蒼蒼瘁白露和兩府諸公馬上作富貴信多士况乃主恩深京洛多風塵冠葢自成隂片言代拱璧一顧溢千金嗟我固貧賤處俗謬浮沈咄咄人間世俯仰媿山林和永叔十九韻送魏廣信陵貴公子仁義不掛口猶有三千客名聲極高厚而况賢者門四方所奔走豈無青雲士磊落照前後我雖非其人慕用意殊久差池混出處百望乖一隅羈旅陳蔡間忙如喪家狗擔簦始自致傾葢許白首中堂陳詩書高㑹置樽酒豈惟聽餘論復喜識賓友魏侯希世珍頗為平生舊他時恨契濶並生喜邂逅危冠切浮雲長劔掛南斗同志此莫逆孤遊信無負切磋變新巧綵繪飾餘醜自謂當窮年如何復分手士生得所師文學致不朽吾衰莫自力子壯諒何有當取天下名還為生人壽遊龍山孟公乗興出必造龍山頭回望黙不言夕陽始還輈千年雖悠逺此意故風流咄嗟無知者寂寞空荆州霜風蕭騷晚楚水荒凉愁安得欵叚馬往來時獨遊放鸇上天賦爾才若不受羈紲失身偶見獲羞與家禽列秋風半夜起鴻鵠兩飄瞥物生各自適聽爾歸寥泬白雲入雙眸尺地肯自屑慎勿逐鷃爵缺原本二字不足絶不過倉廪中朋黨為偷竊鴂鶗最堪憎擅使芳草歇勉力霜霰期方為鳥中傑嗚蟬芳草久已歇星火奄向中日暮𤣥鳴蟬歳華坐將空輕舉塵壤外逍遥神仙同豈伊感時節悲嘯臨長風夕露鮮餘潤炎颷成藴隆清虚浪自足高餓亦云窮和聖俞十二韻處世誠碌碌白髪生滿頭所以不自慚數從長者遊醉翁名世者事業晞孔周獨立千歳外邈然已難儔韓范青雲姿奮飛起西州徘徊霄漢間下視輕蜩鳩詩老最前輩名聲三十秋篇章被海表豈獨魯與鄒今我親見之執鞭乃所求何况登其堂舉觴預獻酬清談破羣疑嘲笑寛百憂以此捐歳月吾生同悠悠宿緑溪雲昬江水闊兩淮不可測山邱望亦迷馬牛豈易識高㠶乗長風俄傾屢欹仄未知所趣向稍稍萬㝢黑近津見蘆葦其外水正白操舟投其間宿鳥俱闢易水深不可纜䕺梗以為力蚊蚋秋尚繁不眠坐通夕中宵風逾厲潮水相蕩擊安得似人者謦欬在我側天明啓牕户願見白日色莽蒼暘谷間竟為霧雨隔追觀宵征處波惡生悸惕絶糧非陳蔡從者亦悽惻如意臺冷冷清池水汎汎不繫舟興來可獨往興盡自難留留無淹回責往無進取憂世人共擾擾真賞空悠悠章華楚人困姑蘇麋鹿遊君看如意臺乃知賢者謀閔雨長夏炎氣隆高田劇焚燒惜哉淮海卑無力能沃焦起顧郊野間離離悉苞蕭日夕多狂風飛塵蔽招揺誰能起蛟龍雷雨蘇宿苖眇然坐自想幽意增煩歊和過騏驥院觀馬因飲李氏夜歸復與江謝㑹于敝居子真王濟徒愛馬有馬癖毎嫌駑駘衆未覩千里格朅來飛龍廐一一數白黑始驚麒麟骨秀出無與敵旗旄亂雲霞鼓吹喧霹靂從容看回旋感激私歎息此當逝崑崙上與天無極奈何局軒陛終歳老羈靮主人貴公子埽榻多命客聊欲寛其意無為稍戚戚珍羞雜水陸清酒漾金碧嘲笑心目開留連日已夕歸來興不盡駐馬問所適知我方㑹友投鞭遽登席貧家竟何如脯醢乏餘力歌舞復無素兒童强敦逼多君平生懷不與貧富隔歡來亦酩酊俛仰愧三益早行雨息風亦止落月猶在天舟人相呼起稍出蘆葦間暗中各紛拏四聽聲正讙開户視所從大江自漫漫衆星若連珠纍纍浮深淵津涯杳難知勢與天地寛俯見舟楫㣲萬牛一毛然虎豹嘷岸傍蛟龍浮其涎兢兢抱危懼忽忽忘食眠人生誠多憂况乃行路難重陽日得景烈送酒歳晚見黄菊悲秋空復情故人豈知我朋酒適平生舉杯逺相屬目盡歸鴻聲醉眠東籬下此亦淵明情和焦生石字韻我惟一逢掖入為二千石聲迹不相同禮貎謂誰敵既許游藩籬又喜升宴席酌酒澆磥魁賦詩聽警策朋從常苦少佳節古所惜既醉忘形骸笑言俱莫逆使公貴且壽富有貧賤客寄隱直㑹短别日長愁多歡情少古來人間世于道同擾擾我髪日已蒼我顔日已槁離憂固如此四十未應老誰能跨浮雲相與成莽𦕈吾子心莫逆庶當悟意表旦日城東渡汝水與鄰幾飲别歸作五言寄之繁霜墮衆木朝光破初寒游子侵旦發隱忍行旅艱走馬東郊門别愁莽無端川長不可厲泛舟觸波瀾相及墟落逺解驂請盤桓班荆道路側酌酒還據鞍殊鄉閲人多浮俗見子難結交形骸外生計出處間江湖天一涯冰雪歳欲䦨昔賢往不反子陵與伯鸞東游信不惡相望終永歎寄深甫君章爛漫十日飲未快逺别情醉魂幾時醒直見潁水清前歡絶莫尋離念紛更盈車騎暫休汝賞晤得時英披襟兩相照話言僕屢更論史既衮衮説經亦鏗鏗一觴亦一詠樂事真相并㑹合固難常我獨嗟南行回首念前好感物非嚶鳴明發成寤歌勉勉趣遥程寄裴呉江王喬一雙鳧乃是尚方履誤逐閶闔風飄然太湖水湖水連天涯茫茫湛清輝秋來興不盡似欲都忘歸玉疊鱠如雪碧壺酒若澠醉輒問左右何如張季鷹君乃蓬邱人神仙有名籍不應自放浪久為塵中客我頃卧廣陵西風見白髪八月觀海濤壯心謝超越因欲解印綬從君五湖遊功名非所及為具鴟夷舟寄贈獻臣龍興幽泉中溶雲自潛飛氣還大淵下灰籥先察㣲氣應不必邇至誠神與歸嗟予接休徳志合無纖譏譬諸死灰然安事旦夕違胡為久相越書問月增稀五言寄江丈鄰幾時往尉氏未還終日相與居豈知相得懽出門一分袂乃覺攜手難西風過浮雲急雨生早寒清秋令人悲兹遊何當還歳月游將晚念君尚加餐寄深甫往卜潁上居徒愛潁上人巢由節並世管鮑必相親而我與夫子阡陌東西鄰正可白首遊豈計中道分人生莫自必一别俄六春入踐西掖垣出乗兩朱輪佐時乏明畧來往徒紛紛上愧洗耳翁下慙圖霸臣念欲投劾去結茅復從君攄我宿昔意寄聲謝水濵寄楊忱明叔君有湖海氣沆碭凌斗牛逺持一巻書濯我千歳憂大音不衆合至寳非暗投感激移人心汍瀾使涕流俗譏陳元龍世乏劉豫州安得排羣兒卧君百尺樓雨中寄徐二北風吹飛雨中夏變早寒浮雲滿天地坎井成波瀾秋興集我懐旅愁散無端陽光旦自匿后土何得乾嗟君貧非病所寄瓢與簞陋巷無雜賔啇歌激清彈甚願裹薄飯相從饜朝餐亦思造暘谷相與晞朝冠力弱泥潦深乃知行路難論交張陳父子游乃為白刃仇蕭曺平生歡亦作眦讎交合名利間安得無後憂商山有四人衰老俱白首但食巖谷芝終身不相尤未必能獨賢苟云無他求古稱結交難成敗視此由作詩告同心市義誠足羞秋霽醼北軒北軒屬秋霽曉見風葉零置觴命賓友環坐飛渌醽遇適輒獻笑放言豁中扃兀然不省醉起見天上星勉强相勸引我謡子宜聽幸無兵農憂稔歳䝉休寧讀書業文外惟有醉不醒世途若波濤富貴乃浮萍置之無可稱視彼鴻㝠㝠送楊十七祕丞知瀛州河間洪濤翻金堤冀州變泥塗哀哉百萬室所憂半為魚流穴接道路呻吟交里閭若無慈仁長安使疲疹蘇子在新密時治聲溢西都大水無麥禾閔然若疾痛不忍使者求建言解其粗邦人喜更生老㓜歡以呼繩墨制奸吏弦歌訓諸儒復新卓侯廟慕用巳不誣今者河朔行豈其易然乎彼將譽所試况子材有餘但恨治者小百里為區區割雞用牛刀孔聖所歎吁賢者必愛民民活心乃愉㓜學長行之固為聖人徒位下非所恤勉哉寧君軀送梁山軍徐祕丞鷾鴯一何智俯仰人間遊落實不給視去之畏少留高賢在天下富貴如浮雲得失不概懐損益寧所憂若人古巳亡今復得徐侯詞科二十載朝籍方見收四海厭名聲廟堂多軰儔後時不自失觀化君悠悠入辭未央廷逺牧荒山陬去矣成獨往豈嫌時俗羞東鄰花卜居非卜鄰適幸鄰花發照曜東軒東暄然二三月露香送清吹晨艷開繁雪稚子戲牆根鳴鷄出林樾我來奔羈旅疑及武陵歇欲訪竟無從空觀對寥寂為人懵俗事鄰里多謝絶獨爾可相親芬芳未應滅公是集巻十五

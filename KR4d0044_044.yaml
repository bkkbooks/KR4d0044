body:
  text: 公是集卷四十四宋劉敞撰書啓與沈邱仇香祕校啓右某頃賴英鑒共登賢書私喜邂逅之逢矧瞻顒昂之表遽驚判别驟荷記存緬佩玉音祗攪心府伏承履肅霜之序味粹道之腴茀祿用寧啓處自若尚賖款會益冀保和馳企之悰數陳罔究與判府相公啓右某屬因道道幸得趨風幕府容賓里人授館識恩顧之加厚愧微賤之不遺逮兹啓行假以後乘且復貶損手澤稠重誨言雖小雅之序綿蠻亦古人之稱樂易曾靡遠過曷能弭忘伏惟某官純粹含章直方鍾美上求至治之術下察當世之宜裁成大猷鋪繹元化顧均勞而居外暫握節以陪京周公處東還踐赤舄召伯分陜入為冢卿矧在稽古之朝方增迓衡之望聳聞僉議大慰輿詹敢冀益慎寢興少符禱頌與判府相公啓右某伏以景近極而就長律奏陽而復本候雲備嵗布始經邦恭惟某官德茂帝臣義均國體正氣詡物備四時之和盛功格天宜萬福之報及羣隂之滋損諧衆望之僉俞光華本朝陶冶元化某素依教育密庇恩輝阻慶下塵馳精重戟與判府相公啓右某託于一官邈若千里雖復蒙福潤之沾洽偃德風之清泠罔能奮飛祗益固陋竊惟撫寧黎俗翕受祺祥恭以某官股肱中朝蕃屏方面名澤純粹功實輝光上有同心之歡下多注意之願豈宜淹久京輔徘徊衮衣跂聞瑞節之還大慰巖石之望敢冀仰為宗祏俯和寢興與判府相公啓右某宿官甚賤偃德素深譬猶處鈞範之和漬江海之潤日以蒙益忽不自知又逼簡書之繁重稽竿牘之問豈意假借光寵勤渠誨言藏以為榮服之無隕伏惟某官晞德聖域稟符元精蓋上天所以保祐國家而聖君有以康乂民物功著廊廟澤遺昆黎讓而作藩靜以鎮俗雖齊侯賜履王室是毗抑周公處東人望猶觖側慶玉堂之册復還金鼎之司敢冀上為敷求益加保攝與判府相公啓右某伏審某官肅奉制書臨撫近鎮伏惟慶慰竊以堯命四嶽外總諸侯周逮三公出倡九牧蓋社稷之衛重而股肱之寄深恭以某官德度昭明器宇淵博固嘗歌九功之美贊萬務之微均逸彌年注意在上仍徘徊于方面益宣布于善經南山巖巖猶觖乎士望華舄几几方兆乎公歸某密附慶隂阻修禮賀瞻望台屏不任欣抃之至與判府相公啓右某遊于陶鈞之和漸于江漢之潤蒙德甚厚依仁已深未嘗自通門闌望見風采邈若數舍忽如異方伏惟蹈中和之精膺元吉之報恭以某官翼亮淳治弼成茂勳格于上天簡在明主以謂負濟民之術者不宜虛富民之封立長世之業者不宜觖當世之望必委政柄大為孚先欽聞疇咨跂俟册命敢冀上為宗祏倍寧寢興上致政少保啓右某暌遠門牆差池嵗月顧轅下之局促蹈海濱之阻幽竿牘頗疏形影相愧伏惟頤神浩素綏履康寧恭以某官邁德濟時建功扶世躋蒼生于既富從赤松以自居明哲保身進退中道振髙節于頽俗有大庇于斯民蓋周公明農宜加金舄之禮魯侯俾夀必有兒齒之祥某早辱重知再為屬吏坐遠熒煌之照尤深跂戀之懷敢冀仰順時和俯凝福祐與通判國博啓右某祗奉詔函來臨治所屬館舍之初定加簿書之易迷曠于置郵固以生愧遽捧寄聲之問粗寬引領之思伏承晏處自如吉祥萃止顧微官之見縛卜髙會其未涯仰冀保和少紓馳想與鄰州通判啓右某肅膺朝命分二藩條愧治幹之不優欣提封之相接伏惟某官識精以敏器閎而深固為羣吏之師矧最諸侯之選河海均潤誠有望于餘波爵里自通尚無從于良覿敢希善嗇庸副傾瞻與潁州知府少卿啓右某伏惟某官英氣弸中德符灼外膺帝衷之深簡蹈玉燭之至和順履三微翕寧百祿某久依餘潤阻慶髙閎馳望清塵罔勝欣預與運使太博啓右某伏審循覽屬封言還計府跋涉之遠炎涼既遷惟偃息乎至和固綏凝乎多福某恪居賤局仰庇洪庥曾不獲履幕下之清塵竊坐隅之餘論感逾秋實搖若風旍伏冀上念簡照之隆倍精養氣之術又右某伏審某官肅分威節出建漕臺伏惟慶慰恭以十二牧之分上沿虞氏六百石之拜近法漢朝必皆識度深沈問望英特矧屬昌旦尤難得人竊惟某官智析秋毫明極水監經國之具足以垂將來富民之謀方且寬當世欽若慎簡總兹利權列城聳觀下吏偃伏某猥以無狀幸而忝員尚依樂易之風庶逃遲鈍之責阻修趨見但劇傾瞻敢冀嗇神少符引領與運使啓右某伏以流光徂暑戒三務于豳詩涼風告寒協上官于神瞽恭惟某官將明盛德宣布善經政優優而洽聞祥止止而來萃某恪居有局走見無從伏冀順蹈至和不凝多祐與運使度支啓右某啓執别未幾懷賢實深良由相照之意多自使仰髙之誠盡遽煩流問益愧撝謙兼審跋涉修塗按循屬部吏民瞻德固已澄清戎敵憺威遂皆讋服方奏膚功之狀亟升上笏之勞更冀節宣用寬企佇與兩轉運啓右某幸沿使檄得省親闈祗畏簡書亟還官局荷仁恩之錫類欣德宇之庇身延仰賓閎增搖心旆伏惟布宣詔指翕受春祺竊以蹈絶人之資振希世之略所到皆治好謀有成國器卓然士論咸在必將躋深嚴之地書尤異之勳鋪張嘉謨攄發妙藴伏希上為簡照俯凝粹和與京東兩轉運啓右某啓比緣親嫌外領藩守三換嵗籥再更使符未見惠民之稱而當進秩之寵此蓋某官陽秋素及風義相先飾短為長樂善無厭使迂疏之質濫蕃衍之恩矧焉依外臺自力方面仰止德望庶逃嘖言欣聳并深敷述寧喻上大尉相公啓右某猥以冗瑣之材叨當刺舉之任亟承詔旨行視蠻陬屢有奔命之勤久疏奏記之禮內惟懦節素辱重知既未有以報恩復無緣以進面跂瞻門下踧踖眉間伏惟某官寅亮國經緝熙帝載及功成而自引綏眉夀以歸居昔之折衝兵戎或不出樽俎之表偃息里第亦大建藩垣之威又況盛德絶倫遠猷蓋世畫一之規素著可久之業甚修朝野具瞻神人致喜勾芒賜秦穆之夀豈止九齡燕伯胙成周之功必逾百嵗仰希自重下副禱祈上樞密大尉啓右某伏審光被朝僉寵専武柄伏惟慶慰竊以樞機宥密之地帷幄靖淵之謀外張皇于六師內弼成于萬務化參維斗爵列上公昔難其人今覯斯美伏惟某官體純粹之德蹈中庸之方練達前修經緯當世治世之效甫就于升平華國之光夙彰于無外然而權季未正功次或差主上所以簡衷士類所以引領果膺徽命以豁具瞻俾夫牧馬絶于幕南竒兵成于堂上是為盛德實曰烈光某辱顧眄之素深荷陶甄而期久徇衆增喜望風馳懷載笑載言倍百常品上太尉相公啓右某近馳柔幅幸叨侍鈴何兹毣毣之誠遽辱諄諄之誨陳公尺牘傳以榮家魯史一言寵于華衮仰軒墉而尚阻銘肺腑而不忘恭以某官國器淵深天材特達以康濟為已任用忠肅合世資協德股肱折衝帷幄訏謨底績既指期而太平成功不居遂偃藩而夾輔昔周以二伯倡九牧堯命四嶽統諸候古今之典靡殊中外之寄兼重然而鴻飛遵渚宜無信處之期帝曰奮庸方盡迓衡之望敢冀上為宗祏精調寢興賀上夏太尉啓右某竊覩邸報伏審上樞太尉寵被帝俞入専兵柄伏惟慶慰恭以某官元精鍾粹迪哲秉彛經緯之氣甚髙王霸之略獨茂訏謨萬務則庶績熙成訓齊六師則遠戎震蕩功髙往牒德簡睿衷惟兹宥密之幾實宜英傑之用折衝帷幄成算廟堂上有同心之歡下增偃草之望休期所屬有衆所瞻某忝效一麾緬賖上府雖罄得賢之頌尚稽進賀之儀延仰符階再深踴躍知永興軍謝兩府啓雍州上腴見稱前史秦地四塞實雄諸侯至于人物車甲之饒風聲謡俗之盛擇守未易得人為難豈有抱空疏之姿守朴陋之學材不洎衆智非過庸擢從講闈假以威節兼四千石之重連數十城之封自視缺然曷以稱此此蓋伏遇某官専陶鈞之化隆作廈之功至和平分羣力並用不愛美錦曲從庇身之求申錫介圭略比元侯之舊蓋觀國者以處遠為陋事君者以居中為榮揆能苟微冒寵欣過固當勵斷斷之節立優優之風庶幾所長尚有云補下塞讒慝之口上答甄鎔之私鄆州謝兩府啓右某啓四月十六日蒙恩授起居舍人知鄆州事兼西路安撫使已于某月日到任上訖朝廷之士貴際而驟陟侍從之嚴社稷之守重民而洊叨屏翰之寄智所不及人其謂何蓋材各有宜賞欲無僭昔夀王東郡見譴璽書買臣會稽許奉計最成負課自脫或終更亟還以彼具絶人之材猶未免曠位之責而某方申錫明詔優遊便藩豈自謂撥煩之宜殆必有過情之聞伏惟某官衡石多士股肱本朝盛德處懷至公期物袁絲陋于學寧有不得居中之嫌潘嶽拙于長固宜自試用短之效方當上師法令下勤簿書庶幾樂職之風仰酬造物之意謝外任兩府啓右某啓比者叨膺恩秩更領使符右使之華在日月之際東藩之會參股肱之都內惟寡能懼辱重寄此蓋某官推平以進物謀治以濟時大鈞所埏必無窳器廣廈既構或兼衆材使得輸尺寸之長謹宣布之復靈𣲖均潤休光照鄰擊柝之音相聞髙山之仰跂及庶依曠宇以謝煩言無任瞻望感激之至上留守資政尚書啓右某得遊化鈞多厯年所惟重恩之未報屬孤迹之見摧屏息海傍貽羞門下既不能負荆以造謝亦恥奏記而攄懷藐然跂瞻竊獨咎責伏承某官弼諧帝業震蕩天聲思四海之必孚恥一物之遺用以故卑蕞復辱甄收不然淹轍之麟逮無決水之望夫賜而不德此大賢之風貪于私恩則小人之事輒捐竿牘母溷聰明嵗荏苒而殆徂心搖蕩而無極仰惟宸宇泰定福履康寧伏以某官稟和維嵩具體元哲蓋上帝所以賚弼而聖朝必于迓衡保釐别都雖有三后之政緝熙大業尚觖萬夫之心將授衮衣且還玉鉉上副倚毗之重下均尊養之宜瞻望符階卑情不任邈激之至與制置待制啓右某竊審某官光被帝俞寵升天閣且出宣于使指悉兼總于利權朝廷得人衣冠須慶伏以先帝䇿府法雲漢之昭回郡國均輸集京師之平準清華之選為最繁劇之柄鮮雙號稱才難必符衆允恭惟某官朱繩秉直貝闕凝姿茂久業之經綸知當世之取舍總執憲之任志乎澄清贊司會之謀國以充富刃無綮肯智極淵泉博聼僉諧宜備顧問既雍容于近侍乃董振于外臺昔蕭何饋軍髙祖稱其人傑諸葛流馬三國許以名臣迹其勤勞並居相輔推故事而可見矧令望之絶倫緬冀上為倚毗倍精寢處與劉守待制啓右某比者擊汏遄征班荆胥遇協邂逅之良願奉雍容之雅談莫能淹留遽爾暌越時返顧以增戀託置郵而尚疏伏惟保釐郊畿宴安休社恭以某官清徽肅物高論端朝裁經術以自將聳德華而絶出優遊侍從振動謀謨士林望之以龍門天子目之于國器且以大火明堂之分白水真人之邦宮鑰攸存麟符宜慎暫輟從于近列將大贊于萬幾輿望實然休命何遠幸保沖和之氣以符頌願之心瞻望軒墉豈任凝約與銓主待制啓右某向常馳記遽辱嗣音不以侍從之嚴遂遷疇昔之雅服之無斁藏以為榮方隆暑之在辰諒燕見之多暇吉祥止止啓處休休恭惟某官智窮幾微學有根本處全德以耀世振遠猷以事君蔚為國基能得士望雖復陟深沈之地居顧問之班猶以道非大行澤不廣被宜補衮衣之闕以恢王佐之風天眷亦優帝賚不遠伏冀倍精寢處上副倚毗與審官待制啓右某託于疏冗之官藐然僻陋之國聲塵不接箋記實稽惟曠度之多容豈雅素之遂絶恭惟雍容帝側綏養時中伏以某官德量淵深神鋒頴擢知當世之要務自一時之偉人議論精通文采英發多士咸自以不及天子深察其有餘厯試于難所到皆治固將舉富民之典收命世之功永觀豐規大濟黎政敢希酌民望之方集推天眷之攸光益思自珍以隆嘉遇與都運待制啓右某伏審某官輟從顧問出領漕輸雖馬牛之風猶限以南北故竿牘之禮遂曠于浮沈伏惟循察列城敦樹賢業神明于是來舍福祿有以如茨恭以某官髙節映時清規照物蹈先覺之令德茂當世之遠猷雍容爾僚範多士間以烽堠未息兵調尚繁資深智之絶人委前籌以富國地方萬里儲及九年朝無北顧之憂馬絶南下之牧訂勳甚大計德實髙佇頒夢弼之書爰舉代工之命敢冀精嗇以副仰瞻與制置待制啓右某近因便風輒奉柔翰況不遐于旌棨諒已叩于聰明春序甫中陽和增茂惟悉心于邦計靡失節于道腴伏以某官髙義薄天純文華國黼黻帝王之術昭回雲漢之章論議詳明利害彰著行無可擇人亦愛其儲胥至必有聲樹兼存于蔽芾乃者西戎背德千里餽糧經賦必出于大農輸漕方資于長䇿遽從顧問之列暫委財利之權功期有成軍不乏用方將贊襄幾務允釐庶官人望尤從心禱斯在伏冀上為宗祏精調寢興與糾察宗正待制啓右某伏審考庸太室增秩夏卿用春秋漸進之褒見朝廷僉俞之重伏惟慶慰恭以某官炳靈邦鎮錫胄國宗迪淳懿以自居蹈中和以超舉不屑近務求觀休風雍容內朝揮綽德度儼乎圭璋之望燦乎雲漢之光寧當稍遷以淹大用蓋七兵之貴主上有以簡衷三事之賢衆人欣于厯試訂兹寵遇曷究遠圖仰冀節宣以副瞻誦與虢州張待制啓右某近于行郵忽辱答教窺詞意之甚重銘心腑而弗忘伏承坐鎮多餘葆光自若矧以某官天機沖邃器度閎深久陟顧問之聫方儲贊襄之業士無異議人已注心然有非妄之災出于不意之變暫迂良幹外典劇藩蓋大賢將興先乏其體鷙鳥欲舉必卑其身天有還形福其焉往幸遵偃息之術以俟光亨之期與嶽州待制啓右某啓伏以王春正始乾象布和風入律以應期斗為天而改朔恭惟某官勤宣令德惠懋齊民同福祿而殿邦分股肱而為郡鴻飛遵渚久流布于聲詩帝曰奮庸將上熙于天宰履端在旦受祉惟新禱詠所深敷陳焉究與渭州知府待制啓右某向審寵膺節召臨統邉封幄中之謀主上許其人傑閫外之任羌戎畏于天威可以懷柔不獨鎮靜恭以某官倜儻扶義慷慨立朝恤功名之後時患郊野之多壘見古人之風采為當世之藩垣故叱馭取途不以親解讓爵辭賞母以家為英氣憺于遠夷高義動乎宿將功業屈指而可待問望與日而益隆昔申伯于宣吉甫薄伐上增榮于宗廟下綏福于蒼生咸秉大鈞以報盛德佇聆贊元之命以啓迓衡之朝伏冀上為倚毗倍加調護與嶽州知郡侍制啓右某啓伏審涓選休辰按臨劇部方條布于教令已延見于吏民戎有良翰坐聞周邦之喜鴻飛遵渚抑非盛德之宜伏惟某官英氣深閎神鋒卓頴鶩絶塵之逸軌邁扶世之髙風慷慨功名發揮事業固已入充顧問之選出靖震驚之師方崇茂勳以砥至治何垂成之變忽于丕圖蓋無妄之災殆必有喜夫聰明可以理解而賢哲難以數逃汗隆其期淹速奚恤方阻咫尺之問遽杜一介之來仰窺謙光祗攬吝腑涉新秋之沆碭投硎刃之優遊勉隆至和以俟休復與某待制啓右某近修短記幸叩侍鈴何兹疏冗之人遽損勤隆之筆誠大賢之念舊見明哲之用心捧玩再三感歎稠疊恭以某官知參彖繫文賁天人體圭璋之令姿履金石之徑節雌黃所及過于春秋之褒善俗攸歸有同溟渤之赴矧委夷末路局從頽轅徒以久要之情遂均一顧之價向風慷慨引領徘徊念章綬之見拘趨門館而伊阻伏冀上為廟祏精調寢興與提刑太保啓右某託二郡條仰依雲蔭曾之趨風之望居多引領之勞伏蒙某官過齒懦姿曲流榮問緬荷勤勤之賜秪深叩叩之懷隆暑在辰聞名曠願冀察輔生之術益綏沖氣之和跂佇豐恩少符至懇公是集卷四十四

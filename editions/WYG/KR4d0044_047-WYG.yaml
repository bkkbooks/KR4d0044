body:
  text: 公是集巻四十七宋劉敞撰雜著二明舜桃應問于孟子曰舜為天子臯陶為士瞽臾殺人則如之何曰執之而已矣然則舜不禁歟曰舜安得而禁之哉夫有所受之也然則舜如之何曰竊負而逃遵海濱而處終身訴然樂而忘其天下劉子曰孟子之言察而不盡理權而不盡義孝子之事親也既外竭共力又内致其思不使其親冇不義之名不使其人有間非之言瞽臾使舜塗廪從而焚之乃下使浚井從而揜之乃出舜往于田日號泣于旻天䕫䕫齋栗瞽亦允若書曰父頑母􅅝弟傲克諧以孝烝烝又不至姦由是觀之舜為天子瞽叟必不殺人也仲尼之作春秋為尊者諱為親者諱為賢者諱故以子則諱父以臣則諱君豈獨春秋然哉雖為士者亦然故必原父子之親君臣之義以聽之昔者商鞅之作法也太子犯之鞅曰太子君之貳也不可以刑刑其傳與師鞅之謂刻矣然而猶有所移由是觀之瞽叟殺人臯陶必不執也葉公子髙問于孔子曰吾黨有直躬者其父攘羊而子證之何如孔子曰不可吾黨之直也異于是父為子隐子為父隐由是觀之瞽叟殺人臯陶雖執之舜必不聽也舜豈以天下有所受顧臨其親哉夫聖人莫大焉天子莫尊焉以天下養莫備焉徳為聖人尊為天子以天下養然而不能使其親無一朝之患是則非舜也知聖人之徳知天子之尊知天下養之備然而不知天子父之貴也而務搏執之是則非臯陶也無其事云爾有其事奚至于竊負而逃遵海濱而處故曰孟子之言察而不盡理權而不盡義夫衡之為物也徒懸則偏而倚加權焉則運而平一重一輕之間聖人權之時也請問權曰臯陶不難棄士不過失刑而已矣以君臣權之天下之為君臣者必定義莫髙焉舜不難棄位不過隐法而已矣以父子權之天下之為父子者必悦仁莫盛焉故善為政者毋以小妨大毋以名毁義毋以術害道毋以所賤千所貴迂其身有以利天下則為之貶其名有以安天下則為之其惟舜臯陶乎舜死舜以天下讓禹十有七年而死于蒼梧蒼梧夷也去中國萬有餘里欲天下之一乎禹也周公繼文武攝天下七年制禮作樂反政于成王使其子伯禽就封于魯而已居成周死塟于畢欲天下之一乎周也舜周公同道舜君也周公臣也舜周公易地而處則皆然然則堯何以不去中國死夷狄乎曰舜之相堯也二十有八載徳施于民也長功見于民也大天下忘堯焉堯之子不肖書曰罔水行舟罔晝夜頟頟眀淫于家天下疾焉故堯崩三年四海遏密八音如是而已不能有加矣禹之舉也由舜其相舜也不能若舜之乆舜之子又不若丹朱之甚不肖也天下不以為戒雖舜死天下将不忘舜是以舜去中國焉去中國而天下一乎禹矣或曰舜勤民而野死曰有天下以與聖人不使後世萬姓被其害也而去之可不謂勤民乎或曰舜死于巡狩征有苗曰不然也堯以天下讓舜使舜巡四岳書二十有八載帝乃徂落舜以天下讓禹使禹征三苗書曰苗民逆命禹乃班師布文徳夫堯舜未嘗不巡狩伐無道也抑既讓天下矣則無所事天下夫舜何為而巡狩且伐三苗乎然則古之有是説也何故曰昔者晉文公召天子以㑹諸侯春秋為之諱曰狩于河陽然則舜不能忽然違天下而去将託于狩而至蒼梧也舜之讓春秋之諱聖人之意也孟子曰前聖後聖其揆一也昔者太王之子曰太伯仲雍王季王季有聖子曰文王太王欲傳之太伯仲雍知之因採藥而去以竄于荆呉之間然則聖賢之所以讓其國家天下于聖人者亦必有道矣孔子曰太伯可謂至徳也已矣三以天下讓民無得而稱焉伊吕問并序讀鬼谷書以伊尹在夏吕望在商為仵合讀孫武書又以二人為反間夫世衰道敝天下語權變者宗鬼谷語奇正者宗孫武學者既無以拒之而復假聖人以自耀将使澆薄之俗甘心于詐偽予甚懼焉作伊吕問或問人有言曰伊尹五就桀五就湯太公三就紂三就西伯有諸曰有之曰然則為仵而合者歟曰否不然也昔者伊尹避桀耕于有莘之野不以耒耜為可賤也以須天下之平卒不可得湯聞其賢往聘而起焉太公避紂釣于渭水之上不以漁之事為可薄也以須天下之平卒不可得文王聞其賢往獵而起焉二子者皆聖人之仇也知不以乆幽為不賢而曽紛紛以求合為賢乎且吾聞之伊尹歸于商而為之相太公歸于周而為之師二子者法堯舜者也以堯舜之道不可以臣伐君可以臣輔君成湯察焉古者諸侯嵗一貢士于天子湯因是焉而貢之故伊尹入于夏夏不能用古者士不得其職則去諫不用其言則去伊尹數諫而不入識夏之可醜也歸于亳湯又貢之貢而反者五知其不足與有為然後終相之當此之時伊尹乃自亳之北門入遇汝鳩汝方于徐而作汝鳩汝方之書伊尹太公其臣均也成湯文王其主均也夏桀與紂其亂均也以伊尹之入于夏故亦知太公之入于商以伊尹之入于夏為湯貢之故亦知太公之入于商由文王貢之也則二子者皆願為而不得者非仵之而後合者也且仵而後合者若蘇秦者乎昔者蘇秦嘗為燕謀齊而偽得罪于燕者以納于齊齊人剥而裂之天下莫不笑故圖為仵合者蘇秦也不免于死而謂伊吕之聖人為之乎哉曰伊吕之不求于合則吾信之矣若乃湯貢之文王貢之者非間歟曰惡是何言也且以湯之得天下也為得桀而得歟為得道而得歟文王之得天下也為得紂而得歟為得道而得歟湯之得天下也自其伐葛文王之得天下也自其伐崇湯伐葛而莫之逆者而桀喪其天下矣文王伐崇而莫之違者而紂喪其天下矣且子謂湯之得桀也伊尹間之其得葛也孰間之乎文王之得紂也太公間之其得崇也孰間之乎聖人之為聖也為其正而已矣是以衆人為不可及必以間而有天下則其所以為聖也不亦衆人而可為之歟曰然則世之有是言也何出曰出乎貪勢而好利者貪勢者樂縱横好利者喜用兵其于術猶號而售之也是以私自託于聖人問南子或問語曰子見南子子路不悦信乎曰信然則仲尼之見南子也欲因以行道乎曰否不然也昔者叔向囚于晉人将殺之樂王鮒者嬖臣也使謂叔向曰事我我免子于死叔向不應亦不謝也夫叔向不應豈不曰生者人之所安也為不義而生者我之所不安也富貴人所欲也為不正而富貴者我所不欲也得勢而行道者所願也為不正而行道者我所不願也夫曲其身以赴利者叔向所不忍為而謂仲尼為之乎且夫欲行道而求合于人者吾未之聞也求合于人而欲以行道者吾亦未之聞也他日王孫賈以微言問于仲尼曰與其媚于奥寧媚于竈何謂也仲尼曰不然獲罪于天無所禱也夫仲尼生居亂世固天下無所遇得其人可以行道而不為也曰毋以獲罪于天而因南子以求致其行是媚于竈矣何以為仲尼曰仲尼之不因南子以行道則吾既聞命矣敢問仲尼之見南子何也曰古者不傳䞇不為臣故稱其君曰君稱其君夫人曰小君二者皆君也國君有宗廟之事君親牽牲大夫從之夫人親薦盎命婦從之将與之共宗廟之事正君臣之位不可以不見也南子者衛小君也當是時仲尼仕于衛如之何不見敢問禮歟禮也禮則子路何不悦曰子路之意以為親于其身為不善者君子不入也衛君無道夫人無徳君子奚宜留哉乃仲尼則欲先正其名君臣名之大者也名正則庶民服道不行然後去是以未嘗有所終三年淹也此之謂也孟子曰孔子有見行可之仕有際可之仕有公養之仕于季桓子見行可之仕也于衛靈公際可之仕也于衛孝公公養之仕也所謂際可者接可見也古之人接可斯仕矣啟疑昔者齊伐魯孔子憂之謂門弟子曰魯父母之國也今危如此二三子何為莫出于是子貢往見田常而説之曰臣聞憂在内者攻疆憂在外者攻弱今君憂在内而魯弱不可攻也則不如攻呉于是子貢南説吳使伐齊東説越使伐呉北説晉使承呉之敝故子貢一出號為安魯亂齊破呉强晉而霸越嗚呼不亦甚哉此亦周末戰争貪利之人耳而謂子貢為之乎且夫卻齊以存魯于魯則幸矣于彼四國則敗矣不惟如是又使其身䝉惡于田常如與之纂焉不惟如是又使聖人被不知人之譏如與之謀焉雖然齊伐魯之事不能無也子貢説田常不能無也雖然子貢之言則謂何哉子貢必将謂田常曰吾聞君三封而三不成者大臣害君也今君上不見信于君下又見壅于大臣外為髙鮑将兵伐魯君伐而勝則髙鮑之謀也伐而不勝則髙鮑将正君之罪上者不見信于君下又壅于大臣外與諸侯與國為仇君之位若朝露可翹足而亡矣夫魯干乗之國也未可量也君不如按兵勿伐以銷髙鮑之謀外自樹黨下以嫗拊百姓使不踐戰死之患全而歸之夫百姓全而歸戴君如父母魯喜于不伐親君如師友銷髙鮑之謀則未有以間君也君乃釋此三利而必踐萬危之塗開大臣之意身與之為市不亦惑乎如此庶乎子貢之意矣猶恐非也今乃飾縱横之詐挾反覆之辯親指之聖賢之問學者信而不論論者昬而不諭毋乃已謬哉雖然是傳聞者也疑似者也古之為書之二者多有之其始也出乎信而今也成乎偽吾請言之傳曰彭祖最夀八百餘嵗敢問彭祖非人也耶則豈獨八百嵗而已哉是人也何以獨得乎此固難通也雖然為是有端仲尼曰述而不作信而好古竊比于我老彭吾以此推之所謂老彭者古述作士也上采五帝下及五伯上下八百嵗之間譬若春秋是非二百四十二年太史公述厯黄帝以來三千餘嵗也非仲尼與魯隐竝生太史與黄帝俱壮其書則然也此傳聞不攷實者也舍彭祖無傳聞者乎曰有傳曰徐偃王有筋而無骨夫徐偃王徐國之君也主祭祀奉朝聘交隣國接百官古者人君無所不親則偃王何以能自力哉古者有天疾者不入宗廟有人疾者人入宗廟則偃王何以能入即位哉語曰偃王好為仁義而不修武備以亡其國吾以此推之文徳柔柔者筋象也武備剛剛者骨象也故貴文而廢武亦不可以存國猶有筋而無骨而不可以為人也此出于議論比興者也而不審則疑矣舍徐偃王無疑者乎曰有傳曰魯陽公與韓戰怒而揮戈日退三舍夫天至髙也日至逺也魯陽以七尺之軀丈二之戈氣不足以盈谷力不足以破山憤而指麾日為之卻則豈獨日哉葢天亦隨之此不可以誑嬰兒終日又況天下乎古者兵法三十里一舍吾以此推之魯陽者戰而敗績一日之中而北三舍爾世人不知則以為日退三舍矣此傳聞而譌者也舍魯陽無疑者乎曰有傳曰黄帝與蚩尤戰于版泉之野帥熊羆狼豹貔虎為前驅鵰鶡鷹鸇為旗幟夫黄帝之人民猶今之人民黄帝之郡國猶今之郡國黄帝何以能獨任異類與之成功哉言黄帝之士卒如熊虎言黄帝之旗幟載鷹隼則可已豈獨黄帝有是哉書曰如虎如貔詩曰織文鳥章此亦聞而不察者也舍黄帝無聞而不察者乎曰有傳曰文王四乳所謂文王者其仁義忠信聖人之姿爾惡得形状之異乎必形状異然後為聖人則孟子又烏得云堯舜與人同乎語曰周有八士伯達伯适仲突仲忽叔夜叔夏季隨季騧此八人者同母而四乳吾以此推之所謂四乳者亦猶是四乳之謂也此固美之過實之言也舍文王無過實者乎曰有傳曰伊尹生于空桑夫人之不生于木猶木之不生于人也伊尹獨為絶類離倫無所受其氣若蜉蝣醯雞之出于物也禮曰空桑之琴瑟斵琴瑟莫宜于空桑之木地名吾以此推之伊尹之生于空桑猶文王之生于西戎也何怪之有哉此固好奇而不經者也故曰言逺而偽道散而惑三皇之事萬不存一五帝之事千不存一非篤學而心知其道者豈足勝論哉昔者宰我問于孔子曰黄帝三百年信乎孔子曰黄帝在位百年崩而民哀之百年用其教又百年此其所以三百年也楚子問于觀射父曰書曰乃命重黎絶地天通使無重黎民其登天矣觀射父曰不然昔者髙辛使南正重司天北正黎司地天地之道序而人神不相雜乃所謂絶也民不能登天也嗚呼吾安得夫孔子觀射父而聽之哉五百或問曰五百嵗而一聖人作有諸曰否不然也或問乎孔子曰吾聞黄帝三百年黄帝何以能若此之乆也孔子曰黄帝在位者百年崩而民畏其神又百年已而民用其教又百年此之謂三百年夫言固有若是者也古者一聖王之法五百年然後移故曰五百嵗而一聖人也曰昔仲尼有言大人者與天地合其徳日月合其明今曰聖人之法五百嵗而移是可謂天地合其徳日月合其明乎曰是非此之謂也葢古者有不粒食不衣裳居不屋死不塟之俗矣非不樂之也不知為耳矣而今也耕而食織而服安而宅塟而得者固不一俗夫聖人葢因時而設法相時而制治者也法固有必變治固有必革謀不能五百年者非聖人也當五百年之極而不知承之者非聖人也夫五百年之極其禮與其俗既已濫矣然後歸而新之故聖人者常出于五百年之後者也不五百年其法不亡不可得而亡也既五百年而猶不亡所謂不亡非不亡也直亡矣而未有絶也由堯至于湯五百有餘嵗由湯至于文王五百有餘嵗由文王至于孔子五百有餘嵗堯之仁湯之武文王之治適因其時得其際而改焉民之去故俗而就新治悦然如水之赴下也誰能禦之孔子得其際矣而不得其時周之俗遂極乎敝所謂非不亡也直亡矣而未有絶者也故孔子作春秋春秋之作曰行夏之時乗殷之輅服周之冕樂則韶舞夫後世未有為孔子之為者也如有孔子之為者則亦必五百年而後可亡也故曰五百嵗一聖人作一聖人作者一聖人之法變千五百年者也前之則民未忘徳過之則遂極乎敝極乎敝雖乆非聖人所謀也今曰周人八百殷人六百以為文王賢于湯也而可乎故聖人非能計嵗必五百年而生也以其成之則宜乎居五百嵗之後也是以傳此言也或曰揚子雲以謂事之不然曰子雲玩文而遣意者也其曰不然不亦宜乎公是集巻四十七

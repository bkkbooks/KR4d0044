body:
  text: 公是集巻二宋劉敞撰賦御試戎祀國之大事賦戎在禦侮祀専饗神皆有邦之大事豈庶政以同倫宜社而行外伸威于殊俗受釐以報内均福于生民蓋所謂朝廷之先務教化之本因者也稽合前經發揮至理政有常法事或殊軌以保民者莫若戎以馭神者莫如祀善師不戰諒治體之孰加精意克禋眷彞倫之莫擬是故將命武事也必有歸脈將格神貺也必先執膰蓋大其所當大尊其所可尊干戈肖躬信丕經之斯在玉帛薦徳㣲末節以同論然則治道有後先國務有小大威四海者兵為急敘五經者祭為最民神之事不一皆以底和平腥熟之俎不同皆以福中外故聖王勞意于用衆致誠于逆禧動則謹爾下皆仰之知夫事之大不在于彼禮之重莫先于斯亦猶仲尼陳三慎之端惟齋及戰箕子序八政之目兼祀與師用能祭典不奸天威無隕或謹以進胙或重之受脈邇遐一體􅋏武節而服從上下交歡欣徳馨之明允故曰聖人之祭不能獨豐天下雖治亦将禦戎大而慎之則蒙福細而慢之則亡功謹禁暴戢兵之機惟政之本明昭孝息民之義何治之隆盛哉丕冒羣生欽崇大節非戎無以威遠非祀無以著潔故蠻夷服而鬼神饗焉有以緝熙于鴻烈化成殿瑞芝賦以天瑞明徳芝秀於殿為韻惟皇四世徳茂洽乎無極仁化昭乎上天伊中扆之祕地擢靈芝乎盛年徒觀其萃寳玉浮紫煙浸瑞露涵靈泉華煜燿居蜎蜵葢所謂非􅃱而􅆀自然而然者也始其禦人獻祥宫童效異按以神謀稽以天意參以人事驗以孝治伊化成者所以昭徳至乎無窮亦芝秀者所以見美包乎衆瑞是謂道與之貎人與之名騰茂實飛英聲昭絶代烜後生金為之華兮玉為之英報景貺融休明揚盛徳諴至誠帝錫之命兮神儲之精怳爾而就倐焉而榮豈蕩蕩黙黙不知其力天台以三秀為竒銅池以九莖夸徳語地則幽鄙較美則昬昃豈若功就三后上陟于帝廷氣涵九重中位于樞極于是天子怡爾而念茫然而思且曰見瑞而怠者雖于災變無以異矣聞美而勸者吾與大夫其勤圖之乃命吉士賓逺夷捐不急之務隆日新之基夫然者将以升介丘之禪修后土之祠豈獨堯仁如天紀生階之蓂莢漢道雜霸詠齋房之紫芝而已哉于是撃壤之臣稱而言曰靈芝伊何有徳斯秀昔聞其傳今遂于覯濯淳治于風俗熙元化乎幽陋是宜薦郊廟垂策書被金石昭樂胥使同穎之禾不能逺過連理之木無以加於亂曰宋治有道自天眷兮祥氣回復于斯殿兮萬有干歲尚無變兮后非賢不乂賦以君得賢者而後寜乂為韻厯選上古究觀盛君将圖治以無非忽得賢而未聞兼聴萬機思降衷而俾乂敷求多士貴圖任而成勲發揮舊經稽合至徳民不能自治待君而率教君不能獨化待賢而宣力是以博選羣智仰成衆職同體之宻若股肱之自然注意之勞期寤寐而必得此所以流化率土熙功上天髙拱而物服不言而教宣豈非為之用者衆助之治者専聚精㑹神增固本朝之重創業垂統盛推當世之賢且夫外輯四夷内懐中夏一人之明也當戒乎遺逺萬乘之勢也率難乎逮下釐爾天工屬之能者使甚盛之徳覃及乎方隅無窮之休丕承乎宗社以此見非明君毋以得士非賢士毋以康時譬猶濟川者假力乎舟楫禦侮者因備乎藩籬其具修則其事立其用闕則其功隳然而臨政而失人無足觀已捨賢而望治不亦逺而是以聖王總覽英雄旌别能否仄席思進詢謀虚受重祿賞以勸其前逺䜛邪以固其後名澤純粹士得以願忠功烈昭明下欣于戴后且虞舜之聖也由穆穆而興文王之仁也以濟濟而寧葢好善者得民之大略籲俊者事帝之丕經一徳永孚實茂宣于聖職衆材並用彌上燀于君靈盛矣㢤民非后罔安后非賢孰乂母舉枉以亂直母損正以盈穢庶㡬乎太平之功垂萬世而不廢觀逺臣以其所主賦以視其所主人豈廋哉為韻善不徒立徳常有鄰将盡遠臣之趣必原内主之因來賓于王信無迷于懐寳深察所館可不誤于知人原夫士無懐居居無常所欲精覈于趣操宜䆒觀于出處葢夫人之過猶各于其黨士之窮必視其所與翔而後集既觀國以來斯為之先容庶推類而及汝誠由攷行于鄉里者易察擇臣于羇旅者難知故論其主也則情可見攷其交也則行不疑仲尼悦司城之賢徳斯著矣商鞅因景監之嬖禍亦宜其固未有仁者而依于不仁義者而寓于不義明君則以此而鑒其下智士則以此而引其類爾慎已歸衆将彼視譬之鳥矣猶有擇木之稱豈伊人焉而謬託身之智然則居上而治者知臣則為優自外而至者無主則不留思得臣必自逺者始思觀遠必以近而求覽乎徳輝雖疏賤而何有賓于私館識邪正之焉廋故曰善以彚征物以類聚士謹身兮誠難乎所寓君相士兮亦先乎得主譬若聲之生響清濁之不欺影之附人曲直之可覩此其分也豈或亂哉是以四方之賢可得而官使一介之士彌務于朋來困雖旅人苟自他而有耀善得常主将藉外而論才已矣乎親仁實然附勢則豈諒䘮道兮固久曷知賢而無㡬孰能舉而行之亦庶㡬乎卓偉者哉圭璋特達賦以圭璋特達昭徳之至為韻禮崇朝聘器用圭璋推至珍而在御昭特達以為常抗瑞節而來儀含章有耀先庭實而自至比徳彌光察舊典之遺文窺盛王之懿則圭以底信璋惟輔徳朝而至則上公之饗王后聘而用則諸侯之交邦國雖有皮馬之幣莫得而同升雖有黼黻之珍不能以致飾何哉内不足者籍外以見美質有餘者畧文以効竒我用至寳爾捐末儀自玉人而作矣及賓禮而陳之慎其獨焉有君子之象少為貴者協禮器之辭徒觀夫辨物乎行人正名乎典瑞虹氣温潤珍光純綷陳其數雖待人而彰備其用不因物而致瑑八寸以旁達豈貨之多冠四器而獨升維徳之至且夫結好莫如聘尊王莫如朝斯禮也由玉而後達斯玉也因禮而孔昭天質顒卬以難得而稱貴繅文絢耀雖専達而非驕然則王者之制有尊卑天下之理有本末苟尊矣卑安得而並及是本也末不足以上達因方挺質無一物之可偕判白凝輝非衆珍之能奪噫幣美則禮㡬乎没徳盛則物莫能齊此所以専尚乎寳鎮特旌夫半圭彼束錦加琮何相湏之宻白鹿薦璧何競進之迷貴賤于此乎分媺惡于此乎識譬夫體道者無待而素遊性善者直前而自得則夫學禮之人何怪夫圭璋之特也享禮有容色賦以因聘行享容色可觀為韻聘既盡禮享難極恭儼多儀而将事發和氣而盈容庭實序陳嘉奉辭之遜悦賓榮改觀知飾貎之肅雍古之諸侯交于鄰國其聘也珪璋以申信其享也璧琮以徃徳信莫如固則示之誠慤徳莫如厚則論之文飾然而誠慤難以見故嚴其狀貌文飾易以明故逞其顔色儀不及物諒君好之益隆和以宣心何天機之自得想夫肅肅宗廟顒顒國賓能曲直而赴節毋怠荒而亂倫鞠躬之慎也豈不誠善致享之歎也吾無所因奉幣入門有舒揚以率已升堂受命靡促數以臨人然則隆殺者禮之不同文質者儀之可象致辨異于賓主戒猥并于聘享曩子襲而今子禓見美可推正爾容而悦爾顔參和足仰且夫臣之致使也過恭而奚害客之結好也非嚴而何觀葢夫弛張者所以為文武之道茂悦者所以昭邦國之歡寳四器以同升體盛則文縟率衆介而将事心廣而體胖是以上不為縮縮之矜下不為愉愉之盛先私覿以致獻聳溫顔而承命上觀儀禮周公舉此而著經近察魯論仲尼法之以行聘豈非厚恩惠者享不可以闕遠暴慢者色不可以輕必在修采章而時當和體貌而躬行且異察祀于神専尚恭之説㑹同于國擅主詡之名此葢盛升降以示人踐行色而在我濟君靈于輯睦戒臣節于輕惰夫如是享禮之有容奚適而非可右射騶虞賦以右射騶虞天子之禮為韻射于右學歌以騶虞示君儀之至重識文教之誕敷王在西郊爰舉尚功之曲聲依九節以成觀徳之謨伊昔武王既平商紂未革新禮聿遵徂后其習射也欲偃武而興文其居學也姑賤左而貴右詩樂之節雖遠及于國風臣主之儀母下瀆于貍首想夫主歸自鎬天方授周外飭萬乗中嚴七騶眷西學而戾止法澤宫而載遊乃習斯射曰昭厥猷􅋃矢之威所以服四海揖讓之禮所以懐諸侯苟微仁聲安取正已不有嘉樂孰明盡美故必攷律度于太師辨等威于天子勇非貫革取服猛以示人巧在循聲明備官于同軌且夫射也講徳而繹志序賓而攷聲内可以教士外可以事天習非其地則禮失而亂聴非其節則樂流而偏是故因商人養國老之方抗侯有所奏召南應鵲巢之什舍㧞無愆用能上有常尊下亡僭禮遵國郊而西顧闢儒宫而洞啟彼或教胃昭尚右于質家我以和容歌得賢于治體豈非事為之制物有其儀國之興也建學則不暇王之射也于左則已卑慎所習者誰能間之號稱瞽宗豈特育材之用禮行君鵠必先彼茁之詩稽仲尼之遺言偉宗周之善化急于誘民也故因先代之太學篤于尊王也故正列侯之左射聖人之治世也葢皇皇然豈苟悦于自暇哉鄉飲升歌小雅賦古者為國厚于養賢故鄉飲登歌之節取周詩小雅之篇左聖序賓推人聲而在上肆三官始揜風什以居先攷縟儀于古經得嘉言于達者禮有盛而進取儀有輕而迨下燕雖示惠亶合樂于二南飲葢屬民反升歌于宵雅何則養老以教愛上賢而習鄉孝悌之本邦家之光微重禮不能以變俗微備樂不能以賓王由是獻酒于阼席工于堂庶令在位之人徧聞其奏雖用諸侯之樂未失其常且夫教希闊則政昏禮廢壊則民擾十月飲酒也吾猶以為簡三年興賢也吾猶以為少宜乎發徳于民上永言于物表曲髙和寡美周徳之尚衰氣盛化神知王政之有小用能丕變黎俗發揚至和飲雖微也教讓以為主雅雖尊也厚賢而匪他亦猶士冠本微三加爵并之服鄉射至簡一用騶虞之歌葢志恭者貎必甚嚴禮盛者文豈宜畧方将序長幼之等成賓主之樂坐以四面正齒位而無逾倡者二人始鹿鳴而有作然則飲非鄉也不足以敦化歌非雅也不足以獨升仰徳容之交舉俾兆衆之欽承然後和樂而不流符戴氏之著記恭儉而好禮協師乙之所稱是謂導民豈曰崇飲領其音者信國風之為陋處其位者䆒陽禮之有品故曰觀鄉知王道之易易焉由此而可審矣不下堂見諸侯賦以覲禮尊君不下於堂為韻諸侯北面天子當陽義葢専于尊主儀蔑聞于下堂順命于王爾有盡恭之節受享于廟此無思降之常原夫制有萬國必依于順時序四朝必示之信所以昭上下之交正示威懐之至慎焉有親屈至尊下從肆覲矧秋見之最質貴君儀之特峻儲精蠖濩俟輯瑞之來升髙拱穆清觀入門之序進大節斯著祲容不䌓下屈體而彌謹上抗威而益尊萬玉前趨伊述職之無爽九筵洞啟奚降階之可言葢覲也所以比天下之功堂也所以示王者之禮必毋損上以益下是謂正位而居體臨軒自若仰徳度之顒顒當扆不遷俯駿奔之濟濟用能制爾多辟宗于大君思體貌之無䙝自廟堂而可分擯詔交相焉取就卑之誚威顔咫尺曾微去所之勤不如是則朝廷之勢易凌臣主之節不厚易凌則生犯上之漸不厚則多苟簡之咎豈若謹入覲以為常謂倨見而則不車馬效貢序臣職于蕃宣被衮居髙儼天姿于户牖得非正逺在乎近慎終戒乎初修之朝㑹而易干之制定謹于廊廟而陵僭之患除専九尺之崇髙儀惟謹爾定一王之制度世得據於丕宣國經揮綽皇化惟覲也有貴于師事斯堂也非美乎能下獨不見夷王之亂典常凌遲而至于五霸者哉路寢聴政賦以君居路寢而聴朝政為韻朝位非一邦儀必分稽辨方于路寢資聴政于人君深居法宫聳顒昻之上徳總攬㡬務集丕遠之洪勲古之大猷禮存異數朝廷有内外之辨必為之定位宫室有游燕之别宜慎其常度於赫太寢維親庶務政教于此乎成號令于此乎布收視反聴雖深處于虎門安上治民将率遵于王路業業明后巍巍廣居誠制治而欽若豈便安而自如髙拱内朝思無求于出位究觀治體制必便于宗予大則四方之風小則一國之政舉而失則民受其弊行而當則世蒙其慶安得不儲思乎凝嚴養神乎清净間于戸牖曾靡宴惰之容垂其衣裳是専法度之正且夫尊而不可不慎者位也是君之儀貴而不可不勤者政也是國之基故必嚴其所啟處謹其所施為然而外朝則已逺小寢則已卑酌是中制垂為典彞恭已五門之中人皆仰止厲精萬㡬之㑹政靡殆而是何垂憲有邦裁儀廣廷託民上以臨御躬日昃而觀聴是使獨化陶鈞之表物莫能違游精巖廊之間治将自定然則路大名也示君徳之孔昭政本務也貴民事之不佻必推重于正處表克勤于視朝獨不見齋居決事者漢宣之賢取褒于史策應門失守者周康之過興刺于歌謡是以為君外統百官内嚴正寢辨居處以勿貳専聴斷而有禀宜乎天子諸侯遵以為常見治道之必審郊用夏正賦以三王之郊一用夏正為韻王雖有三郊則惟一因正歳之更始卜上幸而協吉聖人饗帝禮莫重于感生夏數得天氣遂迎于長日原夫損益殊世質文異宜謂治人之政則可得而革奉天之禮則無得而移必正其節必嚴其儀五精不同雖各祀其祖出三正非一而咸貴于夏時若乃厯告王春律囘人統天地之氣交㤗隂陽之和錯綜驗之于卦三著者效已明參之于天大報之儀可用于是天子對越在上親見于郊席以槀秸器用陶匏因天事天則發生之侯為稱禘祖配祖而肸蠁之靈可交故曰祭莫重于時時莫先于孟将修嚴父之饗必用前王之正葢所以欽若昊天迪知帝命用祈農事順啟蟄而布和将擁神休迨發春而施令然則周以建子其陽尚藏商以建丑乃地之方皆不足以逆繁禧于吉土格上靈于彼蒼是以稽合徂后發揮盛王統和天人是資出震之始降興上下聿為嗣歳之常古之制也此其盛者徳非王不足以興大禘禘失時亦何以格純嘏故魯侯博卜春秋譏其用郊顔淵問邦仲尼告以行夏得非祭祀之典貴乎咸秩沿革之制美乎登三順天時之資始見王道之相參夫然則郊之用夏正也蔽百代而無慙公是集巻二

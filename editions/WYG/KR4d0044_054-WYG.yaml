body:
  text: 公是集巻五十四宋劉敞撰石記皇姪孫故右内率府副率叔舍石記太子右内率府副率叔舍上之再從姪孫曽祖曰徳彝昭徳軍節度使兼中書令潁川郡王祖曰承錫左屯衛大將軍楚州團練使父克闢右千牛衛將軍母曰呉氏陳留縣君嘉祐元年十一月已丑生于宫邸二年四月以宗室長子賜名為太子右内率府副率四年六月甲子以疾終厝奉先佛寺五年十月葬汝州梁縣古之道天下無生而貴者故雖王者之子猶勝衣冠而後爵之然亦任其事責以職時有不能以恩全者矣國朝變此制公族雖疎逺皆以官禄富貴之而終不任以事使之必全其待長嫡又加異故叔舍未至能言而官矣然亦夭遏早死豈固有命耶謹記故右監門率府率克壯石記皇再從姪故銀青光禄大夫檢校國子祭酒行右監門率府率兼御史上騎都尉贈左領軍衛將軍克壯字稱之慶厯三年五月二十二日生生四嵗詔賜之名拜太子右内率府副率又四年上祀明堂宗室之助祭者仲叔季弟幼子童孫不問能與未能勝衣冠皆賜爵進秩由是遷右監門率府率嘉祐四年年十有七矣六月乙酉以疾不起聞詔贈左領軍衛將軍自始賜名至于終積階銀青光禄大夫檢校國子祭酒兼官侍御史䇿勲上騎都尉葢見其進未見其止也曽祖廷美秦悼王祖徳雍廣陵康簡王父承亮磁州防禦使母杜氏初其出就外傅也尤警速成有所授學未甞不以忠孝為言磁州賢之謂其左右曰此我家寶也性多所通于書畫音律皆精過人比其卒尚未娶故無後明年十月葬汝州梁縣其先王之墓次固有苖而不秀者耶敘其行事以塞詔㫖以表其竁穴謹記皇姪孫故太子右内率府副率叔罕石記皇姪孫叔罕者慶厯五年五月八日生生五嵗以乾元節與宗室子弟皆上夀得召見因賜名授太子右内率府副率明年正月十三日有疾卒嘉祐五年十月葬汝州梁縣曽祖徳彞保信軍節度觀察留後贈昭徳軍節度使兼中書令潁川郡王祖承矩莊宅使贈洺州防禦使廣平侯父克循右監門衛大將軍栁州刺史母劉氏其葬雖以殤略然自啟至窆猶使使者以王命督視云謹記皇姪孫故右内率府副率叔疾石記皇姪孫太子右内率府副率叔疾其父克廣右監門衛大將軍其祖承矩贈洺州防禦使廣平侯其曽祖徳彝贈中書令潁川王其母楊氏其生以皇祐元年八月其賜名以五年四月其卒以九月其他官以銀青光禄大夫檢校國子祭酒兼監察御史武騎尉其𦵏以嘉祐五年十月甲子實祔其高祖秦悼王之園有詔刻其世繫于石而藏于其墓所以異宗室之恩云謹記皇姪𤣥孫故太子右内率府季培石記皇姪𤣥孫季培其先出奉悼王曽祖曰克已右千牛衛大將軍祖曰叔韶右屯衛大將軍賀州刺史父檢之右千牛衛將軍檢之于悼王五世矣季培之生以嘉祐四年三月其世次上從祖兄弟曽孫之子也最逺生月餘即賜名授太子右内率府副率階勲兼官檢校皆如故事所以優宗室長子異其禮其年十月八日夭死厝延祥院明年十月日𦵏海州梁縣有詔刻石識其竁云謹記皇姪曽孫太子右内率府副率持之石記太子右内率持之至和二年六月三日生生一年以宗室長子賜名除太子右内率府副率嘉祐三年八月十八日卒厝于延祥佛舍又二年十月葬于汝州梁縣先王之塋曽祖承勗贈宫苑使宜州刺史祖克構贈邠州觀察使新平侯父叔㻮右千牛衛將軍母王氏持之于天子為再從曽孫其屬益已疎逺然其所以愛厚敦睦禮秩如一將長養而富貴之不幸早死命也夫謹記皇姪孫太子右内率府副率叔鬷石記皇姪孫鬷至和二年十月二十日生嘉祐四年乾元節用家人禮上夀見省中賜以名拜太子右内率府副率其階光禄大夫加銀印青綬檢校國子祭酒兼官監察御史勲武騎尉所以寵秩之甚厚其年七月三日感疾卒葢生五嵗矣下殤也墓逺未得葬厝禅惠佛舍嘉祐五年十月乃葬汝州梁縣祔于其先王之墓曽祖曰徳恭追封高密郡王祖曰承慶循國公父曰克絢右屯衛大將軍母王氏無命號此其世系也謹記故右監門率府率克播石記皇從祖兄弟之子銀青光禄大夫檢校國子祭酒行右監門率府率兼殿中侍御史上騎都尉克播字伯芳廣陵康簡王徳雍之孫磁州防禦使承亮之第十一子母杜氏以寶元元年十二月生于宫邸慶厯二年始賜名授太子右内率府副府得銀青光禄大夫檢校國子祭酒兼監察御史武騎射其後遷右監門率府率加兼殿中侍御史上騎都尉幼聰悟機速有成人之姿磁州愛之甚日課使學書未甞有倦色其用法頗得古法嘉祐元年十月甲子感疾卒年甫十有二云權瘞奉先佛寺後十二年當嘉祐五年十月乃𦵏汝州梁縣曽祖秦悼王之塋是雖于禮殤且無後然天子猶以族人之愛使使者䕶葬事詞臣為之志以成人之禮處之可謂厚也已謹記皇再從姪曽孫太子右内率府副率化之石記皇再從姪孫化之者右監門衛將軍叔廣之長子祖曰克已贈深州防禦使饒陽侯曽祖曰承夀贈均州防禦使武當侯化之以皇祐二年九月一日生明年以宗室長子賜名授太子右内率府副率其年六月二十一日病不育嘉祐五年十月葬于汝州梁縣先王之園是古所謂無服之殤也然其禮亦備矣謹記皇姪孫故右監門率府率叔亹石記皇姪孫叔亹其先出秦悼王曰祖曰徳恭衡州防禦使祖曰承夀南作坊使父曰克基右武衛大將軍母曰扶風縣君宋氏以慶厯三年始生生五嵗始賜名遂以為太子右内率府副率上祀明堂復以恩遷右監門率府率初出就外傅知愛書事筆硯不類諸兒皇祐五年六月三日以疾終年十有一嵗矣殯普濟佛寺嘉祐五年十月日葬汝州梁縣從其先祖之兆云謹記皇姪孫故太子右内率府副率叔鼐石記皇姪孫叔鼐其父曰右屯衛大將軍克殉其祖曰贈武信軍節度使循國公承慶其曽祖曰贈䕶國軍節度使兼侍中高密郡王徳恭徳恭之父則秦悼王故叔鼐于上為從祖兄弟之孫生五嵗則賜以名及官得銀青光禄大夫檢校國子祭酒行太子右内率府副率兼監察御史武騎射而疾卒實至和二年九月十日猶以成人禮殯延祥佛寺後五年乃葬汝州梁縣其高曽之墓兆實嘉祐五年十月日云謹記皇姪孫故内率府副率叔閭石記皇帝再從姪孫銀青光禄大夫檢校國子祭酒行太子右内率府副率兼監察御史武尉騎叔閭者贈昭徳軍節度使兼中書令潁川郡王徳彝之曽孫贈武信軍節度觀察留後遂寧郡公承衎之孫左武衛大將軍克諧之長子母曰馮氏皇祐四年四月四日生生旬日以乾元節預宗室長子例賜名除太子右内率府副率明年五月二十日卒遂厝于昭聖禅院嘉祐五年十月𦵏于汝州梁縣從高祖秦悼王之塋是誠不幸而夭矣然而其生有爵其死有歸其葬有誌是殤以成人之禮居也豈不亦幸耶謹記皇姪孫故右監門率府率叔僧石記皇姪孫叔僧慶厯丁亥十二月二十日生明年以宗室長子例賜名授太子右内率府副率皇祐二年上祀明堂用汎恩遷右監門率府率至和元年十一月九日以疾卒始八嵗厝于東興福佛舍曽祖徳恭衡州防禦使贈䕶國軍節度使兼侍中高密郡王祖承慶和州團練使贈武信軍節度使循國公父克頠右千牛衛將軍母樂夀縣君高氏嘉祐五年十月葬汝州梁縣祔于先王先公下殤也然以親親恩録其義已厚矣謹記皇再從姪孫右千牛衛將軍叔䇿妻萬年縣君王氏石記皇再從姪孫右千年衛將軍叔䇿妻萬年縣君王氏者西頭供奉官漢賓之曾孫右班殿直從周之孫三班奉職温恭之女年十有六以禮成㛰至和二年封萬年縣君明年六月庚申得病死殯奉先資福院後四年嘉祐五年十月某日葬汝州梁縣上于宗室恩厚其子孫服屬雖逺苟勝衣冠能趨拜無不命以官者王歸為叔䇿婦安富亦樂矣然不能成子姓甫三嵗而亡其命也哉謹記公是集巻五十四

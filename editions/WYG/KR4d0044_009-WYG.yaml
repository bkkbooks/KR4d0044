body:
  text: 公是集巻九宋劉敞撰五言古詩雨中獨居有懷江梅晨起風雨交蕭蕭秋意寒出門無所詣行道如此難思我平生游相得他日歡興來未嘗約趣合不待言濁酒有與醉孤琴能一彈時時商聲歌磊落千琅玕浮雲歸無期宿草秋向殘獨咏雞鳴詩一唱三四歎過聖俞讀其近文明日寄之昨日過君家雙瞳偶清刮非無塵俗累喜見秋隂豁注瑟請新聲瑶音邈超越神驚自束躅不為天寒發憶梅豈無棟梁材為君構明堂豈無調􅃵資為君致烹鬺獨使限荒鄙委之道路旁嵗晏吐竒秀芬芬有餘香疾風見松柏衆穢知蕙芳譬彼君子質幽沈道逾彰安得假神術徙根儷長楊遼哉計不果我心不能忘傷胡二人生期百齡子適四之一人仕期萬石子適升斗秧禀靈甚純粹守道復貞吉無負於神明如何有倉猝雖登爵一命亦治邑千室名竟未達君澤亦不被物鬼神莽無狀天道𣺌難詰𠖇𠖇九原深永與顔賈匹觀永叔五代史大均運元和萬物分一氣相雜以成文自然故為貴道衰三王末議出百家沸仲尼日月也薄日為之既春秋日筆削天地復經緯大法初粲然亂臣以為畏微言迨秦漢變雅從晉魏逐末競錐刀澆淳玩花卉安知作述本庸識文章意中間馬與班二子稱髣髴猶云崇貨力尚或排剛毅才難乃其然可以長歔欷退之不為史于道其猶未胡為體明哲曾是回怨誹國典竟蕪雜唐風亦隐厞陵夷九易姓禍亂森如蝟儒術駭中絶斯民遲攸塈紛紜混朱紫清濁誰涇渭龍飛真人出虎變斯文蔚天意晩有屬先生拔乎彚是非原正始簡古斥辭費哀善傷獲麟疾邪記有蜚處心必至公撥亂豈多諱何必藏名山端如避羅罻曰余仰爐治有意自勍剕踵門投耒耜假䕃親蔽芾所望窺册府無寕辱賙餼狂者實進取日中固必熭飲河雖非量滿腹尚自慰演孔幸受經居齋竊忘味寄張拱辰楚人少眉壽此翁七十餘剕士多輕揚此翁乃好書世醫悦膚淺此翁識古初習俗争錐刀此翁尚𤣥虚數欲見此翁為其亦起予責人必求備堯舜猶病諸漁者公閱休逸人狂接輿有之幸見告我且從彼居休輿比楚人竹牀櫛櫛裁脩竹熒熒粲寒光浮筠凝烟霧疎節留雪霜甘寝百疾觧側身夏日長此時四海波亦已如探湯嗟我智慮短苟為安一牀哀三良詩并序秦風有哀三良詩刺穆公以人從死後王粲作哀三良者興曹公以已事殺賢良也陳思王亦作之者怨已不及死者也吾以哀三良仍有餘意猶可賦詩故復作焉當有能知者士為知已死女為恱已容咄嗟彼三良殺身徇穆公丹青懷信誓夙昔哀樂同人命要有訖奈何愛厥躬國人悲且歌黄鳥存古風死復不食言生寧廢其忠存為百夫防逝為萬鬼雄豈與小丈夫事君謬始終馬生自汝南來求入太學不得請詩以歸士貧謀國拙安得辭泥塗馬生負長劔嘆曰歸來乎尺薪等芳桂斗粟兼明珠王門不見容憔悴如枯魚我無升斗水慰子朝夕須亦有西江濤疏逺不可圖相勸早旋歸詩書自為娛男兒患無術餘事從巻舒時至當奮飛翩如巢中雛微物尚變化況君七尺軀詠史主父希世者畫䇿妙縱横指麾一言用震動諸侯驚日暮臨逺塗中道方倒行不忍藜藿食意從五鼎烹寧知鹿門翁白首長躬耕天下非所保功名安足營入荆江此江自岷山浩瀚浮西極中為三峽束壅閼氣憤激崩騰得平地千里怒未息雖投洞庭濶争道猶逼窄觸岸皆倒流勢兼萬牛力渾黄不可鑑咫尺瞢𤣥白頗似崑崙流洩源下積石逶迤屢屈折九曲乃大直始信枉渚歌至今猶悽惻中流忽沙沸惨惨半江黒俄頃成丘陵方舟渡安得坤儀理専静何故輙損益多異真窮鄉所逢豈中國墨生忍黔突孔子不暖席賢聖亦逺遊吾寧倦行役和隣幾持國景徳寺納涼四時急相乘五月大火中天地為熾爐萬物皆沸銅吁嗟望雲漢長嘯懐清風覆載雖高厚跼蹐似不容蚩蚩道旁子奔走勞厥躬外以塵土傷内為利害攻狂酲無由濯勢與羣物終安知逍遥遊采真得所從寳宇豁髙嚴劇談叩真空虚白從中來清涼脱樊籠惜哉但獨樂不與斯人同作詩寄妙賞藐若凌青穹依隐或玩世詭時在不逢三復金玉音曠然已發矇送劉初平謁㑹稽范吏部劉生大梁客五十恥獨醒觀書汎為通不肯明一經壯嵗懷慷慨邊游忍伶仃擔簦售白璧垂蒯提青萍歸來面朝士口寫山川形公侯盡高意禮數争分庭落魄破小節浮游謝塵𠖇詼諧若流輠㨗勝如建瓴荏苒混朝市繽紛邁年齡有云致官爵百説無一聼二子才劔吷衆豪固螟蛉以兹滯玉帛亦不羞巖坰太尉辟開府夏竦也中丞請居廷孔道輔也拂衣東南走髙揖千巖青禹穴發窮寳雷門叩驚霆邦侯萬人傑憂國心無寧得善輙觧榻發竒肖開硎抽辭肯聼瑩宴舊方淹停箬下進醇酎鑑中結飛鈴髙哉鴻鵠心去矣窮滄溟謝主簿示雜文少不學為吏僶俛亦非良終日簿書間忽疑鬢髪蒼無聞畏後生素習成兼忘吾子豈獨迷相從道文章上論聖賢心下救世俗荒磊落古人風粲然在我旁精莩眩日月爰居惑鏗鏘置此但為好切磋非所望開元寺寺在汝寜府本顔魯公真卿舊居自古皆有死豈惟直如弦魯公既中夭狂宼不獨延茲寺數經亂叢林廢為煙若人昔所居故老廣其傳直氣觸白日沈憂凌青天悠悠穹壤間肯與蛛蟻捐事往理㝠漠悲來涕潺湲作詩識其處尚想音容全漢武帝二首武帝固英雄總擥皆軼材南并桂林地北守單于臺軍費累萬金馬迹窮九垓時獨卜大夫規規輸其財忠義豈不然告緡自此開茫茫文景後田野卒汙萊孰謂將相謀竟貽黔首哀晚悟富民侯後時信悠哉洪波漏金隄河伯獨不仁不有封禪行安知愁吾民翩翩海濱子自以通鬼神黄金成虚言鴻飛邈無因武安玩天時獨秉萬國鈞愴似宣房詩郎吏終負薪寂寞千載間真偽共沉淪何乃忘謗書世固無直言楚風四首三楚多秀士從古謂之然接輿既髠首三閭復沈淵大屈備時玩白珩為世傳粃糠鳳鳥歌瓦礫離騷篇已矣徳既隐孔車為回旋嚴嚴章華宫灼灼高唐觀慶弔隨俯仰離合異昏旦人生詎能幾物化毎交亂千秋萬嵗後寂寞江與漢宜僚樂市肆叔敖榮寝丘不惡漁釣卑吾聞公閲休顛𠖇天地間世與我悠悠豈悟多種橘可齊千户侯唐侯兩驌驦夙昔困多難蔡國雙狐白豈知反為患世衰道為遹服美自取間敝緼可終身鴻飛諒何簒雜詠今年四十一髪白牙齒脱未能遊逍遥意毎不自豁偶尋樂天詩往在江州日年幾與我同哀疾與我埒伊人了無生外物均寂滅而且于形骸變化難自􅃴況我狹中者萬縁日相伐力小覺任重憂多使内熱安能保平和但有就衰竭賢哉香山翁精誠妙前哲懸車未六十鼓缶終大耋以茲揆損益亦似有與奪至理何心得吾其守茲説二十六日大風寄貢甫雨止天大風草木皆怒號居人不得寐起見星月高鳥獸羣悲鳴空虚如波濤行子今安至愴愴我心勞山川幸非逺嵗月亦未㴞自傷下澤車不及鄉里豪衮衮隨飛蓬悲歌撃長刀丈夫寒如此何愧兒女曹無由託飛雲更寄身上袍墨河館連日大風空桐倚不周近戴北斗魁上天限中外自古常風霾我行廹隆冬周覽窮荒回魑魅醜正直共工負其材初如百萬兵鳴鼔天上來日月慘不光星辰為之頺又如海水翻洪洞奔天臺四顧無復人但聼萬壑雷揺山墮危石略野荒纎荄鳥雀失食悲虎豹忘羣哀大呌不自聞卻行尚欲摧而我仗漢節何由脱氛埃先王外荒服赤子棄草萊隂姧竊號令天網殊恢恢我車傷崔嵬我馬勞虺隤感彼雞鳴詩聊以慰永懷奉和永叔夜聞風聲有感用其韻往為名山客浩蕩多竒觀六月湖海卧飄飄生羽翰悮升紫垣籍草野非所安金火三伏交束帶愁衣冠飛塵變形骸内熱焦肺肝豈惟天有時人事亦可歎適有凉風來蕭騷庭葉乾感之意飛動忽若驂龍鸞銀漢水可涉枯槎去無難洞庭魚正肥逰子行足歡飲酒讀離騷睥睨天壤寛要當以樂死日月誰控摶夫子文章伯已在青雲端且方濟一世詎肯哀盤桓作詩破𠖇煩磊落氷雪顔懔懔屈宋詞千秋劇椒蘭春旱天多風贈深甫春旱天多風十步不見人自非勢利役誰肯輕出門我亦閉户居寂寞臥晏温歎息中庭花散隨扶揺翻百芳半摧折白日或翳昏安得超塵埃髙乘雲雷奔壯心更激烈中熱生肺肝愧君憂陋巷眷眷迂輕軒髙論清我懷忽然失𠖇煩吕梁吕梁信天險魚鼈不可游引棹出叢石一絙用百牛洶湧含風電蜿蜒噴蛟虬世自有畏塗吾仍恥隨流側見百仞奔俯窺千丈幽自非跂達觀未易寛百憂夙昔涉老莊縱心㑹虚舟忠信猶足恃放言禮門由蜀岡南􅅢山深行易迷南麓偶清曠雞犬鳴谷中樵童戲巖上茅茨肖浮居牖户相背向竹徑通往來清隂亦彌望白頭三四老相見語歡暢心疑避世子形迹一何放行将從之遊自恨苦羇鞅不能問姓名聊作招隐唱種竹偶書少有王子癖長憐此君雅常嫌地喧窄不敢謀瀟洒昨日山客來勸我栽砌下感荷知我心遂得移遶舍其中置磐石可以措尊斚于此更一座以待違名者山禽時復來清囀如郊野其餘即無見不辨春與夏吾惟厭時俗人亦來者寡順然兩無議外譽焉足假新筍漸盈尺新枝已鋪瓦燕雀勿相驚深沈似隆夏勸思弟于南軒種竹世皆笑幽獨何不少自貶種竹南軒間亦足以相檢況兹嵗華晚衆卉日凋歛清節良自如栽培匪為謟豈知牕户側秀色窺荏苒㑹茲東南美相對情不慊楚人昔頌橘行比伯夷忝此君最孤髙堅直難外掩凛氣有精粹筠光射圭琰他時雪中客往往疑清剡古俠客行壮年志慷慨結交慕英雄大梁多長者燕趙有古風千金起為壽一諾不顧躬自謂松與栢忽為萍與蓬市道今乃知利窮非義窮深甫過留宿并示近詩别長㑹時稀樂少憂日多邂逅非素期悲歡奈君何明燈照空牕風雪滿天地此時坐相對達旦終不寐少年慕結交徒以此方寸危生始自感來日安可問意氣久已奪形髪亦已衰如何切磋意不廢平生時驚禽墜虚弦病葉隕輕露一聞傷心奏涕下已如注留張十二宿少年有佳趣老夫意獨驩常恨離别乆忽忘㑹聚難􅇻勤置杯杓蕭㪚遺衣冠誠知惜短夜為我强盤桓和鄰幾八月十五日夜對月外事已波濤囘首已陳迹獨有雲間月相見不改色慰我平生懷故在中秋夕我髪見二毛羇旅多所厯毎逄桂花秋興發勸更劇江湖與山林所至得真􅃴今年都城游日與賤事逼得閒輙昏醉向晦專寝黙覺醒忽天明不見千里白誰令心賞違坐使歳華隔徘徊不自愜悵望空歎息見君新詩章暫若對寒魄清光動人目諷詠當自釋腳冷踐霜腳如脱知我血氣衰况復齒牙落鬢邊亦有絲人生㑹當老何計遲速為但願多美酒憂來忽如遺和江十飲范景仁家晩宿秘閣睹伯鎮題壁記畨直日月感之作五古阮公有大度于世無所營顧獨好飲酒而欣為歩兵未嘗語是非舉俗駭且驚夫豈知胸中磥磈獨不平西登廣武原咄嗟豎子明朅來蓬池上詠懷激哀聲此風久不聞寥落成千齡鄰幾頗其流貧賤能忘形校書天祿閣不忍游公卿時從好事飲傲兀人間情髪白不自疑歸來臥前楹顧見壁上書始知歳月傾喟然感舊交因欲東南行黄鵠眞去矣白雲遠冥冥吾聞至人語大塊勞我生天地一毫間出處何重輕但使樽有酒長醉不用醒君當觧此意獨往何必清賀王介甫初就職祕閣鳳凰信髙逺矰繳安得羈非君九韶奏詎肯一來儀王子美無度孤飛絶雲霓常恐濁一世斯人莫見之天子蹈軒虞公卿聚臯䕫孰言阿閣下定有朝陽詩願得調律呂聆音辨雄雌毋空著圖象但取夸童兒修府學後同官僚見諸生用儒沐休運撫俗奉明詔雖愧文翁治猶非武城笑兹堂丞相規頗盡泮宫妙髙閣横青冥長廊騖䆗窱春秋大復古修􅃇非所誚庭壇一巳新丹堊歘相照迂踈賴衆才簡黙希坐嘯况多都邑賢厯講道術要藩籬可目渉弦誦或耳剽氾鄉亦何人千載名獨劭煌煌京洛行紫極開天門慶雲麗皇居卜郊定九鼎懸闕觀寳書徳澤浸無疆風俗返華胥冠葢百萬家車馬十二衢輕肥耀朝日富庶極中區游俠信陵後節義大梁餘顧盼生光輝吹拂動萎枯貴賤且貿遷高陵忽為墟變化若有神升沉豈嘗拘咄嗟鄒魯士何用空躊躇代書寄鴨腳子于都下親友予指老無力不能苦多書書苟過百字便覺筋攣拘京都多豪英往往在石渠作書不可周寄聲亦巳疎後園植佳果逺贈當鯉魚中雖無尺素加餐意何如寄貢甫時隨侍入蜀曩别百里近愁心亂清秋今别百里遥秋色縈逺愁我飛乏羽翰我居悵淹留忽如轅下馬局足難自謀古人有先覺不願往諸侯我乃今知之曰歸邈無由朝吟南陵篇暮弦梁山謳離魂如明月昔昔西南流戴村羇旅淹歳改江臯屬春早幽村屢獨往勝事時黙討深竹尚殘雪陽崖已芳草茅茨忽連接鄰里自相保人猶安道族景是山陰道徘徊問耆􅃇或遇棲真老種瓜瓠吾生拙用大江海思遠適豈獨為瓠𤓰長繫取不食漆園有遺意放蕩豁心臆樹此無何鄉近身見多益五日拙一旬十日成百尺纍蔓更相引甘實行可摘因之浮汗漫去矣笑跼蹐從我其誰與由也不可得簡深甫與君一城居其實跬歩間慊慊不相從十日俄忽然一城豈為逺十日豈為短客子局人事心與迹相反而況各異鄉茫茫隔山陂嵗時若奔車過去誰復推伊昔厭幽獨願子東西隣雖隣尚不覿何似南北人人間實如此千别能一㑹興來即上馬埽塌聊相對贈陳襄秘丞自峽中召歸淮海南國衝冠葢結浮雲面交固不數白首猶若新之子天際來各自東西人一語旦連夕歡如平生親豈伊名聞久固以意氣均馳騖詩書間博哉醇乎醇我昔病俗學莫明聖與仁常恐遂至地豈期晩有隣君還覲清光一二席上珍賢者任必重勉旃覺斯民陳廻此與其談性命仁聖之間留五日乃别送沖卿守高郵雞騖守樊籠鴻鵠游四溟羡君一麾去不負人間名孤㠶西北風海日東南明回首笑富貴浮雲亦何輕我憶童子時綵衣戲五亭離懷重自感堕淚沾長纓公是集巻九

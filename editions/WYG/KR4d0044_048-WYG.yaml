body:
  text: 公是集巻四十八宋劉敞撰雜著題三公子傳孟嘗平原信陵皆稱賢君善養士士至三千人然孟嘗以䜛廢惟馮生從車一乗入秦使孟嘗復重于齊平原背千里之趙與楚約從非毛遂㡬不定信陵最賢矣得侯嬴乃能成功士亦安在多哉然不多養士亦失此三人此三人非特百十之雄也乃在三千之一也以彼其折節慕義貧賤無所遺卒得其用者三千而一耳況乎不養士士無所歸者乎其不困辱幸矣何功名之望哉讀封禪書劉子曰新垣平候日再中文帝以建元言汾陰有寳鼎氣乃效于後平之于術亦可免矣其卒以詐死為世大僇何哉彼以其術為逺而飾之以巧以其利為迂而益之以諂者也其敗不亦宜乎是故博學而精擇之正言而謹守之不為頃乆變志不以利鈍遷慮避此患也莊周有言毋以人徇天毋以故滅命豈新垣平之謂耶悲夫題東漢逸民傳後東漢逸民十有七人得道之中者龎公而已矣富貴不能淫貧賤不能移威武不能屈隐居以求其志行義以達其道此所謂不遭時者非激世長往者也古之君子進以禮退以義故進不謂之貪退不謂之偽以其身為天下法也故賢者至焉不肖者勉焉故曰禮義天下之公也若夫二三子者以絶世為髙不臣為名至其後世也羞朝廷之士孔子所謂鳥獸不可同羣欲潔其身而亂大倫者此之謂歟題魏太祖紀漢髙帝既誅項羽而哭之哀魏武帝平袁紹亦祭焉世或以二君匿怨矯情非也方天下畔秦劉項兄弟也及董卓之亂袁曹同盟也其艱難周旋禍福同之豈云虚哉及權就勢成人懷圖王之意還自相攻耳非有宿怨積仇必達大義者也既摧破其國非其初約雖功業歸已而英心感動自然隕涕此乃所謂慷慨英雄之風也豈介介然幸已成而樂人禍哉且夫為天下除殘則推之公義感舊撫往則均之私愛此明取天下非已欲破敵國非已怨也其髙懷卓犖有以效其為人固非齪齪者所能察也嗟夫如彼英傑之人爾猶未易得其意义況聖人乎哉設侯公説辭并序天下之辯士皆自以能排患釋難亡使存危使安者也然而説有可以行有不可以行子貢説野人野人拒之此不可行者也夫以楚之强項羽之暴其甚于野人眀矣而侯生一語而太公以歸其道奚出哉請試陳之謂項王曰漢使陸賈請太公乎曰然然則楚與之乎曰否何以不與也曰漢急寡人常寛之危常存之漢得志輒欺寡人寡人不忍與並立乎天下是以不與也曰噫亦甚矣大王之厚于漢有天下必矣天下之歸漢必矣楚之不得天下必矣天下之不歸楚必矣何也臣請言之大王嘗與漢臨廣武而軍當是之時楚欲烹太公而漢不救彼知殺人之親者不可以得志于天下而可以致天下之怨故不示楚以急也今何故而請之且大王何以不遂烹太公曰伯謂我為天下者不顧家烹之無益故不烹也曰誠如伯言者今漢之意其欲得其父者耶其外欲以得其父為請内實使楚害之而致天下之怨以滅楚耶夫豪傑並起以誅秦為事秦既破矣而戰伐不息使百姓父子肝腦塗地至苦也楚與漢亦各有分地今漢去其地而與楚争彼自知智不若大王勇又不若大王故輕委其親以邀怒衆心曰凡所為天下洶洶者楚耳又出信使厚幣使天下見之皆信漢用兵之不得已也則人人致死于楚矣故曰甚哉大王之厚于漢也故大王不如歸太公眀與漢分天下而王之天下之人皆知大王之無負于漢也又知漢之有分地也彼雖欲欺其衆復從事于楚衆不為用雖强之不聽是漢孤也大王之霸可以萬全今大王益留太公漢亦益怒其衆楚亦益怠漢亦益進願大王熟計之且夫為天下者不顧家苟殺之無益則雖留之亦無益矣苟殺之足以益怨則留之亦足以益怨矣不識争天下者使天下怨我利也使天下怨彼利耶兩者願大王計之臣非敢為漢謀得太公也欲為楚謀取天下也臣之言用則漢無辭以用其衆無名以行其詐而天下定矣寓辯劉子論疾辯士或曰劉子安得疾乎辯夫辯者排患難觧紛糅或立談之間而致和平此雖孫武之師仲由之材賁育之勇不洎于此矣乃可喜也顧劉子未能耳何遽而疾之哉且夫秦破趙軍長平進圍邯鄲之危若綴旒者諸侯畏秦而不敢救秦刦諸侯而不敢進也故馳辯之士深計而無所用多言而無所納皆欲存趙而抑秦奉諸侯以弊闗中然而諸侯之兵不出于境彼亦智者之慮所未盡也及魯仲連畫新垣之策而秦兵退舍劉子誠能造意設辭為可以動諸侯之兵者則劉子于辯固易而可非之矣今劉子未能窮辯者之慮又焉能斥辯者之過劉子笑而應之曰夫邯鄲之圍諸侯莫救勇者不能進其斷説者不能伸其意彼諸侯畏秦之勢則固然又何足怪雖然諸侯未睹秦滅趙之患也今請説而出其兵子其為齊楚韓魏之王吾請説子遂説齊楚之王曰秦圍邯鄲邯鄲且亡其大夫之謀曰諸以天下帝秦而趙國舉臣于秦趙帝秦之使旦夕且行而臣竊為大王憂之夫趙入于秦則秦益强秦得其尊號而歸必釋趙而令諸侯秦趙合歡則趙有河南秦有山東秦因下兵崤谷伐其後帝已者趙亦出兵而佐之伐其後帝秦者如此則齊楚先危矣且夫齊楚之不伐于秦者以趙邇而齊楚逺也今趙先下秦秦必不外于趙矣而與之謀諸侯之事則齊楚必先伐矣秦貪其尊號而欲并天下兵不至郢臨淄不肯止矣是齊楚疎趙而受其兵畏秦掇其患也何趙之智而齊楚之愚也且趙之帝秦社稷之故其計必果矣而秦有并天下之心其兆必從矣秦從趙請又責于諸侯則王能遂帝秦而臣于秦乎王曰不能曰然則王之不救趙亦過矣今日趙下明日兵必至齊楚齊楚天下之强國也秦必欲先其强者而後其弱者臣恐齊楚之病又甚于邯鄲之圍也王曰然則奈何曰今夫齊楚之地方數千里帶甲數百萬車數千兩馬數千駟萬乗之國也而秦亦萬乗之國也秦圍邯鄲而莫能救固畏之也俱據萬乗之國而齊楚獨臣于秦臣竊為大王羞之臣聞秦戰長平民年十五者必赴焉秦王又爵民于河内以與趙戰連時而不觧臣竊度之秦名勝趙其衆固已困矣非十五者不可用其民固已竭矣王于此時以齊楚之强選将授兵因秦之敝以救邯鄲臣見趙之寳器重賂必入于王而秦必以信使厚幣以交王國不此之務而委兵以俟帝秦竊為大王不取也于是齊楚之王曰善吾又因見韓王而説之曰韓趙世世之與國也而秦天下之仇讐也秦圍趙而韓不救者必以秦為强而趙為弱今趙自見其弱而諸侯莫救必請以國事秦而以帝帝秦秦得其帝已必縱趙而與之連謀以圖諸侯趙之怨王也必深則必以兵伐韓而秦又出兵宜陽而責于韓曰何為後帝我是趙攻于北而秦攻于西也韓不割膏腴要郡以事于趙不北而委䞇以事于秦韓不得息是韓棄與國之好而要仇讐之禍也假使趙不帝秦秦不縱趙趙必折而入于秦矣亡趙以益秦于王何利哉齊楚救之我不救之是王獨招患于是也且夫秦乆留趙而不去豈能無畏諸侯之救趙哉故宣言以刦諸侯而諸侯遂聽之假如秦兵伐韓則韓能遂為之臣哉王必不欲為之臣則願王之以兵救趙也王不救趙則秦趙之患必至矣願王圖之韓王曰諾已説韓則見魏王而説之曰臣聞魏遣晉鄙将二十萬之衆以救趙也怵于秦而止臣竊以王謀之過也夫秦人貪而多詐故竭國之兵以事邯鄲邯鄲未下而其兵亦困矣故恐諸侯之救趙也先宣言以刦之彼雖名强實懼王耳今王义止晉鄙之兵而不行是王之謀中秦之計也且夫以聲威魏者秦也王猶畏之有如秦既勝趙以實伐魏則魏能臣于秦乎秦見魏弱必以魏為不能國非盡臣魏其兵固未可止也臣固以謂王之謀過也且救人而止其兵以觀望成敗使秦勝趙則秦之兵必至于魏矣使趙勝秦則趙之兵亦必至于魏矣而秦必反為趙之助也臣請言之昔者秦伐韓之修魚而楚救不至韓之君臣謀曰秦欲伐楚久矣不若與秦和而伐楚則秦必聽韓而捨韓矣且韓失于秦而取于楚也楚人聞之大恐命戰車滿道士卒滿野而告于韓曰寡人将救韓也然卒不救韓韓大窮困請和于秦秦聞楚之先欲救韓也使将将兵伐楚至丹陽斬首八萬而歸夫當秦韓之相持楚兵不出故秦得勝韓既勝韓因而伐之其勢然也故楚雖不救韓而秦兵猶至者秦貪而戾于事也向使楚兵救韓則秦必喪師而失衆矣夫大王之兵為救趙雖未常與秦戰然而趙已滅秦必移兵以臨大王前日之楚是也臣故曰使秦勝趙則秦之兵必至于魏矣夫許而不與失其所以與怨而不絶失其所以怨今王之兵有救趙之名無救趙之實趙勝于秦則王何功于救也夫以無功之事招失許之怨故趙勝秦則趙之兵必至于魏矣而秦欲和趙故必反為之助也今王何不使晉鄙進兵以眀救趙秦久圍趙勢不能固彼畏王之威必引而去是王西抑强秦而北存孤趙天下之强圖必請服弱國必入朝則王之王業成矣不務以此而務躡楚之跡起秦之禍興趙之怨甚為王不取也王曰善如此則五國必從從則邯鄲必觧矣于是或者曰善今日乃知劉子天下之士也而辯固劉子之末也請謹事左右夫邯鄲之圍諸侯莫救辯士説者萬端而兵莫肯出及魯仲連謀之秦兵退焉公子無忌至遂敗秦師秦師非不能勿懼魯仲連也畏其説之當也非不能勿懼公子無忌也知其師久而敝也所以劉子深求當時之事託以利害之趣東引齊楚南動韓魏可謂至當之理必然之效也諭客寶元康定之間元昊畔詔書求材謀之士于是言事自薦者甚衆輒下近臣問狀髙者除郡從事其次補掾史且數百人時予方遊呉中客有相哀者作諭客謂公是先生曰葢聞賢者不遺利智者不失時因形推勢以事為機是以功勲流于竹帛盛徳載于黎庶厯百世而不衰掩衆人以獨騖此所謂豪傑之士也而先生亦有意于此乎先生曰何以教之客曰今西兵距境崑崙道絶主上不怡邊有宿甲旃裘之貢不入鐘鼓之娯不勸者于是三年矣是以下求賢之詔開自薦之路總攬奇俊兼聽天下恩涵于人心義激于肺腑故令下之日坐者泣沾襟卧者涕交頣咸欲奮必死之力蹈難測之機忘山川之苦薄戰伐之危請長纓以繫頸輸家財以濟師拜章者交乎公車獻策者滿乎北闕起徒歩以析爵由一言以改列此亦遭遇之時變化之契勇辯之辰敵國之勢穰苴所以權軍而西出蘇秦所以掉舌而東逝也今先生乃悄乎如不知藐乎如不聞名與智寂迹與勢淪懷書滿腹不如衆人意者暗于事勢而然乎且夫道期于用不必全潔功期于成不必無辱是以伊尹負鼎伍員鼓腹百里食牛包胥慟哭乗時因勢大直細曲崇如丘山炳若執燭今先生乃獨習無用之言守難行之事遺棄諸子專愚六藝并田雖通不可以厚財賦之入鄉飲雖講不可以助軍旅之急羽舞雖文不可以代干㦸之執麻冕雖純不可以更甲胄之襲睢盱拳曲空言少實不可圖進取之益則何不卑論儕俗夜寝夙興馳騁乎孫呉之場揣摩乎蘇張之營舌如電流功如雷行威名竝建家國兩榮乃反侈陋巷之處甘藜藿之食目無韶曼耳絶金石抱甕而汲不知用力行身若此老且奚益先生曰吁客何貎之壯而語之少何願之大而智之小信難以議道矣雖然不可以不陳也昔者軒轅有阪泉之師堯有丹浦之征舜有三苗之誅啟有扈氏之兵成湯造攻于牧宫文王牧績于崇城當此之時覆載侔于天地文眀比于日月休恩滲于時雨厲威粲于霜雪跂行喙息罔有不服然且弓矢未盡閉干戈未盡戢小至俘馘大至流血巍巍之功不為之差減赫赫之號不為之滅裂適足以増其徽名廣其休烈而已客以謂有損于盛徳耶夫狂童鴟張天奪其魄跳踉顛豗假命頃刻親戚不輔鬼神所殛狗吠其主鼠竊疆場此與蚩尤三苗何以異哉然而将帥之臣閲于詩禮介胄之卒奮于貙兕賞未及懸刑未及峻而天下之民億兆之衆固己集矣于是乎虎盼鷹視龍行雲起譬若挽千石之弩决垂潰之疽引洪河之流沃殆滅之燬曽不移息而可見又何足煩天下之學士主上所以朝乾夕惕勞于求賢通自進之路開博訪之門者恐伯髙傅説之流藏于巖野伊尹太師之品逸于屠釣又所以明謙讓之義恭聽卑之操使非常之業與士大夫共有也此乃三王所不及五帝所難行愚陋之人豈能昭見其情哉昔燕欲駿馬乃市朽骨而千里之駒果至越欲勇士乃揖怒蛙而百夫之勇來萃主上亦欲得特達之人是以狂狷者無所咈排觸者無所忌髙爵重禄或富或貴鑑洞乎神明量配乎天地豈可以為小醜之未夷羣兇之尚恣哉且夫東漸島夷南及交趾西奄孤竹北越鑿齒受令朝朔齊一車軌雷動風行方百萬里觀數郡之地元昊之衆曽不若黑子之著面螻蟻之循穴而欲以敵國論之固失類矣且客獨不開宋受命之説乎昔者唐失其御海水横溢寰宇之内分為六七不貢不朝靡所統一于是蠢蠢之氓困于戈鋋積尸為山流血為川糜潰屠剥者葢五十餘年上帝眷之乃命太祖受禪啟國方行千里猶有殘孽弗率弗祀太宗平之真宗成之至于制作之道似或未遑然亦開籍田封泰山禮河汾攷百王皇上率循聖武靡有遺軼而勝殘去殺適底今日是以往者申訪古樂緒正郊配大定六籍謹敇元㑹欲以就一王之法成必世之期使後嗣遵其矩太常肄其儀參于六經表于萬年澤漏乎重溟功陟乎上年還成康之俗儼典謨之篇包弓偃革無得踰焉此學者所以踴躍而鄙儒所以拳拳也何以誇蘇張于平世侈孫呉于異類終無益于王道空自絶于聖治客徒笑我暗于事機我亦悲客躁于富貴而不知制作之義也言未畢客竦然而謝曰荒野之人溺于所聞先生幸教之謹受令矣責和氏璧楚人和氏得玉璞荆山之中奉而獻之厲王厲王使玉人相之玉人曰石也王以和為誑而則其左足及厲王薨武王即位又奉其璞而獻之武王武王使玉人相之又曰石也王又以和為誑而刖其右足武王薨文王即位和乃抱其璞哭于荆山之下三日三夜泣盡繼之以血王聞之使人問曰天下之刖者多矣何子之怨也對曰吾非怨已之刖也哀夫寶玉而題之以石貞士而名之以誑也王使人治其璞果得寶焉故命曰和氏之璧此世世稱和氏善知寶而又甚悲其不幸也吾意善知寳者不然彼天之生玉也有常質居上不待以為益在下不損以為少此人主之所貪也雖全而言之猶辱今一不免其身其不知寶也甚矣至于刖而後哀之其不知過也甚矣苟使和寶之則若勿獻苟使和哀之則若勿怨彼非所眀而眀之其刖也猶幸周人得夏后氏之鼎藏之太廟已八百有餘嵗矣周衰宋大丘之社亡而鼎入于泗水之中秦始皇滅周恥不得其器于是齋七日使萬人没水求焉不獲而後止楚有良弓號之曰大屈傳世之寶也齊與晉越聞之皆欲得之興兵而圍之夫興兵者上有破軍殺将之禍下有析交離親之辱然而不計者寶之所在則不憚以安為危以存為亡彼人之所求而非求于人也試使一人負鼎之秦一人挾弓之晉則不敢以冀百金之償豈獨寶哉雖道亦然今使天下之賢士有道之君子負抱其義祗飾其辭不擇趣向不度可否號呼于人主之側以冀萬一焉甚者殺身捐生其次刑戮流亡終無與任其責者則呉起逐于魯而韓非死于秦其欲将與説難為之禍也非二君之過也然而世獨謂和為不幸謬矣夫謂和之不幸固失其理而和之自謂貞又非其名所謂貞者必審于輕重之際榮辱之分和不哀其身而哀其玉忘所重而徇所輕是竪刁之自害易牙之殺其子世主所以厚疑也吾未知其貞故為貴在乎賤為逺在乎近為大在乎小古之君子不外于己而内人不厚于人而薄身倡而後應引而後動舜陶于深山之中伊尹耕于有莘之野傅説築于巖險之下太公釣于渭水之上及其大行也名甚白居甚安功甚信此其離于世俗之患也逺矣無他人主者求之也諭歸太原王舒以進士處太學太學于今無師弟子之教養老講兵之禮廢已久諸生至者無所觀習皆欲著名廣文館覬三嵗一貢士為苟可以幸其身耳其非胄子者至以錢入吏自隐為士大夫之後王生恥之乃更占名數京師求舉于鄉又連不獲葢居者十年焉王生閩中人也父母皆老矣異日吾嘗謂王生必歸或曰王生不必歸吾曰古者仕不遇則去説不用則去夫仕而去者道也説而去者激也以其京師不入猶有諸侯存焉齊魯宋楚秦晉之大國千乗者非一也滕薛韓魏邾莒之小國百乗者非一也今天下一家仕進一道黜于京師復進于闕下去則無所矣則王生之居可也雖然王生能無朝夕之念于其父母乎其父母能無朝夕之念于其子乎故曰王生必歸且王生所以久不歸者何為乎為貧賤羞父母乎為不遇恥鄉里乎抑為上國勝下國乎夫王生士也豈為是哉使貧賤可羞是曽子不足為也不遇為可恥是孟子不足多也以上國勝下國是仲尼不足師也夫曽參至孝未嘗羞貧賤孟子亞聖固不恥不遇仲尼誠眀而欲處九夷彼一聖二賢其意何如哉為士者可法乎不可也今夫胡馬也聞北風而嘶心懷其舊土也有仁心焉曷為士也苟恥其身而廢其歸曽輕任其身而不知也且使王生得之不以道其躬雖富貴其事親為能自厭其心哉吾與王生同道也同道近乎友欲乎吾欲之無過也是厚乎身于無過也故諭王生使之歸觧其惑雜録處士之有道者孫侔常秩王令侔揚州人居于蘇湖間好為古文章尤方亷不能與俗浮沈而接物則恭以和秩潁州人應進舉初未為人知歐陽永叔守潁令吏較郡中户籍正其等秩貲簿在第七衆人遽請曰常秀才亷貧願寛其等永叔怪其有讓問之皆曰常秀才孝悌有徳非庸衆人也永叔為除其籍而請秩與相見悦其為人秩由此知名及張唐公守潁因薦秩于朝廷賜以米麥束帛秩固讓不受自陳方應舉無隐者之實不敢當其賜是時余守揚州亦以孫侔聞朝廷賜之如秩侔受之而不謝兩人者取舍異或議其意予以秩尚節而侔安禮者也所謂賙之亦可受矣尚節者潔而介安禮者廣而通令亦揚州人少時落拓不檢未為鄉里所重後折節讀書作文章有古人風王介甫獨知之以比顔囘也志雪閩越地濱海氣窳薄多暘余三年居之未始見雪明年丁丑來京師秋即雪長老或以為寡人知其寡或共議之或曰九月干卦為剥剥五陰一陽陰雖太盛陽亦未絶未當雨雪也然雨雪者陰太早刑太急也或曰物不時為災雪當降于冬不當降于秋降于秋不時也是當為災人觧之曰否凡以卦為剥陰雖盛陽尚存不當雪者是十一月雪亦可怪也十一月陽始生固㣲正月三陽而雪人不怪也何以獨怪秋也且三陽為泰泰時雨雪猶可五陰為剥剥時雨雪何以不可而謂之刑失乎且刑何以失夫古者昬亂之時天子不隐愚大夫不愛人吏不哀矜鰥寡不見収則獄有過而氣有變耳今天子聖而明大夫謹而詳吏畏而法鰥寡悦而安其于刑也訊從恕議從厚疑從赦何致于失而雪哉此議之非也又凡所謂不時而災者謂害于嵗耳今九月雪何以害也穀已入則不害麥已布則不害民已室處授衣則不害鳥獸既氄則不害昆蟲已蟄則不害而猶謂九月雪為不時失類也夫南方地卑故癉暑北方地髙自倍南方盛冬無雪非異故北方未冬為雪何怪乎且雪不當降于秋降于冬可也降于春可乎夫春猶秋也世不怪春雪何怪秋雪人儻以少見為疑耳夫麥宿種而性能寒故種麥而雪殆豐年祥也未可議眀年麥果大収倍于昔年然則二者之言前果謬後大信也人見所鮮即議以為怪為不時為災則凡出處異于世言語異于世文采異于世世所謂鮮而可怪者以施于事必以謂不時行之于民則以謂且有災然卒無災有福者多也世人豈但好論議哉亦怪其非常與已殊致耳然則是與非未可信也是嵗也秋復雪眀年吾又将賀民之豐麥也故志焉公是集巻四十八

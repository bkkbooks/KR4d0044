body:
  text: 公是集巻二十宋劉敞撰五言律詩戯和同年時在薦福寺逃暑涓涓酒開襟細細風過雲催急雨落日澹秋空樹影經行熟泉聲笑語通少年興不淺寧與老人同鍊丹井丹成人已去泉在月空沉輕舉非吾事泓澄似客心飲雖資一腹貪不近千金更愛雙桐好曽非惡木陰水齋野塘春水平間客自揚舲鷗鷺時相近波濤亦俯聼榜歌漁父曲醉讀屈平經便欲從兹去秋河泛客星長蘆口泱漭東流白微茫逺嶼青風飈萬里浪性命一浮萍飛鳥戢倦翼潛蛟浮暗腥由來限南北天意亦冥冥登東城樓二首揺落客愁亂登臨秋色空溪流寒更碧霜樹晩増紅曠野駐殘日虚軒來朔風懷歸復感别不語向征鴻高樓望不極野興逺相宜宇宙一長嘯山川多所思薄寒才勝酒短景不禁棊俯仰哀羣動遼遼見爾為送人之嶺南君去炎方逺行行萬里餘漸驚南瘴酷益見北人疎山谷藏雄虺谿潭養鱷魚秋風鴈不到何處俟歸書城樓避暑積水動微吹高樓浮薄陰登臨倦非土瀟灑勸披襟滌滌原野曠熹熹城郭深浮雲空蔽日無意欲為霖寄内風雨驚春老山川入夢遥此時看破鏡何處正吹簫舊種萱叢碧新歸燕語嬌佳期漫自笑不似浙江潮送祖學士使北漢廷用五餌無復請長纓猶是輶軒使時通絶域情山川資覽眺戰伐想縱横不負四方志那辭萬里行聞張六復棄官歸應懐折腰辱復作棄官行頗似陶彭澤兼疑尚子平兵戈未消散盜賊苦縱横余亦存邱壑相期作耦耕螢翩翩豈自知厯厯眩羣飛故作穿疎牖時來鍳薄帷助明清夜永除害一身微秋草隋宫路茫茫舊賞非送簽判雍祕丞還朝我有幕中士名高天下聞方從玉堂召欲就子虚文相得已非早送歸寧易分期君望此府急自致青雲定水二首定水涵空碧羣山凝逺嵐淵魚頗易得菱實最餘甘曠野應人語凉風快酒酣誰云陵谷換自此識南潭唐刺史陸長源時汝有南潭孟郊集有詩今疑此地是此地去人近向來幽賞違使君留隼斾烟水浄魚磯秋入冷蛩急波明白鷺飛異時江漢興撫事更懐歸索米索米東方朔端居陸士衡書仍聞北闕賦亦讓南傖感激秋風起提攜夜劍横南軍敗王畧誰事請長纓自屯田歸望山别墅岱陰宿雨霽汶北秋風過獨往予所慕躬耕人謂何林間雞黍具日慕漁樵歌郤望青山郭應知惆悵多古詩夕宿青山郭日上青山上青山不可上步步常惆悵送高處士歸豐邑别墅不及西京盛空知鄠杜間衣冠為我累邱壑羡君還隴麥逢春秀林花着雨斑雞豚社下醉多與謝南山射雕將軍樂射雕壯士挟烏號影捩重雲静聲翻一箭高獵酣生鼻火空濶散風毛快意中原㨗何辭汗馬勞和楊襃雨中見寄二首佳雨雲龍㑹高堂河漢聲驅除三伏過埽蕩九衢清造物不無意為霖真有情憐君獨高臥亹亹向羣生明暗變牕色蕭騷翻樹聲閉門無所詣高枕有餘清􅌴馬正局迹韝鷹多逺情分明動秋興似欲惱潘生貰酒小徑入村塢風帘拂暮霞桃源還可宿樽酒亦容赊舉眼青山秀隨松白露斜尋常出郊少未醉莫還家張學士送酒秋風埽飛葉客子鬢垂斑好事煩攜酒懐情惬閉闗坐看凉月墮醉送暮鴻還後日相思意蕭蕭叢菊間朱橋鹿兒館前朱橋栁映潭忽見似江南風物依然是登臨昔所諳犬聲寒隔水山氣晩成嵐留恨無人境幽竒不盡探閏月朔日寄府公給事二首良閏百年逢自周廣順至今再閏正月佳辰獻嵗同春應隨北斗天與緩東風栁帯参差翠花英㸃染紅韶華供醉眼未負黒頭翁紅翠府公宅歌舞者名嘉月重非常芳期及載陽卻因春意晩得見嵗華長餘雪留寒色新梅著早香祗應勤一醉持以答風光晦日自薦福院泛舟上女郎臺晦日疑春晩佳辰强客㳺放船無用楫置酒不驚鷗牽率㤀多病登臨亂百憂繁陰欺白日容易暮雲浮新鴈二首逢時志萬里非為稲粱謀眇眇江漢阻蕭蕭霜路秋知機自有素側翅莫多愁風起浮雲暮空看片影流萬里南飛鴈今年復此逢自難隨燕雀非不病秋冬風急聲高下雲深影疊重江湖雖異土汎汎爾能容白河逢鴈白河見歸鴈顧我影徘徊憶昔從此逝相看經嵗回春生聊自樂鄉近不湏哀為問經南國能無尺素來雪中鴈萬里羽毛弱經時霰雪紛江湖更何取天地正同雲影困低如落聲悲逺似聞識時端北向送目感離羣燈花寒燈不及鄰花􅃩競爭新重疊芝三秀分明桂半輪東風誰變律芳意自驚春流玩堪通夕長眉莫效顰王秀才自蜀之京留月餘歸南都相逢暫相會又向睢陽行險夢尚存蜀緇衣空厭京故園見樹喜舊友出郊迎幸去君家近飛鴻時寄聲哀王十三都官把臂猶昨日如何長不歸賓天亦有似招隠固疑非玉折謝庭樹綵餘萊子衣永懐想平昔涕下不能揮始秋二首暑兼流火逝秋共北風迴嵗晏蒹葭色宵征蟀蟋哀平分感揺落留滯悵徘徊知負滄洲約枯槎八月來秋色忽已改旅程殊未央水雲含變態山雨送凄凉杳杳青楓暮菲菲白芷香多才悲宋屈揺落近滄浪送張器判官此君自初登第至今二十餘年某縂角時盛聞其名王國推多士聞名二十年白頭傾敝葢珠履尚賔筵禮樂期先進功名望昔賢激昻知已晩意氣歘飄然隠直感秋思南游予欲北還未得􅌴馬常嘶北邉鴻郤願南一時秋氣感兩地物情諳俗怪𤣥尚白自疑青出藍何當鹿門隠數就徳公談隠直書云故交同學皆已軒騰始聞鴈長風送羽翼千里逐陽和朔漠應飛雪江湖始見波識時機不淺愁旅叫空多勿以稲梁故早飛乘網羅府公説牡丹盛開是日逼晩意不及觀落日含明艶輕風襲煖香傳聞亂人意相見㺯春光醉裏嵗空晏愁中夜未央異時驚麗絶秉燭正難㤀與楊十二廷評同登城東門緑樹浮萍合青山晝障開登臨共今古壯觀雜歡哀長日消棊局微風引酒杯浮雲滿西北容易雨飛來春暮聞鶯醉裏春空盡江邉客未歸可憐鳴晛晥似欲訴芳菲珍樹移時語殘花入眼稀離居亦幽獨求友莫相違除日雪迎年椒獻頌駐臘雪留寒偏坐春華早微増暮景寛瓊瑶九城闕玉帛萬衣冠欲書甘泉會他時盛暑看秋鶯高舉慕求友翩然辭谷中那知改春序又復到秋風節物感歸燕異聲嗟逺鴻歸非今正好霜露脱梧桐凉夜露卧風露清相襲銀河湛不流澄輝亦終夕爽氣特先秋高臥自微尚冥煩嗟倦游不眠計萬事出處竟悠悠空釣得魚持鈎非有釣吾猶臧丈人何知引纎繭忽復得潛鱗獨樂意逾適儻來情亦真君看渭旁叟八十老垂綸秋月蟾光瑩碧墀天色凍琉璃市響新晴後風和欲暖時杉松冷岑寂樓殿黒参差静者非無趣長吹遺所思月夜二首月出浮雲盡風生中夜清星辰競揺動河漢湛虚明老樹稀疎影驚禽斷續聲秋懷先已亂蟋蟀更宵征涼月含秋色江天復雨晴風雪異明滅河漢亦凄清驚鵲時翻樹悲笳逺過城不眠看列宿磊落背人傾送同年王殿丞知鄞縣同日大梁客共登青雲梯逢時方躍馬從政暫驅鷄萬水會東海干巖開郯溪逺㳺觀益壯肯為簿書迷風雨園林自有主風雨苦無情宻葉枝枝綠飛花片片輕眼看春不住醉任酒頻傾何處鶯求友時聞囀一聲送汝南張祕校及第後之官從我陳蔡者憐君不及門青雲期自致鳴鶴果孤鶱仕道半綸重及親三釜尊因聲謝汝士為喜月告存戯呈府公殘春亦無幾短夜不須眠翠幕深燈燭清風引管絃詼諧玩兹世醉倒㤀吾年不作方外趣安知濠上賢度支蘓員外才翁挽歌二首湖海青雲士元龍如古人草書到聖地詞學洎天倫零落風流盡平生意氣親空存華屋處寂寞已埃塵愛客毎傾葢傳家能象賢猶多嫌白眼自不廢青氈此家大門以來收古書盡甚衆至君尤備吏隠如他日郎潛遂幾年人琴俱已矣情至一潸然挽宋道中詞君召試學士院得尚書屯田員外郎交㳺日零落之子復云亡常恨神鋒雋端成中道傷文章不用世詞賜僅為郎名士如君輩風流豈易㤀吳侍郎挽詞二首高第賢良䇿朝廷擢季功固疑多直諌不得久居中長嘯臨邉月孤飛避逺鴻盤桓周召際重見二南風公治河南又治陕所作詩甚多臨汝休車騎治中愧後門平生一傾葢談笑極㤀言契闊聲塵逺差池嵗月奔匣中寳刀贈知辱故交恩與黄寺丞卜鄰卜居先卜鄰相望成相親無復羇旅恨况逢性情真食薇亦自足傾葢不為新杖屨通阡陌誰能倦角巾聞徙闗中兵偹河東敵兵絶當路戍卒下河源烽火飛狐口旌旗積鴈門和親固下䇿薄伐本中原誰斷匈奴臂非無國士恩立冬後風雨冷雨欲成雪高風催過雲流光隨衮衮吹蘀共紛紛此去天地閉向來金石焚敝貂寧獨恨四序欲平分别西掖手種小梧桐贈三閣老亭亭高未足玩玩意空深頗似少陵叟能留一院陰幸今長勿翦無用晚知音莫作吳儂態翻從爨下尋西風西風木葉下逺想洞庭秋物色摧年老天時助客愁李衡千樹橘張翰一漁舟亦自人間樂功名安足謀北風北風動江海飛雨濕清秋蝉噪曽何急猿啼不自愁冥㝠高葉下莽莽亂雲浮正復開人意披襟百尺樓盗賊村落枹鼓起城樓刁斗頻畏塗深虎豹行路入荆榛故老人人怨烽烟處處新桃源容客棹屬意武陵春風雨春光從此半無復强淹留風雨仍何急鶯花各自愁登臨非故土揺落自清秋物物驚人眼應須與醉謀黛陀石馬蹄硯一片蒼山石遥憐巧匠心能存辟雍法宛是褭啼金氣奪秋雲濕光含墨海深魚龍隨醉筆變化出幽岑離鄂州至漢陽小郡縁山腹孤城闇夕楓蛟龍戯霧雨鼓角亂西東江漢浮南紀秋冬擬緒風離騷楚人恨過半夕陽中初冬陽光轉南極漸喜入吾廬物色經霜後雲容欲雪初嚴風動枯槁凛氣益蕭疎何日陽春筦潜興冰下魚三月九日過正衙去事駒過隙此身江載萍赤墀容再謁清涕忽雙零海鳥眩韶舞天潢愁客星平生鴻鵠志獨有去冥冥病中辱聖從龍圖侍郎見訪聞便赴西州不及款曲偶成五言奉呈衰病淹嵗晩分飛愁逺行能回長者轍因見故人情後㑹知何地相看疑此生不為習鑿齒應作左丘明君章見過衡門入秋草幽獨得棲遲車馬來何屢樵蘓不自期書成𤣥尚白衣敝素為緇予亦貧非病君應信所為鄰幾君章見過兩君共羇旅三徑肯淹留秀色映凉月清風生早秋樵蘓亦不爨樽酒自相酬歡然夜遂永河漢西南流新燕無奈春還老秪看燕復來凌風舞輕健盡日語徘徊久客宜相識重簾為爾開畏人俱混俗出處免沈猜莊子曰鳥莫智于鷾鴯其畏也而襲諸人間鷾鴯即燕矣馴燕非無鷹隼慮自識主人歸立語移􅐼日翻飛試羽衣江湖萬里濶天地一身微不作驚鷗别何須强察機雨中出城行汝水上東野宜獨往此中如舊溪好風凉送雨流水碧循堤樹宻扶行葢沙平印馬啼城樓隔雲霧歸路欲全迷次韻奉和少濯滄浪水成君真隐高虚舟􅔤上下樽酒寄逰遨静境惬外奨緩歌㤀我勞興餘可逕返落日麗平臯奉陪汎汝水作江休復鄰幾作附汝潁日㴞㴞巢由絶世高風流雖緬邈舟楫共遊遨雉堞縈回逺山川應接勞幸陪觴詠末旌斾駐蘭臯西浦阻雨黒雲連海靣急雨漲淮潮稍稍州渚沒昬昬城郭遥畏塗仗忠信高舉幸扶揺不作圖南興誰當慰寂寥黒雲屯雲望如墨萬里横空浮白日變𤣥夜朱明成素秋疾風動屋瓦急雨落河流俯仰駭神化精微難與謀傷梅公異二首已矣梅公異鄉庠漫貢生竟無楊得意終失馬相如道徳生何負心懐死不攄新墳帝城外贈淚獨沾裾刻苦身常病憂愁夀易侵空令武子死誰聼伯牙琴寥落書盈篋肅條風滿林惟應都下士能記洛生吟傷胡二湘知心不易得此别定終天自古皆有死夫君獨少年論文真已矣揮涕黙澘然會有清琴在祗應永絶絃公是集巻二十

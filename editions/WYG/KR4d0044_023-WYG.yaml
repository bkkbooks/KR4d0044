body:
  text: 公是集巻二十三宋劉敞撰七言律詩贈致政葉郎中老掛朝冠息故園國人同嘆仲翁賢心慙白首戀三署意與赤松均大年玉樹承風榮紫闥史臣書美耀青編他時就問朝廷䇿還見公卿語鄧先次韻和寄講業儒林璧水開望親雲下想徘徊平原日暖歌鴒在横隴風髙聴鴈来隐几郡齋閒主諾薦羞家府樂循陔何時乞得歸寜告對襲班衣捧慶盃寄獻淮西大哥給事附詩淮西給事即敞也此當係其弟攽作千里提封盛府開照淮紅斾晩徘徊地靈固有壺公舊時泰不同唐相來韋斷陳編占藥喜珠揮新什詠蘭陔阿連今羡南飛翼酒影猶能入夀盃送晏公留守南都蒼龍大火明堂分原廟離宫萬乘居五帝遺聲在名頌三公出使用安車去思尚想多耆老條教祇煩讀舊書複道平臺彌百里鄒陽何處曵長裾伯父挽詞四十賔興七十歸清風逺與古人稀未如彭祖猶為天頗似桐鄉得所依大塋在京師伯父嘗為長洲因遂𦵏焉何路可能奔逺日此生無復待烏衣故尋庭樹丁寜誨東望吳門涕自揮城下種竹今春極有佳筍環城宻篠舊檀欒春筍新成幾萬竿池上龍蛇驚蟄起軍中矛㦸繞營看嗚啼窈窈千重碧風􅂈蕭蕭五月寒緩帶輕裘容自暇屨綦多向此林端四月見梅花作臘前芳樹暑前開笑憶周南摽有梅玉色還如雪中見天香不減嶺頭来黄鶯未識休頻顧粉蝶初逢亦自猜應與靈芝競三秀碧城瑶圃隔塵埃寄慶州子華侍讀諫議近有書道舊禁中頗牧去臨戎屬國歸來敵壘空聞道詩書今絶幕復看天馬亦從東醉傾床酒留邉月歌倚鵾弦舞朔風猶憶平生歡一笑莫忘書札寄賔鴻去年慶州討畔有功近西人上書乞六經又遣使大市邉馬故并及姚家寨道中逄李諫議蕭蕭歸騎厯崔嵬一見塵中耳目開授玉同為萬里使望雲先識二星囬北荒鵬躍南溟去西極馬循東道來世上應無此别逺留連彊盡手中杯逢范景仁李審言二諫議怪來原隰滿光華不意相逢天一涯乆别班荆情未易少留傾盖日空斜山連木葉千峯雪地逼龍城萬里沙深愧壮心輕逺適自嫌憔悴聴悲笳貝州未破書寄王子直司徒孤城死地尚睢盱智勇俱當竭蹶趨貧且賤焉真恥也壮之良者盍行乎料無豪傑同吳反隂有神靈助漢誅深怪先登少瑕叔不應時論惜蝥弧酬宋次道憶館閣曝書七言長廊複閣接天居炎日清風蠧寶書乍到似迷羣玉近饜觀疑及羽陵餘俊游真與塵埃隔逸賞空驚應接踈石室㑹湏歸史筆周南寜復滯君車九日龍華閣寄永叔永叔有書見憶黄花欲落曉霜濃極目秦川一望中節物還如去年好懽游不與故人同接䍦自恣風前落羽檄寜妨席上通還畏簡書歸未得寄詩黄閣付征鴻是日得秦州檄調兵􅊀邉寄題友生水閣曲岸重重植淺莎雨餘初覺長㣲波水紋滿屋浮清簟風力衝階折芰荷境靜自宜詩興逺夜空應見月明多從来著述希揚子為羡幽人載酒過逢永叔絶域逢君水暫留舉杯相屬問刀頭久持漢節旄空盡獨拜穹廬死可羞醉裏嵗華驚易老愁邉溝水愴分流玉闗生入知無恨不願張騫博望侯和永叔景靈朝謁從駕還宫漢帝迎年十二樓明廷朝計萬諸侯真仙降集鈞天樂雲旆囬翔駟玉虬物色遥占紫氣入香烟不隔曙光浮祕詞非為神君語自飭衣冠渭北游泥雨早朝雲氣巻舒東復西月華明晦曉兼迷正憐盛服坐假寐何處蒼蠅來誤雞髙卧山林勞夢想出門冠帶混塗泥人間氣味故易厭豈若從容歸治畦次韻得午日酒午日風光復晏隂軒昂未許嵗華侵楚魂招後宜皆醉春醖來時且獻斟髙枕洞庭看鳥度巻簾衡岳聴猿吟郢中寡和由來事應喜新詩有嗣音王僧逹答顔延年詩云春醖時獻斟十二月十六日水國冰銷天欲春山城日出景還新可憐物色曽非土亦復窮愁不放人碌碌流年轉車轂悠悠生意厭風塵草茅不必開三徑杖履何嘗及四鄰孫侍郎訪及仍携示近詩泌水衡門野老居彤幨丹轂使君輿固驚北海猶知備曽謂西河尚起予髙卧窮愁述嵗晩立談襟抱為公攄浪傳方伯中和頌詎有虚儀講徳書逄吕侍郎北鴈南鳬不自期異鄉交臂復分飛壮心巳折霜侵鬢徂嵗相看涙滿衣絶幕隂多逄日少滯林行苦見人稀子牟意緒君諳識况乃登臨逺送歸寄西臺吳侍郎淮陽髙卧彊逾時洛水嵩峯入夢思霖雨徒深旱嵗望白雲自與帝鄉期功名擺落人間世出處優游萬乘師坐視天民應未可似公當就太平基同濟川題王金吾園亭王侯功業等山河謝傅風流倦爕和治第由來處窮僻賞心曽是極酣歌嵗寒松竹孫枝在詩罷池塘宿草多聞道将軍亦愛客春游不問主人過謝晏公蓮實落蘂漂香思碧蓮嫩芳成實澹晴烟玉杯側露參差重麟趾模金約略圓擷秀乍聞囬急槳薦新還許備加籩渉江不限芻蕘往志服深希百疾蠲本草經藕實久服除百疾延年也答許待制依韻水衡錢朽太倉陳均逸于藩布上仁朞月政聲歸卧理舊邦風物變車鄰懐章昔别江湖永辭劇由來意氣真召伯甘棠大山賦去思留得與邦人曹秀之待制罷福建還朝劉君玉待制自長沙移鄧俱㑹郡下作七言敘别華閣昭囬雲漢間侍臣髙選奉清閒曹劉共許同時貴楚粤初看報政還邂逅相逢驚逺别從君一笑發愁顔莫教鐃鼔催行色更益春風雨鬢斑将去上清題梧桐樹小砌圓隂覆暝霞曲軒疎牖稱相遮已成嘉實誠無用未遇知音勿遽嗟得地豈湏矜露井随流方共笑枯槎明年冠者成春服重看紛紛滿樹花鳯凰山笙竹仙山不記鳯鳴時碧篠空含玉潤姿海外雖傳有嶰谷人間似未悟孫枚道家正貴知音少野處還于靜節宜千嵗重尋樂毅傳悠悠更覺使心悲上巳日玉津園賜宴是日雜端為主人御苑初晴暖景㣲侍臣還許宴春輝鳴禽試羽交交囀落葉迎風冉冉飛執法在前容款曲大官先置盡膏肥和平自是歡娯日未醉春醪未可歸和憶幽谷二首早聞幽谷未曽窺翠壁清泉入夢思到眼惜無名手畫醒心欣得醉翁詩種花舊比甘棠樹刻石今成峴首碑使我一麾從此逝勝遊當不減君時深居忽忽春空過積雨瀟瀟夏欲交近砌梧桐新有䕃銜泥燕子總成巢此邦卑濕酒長醉随事文章亦解嘲心逺地偏人跡絶漫勞三逕數誅茅京尹仲議侍讀自成都赴闕将過長安先寄都城一别逺相望楚水秦山各異方毎頌中和傳四子重聞京兆得三王執經誤接金華袐卧閣驚看鬢色蒼逃暑肯為千日飲能無歌舞薦清觴初雪朝退與諸公至西閣朝光初上九門開貝闕珠宫白玉臺真有燭龍浮渤澥卻占雲氣認蓬萊斗囬暖景開鳴鶴稍借新芳入早梅更覺年華無限賞履綦重疊遶蒼苔答河中梅龍圖龍池栁色鎖春烟故國風光此地偏髙下樓臺渾浸水往來車馬自随船舉杯醉舞時相屬倚瑟悲歌忽愴然安敢為文敵金谷誤煩求友賦新篇離陳州先寄潁上龍圖蓬蒿一畆亦蘧廬終嵗紛紛三徙居客耳欣沾潁川水兒謡積厭武昌魚寜知代舍悲長鋏忽幸侯門埽敝裾雖信師金譏數昧未甘萊子勸捐書寄襄陽舅氏龍圖虎符龍節鎮方州天祿先生尚黑頭南紀山川殊壮麗髙陽賔客故風流沈碑幾度書遺愛非土他時恨倚樓想詠五君夸屢薦為憑三鳥寄綢繆送司馬倩赴權官平涼尉将女隨郎過渭城正如前曰武陵行當時底事傷離别今日安知隔死生𣺌𣺌平波侵漢苑纍纍髙塚厭秦京登臨感慨尋常事何况衰年父子情和春鄉答韓殿丞暫辭金鼎擁朱旛注意雖殊體貌存擺落功名如脱屣招攜賓客許遊藩東人愁詠鴻遵渚北海欣看酒滿罇無以公歸君幸識鳯池深隔九重閽復雨閉門髙枕避春霖眼見羣芳稍見侵獨醒不如終日醉蹔晴那似斷年隂老驚嵗月都無用興在江湖特更深正想青楓千里外草長波濶亂愁心雨中醉歸楚山終日雨霏霏寥落村花入眼稀可惜東風變酒味無端宿靄破春暉屈原漁父誰清濁御叔臧孫交是非倒著接䍦驚道路悠悠判與世相違永叔附寄滁州庶子泉李監題十二字瑯琊山側白雲溪石壁何年李監題翰墨一時稱妙絶塵埃數字尚端倪驚看龍虎潜光彩恨使莓苔損角圭大呌發狂心未足竹林幽賞負招攜臨崑亭孤城西北起髙樓天半崑崙入寸眸碧樹参差見平圃屯雲重疊辨軒邱百年禮樂逢休運千里江山極勝遊那似鮑昭空寫恨不為王粲獨銷憂和永叔李太尉飲席聞筝紅顔翠髪奪春輝繁手哀弦逐羽巵正使千觴無復醉誰令中曲不勝悲留連起舞驚殘夜倣寫遺音入怨詩我識東山安石意沾襟應自屬桓伊齋宿集禧觀戯酬永叔見寄時永叔在後廟攝事尚平故有五山期獨許迎年太液池貝闕碧城相絢爛石林琪樹共叅差玉盃􅙩好經時醉冰簟風多盡日棊正想火龍勞陟降更煩佳句寄相思依韻和致政龎相公上巳約遊集禧􅀚不至琳館經春瑞氣浮當時㑹約相車遊仙花又向庭中落宫水還縈苑外流雲路空思攀去鶴沙堤猶憶問行牛明年三月芳菲在湏把蘭亭褉事脩馬上南風變晴繁隂欲閉凱風來一埽窮荒萬里開日色葱曨浮渤澥雲容舒巻映蓬萊旅情更覺光華逺暖意何妨節物催醉眼卻思山雪好臘前容可當新梅新種雜花樹江邉臘破東風起舍側栽花遶四鄰要似桃源堪避世㑹令桂樹黙留人即看紅葉娟娟秀豫想喧蜂處處新庾宅荒涼宋亭古應湏大占郢中春答子温雪中見寄勁風蕭颯結衝波飛雪奔騰萬里過亦未妨人洛陽卧還聞有客郢中歌壮心可念哀鴻逺正色遥憐翠竹多㑹卜豊年慰羇旅敢辭荒逕重張羅次韻和永叔嵗旦對雪見寄時某于上源驛典䕶契丹朝正使人日當歸前一日始得此詩朔風千里動髙簾雷起龍山晝擁簷屬國請纓謀巳拙屠蘇澆酒嵗空添翦幡春事宜人日破鑑歸期見玉蟾聊欲為君留薄具􅕩蠡床酒水精鹽答景彛對月正惜蟾蜍沈夕靄忽傳鐘鼔送秋晴浮雲四巻無餘跡斜漢西流亦自明危檻鈎簾吟獨久薄帷髙枕夢逾清幽蘭佳菊漙新露的厯珠華滿翠莖立夏祠太乙宫綘闕迎年候執期羽衣通夕侍嚴祠神光映月開璇室香霧含風拂桂旗路遶城南天最近地非人境日偏遲還聞増授無窮䇲馳奏中宸對受釐自陕到闕感而成詠葱葱氣象瞻嶢闕肅肅行装造近畿鈞奏昔年曽夢到玉闗今日是生歸茂林病乆迷朝序宣室人疎懾帝暉簮履未忘恩再造不然何路謁彤闈送人赴闕五月齊侯報政時衮章英節照西畿昔看髙鴈冥𠖇去今喜長􅀈婉婉歸詔使相望擁冠盖都人傾倒遲光暉師臣固有三公拜豈獨優游奉講闈留别永叔囬車欲度幕南庭此地那知眼界清老覺鬢毛俱種種醉看風物盡𠖇𠖇平時慟哭休論事逺別悲歌更忍聴且共春風同入塞憶君時計短長亭澄心堂讀許渾以下諸詩許渾詩後三百年長嘯空堂覽舊篇落日孤城曽不改曲池髙榭復依然塵埃暫憇道路客文雅相追今昔賢魚躍鳶飛殊有意卜居仍欲近湖邉寄密令楊彦文傾盖相親成白頭離懐終日敵三秋可憐鷄黍虚朋好應用弦歌亂旅愁太史成書自留滯石城通信巳沈浮王孫可恨山中乆舊令曽為襃徳侯答楊令彦文從吏相望千里餘蓬蒿無以避空虛豈惟論議沈時俗更覺精神耗簿書慙愧故人存雅素殷勤佳句慰離居周南㑹是弦歌地莫忘尋盟一起予寄致政張大卿昭囬雲漢麗清秋曽看星槎厯斗牛歸去還為竹林㑹相望寕減赤松遊逹人軒冕都如夢塵世功名不自謀聞道東山多逸賞從君欲具五湖舟送伯鎮守湖州馮公白首敞長裾萊子斑衣樂有餘金馬門前歌避世水精宫裏奉安輿萬重巖岫髙藏日百丈溪前俯見魚去去春風稱行樂京塵囬首憶離居次韻四叔父出守新定寄歐陽一首勾呉半在海山中聞道驅車更向東舊治空傳漢都尉漢丹陽都尉治歙遺民無復楚諸熊楚之先熊繹封丹陽其後徙郢文章老去輕時輩勢利恬来付覺雄臥理便應長閉閣一方還見古人風園人獻蒲萄婉婉柔條萬虺蟠纍纍佳實紫金寒甘泉滲液秋香重瑞露凝膏曉色乾鮫室珠盤驚不定蓬萊金體恨㣲酸貴人寕借涼州牧暫負衡門報一餐送劉先輩恕年十八舉進士通五經登科以年未及格守選闗東少年西入都諸老先生驚不如射䇿遂為天下選限年郤就里中居豫章固起秋毫末千里方從跬步初會見髙明成偉噐不憂綘灌毁新書聞范參政巡西邉漢與匈奴如弟兄猶傳敵騎向邉城數煩卿士親持節始恨儒生妄請纓形勢倒懸方舛逆計謀無益是縱横古來賢哲多屠釣公試諮詢䇿太平次韻和王刑部秋日寄元兄尚書脊令原隰曉霜清季子嗟行不自寜歸夢時環北斗極相輝猶隔太㣲星源流淮水占何逺羽翼西山藥最靈接武禁嚴多故事共看蘭玉出階庭至日早起至日應添一線長漢儀憶奉萬年觴鳴珂列炬随丞相長劒髙冠滿未央法從此時瞻玉座侍臣獨許近清光輶軒今出荒山外厭見塵沙萬里黄冬至殊方喜及固隂消積雪層冰意亦聊就日稍欣南極永觀雲尚恨帝鄉遥閉闗自信天心復吹律應知玊琯調留滯能無越鄉戀甘泉受計萬神朝聞元旦大朝㑹玊帛雍容萬國來帝城如斗挹春逥旂常影亂三辰象鐘皷聲喧百里雷北極正臨丹鳯扆南山遥入萬年杯諸神受計明堂定留滯江濵志已摧公是集巻二十三

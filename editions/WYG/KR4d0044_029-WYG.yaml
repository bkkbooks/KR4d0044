body:
  text: 公是集巻二十九宋劉敞撰七言絶句閣後叢篠中自生梧桐手封殖之因作口號呈范七王八二閣老常詠椅桐待髙鳳忽經阿閣見孫枝朝恩未放江湖去更看亭亭百尺時種梧桐欲種梧桐滿碧軒春風岑寂映琴樽雖未能令丹鳳至要湏長絶衆禽喧山僧說百鳥莫棲梧桐避鳳凰驗之頗然古無此論也别永叔後記事醉中不記别君時卧載征車南向馳驚覺尚疑君在側滿身眀月正相隨即事梅靨稀疎無賸白栁眉繁弱未全青牆頭紅杏春多少醉看愁吟意總醒寒蘆洞庭木落風霜秋兼葭處處使人愁可憐一見京塵裏卻憶孤槎天際浮呈主人二首世上年華似車轂俗中形態若樊籠解開絳帳陳紅粉何必通儒獨馬融雨催春意苦無多栁色花香奈汝何誰舉一樽屬明月小垂手舞緩聲歌迎春花二首穠李繁桃刮眼眀東風先入九重城黄花翠蔓無人顧浪得迎春世上名沈沈華省鎖紅塵忽地花枝覺嵗新為問名園最深處不知迎得幾多春自淮南移天平兼西路安撫使六月五日初入東界得快雨是時齊魯久旱欣然作小詩示攽奉世等聊志一時意耳東郊問俗擁征轅天與為霖破鬱煩慙愧泰山雲觸石誤疑刺史雨隨軒偃師驛觀先帝所植兩松及錢丞相壁記華封耆老望車塵故以青松祝聖人雲去帝鄉桑變海舊枝重疊長龍鱗十二月二日十月黄河冰未凘栁條若若草離離寒蛩逐馬聲相續都似江南秋半時便坐廷中稆生嘉禾兩本因成二十八字呈同僚諸君報政三年愧魯公將何歸奏未央宫便廷嘉穀知天意因得從容賀嵗豐即事二首長日熏風春欲回啼鶯鳴鴃亂相催不嫌栁絮都飛盡惜許酴醾取次開白社不知天上樂殘芳可惜逐東風誰家酴醾花正發走馬平明看醉翁種花五首粉蕚朱華俱滿叢鶯喧蝶舞亂春風前年手種今年看自覺淹留已老翁弱栁海棠雖晩栽翠眉紅臉已齊開蜀姬艷色巴姬舞倂送春愁入眼來長愛武陵溪上人種花無數碧溪濱莫輕野客時情薄看盡靈桃嵗嵗春行遶新芳不擬回春光二月已全催江南寒食饒風雨未落應湏日日來憶昔空園今作林牆頭枕上總成陰廢興人事非天意時暫紛華亦賞心探花郎送花坐中與鄰幾戲作七首兩郎探花如顧山紅紫黄白俱可憐春風過此即埽地爾復碌碌慰眼前兩郎敖蕩不自羈春物寂寥寧得知能讀離騷飲美酒頭白江翁殊復竒春服始成天氣新沂水風起如魚鱗由來舞詠吾與㸃童子與公凡幾人眼昬頭白老馮唐三十餘年離舉場春色年年在瓊苑曽經十牓探花郎溱洧芍藥堂背萱濃紅柔綠相映繁鄭衛之風久寂寞坐無詩翁誰使言酴醾薔薇香最竒古人不聞今始知世間此輩復何限零落深林方足悲牡丹開盡羣芳少紅藥丹萱亦可憐眼看春事已如此有酒不飲詎為賢桃花三首消露濃霞滿眼春攀香弄影地無塵仙源一入吾將老不學武陵溪上人碧海仙山拂太微春風蟠木發瑤池人間日月知多少坐見髙花爛漫時小樓西望那人家出屋香梢幾樹花只恐東風能作惡亂紅如雨墮牕紗聞御試畢寄同人鵬欲圖南魚戴角風雲變化不踰時誰知遁世聱牙者翻覆西牕數局棋贈省判沈郎中君家書二萬巻皆精繕也休文零落向千年一世風流㡬許傳錦袋牙籖二萬巻羨君能似昔人賢在北得家書論從定約欲車回笑領雙魚手自開便覺長安近于日不聞人自日邊來奉天門觀汝水流水回還縈雉堞亂山蒼翠擁層樓㑹將緑蟻捐長日幸有髙風送麥秋崑邱臺重巒似欲學層城上有帝宫人不行訪古尋幽復觀化垂楊生肘未曽驚洪澤阻風風振蒼山海逆流扁舟未濟使人愁聊把釣竿消永日溪翁沙鷺共悠悠時㑹堂二首雪霽蒼山未有塵陽崖氣色已含春不闗南國年芳早自有東藩欲貢新江湧岷山萬里來地蟠崑嶺百尋開故移䝉頂延年味共獻無窮甘露杯十二月雷後作臘破春光逼眼來暄風膏雨雜輕雷黑貂已敝京塵裏興發猶堪貰酒杯寄賀隠直㨗開封府解髙士何湏輕主簿客星今欲上靈槎題名趁取臺中舊前後龍頭屬當家聞張給事倍道兼程已過古北戲作七言叱馭勤王肯暫留邊沙朔雪犯貂裘飛黄一日湏千里應笑迂儒騎土牛雷雨寂寞荒居草木深商歌猶足玩愁霖仰頭笑問豐􅂭苦亦未妨人倚柱吟椶櫚纛影吒㲚竿影直雪中霜裏伴松筠可憐憔悴凌雲色還是昂藏獨立人江梅江南誰折一枝春玉骨冰膚畫不真撩亂清香隨驛使塵埃滿眼正愁人觀兒童逐輒失之戲呈希元二首碧眼兒童誇絶倫競馳犇兔蹙飛塵俯身㨗下重岡去空聽弦歌不見人滿目蒼山宿草衰雪殘深谷正多岐莫將弓箭窮飛走笑殺黄鬚鄴下兒竇相州人髭亦黄初出古北口大風我持漢節議和親北上邊闗極海濱宜有鬼神陰受命勁風來埽幕南塵十二月十二日齋祠西太一宫是日大風絳闕碧城天與通世間惟望氣渾融神仙定與塵埃隔自怪來時亦馭風和聖俞逢賣梅花五首送臘迎年越嶺梅幾時隨驛過江來上林桃杏矜顔色已老東風寂寞開三月都城雪巻沙幽芳偏恨雜羣花九衢何處江南客一笑相知越女家東阡北陌競春游弄雪翻雲為少留落去能無怨羌笛折來端是亂鄉愁安得繁英種滿園風前月下共方樽放歌起舞濃陰裏長使清香濯醉魂可憐風雨逼流陰無奈芳菲惱客心暫引江南春入眼不辭多擲袖中金觀城上梅花憶和城頭梅樹花初發每到花前憶剡中白水碧山應不少與誰攜手過春風送張譯歸雪霜載塗春欲晞江流水駐君北歸南方遐夐久共住可憐不及雙鳧飛小園春日草色初新栁帶長宿烟清露濕朝陽東山雲起西山碧南舍花開北舍香寄東平侍讀叔平侍郎曲榭層臺花木深春風千騎盛登臨髙山流水非無意正得君來慰我心上已不赴金眀集招鄰幾談樓船旗鼓颺春風曲水浮觴一醉同窮巷誰憐車馬絶蕭條相對兩衰翁梅雨無窮雲霧濕梅天終日昬昬只欲眠髀肉生圓頭髪白强尋髙處望山川詔賜御書稽古兩字作口號示子弟毛玠素屏非俗物韓稜寶劒得龍淵謨明敢與臯陶比稽古虚參堯舜篇於時予知貢舉又紀察刑獄秋晩雨中隠几偶書寄聖俞五首秋雲欺日不得光西風送雨寒蒼茫北來鴻雁翅羽濕那能自致凌天翔如聞蠻服愚弄兵凶酋恃險愁孤城軍書挿羽懼不急安得良術吹天晴窮秋未窮草木衰里人過半單裳衣谷中吹律不可待上天愛日何時輝我欲乗桴渡南溟手攜水伯趨蓬瀛秋來雨多蛟蜃喜滿目愁見風濤生安得獨上崑崙巔側身常近清陽邊氛妖墮㪚昬墊解使我目朗心蕭然羊角風我似靈鯤初化鵬徑辭北海向南溟可煩更借扶搖力已度臯蘭望紫庭觀梅櫻桃梅花欲落櫻桃盛白雪彤霞各自愁腸㫁黄峯與粉蝶東園來去不知休潞河飲馬長安行且謠雕鞍金勒映春朝潞河正月冰都盡不惜障泥走度橋在土城南陳勝夥涉矜豪欣據陳力崇司過督羣臣欲將燕雀輕天下自使侯王不復親客寄天台月桂子天上仙人月裏栽無端飄逐海風來可能種作千尋樹嵗看髙花爛漫開辛夘十二月同持國游㑹靈觀各曽賦詩後一年㑹靈燒髙下俱盡天子為先朝所為不忍廢復治集禧畧放渭陽帝祠制度五嶽同宇毋乏事而已不能如向之鉅麗也戊戌十二月以事過謁祠下作七言寄持國白玉五城十二樓還曽同作采真游重來無復壺中景惟見蒼林鎖碧流戲成一首參差翠嶂坐中分㫁續流泉盡日聞何異髙唐與巫峽夢餘真復有朝雲雜詩三首大梁公子樂邯鄲愛士能從市井間雖詫平原傾食客魯連猶蹈海濱還季長誕節薄拘儒俳笑紛紜絳帳居為問從來三輔士幾人門下撇衣裙天祿先生空白頭時時好事載書游滑稽不及鴟夷輩寂寞端成淑徳侯絶句書苔滿地初晴後綠樹無人晝夢餘惟有南風舊相識偷開門戶又翻書彭城先輩未披竒采早飲雋聲遺詩寄答二首清門早日映朝端俊域于今有二難虹氣韞來徒想玉國香聞處已知蘭劒池夜久光芒𦂳夢草春深景象寛寄惠新詩仍過此濡毫容易報琅玕朝日偶作呈友人漸知春意入城來向午池冰已半開和氣滿天真可望憑君須上最髙臺榴花洞熏風四月羣芳歇火玉燒枝拂露華偶坐清陰人不到白鬚道士進流霞和永叔宿齋太廟聞鶯二韻碧樹凋零滿眼秋黄鸝飛去使人愁翰林仙老齋房客猶恨人間嵗月流題庭前藥欄宿雨初晴曉尚寒土膏欲動未全乾碧萱紅藥饒情態世漏春光已滿欄壺公祠送别塵世紛紛多别離一攀庭樹欲沾衣不知何故壺中叟能棄人間不復歸山中作空山日午東風起積雪半消巖下池逐勝不知芳草逺長謠石上失回期浄土院從王伯初飲呈座人雪滿春城幽興長放歌起舞盡君觴幸憐犀首飲無事不怪次公醒亦狂飲子華家醉翁不來因令鸞英彈醉思仙翠眉紅袖拜尊前撩弄春聲入四弦坐少車公還不樂為君重奏醉思仙月下蟾蜍滴露侵石垣松檜吟風如澗泉夕夢未窮山路逺自疑乗月弄潺湲城南雜題當日龍船校五兵旋開池沼學昆眀邇來封禪和平久舊地分教百姓耕講武池垂楊冉冉籠清籞細草茸茸覆路沙長閉園門人不入禁渠流出雨殘花玉津園盤姍不稱三公位掩抑空妨數畝庭只有老僧偏愛惜倩人圖畫作書屏短槐在水陸院早時風景愛東吳一到京師興益疎偶向城南疑澤國夾川垂栁帶僧居水寺芙蓉池綠華清葢滿方塘雨灑風吹著處香浄埽釣磯雙樹下醉攲涼枕弄秋光憶和楚澤茫茫白芷生春風紅樹語流鶯髙樓不見千巖路落日空含萬里情嘯亭雨後風捲髙花舞成雪雨濕芳草綠侵雲層軒獨立時惆悵淮北春光過五分西楚楚割淮西自不輕元王賓客亦洪生重捐醴酒迷髙士末路翻亡五千城袁本初横刀長揖紫廷中健者寧須屬董公郿塢然臍直假手始知天下有英雄魏文帝江水由來一帶横魏文何事畏疑城不應天意分南北自是無人敢請纓武皇武皇英氣古無儔解道平城遺朕憂汗血龍媒十八萬單于臺下獵清秋后土廟瓊花廟吏云今年開花絶少比舊嵗憔悴繁香簇簇三株樹冷艷飄飄六出霙移植天中來幾月欲看憔悴老江城送張奕進士歸廣徳省親南北旅遊三十年相逢依舊孝亷船千鍾不洎今吾老羨爾歸安二頃田自淮南遷東平移后土廟瓊花植于濯纓亭此花天下獨一株爾永叔為揚州作無雙亭以賞之彼人别號八仙花也或云李衛公所賦玉蘂花即此聊以小詩記其所從來海内無雙玉蘂花異時來自八仙家魯人得此天中樹乞與春風賞物華董相江都治後徙膠西衰老諸侯等棄之為問平津相天下尚開東閣欲賓誰白登白登計祕自堪羞相印猶歸曲逆侯安用熊羆三十萬平城遺有子孫憂武帝詔曰先帝遺朕平城之憂鎖宿禮部中夜口號浮雲不動月微眀錦帳香寒夢易驚猶覺春風花未發獨聞宫漏出重城題送客亭别任迥北飛鴻鴈南飛燕擾擾俱非自在身莫向孤亭南北望野花江草最愁人送魏廣祕校同年羨君歸著老萊衣風雨紛紜欲别時㑹是東堂許為友自憐扶路不勝悲風雨人生老去自多憂索索逢春卻似秋過盡百花初不省何須風雨更添愁山光寺隋家昔日歌舞地荒草滿庭烟霧深猶有老松長百尺悲風來動海潮音答張安内翰見贈二絶雲鵬自合縱天池蒿鷃寧嫌寄一枝適往蚤聞仙老辨解嘲聊慰俗人嗤玉螭階側鳳池邊接武嚴徐愧昔賢天驥絶塵方萬里知君不顧繞朝鞭答阮逸中允天後天先隠姓名曽聞注易動公卿窮愁不得無編述慙愧刪詩取正聲小桃鳴鳩喚雨天色變遲日烘雲花意催一日出遊三日醉自知慙負小桃開和趙七得屯田郎童稚聞君賦上林校讎偏愧接華簪朝廷禮樂推先進莫歎郎潛佩肘金公是集巻二十九

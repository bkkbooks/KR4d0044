body:
  text: 公是集卷八宋劉敞撰五言古詩以近文投謝學士自昔周旦死珍鳯閟空巒民斯未嘗見猶取圖象觀況彼聖人沒衆說紛無端能言拒楊墨豈秪均遺鸞念我生苦後讀書樂瓢簞潛精探遺文倣象良云難猶如琢圭玉考法求所安雖無繩與矩我知不為丸凝誠矢弗變勢利非攸歡譬于寸木微積久能巑岏有羽必懷聳有聲必希彈方期沐清德敢不振斯冠答吳沖卿學士人生若浮雲聚散不自知昔與子相逢綵衣汝水湄兩家賀羊酒道路生光輝變故一朝革各在天一涯我病陳蔡間固窮莫自持君為周南居流涕極所思日月忽已改舊游不可追豈悟羣玉峯攜手如素期感愴從中來當歡反成悲求友聆嘉音喟然見新詩廢學老將落積憂志益衰俯仰諸公間默默慙見嗤子我平生交夙昔聆針規相愛當見朂勿同衆人為寄朱三學士憶在京輦居相與巷南北幸非勢利合同有春秋癖往來熟杖屨假借通經籍誰謂數斯疏要云諒且直别離淹日月寤寐見顔色惠我以好音欣然對真迹微官事如毛徇俗頭欲白庸知尚可教願子更良食送李綖學士請示江韓諸君我醉闕門外卧備東藩臣君從天上來秀色落青雲留連三日語多得所未聞僻陋不自知喟豫久離羣南風吹白沙六月天晝昏送行不盡境引望空復勤相識何必舊白頭或如新有信當寄書毋遺傾蓋人今旦今旦風淒冷始覺隂氣繁白日無光彩未敢啓前軒卜居止容膝他時用為嘆及此殊覺勝閉塞有餘溫撥棄當世慮縱觀上古言禹稷稱櫛風孔顔樂閉門窮通或相背勞逸足自論優游蓋卒嵗逹者嘗有言送李才元車馬何赫奕觀者更歎息冨貴歸故鄉任州二千石賜金為親夀衣錦供子職里閈納華駟公堂列嚴㦸地兼百城㑹衆有萬户籍指撝吏奔走宣布民悅懌丈夫雖非通豈負稽古力懷章過故人笑别見顔色吾徒若匏瓜長繫慙不食贈君當何言有信勉相憶送焦生蒼鷹懷風雲六月不忘習寒蛟待雷雨深水聊自蟄多君起江湖力學如不及擇師視洙泗履奧窺所立翰飛自兹逺變化誰能縶孤劔屢感激四方慎翔集公子誠愛客相門許長揖結轡因北游揮手謝朋執藏書就史氏觀國榮天邑藉甚諸公間青紫亦可拾寧復悲歸來眷眷兒女泣聖俞受詔行田是時聖俞葬其弟公異未畢而去蟲潦敗耕耘西成絶人望鄉農籲天意守闕書屢上憂民聖天子擇吏賢宰相王畿蓋根本嵗賦在寬放曰君往行田究彼荒稔狀一當薄其租用以息民謗朝廷慎指使推擇無與讓非君精明姿曷以致忠諒憂公劇私為即夕治行仗懷悲念其弟卜日不果葬乃知體純粹世士難以尚德澤既敷宣風謠還歷訪歸來悟明主自致誰云妄張老子出田所魯人有林類底春獨被裘沿畦拾遺穗帶索仍長謳知命忘其老樂天固不憂既驚端木賜復感東家丘夫翁何為者嵗暮亦逺遊北風吹白髮蕭颯田隴頭此意如昔賢世人知爾不同聖民圍棋釣魚山林自微尚軒冕非所營每及逍遙趣欣然得吾生春塘漾緑水珍樹啼黃鶯心逺忘外喧境幽識人情垂釣如有求而無得失驚臨局非期勝聊為白黑爭得意物可遺忘言賞逾精此理俗鮮悟固當屬淵明秋園晚步秋物足悲咤丘園良考槃翺翔攄結慮徙倚縱遐觀爽氣使心厲淒風令自單酸念無徑託那使百憂寬鳥下見人寂螿啼知露寒夕煙起城際反照映林端竚立不能返迷懷增屢歎競渡三閭雖已死郢人獨見思五月江水深繞城碧邐迤輕舟爛龍鱗利楫劇鳥飛簫鼓駭蛟龜鷹隼亂旌旗爭先愛中流觀者被水湄漠漠懷沙魂一去不可追千載萬嵗後兒女以為嬉已矣國無人終焉莫子知讀離騷空庭衆囂息風葉獨紛紛秋期此時改感歎坐黃昏逺懷靈均子著書為平分念爾剛直心吐茲清麗文上嘉唐虞世下悼商周君能與日月爭不能卻浮雲浮雲蔽日月嵗暮奈憂勤精誠誰謂逺恍惚若相聞秋過臨波亭寄陜府資政給事不復池上遊秋意忽已繁卧桞半死生枯荷自翩翻憶昔載後車逍遙臨中園觀魚有縱辨運斤契忘言豈獨嵗月晚正傷離别魂人遐室空邇幽興誰與論讀聖俞我今五十二詩感之子真神仙吏不識傷别離忽逢舊交歎始悟人間悲嵗月流水逝富貴浮雲馳徘徊撫往事感激吐新詩流水難以追浮雲難以推百年半如此萬事從可知且欲拂衣行聊及鱸魚期君若變名姓相逢復何時上嶺下嶺上嶺惟恐遲下嶺懼顛覆一嶺但數里思慮千盈腹不聞二大夫致身未嘗辱送袁同年殿丞陟通判撫州因還洪井舊居袁在朝數上書言當世事某與袁别十年矣語舊多可悲者留三日乃去輕舟何翩翩斫冰浮清川問之亦奚樂嵗宴道且邅云我大梁客游說萬乘前畫䇿不見收故鄉復言旋薄祿及吾親就官若歸田名實兩有適逺近誰間然憶昔都門别爾來彌十年蒼蒼豫章質更覺摩青天語舊或涕流舉觴愧留連相從且未果使我心勞悁送裴殿丞君已頭髮白猶著五綵衣出門我意失贈别雙涕揮自古不澤祿念公早旋歸天歡固為樂外物焉足希逹矣老萊子千年見餘輝裴殿丞訪别說春秋期嵗初復來吾衰不夢周知我在春秋斯道宜未墜夫公能見求相看頭可白感别嵗空遒念子期雞黍母懷汗漫遊殿丞此君好道士攝生之術送雍秀才歸琅琊山希聲未易合皇華衆方笑與子東西人相逢偶同調億年寄神解萬里在心照此間豈容言吾得安蓬藋煌煌千金珠舉世矜賞好安知緯蕭翁棄置久高蹈盛論山水趣局促恨未到江湖且相望送子一長嘯鳴禽朝日升屋梁喧禽鳴樹巔東風不相期自與春意旋振衣起前庭天色緑窅然非煙揚微和目極相綿綿行尋林間步荑英已可攀萬物在陽舒胡為慘不歡幸有二三子采芳玩華年不及古之人幽懷聊復蠲驚禽幽鳥何所託高棲衆林端風巢雛鷇危露葉毛羽寒半夜吐明月驚鳴遞囂歡迎光怪焚巢顧影疑飛丸何為貪擇木通夕不自安乘高非爾謀宜下易所觀不見丹穴鳯深居全綵翰八角井誰鑿八角井不方亦不圓此地饒美水此井獨苦泉泉甘常早竭泉苦更永年浪得世上名對之還慨然雨過張先生禀生本迂闊習性益疏懶遇境賸欲留得人輒迷返先生老鄉曲素髮頗樗散相遇年已忘心親禮逾簡幸無富貴憂時可青白眼驚呵左右人邂逅以繾綣初隨朝陽出忽報山雨晚天路良幽艱歸途失平坦寄公默先生昔賢避言色先覺如觀火作者有七人清風緬遺我浮俗滋鈌鈌羇人畏瑣瑣知言豈易值卷迹恨莫果所願學孔子無可無不可寡過知未能同聲賴銘左恩賜御書呈同舍諸公聖神紹先古述作備新書微生濫中祕重賜等諸儒日月明天文龜龍粲河圖精神駭耳目黼藻賁泥塗發揮篋中藏更得神宗初光華混新舊筆墨肖錙銖幸生堯禹間而見典與謨上為四方賀善繼古所無下竊私室榮搢紳誰與俱漢史探㑹稽周臣覽崑墟蕭條千萬里筋力固已劬而我獨何人荷寵安厥居受學庶無負傳家既多餘願從二三子講誦無時虛與景仁聖俞飲景彛西園鬢髮今日白山林未能往每逢負郭趣默有歸田想置酒松柏間當春更蕭爽欣欣二三子相與留一賞早花何娟娟秀色傾宿莽馴禽聲喧呼永不忌羅網物情樂于適未必在深廣育育井中魚胡然困偃佒佳哉主人翁示我以天壤放懷寓一醉益愧鳴佩響園井中有魚數十頭送懷安李使君屯田汝潁多竒士磊落布方冊先進存古風若人復令德詩書秀英華鷹鶻勇排擊曩者從軍行早聞平戎策縱橫志未展慷慨意更激坐驚齒牙脫忽使頭髮白頗與嵇阮同閉關以藏迹老驥甘道路黃鵠羞斥澤復持一麾去堅取萬里役旌旗暗長亭已想蜀山碧鼓吹喧前除稍知楚風易專城自足貴逺覽固多適胡為結離愁恨此晚同得題賈大夫射雉圖控弦誰家子馳射落名翬傾城絶代女巧笑揚修眉覽古按圖畫悵然增我唏壯士不擊賊顧從兒女嬉威弧無用世反事禽荒為默默千嵗後正為來者嗤示張直溫築山必使高鑿井必使深百工戒淺近盛德羞浮沈焉有尺寸枝能棲垂天禽焉有升斗泉能容橫江鱘借兹喻物理足以開君心隘在容不足弱在力不任大道如路然固無古與今臨淵亭望鳯凰等山作孟公多勝詣故在杯酒間雖非菊花時輒復尋龍山平明騎馬出日暮倒幘還若人難重得此風猶可攀問我亦何為翛然方閉關忘言在得意獨往路已難聞隱直欲調官蛟龍居池中仰活數掬水虎豹離山林求食輒搖尾張君宜大用亦是龍虎比何得圖小官折腰五斗米屈伸蓋時命隱顯乃君子譬由合抱材當自毫末起昔為青雲高今落塵土裏可唁復可驚誰能叩天耳津亭西風豁愁隂天水兩涵泳微波蕩寒日極目萬里淨離披蒹葭老蕭瑟原野迥物容驚客懷櫓聲動歸興倦游髮恐白多慮身復病緬慕蒼梧雲無心自輝映和持國登開寶寺上方院寄孔寧極崔象之孫曼叔重山抱城起清川帶野回深嚴古佛寺嵽嵲聳高臺此地宜眺覽冠絶都城隈逺近見千里令人心目開憶在七月中丞相自魏來百官迎道傍休騎兹徘徊衣冠相勝凌塵土如炎灰我隨衆人趨出入再歷階不得及此時披襟濯氛埃至今意耿耿負愧不可裁邇來讀君詩足慰平生懷忽如升其巔四顧心悠哉往者不可及信陵久已頽來者不可見孔侯與孫崔古今殊茫茫慨嘆成歡哀㑹復從君遊于焉謝崔嵬臨波亭飲席贈徐二華星爛長天明月被清池良景豈易得佳賓共在兹形骸久相忘巵酒安足辭高歌激風飆宜笑散春暉中置浩長歎民生信多為非無逍遙鄉固在閒暇時及爾不快飲嵗月忽欲馳世事紛悠悠放言為吾師送張四隱直遊邉吾昔讀漢書逺嘉馬文淵慷慨有大志不辭走窮邉嘗言功名期當及少壯年生圖萬里勳死裹馬革還此語頗豪蕩書之在青編其人雖已亡其意猶凛焉羌戎未伏誅王旅多喪偏安得如此人西行隴與汧借籌資方略還為天子言海上惟歎息今時豈無賢忽聞張公子奮起殊欣然歷覽涇渭旁究觀敵根源寧復謝古人正堪豁憂煎衛青出行伍去病幸有天相繼取封侯有若翻手間男兒誰不如可得甘棄捐讀書反三黜何用師孔宣我豈少游徒規規守鄉田力弱非志弱送君心長懸同貢甫詠丁晋公園池一死復一生一虛復一盈猶悲門易軌況乃谷為陵曲池久蕪沒高屋尚峥嶸自古若傳舍毋為方歎驚送韓七寺丞知蕭山原注韓潁川人兄弟八人皆仕宦顯名君家潁川上時論數八龍聲華自照映逺與高陽同季慈又青出秀氣凌秋空安步可逺到何為菰蘆中㑹稽自禹來山水天下雄古人每獨往勝事殊未窮聊欲因弦歌登臨極江東超然語高邁令人愧樊籠我昔更此邑稚年尚兒童邇來成夢寐自笑成秃翁安得方寸金換君腰下銅越吟不自然極目南飛鴻初夜汲汲書彌短悠悠夜增長貧家不具燭坐須明月光隱几四寂默隂蟲鳴我傍天時有推敓物性隨悲傷感彼忽自驚喟然發心狂壯年何所成憂患攢中腸咄嗟牛衣叟婦女知激昂國恥吾亦羞如何掃封疆譬如籠中禽左右不得翔知音古亦稀誰謂歌中商靜夜花影不可掃縱橫月明中光芒裛新露香氣生微風夜永興不淺幽人與誰同迎恩甫相别才一月相憶如一年豈無白首游不及夫子賢邂逅發寤寐奮飛絶由緣忽聞乘春浪千里下歸船雞黍可以具班荆暢幽悁公是集卷八

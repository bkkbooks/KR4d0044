body:
  text: 公是集巻四十六宋劉敞撰雜著論性人之性必善乎曰然人之性可為堯舜乎曰否性同也而善不同善同也而性不同故善有上有中有下上之中又有上焉中之中又有中焉下之中又有下焉上之上者聖也其次仁也中之上者君子也其次善人也下之上者有常也其次齊民也仁不能聖善不能為君子齊民不能有常而謂人皆可以為堯舜謬也曰苟如是人有性矣性有善矣善有等矣則學無益乎曰否玉之為物也人知其寳也有相倍差者有相十百者有相千萬者則豈一玉哉人之性何以異于是雖有萬鎰之玉不剖不見寳不琢不見用人之學何以異于是孔子曰聖人吾不得而見之矣得見君子者斯可矣善人吾不得而見之矣得見有恒者斯可矣世亂禮廢人莫自學學又不能克其性此孔子所為喟歎然則人之情惡乎曰否情者性之動也性既善矣情安云惡子見夫影乎形曲而曲形直而直夫情亦猶是矣性者仁義也情者禮樂也今夫人未有不親其親者令夫人未有不尊其尊者親親之謂仁尊尊之謂義故性者仁義也親其親驩然樂矣尊其尊肅然恭矣肅然恭者禮之本也驩然樂者樂之原也故情者禮樂也故聖人以仁義治人性以禮樂治人情未有言禮樂而非善者也背其性或毁仁義此非性之過也背其性也喪其情或棄禮樂此非情之過也喪其情也物有奪之矣是故適其理則喜違其分則怒親之則愛害之則惡生則樂死則哀此皆民之善者也君臣以此相保父子以此相親夫婦以此相睦長幼以此相序賢不肖以此相别聖人以此起君子以此治奚謂不善耶今夫水火人所恃以生也火失則焚水决則溺非水火之罪也焚者相繼溺者相及無怨乎水火而棄之者水火利用也獨至于情而以謂不善乎無已則忘其情者而善乎禽獸木石之為乎是可知也孟子曰人之性善人之性皆可為堯舜此過言也堯之時不為無人堯而已矣舜之時不為無人舜而已矣文武周公之時不為無人文武周公而已矣孔子之時可以治國家天下者惟七十餘士亦不為無人孔子而已矣安在人可為堯舜哉荀子曰人之性惡其善者偽此悖言也夫古之人曷為乃教人反其性背其真而為道哉信斯言也是聖王禮義無所積而起也楊子曰人之性善惡混此飾言也善則善矣惡則惡矣彼聖人者生而神焉其何惡之存韓子曰人之性上者善下者惡中者善惡混此虚言也昔者仲尼不云乎性相近習相逺必上者而善下者而惡是白黒而已何相近之有是四者皆非所以盡性也若孟子可謂知之矣故不知性之善者不知仁義之所出也不知情之善者不知禮樂之所出也是故有反仁義于性而為道喪禮樂于情而為達生于其心害于其躬發于其躬害于其俗聖人復起必從吾言矣憫學由周以來至于今千有餘嵗學者益多達者益少其故何耶古之學者其材非有殊于今也其所聞者皆正聲耳其所言者皆正道耳其所視者皆正色耳其所習者皆正術耳于以學道是由性之也其達不亦宜乎今之學者其材亦非有殊于古也其所聞者非正聲耳其所言者非正道耳其所視者非正色耳其所習者非正術耳于以學道由其反之也其不達不亦宜乎且古之學者非獨性之而已又多勸之以義今之學者非獨反之而已又多動之以利鳴呼居今之世學古之學不亦勤乎其勤至矣而猶未適于道不亦可悲乎雖然非學者罪也非人性不同也非道去世也時俗改矣師術衰矣復使古之人生于今世其學亦若是止矣雖然君子不可不勉也天下治之理在道道之意在經惟夫好學之士博雅之人與一時超絶者将獨至焉其亦安能如古之多達也哉雖然古之達者共逄世有位則將施之今之達者其逄世有位又将以吏為師則是其學之也未始非學于無用者也勞心于無用豈不可憫也哉嗚呼學之猶不學也習俗乆矣誰居其救此敝者其惟聖人乎論治察天下之所以不治者何也曰惟其不好善而已矣故君不好善自以為善在已矣故忘其卿大夫雖有善道不得進也卿大夫不好善自以為善在已矣故忘其士士雖有善言不得陳也如此則上無善也下亦無善也孤立自用而無所與謀矣是故法出而天下怨之令下而四海非之是何也由不攷天下之善不因天下之是天下之所謂善者上不用天下之所謂是者上不知也凡人之所疆而不足者善也所惡而有餘者惡也天下之善固不可徧攷然而傾心于善天下之善必歸之矣天下之是固不可徧因然而勞意于是天下之是必得之矣故水深而魚聚之林茂而鳥集之物理相召也夫君不好善必忘其卿大夫使卿大夫賢人耶必不留矣不肖耶君雖惡之猶苟而進如是則君不好善終身與不肖者居也卿大夫不好善必忘其士使賢人耶必不留矣不肖耶卿大夫雖怒之猶苟而進如是卿大夫不好善終身與不肖者居也君與不肖者居卿大夫與不肖者居天下亂可待矣吾本其亂由上不好善故古之眀王使卿進大夫之賢者大夫進士之賢者士進民之善者是故四海之内里巻側陋有善焉君得而用之而況親戚父兄之臣乎而況左右侍從之臣乎必不伏矣誠盡得人之歡心也是故古之眀王畏不得人之善則卑身以先之是故父事三老兄事五更立敢諫之鼓設進善之旌置誹謗之木故王者之好善如此則四海之内思致其善逺者蹶而趨之近者就而罄之能者因而陳之不能者亦問而厭之是故王者之好善如此則其臣何為不好善哉故上有善也下亦有善也博覽並用而無所疑矣是故法出而天下喜之令下而四海順之是何也由盡得天下之心者也治道之貴無過此矣雖然好善有三有好而行之者有好而任之者有好而尊之者好而行之者王舜禹是也身善矣而又好善此仁聖之度也好而任之者霸桓文是也身不能善舉善而委心馬此雄傑之慮也好而尊之者彊魏文候是也身不能善聞善不能行又不能任尊而事之天下歸其賢敵國不敢伐是亦好善之實也嗚呼能知此三者之别而致行之治國何難哉是乃孟子所謂優于天下者也言治為治者有其迹矣而迹未必可復也語治者有其言矣而言未必可常也遺迹而因于時忘言而徇于理治之大方也故昔者無懷氏神農氏封于泰山禪于梁父者七十有二君而治未嘗同此道之謂也崔實論為政仲長統善之賈誼謀匈奴班固非之自漢以來莫謂不然實之言曰明君者以嚴致平非以寛致平也大宋之興剗五代之敝除其苛虐吏以難扑赦贖為治而天下以寜南至交趾北至幽都東漸于海西被于流沙外無彊桀之邦内無羣黨之冦民不見金革之患者于今百年自三代以來未嘗有也此可謂以嚴致平者乎固之言曰誼欲試屬國設五餌三表以釣匈奴其術已疎矣先帝與戎約和内愛百姓外親隣國畧循誼之策而匈奴服從至今五十餘年自三代之盛講信修睦附疎柔逺亦未嘗有若此其乆也可謂術已疎者乎從此觀之為治者因于時而迹不足守也語治者狥于理而言不足専也故自詩書禮樂治世之具者皆遺迹而求所以迹者也忘言而索于所以言者也非仲長統班固之徒所能見也為政善為政者使人自養而非養人也使人自治而非治人也務養人者不足于養而離人務治人者不足于治而罔人曰然則如之何使人自養而人自治也曰士農工商者通工易事而相為役者也非相為賜也于是焉敏手疾力而任其事勞心竭慮而致其術既已足其父母妻子矣然後推而及于其族然後推而及于其鄉然後又推而及于其道路然後鰥寡孤獨殘疾者有懷此人之情也豈患不能養哉患不使之養也夫人之生也固㝠然其無所守固雜然其不可一是必有師友之勢必有宗主之統師友宗主者非威人以刑者也安人以徳習人以禮而已矣彼人自有師家自有宗故在上者得善民而教之得善民而教之故在上者不勞而治今夫廢人所以自養者而盡其財所謂不足而後養之所以離人也今夫人不為師而家不為宗則亷耻不立而習俗不一所謂不治矣不治而後治之所以罔人也離人者凶罔人者危故聖王務人之所自養者而養人故不乏務人之所自治者而治人故不苛言畏善者之治其民畏而不懼不善者之治其民懼而不畏何以實之夫善治者固必正其民齊其分壹其志而吾民曉然知之利雖可得不偷取也君子則顧義小人則顧法其不見若其見之其不聞若其聞之是謂畏如是者議可以廢于朝刑戮可以廢于市矣夫名誠正可傳也分誠齊可守也志誠壹可信也事當其是而行之雖不宿戒坦乎其無疑義當其否雖不先請而廢之决乎其無憂曰功就而已矣名立而已矣無有逺近也無有新故也無有疎戚也上下一之是謂不懼此無他惟其議善眀而論惡審也夫不善治則易其名錯其分貳其志而吾民無能知之事雖當是不敢行也曰忌義雖當否不敢廢也曰䜛忌則死矣䜛則離矣無有逺近也無有新故也無有疎戚也賢不肖一之是謂懼如是者在上則喪其功在下則喪其名夫民既已知功之不可致矣既已知名之不可守矣苟可利焉而引取之而已矣幸于所不見覬于所不聞其私則勝也是謂不畏此無他惟其議善不眀而論惡不審也故聞為治者謹于民之所畏與懼而善觀治者察于民之所畏與懼畏者心服也畏乃修修乃來懼者貎服也懼乃謀謀乃亂昔者三代之王使民畏故其刑省而治日廣且多功秦之王使民懼故其刑繁而治日拙且無功後世之治者慎所以懼民哉疑禮今之禮非醇經也周道衰孔子没聖人之徒合百説而雜編之至漢而始備其間多六國秦漢之制離文斷句統一不眀惟曽子問一篇最詳而又不信其問曰君塟而世子生則如之何對曰三月而告于禰吾疑非仲尼之言也古者諸侯将薨無世子則命貴公子先為之定也命之定則後無纂奪之憂雖愚人亦知其必然又惡有既殯而待世子生乎既殯而待且不可況既塟而待乎既塟而待是或曠年春秋諸侯逾年無君最其重也況曠年乎仕三月無君則相弔此仕無君也況果無君乎苟以君之重嫡不可不須焉則夫人之生也不可期苟為世子焉苟為女子焉如遂女子亦将尊之乎或曰此謂世子生而告神之禮也非須以為君也為君者先定矣此不然也其名之以世子舉之以繼體之義宰祝從之有君儀焉何謂非君或曰其諸将反先定者而授之乎曰惡是何言也為人後者為之子也彼既為後矣屢易之可乎或曰吾聞之參也魯問之㡬是乎曰問之者對之固亦宜魯何獨參也昔者春秋譏惠公不早分其嫡庶以底大亂又奚為此論哉或曰三年之間有冢宰焉此其見之曰冢宰者奚設哉設以佑嗣子乎設以待嗣子乎且冢宰亦何常之有有伊尹之心則可無則纂也安能望人人于伊尹哉其亦可知矣予以謂質家親親先立弟文家尊尊先立子聖人之意必有從乎此不在乎彼也且成王幼周公以為憂況日以冀月以望乎吾以是觀之今之禮非醇經審矣續謚法劉子曰古者生無字死無諡生無字故名而不諱死無諡故上下同之及至于周㓜而名冠而字死而諡字者所以貴其名也諡者所以成其徳也盛矣文哉劉子曰夏商之道不勝其質兩周之道不勝其文其斯之謂歟賞罰窮矣劉子曰古之為諡者有取也取于名取于號取于字賢者取賢稱焉愚者取愚稱焉黄帝號之崇也舜禹名之隆也桀紂名之汙也尼父字之珍也劉子曰爵而不諡周也爵而諡之魯也不爵而諡漢也由文已哉由文已哉嘉魯哀公誄尼父合于諡法堯舜禹湯之志作續諡五十以待後世天爵之君子成徳焉耳教化無方曰尼先覺任重曰摰述而不作曰彭信而好古曰彭隐居求志曰夷伯夷也仁義庶㡬曰淵不幸短命曰淵和而不流曰惠栁下也愚知適時曰俞寗武子進退寡過曰瑗遽伯玉恭儉好禮曰嬰晏子清浄無為曰聃耄期適道曰聃惠而多愛曰僑子産直而不撓曰肸叔向輕爵守節曰札季子居敬行簡曰雍孝友時格曰騫尚徳慎言曰适善事父母曰參使能造命曰貢子貢在約思純曰憲原憲伎之敏給曰求冉求勇而知義曰由子路文學博識曰商子夏容貎莊敬曰張顓孫師信道輕仕曰開漆雕間不得中庸曰晳曽㸃言合聖人曰若子有敬慎威儀曰華公西有徳疾憂曰冉伯牛知徳中庸曰伋子思蹈道知言曰軻隐居放言曰逸夷逸反性敦禮曰況荀兼愛尚賢曰翟上同遵儉曰翟墨子救攻上開曰鈃朱鈃獨善為我曰居楊子居巵言日出曰周荘子潔白不汚曰皓四皓言行軌物曰舒董子簡易多聞曰向劉向守死善道曰勝龔勝覃思寡慾曰雄楊子審音知化曰曠巧厯絶倫曰衡張平子達數知來曰輅管輅博物多愛曰遷良史實録曰遷説大射三侯鄉射記曰鄉侯上个五尋中十尺上个者最上幅中者最中幅也又曰侯道五十弓弓二寸以為侯中此説中幅所以用十尺者取之侯道者也又曰倍中以為躬倍躬以為左右舌此説躬與舌各一幅也又曰下舌半上舌此説上下皆有躬舌也侯中一幅上二幅下一幅幅廣二尺則與侯中方矣梓人職所謂廣與崇方者此也必先量侯乃制侯中既得侯中乃定躬舌既定躬舌乃因侯中之廣而求其崇必定而足凡五十弓之侯其中十尺其布五幅躬舌各一幅也七十弓之侯其中丈四尺其布七幅躬各二幅舌亦各二幅也九十弓之侯其中丈八尺其布九幅躬舌各二幅也其崇則中十尺者崇亦十尺矣中丈四尺者崇亦丈四尺矣中丈八尺者崇亦丈八尺矣謂之中者正以其居中也中者對上之言也有上有中則有下矣九十弓之侯布九尺以五為中七十弓之侯布七尺以四為中五十弓之侯布五尺以三分為中也大射儀曰大侯之崇見鵠于參參見鵠于干干不及地武此髙下之節也大侯崇丈八尺棲鵠于其中從逺視之則出于參之右舌下故曰見鵠于參也參崇長四尺棲鵠于其中從逺視之亦出于干之右舌下故曰見鵠于干也所以必于舌下者舌長能蔽之故以見為節矣干侯之鵠則去地武武者三尺也世言歩武歩六尺則武三尺武者迹也兩迹之間則三尺武以是名之干侯之鵠用此為髙葢㡬中矣其設之次大侯在東參次之干次之使密不至相掩疎足以射其勢參差相入是謂貍歩鄭云中猶身也身之外復有躬舌躬舌身三者異物則五十弓之侯其崇丈八尺七十弓之侯其崇二丈二尺九十弓之侯其崇二丈六尺二丈六尺既難巻舒矣至其設之又令參侯去地一丈五尺少半寸計其上綱則三丈二尺五寸少半寸也大侯去地二丈二尺五寸少半寸計其上綱則四丈八尺五寸少半寸也此之難信不俟言矣鄭意以為不若是則大侯之鵠不見于參參不見于干然雖如鄭説求之大侯之鵠終不能見于參參亦終不能見于干也胡不嘗試以勾股求之人去干五十歩干去參二十歩干髙一丈九尺二寸令人目髙七尺從干望參侯之鵠去地二丈四尺五分寸之四乃能見之今鄭所説參侯之鵠去地一丈九尺二寸髙則髙矣欲使鵠裁見不足二寸欲使鵠盡見不足四尺八寸五分寸之四從參侯視大侯亦然然則非也且鄭意謂三侯重張當使後侯髙前侯耳是與經不合經令獲者旌各負其侯執旌者欲使射者視之審也如令大侯在參之背參在干之背其去地皆數十尺雖執旌安得而負之而射者亦安得而覩之哉又經云以貍歩張三侯者非為射者之志也乃為張者之法也而鄭以為射當如貍之擬物則何預于張侯乎且司射命射惟欲卿大夫皆降再拜稽首公答拜一發中三侯皆獲是言值中一侯輒釋獲爾而鄭以為矢揚觸有參中者是又失之亦惑已哉小功不税韓子作小功不税書小功不税禮也曽子曰小功不税是逺兄弟終無服也而可乎韓子嘗弔于人見其貎慼其意哀而其服吉者問之曰何也曰小功不税也是以韓子疑之而作小功不税之書夫韓子之疑之是也彼人之為非也然而小功不税禮也韓子曰君子于其骨肉死則悲哀而為之服者豈牽于外哉聞其死則悲哀豈有間于新故死哉甚矣夫韓之達于禮而近之也雖然疑之未盡也求之不得也夫為服者至親之恩以朞斷其殺至于大功兄弟之恩以小功止其殺至于緦外親之服以緦窮其殺至于袒免聖人之制禮豈苟言情哉亦著其文而已矣大功税小功不税其文至于是也兄弟之服不過小功外親之服不過緦其至于是也因其情而為之文親疎之殺見矣故禮大功以上不謂之兄弟兄弟有加而大功無加無加者親親也有加者報之也親親者税下親親者不税是亦其情也且禮專為情乎亦為文乎如專為情也則至親不可以朞斷小功不可以不税如為文也則至親之朞斷小功之不税一也夫曽子韓子隆于情而不及文失禮之指而疑其説雖然韓子疑之是也彼人之為非也何以言之耶小功雖不税亦不吉服而已矣記曰聞逺兄弟之喪既除喪而后聞之則免袒哭之成踊夫若是奚其吉哉故曰彼人之為非也韓子疑之是也小功不税禮也然則免袒成踊則已矣乎猶有加焉曰我未之聞也雖然降而無服者麻不税是亦降而無服已哀之以其麻哭之以其情逾月然後已其亦愈乎吉也師三年觧晋髙宗伐鬼方三年克之周公征東山三年而歸夫髙宗至明也鬼方至幽也周公大聖也管蔡大惡也以至明伐至幽以大聖討大惡何必三年三年克之何足以多然而周易是稱詩人是美以謂中興之功莫髙悦使之道莫先如此殫財力曠日持乆而有勝焉亦足稱矣則豈若速成而務財豐孫呉之師不聞朽之乆也以是推之所謂三年者殆非世之所謂三年者矣故觀既濟者離下而坎上也離下則文眀莫盛焉坎上則伏隐莫盛焉以文眀之進當隐伏之退勢不能乆而東山亦曰勿士行枚吾以是觀之則三年者一年而庻之一年而富之一年而教之之謂矣且夫聖人之于天下也非私其有天下之名也哀夫民之不被其澤而亂政之罔民也是以有征伐焉豈欲亟一時之勝而遺後世之患乎豈欲貪勝之名而忘愛民之道乎是故三年者并庶之富之教之而言也夫為之徐則垂之固教之習則措之安豈若小丈夫哉戰則窮國之力而後已若不勝則以詐謀濟之故奇變詭譎以計相中邀一時之㨗而棄長乆之策故勝則遺其患于君不勝則遺其患于民此所謂不忠之大者而聖人所以貴持乆孫吴所以尚掘速也夫以孫呉之智窺桓文之徳尚不能合以規聖人之道固綿逺矣而世不知者乂以謂聖人之師尚若是其緩矣三年而後有成是故老師費財恬而勿慮宿兵玩冦安而勿疑則是俱未得其中也何謂庶之曰除其苛虐寛其征賦老其老幼其幼何謂富之曰疇其田伍治其里邑原其本業節其服用通商阜農勸功易事何謂教之曰生有以養死有以塟祭祀有法出入有儀良其師保美其官守一人莫非吾臣也尺地莫非吾有也引師而去之民効死不畔矣御龍觧天下之物無智于龍者是能乗雲氣雷雨而游乎天地之間在天地之間無微細隐隙而不容其身者其為物也可謂神矣然而昔之人得而擾之御之則以能識其嗜慾而不倍其性也凡擾畜物之道苟為不盡其性雖狎不留苟為盡其性雖不狎留之然而狎犀象虎豹也易狎龍也難彼龍者恃其才之大而智之神如有不合則去矣非若犀象虎豹之受制于人而求全于人而喪身于人也是以狎之非其道弗就也方夏之衰御龍氏死天下無傳御龍之術者龍于是去而不返若無龍焉然則非實無龍也彼其神知天下無有能識已之嗜慾而御之者故匿而不出也其不出天下始益好而奇之萬有一遇焉猶震眩顛踣竄匿而不敢視甚矣夫龍之可好而不可親也可怪而不可擾也豈實龍之情哉然而世之人始因旱而像之因水而禜之怨呼咨嗟以求其肸蠁髣髴之應者嗚呼何世之人不憚煩而與龍異好尚且至于此哉公是集巻四十六

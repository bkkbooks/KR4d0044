body:
  text: 公是集卷二十一宋劉敞撰五言律詩閔雨膚寸無時合昭回此夜逢春秋還閔雨郡國共憂農詞欲讒風伯書將詰亂龍王允書有亂龍一篇關西兵稅急懼失萬餘鍾寄江東弟兄二首分手如昨日清秋獨異鄉長年悲落木短髮怯初涼歸燕自有適幽蘭誰為芳裁書寄鴻鴈相與訪滄浪卻掃與人絶悲秋驚嵗徂山川舉俗異宇宙此身孤弔影臨清月書空向瞑烏懷歸屬吾黨浮海待乘桴薦福寺竹亭兹亭四時好秀色映長松靜境非千畝幽人如素封吹聲偏洗耳暑晝亦成冬暫到還忘返心知叔夜慵觀陜西圖二首險固非天意承平怪主憂三年勞將帥萬里問旃裘尚記安西道空悲定逺侯大河知所向日夜正東流憶昨傳消息羌來渭水旁信知秦地險未覺漢兵强青海通西域長城起朔方分明見地里悵望隔要荒送張六將漕煩明府東遊慰越吟斫氷雖楚水乘興即山陰晉卿書云欲徑走肅去去陶嘉月悠悠見子襟因君倚城關送目亂愁心送楊慥著書非白首待詔已公車試吏何用喜慰親聊自如還從近關出稍與京塵疏豈謂三年久君方就子虛君著書篇上之有詔須此任滿召試送范貫之范叔貧如此誰當與敝袍哀歌困牛角異味笑鄉豪相得空長鋏徒歸欲二毛多慙訪夷節無以慰滔滔送隱直久客意無賴送歸私自憐悠悠想行路苒苒背流年雪過兔園少春歸楚澤偏君應解冠冕笑傲辟人賢送衛州賈雲卿淇奧文雅地相門英妙才春風萬人喜都城千騎來嘯激鸞鳯響歌傳松柏哀懷賢復訪古處處為徘徊送史館齊學士知荆南唐相映之孫有權文公行修國史制書在間代唐丞相當時太史公白麻存舊物青簡見遺風鳴玉蓬邱峻專城楚澤雄由來稽古力肯效一經窮近無西事消息此心除國讎安得借前籌未報將軍捷空增壯士憂誰能占太白試為上高樓自恐匣中劔精光犯斗牛細雨細雨春城暗空郊草色微峽雲朝復暮沙燕語還飛栁帶柔堪結梅香冷漸稀旅遊時畏失數醉得忘歸小雨四首微風載雲起好雨與風俱暝色經時合凉聲入夜疏炎蒸暫灑掃天事有驅除倦客倚危枕明燈照舊書泱漭輕雲濕飄瀟晝雨來稍霑飛絮重競逼栁花開江靣春陰濶天涯暮色催郢中詞客意最識楚王臺漠漠雲蒸柱蕭蕭雨過城不時變炎景竟日度秋聲灑濯林光淨歸飛燕羽輕野夫學為圃因欲事躬耕春城頻過雨一望一增新欲曉雲成錦初晴草似茵和聲散喧鳥芳意屬游人向晚車馬息東風吹暗塵喜從兄自京回曽作東都賦無人與共論欣逢京輦客仍是鶺鴒原耳接天韶盛塵棲素袂昏秋風江海上歸夢入夷門秋晴西樓清風卷氛翳廣野露秋毫木落山覺瘦雨晴天似高開窗置樽酒看月湧江濤高卧淹湖海非關氣獨豪春日樓上二首春流抱城郭暖色媚樓臺麥秀聞雉雊鸛鳴知雨來浮煙著垂栁晴雪落新梅此地春愁闊無人共一杯躍魚依暖景歸鴈逐輕風隔水麥苗緑入簷花蕚紅郊原共欎欎雲日故融融醉眼傷千里非關江上風醉後舉眼醉向晚甘心醒似狂形骸隨酩酊談笑助軒昻舞袖翻宜窄歌聲不厭長高城湧明月風景正虛涼樹隂偶坐朝陽送微暖晴靄入寒空負暄春盎盎探䇿樂融融松下坐忘返樹端遙見紅喟然感時節舉酒屬鄰翁春隂江上浮雲聚城中暮景兼東風酒味溢小雨客愁添寒色端侵牖斜陽不滿簾滯留成楚老卑濕意無嫌雨後小亭疏雨才能潤微風未肯凉低松無限碧白芷可憐香掃榻從高卧歸禽不亂行悠悠對老圃幾與爾俱忘同伯鎮寄贈北都定雅禪師逍遙方外禪宴坐不知年合抱平生柏成區社長蓮公卿盡隨喜語默兩忘筌聞有詩三百無由一一弦伯鎮云自丞相沂公許公以來贈師詩者三百餘首矣夜坐因讀隱直書寄之徂嵗曽何急清宵不復長蹉跎問甲子愁寂看燈光峽雨蕭蕭冷江雲淡淡黃殷勤故人别容易二年彊和孫監丞送書生南游厯國向七十滔滔何日還輕齎一劔在壯節二毛斑浮俗風波裏高情天地間滯留多愠見送逺愧登山夏寒是時湖北地大震河溢六塔冥冥梅送雨椮椮麥迎秋四月應徂暑南方復重裘崑崙搖地軸渤海漲河流天事無端錯民生若許愁同黃子溫小寒隂老疑龍戰風高怯海飛枯蓬不自息歸鳥競相依時節驚流水生涯託墐扉哀歌向妻子吾道亦牛衣晨至西陽池示同行風定水逾靜雨收天倍高分明寫氷鑑深淺露秋毫車馬情頗厭山林心正勞觀魚近至樂相與更臨濠又過西陽池役役輕日月回回分簿書悵然靣止水樂矣羡游魚鷗鳥舞迎客江湖興起豫顧邀二三子退食未宜疏送信陽舒使君聞名自夙昔已作舊相知傾蓋成邂逅如何還别離軍聲咽鼓角行色滿旌麾莫怪樽前醉親鄰心所期送南儀守黃中允十年幕中客萬里海南州命服仍朱紱夸鄉未白頭山城時晝黑嶺水或西流問道林多桂王孫莫自留和閻工部新作西齊逍遙不期逺趣足外囂塵誰謂持斧客翻同高卧人江蘆烟葉重巖菊露香勻愛惜凌寒意留歡過小春次韻王寺丞北城專城空嵗月報國愧纎毫幸及農功暇初成壁壘高飛翬鄰雉堞縈帶俯魚濠與聽輿人誦無令板築勞同年陳君制䇿高第改佐著作東還餘杭作五言送行兼寄彥猷閣老使君二兄江海一逺别見君金馬門先鳴二三子强著五千言同年所對詔䇿凡五千餘言清望開中祕英辭動至尊薦賢受上賞時論重西垣同年本彥猷所薦興慶池送客紅蕖千頃合碧樹百年藤長日宜沿泝清風破欎蒸别離情易惡衰老醉那能還望邯鄲道悲歌不自勝立春日齊祠畢還過金明池寄永叔宿雨原野潤朝雲宫殿明東風未半日佳氣滿重城渙渙泉披凍欣欣木向榮江頭景如此公起探春晴送次子敏歸河陰表裡山河險成皋廣武間仕貧寧自佚待次復空還壽酒千秋祝兒衣五綵斑人生此樂少何事慘離顔泛舟溪流向人急野色背人偏輕浪仍堪鑑虛舟不費牽栁長勤拂靣鷗戲巧隨船幽興終難盡禽魚莫間然是日先飲歐公道襄漢之樂九日對酒二首慘慘霜天迥紛紛風葉黃須傾一樽酒少浣九回腸世事渾無定秋容每自傷登高何必賦㑹使鬢毛蒼懰慓看秋盡差池感嵗窮薄寒侵白罽危葉隕青楓零落茱萸佩淹留桂樹叢年光不可玩生意羡冥鴻對酒憶獻臣二首舉酒惜春盡緩歌傷别離江山空發興雞黍若為期醉起疑千日愁來獨五噫皋橋羇旅客惆悵不同時春日懷吾子羇逰各異方況逢青眼絶早識白眉良樹逐相思老江回去路長感時惟尚寐終日醉無妨汝隂送揚州通判廣陵高祕丞朱轓垂絲旒千里下揚州本郡榮何甚治中望最優高人孫綽貴節婦孟光尤問俗應賓禮清風逺鎮浮郡人深處正之高才不仕及寡婦孟氏有賢操寓居城中新作小橋幽池舊徒涉春漲得新橋自恨濟川小欣忘渡水遙中流橫螮蝀别徑㑹漁樵更愛憑欄處東風栁萬條五月十一日早行是日風寒如八九月晨興事朝謁星漢巳䦨干雲薄露猶濕風髙天正寒塵衣先改素蓬鬢强彈冠興在江湖永空歌行路難月夜獨飲霜落月更白雲開天正青捲簾邀玉兔引酒勸天星起舞憑相屬高歌願共聼春宵誰謂短罍罄適添瓶雨中贈徐監簿明暗雲移影蕭騷雨送涼逺林寒起霧清簟潤浮霜小隱交遊絶微吟杖履妨奕棊還偃几幽趣亦難忘寄和弟􅜇鴿飛砌下廣莫起寒風感物念游子賦詩同召公楚歌還落木淮月更虛弓羇旅傷離别如何嵗亦窮九日寄因甫遙想登高處姑蘇秋草多那無萬古恨少作五噫歌野菊蕭蕭晚江鴻疊疊過尺書不可託送目奈愁何九日登城北門送孫許州紅葉迎霜隕高樓近日暄送歸仍暮節極望正平原容易風吹帽殷勤菊滿樽豈嫌徑先醉當識别銷魂九日時保州軍亂殺守尉河北置烽火夏臺未平關中防秋采采黃花菊飄飄閶闔風醉從紗帽落興與古人同北嶽烽烟隔甘泉候騎通悲歌傷逺目不獨為青楓薇花宫中萬年樹天上紫薇垣此地飛塵隔經時絳雪翻幽香通復閣密影半層軒巳後陽春節無辭白露繁懷襄陽郭户曹逺身適荆楚苦掾寄書題他日相思甚終年引望迷銷憂峴山醉招隱鹿門樓勿以徒勞故全家自此攜竹西亭送二十六弟赴定州去年三月亦于此相别即崑岡䝉谷之陽山中招隱地江上未歸人那可連年别俱逄欲暮春亂飛鶯戀友北向鴈辭賓自覺雙蓬鬢蕭蕭日更新送和弟通判陜府丹紱雙紋綬朱轓左畫輪平生固自負歸去亦榮親美俗餘分陜悲歌激在陳别離俱未易因目二毛新豫與和今年皆三十餘嵗蕭山舍弟將發南都以詩候之聞道雙飛舄看來萬里流傳聲淮口渡審候越儂謳霜蟹人人得春醪盎盎浮襄賁差不惡須汝共銷憂春晴小園偶步弱弱纖纖桞朱朱白白花春風最無賴客鬢亦空華草色明深徑泉聲落淺沙江楓千里思醉眼向天涯寄鹽城舍弟得書言嵗大稔兼求作夫子廟記海邑近蟠桃銅章肯許勞公田都種秫霜蟹饜持螯宫廟比洙泗弦歌通掾曹想多記石柱非復笑牛刀蟻鬭擾擾嗟何急營營若有侵由來穴知雨非爾旱為霖王霸强并弱興亡古到今願君推逹觀安得異機心酒後登清風亭清笳轉不極碧水望偏多醲酒春先醉晴陽晚更和起提如意舞自擊唾壺歌芳樹知多少春游奈汝何同持國過江十新作池亭三首築榭因高栁疏泉激淺沙登臨容展席游泛足浮槎露碗涵醇醴冰盤餉美瓜愛君難興盡未醉惜還家菡萏千枝發池塘五月秋香繁初過雨影密欲藏舟魚躍知琴樂鷗飛為客留江湖未成往愧此意悠悠吏隱由來事郊居故自宜池臺隨意定泉石象天為珍樹移時語清風竟日棊市朝情久厭野老不相疑寄鳯翔舍弟早悟出處際同歸羇旅間從軍差復樂捧檄莫思還百仞磻溪水千巖大白山異時曾想見乘興輒躋攀百里異形影況今殊楚秦隴雲虛引領江月漫隨人愁恨西山雪驚心絶塞塵寄書懸勝夢鴈足莫嫌頻俞氏甥及第後赴壽春尉立别爾門大父行俱是雲霄人諸孫自駿骨高第復青春試吏小山下還家芳桂新當成我宅相寧肯滯埃塵勸耕亭晚望田家作田廬非一處微徑自相通日下耕釣息林邊言笑同此雖人問俗獨有方外風吾亦畢婚嫁還從擊壤翁危樓尚有危樓在猶傳羽駕歸悲歌城郭是故老姓名非積水浮天宇孤雲繞翠微逺遊悲世俗思見菊花衣四望樓二首白露參差晚丹楓㸃染深高樓延逺恨嘶馬動歸心留客小山桂愁人思婦砧昏鴉稍欲集塹黑倒城隂展步乘幽興登臨當逺遊涼軒不用扇高樹自知秋月出潮聲湧雲生嶽色浮旅懷雖易失無奈角聲愁中元雨後招兩漕積水吾山溢輕風汶篠秋微涼禁魯酒清唱發齊謳小雨何須急髙雲更肯留知公興不淺能醉月邊樓小雨朝歸東軒小雨車馬息微風窗户虛塵埃頃灑掃蠅蚋一謳除高枕華胥夢忘言藏室書不知吾喪我安更問其餘雨中北軒草樹朱明晚雲霓白日頽幽居誰與適山鳥獨無猜蠧實危將墮衰花冷自開秋光殊不意頓入眼前來西郊候客西郊逄故人傾蓋暫相親車馬有行色衣裳棲洛塵問笻出冉筰詢道自峨岷卻話别時意悠然巳四春中秋月榭飲㑹清秋望不極涼月夜還新河漢初無際山川共絶塵舉杯光可挹起舞影相親此興何曾淺風流憶古人獨行南山半雲雨天氣雜暄寒野興宜獨往春愁無定端鳥聲來靜聽栁色入遙看卻謝芳樽酒悠悠誰與歡石少傅致仕獨持子房計欲伴赤松仙猶行少傅事更覺大夫賢疏受以少傅老歎者日賢哉二大夫詔䇿容就問子孫隨拜前顧嫌越相國逺泛五湖船望沙樓為高氏作朱軒映粉堞遙出夕陽中雲雨通巫峽江山入楚宫登臨餘壯觀瀟灑向雄風萬事隨陵谷滔滔水向東楊子寺送彥猷閣老去年四月某别彥猷于京師到今適期年矣一年再逺别塵世令人嗟況復江湖永空驚鬢髮華青山浮海上逺水即天涯出處俱萍泛懸知後㑹賖出山自檀州東北入山到鐵漿館出山凡八程萬里亘東西連峯隱朔陲氣纒冰雪慘險極鬼神為逼仄單車度盤桓壯士悲今朝識天意正欲限華夷隂山隂山天下險鳥道上稜層抱石千年樹懸崖萬丈冰愚歌愁倚劒側步怯扶繩更覺長安逺朝光午未升占晴三首小雨何曽濕輕雲苦易開蛟龍自喣沫江漢欲飛埃碧草寒仍短喧禽去不回楚山長對日未信有陽臺白日麗江上初晴風景饒春愁來集眼暖氣起連宵曠野蒼茫合饑鳶上下飄長亭送行處稍復栁垂條巫峽空多雨江南自有春瘴排寒色早晴發嵗華新地暖仍餘濕風和欲起塵舊傷千里目巳復覺愁人登揚州城北門豫昔侍親寓居此城下驛舍十八年矣愴然感動昔釣城下水今來十八年居人幾能在里巷獨依然手種成喬木躬耕有廢田悲歌顧千騎不覺涕淪漣有懷北歸寄張四和弟安得生羽翼超然成逺遊探書下禹穴問禮適東周賢聖有遺迹江山俱早秋西風日夜急無事獨淹留金山寺水面塵土少山頭炎景微蛟龍能護法魚鳥各忘機山有龍穴及山禽巨黿之屬皆馴空寂見佛事幽閒滯客歸蓬萊似咫尺擬縱海帆飛送張介歸山中君歸湖上山寄傲白雲間巖樹定未改春條應可攀曽隨太守薦近揖上公還知子不貪貴令人思閉關寒鴉天清北風厲日落亂鴉栖望逺影如疊聼長聲漸低月中驚不定城上暗仍啼出處乘朝夕應無失旦迷舍弟及楊十七尊兄同年登科賀彥文紫禁過從密青雲步武通文章一朝盛兄弟兩家同結綬輕蕭育忘年似孔融相看各相喜安得恨途窮冬暖南服已卑濕隆冬方晏溫夏蟲輕火伏葛履易霜繁誰復謀吹律吾真笑負暄爰居或避地亦慰異鄉魂山暖桞河館通谷近中原初陽生舊年欣欣林動色漠漠野浮烟鳴雉飛朝日新芽發暖泉東風彊人意車馬亦翩翩公是集卷二十一

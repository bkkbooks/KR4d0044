body:
  text: 公是集卷三十二宋劉敞撰奏疏上仁宗論吳充不當以譴責禮生被逐臣伏聞同知太常禮院吳充鞠真卿並除知軍差遣館閣補郡蓋是常事資序之間亦無重輕今者在外論議皆云鞠真卿曽因自陳先有指揮而吳充只緣公事譴責禮生以此忤旨不審虛實但此聲既布此體可惜何者吳充官則博士職則禮院朝廷欲有興為詢求宜適而胥吏輒敢擅發印狀曽不稟問此則豈惟輕侮吳充而己實亦上忽詔旨在于事體不得不怪而太常寺長官初不糾按開封府受牒又曲為容庇觀此首尾乃是禮生可誅太常寺可責開封府可劾而吳充可賞也今既未然禮生一以贖論禮官隨而斥罷自然衆情不能無惑也朝廷久安吏習因循百司庶府處處苟且稍激厲振職尚未有知如何更行此事恐淺近之徒因以為戒且見吳充以振舉職事被謪以譴劾胥吏被逐不如苟且豈不傷事豈不害政哉先王所以下酌民言釋疑止謗蓋為此也伏望神慈追正前命臣初拜官謝恩面䝉開許有不便事得以奏陳奉承以還不敢失墜竊謂外間此議實稱不便上仁宗論大臣不當排言者臣昨聞吳充黜官馮京落職將謂其人所行實有過當所言實有不可是以觸忤聖意不䝉矜恕及于延和殿奏事面奉宣諭充乃是振職京意亦無他中書惡其太直不與含容臣竊驚駭不覺憤咽前古以來惟有人主不能容受直言或致竄謫臣下今陛下慈仁好諫寬大如此不知中書何故不思將順聖意之美要須排逐言者今四方之人不知本末反謂陛下不能聽諫口謗腹誹所損不小且如此事陛下心所必恕中書卻欲必行是蔽君之明止君之善侵君之權增君之過苟要作威驚動朝望今後雖有不公不直人不敢言得以利口得以罔上陛下不可不深察也臣按六經舊史大臣蔽君之明止君之善侵君之權增君之過者皆為不忠陷于刑誅況今時人情逺不如古若聞陛下欲為而牽于大臣大臣欲作威而不憚陛下則必相率背公向私奔競權門矣此風一動此勢一失是為君與臣同國聖人之至戒也魯僖公時頻致天旱春秋謂由公子遂専權之應而洪範五行僭則常晹䝉則常風下侵上則山崩地震日月薄蝕如今者此事逆于倫理必恐感動陰陽或能遂致災旱風霧山崩地震日月之眚望陛下留神深察此言臣以淺近荷陛下厚恩不敢不報竊恨此一事近世未有臣雖口陳未能詳盡謹手書具奏以聞再上仁宗論大臣不當排言者臣前月十一日延和殿奏公事因論吳充馮京謫官本末面䝉宣諭云中書怒其直不與含容臣其時曽奏言若如此則大臣蔽君之明専君之權而擅作威福也必恐動感陰陽有地震日食風霧之異今臣竊聞鎮戎軍地震一夕三發夫臣所言五日之內爾又京師雪後昏霧纍日復多風埃太陽黃濁此皆變異之可戒懼者也臣所以先知必然者按五行志云事雖正専之必震況其不正乎又尚書洪範䝉常風若而京房易傳臣之蔽君則䝉氣起以此數者合之必知有異也然皇天保祐陛下至深至厚以災異隨事輒應欲陛下覩變自戒永綏四方也不可不思不可不憂今陛下推誠委信大臣而大臣依勢作威政事不平如此甚衆在外畏憚己非常時陛下宜深究天地之意收攬威權無使聰明蔽塞法令不行則足以消伏災異矣臣前己奏陳故敢再述所聞特乞留中詳加省覽上仁宗乞固辭徽號臣伏見宰臣率文武百官詣東上閣門拜表乞加上尊號准批答不允此誠見陛下恭遜持滿惡盈好謙之意且陛下自寶無以來不復加徽號近二十餘年矣沖遜之德上通于天下信于民此上天所以保祐聖躬受福無疆萬民所以愛戴聖政日新一日者也今實不須稍增數字示人自滿臣竊願陛下固執雅意羣臣雖十上表堅遜勿受足以益見積年沖遜之實必大得天人之祐且陛下尊號既已云體天法道欽文聰武聖神好德盡善極美矣復曰大仁不足增光而曰至治則有若自矜今百姓多团倉廩不實風俗未清賢否混淆獄訟繁多盜賊羣輩水旱繼有雖四夷初定然本以重賂厚利羈縻而服之非畏威慕義者也未可謂至治然則遜而不居于聖德彌高矣今羣臣皆以加上徽號為請而臣獨望陛下以固辭徽號為願其心則同欲尊君同欲愛君然望陛下裁之聖慮參之美志斷而行之則有高世之名與道同符豈數字可盡哉再上仁宗乞固辭徽號臣近上封事欲望陛下堅遜尊號今己兩奉批答不允願陛下遂執此意斷在不疑且陛下不加尊號己二十年謙沖之德超絶前古簡在帝心人臣歸美夫以二十年行之一旦改之于義不可蓋推善歸美以尊君父者臣子之常節也遜德惡盈以保天下者聖人之至道也臣謂陛下永執至道以當天心必有一謙四益之報增加數字未足發揚光輝實恐反纍陛下二十年昭升之美又入今嵗以來頗有災異日食地震雨雹大雪飛蝗涌水傷害廣逺以理論之陛下寅畏天命正當深自抑損豈可于此時加上尊號昔伊尹戒商王曰有言逆于汝心必求諸道有言遜于汝志必求諸非道今臣此言逆于心者也誠望陛下求諸道而己三上仁宗乞固辭徽號臣兩貢愚忠欲望陛下辭不受所加尊號似未䝉采納臣豈敢阻衆人之意豈敢損主上之美實以為崇陛下之稱號不如明陛下之謙遜徇臣子歸美報上之心不如廣君父克己畏天之道此事至重至大在陛下力能行之不當復詢左右之臣今羣臣五上表聽之則頓失二十年謙遜之美不聽則合于嚴恭寅畏持盈克遜之義亦令四方無窺聖德之淺深臣雖狂暗竊重惜此不敢不再三陳聞上仁宗論皇女生疏決賜豫臣伏見今月二十八日疏決在京繫囚雖恩出一時然在外羣情皆云聖意以皇女生故賜慶澤恐非王者之令典也去年閏月己曽減降尚未半年復行此恩傳稱民之多幸則于國不幸再赦好人喑啞前世明君賢臣論此詳矣雖成事不說臣願朝廷戒之又聞多作金銀犀象玉石琥珀玳瑁檀香等錢及鑄金銀為花果賜于臣下自宰相臺諫皆受此賜臣謂陛下無益之賜無名之賞殆無甚于此若夸示奢麗臣以輔主為職奈何空受此賜曽無一言焉遂事不諫臣願陛下戒之伏惟皇上開祐聖德故後宫有多子之祥陛下當明謹政令深執恭儉以答上天之貺建無疆之基不宜乎姑息之恩以損政體出浮穴之費以隳儉德臣雖鄙淺竊獨惜此故敢觸冒陳聞惟賜裁幸上仁宗論水旱之本臣伏見城中近日流民甚多皆扶老攜幼無復生意問其所從來或云久旱耕種失業或云河溢田廬蕩盡竊聞聖慈熌其如此多方救濟此誠陛下為民父母之意足以感動羣心臣猶謂但可寬目前之急而己非救本之術也譬如良藥療病必先審其病源病源不除强食無益今百姓之病己可見矣父子兄弟不能相保鰥寡孤獨不能自存强者流轉弱者死亡所以致此者其源在水旱也所以致水旱者其本在陰陽不和也所以致陰陽不和者其端在人事不修也然則三公之職主和陰陽而議臣之任主明天人陛下何不責三公以其職使之陳陰陽不和之理詢議臣以其學使之述天人相與之際參之聖心以觀今日政事若陛下所委任皆己得人所施皆己應天則水旱者蓋無妄之災不足畏矣若天人之際少有不合豈得晏然坐視其病心知其源不思救之哉臣言似迂其理實切今羣臣為陛下謀者不過煮粥糶米名為救濟其實亦欲欺聰明自解免而己非謀國之體也又今天氣當暑反寒率多常風雨澤愆候秋成不可必願陛下速思所以救其本者召致和氣無令聖心重增焦勞則天下幸甚上仁宗論災變宜使儒臣據經義以言臣伏以聖主所甚畏事者莫如天所甚聽用者莫如民是故觀天意于災祥詳民情于謡俗因災祥以求治之得失原謡俗以知政之善否誠少留意則皆燦然矣前古賢聖之君莫不循此以導其下忠信之臣莫不緣此以諷其上上下相飭而自天祐之竊見朝廷每有吉應嘉瑞則公卿稱賀至于災異非常可怪之事則寂然莫有言者雖歸美將順臣子之常操而于戒警吁俞理似未盡陛下復不自延問以求天意恐非所謂小心翼翼昭事上帝聿懷多福者也臣愚以為五經災異之說最深最切凡四方所上奇物怪變妖孽沴疾有非常可疑者宜使儒學之臣據經義傅時事以言若其言是可當天意若其言非足以廣聖聰如近日雨雪驟寒人有凍死者此亦災變之一端矣惟聰明睿知深思逺慮順時謹微不可不慮也臣忝近列愚不能通古今竊觀前世商高宗周成王畏天威享福祚之益誠願陛下留意于此臣不勝區區上仁宗乞濶略唐介之罪臣伏聞陛下以殿中侍御史裏行唐介言事狂狷責授春州别駕尋又聞陛下以春州險逺瘴癘之地憐其孤危將不生全改授英州此誠陛下聖德厚恩容忍臣子萬萬無窮也臣竊觀詩書所載帝王之君德莫盛于知過仁莫大于好生名莫榮于聽諫陛下皆踐之且唐介居下訕上至陷于戾而陛下察其本心以忠信為之故曰知過既責介身投之逺方而復憂其不全故曰好生當介初得罪之時中外震動以言為戒及聞徙還英州人人欣幸知陛下無意殺之忠義者更思竭盡故曰聽諫臣不勝幸甚聞伊尹戒商王曰有言逆于汝心必求諸道有言遜于汝志必求諸非道此商所以保乂四海格于皇天者也臣竊謂介之所言雖逆耳求之于道亦當有合者陛下幸寬全不誅矣若復濶略其罪優游其身俾得省過追咎復齒朝列于以開廣言路勸來者則盛德無疆高視上古臣不勝犬馬之心上仁宗論狄青宣撫當置副使臣聞朝廷以狄青宣撫荆湖經制盜賊而議不置副臣以為不便或曰置副而使中人為之臣又以為不便臣聞上古王者之遣使命將也必為之設介二參佐非獨司紀綱廣謀策而已亦以謹大事備不然也今擁數萬人之衆連四路之師節制萬里吉凶所繫而單車臨之孤拱獨立猝有疾病不意之虞無所仗託莫相維持非計之得也狄青起于行伍而遷樞近天下誠未見其美方以盜賊之急擁兵而出故人人相望風采願聞成功以得貞固幹略之臣參職共事設以中人為之必大失事望足以示陋非朝廷之光也臣故曰議不置副不便置副而使中人為之亦不便此臣所以拳拳也蓋先事而言者常若迂濶後事而言者常若不及惟陛下留意芻蕘謹重軍旅之任上仁宗請諸州各辟教官臣伏見近敕更張貢舉條約欲令四方遊士各歸其鄉里而有司得以觀行聽言絶濫進之弊此誠上近古制下適時宜然臣猶謂必欲人安其居皆有常心漸之于仁摩之于義化民成俗則莫若開庠序以收養之設師弟子以教誨之月考時試以勸勉之教定俗成然後賢不肖立見而真僞不雜矣今州郡皆有學學皆有生徒而終患無師以教之但令掾曹領其事職既不専教用不明自古儒學之官不兼治民蓋為此也臣欲乞州郡有學處聽長史各奏辟教授一員于前任判司簿尉中選有文行堪為人師者充仍令以四年為一任學理考數官資俸祿同之掾曹則學有常師教有常業士子競勸矣于朝廷長育人材之意誠未失也今欲游壯歸鄉而不為設學則無以收之設學而不為置師則無以率之置師而不立課試講習之法則無以成之三者名存實亡則學者不歸雖欲别賢不肖興亷讓崇鄉黨之化不可得矣惟陛下裁許上仁宗論龍昌期學術乖僻臣聞人主所謹一嚬一笑誠以衆人所望視天下所倣效者也古者聖王之行賞也服物之章不可幸得府庫之財不以濫豫前日朝廷以龍昌期所著書下兩制臣等觀其穿鑿臆說詭僻不經甚至毁訾周公疑誤後學難以示逺乞下益州毁棄板本未聞朝廷卓然有所施行今忽加賜五品章服及絹百匹臣未知誰主為姧邪崇僞飾虛附下罔上以誤陛下執政乂曽不能謹重政體顧畏公議苟慰藉人情賣弄國恩其失豈特嚬笑之間哉按昌期之書違古背道所謂言僞而辨學非而博是王制之不聽而誅者也陛下哀其衰老未便服少正卯之刑則幸矣又何賞之哉昔孔子作孝經以非聖人者無法乃比不孝之罪要君之罰而朝廷顧多昌期之毁周公臣所不曉也且陛下使臣等議之臣等不敢不盡忠既而棄其言焉豈以臣等為蔽賢而害能乎夫蔽賢而害能人臣之大罪也願陛下因正臣等之罪而大表顯昌期之書使天下皆服誦而習尚之則可以釋謗于萬世矣自非然者置臣等之言而不用縱昌期之妄而不誅乃反褒以命服厚以重幣是非貿亂沮勸顛倒使迷國之計行于側而非聖人之俗倡于下臣竊為陛下不取也書曰天命有德五服五章哉夫章服固天所有而財力又民之所出也陛下奈何曲徇大臣之意而苟榮小人之身乎將使逺方寡見淺聞之民奔走于辨僞之學沈沒于非聖人之論迷而不反非國家之利也伏乞追還詔書斷天下之疑議毋使有識之士窺朝廷之淺深臣不勝拳拳上仁宗論景靈宫不當建郭后影殿臣所領禮院得御藥公文稱奉聖旨送畫到景靈宫廣好殿後建郭皇后影殿圖子一本詳定者其圖子已别具狀繳奏訖臣伏見近日京師木土之功靡耗國用其弊特深原其本因只為差內臣監修利于偷竊官物及訖功之後僥求恩賞以故多起事端務廣興作其甚則託以祖宗神御張皇事勢近年以來如此興造略無虛嵗伏以景靈宫建自先朝以尊奉聖祖陛下又建真宗皇帝章懿太后神御殿于其間天下之人皆知陛下奉先廣孝之意然則此宫乃陛下奉親之所今乃欲以後宫已廢未復之后建殿與先帝太后並列有瀆神靈莫此之甚臣竊謂事決不出于聖意皆小人私與興作有所僥求爾蓋自前世帝王于宗廟之外別為廟享以追奉祖宗者則有之未聞有自追奉其妃后者也蓋小人不識事體但苟一時之利不思損虧聖德伏乞特賜寢罷以全典禮上仁宗論孔宗願襲文宣公臣等謹按漢元帝初元元年以師孔霸為關內侯食邑八百户號褒成君而霸上書求奉孔子祭祀元帝下詔曰其令師褒成君關內侯霸以所食八百户祀孔子及霸卒子福嗣福卒子房嗣房卒子莽嗣皆稱褒成君平帝元光二年始更以二千户封莽為褒成侯而追諡孔子曰褒成宣尼公以此觀之則褒成者國也宣尼者諡也公侯者爵也褒成宣尼公者猶曰河間獻王云爾蓋推宣尼以為褒成祖非用褒成以為宣尼諡也唐世不深察此義以褒成為夫子之諡因疑霸等封褒成者皆襲其祖之舊耳故遂封夫子文宣王而爵其後文宣公考校本末甚失事理因循承襲至今不改先帝既封泰山親祀闕里又加文宣以至聖之號則人倫之極致盛德之顯名盡在此矣尤非其子孫臣庶所宜襲處而稱之者也臣等以為無擇議是可用其文宣王四十代孫孔宗願伏乞改賜爵名若褒成奉聖之比上足以尊顯先聖有不階之勢下不失優禮孔氏使得守繼世之業改唐之失法漢之舊傳曰必也正名乎又曰正稽古立事可以永年此類之謂也上仁宗論折變當隨土地之宜臣聞聖王之處民也順其性是故居山者不使居川居渚者不使居中原其取民也任其宜是故山虞不以魚鼇為賦川衡不以材木為貢蓋順其性者知天者也任其宜者知地者也聖王之功不變天地是以其養易足其教易成其求易貢其取不匱今之時善言政者莫不欲富民欲富民而常患奪其財者由有司取之反其性而戾其宜于是或以穀為金或以芻為帛稗非精也而求之不舍民是以困窮是以流亡是以盜爭朝廷豈不恤哉蓋不得己也臣以為方今用度不足之時欲盡如古蓋亦不可且敇有司毋責魚鱉于山毋索材木于川則百姓亦庶幾矣臣非敢虛言也臣所治州十縣其五皆種種稑而有司乃使以糯與粳為賦一不如約吏當坐之若此者上則不順于天下則不因于地中則不悅于人去聖王之功逺矣惟陛下哀憐之臣幸備職事以治民為職詔書問可以寬民者臣竊疑莫先于此夫賦稅固自古有之臣願敕諸轉運使必不得己而變折其所有毋變其所無變其所可得毋變其所不可得則民疾不困矣上仁宗論城古渭州有四不可臣今月二十二日奏公事臣得預上殿親聞德音以謂古渭州存之則為害棄之則傷威兩者未決詢及左右指音懇惻臣誠獨美陛下聰明謙遜好謀無窮也臣雖不聞公卿之議然臣之愚以為棄之便何者朝廷與羌戎約和久矣今一旦奪其地而城之棄明信規小利使外國有以窺中國不可一也羌戎種落非一族也自見稍侵必人人懷疑交謀間諜以新城為比或能相率大為邊患不可二也自始築城到今半年耳所費己巨萬計秦州為空竭而調終饋運不可勝紀設復屯兵守之日引月長財盡力竭則關中皆可憂不可三也向者敵出爭利多殺官軍數千人後雖擊破其衆足以相當而敵怨益深其志復得故地而已兵若不解憂患方起不可四也假令新城足以蔽秦州長無羌冦之虞雖傾國守之可也不然地形便利賊能乘之以窺邊圉雖傾國爭之可也今失所重輕而糜國財用困民力損士卒之命以貪此咫尺之地計功則可辱言利則可恥慮患則可憂昭昭甚明而談者不忍決之謂為傷威臣所不諭也昔者舜伐三苗三苗不服益贊于禹班師振旅而有苗來格由此觀之帝王之威在使物畏之不在使物惡之故動以義順于理則物畏之矣動以利逆于理則物惡之矣畏之則服惡之則侮自然之道也武帝黜丞相御史之請而止不田車師輪臺則天下復平元帝用賈捐之之策而罷珠崖則中國復安故以德言之則不過舜禹以强言之則不過漢武帝以馭外國也患枉于義不患力不足也患逆于理不患威之損也惟陛下察于此兩者以觀利害之熟在謀之貴多斷之貴獨明鑑所以見容古事所以知今臣不勝狂直之至上仁宗論溫成立忌臣伏聞敕旨為溫成皇后立忌禮官請對不許臣竊惑之凡朝廷常務百司小事猶當上稽舊典下採衆論何況宗廟大禮至尊至重豈可以一時之寵獨決聖心義有僭失貽笑萬世虧損盛明悔不可追今議者乃云有邪臣密啓眩惑聖聰導陛下以非禮勸陛下以拒諫若此無實尚非美事設有其實罪亦大矣當伏兩觀之誅以謝天下且自太祖以來后廟四室皆陛下之妣也猶不立忌奈何以溫成私昵之愛變古越禮則貴妾于妣尊嬖于嫡上無以事宗廟下無以教後嗣恐祖宗神靈不樂于此非陛下奉先思孝之意也昔成湯改過不吝故稱聖王格于皇天願陛下毋篤于嬖近之寵毋安于邪佞之說毋變先帝之舊典毋枉宗廟之正禮回易意慮卻情去私詢于司存追寢過命使萬萬億年無復譏議天下幸甚臣以無能忝備儒館禮樂之失臣得預言上仁宗論輔郡節制臣伏覩詔敕建置輔郡改張官司實欲開廣王畿增重京邑垂制久逺强幹弱枝者也然臣竊有所惑以為許鄭陳滑曹既在寰內則不當復存軍額猶稱節鎮節鎮之設蓋古方伯連率之謂非寰內諸侯也凡改制立法固必關盛衰之中然後可以永世無弊者孔融疾曹操専法漢室寡弱于是建議欲復古千里之制不以封建操遂惡融終于害之然此本由漢家制度無法不稽古爾設令京師諸侯素有分限則强臣何由因緣以覬覦今朝廷甫欲建設近輔周衛都內誠不宜復存五州節制之號以開後世諸侯因緣封建之萌何況今之節制重于古之封建孔子曰必也正名名之不正五變之末至于民無所措手足故不可不審也漢武本置三輔皆治長安中非不知鼎立千里之內為便也其意乃實不欲使億兆之衆偏有所分而已及唐雖以同華為二輔各自一郡然猶不立軍額者皆方面征鎮當一道者也臣謂今日事體固當法之忠武彰化等軍額盡可停罷獨存其州名于理為允伏乞令近臣詳議上仁宗論日食用牲于社非禮社者上公之神羣陰之長故日食則伐鼓于社所以責上公退羣陰今反祠而請之是屈天子之禮從諸侯之制抑陽扶陰降尊貶重非承天戒尊朝廷之義也公是集卷三十二

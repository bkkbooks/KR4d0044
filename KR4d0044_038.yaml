body:
  text: 公是集巻三十八宋劉敞撰論易本論易曰太極生兩儀兩儀生四象四象生八卦此何謂也曰太極者天地之先也未有清濁未有剛柔未有上下未可以物名故謂之太極也太極将判則清者始上濁者始下上下絪緼而未可以天地名有其儀而已矣此之謂太極生兩儀也雜乎兩儀之中芒芴之間是始有水火木金土之象是始有一二三四五之數是始有東西南北中之位而未可以五行稱有其象而已矣此之謂兩儀生四象也一三五者陽二四者隂陽之數九隂之數六因其九而三之則得乾因其六而兩之則得坤此之謂參天兩地此之謂乾元用九坤元用六且夫天者積陽也地者積隂也凡積之類老老則能變矣故乾一變而得震坤一變而得巽乾再變而得坎坤再變而得離乾三變而得艮坤三變而得兌此之謂乾道成男坤道成女此之謂四象生八卦也或曰子言則羙矣理則深矣願聞水之所以一火之所以二木之所以三金之所以四土之所以五其先後多少之序者氣耶數耶曰氣也亦數也兩儀之氣合而生沖和之氣生于于子者黄鐘也其位北方當十一月而一陽生故水數一也黄鐘之氣下生林鐘林鐘者未之氣也其位南方當六月而二隂生故火數二也林鐘之氣上生太蔟太蔟者寅之氣其位東方當正月而三陽生故木數三也太蔟之氣下生南吕南吕者酉之氣也其位西方當八月而四隂生故金數四也南吕之氣上生姑洗姑洗者辰之氣也其位東南當三月而五陽生故土數五也故因其先後之序而數之則水一火二木三金四土五因其隂陽之位而數之則亦水一火二木三金四土五此自然也曰子之言者蓋五象而謂之四象何也曰土者兩儀之别也先四象而生後四象而用四象賴之而有故不名一象而寄其位于東南也東南者辰也胡不寄之西南而寄之東南土者非有正居也順取一位而已矣曰黄鐘者冬至之氣也一嵗則一至十嵗則十至而子以能生謂四象何也曰是乃所以能生四象也天地之氣一而已矣其之北者則為寒其之南者則為大熱其之東者則為大温其之西者則為大凉寒謂之水熱謂之火温謂之木凉謂之金天用其精地用其形而人不知耳苟明其一嵗一至十嵗十至推而上之至于千嵗千至萬嵗萬至又推而上之至於未始有物氣之至也有止乎又何怪不生四象哉曰請問天有六陽自子至已地有六隂自未至亥今黄鐘生陽則宜傳之大吕而反傳之林鐘何也林鐘傳之太蔟則是矣太蔟傳之南吕又何耶此為復有一陽氣乎固同物也曰此自同物而隂陽有尊卑授受有順逆耳陽尊隂卑尊者專其位卑者不敢專其位必寄之于其衝以求就陽也故黄鐘下生林鐘而大吕之氣應者寄之大吕也太蔟下生南吕而夾鐘之氣應者寄之夾鐘也姑洗下生應鐘而仲吕之氣應者寄之仲吕也蕤賓上生大吕而林鐘之氣應者寄之林鐘也夷則上生夾鐘而南吕之氣應者寄之南吕也無射上生仲吕而應鐘之氣應者寄之應鐘也此皆其衝也此之謂妻道臣道地道故妻從夫臣從君地從天其義一也曰請問乾坤生六子而乾坤六子並列乾居西北坤居西南何也曰八卦者皆出四象四象生八卦則八卦不得不並列也其位有先後耳乾者天也天道貴陽陽者皆属天坤者地也地道貴隂隂者皆屬地陽始于子終于戌置乾于子戌之間者此陽之終始也隂始于未終于酉置坤于未酉之間者此隂之終始也曰何謂大衍之數五十其用四十有九曰衍者積也天地之數始于一積于十聖人參天兩地而倚數故衍天之參則為三十衍地之兩則為二十所以參天兩地而不一天兩地者一不可用也故乾積三坤積二而不積一一者乾坤所不用是以其用四十有九何謂乾之策二百一十有六坤之策百四十有四皆老陽老隂也何為皆老陽老隂也乾無少陽坤無少隂也然則老陽何以九老隂何以六曰乾積三以為九故老陽九也坤積二以為六故老隂六也少陽何以七少隂何以八曰老陽則生少隂老隂則生少陽隂陽之相生猶環之無端陽道作息隂道作消七者言益一于老隂也八者言損一于老陽也易何以獨用七八九六為占乎曰天一地二天三地四天五地六天七地八天九地十皆五行也五以上為道五以下為噐聖人用其道以畫卦用其噐以推數土者四時所不載也故上則并于四象下則遺而不用此聖人作易之本也何謂陽卦多隂隂卦多陽曰索乾者為陽震也坎也艮也皆乾之索也索坤者為隂巽也離也兌也皆坤之索也乾之索皆一陽二隂非多隂歟坤之索皆一隂二陽非多陽歟何謂陽卦竒隂卦偶曰震一也巽二也坎三也離四也艮五兌六也是竒偶也陽必畫五而後卦隂必畫四而後卦是竒偶也何謂陽一君而二民君子之道隂二君而一民小人之道曰陽者君之象隂者民之象陽者君子之事隂者小人之事陽卦一陽而二隂非一君而二民歟隂卦二陽而一隂非二君而一民歟一君而二民非君子歟二君而一民非小人歟敢問二君而一民奈何曰執徳不一斯二君也政出多門斯二君也有國家天下而不能守賢聖将因而興百姓各擇主而歸之斯二君也此所謂小人之道也重黎絶地天通論昔天地之始判也清者在上濁者在下在上謂之陽在下謂之隂其已久矣然而書獨曰重黎絶地天通何哉曰凡天地者名也清濁者體也隂陽者氣也是雖人物而有上下之異然其治乃反在人人者天地之心也故人道治則天地適其位清濁安其常隂陽辨其序人道不治則上下交亂矣其名雖不變其體雖不雜其氣雖不改然其政擾矣故古之治天下者必有神民之官以序天地蓋惡擾也凡親上者本乎天者也親下者夲乎地者也是以神之事皆屬天民之事皆屬地毋以民亂神毋以神惑民則天地之道得矣然則上下不位乎隂陽不安乎幽明不别乎所謂重黎絶地天通者此也昔觀射父既言其略矣未盡其方也則世雖有重黎而欲絶地天通何由哉吾請言其方凡天子祭天諸侯祭土卿大夫祭五祀士庻人祭其先天子七廟諸侯五廟卿大夫三廟士一廟天子祀以犢諸侯祀以牛卿大夫祀以羊士祀以豕天子有禘有祫有享有薦諸侯祫而不禘卿大夫享而不祫庻人薦而不享天子以公為尸諸侯以卿為尸大夫士以孫為尸天子事尸十有二獻諸侯九卿大夫七士五天子之祭天下助諸侯之祭一國助卿大夫之祭一邑助士之祭朋友助天子舞六代之樂諸侯舞時王之樂大夫以下不樂也故貴賤有禮上下有等而不相逾所以治神也士以徳農以力工以巧商以利二十而冠三十而娶五十而衣帛七十而食肉不耕者祭無盛不績者喪無服不事事者出夫家之征師教之也宗收之也友攝之也吏治之也卿賓之也生有所依死有所歸不犯非禮不慕非福則人勸其業而刑是用措所以治民也此可謂絶地天通矣今庻人而得祭天地旅山川祀非其鬼卿大夫不得立宗廟可謂治神乎庻人服侯服食侯食居侯居男不耕女不蠶起而相隨以事神為俗無父子之親無君臣之節下者乃為巫祝略計天下常百萬人可謂治民乎由是觀之重黎之業已矣然則天地不通乎人神不擾乎上下不瀆乎百事不隳乎鳴呼明吾言者可以治天下矣雖使重黎復生何以易此哉師以賢得民論先王治天下有不勞而民自為正者治之至也不勞而民自為正者其惟師乎天地生之父母養之而師教之然後内可以事親外可以事君大可以治民小可以治身矣故師者非他也所以使人知事親之道事君之義治民之術治身之法者也有人于此内不足事親外不足事君大不足治民小不足治身則禽獸無以異矣知自别于禽獸則必從師以學之故師者非以飲食望人之口也非以財利鈎人之心也非以權勢制人之力也非以名譽飾人之意也以仁為本以禮為教以樂為和以信為符使人乃誘然而歸之翕然而隨之故有國家者恃之以化良民焉恃之以得賢臣焉故師者常與人君分天下之治者也位不同耳名不類耳權不及耳衆不如耳不然殆無以異是以先王知其若此也則重師之禮以繫邦國之民也民誠從師耶則是下已善矣民誠不從師耶則是下已惡矣善惡之端皆出于師故師不可不重也是以先王制事師之禮雖于天子無不北面言有君之尊也制喪師之禮雖于諸侯無不三年言有親之戚也設用此等故能使師重于世矣凡傳學者說義必稱師聼從必盡力說義不稱師命之曰背聼從不盡力命之曰畔背畔之人世主不以為臣世士不以為友鄉里賤之宗族疎之設用此等故能使師信于時矣然後天子按已教之民已成之俗而施政令焉何難哉今夫上不以師為意則民不可得而繫也民不可得而繫則㪚矣是與彼無牧長宗主一類也此之謂要道故冡宰執而司之使師之道逹于天下而無皆畔乎是冡宰之職得也師之道不逹于天下而背畔多乎是冡宰之職失也冡宰者治本而不治末者也舍九兩而任簿書求以繫民不亦遠哉鄭康成以為師者諸侯師氏之官是守章句者也得其一不得其二者也未及知先王之治不勞而民自為正之道者也夫師豈獨師氏之官哉師氏豈獨諸侯之臣哉故大司徒之職以本俗六安萬民其一曰聨師儒師則以賢得民者矣儒則以道得民者矣而曽以為異乎三代同道論上古者有言夏后氏尚忠忠之敝小人以野救野莫如敬商人尚敬敬之敝小人以鬼救鬼莫如文周人尚文文之敝小人以僿救僿莫如忠三王之道若循環此非君子之言好事者飾之也聖人之道同而王者之政一同也故能同不同一也故能一不一同者道也不同者物也一者徳也不一者俗也故自伏羲氏神農氏黄帝氏少昊氏顓頊氏高辛氏陶唐氏有虞氏天下之生久也一盛一衰一亂一治然而所以盛者常同所以治者常一何以言之凡聖王之後而至于衰者非其道衰也物使之衰也其使之亂者亦非其徳亂也其俗使之亂也繼而起者明道以待物則衰遠矣正徳以訓俗則亂遠矣故可以革物者道也而道未嘗革可以變俗者徳也而徳未嘗變夏后氏有天下四百餘嵗桀為無道顛覆禹之典型夏人不忍成湯伐而放之四海之内歸之如一非叛夏也以成湯為能復禹之績也故仲虺稱之曰天鍚王智勇纘禹舊服此之謂也商有天下六百餘嵗紂為無道顛覆湯之典型商人不忍武王伐而殺之四海之内歸之如一非叛商也以武王能反商之政也故武成曰乃反商政政由舊此之謂也故湯復禹之績則得禹之天下武王反商之政則得湯之天下當是時也禹没而復起湯滅而復見同焉而已矣一焉而已矣安得忠敬文之三而異之且夫忠也敬也文也是三者之于道本末也表裏也相待而成相須而行者也不可一日離而以為千嵗而代興故曰非君子之言好事者飾之也奚以謂之凡父子之道君臣之義夫婦之親賓友之好長㓜之序此所謂人道之大端此人道之大端非忠則不足以相懐故先王之為禮必本于忠忠也者禮之本也然而不敬則忠不見故先王表以敬敬也者禮之體也然而不文則敬不昭故先王等之以文文也者禮之成也是先王非尚此三道也其變節次序不相縁則禮不立然而相縁之甚密喘而言蠕而動一皆雜于是有隆有衰有左有右而已矣是以發于内者則隆于忠接于外者則隆于敬旁暢曲巧極物之變則隆于文惟君子能體之能體之則能言之能言之則能述之术有文而不原于敬者未有敬而不因于忠者也未有忠而不敬不文能成其忠者也故曰三者之于道本末表裏也相待而成相須而行者也不可一日離然而以為千嵗而代興故曰非君子之言好事者飾之也三代同道論中古者有言有虞氏貴徳而尚齒夏后氏貴爵而尚齒商人貴富而尚齒周人貴親而尚齒此非君子之言好事者飾之也夫聖賢之治國家天下所以率民而教之有達貴者有公貴者有私貴者有無貴者徳者其達貴也爵者其公貴也親者其私貴也至于富則無貴也所以謂徳達貴者徳之于天下無所不貴在朝廷貴于朝廷在鄉黨貴于鄉黨在市井則貴于市井在夷狄則貴于夷狄是百王之所同故謂之逹貴所以謂爵公貴者爵之敬在朝廷則伸在宗族則屈是又百王之所同也故謂之公貴所以謂親私貴者親之愛在宗族則伸在朝廷則屈是又百王之所同也故謂之私貴此數物者人情之紀王事之本聖人所不能奪也是以推而任之推而任之故以徳王天下以爵尊朝廷以親定宗族以徳王天下故天下不可不貴徳以爵尊朝廷故朝廷不可不貴爵以親定宗族故宗族不可不貴親三者不失其處則王道成三者失其處則王道不成是以有九徳者治天下有六徳者治一國有三徳者治一邑有一徳者治一職此所以見徳之貴也治天下者爵天子臣兆民治一國者爵諸侯臣萬民治一邑者爵大夫臣陪𨽻治一職者爵為士臣輿皁此所以見爵之貴也雖為天子必有父雖為諸侯必有兄故三年之喪達乎天子期之喪達乎諸侯大功之喪達乎大夫其在宗廟則皆以齒此所以見親之貴也其義並隆而不相害並行而不相悖措之而安施之而通王者之盛也未有能尚其一而遺其二者也故曰非君子之言好事者飾之也所以謂富無貴者彼富非徳之脩也非爵之隆也非親之懿也以世祿多財先人而已矣則為義者必恥之為政者必疾之是又百王之所同也故謂之無貴然而商人貴富則是以商人之為商者殆乎秦之為秦者也昔者秦有天下右貨而尊利以昉于滅吾未始知秦之所以滅非蔽于商人貴富為之禍也昔者魏有天下棄親而崇勢以昉于滅吾未始知魏之所以滅非蔽于夏后氏貴爵為之禍也昔者晉有天下侈親而滅制以昉于亡吾未始知晉之所以亡非蔽于周人貴親為之禍也故聖人不然以徳王天下以爵尊朝廷以親定宗族三者並隆而不相害並行而不相悖有偏而不起者則亂矣豈及于虞夏商周異世而貴之哉故曰非君子之言好事者飾之也三代同道論下古者有言夏人尊命商人尊神周人尊禮此非君子之言好事者飾之也彼謂命者四時政令所以教民云爾是非夏之道也夏后氏以建寅為正其數得天子以下政令宜此有由然者也非固以為道而尊之也彼謂神者四時祭祀所以訓民事君云爾是非商之道也夏之末山川鬼神莫能億寜而葛伯不祀成湯誅葛而放桀正天地之祭定社稷之禮修山川之典此亦有由然者也非固以為道而尊之也彼謂禮者君臣朝㑹凡以摯交接相施予云爾是非周之道也武王伐紂天下之諸侯㑹于孟津者八百餘國既入定商駿奔走執豆籩受命于周廟武王于是班宗彝分寳玉竒貨以懐諸侯諸侯禆冕搢笏射乎太學養老乎東序耕乎籍田此亦有由然者也非固以為道而尊之也若夫聖人之治王者之法宰制萬物兼覆天下則此三者無不修也無不謹也不能以一廢矣故當其尊命則雖周由夏也當其尊神則雖夏由商也當其尊禮則雖商猶周也何以言之耶民事則尊命鬼事則尊神王事則尊禮同時可也同日可也同月可也當其義則今所尚者先不當其義則向所先者後後者復先先者復後一物不應而亂起矣豈及于夏商周異代而尊之哉故曰非君子之言好事者飾之也夫好事者知三王之異物而不知其道之同也知三王之異俗而不知其徳之一也道者所以革物而非革于物者也徳者所以變俗而非變于俗者也故三王之所改者正朔縁于歴而改律吕縁于聲而改都邑縁于地而改徽號縁于色而改樂舞縁于功而改官職縁于事而改田賦縁于俗而改械用縁于便而改及夫以性為内以情為外以名為制以禮為體此所謂道徳之本也夫苟不可改則忠也敬也文也三代同尚矣徳也爵也親也三代同貴矣命也神也禮也三代同尊矣奚獨三代哉吾以此推之昔者伏羲氏神農氏黄帝氏少昊氏顓頊氏高辛氏陶唐氏有虞氏封于太山禪于梁甫者七十有二君其實一也四代養老論養老蓋以盡孝慈也劉子曰以養老莫善于燕莫不善于饗而食次之以養義莫善于饗莫不善于食而燕次之周人備矣所謂養老者養其體者也故擇其柔嘉選其馨香潔其酒醴品其豆邉脩其簠簋奉其犧象謹其祓除于是乎體解折節而共飲食之又為折俎加豆是以惠豐而徳洽民之見者以為盡心也莫不加愛焉故莫善于燕夫饗所以訓恭儉也而養老所以充氣體也修其物篤其意而不得躬之酒盈而不飲肉亁而不食設几而不倚一獻而百拜惡在其惠也故莫不善于饗是有虞氏所以不從也所謂養義者養其賢者也年者天下之達尊也爵者天下之達尊也以達尊之爵養達尊之年其意猶不敢䙝為之故一獻而百拜民之見者以為至恭也莫不加肅焉故莫善于饗夫養義者貴其養志也若曾子之養曾晳者也而食者無百拜之恭無一獻之節此所謂養口體者也若曾元之養曾子者也民之見者可易也故曰莫不善于食是夏后氏所以不從也雖然三聖之作非以相反也養老以彼養義以此所以尊其年尚其徳也尊其年仁也尚其徳義也仁且義所以天下無所為而晏然矣故周人通其道達其意修而兼用之兼之是謂大備不可改矣孝之道達則子咸若悌之道逹則㓜咸若登歌清廟則君咸若下管象武則臣咸若所以慮之以大受之以廣行之以禮修之以孝紀之以義終之以仁一事舉而衆羙具焉孔子曰郁郁乎文哉吾從周此之謂也公是集巻三十八

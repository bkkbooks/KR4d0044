body:
  text: 公是集卷十六宋劉敞撰七言古詩憶洞庭少年慷慨輕逺行出入楚越多所經每令百川盡衣帶獨憶嶽陽觀洞庭方輿沈潛似無地倚蓋回還徒見星始疑上帝限南北恐有漏澤連青冥西風八月氛霧收曠宇千里令人醒苦為外境相誘掖欲棄塵世浮滄溟當時發狂頗自怪真擬乘興攜湘靈至今局促不如意坐視嵗月無時停涼秋滿眼更多感回首尚覺君山青聞鴈去年聞鴈江湖邊爾時異鄉望白雲今年鴈南身更北可憐送目懷居人我生羇旅自南北鴈飛何為亦逺役浮雲滿天我無翼相與因風寄消息庭楸中庭長楸百尺餘翠葉暗藹當四隅晨霞夕日自相翳並坐可得千人俱憶昔河決巨野溢定之方中作宫室當時魯人始種此還賦衛風伐琴瑟春華亹亹六十年髙幹錯落摧寒烟悵望空隨衆木老中舍至音無與宣送張公往建溪秋風駕流溪水急君帆胡為破烟入仙人近約武夷㑹漢祀山頭羽旄立羣山叢叢野波緑君纓無塵見心曲江淹夢筆靈有餘君歸何時佇盈軸曉起棲烏未動清漏殘寥寥空堂生早寒相重樹色如潑墨欲落月采成渥丹市聲嘈嘈入人耳自笑帶星還若此防秋秋霜折膠邊馬壯邊馬窺邊怒邊將游騎夜入燒回中烽火朝傳過隴上關東行客關西來欲說兵形先啜哀長戈不能斷右臂壯士無過委黃埃嵗輸繒帛顧何益胸奴反以馳荆棘安得連山如長城遍限中原郤蠻貊打魚南人登魚作膢臘清潭數里奔舟楫層冰始解川氣和百尺分明見鬐鬛大網如雲遮要津須臾牽網回水濱地髙勢蹙漸逼窄忽復逸出黃金鱗釣叟篙師共驚駭失聲奪氣俱逡巡素魴赤鯉不足數棄擲千萬如埃塵豈知異物通變化暫網中還有神戲題西湖中魚育育水滿湖中有千金魚浮沈得意似太古不畏網罟畏鵜鶘緑蒲欲齊藻初密紅尾差差映朝日疾雷驟雨人莫知潛有蛟龍取之逸養魚鑿池不容數斛水養魚才勝十餘尾可憐出沒萍藻間還如泛淡江湖裏君勿笑坳堂坎井無逺期假有神物君不知風雲變化在倏忽隨衆幽潛聊爾為和永叔食糟民嵗豐飲酒衆同醉嵗饑散糟民亦濟乃知酒酤在官為長䇿上可足財下均利黃頭稚子白髮翁哺糟相隨塵土中豈嫌身居犬彘後還喜生值恩施豐翰林仙伯屈主諾憂民之憂樂民樂禍階六管不易救惠及連城自云薄周公以來千百年希世俗儒玩糟粕排斥酒誥終莫用感激長謡豈虛作恨公未為富民侯此等區區豈所憂漁翁白頭老翁披敗蓑求魚終日罩淮波波深水濶望不絶網目雖繁能幾何大魚鱣鱏入淵底小魚􅀈鯢登網裏手皸足趼吁可憐何不為網大如天苦雨東風十日不肯回濃雲猛雨無時開紛然萬瓦垂組練忽變百里吹塵埃河魚無翼蹈平陸水鳥哺子升髙臺羲和送日不竟夜陽烏翅濕方摧頽腐薪數吹不堪濕靈井已滿無用汲大衢泥潦安得出敗瓦漏缺端愁入街頭紅粟更騰踴嵗晏敝裘方綴緝黃花熒熒獨不憂悵然為爾臨風立麻黃州送李斯石銘二十一字麻侯昔為萊子國海濱漁人獻文石云是秦始皇帝東巡碑二十一字李斯迹桑田變海岸為谷此石亦沈滄海側浪翻水轉石段空偶存數尺非人力文章雖傳失首尾猶與史記無差忒字形訛缺非昔時蟄龍病虺相排迮念昔屬車八十一氣如虎狼食中國方士獻䇿通神仙諛臣奮筆夸功德始皇未死名已滅秦地初分石皆泐邇來似覺天意然欲令後世羞其惑君不見夏禹九鼎傳三王末年乃隨殷社亡時平往往暫一見龍文玉鉉曾無傷聖賢作事宜萬代事非聖賢多立壞畫草蟲扇子周南草蟲但書興爾雅蟲魚浪多證豈如紈扇裂冰霜畫出肖翹皆絶勝蠅讒蝶輕去螳蜋狷同類殊名悉相應毗陵老匠含天真獨得于心非氣孕牸牛落筆殊偶然秦女驂鸞不相稱因筆力尤天下一借微軀聞萬乘聽江十誦食鱠詩戲簡聖俞長安貧客食無魚浩歌彈鋏歸來乎主人聆歌知客意酌酒買魚相與醉一魚百金不可償操刀作鱠揮雪霜鱗分骨解珠玉光舉盤引筯絲線長楚飯雕胡香且潔吳羮入口如沃雪主歡賦詩客稱夀裂簡搖毫落寒月我亦羇旅秋蕭條思鱸回首江漢遙過門大嚼取快意詠詩忘味如聞韶君若乘風駕滄海更鱠長鯨且相待積雪示張翁冥冥同雲晝如墨十日江城雪三尺騏驥長鳴向朔風鴻鴈悲飛困雙翼此時窮巷多泥塗念子衰年少筋力時俗反稱少壯賢丈夫動與飢寒逼乘興能枝笻竹來煮魚溫酒澆胸臆苦雪積雪冥冥春不淹流光驟去十之三根拳枝折物可念衣敝履穿吾自堪天樞回環錯寒燠地軸開闔差朔南乾坤密移世莫測安得辨士能劇談雪夜留二三客飲髙樓鼓絶昏鴉宿疏簾暗幕開明燭雪風振海夜未央酒池無冰春更緑迎年送臘醉莫辭回環四序長相續奉和聖俞春雪一日朔風三日雪冬來嚴凝春復結不知長此終安窮芳物差池且三月雷公怒號何淬嗟欲起草木呼龍蛇可憐慘栗奪氣意正復惟悴哀泥沙紫宸放朝車馬息鄰里謝交門徑寂解龜換酒聊自樂浮雲蔽日殊未極同聖俞十二月十三日喜雪楚越祅氛雜炎瘴憑陵中州冬益壯天兵橫厲江湖間殺氣冥冥逐飛將南風不競寒律回暮雪逺從閶闔來雲崩濤涌天地閉掃灑萬里空塵埃公卿入賀陛下聖海神來朝軍事定和永叔喜雪隂風觸物生晚徑積雪經旬戲春令氣排水國吁可駭勢覆山城力誰競繽紛乍逐飛霰奪慘淡仰見浮雲定稍并日夜明相續欲亂𤣥黃色交映邱陵迤邐增更髙市井喧卑聽逾靜包荒含垢似天德履素居純近民性可憐佳境浩無極非有雄辭豈能詠匆憶避地歌其雱攜手驅車及寬政邇來盈尺亦何有髙卧閉門方自慶矧占豐嵗宜九穀重抑驕陽驅百病龍蛇在蟄鶯在谷與我俱欣四時正新詩翩翩摧古人汝隂太守明廷臣侔色揣稱笑流俗與民樂賡陽春曲由來曲髙和必寡況我才居郢人下去年對雪一首贈江十去年對雪本憶梅今年看梅更憶雪繁香浩色他日時誰為年年劇胡越乃知古來人間世十常八九不如意況我與君羇旅人别多㑹少誰復計閒來看梅取一笑對雪更作明年調月夜清風卷雲天雨霜衆星滅沒月騰光紛紜六幕含蒼蒼瑩如冰壺察毫芒太虛真人河漢旁攀援桂枝曳霓裳紫貝為闕白玉堂珠筵瑶席羅羽觴倚風微吟聲抑揚揖我起遊謂我臧左驂蛟螭左鳯凰倏忽萬里天路長塵埃下土殊茫茫樂如何其樂未央依韻和永叔即席送擇之出守陜府驪駒在門且勿喧主人留客姑進酒一時轉盼巳陳跡千里相望更何有祖侯聲名二十年天下英豪共奔走誰云白髮寄郎曹更喜朱轓入吾手揚雄天祿就寂寞召伯甘棠變枯朽乃知人事不如意自古十常有八九男兒何曾計出處時運由來有竒偶莫嫌青雲晚著鞭㑹取黃金大如斗君能食飲和天倪餘事無可付莊叟飛輪團扇歌赤雲燒天天欲焚深堂如炮井如饙肴乾不食酒具陳君胡愁嗟念南熏主人白羽竒且新捷逾輠膏機有神飛亷舒御旋相奔暗藹翕霍娛坐賓衣襟飄飄恍凌雲何用御風絶埃塵主人顧嗟顔色顰安得救暍通下民羊角扶搖非敢珍願使大鵬離隱淪上客捧觴起為賀君宜千年位卿佐雨過前軒偶記江南羇客懷鄉墅曉起前軒對零雨清波滿目如鑑中繞岸髙松十餘樹砌旁芳草似汀洲巉巖殿角飛紅樓沈光倒影入浪底宛是若邪溪上頭薄霧疏烟迷近逺水色誰能辨深淺忽驚謝去塵中游不知正自居京輦何人草服倚長松回頭誤問釣魚翁眼前景致偶相同豈異仙術逰壺中贈才元學士家貧自秣馬賜書使者至言之上上以語丞相就職而拜廣安守待詔先生窮巷居簞瓢屢空方晏如自操井臼秣羸馬郤整衣冠迎賜書王人駐車久嘆息天子聞知動顔色飽死曾不及侏儒牧民㑹肯輸筋力詔書朝出蓬萊宫繡衣還鄉由上衷君今已作二千石亦復將為第五公題梅尉春波亭層欄壓湖春水碧日照髙穹同一色東風引浪飛魚鱗極目傷心如楚澤茫茫白芷連芰荷倚沼畦瀛遙望多官賢與衆共其樂漁樵日暮常經過君家德祖吳門子棄職從仙如脫屣此中吏隱人不知且濯君纓洗君耳吳宫吳兒歈鄭女舞彩衣姣服垂楚楚姑蘇臺髙春日遲急節新聲閙鐘鼓美人歡醉捧瑶爵君王萬夀長如許吳宫四面盡山川越兵那得到城下隂山女歌接伴副使知制誥馬祐事種玉不滿畦種花易滿枝王生寄石自有處花飛隨風那得知嬋娟翠髮隂山女能為漢裝說漢語春心未知向誰是夜彈琵琶淚如雨赤車使者過鳯凰暗中一聞先斷腸碧窗鎖烟未容去侍兒密獻江南璫鵲飛上天星沈海人心不同事隨改翦環洗妝許君老百年如夢情終在妾乘油壁郎乘驄西陵松柏墨色濃新歡未已舊愁起水流曲曲山重重周周銜羽鶼比翼天生相親人豈識雖不及清路塵猶當作山上石遷南行甲申十二月桂陽叛蠻平遷其種于京西諸郡伏波將軍昔征南功業雖壯身不還曾出封疆鑄銅柱竟留種族依荒山君不見如今聖天子掃蕩妖巢悉內徙雕題來作冠帶民鼻飲翻宜伊洛水此功一成萬世寧五嶺三苖長坦平寄王二子直鴻飛輒上天魚躍還入淵故人去我百里餘我欲附書無由緣俗間離合誰得免心雖欲近身逾逺少壯相歡長年悲自恨今為丈夫淺夜寄獻臣同居汴水上自與君居隔月出城頭人盡歸思君攜手獨不得興來狂歌無與賡白雲時向望中生城外明月未應減期君對舉黃金觥和永叔鳴鳩詩晴鳩歡求雌雨鳩閙逐婦天地有晴隂嗟爾何欣復何怒柔桑如雲春暮時吳蠶半眠紫椹肥食不過數粒寢不過一枝婦子相安可以老何用汲汲合且離雷公號呼風伯舞天借之權作霖雨可憐汝愚終不省反室于怒誰哀汝昔人惡爾巧今人笑爾拙巧不得近瑶臺拙不能保家室爾巧爾拙非汝情天機回闔難自平世人假爾推隂晴秋蛩促即復促即秋蛩一何力不見機杼巧但聞日夜織霜隕木落天下寒嗟我婦子衣裳單大鈞萬物各有在爾獨憔悴使人歡一鳴復一飛秋堂燕將歸四時自興歎天道不得違憶昔春風和且柔畏人來入人間游鷹隼橫厲自兹始索寞分散還可愁三瑞堂甘露被草朝陽易晞池蓮並蒂及秋變衰獨有長松連理老益壯十年百年仍附枝昔來一物足為瑞何況三異俱稱竒吳中衣冠不勝數天意自與寧馨兒露乾蓮死不復見正以青松并驗之凱風孝子嘗悲思三荆兄弟傷分離此家遺風五十慕物理推類誰能欺到客為爾俱題詩聞轆轤轆轤復轆轤日夜聲相續長綆無已時深泉變空谷君不見開闢至今千萬年斗樞坤軸相回旋河漢西流亦不息見爾滄海成桑田過王氏弟兄出城問窮僻負郭正瀟灑主人著書長閉關佳樹當門宜繫馬下馬上堂還讀書新詩古琴雙起豫昏鴉棲雞欲斂翼興盡將去猶須臾徒見城中軒冕客不如吾人一縫掖安得茅茨同里居子在東阡我南陌同永叔贈沈博士我不識醉翁亭又不聞醉翁吟但見醉翁詩愛彼絶境逢良琴上多髙峯下流泉後有芳草前茂林𤣥猿黃鵠翩翻共悲鳴兮白雲翠靄倏忽而陽隂此間真意不可盡未遇知者猶荒岑醉翁昔時逃世紛戀此酩酊遺朝簮心雖獨醒迹彌晦舉俗莫得窺浮沈邇來十年定誰覺獨沈夫子明其心寫之絲桐寄逸賞曲度寥落含髙深絶調衆耳多不省醉翁一聞能别音乃知精識自有合何必相與凌﨑嶔伯牙鍾子期目擊意已歆蓬萊三山蕩析不可見惟有水仙之操傳至今安知後世萬千嵗此地不為水火侵但存君詩與君曲雖逺猶可期登臨沈夫子與醉翁斯言至悲君更尋六月六日自城北還過深甫避暑熱不就惡木枝渴不近盜泉水自古有成言念我還如此愛君井源百尺深愛君庭樹千里隂相知豈計一飯報長嘯聊為猛虎吟得蕭山書言吏民頗相信又言湘湖之竒及生子名湘戲作此詩吾家千里駒氣與齒俱壯去年射䇿雄東堂今年調官在越上指揮小吏遣簿書笑語不廢才有餘清酒肥魚宴賔客時時騎馬臨湘湖湖波無風百里平人道官心如此清居民愛尹氏為字韓子為縣百姓生子皆字韓令尹生兒湖作名家家祝君多男子越中更有餘山水翦楸葉詞涼風天際來拂我階前樹稍驚枝上禽復墮葉間露兒童畏我逢秋悲刻葉作花矜嵗時祝我宜秋勸使插未能免俗復爾為鬢邊二毛殊不惡淮南何須傷木落寄書十里一反顧五里一徘徊悠悠三千里莫知我心哀客愁紛無涯嵗月忽如擲人生莫自料皓首豈易測節旄未落歸去來天遣春風隨我回入朝寧食建業水還家郤賦南山雷婦能秦聲妾趙舞稚子可使行酒杯急須為樂娛日夜何事憔悴淹塵埃行矣乎歸去來答金陵使君答王待制見寄雜言阮公青雲器寓意必豪縱西臨廣武寄一笑英雄紛紛競如夢有時不能平途窮即長慟仕哉詠懷篇千載共悲諷金陵昔為帝王居氣象蕭索無復餘長江連天水東注臺城髣佛存邱墟主人文章謫仙老感古能無激懷抱作亭正得山水勝登臨更值風月好賓客滿堂絲竹悲古今風流自一時君家夷吾雖有慷慨語快意未必如君詩淮水東流千萬年此亭方與淮共傳念君歸老廟堂上未負賡歌留北山古城古城何巍巍古墓何纍纍生逰市朝死田野從古到今無免者城荒郤為狐兔宅墓在他人種松柏伏羲以來三萬年此城此墓幾變易誰人聽唱野田詩能令君悲亦不悲築室種樹撫劍欲逺適舍旃輒復息四海廣大身正孤東西南北頗同役築室種樹反開門閭里小人哀王孫丈夫委順故任俗餘事悠悠何足論風花風花不自知髙下逐風飛故有多情處時來㸃客衣仙源應在晴溪側弄雪吹香不忍歸種蓮雨餘池上清且滿浮萍漂漂緑蒲短主人惜此芳意薄移藕丁寧不辭逺南陂芙蓉少人識疊蘂重房無俗格託根得地今始逢西風白露為君容公是集卷十六

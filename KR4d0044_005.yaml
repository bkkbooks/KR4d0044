body:
  text: 公是集卷五宋劉敞撰五言古詩題度支廳事許道寧畫松石呈彥猷鄰幾直孺長松森無依蒼石儼相對自然山林氣若出天壤外許生筆妙絶今世殊少輩發揮得意表瀟灑與神會炎熱五月交塵土九衢內微風度窗來左右含天籟下有漁樵翁生事尤可愛茅茨乍隱見畎畝更向背吾廬若辦此軒冕本不賴願從二三子相與駕言邁擬阮步兵一夕復一晨一昏復一晨一晨復一夕擾擾若有為悠悠定何役譬如風中葉不自知所適譬如池中魚強自營所得朝乘日車出暮與羇鳥息昔我髮純漆今我髮半白誰能邀神靈傳我雲表翼我與從之遊覽觀元化極紀危四月河水湍怒風復相乘維絶柁亦摧舟人廢其能中流急回環頃刻不可勝性命委自然豈知所依憑堤旁多聚觀失色氣崩騰孰不願引手而乏鉤與繩嗟我亦天幸既危乃復興追思方厄時汗出如洗冰側聞前此者覆溺已屢曽此事通為邦長民可以懲因書作長詩俾不忘戰兢十二月十一日雷電有作今兹方隆冬陽春尚宜少去聲幼少之少何忽雷早聞因之電爭曜砰轟非常怒䃸磹通夕照號令無乃乖災祥諒誰召吾聞玉女戲獨得天公笑此理正應爾君毋強譏誚種紫蘇赤日厚地裂百草殆立枯朝雨應所至雖微念勝無力難興禾黍可以成嘉蔬嵗暮有此望帶經且親鋤今兹五月交盛陽消已徂汲汲愧老圃仲尼云不如養生寄空瓢雖乏未可虛正以營一飲形骸如此劬遣懷三首天道與性命聖人罕其言七十豈常士遊夏終不聞鞠躬慕仁義或不免飢寒姦雄何為者往往為世賢倘復有真宰無用預其間有形每共生逹士獨無惑昔有蒙袂子恥從嗟來食物生會當盡夀非金與石但恨居世俗不能盡胸臆壯士志溝壑斯言著前識初嵗志慮淺所慕在輕肥自恨聞道晚不虞失性非迷途將未逺回駕有庶幾古賢多事業出處何不知寧受芻豢辱倘為鴻鵠飛歸牧相訪示所作詩賦篇豫與其兄子緯還往頗熟曰豫謝賔客久與時世疏何忽衡門下見枉使君車彤斾映落日腰間有懸魚抵掌若平生論文及空虛昔與君猶子結交幸通書往還苦不早相見情有餘置我二阮間逺慙德不如強來束帶起投謁尋君廬大雨中入局寄彥猷時以疾臥家歊蒸變繁隂快雨如破谷明趨閶闔路深水入馬腹此地常結轍江海忽在目冥行畏坎井躡迹戒顚覆慙問高眠翁不知泥塗辱賀龍圖兼知延安大兵昔摧傷兩將折旗鼓哀哉中國士化作城下土寃魂不得返殺氣凌彼蒼天亦為之悲白晝日無光人言此城下往往鬼神哭此事天子憂此心大夫辱昔公守東越人怨公不用今日公在西知公德持重築城不必堅解甲不可攻何况保金城弛張皆繫公汲黯輔炎漢淮南內竦懼郅都守窮邊胸奴為之去此事昔所聞今日見所親折衝樽俎間震動旃裘民國恥行且刷寇讎不可保斯人嘆微管願及太平老奉和宋次道遊嵩十五韻嵩峯三十六皆在青雲端宿昔望見之恨不生羽翰卷臠塵土中日月如波瀾邇來老將至更覺行路難聞君謝車徒選勝羣峯巒幽深每獨往神異多所觀若有真仙子羽衣白玉顔吹笙煙霧中舉手留盤桓信非人間境邈與時俗懸顧懷平生舊慰以逍遙篇三復想在目令人愧衣冠處世濶且疏幼輿亦有言一丘與一壑自謂無間然安得從君遊解纓弄雲泉昏昏嵗復晏相望空長歎和聖俞逢羊道旁逢羣羊問羊將何之朝供大官膳躑躅未自知觳觫此何罪無乃芻豢為肥軀一報德鼎爼安可辭寧辱泥塗中故人所以悲懷歸圖養始干祿執官復辭親外物與我違幽懷安得仲低徊畏簡書苟且謀賤貧碌碌已無期規規徒自珍秋風卷層雲鴻雁知所賔我獨無羽翰不能絶飇塵送吕光祿自十一月留郡下凡十餘日得劉字泛濫誠易挹俊賢噬肯留愧君殊邂逅卒嵗能優遊會心到稽吕訪古窮嬴劉誰令春風來翩翩動歸舟千里在明發一樽成獻酬江湖望魏闕離思空悠悠題改芷亭作水鑑亭昔人種白芷既以名此亭今我開蠪淵復以水鑑名吾豈異昔人而徒易其稱所樂於水乎內明而外清內明可比心外清可照形照形不吾欺比心不吾傾虛靜吾自居逍遙以無營會有水鑑賢吾能與同登閉門二首閉門無所事嵗月忽已極豈敢空絶交出門諒安適是非斂外慮文字堆四壁堯舜參在前孔孟凛居側崑崙默泛覽萬里在瞬息敻古時幽尋千年僅頃刻悠悠富貴士此趣猶未得胡為逐車馬辛苦牽事役傅巖由帝賚圯橋自神授商道粲復興漢基翕然構窮通苟有命貧賤豈足疚斯道誰得聞人方薄圭竇小孤山驚波觸南崖反怒射北壁蒼山相與排所謂小孤石蟠根萬仞淵聳角百丈碧祠堂豁精嚴行旅進粉澤或云婦女神肸蠁頗有迹吾知定名意似欲旌介特流俗失其真傳聞莫開釋居人私其利禍福妄損益競為媚妒説以誣聰明德先王秩山川禮典有廟食奈何媚於竈屈已忘正直吾欲為小孤作書解行客復恐不見從嗟哉世多惑新種雜花樹天地大逆旅浮生逺行客大無萬里異逺不百年役乘流惟其遇得性從所適何必思舊鄉而復名一宅此邦非吾土此廬非我迹彼我苟巳齊賓主不足擇終樹宿所好及間易為力芳草十餘品往往手自植春風二月交重疊庭下碧欣欣生意好一一見顔色對之默終日淡若無情極四時背人馳壯士每歎息憂來忽無方外物不可釋中和一相伐頭髮先為白萱乎爾能忘於我獨有德滕司諫知涇州天狼東南鳴雨矢西北集覆載豈不容縳虎宜在急詩書擢將帥高枕付城邑權變非武臣恩威在呼吸壯夫氣已激義士感成泣籍籍名四喧蕭蕭髮競立行旗亂鷹集已有邊風入遙知謁明光介胄但長揖城下秋成雨更緑高下共萋萋浮煙晚自起歸鳥暝爭棲山谷入幽想茅茨多舊蹊日涉遂成趣身將麋鹿齊庶幾堂徂暑亦已煩清旦尚餘爽薰風應候至芳物與春往庭樹交浮隂山禽轉清響空堂更幽寂初日正蒼莽時節無所感忘言以為賞涼夜疏雨洗明月清風生晚涼動搖星辰影泛淡河漢光螢變覺草腐蟲吟知境荒端憂易逺感不眠疑夜長秋梁公李太尉廟就列貴陳力立功尚成名兩君雖異時令望相提衡治獄多隂德不戰屈人兵去思獨至今奉祀見遺氓文武百世師將相一時榮念我誰與歸愴然悲九京畢吏部冢在太一宫側蓬蒿道旁冡云是晉時賢名聲與陵谷共盡一千年惟昔縱逹觀死生同蛻蟬安知泉下魄非復甕間眠和張洞春雪水國雖暑濕亦惡春令早雨暘恆不時過燠未為好凌威集驕陽瘴疹一以掃宿麥根復濡豐年不煩禱堪輿氣清真生物同夀考大哉造化力排斡正穹昊能令四時順少失安足道君胡乃嗟嘆哀彼花與草方今王正始節物自未老繁華雖云遲秀實終自保可以寬君愛毋為色枯稿雪意淒風起幽朔白日晦光色仰視浮雲高蒼茫天容碧林林悚羣木栗栗抱寒魄今朝識天意欲見松與柏雪後日出桑柘巔鶴鳴風景和縱心適田野顧覺春意多欣欣林間叟負薪行且歌此中有真樂富貴如余何夀寧觀殘雪春陽漏潛管凛氣留深殿金莖向飛露碧瓦仍鋪練寒光寂寞回暖色依微變壺中異風景會待花如霰初雪荒居人迹絶但覺嵗月頺北風不我欺吹雪天上來入户時繽紛當軒肆徘徊有情知相親高臥未足哀他日門晝關今旦門早開開門將誰為南山玉崔嵬雪中寄貢弟天寒雲長浮雪急風更厲行子歸何時逺遊感人思脊令顧儔下鴻雁順時逝原隰無安居稻梁無深志誰令嵗月晚坐使羽毛瘁江湖可遣憂引領正相遲月夜日入更灑掃翛然庭檻空酒杯落明月白羽來清風佳興自不淺幽人無異同徘徊卧林下重露霑蘭叢和閻都官九月十三日夜對月是夕某與子華聖俞如晦會飲君謨所秋霖恣淫溢后土無時乾忽驚浮雲盡更覺天宇寬涼月如白璧飛來青冥端衆星稍滅沒驚鵲自盤桓興發思逺遊惜無凌風翰聊尋故人家呼酒澆肺肝適與二三子四座俱解鞍意合心同賞百觴不辭難玩古驗漢魏君謨出漢魏時金錯銅機精麗有分寸尺度天下竒物也舞姝試邯鄲詼諧雜謡語大笑傾衣冠足為一時樂未悟清夜闌每至絶倒處恨君不獲觀明發得新詩照人瑩琅玕又知共兹玩正若相從歡君本青雲人淹留尚郎官曠懷不自屑遇景宴且般古來悲秋士局促宋與潘相望如轅駒豈足為君歎夜月執熱不可濯昏昏倦衣巾涼月如有情萬里來慰人浮雲卷層虛六合隨清新河漢涵光輝城郭息埃塵兹時一可畏與子聊相親逍遙夜未央更益情性真夜起呼徐監簿同看月夜長愁無端嵗晚易多感徘徊中庭步相與肆遐覽繁霜冷次骨皎月清照膽幽意暫欲飛秀色若可攬明夕雖復來素華巳應減念兹徑使醉無使我心慘南伐詩兵行何匆忽百里不一息南征有期會相觀各努力三年戍西荒蟣虱生金革歸來席未暖羽檄何奔迫行行當逾嶺五月逼炎赫尚有筋骨存所虞生死隔山林如惔焚溪水沸湍激自古皆有言一夫萬人敵蝮蛇長相逐虎豹不可格主將貪功名謀臣貴恩澤奈何輕人命棄置曽不惜探湯入其中未半死已積蒼生亦齊民不必皆盜賊賢主尚扇暍仲春猶掩骼一身不自愛所懼失為國堯舜有舊書廟堂為法則城樓送别驚風走枯蓬百里不暫息密雲乘飛雨前山坐成隔蓬老初無根豈辭逺為客山高雖可望路逺當不識去留類如此覽物意寧極鞍馬未動間會合彌可惜緩歌送清觴更醉日將夕李綿州訪别天寒起常晏日出扉未啓深巷聞傳呼兒童怪旌棨知是漢中守訪舊來至此適我平生懷趨迎願少止結交許忘年並坐每抗禮語罷當逺行眷然色不喜君惟二千石我徒一男子貧賤宜輕肥反如不能巳善化遲期月壯心隘萬里側聞報政速永觀凌風起寧復悲東山滔滔厯年祀食橘吾聞江陵橘乃比千户侯嵗獻天子旁取為廟堂羞問其何能爾無脛而逺遊橘也不自言請君以臆酬憑生覆載中頗亦萬木儔通為騷人頌謬得禹貢收託身聖賢間自覺名譽浮苞苴賴㩗挈富貴常見求明珠無先容按劍或暗投而我適衆口鑠金不豫憂物生有通塞不必在中州何用懷苦辛但為時所仇留鄰幾君章奕棊便宿小齋簿書易短景燈火宜清夜過從喜吾子尊酒逮我暇歡來中扃豁興盡外物借錯落盤上棊白黑互陵跨決機競神速取勝頗雄霸惜我壯士氣局此萬里駕時乎無由試寓目亦悲咜天地一枰土古今萬物化願無辨其間痛飲但來舍與鄰幾對棊戲作碌碌無用智玩此方罫間君乘百戰餘勝氣不可攀拙速亦天幸出竒犯險艱數俘效軍實斥境除邊關捧觴跪進養座客歡解顔安得百壺酒使君酩酊還公是集卷五

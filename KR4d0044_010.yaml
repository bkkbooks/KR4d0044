body:
  text: 公是集卷十宋劉敞撰五言古詩聞王十八除檢討滄海有蓬萊去人初不逺舟車自難到方士曽空返聞子騎鯨魚姓名已金簡誰云路幽險但怪波清淺俯窺紫貝闕洞視白玉版神仙豈學致變化絶微顯乃知淮南藥力可及雞犬相望雲霧深冥冥白日晚任城道中驅車太山下過憩任與樊此地昔建侯邈哉羲皇孫市朝非一世茂草空平原三十餘萬嵗忽如飛鴻奔毁墓骨已銷但有石槨存縱橫委路隅冥漠遊岱魂古今一邱貉成敗誰復論區區東家翁乃復哀璵璠牛山顧千駟涕下何由諼忠義獨不朽庶幾長者言陳橋别隱直柔逺在無外飲冰寧顧家旌麾辭北闕原隰生光華水涸雨亦收徑風卷驚沙送車何其多髙蓋垂文緺張侯平生親情義固所加哀我志慷慨眷我天一涯出宿水上亭暮談見晨霞百里亦已逺心乎不云遐我自東西人豈能守蓬麻周爰愧靡及敢不重拜嘉答江鄰幾到潁州見寄并封示晏公送行日夕風雪佳相念思乘興忽憶君在逺離憂紛難定入門對新詩滿眼冰玉瑩因疑君居側恍惚不自勝别來雖無幾日月稍已迸一葦悲河廣况乃山川迥逺逰殊風土孤響謬羣聽常恐弔原憲夫子歎何病幸傳丞相篇復見仁者贈懸知愜真賞有以誇厯聘何用慰索居一朝再三詠寄深甫兄弟時在潁回面簿領役終嵗無一欣思君阻晤語坐想如古人百里非遐方書踈絶相聞亦知平生懷未為踈數分昔君幸見憐約禮博以文今也知不及瞪然已絶塵裹飯更欲馳漭漭風雪晨髙會汝潁間千秋愧荀陳舟次潁上寄貢甫我詩持寄君宛在汝水潯君詩欲寄我蒼茫煙浪深寒水爭赴壑駛流激清音扁舟泝遊往寂寞嗟獨尋潁煙稍塞望淮月初清心恨無知賞同樽酒誰獻斟相思意不極宛抑訴鳴琴曉燈半明滅抱膝成苦吟古意三首相逢偶相識相識竟相離會知别情苦寧作未相知相見如夢中夢中還相見薄帷鑒明月恍惚仍對面主父昔未仕頗為鄉人輕上書雖晚逹稱説何縱橫不忍脫粟飯甘為五鼎烹豈不愛厥身徒為喪其生吾聞南山翁軒冕不得榮栁下不違俗獨恥伐國言三黜何嘗憂一問遂慘然世衰狙詐用賢者防其源孟軻不言利顧有仁義存何乃百世後功名為時敦秋意四首陰蟲鳴空階危葉墮髙樹秋風雖昨日所遇已如故悠悠嵗方晏采采行多露芳香日可閔宛彼蘭與杜鴻鴈起海濱凌風自翺翔冥冥清雲間矰繳安可望千里一悲鳴一里一倣徨時變感自深豈伊恨越鄉鷾鴯信多智出處能自謀非無人間畏而襲人間逰微風動髙林梁棟生早秋斂葉從所願落實安得留翻翻林間藿昔惟桃李華飄颻終焉薄江海無津涯榮華寄須臾憔悴空泥沙良無凌霜節安得復嘆嗟雨晴率張生及諸弟到建福僧居沈陰天氣昏忽霽景物好牆陰且殘雪池岸已芳草愁懷無端涯強出慰枯稿白日當青天所至豁如掃山僧一飯畢鐘鼓不復考庭宇若無人窗軒照丹藻徒行不知逺適興愜所禱如覺逍遙逰頗堪謝煩惱諸子吾宗秀張生一經老相顧能不言歡然屢絶倒初鴈翩翩南飛鴈契濶萬里道朔雪常逼秋知幾諒宜早敵兵盛西北弓矢斷飛鳥側翅鋒鏑間悲鳴觸懷抱往時商山翁自放亦忘老避地吾所師相望戒輕矯始聞鴈冬夜何漫漫北風扇凄惻始聞南飛羽稍稍過我側來賓無乃後恐非嵗時忒朔方稽常貢物性隨變易哀音一何厲路逺霜雪積就陽既云歸感義寧自默胡為堂上士撫劒重歎激沒蕃士丁年仕轅門欲食萬里肉敵兵方強梁邊境日局縮是時十月交轉戰大河曲落日天地昏風塵蔽川陸我師自憑陵敵騎出深谷路窮矢交墜壯士同僇辱投身致網罟南向長慟哭忠義安可論功名亦已覆悠悠捐嵗序忽忽抱心曲每生悔為禍致死倘還福夜渡黃河冰獨依荒榛宿狐狸鳴我旁虎豹相馳逐脫身僅毫毛夜動晝必伏肌膚存空骨性命半鬼籙十月到亭堠門人識風俗回頭復長望慷慨淚盈目憶昔萬人出今還一身復可憐同時輩視我猶鴻鵠永棄絶域中幾時脫臣僕叩門謁主帥長跪向人哭可汗甚雄傑其下亦輯睦弩力思長策勿輕用人屬寄子華內翰時亦宿齋是夕風雨君居白玉堂我在紅藥署出處豈不同咫尺限相遇風雨聞雞鳴節物驚嵗暮思君正展轉夢中亦知路過澶州橋有感河水東赴海還從天上回寧知今日波還復前時來岸栁亦已荑原田正莓莓念我平生歡悵然使心哀和江鄰幾雪軒與持國同賦二首君居近城市每獨厭囂煩積雪成髙卧故人來在門掃除更爽塏談笑寂無喧開窗延寒月拂席置清樽真得酒中趣安知狐白溫長安雖大雪車馬無休時窮巷有髙士閉門獨何為朝煙不黔突彈琴方賦詩逍遙無忤色慷慨多逸辭適有感同好寄聲贈所思調髙當和寡無以答君知養雞茅茨一畝寬生理備委曲雞豚自古昔豢飬隨世俗鑿垣安其棲幼長何碌碌旦出四散飛暮還相從宿頗哀鴻鵠輩飲啄不充腹何事萬里逰羈旅傷局促衣冠相嫵媚庭廡更追逐未悟糞土非豈知稻粱辱物理常有此人情苦不足安見避世翁頽然卧空谷乘小舟入朝京門訪安道南山厭清流春光滿上頭懷人不勝意乘興去扁舟靜吟日光午孤棹正修修固當見安道曷若王子猷送陳竒祕校逰寢邱世往人物非古今共滔滔聞君寢邱客因憶孫叔敖脫身田野間功業青雲髙憂國不憂家子孫負薪勞苟無滑稽士亦已埋蓬蒿嗟來千户封晚受侯王褒賢卿尚遺忘反慕貪與叨况彼里閭人安能厭粳糟伊昔方斷蛇許身輕鴻毛陰德尚有報天寧紿吾曹努力道路勤我心良鬱陶宴得解進士先是豫為監試汝潁紀南國星極麗中州多竒兆兩漢粹氣兼九邱里巷含古風文章耀前修上恩榮計偕博選充詔求雜沓會駿骨軒昻出驊騮日余瞢深識有司屬同憂攻玉固以石妍媸豈云侔登龜但投餌美惡非其儔堂上歌􅎷鳴樽前親獻酬有功幸九錫與祭為諸侯送胥元衡殿丞通判湖州平生笑山濤非隱復非吏今更欲似之顛瞑老將至羡君負清識於世寡所求能從魏闕下徑取江湖逰扁舟駕長風千里破髙浪倚檣一清嘯佚氣橫雲上醲碧箬下酒紅鱗苕溪魚綵衣起為壽此樂天下無誰不慕軒冕顧多困朝市人生難自諧祿仕當若此譏謝十三利交勢相營義交氣相得千嵗若旦暮萬里猶咫尺昔我相聞聲但嫌未相識今我相同逰又恨莫相益同時復同道同官又同籍平生重結交然諾亦自惜子為太守丞我為里中客雖復戒疏數不應事形迹宿九里潭潭樹老垂葉蔭兹千百尋蛟潛伏遺劒魚躍應鳴琴逺客何所羡神淵涵淨心橄攬本草言橄欖解鯸鮐及酒毒最效也吾昔評橄欖不在百果後其材中棟梁其實過橙楱俗人多未識至美或莫售材以逺見遺實以苦為詬華堂娛嘉賓甘脆陳左右此物萬里來真味寧免陋欲觀絶倫效宜與危事遘江魚肆潛毒頃刻輒僵仆昔酒發狂醒千日尚沈瞀性命如危絃一絶不可救幸能服刀圭咄嗟反其舊此亦天下竒能使夭者壽豈殊魯連子談笑解紛鬭功成歸海濱不願千乘富聞伯庸再安撫涇原壬午九月鎮戎喪師復再往西師又失律將帥各顛覆流血丹川原積尸委山谷咄嗟仁壽域短夭生理促王命有不行國威為之衄鄙夫無憂責感慨祗慟哭况聞哀痛詔輟食想頗牧朝廷足名卿多壘各含辱謀議宜深長瘡痍待湔浴使乎非常任天子意所屬百萬氣未蘇吾民且局縮賢人勤功名報國忍勞篤往者博望侯昔時來君叔再三持漢節白髮走川陸豈不久憔悴事業光簡牘關河據上遊郡國同心腹征膳向五年強宗亦單獨君乘赤輪車一一詢比屋唐虞升平風惆悵難再沐鄰幾過門不留戲作陳平少負郭亦回長者車貧賤雖足羞猶問道何如此風固宜少未謂今便無所望臺閣賢尚能念古初左轓塗朱漆長綬要銀魚化我不少留始知心見疏彌年寄祿仕竟日勞簿書相與同笑言俱幸逃空虛春秋期知我雅頌誨起豫兹意未可忘君宜誦權輿秋雪剝候凋羣陽幽陰肆騰涌清霜飛雲初大雪吁不凶繽紛舞鴻鵠細碎翻蠛蠓北風故相資凍雨仍更縱泥塗絶行道珠璧棄郊壟峩峩九重髙兀兀雙玉聳寒光坐輝映凛氣彌衝擁壯士歌慷慨儒生議刑寵長年昔未逢噤語空多悚皇天無私尤德惠答虔鞏豈伊傷時和蓋亦遵順動况兹秋方髙民麥皆在隴龍蛇蟄既坯鳥獸毛亦氄農夫樂休役天子寬垂拱信此豐年祥爾曹何必恐秋雪寄獻臣三年海水旁卑濕厭歊熱都城幸相從比嵗秋逢雪秦吳乖風土南北異時節惟君嵗寒􅐾一致乃欲别出門顧道路冰霰埋車轍咫尺阻相過誰當慰寥泬月夜期江梅兩君不至聞在李二審言家飲日入更灑掃翛然庭檻空酒杯落明月白羽來清風佳興自不淺幽人無與同徘徊卧林下重露沾蘭叢城樓新晴強人意步上西城樓雲煙開井邑綺繡錯田疇離離麥就熟翳翳桑尚柔懷歸感初服覽物悵淹留子髙作司諫見舉自代智短多不堪冗官略自保念非撥煩用猶覬趙魏老故人紫微仙自致青雲早回首記平昔露章慰枯稿先容輪囷木進取萬里道妄意巉巖石庶幾千金寶過聽為君羞貪名怯陰討人亦謂我何自笑方絶倒聞子飛作諫官寄隱直玉以二獻珍金以百鍊精錢侯困躓時詎免時俗輕感激生憤勇辛勤就功名居然取髙第自此凌諸生諫官近冕旒地望臨公卿報國須薦賢致君在舉能蕭朱尚結綬張杜猶提衡小雅紀伐木微禽識同聲此風久已無賢者當肯行念子早治裝復令世人驚賀隱直錢子飛言之中丞中丞奏辟主簿三年守一官五年調一職選門萬餘人過半頭髮白賢愚必待次先後各循格相與為波流其誰辨白黑子今特招起方與塵土隔翰林誠知人錢子飛中丞亦好德古來御史屬自與二府敵於今任雖卑其實名不易必將寄紀綱豈獨親簿籍鴻鵠須逺飛騏驥無近迹往矣勿自疑天方佑正直賀王純臣昔者巖穴客多隨辟書起榮名耀山澤髙閣下閭里此道不復振此時竟已矣不圖廷中賢有意及之子十年困鄉書三黜竟不仕一朝遘知音籍籍到天耳窮通諒有數自古多若此年華猶未晚富良方自治伐木情所深彈冠坐增喜請歌反招隱以激南州士詠庭檜贈深甫自吾卧家巷幽獨謝鄰里顧憐庭中檜常以比君子春秋色不變朝夕影雙峙誰言冰霰繁稍亂蒹葭毁始知嵗寒甚慘慘不自喜悵然對之歎爾復那至此陳蔡稱愠見由也德可鄙天損吾能違放歌有焱氏檜花百花乘春輝紅白相嫵媚暫開已半落過眼如夢寐繁奢能幾時寂寞都掃地兒童惜徘徊婦女瞻歔欷中庭兩檜樹百尺浮雲際芳意不玩俗秀色亦自喜緑煙凝參差金粟點細碎霏霏墮疏香裊裊隔清吹足明後凋節不與衆草類忽思折瑶花自放天宇外初秋病中作五言呈君錫待制介夫學士蹇淺暗聞道螴蜳自焚和負兹嵗陰改閉閣秋風過濃露變園草號蟬翳庭柯覽時悵頽暮顧影驚婆娑平生江湖尚薄逰不願多奚為役外物况乃淹舊疴徂西識艽野采菽聆悲歌今昔容不同情感殆靡他勞生共逆旅馳景均騰波行矣自免歸息陰安薜蘿送王子直還斥溝薄薄雲蔽日凄凄寒中人飛飛燕歸蟄漠漠鴈來賓送子獨無友悲秋空病身登山復臨水便覺二毛新初卜潁州城西新居羇鳥能擇木遊魚知赴淵飛沈豈異意行止私自憐玩世本無術辟人庸得賢卜居幸樂國負廓依良田心與地俱逺我徒共熙然生涯亦何有聊以忘吾年早行虛舟却煩暑初旦更清和塵襟暫軒豁幽興亦滋多黃鳥囀深樹良魚躍層波岸花間紅紫村叟雜笑歌稍忘溯洄力未悟嵗時過側肩市朝客偃蹇奈豫何晴日後園羣鳥飛朝日鳴鶴響晴空宿雪乍消釋滯陰反沖融幽居亦可愛老圃願與同負暄空林下逰目故城東世事見流水嵗華指飛蓬酣歌用自適貧賤何必終公是集卷十

body:
  text: 公是集巻二十六宋劉敞撰五言長律聞韓范移軍涇原兼督闗中四路涇原非逺畧韓范各名卿地盡三秦國身當萬里城指麾沙漠静談笑鐵山輕報國心如日憂民病若酲終軍材冠世汲黯直知名風雪隨車騎鷹鸇起斾旌年年戰頻䘐事事淚堪横㑹刷蒼生恥重看鑄劒耕送隠直辟青州幕府全齊七十城表海寄名卿開府馳羔鴈除書得俊英借籌心感激憑軾氣縱横浩蕩軍中樂從容稷下生士由知已用禄以及親榮送别羞長鋏能無歸去聲駕幸飛山教場閱武侍宴冬令三農畢時巡萬乗行川源分壁壘貔虎望麾旌王氣雲成殿天光日繞營風隨鼔桴急塵絶馬蹄輕發石機投短抨弦火激眀響振摧列缺影墮落欃槍令下凝霜肅恩加挾纊平搴旗輕俯仰奪槊妙縱横壯士前歌勇儒生縱觀榮炙行熢燧舉觴溢海濤傾清道遙傳警鳴鞭夕向城欲知威略逺區外讋天聲鳳覽徳輝開封府試婉婉丹山鳳飄飄萬里飛識時翻羽翼覽徳下光輝逸勢凌雲起和聲遂吹㣲層霄猶降顧治世獨知歸繒繳初無慮梧桐正可依願分阿閣地永謝楚狂譏校獵同支使作長郊被山澤積雪浄林臯殺物天時武從禽士氣豪飈塵遂車騎鷹隼亂旌旄壯節排蒼極歡聲激怒濤興餘生鼻火空闊㪚風毛狡穴無遺噍窮巢或暗嘷中原遂除害汗馬敢辭勞勸賞車行炙均恩士籍醩歸塗喧鼓吹餘勇屬鞬櫜快意當如此君看嵗月淊得隠直書重陽日登髙于三門禹廟悵然恨不參之作一詩以寄九日情何極三門望特髙大河横日夜砥柱析毫毛眺覽興亡古登臨意氣豪窮源悲絶域微禹歎容刀萬事浮雲去前賢逝水滔秋陰生逺塞殺氣起臨洮努力追遊晩逢人應接勞黄花滿酌酒白鷺看驚濤醉舞相傾倚商歌㪚欎陶别離懷病友書禮諭綈袍俗態隨傖父愁吟困楚騷飛車儻可得攜手恣遊遨王祕丞惠然相訪并見遺蜀牋𤣥石硯僕本時名薄君胡雅顧偏聞弦賞流水望氣覔龍泉談笑心相得逢迎禮率然樵蘇從不㸑詩賦許深傳墨石巴山硯魚鱗蜀客牋寵分通縞帶慕用比先賢知我春秋貴論交金石堅誰能憚先進自古有忘年送孫之翰知陜府山河晉表裏方伯陜西東昔重諸侯選今煩太史公固疑多直諫不得久居中時論譏憂半天心待攷功宣帝出蕭望之為郡諭意曰所用皆更治民以攷功旌麾都䕶道謠俗召南風偃息甘棠下知君簡易同吳資政守陜一年還守西都又改禮部寄示在陜時詩作此致謝分陜間何濶朞年迨有成去思仍舊俗來暮已新聲父老壺漿逺兒童竹馬輕圖書還洛奥禮樂命春卿繼出甘棠什流傳大雅情正風瞻豈弟舊觀復神眀露鶴九秋警霜蟬千里清知音非季子猶識二南并召公居陜周公營洛也寄張六卧疾在山陽都門一分袂覉旅兩如何薄宦貧病久畏塗憂懼多予自宋抵此亦為水驚幾成哭寢户幸免𦵏江波彌有三秋感誰杭一葦過新愁添素髪幽境長青莎安得攜君手開懷醉且歌張樂洞庭聞昔軒轅帝時巡臨洞庭咸池備廣樂南極燀威靈至樂均夷夏希聲入窈㝠江湖亂魚鳥宇宙激雷霆㑹有馮夷舞還令楚客醒遺音不可學逝近向東溟分題鳥鳴山更幽空山髙不極喧鳥自相求永日曽一哢深林疑更幽遺音㪚虚谷習響動岑樓寂寂千峯暝蒼蒼萬木稠居成境外趣真慰静中游誰强騷人賦王孫不可留社日宴臨波亭呈府公春色池上好公來朝日初棟梁歸喜燕霖雨躍潛魚雲氣隨歌妓林光暗碧車案碧車一本作隼旟心閒簿領暇興適酒盃餘言志吾與㸃論詩商起予定知金谷集不比右軍書送升之諫官上耳目河北今股肱出處誰與並功名方見稱鈎陳虚侍從天路逼飛騰急病忍濡足憂民先飲冰萬人瞻使表百縣懾風稜雅意本朝在規摹方面憑寒荄待暖律狡兔避秋鷹慷慨都亭語無嫌力未能九月八日晩㑹永叔西齋醉翁手種菊呼我宴西齋落日有餘興窮秋多所懷緩歌揮白羽趣舞墮金釵烏㡌何勝落黄花故自佳念離還作惡處世亦安排蒼鬢聊相對青雲豈易階母容燭見跋能盡酒如淮少作三年别人生定鮮諧奉酬春卿資政給事見寄并貺法酒王甸雄三輔侯邦重百城公雖縱談笑人自服神明烹幹元和正陶鎔庶物精優游破餘地洒落動髙情訟比甘棠息居無吠犬驚勤追頖宫學繼出汝南評風雅移方俗弦歌溢頌聲忘年及晚輩與進絶諸生預列登堂拜陪參别乗行襟懷向客盡風彩照人清弧矢親觀徳滄浪並濯纓宴餘花爛漫獵罷雪縱横末節形骸外良辰樂賞并西曹寛吏讁東閣借賓榮密席眀金炬佳人出玉笙聽歌濃黛斂看舞小腰輕敢謂招攜訊由來許與誠㑹知私坎井未可屈長鯨鳳尾騰中詔麟符寄别京去思邈已逺陳迹浩難平叩叩煩書禮悠悠想斾旌何時命霖雨舉世望阿衡逸唱回春藻深衷釋吝萌自然心醉久那在酒如餳次韻和宋職方北城菏澤元通濟陶邱已近齊身紆㑹稽綬詔圻武都泥求瘼初無術端居愧擇棲萬家嚴壁壘五雉聳樓梯版築人同欲經營事不迷峻防誰敢慢隆棟可言低兵衛森旂㦸軍聲疊鼓鼙論詩譏自鄶肄士取諸暌物境晨昬異賓朋步武躋逺烟春漠漠殘雪晝淒淒華髮歡同籍他年恨解攜瓊瑰何足報埽壁為君題䝉某借示新詩不勝嘆服輒妄作五言一首以誌欣慕元化陶鈞外中樞斗極邊濟時俱陟降均逸暫蕃宣近輔城連十東方騎累千親歡主于適時論老而傳養志古何有承顔能浩然君羮鼎味在綵服衮衣聫徳表真希世天倫略比肩名今萬石最景帝曰石君四子俱二千石于是舉集其門號萬石學肯一經専相戒南陔養賡歌棠樹篇塤箎盛迭奏金玉爛相鮮錫類迂深眷懐歸私自憐一聞詩禮意特悟昔人賢陳亢聞詩聞禮又聞君子之逺其子某違親外補自以不足讀仲卿之篇聞一得三矣觀後苑瑞蓮靈液涵秋色仙花露夕香交隂分擢秀並蒂爛齊芳回復天鍾氣深沈地獻祥寳燈輝四照文羽勢雙翔飛葢宸㳺密披圖祕牒光重華與同本併此祝無疆擬御試求遺書於天下中祕收圖籍清衷訪古初周爰馳使傳悉上得遺書事有先秦舊文多變隸餘千巖窮禹穴四徹按崐㠊髙閣題天禄羣英議石渠定知奎壁彩從此麗雲居河決東郡以平聲為韻叔父令賦傳聞大河决逺與北溟通汜濫蛟鼉怒蕭條郡國空淇淇園方下竹瓠子復修宫世代文成術民懐伯禹功沈牲煩太史負土困闗東封禪應知外誰人秦矩公上夏太尉四海傳烽急長安亦響振老儒稽變事是時秦州守坐邉事貶秩强敵暴生民廷議衣冠客書聞草野臣諸公咸世傑天子識平津開府三司舊提兵十萬新丹青大信著明白睿謀伸賜馬飛龍亞分衣寶帶親貔貅帳下士鵷鵠幕中賓虎節闗河雪天街畢昴塵朔方須築郡燕谷豫含春策效曽無敵師行輒有神人心惟助順天道亦親仁執鉞來刑虢勾芒下賜秦成功符屈指黙化劇陶鈞既已通西域還應察珮珉焉知充國頌不足壯麒麟次袁陟十四韻羇旅嗟無友佯狂漢水陰相逢幸傾葢送别悵分襟之子雖吏隠髙名何陸沈蛟龍蟠學海風雨潤詞林寡和嘗歌郢傳經雅屬參孔子作孝經屬參丈人今諭蜀幹譽爾勞心接淅予征逺看雲反顧深旅懷兼去住秋色愴登臨信有江山助宜無霧露侵相思見逸唱清絶響寒砧擊節時孤笑開樽憶共斟歳華幾向晚客恨孰能禁城闕愁回首詩人誨嗣音曽非青玉案為媿洛生吟聞西使到闗遙聞西域使來獻大明宫故事三苗比官儀敵國同賜書深慰藉錫命極優崇含垢應王度懷柔尚古風蒼生向來急殊俗此時通冠葢長城北邊闗絶幕東春秋大一統吏事責三公何有長沙客題詩慟哭中寄閬州諸弟聞西蜀大水渤澥來參首西南入漏天泄雪三峽壅噴雨五河懸雷電虚巖底虹霓白日邊孤城危獸角沈竈溢蛟涎朐䏰愁巴俗超騰怯羽仙傳聞吞夢澤想見墮飛鳶漢河星槎逺泥塗劒閣偏空懷萬里浪興盡閬風前九月二十五日召赴後苑觀稻時惟兩府及講筵諸學士得預時方講春秋農祥依帝力鈎盾即天田覽物秋成後回輿銍艾前膏塍衆錦錯香穟萬珠聨共賞倉箱富初非雨露偏銅池寒引溜玉樹晩含烟縱觀欣遊豫登嘗慶吉蠲執經紆顧問拜賜濫周旋不負春秋學端逢大有年行詣揚州壽寧寺隋宫老荆棘淮地祖山川天子周王狩周世宗嘗幸此諸侯楚社遷宿軍江水上休甲古城邊清蹕乃過此髙臺亦宛然殿空生影響畫古剥丹𤣥缺甃驚跳鮒遺碑失紀年廢興真可感耆舊毎多傳一詠蕪城作斜陽聞暮蟬和喜雨望嵗憂農事為霖屬柄臣吁嗟動雲漢精祲驗天人霏霧凝空曲雄風激水濱驅除斷炎燠洒埽浄埃塵勢欲翻河海聲疑過鬼神山川共秀發穹壤劃清新庶物含生意元和倚大鈞穴蛟深奮角轍鮒黙翻鱗雷電天威逺耕桑帝力勻依然四時正好在萬家春㑹府開清旦髙堂引慶賓沃焦心有待濯熱正無倫蒸礎遺占信隨軒舊史真京師并福潤爻象在經綸舞罷看佋服談餘識墊巾新詩追大雅輿誦洽烝民單袷寒仍薄清和氣已震晴暉明旭日霽色巻髙旻亹亹希前哲淒淒幸及辰陽秋書閔雨一頌魯公仁病中逢秋欣然慰懷作五言呈兩倅過更縻逺戍懷祿滯歸休一卧淮陽閣三防塞外秋傷時惟慟哭謝病不幽憂主畫稀前輩忘形賴雋游韓稜才抗俗枚叔賦無儔感慨今如此支離尚有瘳涼風鴈南去清夜火西流江海鱸魚興何當汎斗牛詔書求方略之士咸令自陳破敵須多士憂民賴九重公車皆自薦物議絶先容駿骨何妨市金臺不易逢處嚢争耀末躍治要居鎔秋野騰鞲鶻春雷起蟄龍吾徒正髙卧欲老白雲峯聞徳州河決九河乗積雨大水出平原無復金堤固空驚漏澤翻蛟龍移窟宅魚鼈害黎元直想崑崙圻兼疑渤澥渾三山屢漂蕩百谷互并吞大懼彞倫斁誰能謁帝閽送子髙知潤州屈指朝廷士誰能望素風賢良方正舉父子弟兄同鄙諺黄金貴愚儒白首窮今看一戰霸信有萬夫雄官秩南宫峻天文右掖通塤篪諧大雅鴻鵠起層空帝予夸鄉樂民懷濟物功吳人真得虎漢守去憑熊山勢端臨北江流正直東遙知子牟意故在九城中題幽州圖代北屯兵盛漁陽突騎精棄捐看異域感激問蒼生尚識榆闗路仍存漢郡名可憐成反拒未見請横行先帝曽親伐斯人昔徯征大功危一跌遺恨似平城往者干戈役因之玉帛盟權宜緩中國苟且就升平名號于今錯恩威自此輕奈何卑聖主豈不負宗祊事有違經合功難與浴評復讎宜百世刷恥望諸卿封畛唐虞舊氛祲渤碣清遺黎出塗炭故老見簪纓寒谷青陽及幽都日月眀此懷如萬一髙揖謝縱横某往嵗侍大人守丹陽粗知此郡之盛復戲成小詩呈子髙自古佳麗地到今風物竒羣山盡迴抱緑水止逶迤事體存都㑹繁華盛昔時秋聲雄鼓角曉色亂旌旗樓觀渾飛動林巒互蔽虧子䳘留客飲白紵送歌詞太守貴如此郎官清可知虚投射堂策深恨著鞭遲淮上期十一不至淮上稱晨朝晨光滿麗譙有懷空悵望無和獨行謠水色全含鑑林花半隠樵雲烟平宿莽鷗鳥破春苗野俗陽歌麗游人白馬驕先生惟寂寞至樂亦逍遙洙泗風差逺川原景幸饒思君不得見何以助簞瓢和府公二十韻百草迎年茂羣花逼夏零天工感寥落春事出丁寧皓月彫寒魄鮮風結暖馨彩霞融縹緲甘露洒清泠照坐千枝燭搖空九子鈴輕黄金綴縷凝碧玉鐫缾爛漫輔鮫錦褵褷聚鶴翎問名驚競秀變態駭流形鍾美應成媪儲芳或景星意真乗澹泊氣淑倚娉娗浄影臨彫檻疎音隔後庭瑤妃旦酣酒玉女夜窺櫺時世妝濃澹朝雲夢窈㝠魂從攀處亂醉任看餘酲禁籞曽迂幸天歌獨仰聽一時矜絶出衆卉謝晶熒正爾生成巧由來造化靈屬詞勞比興圖象費丹青雨重碧油幕燈昬雲母屏謫仙才不世激賞為君聆同貢甫賀錢子飛兄弟盛徳淳熙耀豐規振後昆降心徠俊傑前席問黎元嘉㑹真千載休聲聚一門象賢俱秀出濟美並鴻鶱性復朱繩直書曽玉露繁十年森氣象江海豁詞源心伏驚諸老名聞動至尊深嚴親賜䇿淵黙静臨軒明白朝廷制丹青教化原屢聞呼萬嵗争誦累千言宜有非常遇誰嫌不次恩官儀推粉署地望逼星垣令聞人人得風流善善存春華照棠樹髙韻溢箎塤義辱交游接歡心抃笑煩空慙一枝小當謝北溟鯤召赴崇政殿觀新樂聖人千嵗合禮樂百年興律以聲身效功兼述作稱道將諧一變天欲佑丕承舊典周官在遺音制氏増獻書嘉魏叟博物待延陵金石完新制工師變舊能英華融治世淳古邈逾繩縱觀傾朝野𢋫歌望股肱和風動寥廓協氣㪚凌兢帝所真疑夢天階自絶升三雍漢未盛九辯夏徒矜珥筆欣攄頌名山益望登社後雪故陰不自斂飛霰一何驕强妬春陽盛那妨玉琯調滔天初極望見晛已全消詎損朱華麗秖添緑野饒泥塗窮道路絺綌亂鼲貂遂恐天時錯仍虞嵗事枵浮雲猶苦結燕賀乍驚飄但使風從律無嫌物反祅初過元日社又放紫宸朝乗興從君飲孤音續郢謠立春日乾祐縣送梅花終南全近蜀春日得新梅始信秦風是非闗越使來秦詩終南何有有條有梅雪霙眀自照雲葉薄誰裁香重浮山露膚清避俗埃衆芳知逺矣獨秀亦悠哉翦綵何勝妬嚴妝莫自猜差池鼎鼐味曠絶棟梁材把酒千山外那令寂寞開淮西廟梅花獨此處有之荏苒江南村芬菲臘後春逾淮翻不變映雪已争新俠骨香驚俗氷膚冷照鄰定非隨驛使直恐謫仙人聞笛空含怨看圖恨失真應為一時賞莫與衆芳倫形鹽象虎備物崇賓饗斯鹽肖虎形熬波煩巧匠象武示君靈天產參多品秋嚴聳外庭炳文隨鏤刻毅氣得儀型服孟非同趣昭文亦異經碎身如見取調鼎薦芳馨同徐監簿灞涘望長安驅車凌灞岸回顧望長安北闕塵明滅南山氣鬱盤人來日逺近城轉斗闌干長樂鐘聲斷秦川樹色殘聽歌迷夏首倚瑟想邯鄲鬒變驚遊子因知行路難㨗詩㨗報蒼龍闕書從白豹城賊中城名大軍所至闗河開地利雷雨肅天兵氣攝千山動威加萬里平獻俘多寶玉効首悉長鯨社稷靈何逺巖廊策自精餘妖暫煦沫壯士待龔行天馬來西域貂裘實上京遙知無干羽冠劒賀公卿寄上濠州舅氏天閣愁揚子諸侯困仲舒反為清浄誤竟以謗讒疎開幕臨濠水懷章下石渠塞翁輕失馬莊叟樂觀魚倚杖曽何怪逍遙直自如貴為千騎長富有萬家居卧理翻無事髙談雅不虚舊憐狂簡性遙想賦歸歟和永叔對雪次韻驚飈巻白日朔氣逼寒門已密何須急雖多未覺繁勢輕飛有態光潔瑩無痕磥砢封喬木玲瓏綴夕軒迹深看敝躧歌苦相車轅測厚矜膚寸愁消怯晏温崩騰雲將合颯沓雨師屯埽去蛟螭亂堆成虎豹蹲夜明休秉燭詩興助開樽公若憐萱桂那辭訪小園為紀四謁舊相識非無負米志復作退飛身豈但龍蛇蟄終慙鴻鴈賓蕭條依陋巷契闊問通津長鋏行焉往悲歌夜復晨交遊青眼隔世路白頭新意謝栖栖侫情依戀戀仁敢齊天下士真媿轍中鱗肯問三年學壺飱及病親和鄰幾聖俞持國雪十八韻依次用集霰羣陰結飛霙萬寓低乾坤豁開闢方域露端倪廣宇規茅藉彫墻築粉泥山容包紫翠壤色變𤣥黎筒葛來従越冰紈製自齊遊歡慰枚馬獵興助良奚飾貌沽珍粹因方衒角圭隙間巇可抵行際道先迷沾服驚遊霧臨淵怪飲蜺調元思暖津跧伏憫靈蠵幾誤烏成鵠纔分鶴處雞慘膚森若竪墮指酷逾刲澤國水還襲焦原足易棲貧儒欣夜誦季女戚朝儕舟楫膠藏壑驊騮滑踠蹄冰歌競若擿埴杖頻攜景幸人人得詩從物物題長吟歌真樂安羨舞前溪奉同鄰幾詠雪侵旦滿城雪從天萬里風陰沈朝日變慘澹宿雲同徑渡湖沙逺羣飛海上空崩騰兼上下眩晃失西東帝所銀為闕河濱貝作宫瑤林髙不極璧水闊無窮巨麗神仙境精㣲造化工霏花争爛漫噴霧極溟濛埽洒埃塵豁苞含物象充牛衣愁病客鶴髪思衰翁侵冒貂餘黑憑凌火似紅厲威深刻轢正色坦昭融妬舞多珍鷺迷羣有斷鴻陽微怯頻復陰老恣驕雄蔀屋貧奢等輝牕晝夜通嵗華驚朔易故老識年豐占賦慙賓右聞歌慕郢中閉門徒自喜乗興力難崇再和鄰幾冱寒凋暮節大雪冒神州氣象昬千里光芒混六幽度前蚊過目隕曠葉驚秋烟素長誰引雲羅薄自浮勢輕低更起影亂去還留玉石均朝采珠璣共暗投圍城眀組練格野亂旗旒模象羣形富牢籠衆險周履空諳曳縱騁望快登樓栖璧函珍帶裝簾耀寶鈎潤應何澤比甘豈井泉侔萬物紛同態繁陰慘共愁波聲増渤澥原色借來麰邀醉時吹面欺貧屢洒裘驅除夏蠱盡排迮楚氛收人謝泥塗辱家成汗漫遊畫圖饒粉堊比興極歌謳積久風逾厲消遲嵗聿遒短才非子敵祕思為君抽髙韻侵梁郢煩言不可詶壺公祠大樹若人既羽化伊樹亦千年委榦龍蛇蟄此樹枝反下入土中交陰孔翠鮮流光駒過隙浮世海成田信有壺中藥能移物外天真游藐何許神理信茫然㑹見遼東鶴悲歌感市門里壺公所居近市今此樹乃在郊外非漢時城也七言長律劉永年部署清燕堂漢庭謀帥用詩書丞相今來握虎符帳下偏裨皆緩帶軍中談笑亦投壺故開廣榭宜髙㑹自有清泉入座隅三輔衣冠獻謠俗五陵豪俠壯規模椎牛釃酒捐長日急管哀弦舞豔姝射取天狼作乾豆莫推衛霍擅西都和王待制新作白鷺亭七言十韻六朝形勢㑹層軒前俯蒼洲卻踐山二水中分鑑澄澈萬峯離立翠回環古人遺賞興亡外良守來居仁智間聽訟遂同棠樹愛放懐真與海漚閒嘯餘風雨知何處望及雲霞若可攀喬木參天愴城郭浮萍滿地笑人寰楚謠清絶酣秋興吳拂從容舞玉顔象魏由來心自逺湡浯聊復樂忘還掖垣幸許追遐躅天祿仍欣接近班塵土揚州頭欲白逺從君借慰疎孱和陳度支杜城園池長韻詩丞相文惠公兄弟舊名園三輔衣冠多俊賢邇來風物故依然君家復在城南社時望從知尺五天韋氏訓經門益大酇侯治第世相傳雪殘太一虛無裏塵漲重城蒼莽邊修竹萬竿迷暗谷清渠百道㪚鳴泉欣欣樹色知春近寂寂禽聲覺地偏使節歸來同晝錦扁舟浮去似登仙禆諶適野非無興更挹逍遙池上篇賀春卿拜資政殿學士移西京留守自昔東郊擇股肱至今筦鑰委名卿官儀髙出金華殿地理雄專北斗城寶帶别兼天馬賜彩衣仍照玉符眀正風鼓動周南什和氣銷除武庫兵聽訟甘棠從勿翦攀轅舊吏不勝情千年重得吳公守門下無由望賈生公是集巻二十六

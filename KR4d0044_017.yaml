body:
  text: 公是集卷十七宋劉敞撰七言古詩朱雲志士不忘棄溝壑勇士不忘喪其元伏雞搏狸狗襲虎感激只在精神存漢朝陵替外戚盛五嶽振蕩三辰昏臣強主弱上不悟庭中唯唯誰能言朱生節義邁金石面劾不避師傅尊願求上方斬馬劍誅一厲百清其源天威震怒不我受利刃接頸雷霆奔當前折檻色不變命在頃刻誰扳援昔時仲尼魯司寇七日行戮端乾坤嗟我此生心不就冥冥后土埋其冤漢家社稷變王氏張禹虛蒙師保恩卓然先見在物表佞臣敗國誰復論我願乘雲款天閽巫陽掌夢招其魂立朝蹇蹇辨邪正無復姧諛開幸門金山廨院門前松響亂頭上壁上江圖流眼前松聲水響兩不辨似有疑非心悠然安得乘興浮輕船潘道士上清宫中老道士曾從先皇去封祀山頭候夜窺火輪汾上掊鈎出金耳雲成龍虎當翠華豐隆前導清泥沙萬靈扶駕百神護雜沓仙侶堆雲霞黃衣羽客十有餘多能引説軒轅初漢廷儒士議迂濶天子自用申公書金繩玉䇿埋石壤神光夜見連空虛天心報貺宸意喜白茅玉印旌其徒帷宫賜席接虎幄待之如賓盡誠慤中書祕術使之觀神動精搖易飛躍鼎湖龍去何超越日月茫茫自奄忽龍髯墮地秋草生人世霜華滿頭髮遇海舟秦王好神仙東上琅琊臺蛾眉緑髮五千輩去乘長風款蓬萊此時秦人海旁立生别死分不敢泣但見髙帆雲中沒野鳥悲鳴為翔集過海舟何時還火焚荆棘空驪山猛虎行陸不辭虎豹怒水不避蛟龍爭衆人亦有命大賢豈虛生千嵗猶須臾四野如戶庭解弓挂扶桑脫劍倚太清騰身騎日月萬事如蚊􅀈貧賤有固窮慷慨激中情炎火燎崑邱乃知白璧精雪霜沒衆草髙松獨青青寧生歌車下戚促兒女聲時至乘化遷運頽與物冥震雷不經聽芥蒂何足嬰君不見賈豎競錐刀蚍蜉利羶腥何如乘雲御氣逰咸池長嘯濯我冠與纓雷陂勸耕作雜言此陂蓋江都宫之地吳王釣臺在其旁先時民三十家耕其中後強為吏所奪廢不耕者十餘年矣子按地籍悉召還耕者使縣大夫授之地如其舊君不見江都宫昔時何崔嵬下臨雷陂水前踞吳王臺臺傾無餘級水竭空塵埃隋人已曾顧此長嘆息今世更為隋人哀乃知天地間一盛亦一衰但從伏羲已來三十餘萬嵗未有書契勝言哉堯桀是非何兩忘我欲勸人闢草萊種稻水一方藝麻陵四頽爽鳩之樂非我有聊獨玩此田莓莓未知百世間更復誰當來且欲及間從賓客省耕訪此時徘徊碧瀾堂苕溪之水搖空山霅溪波流無日間上有髙堂蔭華宇蒼翠凌亂軒楹間異時客心樂真曠白鳥鵁鶄期往還解纓敧枕便所適焉能復問居夷蠻嵐光稜稜聳屏幌水響濫濫搖瓊環正如明鑑發塵匣萬象聚眼醒容顔秋風已髙白芷老編荷制蕙文斕斑魂清魄爽弄明月洞庭跬步尋非艱神仙有無未可信物色但訝非人寰瑶宫紫府竟何若茫然逺想令人潸長竿獨繭可以老安用馳獵盧重鐶況復邦人講文墨風雅不待仲尼刪丞相詞章狀元筆犖犖神裁無由攀嗟我胡然陷塵滓不能追逐鷗白鷴發狂醉問二三子吳溪釣碣何如頑陳丞相詩王狀元書刻于石濉陽歌梁人猶為濉陽歌隋人水調能相和梁人池臺已平地隋人岸樹空嵯峨梁人隋人去如水水聲日夜流不已張巡廟前春草生里人尚識將軍名國讎已滅心不死憤氣半夜凌欃槍丈夫節義豈在下願為長劍刳長鯨馬蹄硯巴巫之山足竒石氣含秋雲如黛色君家寶硯安所得圓為馬蹄螢為璧宛城路阻流沙長中國久絶真乘黃惜哉逸足世不識所存一迹猶形相鄙夫雖非伯樂比偶見裊蹄識千里願君不惜勤示人倘有驊騮免空死天中山兹山陂陀但盈尺其下盤根乃無極勇如共工莫可觸力敵愚父無能役開闢以來傳至今形勢雖小當天心斗極回旋未易測日影短長猶可尋石旁隂穴穿洞府中有神物為之主禱祠往往見光景暵旱時時作霖雨由來邱山貴靈不貴大正復陂陀亦何怪岸旁倒樹滄洲老樹生幾秋幹如墨龍根紫虬雨水摧激勢突兀夭矯出飲滄江流危不見持顛不扶蕭蕭生意令人愁豈無耕夫與過客暫時憩爾行則休西風八月海水飛枯槎昔曾凌斗牛恐爾漂零未終極挂帆欲去仍回頭黃寺丞井上桐樹為雷所擊君家井泉深百尺上有髙桐十尋碧鳯鳥不至獨何憂蛟龍深潛莫能識迅雷烈風來擊時地軸翻倒海水飛正直摧傷豈天意爨不成琴殊未遲送人之會稽鷹隼羞逐巢上雛騏騮恥隨廄中駒由來俊邁惡羈縶子獨三年留上都江南秋風鱸魚美庖鱠炊粳東入吳腰間蘭佩垂左右船若神仙人不如會稽古來好風俗嚴助買臣相繼驅近來太守廷中臣拔賢好善當朝無子今東去懷自許解榻非君尚誰與剋日飛聲動洛陽聽君如聽雷門鼓題深甫所種樹中庭郤掃無餘地憐君種樹還有意重隂覆屋千尺時徙坐讀書殊可喜似君秀骨不易攀當援桂枝星漢間豈能玩此便自老塵俗紛紛聊閉關雷氏子推迹石鼓為隸古定聖俞作長詩敘之諸公繼作豫亦繼其後結繩既亡書契出文字變化尤倏忽太山七十有二代遺事昏昏萬無一岐陽石鼓起晚周宣王之詩史籀筆天下金石凡幾存此當為甲彼皆乙體勢鳥迹雜蝌蚪詞章車攻與吉日六書既廢小雅缺能使兼存此其實韓公昔嘗歌感激若弦周詩播琴瑟雷生今復隸古定如破魯璧傳簡帙道之難行乃若兹二千年間能事畢先王親用必貴本流俗玩文因喪質此雖于今似不急豈不班班見儒術藏之天府自其所大訓河圖亦何物會稽羣玉久冥寞漆簡韋編尚髣佛昔人雖死名不朽智者能為巧當述太學先生事起廢誦此勤勤救埋沒會令永與天壤傳不比酒誥俄然失城頭烏城頭月出天正白衆烏驚飛啼夜色枝髙風多露新滴畏聲惡影不能息愁人感之援鳴琴拂弦成聲淚沾襟嗟爾一生八九雛遊翔不過東西林白頭反哺無所恨桓山分飛獨何心驚烏北林風多丹葉稀棲烏畏月夜中飛哀音亂發不自得孤影履翻無所依作巢欲髙避彈射誰道通宵不能息山深林逺去冥冥清露寒霜損毛翼梅江東梅樹江西客僻地相逢眼俱白雜花亂草鬭青春玉樹瓊枝比顔色輕隂漠漠寒不返清雨髙風旦連夕惜無白日照芳菲決雲之劍那能得忽憶曾過上林苑五柞長楊心所識結根擢秀皆尋常得地翻宜帝王側后皇嘉樹無逺邇爾生自合居南國勉留佳實和君羮丁寧婦女無所摘蒲萄蒲萄本自涼州域漢使移根植中國涼州路絶無遺民蒲萄更為中國珍九月肅霜初熟時寶璫碌碌珠纍纍凍如玉醴甘如飴江南萍實聊等夷漢時曾用酒一斛便能用得涼州牧漢薄涼州絶可怪今看涼州若天外和道粹探春去嵗探花煩兩郎今年逢春情更長廣文主人似知我一首新詩能發狂載酒可以過揚子肩輿不嫌干辟強東風老去甚容易百日醉倒我無妨嶽州引水詩洞庭清波一千里城中釀酒常無水泥塗逺汲人共悲瓶缶屢空罍亦恥鑿井引竿髙下流清泉泠泠六物修邦人巳息漢隂拙楚酒無復邯鄲憂誰謂機心有機械大賢事業終除害去年得澄心堂紙甚惜之輒為一軸邀永叔諸君各賦一篇仍各自書藏以為玩故先以七言題其首六朝文物江南多江南君臣玉樹歌擘箋弄翰春風裏斫冰析玉作宫紙當時百金售一幅澄心堂中千萬軸摛辭欲卷東海波乘興未盡南山竹樓船夜濟降幡出龍驤將軍數軍實舳艫銜尾獻天子流落人間萬無一我從故府得百枚憶昔繁麗今塵埃祕藏篋笥自矜玩亦恐嵗久空成灰後人聞名寧復得就令得之當不識君能賦此哀江南寫示千秋永無極題永叔白兔同貢甫作梁王兔園三百里不聞有與雪霜比今公畜此安取之瑩若寒玉無磷緇春秋書瑞不常有歷年曠世曾一偶寧知彼非太隂魄鳯凰麒麟亦郊藪周南之人公腹心張罝肅肅橫中林獻全不損一毫末顧直肯計千鈞金雕籠密檻回君寵初不驚人有時拱由來文采絶世必見羈豈能隨衆碌碌自放原野為三清殿木槿三清殿前木槿樹朝繁夜暗自相催晨光始出洛水上暮雨又下雲陽臺仙姬神女衣服麗紫玉雜佩垂玫瑰春餘衆木苦寥落況乃漸逼清秋來繁花滿目真可惜稍稍萬戶鋪蒼苔黃冠道士情意薄見似不見年年開清風滿席車馬少莫與共賞傾金罍嘗疑壺中有仙術安得升天繫白日和吳九元會漢家初成長樂宫亦以十月朝百工武夫崛起少儀節秦制苟簡非王風猶云始知天子貴此甚可笑田舍翁聖朝禮樂百年備文物寖盛兼羲農月正元日古所用數嵗一講賓王公東至日出西太蒙南極丹穴北崆洞重譯欵關惟恐後奉琛薦幣無不恭太常調樂辨韶武少府拭璧差桓躬旗常卷舒王路肅干羽出沒頑民從協風入律效朔易瑞雪盈尺迎年豐隂慘陽舒變頃刻天決地闢含沖融君看此等聖人事豈得復顧叔孫通道旁擊壤九齡叟校室受書三尺童慣習升平不自覺豈悟帝力髙無窮賴君作詩播英實如以鳴鼓祛昏聾吾知朝廷億萬載與地侔富天比崇荆州兒歌都盧小兒歌且舞口吹鳴笛手擊鼓日落羣遊塵土中噭咷不分巴與楚年年送臘迎春光家家相隨夜開戶嗟汝兒曹舞更歌及爾不為如老何贈文顯古來畫工著名者吳氏鬼神韓氏馬鬼神既偽不足稱狗馬空難亦多假顯師幼年獨寫人至今精絶疑有神灑毫便覺面如面後素倏訝身觀身髙冠長劍天子側他時金聲復玉色師皆對之槃礴裸衆謂十常八九得諸公固為廊廟賢麒麟未畫宜私傳一邱一壑吾亦可煩仗丹青無間然戲作汛槎篇呈知府給事君不見枯槎去時八月風海水自與天河通飄飄反出扶桑上恍惚遍歷羣仙宫宫旁佳人瑩如玉邂逅相聚歡不足詐言物外日月長正苦歸來光景促回頭稍與煙霞隔世人空辨支磯石伯勞燕子東西飛惆悵中間斷消息春日作天王城西金明池三月欲盡花菲菲逰人白馬黃金羈騑驂結駟來金堤禁城恩波無逺邇清光面面均流水賞閣後小桃同景純作僕本山野之生民不堪刺促拘冠紳江湖自放老將至豈悟嵗月如馳輪謬隨多士貢王府浪得虛名通紫宸遽從下列居第一當時頗似稱平津感激更恩報天子僶俯從事希涓塵濫書閨籍比朝舊驟上天祿均儒臣肖躬顧影每自愧譬如蒿艾參松筠未能引分拂衣往正用飽食慙懸鶉太平中外雖少事賢哲馳騖猶辛勤幸無官守逃吏責自可昏醉窮青春夭桃花繁髙倚樓似若有意娛佳賓浩歌大笑忘檢局座客歡倒知吾真東風瞥來能幾時況子東西南北人人間會合常苦少擊鮮舉白毋羞貧林端啼鴂風雨夕異方相憶空酸辛土牛行立春自昔為土牛古人設象今人愁豈有笵泥作頭角便可代天熙九疇村夫田婦初不知繽紛圍繞爭相祈皆云宜蠶又宜穀拜跪滿前同致詞由來人事常反覆久立要津寧爾福請看今者拜跪徒少選分張取其肉牛實無知何用祭牛能有情豈不愧化育萬物非爾才世人資爾聊為戲胡九齡畫牛歌書契已來有繪事畫牛著牛今始二胡生戴氏雖異時形似之間實兄弟鬼神易寫狗馬難古人舊語乃信然不爾寥寥千萬年筆墨曠絶無比肩胡生曾畫百一牛變態曲盡稱為尤翰林主人題辭古四海文士歌賦優俗情護前喜排後此事戴嵩未曾有會知誦玩無巳時畫與胡生俱不朽同鄰幾觀中道家書畫宋公好古天下聞法書奇畫多求真獨將文雅遺後世官雖貴達家尤貧近自唐室逺及秦上下略數千餘春丹青翰墨著名者一二收拾忘辛勤象賢濟美聲不墜手澤巨細皆如新朝廷交逰纍千百未嘗肯示尋常人蔡侯江翁與梅伯于今磊落稱絶倫退朝相從得盡見更覺清門無雜賓鑒微賞異極毫髮四座若獲千金珍往往發狂或大叫詠詩落筆爭紛綸我隨衆人久碌碌學殖欲落衣生塵願登羣玉探禹穴不憚山海馳舟輪此君家近未宜後率然欲往懷逡巡淹留秖覺嵗月老復恐異物潛通神但傳妙唱想絶迹誦歎慷慨書搢紳西戎行吾聞聖人之兵有不戰不戰之勝善之善況復良將握天威西戎雖強安得擅憶昔屬國羽書聞中宴徹酒詔圖勳丞相陳謀御史請獨可遣將誅其君吏民詿誤不足治我以威德周無垠尚書侍郎盡明哲秉鉞載旆如火烈羽林積卒眀號令賊兵蹙戚憂巢穴方春緩誅已偷息天不假易行勦絶太常請獻象功舞史臣願勒西山岊懸頭藁街敕狂慢積粟金城撫疲苶西戎行告爾勿逆果自坑百蠻來威天下平題浙西新學文翁昔時理蜀土能令蜀人似鄒魯范公今者鎮江東亦云教化似文翁文翁范公本同志蜀人吳人有殊異蜀人之先自魚鳧不聞道德能過吳吳前泰伯後季札禮讓繼為天下師迄今遺風未全滅得逢賢侯益昭晰本之舊俗已相百況乃磨礱皆俊傑當時文翁化蜀者獨有揚雄及司馬後生可畏不可誣安知不在吳公下吳人于今歌且仰我公去矣安所倣願公上佐天王明姬文孔術從兹行戲金壺道士法墨走筆雜言寄鄰幾聖俞狂鯨蕩海海逆潮巨鼇抃山山動搖疾雷徑風自相薄潛鱗伏介俱不聊我無巨麴復藉糟無思逺人心忍忍公是集卷十七

body:
  text: 公是集卷四十三宋劉敞撰書啓擬朝廷報契丹書恭問大契丹皇帝遣某子遺朕書告將親伐元昊朕不敢聞先帝割靈夏五州之地封李德明使奉拓跋之祀編族宗籍以寵其姓尊官貴爵以養其身厚賜重祿以足其意丹書鐵券以堅其信德至厚也澤至大也曩者元昊不思先帝之至德忘其祖先之勤苦因中國纍世之賜豫以煦沐其人民遂扇搖種族造作名號掠劫郡縣西邉苦之當時公卿大夫皆曰元昊所為大惡不道朕不得赦故詔邉郡厲兵馬為士民之衛絶其屬籍削其官爵以苦之而已然皇帝遣使再來讓書隨至以為起殘民之伐無忌器之心邀開南之地求二十萬之賂朕甚恧焉以皇帝之書問公卿大夫皆曰地者先帝所有不可輒移二十萬之賂在中國秋毫耳不足愛惜以絶歡心故詔有司如皇帝所諭今西邉之吏將帥和輯兵械益修財用大足元昊數至攻無所利掠無所得智窮變索甫求納款使者再至朕未許也而皇帝欲躬御師徒深涉其境意者儻有他故以怒皇帝之心不然向也全安之今乃破毀之乎且元昊中國之畔臣皇帝之尚主也朕將勸行則是以疏間親而不忌器也朕將沮行則是失計而養畔也其伐其不伐皇帝自處之朕不敢預聞攻城下邑歸之彼國係虜人民歸之彼都輸獲珍寶歸之彼時朕不以破元昊為幸亦不以不攻元昊為怨守先帝之約全二國之歡不亦可乎皇帝勿疑譬如交址雲南有為不順者朕詔有司討之豈以此遠煩皇帝哉聞皇帝行獵西北苦寒之地自重為望與吳九論武學書前此有人自京師至言朝廷制作武舞教之庠中者小人竊喜以為太祖太宗功業軼三王德厚侔天地而廟樂未立雅頌未備公卿大夫乃宜冬不裘夏不葛而日夜謀之所以使名聲洋溢與萬世無窮百姓有以詠歌四夷有以觀聼也而闊然寖久功烈掩塞是以天子感焉而作樂崇德以薦之宗廟肆之上帝矣周室既衰管絃之書遂亡于今千嵗焉而吾徒乃且復得閲其蹈厲親其文物是千一之會也以足下方為學官所以欣然奉書求粗問制度亦欲夸動下國奮揚輝光今辱來訊乃知傳者之誤而國家自以邉鄙未靖故立武學以校驍鷙之士孫吳賁育之儔小人失望又重感歎昔三代之王建辟雍成均以敦化者峩冠縫掖之人居則有序其術詩書禮樂其志文行忠信是以無鄙倍之色鬭爭之聲猶懼其未也故賤詐謀爵人以德褒人以義軌度其信一以待人故曰勇則害上不登于明堂民知所砥而無二心是以其教不肅而成其政不嚴而治曾未聞夫武學之制也夫縵胡之纓短後之衣瞋目而語難按劍而疾視者此所謂勇力之人也將教之以術而動之以利其可得不為其容乎為其容可得無變其俗乎吾恐雖有智者未易善其後也而況建博士之職廣弟子之員本之不知教化其寖弱矣夫戰國之時天下競于馳鶩于是乎有縱橫之師技擊之學以相殘也雖私議巷説有司不及然風俗由是以薄禍亂由是以長學者之所甚疾仁人之所憂而辨也若之何其效之且昔先王務教胄子以道而不及武者非無四夷之患誠恐示民以佻也今既示之佻矣道其已乎四方之人何觀焉且足下預其議而不能救歟吾所甚惑也足下書曰時事日新恨不我見此獨非新事乎吾既見之矣故聊以裁答答進士潘起辭不為師書某頓首秀才足下前日吾子有辱于某聞吾子稱摯不敢見也辭不獲命既已見矣敢使從者以書還摯某雖未得識吾子之面然亟與鄉大夫執政者遊其論處士之秀必以吾子為最譽莫信于鄉黨故某也始有願交之心今吾子乃幸過其門而諭以書是使某內得所望而外有以託于交也夫信于鄉黨之信固信矣猶之信于人也未若信吾之所自信為信于已也是以因吾子之書而審求之則夫不自多以年不自足以智不自憚以力此君子志士之所尚而某也方得法于吾子子有何望師于我哉或者人有以不肖欺聰明歟吾子之聼有時而過歟亡其所謂寡于世者矯而闢之歟燕王之尊郭隗是也不然師之道甚難何願于不肖夫古之人既樂于育材又重于為人師既悅于問學又慎于得已師師者聼之者也無拂師者則之者也無違無拂者君事也無違者親事也古之人兼君親而奉之未嘗易于師師亦不可易也某常誦此不敢易于人亦願吾子不失易于人也道德之師深而約章句之師雜而競文字之師辨而夸今吾子上愧于道德而下不願為章句文字然則吾子何求矣哉吾子亦謹用其志母怠所事道德將自至某也不足以司進退吾子察之某頓首為伯父作上范參政書某月某日某官某再邦獻書參政諫議蓋聞小人之事君子也盡心焉耳矣事可陳雖私不嫌也言可出雖疏不避也忠信故也今某願有謁于閣下不敢嫌其私亦不敢避其疏願閣下聼之人皆言曰執事好善恐不及用人不求備是周公以來一人而已夫好善恐不及則士樂歸之用人不求備則世無棄材宜乎小人之率胸臆舒肝膽于左右也某之獲私也非一日又嘗得為屬吏又嘗得預于薦論以某之不肖也而見信于執事故親戚為某酌酒而相賀朋友為某易貌而改觀然而某之意獨不自幸也何則當是之時執事猶在外故某非敢望伸于人也十年于兹矣今自執事之贊天下之政也善無所不升能無所不用某也竊不自遜以為奉令承教亦幸無罪非敢當執事之首舉也其亦庶乎一之後而及之乎其亦庶乎再之後而及之乎其亦庶乎三之四之而及之乎今既不獲矣意者某之愚不概于心耶抑亦衰老不足以任事耶抑亦不肖將有讒慝之口間之其中耶自非然者執事豈輕昔日之舉而重今日之賜哉默而不言其無乃使人疑夫執事之遺忘微賤乎其無乃使人疑夫執事之薦人不以誠居情乎其無乃使人疑夫執事之不自信其信乎是故事雖私不敢嫌言雖疏不敢避此小人事君子忠信之實也願執事察之某又聞趙文子之相晉國也所舉而用者管庫之士七十餘家夫管庫之賤而文子不捨者考其素行有以效其將來者也故能成其功仲尼曰如有所譽其有所試今某則自謂見譽于門下矣未見試于門下也執事如不忍廢文子之意遺仲尼之義則某也願竊自比管庫之士豈獨某幸甚而已抑四方之人將大有悅執事之不遺微賤者焉干冒威重不勝戰恐上鄭資政啓邈遠符光亟遷嵗籥晞虹霓之隆耀渴江漢之清流心如旌搖訊將雨絶伏惟坐鎮南國翕寧純禧恭以某官稟靈山川為世梁棟邁一德以齊俗舍至誠而協中往者董正武經毗參公鉉折衝出于樽俎威令被乎夷戎茂功越成優詔均逸雖帝堯四嶽之任下統諸侯而姬旦九罭之詩咸思衮服矧惟注意固亦匪朝暗于知人幸兹守土誠陶鈞之遠及趨棨戟而無緣仰冀上為廟朝益綏福祉與知府龍圖啓右某仰止英輝藐焉陋國顧恪居之鞅掌曾奏記之差池非敢自疏誠獨內愧何德宇之寬裕循雅故之勤隆貶損音題開諭蒙蔽于傳玩而無斁輒藏弆以為榮伏惟某官積學淵通扶義倜儻以功業而為任急名教以濟時仁政所加休聲之所偃善民得職獷俗之革心天下想見其風主上方倚為相敢希慎重以塞具瞻與知府龍圖啓右某久違符光寖易年籥方遘閔而潛處絶奏記而自通馳精棨扉萌吝心曲伏惟坐鎮多暇味腴積中恭以某官政為吏師文入聖奧紹先覺之逸軌含正始之古音清德鎮浮休風偃俗誠明堂之良幹亦太室之元龜曩者典領大農總司邦計憂思獨遠謀謨至深暫違近班求全而或毀旁詢餘議皆仰而益光顧彼價藩豈淹大用緬冀俯順炎燠倍頤寢興與許州龍圖啓右某伏蒙迂念舊治寄聲下寮在謙尊之光誠有餘裕願朴鄙之質非所勉任竊承弭節便時涓日樹政去思未解條教復新雖巖石之瞻以淹遠致而方面之寄可謂允懷某近馳悃誠諒布聼覽悵雲霧之益驟遠坐隅惟燕雀之依仍在宇下敢冀為國自重少副區區與滑州龍圖啓右某願遊藩籬望見風采幸被外臺之檄尚叩大府之嚴接淅于行趨塵在近伏惟綏萬夫之政道六氣之和德業優優吉祥止止矧聞膺鎮圭之召修卓馬之朝舍人治裝方隆相漢之望霖兩審象即頒命説之篇仰冀上為倚毗倍寧寢處與審官龍圖啓右某緬違英表洊易流隂百憂忘生殆無視息之意三年俟放獨作羇孤之臣雖辱賜環猶棄居郡藐漂淪而是懼嗟僻陋之見容簡記差池精爽飛越惟雅素之甚厚冀神照之未忘近承雍容清嚴左右顧問矧導和之有術固錫福以彌沖恭惟某官賢業幾深德華彪蔚宿負致君之略況多正始之風宜處弼諧益觀治象諒在匪伊之夕即頒誕告之書某過被詔函遠分使指趨階符而尚遠搖心旆以增勞冀順天和允副時望與經略龍圖啓右某啓伏審升榮內閣臨統西師圖書之淵固歸德望屏翰之地宜在偉人實亦朝廷之華豈伊交遊之寵伏惟某官猷為英亮神檢邃深直清播于當時功烈效于已試猶屈方面之任寄外禦之憂儻周九命之崇尚先作牧漢三公之選必更治民訂之輿情又可前賀某叨膺符守往繼治規自顧空疏竊所欣預與知郡屯田啓右某偃伏髙風想見英采徇挈瓶于吏局絶捧謁于賓閎過辱流謙特迂華檢緬荷勤渠之眷秪舒鬱結之悰伏惟某官偉度淵停敏材鋒出方攄遠到之藴以極冥升之基豈伊近藩久淹令望冀慎衛生之術少寬引領之懷上參政諫議啓右某伏覩邸報竊審某官光被僉俞毗參大政二公演化方茂太平之風間世得賢實快具瞻之望恭以某官德輝華國智略該時經緯之氣甚髙王霸之術獨茂施之為政卓爾絶倫固宜主上極注意之求朝廷期迓衡之美豈獨不賓之國未康之民偃薄乎威聲滲漉乎仁教某職居守土禮絶沒階仰跂虹霓之光俯同燕雀之賀上樞密諫議啓右某忝預搢紳之後得遊化鈞之中灑濯至和奔走賤事以謂竿牘之禮不足以自通然其燕雀之誠則深于預附惟均調丕律燕翼大猷神明降休福祉如響伏以某官具體元哲炳靈嵩髙蹈先覺之英規藴庶幾之賢業所以經國尊主扶世導民莫非正始之風以趨大中之極功德並茂輝光日新故出臨價藩則萬夫恱服入贊上樞則百工咸熙蓋折衝兩楹之間而寢兵萬里之外上方博采輿誦稽古懿經將正富民之封母觖在庭之望敢冀上為宗社精調寢興上樞密諫議啓右某伏審某官光膺詔册榮二樞衡伏惟慶慰恭以某官德重國基道鄰聖奧用經濟為已任以忠肅得士心致君之規期于熙盛康世之度實效憂勤下推具瞻之謠上揆可久之業所以增重宗稷覃化朔南時論翕然僉選斯在命下之日海內寫懷皆習聞于訏謀已想見于風采伏惟三后之治髙並羲軒四輔之賢今得伊召太平可翹足而待盛德方隨流而攘某忝聫具寮慶覩休遇莫諧班賀但極歡心瞻望符階不任抃激之至與龍圖諫議啓右某近修賀牘輒枉嗣音仰厚眷之過隆撫懦衷而增感伏以某官道隮聖壼名聳朝端入贊靖淵之謨出寄蕃宣之重聲猷絶擬功業並崇而雅素不忘勞謙益甚夫以教化為任必敦愷悌之風仰詠誨言祇欽德望尚阻侍前之便更深引領之懷伏冀上為廟祧倍寧寢履與龍圖諫議啓右某倥偬官曹淹留荆楚地處南海幾絶馬牛之風知慙小夫遂忘竿牘之禮永惟僻陋無以奮飛近審賜方底之書急追鋒之召僉俞允屬柄任必歸遠方傳聞通夕載抃矧以某官智窮精祲學富淵源處繼事而皆得其宜主盛德而不牽于俗聖朝所以簡照多士所以推賢名澤並流功業已試方旌華國之望以正富民之封敢冀上為倚毗倍寧寢餗不任懇懇之至與知府諫議啓右某暌遠德符淹留官局雖引領而繼日念置郵而曠時逖聼風聲坐慰孤陋諒偃藩之多暇益専氣而考祥伏惟某官髙度鎮浮遠猷濟俗明見秋毫之末智均輠轂之流舉無遺功謀不失利管啇強富之䇿國用以饒申甫蕃宣之材上心攸屬矧最七人之近列樹千里之休風試之治民蕭侯不樂于居外倚以為相漢帝素察其深中方期促裝願必加愛棲仰之抱一二罔伸與參政諫議啓右某啓竊覩邸報伏審某官光被僉俞毗參大政天下幸甚伏以某官德為柱石言合典謨蕩正始之徽音敦致君之遠業憂民惟切奉已甚微退讓形乎具寮直清見于行事久蓄二公之望果膺補衮之求況今強敵凌邉疲氓失職實須迪哲大濟羣生追太古仁夀之風熙先帝文明之治功業甚盛指揮可期某忝分外官親覯嘉會雖罄得賢之頌尚稽賀廈之儀瞻望符階卑情不任踴躍之至與知府內翰諫議啓右某伏承偃息近藩將明盛德雖本朝之望士論觖然而方面之安民謠籍甚伏以某官學猶天府道幾聖鄰謀謨之淵深器幹之英亮卓躒當世翺翔昌期固當調玉鉉之至和賁衮衣之繁寵輟處外屏猥同衆人福潤之流限以千里恩教之遠局于萬夫甚未稱致君之姿且將有遵渚之詠遄歸可佇葆育是祈瞻望軒墉無任懇款之至與中丞諫議啓右某竊覩邸報伏審某官光被僉俞擢領風憲伏惟慶慰恭以某官清修方潔妙慮淵深智出千人之英德居四科之首所以潤色王度光輝朝端後進得以承風天子倚以為相厯金鑾之祕近専內史之浩穰到皆有聲政在已試猶且眷上卿之府國體所崇惟七人之班朕命宜允龍光駢委風采昭融盍徇倚毗之恩以開弼諧之漸某效官有局趨賀無期仰跂虹霓之光俯同燕雀之慶與知府諫議啓右某比者御命荆州假途會府揖虹霓之絶焰聆河漢之緒言沃如清風祛此凝吝矧以重鄉枌之愛厚宗姓之盟宴有加籩禮常異數逮啓行于南浦復延餞于麗譙感著實深跂戀何極涉始秋之餘暑投芒刃之新硎理解居多天均自若伏惟某官炳靈南紀挺德中朝明白球琳之姿深閎廊廟之器輟從星閣超踐蒲規尚觖望于符階暫吐金于江表豈誠優于共理抑將試以治民固應匪朝即有寵拜幸慎葆光之術稍寬引領之勞懇款于兹敷陳奚既與知府龍圖諫議啓右某祗膺明命再涉東曹捧綸綍而若驚感風波之可畏積薪相襲後者居先屈産復歸齒其加長矧外無尤異之積內乏左右之容舊物猥還衰顔自哂且夏官之屬甚貴書勳賞典之行皆盛盟府亦宜得清通之智英敏之才豈伊滯姿可以虛受此蓋伏遇某官至誠推士閎量容人深感彚征之非辜仍憂屈穀之無用齊素為紫庶幾三倍之資燕馬非良忽增一顧之價仰銜異眷但刻深衷收功桑榆願激昂于壯節誓心金石期慷慨于當時瞻望符光豈勝懇款與知府資政諫議啓右某伏審某官暫解樞衡出臨藩屏本朝注意雖均逸而優賢蒼生具瞻仍矯首而觖望竊以某官比德伊管致君勳華謀大而志深器逺而任重借籌帷幄覃化邉荒甫臻偃武之規亟辭執事之柄功髙而不與道隆而從汙穆然清風粲若白日昔吉甫有徂齊之駕人詠其遄歸周旦挾居東之疑王思于新逆僉俞久洽登拜不遐伏冀上為廟朝倍寧寢處永興到任謝宋承旨啓右某啓肅將命書臨署吏牘藐是空疏之質寄以會繁之區方地數千連城纍百內修民社之政外總兵戎之機僶俯事為經營分表力非其任智不逮心此蓋某官雅懷并容餘論推假不遺三益之素使就一麾之安顧恐非才終無云補冀因德輝之及猶有期月之成方阻披瞻曷勝銘向與知府侍讀給事啓右某驟遠德輝遽雕月彩以瑣旅之無暇曾奏記之後時伏惟鎮撫一方翕寧百祿竊以某官材為世傑智則吏師優遊上前之嚴徘徊天下之望出守近輔甚觖乎民瞻入毗大鈞方欽乎帝賚敢冀倍寧寢食仰副俞諧與留守資政給事啓右某伏審某官諏詢穀旦臨撫别都伏惟慶慰竊以某官贊襄大猷登翊元治名澤純粹而並茂規畫昭衍而無疆簡詔自天均勞于外伊王城之開奧總宮籥之申嚴深寄股肱保釐郊甸福潤之博布山川而交流鍾重之威參九鼎而特固上采古事下聆僉謀蕭何之居關中尚躋相國周公之在洛邑亦有衮衣將副具瞻豈云曠日敢冀順倚毗之眷敦葆輔之才瞻望符階不任頌戀之至與知府侍讀給事啓右某屢馳短記恭詗下風惟藴暑之戒辰方前旌之取道清塵勤止泰宇晏然竊以某官德昭聖鄰學該天府歷居顧問之地積負弼諧之瞻居臨價藩大翊邦甸曾未入境黎俗欣望而已多永惟簡心䇿書延登以斯逼伏冀俯順時序精調寢興與鄆州給事啓右某啓伏審寵升禁瑣改鎮須句雖巖石之瞻尚觖時望在股肱之寄誠出上心素辱顧憐伏深慶抃竊承遠驅王節俯壓楚郊望清塵而匪遙逼賤事之有守莫諧趨見但極勞心恭以某官蓄謀淵通具體純粹修治世之具見于彌綸抱逢辰之資合若符契密籌帷幄之䇿大鎮邉境之虞成功甫施均逸居外且衮衣有遵渚之感本朝多注意之勤雖于藩是崇實宰政斯在仰希上為宗祏精調寢興與資政給事啓右某數被簡書載驅道路瞻棨戟之邈若曾竿牘之闕如內訟冥煩交馳神幹伏惟飲醇專氣條教寧民宜慶祐之方長兹德符之永固恭以某官秀出人傑卓為國華體貌著于上心利澤見于天下豈其局迹千里卷懷一時信將振芳風于清塵恢宏業以濟俗尚冀良食益符具瞻與知府給事啓右某沿牒旁郡省親京師深惟便私之行蓋蒙錫類之賜重迂騶馭臨餞郊亭貪恃厚恩匆忘淺量至于昏醉有瀆視瞻雖高明之見寬實寤寐以自訟伏惟聼覽多裕吉祥來寧某驟違後塵甫越數舍引領馳戀向風增懷冀養環中之和庸慰天下之望與資政給事啓右某暌遠符階貿遷嵗律縻簿書之鮮暇修魚素之曠時惟寬度之過人固恕情而容物側聆布宣詔教翕受多祺伏以某官柱石之材龜玉之寶由中庸以希聖推盛德以鎮浮頃嘗贊襄萬機焜耀三府方為霖以賜册遽均逸而作藩近輔陪京之邦實繄福潤明堂布政之地方藉弼諧幸保寢興允符禱頌與皇甫給事啓右某啓焉依寶鄰時假餘潤未有及民之德過竊增秩之恩此蓋某官素加陽秋曲厚風義使疲蹇效賀庳虛蒙榮重煩咫尺之音深諭勤渠之意愧當雅眷增鏤鄙悰方拏舟以啓行阻詣門而取别伏希上為朝社精調寢興瞻望之深非筆能究與知府給事啓方某恪居官次跂仰符光迷于期會之文曠是竿牘之禮伏惟臨一都之會據千里之邦惇樹休聲緝寧福履恭以某官醇文貫道髙義鎮浮騰膚敏之徽聲挺中和之正氣功業已試議論有餘聖上之所簡心多士莫不推美論股肱之郡孰若中天次承弼之臣僉曰舊德即期入輔以副具瞻敢冀上為廟朝精調寢履與知府給事啓右某間者于役忽焉纍旬奔道路之孔修淹簡書之多畏心繫幕府思如風旌伏蒙迂念空疏親貶教誨一字之重固比于衮衣八行之勤本施于敵體非此賤陋所宜捧承恭審燕處超然茀祿綏止且感且慶以晝以昏竊聆道路之謠卿士之論以謂盛德素著宜遂就格天之功而方面本輕不當屈致君之量深恐大旆亟還中朝實惟僉俞敢不私喜某飭駕還郡拜塵有期更冀上副倚毗倍加攝養與給事啓右某恭沿使檄就省親闈還軫近郊復覘星符之采趨風上館再聆月且之評慰抃交深指陳罔究與許州知府給事啓右某肅承朝命開決郡條屈首受書不能半古彈冠充賦苟利及親幸試可于上前辱推恩于券外參民社之重居僚吏之先曾非所宜何以自強此蓋伏遇某官陶冶庶俗熏蒸太和不欲寢昌之朝而有退處之士使得奏薄伎以自效相諸侯以協恭受賜甚多敗材是懼然而土宇所及柝聲相聞譬若層雲之隂必及庶草溟海之浸莫遺近封用此而言知免于戾顧守恪居之律阻修趨見之儀瞻望符階飛越神幹伏冀上為宗祏精調寢興公是集卷四十三

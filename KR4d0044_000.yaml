body:
  text: 公是集提要臣等謹案公是集五十四巻宋劉敞撰敞有春秋傳已著録葉夢得避暑録話稱敞集一百七十五巻據其弟攽所作集序稱公是總集七十五巻叙為五種曰古詩二十巻律詩十五巻内集二十巻外集十五巻小集五巻文獻通考亦作七十五巻則夢得所記為誤矣原本不傳今新喻所刻三劉文集公是集僅四巻大約採自宋文鑑者居多而又以劉跂趙氏金石録序㤗山秦篆譜序誤入集中即攽所作公是集序亦採自文獻通考而未見其全故注云失名其編次踈舛可知又錢塘呉允嘉别編公是集六巻亦殊缺畧考史有之序春秋意林曰清江為二劉三孔之鄉文獻宜徵而足今三孔集故在獨二劉所著燬於兵則其佚已久矣惟永樂大典所載頗富今裒輯排次釐為五十四巻疑當時重其兄弟之文全部収入故所存獨多也敞之談經雖好與先儒立異而淹通典籍具由心得究非南宋諸家逰談無根者比故其文湛深經術具有本原攽序稱其合衆美為已用超倫類而獨得瓌偉奇特放肆自若又稱其考百子之雜博六經可以折𠂻極帝王之治功今日可以按行學聖人而得其道所以優出於前人友于之情雖未免推揚太過然曽肇曲阜集有敞贈特進制曰經術文章追古作者朱子晦菴集有墨莊記曰學士舍人兄弟皆以文章大顯於時而名後世語録曰原父文才思極多湧將出來每作文多法古絶相似有幾件文字學禮記春秋或學公糓又曰劉侍讀氣平文緩乃自經書中來比之蘇公有髙古之趣云云則其文詞古雅可以概見矣晁公武讀書志謂歐陽修嘗短其文於韓琦葉適習學記言亦謂敞言經㫖間以謔語酬修積不能平復忤韓琦遂不得為翰林學士盖祖公武之説今考修草敞知制誥詔曰議論宏博詞章爛然又作其父立之墓誌曰敞與攽皆賢而有文章又作敞墓誌曰于學博自六經百氏古今傳記下至天文地理卜醫數術浮屠老荘之說無所不通為文章尤敏贍常直紫薇閣一日追封皇子公主九人方將下直止馬却作一揮九制數千言文辭典雅各得其體其銘詞曰惟其文章燦日星雖欲有毁知莫能則修亦雅重之晁氏葉氏所言殆非其寔歟乾隆五十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀

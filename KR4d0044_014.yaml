body:
  text: 公是集巻十四宋劉敞撰五言古詩獨釣南湖澄澄春波深中有魴與鯉無人收潛隱好生得吾子投竿坐孤石盡日倦未起既失常若驚有逄忽然喜子心豈殘物子道豈娯已人誰辨子意我請盡其理垂釣須得鮮治國須得賢所以不憚勤豈無蝦魚間君子愛其君諷諭以為先詹何臧丈人古事皆已然誰將子之術更誦吾君前負暄四首歳晚天地閉積隂凍乾坤大鈞止亭育羣鬼私自尊竊弄造化柄擅令衆隂存幽奸發𤣥漠死氣蒸黎元朋黨漸相蔽大辰訴其寃帝惟百物憂恐不見陽春敕使拘衆鬼朝曦送㣲温大明煥幽鬱和氣迥崑崙初曉尚餘禀漸高遂增暄煩冥避窮朔玉燭調中原衆蟄久僵俘今來更騰鶱㣲禽鷃與雀弄影勢飛翻草木反生意益思擢鮮繁潛魚離冰穴無數遊清源嗟我同此慶兀然坐朝昏緼袍幸可賴卒歳無復論稍稍出辭氣仰天荷公恩始知過狐白願得陳至尊昔宋有愚叟亦能欵君門况今事西討十萬羅櫜鞬烽火通警急鐡衣遶夷蕃辛悲墮指魄少慰無衣魂誠使勝挾纊豈在衣便蕃斯言出感激忠信非詐諼何由露天聽虎豹守天閽南極無永晝北方多苦寒負暄意頗適容膝居亦安嘯傲長者轍崔嵬切雲冠道書異俗味稚子同大歡不覺老將至安知利害端被褐暖不足負暄温有餘内慙意氣狹婉孌在庭除清晨倚西楹夕暮守東隅常恐浮雲起冰雪不須臾靳靳懐薄願安得留飛烏日出東南隅晨光散瞳曨山形西北去暖氣浮冲融天地大逆旅客身一飄蓬胡雛啼朝霜邊馬嘶朔風獨懐負暄樂未許斯人同歸當獻天子無乃笑愚忠遊仙焦明忌常處蟪蛄愁永年淺俗更相訾曠懷自邈然我從造化遊夐立萬物先四海固咫尺大椿不獨延日月為我駕昏明相回旋超遥無終薄浩蕩遺拘蠻豈與功明士姝姝以暖暖智極蝸角下形敝陽榮間種萱種萱不種蘭自謂憂易忘緑葉何萋萋春愁更茫茫古人有虚語名實未必當南箕與北斗燦爛空成章讀莊子三首簫韶豈不美爰居終自悲俛仰魯城上驚顧不能怡伊昔舜廷内鳴鳯為來儀和聲詎中變衆聽邈難齊澆淳懸異代聰昧未殊施咄嗟播鼗武永乏滄海歸漢隂灌園叟抱甕力難任規為一何拙機事自傷心賜也不受命媿之汗沾襟至言與世邈幽操非俗尋以此高宇宙豈知倦山林彼哉夸奪子佩服爛朱金商丘有竒樹厥生非一朝修根走靈社騰榦拏赤霄拳局無大用液樠不可彫誰謂非世器終焉托逍遥致身適有遇松桂寧免樵呉中大水有負郭田在常州云已漂潰作一首示公儀百谷馳東南三江澆吴㑹積隂漏雲漢涌水翻積塊斯民既昏墊我稼墮顛沛魚鼈有餘糧郊原靡遺穗餬口竊自恕矜寡將何賴天道有盈虚吾寧罪于歳救飢苦謀拙禹稷不可待行矣㠶長風因之浮海外覽古二首固國不須險用兵不須强域民在所守威敵在所良由余仕諸戎秦穆警封疆晏子猶在齊范昭識難亡小國有其人大國豈易當奈何億萬師牧野遂煌煌天馬出西極由來中國用楩楠秀荆楚乃作晉梁棟遺材彼興憂得寳此以重伍員楚亡命一旦摧郢衆世薄事有然申胥得無慟和聖俞織女無恥羞織女有恥羞歳一過牽牛暫來巳遽往光景不少留㑹合一何亟離别一何脩不知靈匹意正使今人愁河漢清且廣風波無時休蹇修古不存烏鵲相為謀理拙心莫同誰令結綢繆蛾眉坐自老紈扇空悲秋同獻臣七月七日夜詠牛女熒煌昭回章婉孌靈匹燕薄霧垂絪衣明星綴華瑱潔身奉君子所幸常顧眷風浪既多艱歳時劇飛箭㑹賒别堪疑那能􅀢不變願構虹蜺梁與君常相見觀水楚山積隂霖百谷盛號怒虎豹亡其曹蛟龍失所据勢排蒼崖列力與巨石注頃刻浮青天㣲茫浸高樹兹城依平原自古北懸瓠汝南城謂之懸瓠墊溢安敢辭漂浮實所懼禹功不可及河伯欲誰惡寧以蛙龜歡姑為下民蠧築防力不足疏瀉志猶慕安得鞭馮蠵從兹萬里騖喜雨海上雨初至中庭樹交翻幽人整冠帯喜見雷電存積潤瀉河漢餘滋被邱原魚龍倘可活鼃黽誰嫌喧稍稍秋欲變㣲凉入前軒古人致亹亹吾亦開吾樽御叔小丈夫頗知笑臧孫賢愚定誰是興盡忽忘言送張氏家姊至丹陽早别曠夜凉氣早八月風已寒遥雲結層隂白雲被芳蘭徬徨步高隰怵惕傷肺肝奈何逺别離涕下若波瀾木鴈堂聽訟吾猶人安得終曰間從吏巳可知拂衣未能還逍遥及餘暇苟且寛心顔洒掃延清颷空凉闢重闗古人有所處才與不才間持此以自娯將非真隱然寄題蕭山歳寒堂伊堂早頺挫松栢亦憔悴常惟摧為薪中塗失蒼翠昨來始營葺榱桷復高麗蕭蕭青雲榦始有百大意神明頓來還故老咸歔欷朝燕得所常問誰救其敝吾家渥洼駒頗有超絶氣好亊能復古愛竒趣起廢後凋甚明白來者思髣髴此實賢智謀古人貴豈弟仲尼頌子産其飬民也惠召公憇甘棠後世歌蔽芾勉旃崇其業事足伯父繼伯父曾宰此邑令名與佳樹自可俱億歳示鄉人陳生祖母之侄曾孫我祖學蘆山潛光玩詩書君家獨先覺一見矜里閭固有如陳平長貧賤者乎青雲果自致逺鑒驚羣愚鳴風兆有媯懿占信不誣粲然諸子賢仕各列大夫號稱萬石君盛事衣冠無聲華輝圖史豈獨榮枌榆外族繼清高恥為亊物拘未嘗入城府奕世風不渝宜有羔鴈求怪其久闕如君來就鄉賦信足光慶餘郡守勸駕行紫庭與計俱努力事學問豫章擢扶疎游子懷故鄉矧伊接葭莩勉率為歌詩尚能念起予聽府妓歌憶春卿資政給事南方酒如澠醉倒本容易蔡姬緩聲歌清響動雲際惜哉知音稀此輩自難值曩者東山游一日巳三歳人遐成陳迹興盡失超詣寥寥方外歡獨數嵇阮輩凍雲臨寒空掩鬱邁往氣引杯亂愁思擊節還拊髀招斁鑿井不及水雖勞乃無功耕田捨終畝歳暮安俟豐人當少年時耳目明以聰所為患不能所學患不通患之不自勉老去逾顓䝉雖復欲自力歳時已飄蓬譬彼陟大水不能曉西東諭爾安可忘我嘗夢周公朝乘朝乘日車出暮戴星影還顛冥朝暮中出入咫尺間已覺素志非更知人理艱小利専欲速大徳不踰閑雪楚塞常閔雪窮冬未為晚欣看朔風過想自萬里逺崩騰龍沙飛浩蕩北溟巻勢排炎荒瘴力救南國旱悲鴈飛何之蟄龍卧終偃至神亦憔悴爾輩何繾綣歳隂倐將改天運有必反慷慨吾何言短衣數自挽復雪二首十日三雨雪同隂坐朝昏幽人感歳晚更覺日月奔勁風西北來轟哮動乾坤中州山崑墟四徹皆璵璠鴻鴈遊可哀竹柏生僅存念此使心悲何時見陽春志士則憔悴薄俗安足論鄉里狐狢兒反怪天正温前夕盛雷電謂言春和發典衣買春酒歳事亦可悦不知天難諶信宿更凝冽朝來雪盈尺初計頓乖越吾廬甘重塞敝褐忍百結豈敢咨祁寒又非慕炎熱隂陽相交錯萬一成災孽憶昔魯隱公九年春三月癸酉雨震電庚辰大雨雪春秋書為法其事何照晰曾經聖人筆下學而上逹况此四月間又當季春末願排閶闔㦸一獻春秋説路逺泥阻深愁哉卧巖穴書堂客身困旅人未如負舍蝸滚滚荆呉間所居不常家宴安非吾事但恐髪早華且復一日葺隨時具生涯白盛爛四壁塋凈磨疵瑕虚明豁心府永使思無邪愁來莫與語起就書龍蛇亦足寫方寸放歌快咨嗟苦嫌中庭窄所生野草花故須種松竹反憶日月遐歳寒與誰共惆悵終無他答江丈雨中繁隂乘炎夏晦色正朝暮蛟龍困雲雷虎豹病氛霧過時畏昏墊推分縱所遇閉閤空自愁救飢𦕈無素江侯卧閭里本自濟時具方與造物遊昔同斯人慮作詩破幽憤㥛筆紆逺慕磊落三賢人千秋如面晤道同義相契未必形影附長謡雞鳴篇因見君子度九月十日雨中孚先見過圍碁嘗茶幸從大夫後而無吏事憂出沐風雨夕閉門松菊秋素交辱見過意氣何綢繆車騎皆雨立富貴若浮雲圍棊紓壯心酌茗當獻酬豈惟鄰里好足慰平生游書籍可許通水火得所求獨恨雞黍薄無以從淹留我窮若匏𤓰于世良悠悠寂寞守一隅非君誰見收庶幾除三徑玩此歳方遒莫令子衿詩更作商聲謳渴雨示府僚東風破窮隂農者亦望歳宿雪滋巳消驕陽更為沴璣衡運元化律吕導和氣四序宜平分斯人尚憔悴闗中大兵後所向半凋敝荆棘獨至今睠言可涕泣憶昨辭紫宸從容畫民事焦勞見顔色曠蕩洒恩惠開倉出其陳履畝奪浮議乃知聖神心獨在舜禹際所憂吏不稱未足效兼濟安得三日雨滂沱澤厚地百昌奮皆作吾亦免于戾吁嗟望雲漢冥漠想萍翳交泰及此時羣生豈終否某朝辭目面陳發倉救飢及罷均田履畝之擾皆見許成冬富貴抱憂患貧賤苦煎熬居此二者間幸無終歳勞養生賴裘葛卜隱開蓬蒿既不碌碌宂又不巍巍高炎凉縱所遇寒暑俱可逃竭力供子職大歡對兒曹至人貴真樂名位豈所饕咄嗟路傍子生死堪悲號卜居謝晏公燕雀赴廣廈雞鶩就卑棲我生共有託生理與汝齊憂患歴險艱轉徙疲東西常慕蠻與觸所居能自賫哀吟蹈楚郊主人欲招攜卜築煩里旅婦姑免勃谿此邦非故鄉習俗素所迷頗以羈見忌得安糝與藜下見賢相仁恤隱逾天倪隂徳少陽報眉夀至介圭巳當受一廛終身活灌畦卜居清波照蓽門垂栁拂危軒靜境偏相慰鳴禽時一喧羡魚還結網引水自疏源嘯傲陶唐世幽憂不可諼蘆泉吾山㑹雨澤汗漫千里秋不如蘆泉水來入城中流經營萬餘家澄澈去無際我樂與衆同泉能起人意泉旁宜嘉林時多桐與梓泉間宜美魚時有魴與鯉誰能捐萬事來我泉上居我欲解章綬從之泉上漁浮光山人居山中與虎豹處初不疑憚有母八十餘先生方獨往逝與一世辭雖未超雲霞豈嘗顧喧卑事親止于適接物能不為谷中虎豹多往往行自隨此是真人風何必太古時吾欲從之遊自嫌迹尚非寄心逍遥間聊可以相期初到東平得雨少服逢掖衣又為梁甫吟謬膺東藩守似慰畸人心宣布祗上恩浚明肅官箴治醇俗易美事半功反深嘉雨蘇旱苖慶雲結重隂天將假民樂我以開煩襟鉅野㑹百川東山凌衆岑庶幾緩吾帶一一窮登臨雨中送張六秋隂蔽陽光雨潦如昏墊居人鬱無聊游子行可念方攜一樽酒欲别情不厭雖無車馬贈篇賦私敢占人生逺圖在離索安足慊願為東南風刮日割長熖取觴醉車軌千里由此漸攝領審官六日還印長文戲作五言山野不事事未嘗中繩墨得官筆硯間懶與慢成癖前日承君乏始親薄領役捶鈎校毫芒簡髪差寸尺自知非其任良有不可力君誠神仙人那得頭不白繇兹謝睎跂依隱就閒寂桐花一株青玉立千葉緑雲委亭亭五丈餘高意猶未巳仙僧年九十清淨老不死自云手種時一顆青桐子同梅聖俞送尹郎中監舒川靈仙觀真人西度闗乃祖獨知之强著五千言竦身棄喧卑靈光無時没人世自超忽上下千歳間裔孫亦清出論兵復擊劒逺與道同符功名不如意白髪笑桑榆藏書天禄閣郎中上所集兵書詔藏秘閣卜居天柱山此職無吏責去去何時還山中醉白雲山下弄流水吾巳了損益未知生死耳聊登千仞巔下視寰中塵更因長風來揮手謝世人記所居草樹幽蘭晚已秀新竹直且疎樸􅈪亦巢禽坳堂自容魚長日肆炎赫周軒正清虚適心不貴多一畝覺有餘理㑹遣孤笑興來味羣書彼何擾擾爾我獨欣欣歟人臣無懷安吏治猶蘧蘆幸及三年淹庶幾閒燕居銅雀臺瓦硯當時鴛鴦夢飛入魏宫來崇構减餘香碧瓦空在哉磨礱變新硯洗刷滌故苔但取圭角全何必瓊與瑰樹下二首中庭兩佳樹密葉如翠帷擢榦一何高鋪隂被前墀清風自翩翻正晝無炎曦拱揖在我前我常往參之隱几旦復暮巻書坐忘疲安知非華屋聊以庇䕃為瑶室隕帝辛璧臺喪周姬由來滅亡禍不為草野施偃仰更何顧欣歡方在兹召公愛小棠百歳俾勿拔仲尼憩大樹一宿輒巳伐聖賢豈殊途人事有窮逹出處何可常我身固㣲末上無燕伯遇下無宋人孽從容聖賢間得此亦已竊庭樹中庭無多樹花盡自成隂熏風吹清和午影還蕭森上有出谷鳥間闗鳴好音下有放言人寂寞卧機心人鳥各相忘語黙不見侵吾廬此最好豈意在山林送石昌言知宿州宦情重居内世論輕守藩出處苟自得重輕安足原昔常怪蕭傅恥乗太守幡頗獨多嚴生厭直金馬門優游樹風迹宣布流上恩何負廷中臣而貶千乘尊石侯古人風自令薄夫敦平日不汲汲左遷更軒軒輕舟趣行裝合符去天閽高卧可以治簿書豈所煩我亦羈旅人不堪市朝喧又無適時用坐自悲素餐願為江湖長聊復育元元子若未北歸相過識吾言題和弟所居桐樹卜隱謝林藪考槃寄閭里嘉樹為我徒清風濯塵耳手披漆園書身擬長梧子窮秋忽感悲埽榻且歡喜冬晚贈深甫客游巳昨日已復歳月改流光一如此故物紛晦在忽使中心悲悠悠若浮海相思間何闊此意君當解公是集巻十四

body:
  text: 公是集卷五十二宋劉敞撰墓志銘皇兄故金紫光祿大夫檢校太子賓客使持節祿州諸軍事缺州刺史充本州防禦使上柱國天水郡開國公食邑四千四百户食實封九百户贈昭化軍節度使追封祁國公墓志銘公諱永裔秦悼王孫贈保平軍節度使鄖國公之子母李氏生十五年以勝衣冠召見賜名補右侍禁上之開國夀升及為皇太子也公皆以恩遷凡三遷至內殿崇班上即位拜禮賓副使西京作坊使內園使領貴州刺史又遷左領軍衛大將軍本州團練使左龍武軍大將軍萊州防禦使宗祀明堂助祭者賜爵一級徙缺州防禦使罷將軍官皇祐五年九月庚午以疾薨享年五十有七公之于屬籍天子兄也天子哀焉為輟視朝贈以昭化軍節度使祁國公印紱遣中貴人豫祠禭賵護喪事恩禮甚厚公性聰敏開悟其為兒時已能自修飭真宗皇帝憐之嘗召入禁中親諭使學而授以書由是益自喜數應制賦詩詔輒褒之及長好學慕善動靜顧禮不以富貴加人纍階金紫光祿大夫勳上柱國爵開國天水郡公食邑四千四百户實食九百户自祖宗制天下監于前世惇敘紏合以睦宗族厚其爵祿尊寵之而不任以事故宗室得以無吏責自保而材美亦無以見于世然其保祿持寵至于永年善始令終而無纎芥者其賢行亦足以推而知云公娶韓氏封高密郡君彰德軍節度使重贇之曽孫禮賓使允并之女先公一年卒繼室以武氏左清道率府率昭信之女仍封高密子男十人曰克平右衛率府率早卒曰克寬克友克仕並右監門衛將軍曰克勇克研並太子右內率府副率共一未賜名出後伯父承簡三不及名而夭女八人長適東頭供奉官王延之次適西頭供奉官楊應昌次適右侍禁高凱次適右班殿直石立皆有湯沐之封其二人尚幼二人早卒公之薨也殯奉先寺嘉祐五年有詔歸葬汝州梁縣乃以十月某日祔其祖先王之兆使者視襄事而詞臣刻銘志其墓曰秦惟寵王鄖亦貴公嶷嶷其國是為小宗勝衣就傳實敏實聰為善之樂簡于帝衷富貴不驕動而顧禮棠棣之華莫逺具爾古也惇敘于今為美夀不百年令聞不已喪還汝墳從先王居天子有命懿實是書納石幽堂恩篤禮殊茫茫萬世敢告不誣皇侄故金紫光祿大夫檢校國子祭酒右屯衛大將軍兼御史大夫輕車都尉天水縣開國伯食邑九百户贈洺州防禦使廣平侯墓志銘贈洺州防禦使廣平侯克溫鄖國公德鈞之孫濮州團練使承偉之子母曰范氏以天禧二年十月十日生生十餘歲賜名補右班殿直轉左侍禁改太子右衛率府率右領軍衛將軍上祀明堂遷右屯衛大將軍皇祐五年閏月丙戌以疾卒享年三十六詔以洺州防禦使廣平侯之印紱策書告其殯又特使中人弟賻視喪事于禮為豐侯為人謙遜敏慧能以其貴下人嫻于辭令應對涉獵多所通而尤邃音律積階金紫光祿大夫勳輕車都尉爵天水縣開國伯食邑九百户上于宗室固厚而侯之資又足以持富貴使幸而永年且久觀太平之盛其名位豈少哉夫人宋氏封夀安縣君太子太師贈侍中彥筠之曽孫也子男七人其四未及名而卒叔徹為右千牛衛將軍叔民太子右內率府副率共一人未賜官女六人長適右班殿直李傅共一早死四尚幼侯既卒天子哀傷之使中人取以入度其一為女道士而養其三人者禁中嘉祐五年十月詔以侯之喪祔于汝州秦悼王之園而志其墓中臣實為之銘銘曰葛藟之延本根是賴懿懿王族曰繁以大廣平蚤秀華葉俊茂中道而摧天理誰咎梁汝之壤先王是塋魂兮往居萬世攸寧皇弟故金紫光祿大夫檢校太子賓客左監門衛大將軍使持節昌州諸軍事行昌州刺史兼御史大夫柱國天水郡開國公食邑二千二百户食實封一千户贈涇州觀察使安定侯墓志銘贈涇州觀察使安定侯承操秦悼王廷美之孫廣陵康簡王德雍之第六子母曰清河郡君崔氏乾興元年正月生廣陵邸天聖九年召見賜名遂以為右侍禁再遷東頭供奉官改右千牛衛將軍左監門衛大將軍天子祀明堂以三后配上帝宗室皆助祭內外進爵加昌州刺史嘉祐三年正月乙未以疾終于位享年三十有七訃聞天子哀焉詔以涇州觀察使安定侯印䇿告其柩又遣中使視喪事弔賻之于禮為豐即以其月殯城南奉先佛寺君為人敏慧有姿望嘗授尚書略通大義愛樂賓客接之窮日夜不厭于技藝多所通而琴奕射御皆尤精過人又能為歐虞書號得筆法娶王氏封普安縣君贈太師中書令兼尚書令守斌之孫崇儀使令傑之女前卒繼室以其娣內殿崇班令短之女封新安郡君子男五人長克勉太子右內率府副率次克助右千牛衛將軍次克貢次克勍皆太子左監門率府率克勉克貢早卒其一不及名而三女亦皆夭死嘉祐五年自京師歸葬汝州梁縣祔于其先王之兆其窆之日實十月某甲子云銘曰帝綏四方親親以睦秦為别子亦疇其福翼翼諸孫豈伊異人念德畏義克亢其門安定幼慧敦書習藝不怠不驕以保爵位沒有追策天子之思刻銘幽穸後世是詒皇侄故金紫光祿大夫檢校太子賓客右監門衛大將軍使持節潯州諸軍事潯州刺史兼御史大夫護軍天水郡開國侯食邑一千八百户贈邠州觀察使追封新平侯墓志銘贈邠州觀察使新平侯克構者上從祖兄之子曽祖曰廷美秦悼王祖曰德彛潁川郡王父曰承最贈宫苑使宣州刺史母劉氏東平郡夫人生十餘歲召見賜名補右班殿直再遷西頭供奉官天子以謂宗室以服屬為親疏其授之官雖無事當使位尊而秩優以寵異之不當與庶姓等由是改右千牛衛將軍遷左監門衛大將軍皇祐二年助祭明堂領潯州刺史嘉祐元年十二月辛未以疾卒于位訃聞天子加哀憐使中使護喪事厚賻恤之而以邠州觀察使新平侯印䇿告其柩侯之為人溫厚有姿望能自飭以禮舉止甚厚事太夫人以孝聞喜讀書為詩又善射好虞世南書學之幾得其法嘗與宗室召對各使寫先帝自所造歌詩第共高下侯所書第一受詔敦奬上與族人嘉善而矜不能所以教育矯括之惟恐不至其有一善輒加賜金帛以厲其意而侯嘗以材見優故于其時受賜為多纍階金紫光祿大夫勳護軍開國郡侯食邑至一千八百户享年四十二夫人李氏吳王煜之曽孫右侍禁繼榮之女封樂夀縣君先侯十二年而卒又娶王氏贈鎮南軍節度使中正之孫東頭供奉官世昌之女封仁和縣君子男六人長叔璨右千牛衛將軍次叔况太子右監門率府率次叔派叔婼皆太子右率府副率其二人不及名而死女六人長未嫁而卒次適左班殿直郭昭彛次適右班殿直劉君平其三人不嫁學老子法居延寧宫為道士天子賜之名曰洞仙洞深洞惠云其一亦早死嘉祐五年十月詔以侯之喪葬汝州梁縣其先人之兆銘曰麟趾之詩王風是首顯允公族共德信厚猗嗟新平資質淑溫知孝其親信厚之元不忌不矜技藝畢能以善自名天子是稱生有榮耀沒有褒錫刻此銘章以告窀穸皇姪故銀青光祿大夫檢校國子祭酒行右監門衛將軍兼御史大夫上護軍天水縣開國子食邑六百户贈右武衛大將軍墓志銘君諱克蕭于上為從祖兄弟之子曽祖曰秦悼王廷美祖曰高密郡王德恭父曰循國公承慶母劉氏封金鄉縣太君君以天聖八年生生數歲補右班殿直俄而改太子右監門率府副率其後又遷右清道率府率君于宗室屬籍非甚逺自曽祖祖父皆王公積富貴君始為兒未能就外傳則以恩賜名得官矣然猶知慕學興藝不專以安逸自放皇祐中嘗召宗室子弟對延和殿試其所書敕宗正定高下君書第一特詔束帛賞之宗祀明堂助祭者皆賜爵遷右監門衛將軍嘉祐二年四月癸丑以疾卒享年二十八詔贈右武衛大將軍君娶徐氏封東陽縣君兵部尚書翰林之曽孫西頭供奉官祐之之女先君一年卒子男三人長叔慈次叔巘皆太子右內率府副率其季不及名而夭女子六人四人尚幼其二亦夭死嘉祐五年十月詔遣使者以君喪葬汝州之梁縣祔于祖考之次而令詞臣敘其世系為之銘銘曰乃祖乃父惟王惟公同姓之恩雖逺猶豐孰謂若人稟命不融年不逾壯位不過庸刻銘其丘以永無窮皇姪故銀青光祿大夫檢校國子祭酒行右清道率府率兼御史夫夫輕車都尉墓志銘君諱克協曽祖曰廷美秦悼王祖曰德雍廣陵康簡王父曰承睦處州觀察使母隴西郡君董氏生十餘歲方有詔賜以名補右班殿直巳而以殿直秩卑改太子右監門率府副率久之遷右清道率府率故事宗室無吏職其遷無常期朝廷有大禮輒推恩進階䇿勳凡三加恩得銀青光祿大夫檢校國子祭酒兼御史大夫輕車都尉年二十七慶歷八年七月辛丑以疾卒其為人內和外順宗室佳子弟也奕棋學書人亦頗稱其能娶李氏禮部侍郎應機之孫子叔頤為右監門率府率嘉祐五年十月葬汝州梁縣悼王之塋內于君之卒凡十有三年云銘曰族食世降疏戚有倫振振公路並受渥恩其恩如何結綬乘軒修塗未半天奪之年輀車還葬祔祖以孫尚有餘慶幸其後昆皇姪孫故銀青光祿大夫檢校國子祭酒行右監門衛將軍兼御史大夫上護軍天水縣開國子食邑六百户贈右武衛大將軍墓志銘皇再從孫銀青光祿大夫檢校國子祭酒行右監門衛將軍兼御史大夫上護軍天水縣開國子食邑六百户贈右武衛大將軍叔詹其先出秦悼王曽祖曰保平軍節度使德鈞祖曰儀崇使承震考曰河內侯克明母慕容氏封清福縣君君生十餘歲補右班殿直已而改太子右監門率府副率君初賜名叔昭避叔祖德昭諱有詔改命遷右清道率府率明堂泛恩授右監門衛將軍始開國天水縣君食邑三百户更大禮進爵子益封亦三百户嘉祐三年十一月乙酉以疾卒年二十五矣娶曹氏封金鄉縣君無子五年十月葬汝州梁縣君雖膏粱少年然性溫厚喜讀書為詩其出入恂恂不逾節若終享貴夀者既夭遏早死又無後不祀何耶然其卒也天子贈以大將軍印綬其葬也使者護視詞臣為之記其于哀榮亦可謂備矣銘曰有貴之勢無待于賢有賢之資無愧于全兩者遂矣而詘于年非命也耶其誰使然皇兄故深州團練使承訓妻安定郡夫人張氏墓志銘夫人姓張氏曽祖璡贈祕書丞祖炳贈光祿卿父利用內殿崇班閣門祗侯母金城縣君薛氏夫人以大中祥符七年歸于秦邸稱來婦年十有八矣明道中以恩封上谷郡君皇祐三年進封安定郡夫人生子男五人克勤克儉克禋克孚克懋克勤右屯衛大將軍秦州團練使克儉右千牛衛大將軍克禋左侍禁克孚右屯衛大將軍克懋右監門衛大將軍儉禋並前卒女三人皆有湯沐封然不嫁讀老子書居太和宫為道士賜名曰道正道升道仙云夫人大王父王父三世儒者習為禮義能知書又通于音溫柔慈良母有多子年六十六嘉祐四年十二月壬戌以疾卒明年權殯法濟僧舍十月葬汝州梁縣凡宗室雖甚材無事職于外其言行固莫得而聞而宗婦無外事于家其莫得聞又益甚然而視其奉祭祀和宗族教子孫夀考且寧其賢亦可知矣銘曰婦稱外成亦允有命或成或隳未必皆幸祁祁夫人習善厥躬來歸于宗繼啓其封魚軒象服小君之飾惠于皇天以彰有德有子有孫肅何詵詵其慶繩繩其誨諄諄六十有四未足云夀柔惠之風是用詒後皇姪故和州防禦使歷陽侯夫人安福縣君王氏墓志銘夫人姓王氏曾祖贇贈崇信軍節度觀察留後祖文慶贈左武衛將軍父承彬內殿承制夫人既世仕朝廷閨門有法而其性亦婉嫕溫厚可以配君子生十有七歲歸于宗室故和州防禦使歷陽侯克周克周上從祖兄弟之子也族近世貴夫人能嬪以禮既三年封安福縣君有子男二人長曰叔何為太子右內率府率次曰叔苖為副率女二人皇祐二年十月甲戌以疾卒于廣親邸第年二十有七後十歲得嘉祐五年十月葬汝州梁縣祔其先祖姑云銘曰婦以義從得其歸難又況王族富貴顯嚴婉嫕夫人出于良奧作嬪公侯其節靜好齋祓祭祀肅恭朝會小君之尊湯沐是賚貴且有子奚福如之獨不永年云何其悲皇姪右屯衛大將軍克戒妻太寧縣君李氏墓志銘李氏尚書駕部員外郎定之曽孫國子博士京之孫屯田郎中周珣之女年十有七以禮選納為克戒婦事尊章盡其勤孝上承下接皆有禮意族人稱其婦德婦功婦容婦言皆具之慶歷中封大寧縣君至和二年十一月丁丑以疾卒年三十有五凡生七男九女男曰叔杲右千牛衛將軍曰叔縠叔滿叔涉皆太子右內率府副率三人不及名而夭長女嫁右班殿直王定次嫁右班殿直張從政其二早卒其一學浮屠為比丘尼居資聖禪院其四尚幼嘉祐五年十月葬汝州梁縣先姑之塋銘曰古之嫁者教于公宫禮義之益實被其宗夫人之先世世儒者蘋藻之習自其牖下既得所從孔惠且溫媚于尊章上下欣欣九女七男是謂多慶而不永齡嗟哉其命皇姪右監門衛將軍克淳妻追封仙遊縣君李氏墓志銘皇再從昆弟之子右監門衛將軍克淳妻李氏皇城使高州刺史繼中之女贈司徒斌之孫贈驍騎大將軍訓之曽孫年十有四慶歷八年以禮稱來婦性溫惠敏于女工又善書頗知為文其習好若此非世祿及將家所為也凡生一女早夭皇祐三年五月庚午感疾卒享年十有八以未及賜邑封詔特以仙遊縣為湯沐追告其殯嘉祐五年十月日自京師歸葬汝州梁縣祔其先祖姑而命詞臣為之銘銘曰歸得其從天子之宗從得其職公侯之宫賢也宜永夀何不容赫赫王命追褒邑封副笄展翟既禭其躬納銘壤下以質無窮皇姪右監門衛將軍克常妻濮陽縣君盧氏墓志銘夫人姓盧氏曾祖贇東上閣門使誠州刺史祖亮太子右監門率府率父炳泉州德化令外族周氏年十有六以禮聘為克常婦克常于天子再從兄弟之子曾祖祖父封皆至王公親近族大支庶繁衍然夫人稱為能孝其宗沈靜謙順樂于為善封濮陽縣君至和二年十二月甲寅以疾卒年二十有九生子男二人長曰叔興太子右監門率府率次曰叔邑大子右內率府副率女四人二早夭二尚幼其殯于門封法濟寺其葬于汝州梁縣實嘉祐五年十月云銘曰王族綿綿其麗不億風教之首亦繄內則盧為著姓前世尤盛有婉夫人載共休令歸于良夫宗族以愈有子有封短年何吁凡葬冇銘以視來裔刻此堅石閟于幽隧公是集卷五十二

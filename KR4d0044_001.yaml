body:
  text: 公是集巻一宋劉敞撰賦秦昭和鐘賦并序袐閣有秦昭和鐘形制絶異其始得之豳雍之間其銘首曰不顯朕皇祖十有二公云云其藏于冊府久矣予因為之賦直集賢院作閱故府之藏器厯先秦之遺蹤哀三代之逾逺美昭和之寳鐘何形制之瑰譎駭觀聴之鮮同上盤拏而夭矯若騰蛟兮升龍下紛結而扶倚狀菱華與芙蓉彼僻陋之小國曽鑄作之絶工非以其銘祖考之休烈交人神之肅雝者哉越千祀而獨存兮俟有道而一見諒鬼神之圖佑兮諶盛徳之幽贊夫固夏聲之所出兮襲二周之餘徽苟延陵之既沒兮哀知音其為誰詢欵識之尚傳兮邈沮頡之遺迹世行隸之趨俗兮又雖久而不覿響沈潛以寂黙兮文幽晦而蔽匿鮮人情之好假兮在獨異而為謫幸䝉君之厚徳兮發隂壤之祕封去瓦石之汚處兮厯君門之九重庇高閣之虛爽兮参衆寳而見容儷笙鏞以干際兮終詭時而不逢審則而儀量兮尚毋惑于權度推律而攷鈞兮猶將謹夫韶濩等棄之而勿庸兮喟觀者之未悟保厥美以安處兮焉惆悵而懐遇栟櫚賦圓方相摩純粹精兮剛健専直交神靈兮馮翼正性栟櫚榮兮中立不倚何亭亭兮受命自天非曲成兮外無附枝匪其勞兮宻葉森森劒㦸鋩兮温潤可親亷而不傷兮霜雪青青不凍僵兮壽比南山邈其無疆兮被髪文身何佯狂兮沐雨櫛風蹇無所妨兮苦身克已用不失職兮磨頂至踵尚禹墨兮黄中通理類有得兮屹如承天孔武且力兮懔其無華不尚色兮表英衆木如繩墨兮播棄蠻夷反自匿兮遯世無悶曷幽嘿兮明告君子吾將以為則兮罪歳賦并序星傳曰歳星所居五榖逢昌又曰其國不可伐伐之反受其殃所從來逺矣自去年而歳旅于鳥帑及今朞焉鳥帑曰翼軫翼軫楚也自黔中至于長沙自鄢郢至于鄂皆楚也于歳星至之日郢大水壊其兩邑其後黔中長沙之蠻皆叛所殺掠編户不可勝紀吏士死者數十人厮役扈養死者數千人今又大旱安在其逢昌且不可伐也予甚惑之作罪歳賦云昔余受命于聖哲兮謂天道其不吾欺何重華之莫予諒兮忽乎使予以交疑歳涒灘之南征兮旅鳥帑以徘徊美瞽史之有言兮曰允慶而無菑皇天既付至仁兮固下民以為歸忽不察予𠂻兮紛多故而逢殆民離㪚而震愆兮洵擾擾兮晦在何向者慕用之誠兮今顧為此敦害水與旱以並爽兮中與外而交悴天蒼蒼其不言兮吾誰與鑒夫賞罰吾初惡夫倿人兮在邦家而必聞羗名是而實非兮苟以濟夫不仁何重華之昭晰兮猶有此之不情棄終古之所守兮喪厥初之令名察重華其若兹兮又况三苖與驩吺寕世道之交喪兮余壹不知其郵入周章兮帝廷出旁皇兮兩垣哀蠢蠢兮下民君胡悅而宴安祛君蔽兮任忠敷大徳兮無窮降福兮穰穰憂民兮􅍵􅍵徃者不可及兮來者猶可終也病暑賦伊年六月天久不雨陽亢而不能反隂笮而不能舉赫兮歊歊上下癉暑其中人也螴蜳鬱蠖若曛若曜若烹若灼若病大甚而不可救藥若壯士之困而草之解縛若昔酒之酲若毒蠱之蠚若漬膠漆若僨溝壑若商之季懔乎厥角若秦之敝無所措手足目眩白黒耳亂清濁噫其甚也哉彼天地之上信有所謂造化者耶隂陽之樞信有所謂陶冶者耶一動一靜信有所謂槖籥者耶彼其鎔之爍之炊之沃之萬物職職其所以作也耶惟共若是是以少者且壯而老矣鮮者且花而槁矣若膏之燃若薪之傳若影之改而不見其眹焉豈不悲夫孰能違俗之昬昬去物之汶汶款大莫之所極超無有而獨存亘萬古而一息兮吾請從其後云離憂賦抱戚戚以長處兮弔惸惸以自眎魂離離以駿邁兮精䝉䝉而就翳氣貿亂以轇轕兮形爽沕而荒瘁信民生之多囏兮伊天命之方摯知隕性之無續兮畏忝經而遺義日月騰以漂忽兮春與秋其狎至卒撫心以抑志分諒投艱以遺大胄帝堯之餘烈兮厯三正而相仍下天漢而逾熾兮啟東藩于大彭國交訌以泯棼兮賢辟世而迅征遡江介以幽處兮汔三徙而弗聲求王明而受福兮祖來儀于太平自彭城以來凡三徙皆江南友羣龍以登績兮敕休命于逺夷兆别子于都邑兮更名教于京師繇清白以象賢兮爰頽慶而厯兹馭長䇿以遹駿兮周窮荒而不疑敵輸歡以馴教兮𤏡變服而來嬉中心實使生外兮諶大道之難推惟保姓之蟬聮兮上参差以千歳裕後葉之孔艱兮憚情申而事廢志激揚之未究兮不克荷而為罪誨丁寕之在耳兮洵僶俛而違殆忽馳思于昊天兮又寤擗而自懟發與齡以交永兮旦命訴而罔害凉不肖而遘愍兮曽夫人之髣髴原本始而罔豫兮心沸湯以崩潰靦履厚而戴髙兮顧久生其誰賴願去人間以超舉兮復供養以弭憂苟一覩于顔色兮豈餘生之足留中怳惚而自失兮恭聞命乎前修天不可以忌兮道不可與謀毋苟襲匹婦以圖諒兮固將徇騫父以寡尤在陳賦并序予讀孔子世家蓋三至陳皆困焉及他傳說亦徃徃言孔子在陳事竊以謂賢者辟地翔而後集危邦不入亂邦不居以彼其明聖則宜有以先知無顛沛之憂矣然而動離厄難至于門人加疎喟然思歸遂終不寤何哉予甚惑焉作賦以辯之陳州作循太昊之故墟兮撫上古之遺風世超絶而莫紀兮竊獨悲夫孔公在天縱之將聖兮亦何所其不容周四海而厯聘兮汔棲遲于此邦似先迷而後得兮反過涉而為凶方從者之告病兮門人愠而加疎雖藜羮有不具兮死與生而雜居麟傷足于鉏商兮龜見縻于豫且處陷阱而不知避兮謂聖智其焉如其身之不皇恤兮庸後世之能圖游中國莫我信兮在蠻貊而行乎吾誠疑此二三兮亦君子之病諸惟㣲服以過宋兮又接淅而去齊詭蒲盟而信邁兮臨晉淵而思歸狂狡無所售其謀兮姧邪不得以遂非亦何先覺之昭昭兮至于今而忽迷信天命之固然兮亦人事之未盡非驕氣與矜色兮謬伯陽之所徇儻修身以飾智兮惑任公之幽訓不捐盡而絶學兮傷萊子之深吝時滑稽而倨傲兮自晏嬰而患進夫大白必汙兮大直必曲賫章甫而適越兮諒求榮而愈辱天下多大國兮何必安此陋俗謂舜後為庶幾兮曰不知韶之已亡明楛矢之逺集兮既驚愚而駭狂不徳我以刺譏兮反仇予以甲兵鷾鴯之智不給處兮千古之愚而知來孰有誠明之全徳兮顧臨幾而惑哉信天命之固然兮迨無妄而為災所貴松栢之特操兮非以其在春夏而青青必將厯歳寒而後彫兮斯可以見天地之炳靈且夫水激則旱矢激則逺孰知夫桑落之下兮乃春秋以終顯感吾黨而懐歸兮聊舒憂以淫衍躬木鐸而周流兮豈戚嗟而思反竒羊賦并序今年有貨藥于市者牽一羊有三口觀者異之或謂物有同類而殊名六合内毛羽鱗介不可勝紀也其罕見者人則怪之此儻自一物而未必羊也為作賦訂其意庚子作伊造化之播物兮猶巧冶之曲變雖轇轕而紛錯兮亦同形而相嬗何茲羊之瑰異兮邈獨違于天理孰祖胄之自出兮不屬毛而離裏察飲齕其如衆兮駭形貎之特詭嵒兮運頤粲兮嚼齒剛外柔中名祥實毁安芻拳之近禍兮衆樞機以便已彼率然之救首兮雖謝害而弗如蚘爭利而自傷兮愧厥貪之有餘揆四氣之平分兮察五緯之盈虚萬物莫能兩大兮是曷徳而至于斯體離明之炎上兮曽何視之不逺象兑説之引吉兮又奚很之甚反抑神靈所不化兮宜茲世之或鮮儻殊方之異禀兮固非吾人之能辨或曰士之怪羵羊兮殆季孫之所嘗得無將聖之𤣥覽兮夫孰鑒其肝鬲或曰羊之神獬豸兮自堯時而來覿蔑庭堅之明允兮尚焉誶夫枉直試刑之而不嘷兮諒以判夫羣惑誠存之而勿論兮慕哲人之遺則下令如流水賦以令順民心如流水矣為韻因人而治惟徳之優下令而順如水之流葢有悅從之美而無底滯之憂命苟出中勢殆無于反汗理符趨下速奚止于置郵稽昔伯臣誕修人紀謂君者所以出令必先于得衆令者所以馭俗故譬之流水得其道則萬方咸若猶川之決焉失其義則千里違之如澤之壅爾必也訏謨定命平易近民使上有淵源之喻下無墊隘之因先甲後庚示國彛之必信開物成務俾王澤之咸均且夫政不出于上則民無所軌令不行于下則君失其勢欲其出于上莫若壹而止欲其行于下莫若順而已是以喻彼旁流逹茲至理下而忘返源于君豈源于山乎逝者如斯漸于人不漸于海矣取類為密貽謀孔深葢憲度者國之紀而主上者民之心孚號未明戒泉流之胥敗逺猶斯布畏川壅之為臨邇罔弗從逺無不順四邦之内泳其沫窮海之表䝉其潤木鐸修禁譬決䝉而就卑象魏觀書法行險而有信如是則君之發令也可不慎夫令之于國也奈何忽諸焉有水逆行而物無傷者令廢格而國不亂歟與其亂而救于後孰若詳而慎其初得百姓之歡曽建瓴而何逺硏諸侯之慮非赴壑而焉如已矣乎功以衆成官以理盛未有違衆而功遂越理而官正故君子于流水必觀焉以其有似于令登臺觀雲賦以書其祲祥以為歲備為韻天事見象人君順時登觀臺而謹爾候雲物以書其陟茲累土之居非求自佚占彼垂天之狀庶或前知古之為邦敏于節事葢隂陽之數不可以獨越則水旱之變冝先其未至升高而望是臺也固經始于子來推象而言彼雲也可逆為于歳備貴若侯氏尊如天王並有事于覽觀示察微于祲祥誠由慎徳者固務民者昌峻或九層豈憚煩于陟降變惟五色殆無惑于豐荒若乃日月分至春秋啟閉氣動乎下而雲為之出祥見乎上而物莫能蔽于是儼君儀以居髙詔保章而占歳義殊臨國固無魯史之譏志取望氛允恊楚臣之說豈不以先天者天所不違憂民者民亦說隨故登臺也可以知勤民之至觀雲者可以見奉天之為因爽塏以四通髙為貴者辨郁紛之萬狀書用識之毋以臺為奢其意甚美毋以雲為逺其應甚邇胡不揆厥攸建察其所以備不虞者善政有焉無逺慮者近憂至矣故漢明復古見頌于孟堅魯僖秉常取貴于左氏稽合典禮昭明策書非臨下之為樂葢恤人而有初寓目以觀陋章華之奉已非煙是紀類河廣之跂予彼執同律者聴軍事之吉凶序星辰者詔天文之精祲雖均先見之美本非南面之任固未若躬靈臺而候五雲順四時以施禁無可無不可賦以聖人之道應物無方為韻有能有不能之謂賢無可無不可之謂聖賢也者擇善而固守聖也者體神而終靜萬物並作無得稱其名億變齊同莫不盡其性且夫自然為質不測為神尸居而龍變天運而日新能體全徳是謂至人故雖有取捨其迹難窺雖有去就其情不私寂爾任物汎乎適時且若是而已矣曽何足以間之是以語著仲尼之賢毋意毋必詩頌文王之美不識不知豈非可否者俗之明變化者聖之道游于俗内者須有適而有莫躋于聖域者亦奚醜而奚好序才而處彼誠一曲之人與化而遷此盖上天之造其大也無為其行也善應體逹節以素遊觀萬物以交勝進退有義可以其理求用舍無常難以其類證是故雖柳惠之并容伯夷之不屈各自守于一節詎兼通于庶物夫惟抱惟睿之識應變而不窮蹈無名之方旁行而弗咈且世之所謂可者未必可世之所謂愚者未必愚故信其可而作將同乎芻狗指其愚而去何異乎守株必也行無轍迹獨與道俱苟出處之非地豈汙隆之在吾智絶自私信能周于萬類大斯容物亦允奉于三無得是道者靜而聖動而王葢舉一而廢百者陋賤彼而貴我者亡苟非聖人之性也孰能若是其無方者哉我戰則克賦以仁義行師何有不克為韻以仁合衆以義濟師内輯和于中國外震憺于四夷當之者失其據動之者悅也隨故曰我戰則克其義在斯且夫以道徳為藩以禮讓為國以忠信為用以仁義為力故守必有威動則能克葢威也無暴彊之名克也非權詐而得在乎審所治修厥誠使民愛之若父母而敵畏之如神明若是則綏之而服令之而行決機兩陣之間孰能違我制勝千里之外敢有爭衡且兵者凶器戰者危亊何衆人言之甚難而君子用之反易葢言之難以其有後患行之易以其無死地無死地故雖柔而必彊有後患故雖勝而不義籌于廟堂之上寕越余心陣于原野之中罔違朕志且彼慿其衆則不加我民恃其勇則孰若吾仁故金鼓之聲未之能以㑹旌旗之用未之能以陳然而必敗之形曰兆于勍敵獨克之勢方在于斯人是以堯伐三苖禹誓羣后髙宗討叛于鬼方周武致戎于商紂念刺伐而豈無謂奔北而則不乃知戰在勝不在多術在徳不在他是以棄天時與地利貴王道與人和四國順之顧獨夫其安徃上帝臨汝非大凱而如何若是失吾道者棄其衆敗其績亦孔之醜用吾義者保其國伏其敵于戰何有葢用不用之間為克不克之道是以喟然嘆曰莫我知也夫何功業之可偶孔子佩象環賦謙以比徳取其無窮聖人雖明而若䝉雖盈而若沖卻佩玉以居讓用象環而飾躬生而知之謙不期于比徳文為貴者義可見于無窮原夫服物者常士之儀佩用者衆人之飾左結右設所以助成于儼恪退揚進揖所以豫防于淫慝然而非上聖之法豈中庸之徳故我以象為佩因環作則瑳而備用識純粹之積中循之無端妙變化之不測豈無珠璣惡夫尚竒豈無金碧為其異冝獨資巴浦之美外恊聖師之為昔以賄而焚軀吾無取爾今中規而成象禮亦冝之豈徒觀夫粲如英瓊結以綦綬参逢掖而並用約華組而獨受徑雖五寸以文理而獲稱佩可終身由旋相而見取然則服稱其貎之謂中禮徳過其飾之謂好謙陋白珩之致侈抱素修以無嫌容止可觀治獸齒而為用肉好若一偉儒服之相兼雖無鏘鳴之音吾見其美雖無希世之價吾貴其理葢退讓者君子服焉易簡而王事得矣豈非抗逹節之休風導將聖之深㫖飾櫑劒而崇武未可儗倫佩緩玦以斷疑胡能為比象者何如由象表而名諸環者孰謂自環中而録夫游心于象表則合乎天縱應物于環中則契乎道樞嘉名體之脗合諒竒衺之獨無盛服以行初訝執規之子鞠躬而至適同反絶之夫嗟乎微言既亡去聖彌久葢思其人則想見其為狀玩其服則兼明其所守有㫖哉賦仲尼之象環不然則不季春出火賦以季春出火象天為之為韻國有常憲月當季春俾出火以便俗示奉天而牖民治厯明時占心宿之昬見範金合土順炎精之日新眇觀古初啟迪法象星之神也猶隱見之有序火之利也冝出納之無爽葢天人之相與或精祲之交蕩得不慎爾日用戒茲炎上著于月令候建辰而勿逾儆乃官儀敕司爟而攸掌用能與世垂法授人以時仰列舍以欽若率百工而悅隨察夫日月之交歳既單矣謹此陶冶之用民咸從之肇自五帝至于三季雖建國之不同其修火也無異葢以稽合乾度丕承天意且謂阜財之道貴節用而遵常熯物之功罔奸時而邀利是以及大辰之初見因成象之自然奮木鐸以修禁正夏數之得天大則焚于草萊符戴氏之舊記小亦鑽夫榆柳協鄹子之遺篇噫為政者毋慢于從辰制器者勿亟于行火慢則匱民而乏用亟則爭明而取禍故相土正其序商人因而勃興子産失其常士弱議其不可非夫識蹈先覺智周百為厯春秋而協紀奮淳耀以從冝又安得百姓與能咸冨陶鈞之化六府交正蔑聞災燀之期彼候西陸以啟冰占定中而揆日或義専于薦享或功止于宫室豈若詔司存而火紀時焉器用于是乎出王配于京賦以王配于京世徳作求為韻大哉天祚明徳世有哲王纉乃祖之休烈配于京而溥將三后成功逹孝思而維則四夷面内知聖徳之無疆且昔者羣雄紛爭五季昬忒惟我藝祖自天生徳内揖讓以興治外征伐以宣力武節飆逝怙惡者喪其巢盛徳日新為善者得其職于是餘孽未靖神宗作求躬一戎以歸獸曠百王而繼周正朔所加葢罔有于不服封禪之禮猶未遑乎聿修克成大勲用集先帝丕顯元徳發明王制上則升中于天下則作程于世故創業如彼之艱難守成若此之昭晳豈非文武並用而治亂隨時明聖不同而述作相繼者哉冝乎世濟厥美工配于京實對越而在上茲遹駿而有聲亦何必道上古之書希成康之治語鴻荒之事慕堯舜之名且夫湛恩濛涌而易豐憲度著明而不昧故王在京而善繼帝在天而克配豈獨下武之什歌周發于丕承同墠之靈美姬公于裒對且上方法太祖之武以平叛繼二宗之文以永圖越無名之蕩蕩返茲世之于于因斯談之則何貴乎周鎬攷于徃者將孰先于浚都客有起而頌曰於皇上天輔景鑠兮有赫天子恢聖作兮祗遹祖考垂矩矱兮萬有千歳永欽若兮貴知我者希賦以知我者希其貴多矣為韻衆所共知者其器小人鮮能察者其理微故聖人不從事于俗老𥅆貴知我者希和其光同其塵毋䘏驁民之怨出乎類拔乎萃豈嫌舉世之非然後覩其操之暠暠見其徳之巍巍已古之聖賢以賤為在人以貴為在已葢審乎内外之分辨乎榮辱之理是以不同譽于流俗期度越于諸子豈以其重若彼其輕若此未遘真賞雖多亦奚以為忽逢知音有以少為貴矣且夫在邦必聞者斯佞人之行也遯世無悶者惟有徳者能之如是則苟患乎不立無憂乎弗知遇非其人則同舟有胡越之異得其所謂雖萬世猶旦暮之期物固有密不若疎衆不若寡與其顯于常士孰若稱于識者盡獲下流之譽我必其辱焉一遇忘言之知吾見其珍也譬夫荆山之璞以非寳見欺魯郊之獸以不祥獲疑及夫被旌于卞氏見賞于仲尼然後一角之麟後王明其瑞矣連城之璧厯代仰夫温其況乎道之精者可以神交不可以功計意之微者可以心照不可以言謂是以知之彌衆者其術彌下識之愈希者其身愈貴亦猶巴人之唱苟下里皆可以繼聲虞韶之音非至人不能以忘味豈徳與世邈者應必少技與衆同者和必多多而易求斯賤也已少則難得非貴如何嗟乎世之士務于人之知而不計其不可急于已之貴而不悟其在我將市義于比周而衒名于衆夥斯人也鄉原之徒歟道奚由果三命不踰父兄賦以内朝治親尊卑以齒為韻元聖制禮内朝治親屈三命之殊寵後先生于下陳受位造庭義不踰于父行循牆盡禮恭無亂于天倫古訓與稽舊章為美正外者必慎其内化逺者亦資于邇由是敕公侯以惇睦自燕朝而基始班異官爵位雖極于命卿誰無父兄理自冝于序齒疎不凌近卑不瀆尊修之廷内而君臣之叙立逹于天下而孝友之教存車馬之賜雖優豈無定著長㓜之倫勿廢以詔後昆然則百官疎也故朝于外九族親也故治于内于外故右賢而貴爵于内故尚親而立愛貴爵然後知王官之不可亂立愛然後見人道之不可廢禮或三賜親惟一槩若弟若子敢介寵而自矜有尊有先冝適卑而少退肅肅合族雍雍在朝飾情文而皆盡戒容貎之有驕名位不同彼鄉飲也或不齒之為尚少長有禮此宗室也冝入事而勿佻且夫事父嚴則忠可資于君事兄謹則順可逹于治故尊尊貴貴者禮之叙親親長長者仁之至奈何治其外不修其内有其一遂慢其二爵雖元士非父黨之可踰位絶諸昆亦鴈行之相次職在庶子教成有司示訓民于親愛昭辨等于尊卑想攷父之益恭由茲可見雖唐堯之惇叙捨此奚為是謂人之大倫國之元紀以睦兄弟以親父子貴無驕汰之失賤有和順之理故曰正家而天下平非此則何以哉士摯用雉賦以相見之禮庸雉為摯為韻士之相見摯以為儀必用雉以將命取擇交而有時見于所尊常難進而謹爾執以自致示守介而如之伊昔聖王慎別名類知禮之貴者毋䙝欲人之交也有義由是逺取諸物必依于摯四民殊業士獨有于常心六禽異名雉可昭于尚志將使謹爾攸執慎其所從深明出處之趣無煩左右之容志恥懐居擇文禽而章物義羞屈節視疏趾以思庸且夫無因而至者殆或可疑非禮而動者何足為見必將稱摯以仗信飭躬而進面雉實有别士非自衒從大夫之後秉殊羽舞之為游諸公之間拱若山雌之薦豈非用舍殊檢尊卑異冝仰羔鴈而非僭顧雞騖而若遺潔已不汙取象爰資于禽作多文是冨著誠足驗于離為然則可殺不可辱者人之賢易得而難畜者鳥之美將因物以昭徳故習容而奉雉是以周公創典咸等于諸臣虞舜省方特稱夫一死彼佩瑗玦者但旌于屢斷秉文行者或示于有章豈若煥翬翟而拱揖盛辭讓之交相事賢友仁我則逹剛毅之節書名委質我則示耿介之方惜乎古風既渝澆俗寖啟進則無仗節之教退則多競進之禮吾乃知摯雉之儀為國家之大體

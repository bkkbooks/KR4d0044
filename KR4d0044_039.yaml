body:
  text: 公是集卷三十九宋劉敞撰論救日論春秋左氏傳曰二至二分日有食之不為災又曰非正陽之月不鼓臣以為過矣夫聖王所甚畏而事者莫如天天神之最著而明者莫如日日者衆陽之宗人君之表也日有食之天子則伐鼓于社諸侯則伐鼓于朝非為慕迂闊而塗民耳目也明其隂侵陽柔乘剛臣蔽君妻陵夫逆德之漸不可長也如是則奚救奚不救奚畏奚不畏哉丘明之言使諛臣依以諂其君邪臣資以固其身臣請辨之幽王之詩曰十月之交朔日辛邜日有食之亦孔之醜周之十月則二分矣安在其不為災者歟夏書曰乃季秋月朔辰弗集于房瞽奏鼓嗇夫馳庶人走夏之季秋非正陽也安在其不鼓者歟由此觀之日食之必可畏必當救也無所疑矣夫諂諛姧邪之臣出則朋黨比周以遂其私入則詖偽欺罔以濟其欲固日夜無須臾之間惟恐君之覺已也日有食之是將喜焉庸肯斥言災異以警于上哉是以或至于陵夷而猶不悟魯季孫漢張禹是也昔者季孫意如之専魯知日食之為傷其君而不憂也卒逐昭公張禹之仕漢知日食之為害國而不告也卒成王氏鳴呼變所從來微矣為人上者可不察哉可不察哉城郢論子囊為令尹城郢君子稱之曰忠矣能衛社稷囊瓦為為令尹城郢君子譏曰卑矣必亡楚國夫楚一也子囊囊瓦令尹等也城郢均也子囊以取褒囊瓦不免于貶何哉君子者固譽成而譏敗乎論之曰否昔子囊之為令尹也修法制舉賢才附百姓親鄰國所以守其四封者已遂矣惟郢之未城于是城郢則豫患而已矣安得不謂之忠囊瓦之為令尹也則不然遠忠直比讒諂貪愎無厭遂過不更百姓怨之諸侯怒之所以守其四封者已小矣惟郢之可城于是城郢則外民而已矣安得不謂之卑夫外民民亦外之此囊瓦所以亡楚也事固有同功而異情同迹而異論者此之謂也易曰王公設險以守其國夫設險之與恃險豈得同哉設險者強恃險者亡故先王制城郭溝池所以立固而非固之本也制鄉遂都鄙所以便守而非守之本也制師旅卒乘所以建威而非威之本也本之所在在德義在知人在安民必有其本然後城郭溝池可得而固也鄉遂都鄙可得而守也軍旅卒乘可得而威也故政有本末事有先後無後其所先而先其所後則天下可治百官可任萬民可附四夷可服惟明者而後及之非囊瓦之所能見矣不朽論士之不朽者三所以本者一也德能服人則不朽功能濟時則不朽言能貽世則不朽雖然本之者德而已矣德者仁義忠信之謂也內著于其外達則其功也窮則其言也故德者本也功與言者末也處世高名澤及于遠謀而世用之行而世信之則功必立處世卑名澤不及于遠謀而世弗用也行而世弗信也則言弗著故功者以德為功者也非俗之所謂功也言者以德為言者也非俗之所謂言也俗之所謂功者規一切者也爭地以戰殺人盈野爭城以戰殺人盈城則有強兵之功壞井田廢什一困百姓之力實府庫之藏則有富國之功以詭譎為機以刑法為驅以君心為度以巧偽為制若是而已矣俗之所謂言務無用者也飾名數以干禮合章句以導諛為曼衍以詭俗務名譽以邀利大不可施于朝小不可教于鄉以靡麗為精以辨異為竒若是而已矣是以德也功也言也判而為三嗟乎君子之道所以隱也功非其功矣言非其言矣然而世猶貴功而尚言自以謂不朽吾未始知其誠不朽也夫世之士既無以明功與言之端又因見世俗之功而趨之聞世俗之言而美之自以太上立德不可及也鳴呼則是以功與言常必去德而獨存者也喪其本矣申商也孫吳也儀秦也楊墨也何可勝言哉仁智動靜論稟天之性剛健中正純粹明白生而知之者是謂仁矣貧賤不能憂富貴不能淫死生不能變乘物而用循理而動率性而行推分而安是終始本末不出于靜故孔子曰仁者靜也靜莫如山山之為物天質自然一成而立亘萬世而不變損之者難益之者易可謂能靜矣故孔子曰仁者樂山也夫貧賤不能憂富貴不能淫死生不能變者固不知所謂貧亦不知所謂富不知所謂賤亦不知所謂貴不知所謂死亦不知所謂生者也審乎自得得乎無假若是則何夀如之矣故孔子曰仁者夀也夫智者亦稟天之性而不能純粹有所好惡有所嗜欲有所喜怒有所偏溺不學則不知其道不問則不知其惑是故食無求飽居無求安日夜不厭就有道而正焉損其好惡損其嗜欲損其喜怒損其偏溺以求入大中之檢合聖賢之度使言滿天下無口過行滿天下無怨惡而後可已矣是終始本末不出于動故孔子曰智者動也動莫如水水之為物源于山而赴于海盈科而後進見險而不止以求遂其志之所趨必放乎平而止增之則深益之則廣可謂能動矣故孔子曰智者樂水也夫損其好惡損其嗜欲損其喜怒損其偏溺非自苦也其心見道理之顯然所以去不善而就善以自悅矣故雖見外物而不遷雖處汙世而不易如是則何樂如之矣故孔子曰智者樂也夫仁者以安仁為靜智者以利仁為動安仁者本于誠而明之利仁者本于明而誠之誠而明之不亦靜乎明而誠之不亦動乎誠者天事也明者人事也天事故靜矣人事故動矣雖然苟誠而不明雖靜未可謂仁是以顔淵問仁子曰克已復禮也明而不誠雖動未可謂智是以子夏曰博學而篤志切問而近思也夫顔淵可謂能仁子夏可謂能智欲求仁智之動靜者舍二子亦何觀乎或曰既謂之仁者靜矣又曰克已復禮何哉應之曰仁內也禮外也仁者難以與人共而禮者所以并容也是故賢者俯而就之不肖者跂而及之夫顔子之克已復禮乎俯而就之耳亦何適而非靜哉博施濟衆為聖論仲尼之門問仁者多矣以令尹子文之忠陳文子之清子路之勇冉求之藝猶未備仁之稱也至于子貢問博施于民而能濟衆則遂以為聖何哉嘗試論之所謂博施者殆非俗之所謂博施矣所謂濟衆者殆非俗之所謂濟衆矣彼俗之所謂博施者不過以散利布惠為言俗之所謂濟衆者不過以分災救患為解必若是則賢者亦能及之何待聖哉必若是則有國家天下者乃能行之賤貧則不能矣是貧賤必無聖人哉此皆計功而言不足以知仲尼之意明聖人之道者也夫聖人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶是以在下位則化育萬物物盡其性而不見其迹可謂博施濟衆矣在上位則陶冶百官官服其體而不得其名亦可謂博施濟衆矣豈獨欣然以散利布惠為美談分災救患為已務哉夫散利布惠分災救患可勉強而暫為則是聖人亦可忽然而暫到也聖人之神不可暫到則散利布惠分災救患非聖人之任亦已明矣以謂不然復效以事夫仲尼在下者也隨之者三千之徒或智或仁或過或不及莫不盡其性得其欲皆可以治天下則其施不亦博而濟不亦衆乎堯舜在上者也億兆之衆或賢或愚或善或不善莫不安其教樂其生而不知為之者則其施不亦博而濟不亦衆乎故聖人法天者也天之道能以美利利天下而不言所利如聖人必散利布惠而施必分災救惠而濟是非天矣何足稱哉或曰散利布惠分災救患非聖人之任然則是仁者之事乎曰亦非也使仁人在下乎苟免于窮困亦幸矣何暇及人使仁人在上乎則利不待散而均矣惠不待布而廣矣災不待分而民懷矣患不待救而物遂矣然則散利布惠分災救患者賢人之業其功名可數者也畏天命論傳曰畏天命夫天命可畏而未有能知者也惟聖人然後知之所謂天命者非諄諄然接乎人者也害于民謂之孽變于常謂之異動于氣謂之沴發于色謂之眚逆于類謂之祥雜于俗謂之妖著于天謂之象是故有以興有以亡有以敗有以成惟聖人然後能見之識之識而名之所謂性與天道者也非聖人則不能知之故古之君子務畏天命而不務知天命也夫非聖人而務知天命者吾見其不能且不信矣古之君子其畏天命也聞一異則悚然懼見一祥則悚然懼未知是之為善歟為惡歟悚然懼而已者吾知畏而止矣是故其守也約其行也慤妖祥之事休咎之説付之蓍龜瞽史而不勞吾心吾非不願知天命也天命固不可知也強求知之是不誣天必且誣人昔夏之衰也龍降于帝庭其漦為物而卒喪周周之衰也麟獲于魯沙鹿之崩也晉史卜之曰後六百嵗而聖人興夫若是者其孰能知之此聖人所獨知也故曰莫若以畏仲尼在陳聞魯有火曰其桓僖宫乎夫聖人之于天命有不待卜矣湯之時八年七旱湯親之南郊而禱焉曰政不一歟民失職歟宫室營歟女謁盛歟苞苴行歟讒夫昌歟由是觀之湯且不知也然而古之君子有曰天命也可推類而得可觀象而察自董仲舒咸有是言離之合之文之飾之大者篡亂其次賊虐然則非實使之其啓有間矣夫天命決不可知求知天命者以謂尊天也然而不得其指不殆乎以天欺人乎古之君子莫惡乎以天欺人以人欺人猶不可而况乎以天欺人者乎是所謂南靣之禍也北靣之賊也故善畏天者莫如成湯為國家若成湯可也仕者世祿論文王之治岐也仕者世祿而小雅亦譏絶功臣之類然則賢者之治國也固官人以世乎應之曰否非此之謂也凡士農工商者蓋通功易事相為用者也士以仁義農以稼穯工以器用商以貨殖士之所以為士者術也然而待農而食之待工而用之待商而資之農之所以為農者力也然而待工而用之待商而資之待士而治之工之所以為工者巧也然而待商而資之待士而治之待農而食之商之所以為商者利也然而待士而治之待農而食之待工而用之兹四人者世序其業而食其勞是故明王之治也使仕者世祿使仕者世祿則農者世耕工者世巧商者世利矣德及天下者稱天子天子世天下德及一國者稱諸侯諸侯世一國是皆人君也非君無所世故雖卿大夫官以世也卿大夫莫之世是謂逼君春秋譏之故所謂世祿者世世有祿者非世世其祿者也故古者自卿大夫士之子不二業幼則入小學長則入大學教之以詩書之訓禮樂之方正其齒辨其節齊其衣服明其辭讓業成而志定矣雖未就吏而不纍有司焉雖未執事而化民之端見焉至于三十然後試以事至于四十然後授以位至于五十然後命以爵然猶論辨而任之度財而進之使上無棄財下無棄人凡賢者之子孫公卿大夫之胄莫不在位矣能大者祿厚能薄者祿少如是而已矣此乃所謂世祿也及至後世富貴以其勢排蹙貧賤雖賢不得進雖老不得試而富貴者雖不肖與嬰兒猶乘父兄之尊列于朝廷是以為政者患其若此也則進孤寒疏遠以為公收管庫盜賊以為名是兩者皆失也教之以其道則賢者可得論之以其材則能者可見限之以其年則學者不偷毋以其勢撓之毋以其親疑之則仕者皆世祿矣今不正其本以從先王而顧憂其末以反先王此固王道之不行于世也嗚呼行文王之政者天下必治矣為仁不富論凡天下有至理此盈者彼虛此厚者彼薄是自然之不可易者也故為仁者不富為富者不仁亦若此矣夫仁人之為身必將先義而後利先德而後祿以禮為法以智為輔以文為表以義為內非其道雖加千乘之利不悅焉非其志雖加萬鍾之祿不取焉此仁人之所以為身也此其為身所以無富之稱也及其為家則正其居處以應法薄其奉養以應禮均其有餘以濟不足言其利以去其貪此仁人之所以為家也此其為家所以無富之名也及其為國愛民而時使之養民而薄斂之取民而節用之幣帛寶貨與百姓共其利弗專有也藏之于民而上下皆足此仁人之所以為國也此其為國所以無富之號也故小為一身大為一國取豫施舍進退行止必出于仁而無富者矣雖然其無富乃所以為大富也故仁者雖一身而貧賤不能辱雖一家而萬乘不能奪雖一國而天下不能傾近者親戚安之賓友歸之遠者四鄰懷之九夷向之尚非大富乎彼為不仁者不然苟為一身而已力之所及將無不攘智之所及將無不取也故在下則盜在上則暴為倉廪至于使百姓無以食為府庫至于使百姓無以衣可謂富矣然而不仁之患則又至焉是以昔者蚩尤誅榮夷滅桀紂亡非患財用之乏也非苦貨力之少也凡以身富而不仁也是以聖王制稅賦足以養百官備水旱制朝貢足以結諸侯通遠方然猶厚往而薄來輕費而廣施惡不仁也故天子不言有無諸侯不商貨利大夫不畜雞豚士不問什一所以遠利而近仁也所以厲風俗而禁淫偽也冉求為季氏宰不能改于其德而賦粟倍他日孔子曰求非我徒也小子鳴鼓而攻之可也由是觀之君子之富可知矣公是集卷三十九

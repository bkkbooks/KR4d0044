body:
  text: 公是集卷四十九宋劉敞撰碑辭萊公祠堂碑辭上元年相國萊公以讒死南方有詔歸葬雒陽道出江陵江陵之人德公之相天下又哀其死相率迎柩公安哭以過喪大家賻奠小家斬竹揭錢幣獻之已獻因投諸路旁竹皆更生蔥菁成林邦人神之號曰相公竹云遂私作祠堂以為公歸水旱疾疫於是請命罔不響答後二十餘嵗南郡太守乃告縣更作公廟以遂百姓之思昔者召伯聼訟甘棠勿伐鄒子吹律隂谷生黍全而封殖孰與斷而蕃育為之而榮孰與感之而生惟萊公相天下生能使一物不失其所死能使枯槁復息以昭其仁以顯其神黔首戴之子孫不忘可謂靈矣乃作哀歌刻之廟碑辭曰孰作祠堂江陵之人云孰享之萊公之神孰毁萊公朝廷不知孰譖萊公死而不歸公歸無所于汝信處取彼譖人投畀豺虎赫赫萊公為天子忠公今既死誰相天子西有昆夷北有玁狁公乎不存鰥寡尤蠢纎纎之竹昔惟枯莖公惠我民速哉青青誰謂公逺我瞻在堂顧我人斯亦孔之明誰謂公逺我瞻在竹顧我人斯亦孔之育世勿我摧萊公之依於斯萬年不遐有違字辭張誨字辭并序張誨既冠謀所以字者劉子曰是于禮有辭為之作辭令月吉日既備爾儀爰告爾儀字為爾傳師先民有言事若莫咨敬服勿忘維德之基彼昏之陋靡懷靡度其告諄諄其聼藐藐昔者曾子三省厥身傳不習乎世以有聞毋曰髙止跂焉可及母曰深止俯焉可汲信爾朋友樂爾兄弟聼用我謀是無大悔針畏言針吾甚畏言言可畏也而不能默然吾言悃悃倡而後和人猶以為過吾言繩繩譽而不訾人猶以為非非吾言之畏惟人之多忌非吾之不能默然而人實多言若是者其止乎其已乎其勿問而唯乎譬之于物其為石不為水乎水之滔滔往而不來有陷而淵有壅而回有激而在山椒曰水哉水哉讓針并序資政富公始讓樞密直學士又讓翰林學士又讓樞密副使凡三讓所讓益尊所守益堅粲然有古人之遺風故作讓針以矯世厲俗云讓如何其讓非為名欲先信吾道於天下氓讓如何其讓非為利欲天下之人咸信吾義世有常患患其欲速枉尺直尋卒附於辱世有常患患其在得辭小受大卒沒於直公皆咈之公既述之啓之闢之俾世則之曰吾豈惡富貴富貴惟德人以厚已我以厚國時豈無人昏夜乞憐縱或得之何如其賢時豈無人乘機射利縱或得之何如其智嗟此富公直哉優優孰視富公而能弗羞孰持富公携手以游昔宋考父三命益恭嗟此富公千世與同作詩載美穆如清風毁針并序楊君某曰人多毁子某始作毁針以自警名乎貴階利乎富梯汝不人閼而人汝疑疑汝斯怒怒汝斯沮汝不見耶而忘戒懼戒也有道汝毋習非懼也有道汝毋詭隨隨也傷直毁也適宜非也害勇毁將由誰能守而直胡言多之恤能潔而勇將保汝於吉凡毁之作患吾不修如毁而益明吾復何尤道非不章又以書紳惟無忌毁以率吾真銘新律銘律之長以立度以軌天下律之實以為量以祿四方律之重以起權萬物運動律之數以治厯四時不忒律之聲以和樂以詔述作上儀之天陽晷既同下揆之地八風攸從天地是符而况於人乎況於鬼神乎神鼎銘帝興神鼎象天地人赫赫神鼎聿維國珍光潤龍變其德日新是鬺是定上帝是賓是芼是和皇祖是禋敷佑多福惠於孝孫休矣孝孫億寧上下斡調隂陽茂實時夏如鼎之和無逆於化休矣孝孫羞用多福登進俊傑並昌方牧如鼎之固無覆於餗休矣孝孫富有多子室家君王是續是似如鼎之載無喪於士鄆州樂郊陳漁臺下作幽素亭銘其石柱茅為宇石為柱幽且素哉君子之處石為柱茅為宇安且固哉君子之度庶幾堂銘既作此堂名之庶幾毋曰豫小子顔徒是睎一簟之食不可廢也一瓢之水不可棄也飲之食之猶吾義也吾聞君子以身殉仁不戚富貴而羞賤貧或曰顔徒易乎睎之則是吾雖不能及猶冀一二游於斯息於斯非夫人之為思而誰思噫頌瑞木頌并序慶厯三年澧州獻瑞木有文曰太平之道澧州澧陽縣男子楊修伐道旁大樹賣之主人主人析以為薪見其中有𨽻書四字曰太平之道字體茂美白黑分明如筆墨所為者異之不敢蓄於家以告太守驗問所見百餘人詞皆同乃獻之天子嗚呼德至必有自然之符非力所以達天命至於白魚赤烏嘉禾之倫皆因象推類以知神意非仁配天地則不有文字顯明之告伏羲之河圖夏禹之洛書與今之瑞木皆文字顯明者也自元昊犯邉中國疲病於今五年矣天子痛士大夫勤勞在外不忘於心宵衣旰食以德為治然則始於憂勤終於逸樂太平之期將由斯道焉天地命之神其朂之上下感動而文出於木木仁也又所以明天子之仁也乃作頌曰上天之載兮無臭無聲眷我聖德兮告以太平非筆非墨兮自然以成我民富庶兮天王聖明上天之載兮無聲無臭眷我聖德兮太平以告非筆非墨兮自然有以我民樂康兮天子萬夀日出東海兮月入西方日月所照兮孰為不王我歌且舞兮樂我洋洋以為不信兮視此靈章贊商周二賢贊劉子曰儒者或稱殷道衰微子抱祭器入周紂殺比干箕子懼佯狂為奴孔子皆賢此兩人兩人殊行而同名總其實不然自殷之未亂微子諫不用欲去誥父師少師曰殷其弗或正四方我出為狂自遜於荒野古者同姓雖危不去國微子紂庶兄也何入周之有及紂殺比干箕子諫之尤力紂遂囚箕子而奴辱之武王告諸侯曰紂乃囚正士可伐矣武王伐紂敗之牧野紂自殺武王則使人釋箕子囚載與俱歸而作洪範由是言之箕子之不死幸耳豈自苟全須臾者哉然微子所以能去者以先其未亂也雖去猶不逾國斯仁矣如己亂無為去也必去之是逃也非仁者也周二賢贊劉子曰世皆以伯夷叔齊諫武王不用退而隱於首陽之山不食周粟採薇而食之以至於餓死以豫考之不然彼伯夷叔齊者仁人也愛其君如恐傷之故矯世厲俗達天下之大義而不私焉其進以道其退以義此孔子所謂求仁而得仁者也豈若小丈夫哉諫其君而用則欣欣然見於色諫其君而不用則悻悻然見於色終身不向國而坐也彼所謂不食其粟者言致為臣而去不在廪餼之例是乃所謂為餓也安得採薇之事乎蓋少飾者矣自堯舜以來髙世之士不可勝紀然夷齊為之首學者皆稱之始周之亂鮑焦疾之不忍食其粟採蔬於道而食人謂鮑焦曰今不食其粟而食其蔬此非焦所濟也於是鮑焦輟蔬吐哺立斃其處然孔子不以為仁學者無稱焉西漢三名儒贊有序余讀西漢書愛董仲舒劉向揚雄之為人慕之然仲舒好言災異幾陷大刑向鑄僞黃金亦減死論雄仕王莾作劇秦美新復投閣求死皆背於聖人之道惑於性命之理者也以彼三子猶未能盡善才難不其然歟然其善可師其過可警也為三贊以自覽焉仲舒先覺承秦絶學進退規矩金玉其璞發明春秋大義以修旁及五經博哉優優世莫能庸黜相諸侯仁義所漸易剛以柔茫茫大道在昔聖考蓋有不聞奚究奚討主父掎之步舒詭之嗟若先生有以啓之懲違告休不預世憂著作孔多後世是遒嗟爾君子克遵厥猷子政翼翼簡易正直博覽百家以充其德黃金之僞智由信惑臲􅑶邪世身居困厄不為俗儒苟取拘拘略其威儀忠質之符疾邪救危著論上書同姓之仁賢哉已夫雖不三事其文實章以迄於今日月之光嗟我後人庶幾不忘子雲清虛自有大度非聖不觀耻為章句擬倣六經其文孔明隱隱谹谹實為雷霆世世不遷知命理神胡為投閣劇秦美新君子之缺衆儒有言蓋天絶之亦何必然末世之人以道邀利或狗耳目得之弗愧嗟爾君子能勿此畏漢右將軍辛慶忌贊矯矯將軍在漢虎臣實秉一心以堅事君昔有朱雲廷刺安昌天子震怒凛如朝霜將軍免冠此生狂直使言而是用之奚惑如不可從受之為益以諫殺士羣心恫疑後有大姧上且不知叩頭流血帝亦感悟雲得不誅將軍之故凡人之情侮弱畏強惟時將軍吐柔茹剛衆人之智上觀下獲惟時將軍犯顔抗色將軍之功史不絶書將軍之節萬世則無漢室之衰竟由大臣將軍此舉可謂知人千嵗而生其猶比肩有若將軍者吾請頌焉三賢贊并序丞相沂公葬東里子産之墟而與裴晋公鄰鄭人以三賢者之行已事上養人使民其終始同然則宜相近為之作祠堂合而享之豈所謂尊德樂善緇衣之遺風也歟贊曰賢不常出曠世而遇其猶旦暮如三公者或相一國或相天下善始令終髙明有融盛德大功時之逺也千有餘嵗若相長弟循迹揆心死而不忘孰有古今其像於此自鄭人始有來仰止嗚呼若登髙山若浮深淵夫又孰測焉伯冏敦贊有序右二敦得於藍田敦者有虞氏之敦周禮有金敦有玉敦玉敦以盛血天子以盟諸侯金敦以盛黍稷大夫主婦以事宗廟此金敦也其銘曰伯冏父作周姜寶敦子子孫孫永寶用伯冏蓋穆王太僕正周畿內諸侯食采於周者皆周公之後然則伯冏周公裔孫也贊曰穆王耄荒周巡天下祭公作招實止王過冏亦正僕其僚遵度銘器貽世似續妣祖載祀二千示我懿矩張仲簠贊并序右二簠得於驪山白鹿原簠者稻粱器其銘曰張仲云云張仲見於小雅宣王臣也所謂張仲孝友者矣籀書竒字不能盡識當有能辨者贊曰宣治中興方虎董征張仲孝友秉德輔成或外是經或內是承文武師師安有不寧驪山十鐘贊并序右鐘十枚得於驪山北原無欵識然其制度似周器權之其重者十有餘斤輕者三四斤世無知音者莫能名其律呂按爾雅鐘大者謂之鏞中者謂之棧小者謂之剽然則此棧鐘也贊曰幽亡驪山禮樂崩壞宗廟為墟彛器用墜禹之尚聲追蠡而在蓋惡之效永世作戒䇿問䇿問二首問唐時嵗舉進士至煩矣然所取不過三四十人今國家間四嵗乃舉進士至簡矣乃取之多或至五六百人議者甚疾此欲放唐制則恐賢士失職者衆欲仍舊貫則吏員不可勝紀夫賢士失職者衆則怨必興於下吏員不可勝紀則力必屈於上裁此二者宜奈何諸生極意盡言焉問學者治仁義之術皆稱孟軻軻譏宋牼之言利也曰號則不可是所慎者莫如號也然而軻教梁齊之君則曰好勇不害好樂不害好貨不害好色不害夫勇之與樂貨之與色足為號乎軻之議人甚詳而自任大略軻不宜至此者也試相與辨之公是集卷四十九

body:
  text: 公是集卷四十宋劉敞撰論封建論三代之王也舉天下以封建秦之帝也破封建以立郡縣二者孰是乎曰封建者道也郡縣者利也封建者公也郡縣者私也然則奚以為道奚以為利奚以為公奚以為私曰非聖人不能王天下非王天下不能封建非封建不能長世是以古之封建也不主于功亦不主于親主于德而巳矣德厚者其封大德薄者其封狹車服以明之制度以一之禮樂以修之仁義以結之祭祀以教之喪紀以厚之朝貢以勸之聘享以懷之猶懼其未也于是冕服圭璧以賞其勤甲兵鐵鉞以聳其怠制諡美惡以出其名䇿書簡牘以觀其行其治忠厚其政淳一其教誠慤然猶戰戰以持之翼翼以守之如畏其傾如苦其生非以其貴自驕者也非以其富自凂者也自天子至于諸侯自諸侯至于大夫自大夫至于士庶人上下率是其化深矣其俗成矣其意安矣故可以傳世故曰封建者道也及乎秦則不然其取天下以詐力其治天下以苟簡其仁義不足以相懷其忠信不足以相恃有功者疑之有德者忌之自其子弟不能信也是以權天下之貴以尊其巳斂天下之富以厚其身滅絶禮樂以逞其心嚴刑濫罰以快其意皆以封建為害巳也故秦之有天下也便其私而已矣故曰郡縣者利也利用其私則道用其公者分矣故封建作而仁義行焉郡縣立而刑名制焉由是觀之非聖人不能封建審矣周之有天下也太王王季基之文王武王成之周公成王守之是以其化民也深其易俗也固九牧之君千有八百世守其法莫之敢二至于穆王王愆於德淫遊無度而諸侯不畔至於厲王泯亂典訓天下勿㻣流王于彘諸侯釋位以謀王室二伯共和以相王事宗廟乏主二十餘載而神器不移至於幽王昏於嬖妾虐害于下下弗堪命王以兵死周遂東遷于時政教陵夷不能及逺故齊桓晉文率天下諸侯以服事天王桓公北伐山戎南破楚召陵西討孤竹東定海濵功業大矣然葵邱之㑹管仲一言動色下拜文公討叔帶之亂敗楚鄭之師救齊宋之危誅曹衛之罪小國奔走大國悸恐威力逺矣然過而請隧天子不許稽首趨避故亂如憂厲而不能遷也强如桓文而不能謀也孰使之哉由是觀之非封建不能長世也審矣或曰周室之弱此不足以知之夫周之失也其在廢文武之法而已矣每守其法每布其義雖有齊桓晉文之强莫敢不率又况邾莒滕杞之小國乎然則周之失也非封建弱之矣三代封建威分于外而享國長漢魏郡縣威專於內而享國短其享國長也封建之效也其威分于外也則非封建之罪也其享國短也不封建之效也其威專於內也則非不封建之力也其亦可知爾已然則謂封建不若郡縣者妄也其曰非聖王不足以封建而郡縣者固世無聖王而用之者也與其無聖王而封建不得其理不若去封建而為郡縣可苟而治是則可矣賢論人君之賢其身不若其使賢之為賢也人臣之賢其身也不若其薦賢之為賢也聰明辨慧技藝敏給此可謂賢矣然是謂匹夫之局非人君之操也人君者目不自視明者效之耳不自聽聰者效之口不自言智者效之心不自慮聖者效之故曰百官當而巳矣此人君之操也明者視之則視必逺聰者聼之則聼必微智者言之則言必當聖者慮之則慮必精使獨用其身不能治也雖欲治之不能給也故曰不若使賢之為賢也忠信仁義剛毅有立此可謂賢矣然是謂終身之善也未足以傳世也人臣者以其宗廟為心焉以其萬民為心焉以其後嗣為心焉大為之謀而使智者就之逺為之略而使仁者守之今世賴其澤後世䝉其福世續其類是天地之功也是春夏秋冬之相與成嵗也故曰不若薦賢之為賢也劉子曰昔者舜有天下大聖人也惟其不欲其身賢而已矣是以舜好問好察邇言所舉而用者二十有二人被袗衣鼓琴二女果而天下治昔者周公相天下大聖人也惟其不欲其身賢而巳矣是以日昃不倦勞于求士所執贄見者十有餘人所交友者百有餘人賢者相與繼其德而成之至其末也刑措四十餘年故君莫盛于舜臣莫盛于周公不為舜之為者非賢君也不為周公之為者非賢臣也劉子曰君之不君非獨愚也雖聰明辨慧技藝敏給而不知用賢者猶不君也臣之不臣非獨鄙也雖忠信仁義剛毅有立而不知薦賢者猶不臣也昔者桀紂矜天下以能髙人臣以聲則是豈不聰明辨慧技藝敏給哉惟其自賢而已不知用賢至於亡也昔者臧文仲相魯國魯國以强其言必當則是豈不忠信仁義剛毅有立哉帷其自賢而巳不知薦賢至于削也故曰雖有周公之才之美使驕且吝其餘不足觀也已所謂驕者非獨以貴驕人以富驕人者也以材驕人者有甚焉所謂吝者非獨吝于爵人吝于分人者也吝于教人者有甚焉故以材驕人慢也人怨之吝于教人忌也人踈之是以古之君子莫為驕與吝也求為人君者盡於此矣求為人臣者盡于此矣詩云不識不知順帝之則言君之所以為君也詩云樂只君子保艾爾後言臣之所以為臣也君為君焉臣為臣焉雖亘萬世吾不知其可改也賞罰論賞為勸有功也賞必以春夏不已怠乎罰為懲有罪也罰必以秋冬不已緩乎怠則不勸緩則不懲然而曰賞以春夏罰以秋冬者是非聖人之意也應之曰否子所謂功者謂夫輔世治民之為功乎抑謂闢土彊兵之為功乎子所謂罪者喪業失序之為罪乎抑謂殘民害上之為罪乎子賞之勸也將勸其至於善而已乎將幸其身而巳也子罰之懲也將勉其至於恥乎將勉其身而巳也吾語汝聖王之治聖王之治官得其職民勸其事物安其所無獨治之名無倉猝之功是以三載考績三考黜陟幽明其陟也所謂賞其黜也所謂罰賞以春夏罰以秋冬則何怠且緩之有古者惟軍賞不逾時軍罰亦不逾時用命賞于祖欲民速得為善之利也不用命戮于社欲民速見為不善之辜是聖王之所不得巳而用之者也非所以治士大夫故子之所刺者平世之治也子之所稱者軍中之法也且夫賞為勸善也為善者終身誠之今一賞以春夏而巳至於怠矣則是雖為善未嘗不僞也從而賞之是賞僞也豈所謂善乎與其賞是人也則若勿賞是人也故君子正行非以干祿也經德非以希世也愛民非以要譽也尊主非以懷賞也故有功雖賞不驕賞之雖晚不怠曰非春夏則不可賞乎趣取賞而已矣何必春夏為曰否是所謂順天時者也為人父者莫不欲其子之孝於巳欲其子之孝於巳莫若巳為孝為人上者莫不欲其下之順於巳欲其下之順於巳莫若巳為順天者王之上也王者諸侯之上也諸侯者大夫士之上也故王者順天則諸侯順王諸侯順王則大夫士順君君之所為而大夫士為之是良大夫士也王之所為而諸侯為之是賢諸侯也天之所為而王者為之是聖王也故春夏者天之和氣也天所以施生也物之所榮也故賞行焉秋冬者天之義氣也天所以肅殺也人物之所畏也故罰行焉故賞罰之所以順天者臣事君也子事父也少事長也賤事貴也其本在王天下之君悅而言之曰王猶順天則天下莫不悅而順王天下之君悅而順王則天下之大夫士悅而言之曰君猶順王則天下之大夫士莫不悅而順君故王者父事天母事地兄事日非以祈報也以逹天下之大義也魯法論魯人之法也取人于他國者府與之金可謂惠矣未可謂之仁也君子之制其國也井牧其田野而時制其貢賦多乎什一則虐寡乎十一則不足十一而上下均矣工作之啇行之為士者治之平其政令教其仁義老有所息幼有所養而民安其鄉里矣君不行仁政吏不恤民士不教之敵國日至而不能守長幼相携持而行苟能以歸者而豫之金是寄民為政也取之不給則益賦益賦則益困益困則又轉而去之是徒取諸彼而豫諸此是無異競之而後償之者也為君子遵其本務其要平其政令教其仁義老有所息幼有所養而民厚矣安在人人而悅之人人而悅之可謂惠矣未可謂之仁也是非周公之舊也不能民者之為也子貢取人而不受金孔子曰魯人不取人于他國矣是亦非孔子之言也孔子之教人也將以人乎將以利乎必以利魯國之法乃益不可為矣君不行仁政吏不恤民士不教之敵國日至而不能守長幼相携持而逝苟能以歸者而豫之金是聚好利之民而乏國用也民固見金而不見仁也必以仁則子貢是矣子貢所以取人于他國者為仁也所以不受金者為義也子貢以仁率其國民以義率其國民一正其身而惠大矣故一鄉而亡十人未為衆能以十人歸而為利者巳多矣親戚莫相恤也故舊莫相援也朋友莫相先也閭里莫相愛也得金則幸以存不得金則道路然其心豈曰仁乎哉亦曰利而已矣是親戚故舊朋友閭里終相與去仁而為利也詩曰吁嗟濶兮不我活兮吁嗟洵兮不我信兮言仁義之不相豫也今又過而責子貢之仁義則是非孔子之意也且孔子亦教之愛民而已耳何為恐恐然懼不能贖民于他國貴功論人之貴士者貴其有成功者也當世榮之後世師之圖象肖之典冊紀之鼓歌舞之皆以其人賢不可尚也是惡識所謂貴乎夫立功者有五重有其志無其術一重也有其術無其時二重也有其時無其位三重也有其位無其主四重也有其主無其年五重也五者俱得然後能立功然則謂立功者賢耶幸乎治水莫如禹使禹遭成湯之世術無試矣時不合也生于堯舜之間故能見其材使不為司空水未可治也其位非矣然所以得治水者有堯舜也治兖州之水十有三年治他州之水九年如有不幸而早死又安得功烈哉由是而言立功者謂之賢非也謂之幸是也焉有非其時無其位失其主而能運天下之柄者乎士也奈何以功名矜人人也奈何以功名慕士哉齊不齊論或問貴賤可等歟曰可惟有德者能等貴賤昔者周公相天下履乘石南面而朝諸侯然而身執贄而見者數十百人此以貴等賤也曽子居于魯布衣不完萬乘之國欲以卿相之位致之而不能此以賤等貴也故惟有德者為能等貴賤曰貴賤吾得聞之矣貧富也亦可同歟曰可惟有禮者能同貧富昔者天子卑宫室菲飲食非不能侈也禮不宜也此以富同于貧也伯夷叔齊正衣冠嚴辭令不以一介取人亦不以一介豫人非其道繫馬干駟致祿千鍾不顧也以餓于首陽之山此以貧同于富也故惟有禮者能同貧富曰貧富吾得聞之矣死生也亦可齊歟曰可惟有道者能齊死生昔者仲尼嘗畏于匡困于陳蔡或不食者七日然而講誦益堅不衰晏嬰哭靈公崔杼以㦸勾之不動此以死齊于生也古之人未不慕富貴生而惡貧賤死也庶民以是喪德以是犯義以是棄道君子以是守之以是榮之以是安之夫是故貴有所不就也富有所不求也生有所不苟也故苟不能等貴賤將謀去之則無不為矣苟不能同貧富將謀遷之則無不為矣苟不能齊死生將謀活之則無不為矣夫當其無不為則人道何治焉古之君子所以稱有德曰窮而固為其能等之也所以稱有禮曰貧而樂為其能同之也所以稱有道曰夀夭不二為其能齊之也曰然則揚子雲何以謂不可齊不可同不可等也曰吾所言學士之操君子之事也揚子所惡匹夫之志衆人之僻也是欲以齊生死而無忌于法也同貧富而無畏于政也等貴賤而無嚴于上也是堯舜所誅也惡之不亦可乎古之人豈無死生之感貧富之纍貴賤之情哉亦審于義志于道使不義之生不能奪不義之富不能汙不義之貴不能夸而巳矣是之謂齊不齊患盜論天下方患盜或問劉子曰盜可除乎對曰何為不可除也顧盜有源能止其源何盜之患或曰請問盜對曰衣食不足盜之源也政賦不均盜之源也教化不修盜之源也一源慢則探囊發篋而為盜矣二源慢則執兵刃劫良民而為盜矣三源慢則攻城邑略百姓而為盜矣此所謂盜有源也豐世無盜者足也治世無賊者均也化世無亂者順也今不務衣食而務無盜賊是止水而不塞源也不務化盜而務禁盜是縱焚而救以升籥也且律使竊財者刑傷人者死其法重矣而盜不為止者非不畏死也念無以生以為坐而待死不若起而圖生也且律使凡盜賊能自告者除其罪或賜之衣裳劒帶官爵品秩其恩深矣而盜不應募非不願生也念無以樂以謂為民乃甚苦為盜乃甚逸也然則盜非其自欲為之由上以法驅之使為也其不欲出也非其自不欲出由上以法持之使留也若夫衣食素周其身亷耻素加其心彼惟恐不得齒良人何敢然哉故懼之以死而不懼勸之以生而不勸則雖煩直指之使重督捕之科固未有益也今有司本源之不恤而倚辧于牧守此乃臧文仲所以辭不能詰也凡人有九年耕然後有三年之食有三年之食然後可教以禮義今所以使衣食不足政賦不均教化不修者牧守乎哉吾恐未得其益而漢武沈命之敝殆復起矣若乃尚摘發之術任巧譎之數者未足以絶姧而郤雍因以見殺于晉故仲尼有言聽訟吾猶人也必也使無訟乎推而廣之亦曰用兵吾猶人也必也使無戰也乎引而伸之亦曰禁盜吾猶人也必也使無盜乎盍亦反其本而已矣爰自元昊犯邉中國頗多盜山東尤甚天子使侍御史督捕且招懷之不能盡得于是令州郡盜發而不輒得者長史坐之欲重其事豫以謂未盡於防故作此論從橫論為慶厯中重講西北和盟作昔六國之世地醜德齊天下未有所歸而游士說客以從橫為術是故憑軾結靷而東者無不言從憑軾結靷而西者無不言橫故從成則山東强橫就則秦人帝當趙肅王之時蘇秦為從約長合六國之將相盟于洹水之上投其書於秦秦人畏之為閉關者十五年及張儀相秦權譎諸侯而破其從六國瓦解爭割地事秦輸其寶貨從其詔命外多其敵內殫其力而六國自此而滅矣由是觀之秦惟毋使六國從親則秦必受其憂六國惟毋使秦之橫成則六國必䝉其患雖然為六國謀秦不出於從矣為秦謀六國不出於橫矣未有能兼從橫之勢以相操蹙之者也竊惟今日天下之患莫甚于從橫制從者在外制橫者在內此其可為大憂也何以言之耶夫元昊國之仇賊而北戎之姻親也隂山之外結之久矣間使相通潛兵相資糧糗相周虜獲相分此其雖異族實一家也攻城下邑破軍殺將有邱山之利而無毫毛之辱是以其相得益深非制從者在外乎自先帝以來與戎約和畫壤界通邉關棄冠帶之民虛府庫之積嵗嵗輸之猶以為少窺閒抵巇乘時邀利挾長短之數規必得之路今者二十萬復往矣然恬而不慮也以姑息為䇿以苟安為時非制橫者在內乎夫制從者在外此蘇秦之勢也秦兵雖强不足以亢之閉關而巳矣制橫者在內此張儀之勢也六國雖衆不足以亢之割土地效寶貨而巳矣今者使外專為從人之計內專任橫人之說苟如是國何以禦之是故兵力屈于西民力屈于北也兵力屈者瓦解之形也民力屈者魚爛之形也夫欲堅其未解全其未爛莫若破從而散橫欲破從而散橫莫若絶其和約欲絶其和約莫若出于不意夫敵有輕中國之心久矣易而無備故借兵于賊者以中國為不足慮也善戰者因其勢而導之選智勇順地形出其不意襲其不備雖不盡其巢穴范陽之地吾必舉矣如此則彼方內憂其國不暇又奚暇以兵與人哉如此則外不為從內不為橫外不為從則易支內不為橫則難困以難困之兵當易支之敵雖不善守猶不常失况又全天下之力任天下之智奮天下之勇致天下之怨者哉必若不為六國復出於兹秦兵復雄于彼雖有智者不知任其咎矣其禍變豈可勝言耶故曰天下之患莫甚于從橫惟毋使從者制其外橫者制其內而已矣欲治天下者破其從散其橫然後天下可為也萬事是非何足備言鳴呼戒哉湯武論說者曰湯武非放弒是不然是不及知聖人之權不以至公之道待聖人疑其有利天下之心疑其有利天下之心是以惡其有放弒之名是以矯為之說僞為之辭其意則善矣其義則不可通凡惡放弒之名者為其利之也大則利天下小則利一國是以斥其所以取之之狀貶其所以奪之之罪今湯武者聖人也太有天下小有一國無利之之心無求之之意然則何疑矣果不足疑尚何諱夫有放弒之名已哉以為湯武非放弒是不及知聖人之權不以至公之道待聖人率其私心而為之隱者也是蔽惑之說非湯武之本指也湯武之本指在乎隆至公之道以立放弒之業受放弒之名以一至公之義是以昔者湯放桀惟有慚德武王作大武之樂盡其美不敢盡其善苟不以放弒為名湯尚何慚武尚何未善哉夫帝王之事有變有常常事禮也變事權也堯授舜舜授禹湯放桀武王伐紂是皆所謂權也權者反于經而後善故必自貶損然後中權矣故堯舜不辭外禪之非湯武不惡逆取之名貶而益明損而益隆者也尚何疑而諱哉說者曰湯武非放弒問之曰湯武聖賢而桀紂大惡也應之曰然則以湯武為非臣以桀紂為非君乎夫放弒者正君臣之名也非正善惡之名也桀紂雖不善其位君也湯武雖善其位臣也以臣伐君而不謂之放弒是去君臣亂上下之道也苟無君臣焉可也如有君臣則桀紂乃所謂君湯武乃所謂臣也故桀紂天下之惡而已矣湯武天下之賢而巳矣湯武之有天下不利之耳不求之耳至放桀而伐紂誰得而避之哉故謂湯武非放弒則去君臣而亂上下矣天下之賢者將起而掖其君以奪之矣深非其君以罪而厚自榮以名矣故善言道者不然彼湯武者真放弒者也明白其道所以序聖人之心貶損其名所以受天下之垢受天下之垢而名不辱百姓不疑萬世不非是乃聖人之所以為聖也謂湯武非放弒是不及知聖人之權不以至公之道待聖人率其私心而為之隱者也是去夫君臣上下喪名實者也矯為之說僞為之辨者也昔者晉靈公為不道誅國人辱士大夫支解膳宰逐大臣趙盾趙盾出奔趙穿因民之不悅執公弒之然而董狐書曰趙盾盾曰弒者非我也董狐曰子為正卿亡不出境入不討賊非子弒君則誰哉孔子曰董狐良史也趙盾良大夫也由是觀之盾非不知弒君之名也為法受惡也為法受惡者所以崇君臣之義厲上下之叙也然而謂湯武非放弒者是謂湯武無趙盾之德無孔子之志也狂譎華士少正卯論世俗說曰太公封齊誅狂譎華士周公聞而非之孔子為魯司冦七日殺少正卯兩觀之間門人見而惑之論之曰是皆不然也齊無狂譎華士而已矣如有太公必不誅也太公誅周公必不非也魯無少正卯而巳矣如有仲尼必不殺也仲尼殺之門人必不惑也夫世俗之說狂譎華士者齊髙士也不降其志不仕非其主如是則伯夷叔齊之比也昔者武王伐紂伯夷叔齊扣馬而諫曰以臣伐君不可以訓左右欲兵之太公扶而去之曰義士也不可殺夫太公以伯夷叔齊為義則亦必以狂譎華士為義矣以伯夷叔齊之義為不可殺則亦必以狂譎華士之義為不可殺矣夫武王伐紂從聖智之士與天下之諸侯舉國而東伯夷叔齊沮解其意非毁其事三軍之衆莫不怒者太公獨以為義而不誅也罪莫大於誤軍過莫大於非聖人伯夷叔齊兼此二者而太公不誅齊無狂譎華士而已矣如有太公必不誅也夫狂譎華士不可誅則所誅者非狂譎華士也非狂譎華士則必巧僞以誣世詭法以惑衆者也夫巧僞以誣世詭法以惑衆是王政之所當去者故曰太公誅之周公必不非也夫世俗之說少正卯者魯之聞人也與仲尼並居於魯仲尼之門人三盈三虛獨顔淵不去夫言獨顔淵不去是閔子騫之徒嘗去之矣少正卯能使閔子騫之徒去聖人而從巳是少正卯非細人也夫以閔子騫之智足以昭善惡决去就猶深悅少正卯之義則少正卯之非細人審矣故曰魯無少正卯而已矣如有少正卯仲尼必不殺也且仲尼與之並居不能以義服其心與之立教弗能使弟子不叛巳是魯國之人莫不以是人為賢也民以為賢仲尼始為政七日而誅之百姓不知是仲尼嫉賢也嫉賢而惑民何以為政故曰仲尼不殺也然而殺之者必非少正卯也非少正卯則必巧僞以誣世詭法以惑衆者矣夫巧僞以誣世詭法以惑衆是王政之所當去也故曰仲尼殺之門人必不惑也世人好言聖而不知其道好言政而不知其統夫聖人之道不出於禮義而王政之統不出于順民心違于禮義逆于民心者聖人不以為道王者不以為政也故聖人作而修天下之禮明百物之義設取豫之分决向背之趣使百姓暗然而服是故移世易俗而不見其迹如之何不教而殺哉非子産論子産聼鄭國之政有事公孫假賂與之邑劉子曰權而不義子之事親性也臣之事君義也以性合者諫不入不去也厄窮禍患不避也有功不報也以義合者諫不入有以去之厄窮禍患有以避之有功有以報之有功而報之義也未有無功而賜者也無功而賜以為說也父不能以使子則不父子不可使也則不子君不能使臣則不君臣不可使也則不臣故父有使子而無報君有報臣而無賂賂臣而使之不可謂國三卿五大夫二十七士可勝使乎使而賂之可勝賂乎臣不見利必莫之勸也是君臣上下相率而為利也義不足以動之仁不足以存之忠不足以論之信不足以結之禮不足以明之幾何相率為利而國不亡乎君子為國家者修其義逹其禮君君臣臣父父子子而安有不行者哉或曰子産不得巳也對曰然吾固曰非治世之法也叔輒論叔輒哭日食叔孫昭子譏之曰叔輒將死矣非所哭也嗚呼叔孫昭子不知言者乎夫昭公弱君也享國久矣季氏强臣也能專其政所樹置非親戚則黨與也一臣君不得使焉一民君不得有焉賞罰違于衆而形勢敦于外子家駒逹于人者也閉其口而祿仕矣梓慎逹于天者也詭亂不敢正言矣是以叔輒知日食之憂必將及君欲陳則不見信欲默則不能已欲謀則逼于禍欲隨則失其守發憤一鬱而無與誰語故慷慨感激至于號咷也設使昭公因而感悟聼用其謀援忠直退奸邪破朋黨之敝禁强僣之臣魯可復興豈獨長守其貴哉當是之世仲尼聖人也而生其國顔淵之徒仁人也四方歸之舉而用焉以謀三桓易矣然而遂不覺悟長惡養凶不及五年奔走失國寄于乾侯終身愁孤從此觀之豈不可大哀而慟哭也乎此乃叔輒之所以感也夫忠國之君子明于禮義而陋於知人心人固未易知也易曰書不盡言言不盡意夫言而書之以為詳矣而猶曰不盡而况乎未始書之未始言之者哉此叔輒所以見譏於當世狂而不信也嗟夫公是集卷四十

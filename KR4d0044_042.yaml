body:
  text: 公是集卷四十二宋劉敞撰説雜説九首善治天下者求之于其身而巳矣耳也者所以聼也目也者所以視也口也者所以言也心也者所以思也手也者所以攫也足也者所以走也凡此數者相待而成相須而生廢之則病缺之則喪然而莫相易也莫相德也分定故也聖人之治天下能使百官萬物如耳目心口手足之不可相易亦不相德濟之如一身而天下安有不治者屠羊説者楚之屠羊者也當昭王之時吳兵入郢昭王奔走屠羊説有功焉王定而賞之屠羊説曰不可王始失國吾亦失屠羊今王復國吾亦復屠羊吾職巳足矣又何賞乎此其不相德也甚矣所謂分定者非名位有所極人不敢間之者也清濁中理賢不肖中倫人莫能間之者也譬若足之不可為手耳之不可為目也故天子憂天下諸侯憂其國公卿大夫憂其家所任大者憂亦大所任小者憂亦小非上獨逸而下獨苦也古者以進為役以退為休勞力者安勞心者憂也其不以利私已也已故上下一體也憂大者憂逺憂小者慮短故有天下者其視百嵗猶旦暮也有一國者其視一世猶旦暮也有一家者其視一嵗猶旦暮也旦逸樂而暮憂患人情所不為是故天子有百世之憂諸侯有十世之憂士庶人有終身之憂非獨百姓為有俗也至于有司執事亦有俗也為國者謹察其俗變之則治不變則壞不可不慮也然則今執事之俗何也曰今執事之俗以希世為賢以守道為拙以苟簡為治以姑息為安以佞諛為禮以雷同為美以希世為賢故巧競之路開也以守道為拙故敦朴之節消也以苟簡為治故政有所不舉也以姑息為安故事有所不修也以佞諛為禮故忠信之士匿也以雷同為美故正直之風壞也雖然此六者非忽然而敗也若火之燒膏若泉之穿石漸之漬之將效於盡而止不盡則不止方其盡也可不憂耶故及其未盡而救之庶有已乎然則何不視其不為希世者而貴之富之以抑其不守道者視其治苟簡者而黜之辱之以進其不苟簡者視其安姑息者而黜之辱之以升其不姑息者視其佞諛者而紏之謫之以振其不佞諛者視其雷同者而紏之謫之以來其不雷同者如此而人盡其心吏專其職內之無秕政外之無敗事亦不數嵗而習以為俗矣及其習以為俗也天下何事之不治哉今至使國家者委之天曰治天也不治天也抱道德者委之命曰逹命也不逹命也凡治國家者在仁而享富貴在賢今也皆委之天與命者六者之俗不除曲直相混淆故知其無可奈何者為此言也夫習俗之人惟見其是不見其非也是以禍至而不知今不能變後之人其必有任是者乎嗚呼若火之銷膏可不戒之哉古今不同風化不一帝王之政在謹察其時之俗其善者敦而悅之其惡者反而新之然後政可行也今天下之俗其何如哉曰今天下之俗習于機巧急于財利薄于禮義輕于刑罰機巧習則用不足財利急則盜將起禮義薄則君子隱刑罰輕則小人肆此固反而新之之時也其反而新之無説乎曰有欲機巧之反也莫如尚忠厚欲財利之反也莫如進亷士欲禮義之反也莫如謹制度行斯三者則刑罰重矣欲刑罰之反也其要在知人知人者求若人者尊之使可則也貴之使可尚也富之使可悅也百姓惡有不勉而從之者乎夫百姓者固見利而不見義今且使其見為利不若為義者之榮也惡有不順乎今且使其見為義不若為利者之榮也惡有不悖乎三代之王各有官刑所以然者公卿大夫操事任職與百姓異百姓以勤勞效事為務而卿士以興化致治為責其法不得一也近觀春秋之義責賢者備責不肖者略所謂賢者固卿士之品也官刑見于書傳者夏則昏墨賊殺商則具訓于蒙士周則多矣今刑罰憲章所以防禁小人掩博淫盜爭鬭毆擊者甚備而卿士大夫其荒謾頗僻傷教損俗者于法無比則置而不論必求其掩博淫賊爭鬭毆擊者然後舉行刑焉彼為卿士大夫者雖甚不肖亦安有為夫市井小人之為者乎苟不為市井小人之為則皆良大夫也而其懷惡頗僻傷教損俗有甚于市井小人之為者反置而不論不亦操下詳責上略乎是背于春秋今宜粗定官刑以興化致治賢者任責之使夫居官者有畏也亦不待掩博淫賊爭鬭毆擊而後罰之矣則必畏正其身以扶世道民如是不亦忠乎古之公族髙可以秉國鈞下猶列大夫所以能爾者誠教訓服習之至也人之材性賢愚不同賢者可使亞聖愚者可使畏義若飽食逸居而無師保之嚴則放僻邪侈無不為巳今公族子弟雖有説書伴讀類不能開導其性假使天資茂異猶不自知况其膏梁漸染何由振起乎古者太平之世無棄人今公族國之枝葉也其賢者未嘗效用中下又不養育但令飽食逸居其為棄之不亦甚乎天下一家四海一法荒徼山野之士無不並取可謂立賢無方矣而親戚懿私以嫌不用公卿大夫懷左官附益之疑莫肯任忠信建言其事幸天下常寧固無可疑若時移俗變或有強臣跋扈而公族枝葉無權無勇不足畏憚前古如此可勝言哉夫言且然之勢于未然之時俗必笑之及其有然恨不早然何可然也魏文帝明知秦所以亡者無親親之輔而拘束子弟愈于盜賊國不三紀移于強臣此可謂昭昭之鑒也夫為政之體用兵之術苟平生未嘗見雖抱智勇或失規矩今公族甚多宜選厲賢雋嵗出數人令曉民事若其大雅卓然便借以權柄此與任殊姓異族功相遼矣詩曰揚之水不流束楚無信人之言人實廷汝又曰有枤之杜其葉菁菁獨行惸惸豈無他人不如我同姓同姓之親親其所以然者稟性受體共源異泒出于天性而不可解于心也故公子不去國嗚呼可不念也哉可不念也哉古太學教胄子以九德及其學成志就足以不惑然後授以爵位故二帝三代世族門子多得賢材今公卿大夫郎吏以上皆得任子弟下者至京官其次仕州郡非復專學問道苟以榮富家貴族耳勢崇力巨易以講道往往據要職重任十有八九嫡庶不分賢不肖混淆天下常若官多員少者此等害之也可為著令諸當任子者得任為後者一人餘皆不得若自以為有殊功異行詔上名者不用此令而令朝臣以上子弟悉詣太學著籍受學為設五經博士隨所欲學從博士習之聞嵗輒一試如漢朝射䇿取問經典大義通五經四經為上三經次之二經為下不及二經且勿舉以十道為問不失為上失一二次之失三四為下失五勿舉既得其人以學優劣制其爵祿假令其父若大父世父官本微也今以其子孫才髙自以髙官與之稱也假令其父若大父世父官本崇也今以其子孫材下自以小官與之亦稱也人當以言行為類非若萬物可種傳也如此仕者皆得其人經義益修矣古者求士先退讓敦朴者欲以勵世矯俗也士之應世求者亦偃蹇自厚而鄙小榮利是以人懷亷約之心俗長敦厚之風若不得巳而應聘效力則諤然中立以道進退何則其素所操持者不近勢利也故古者鮮患失之歎今進士猥多自十年以來嵗嵗增益州郡所舉會于尚書者常三千以上若盡以為賢是何賢之多也雖罝之世不能及此必若不能盡賢但啓貪競之心開奔走之路非朝廷之美也又懷利干進互相窺詆發揚其短長或攜手揚袂佻逹傲蕩無復處士之態習俗為長不覺不禁必復有西晉曠放狂譎之敗竊以謂宜令州郡間嵗舉進士取其實行經學試之如太學胄子大郡三人其次二人其次一人無則闕京邑四方所賦士之占籍多可令五十人餘京或五十七人其佻薄無行皆擯斥勿收如此號為州郡舉進士可矣非進士自舉也夫自舉之與人舉之所以厲世矯俗豈可同日而語哉今不惟進士自舉而已至于賢良方正亦自舉也豈不過乎夫賢良美稱也方正善行也古之當此名者方將髙卧潛處不知羔堆圭璧之聘三四至而遂能起乎今皆循循然窺顔色求便利而進矣爭門齰指不足諭其情側肩攫金不足况其態鼓腹自鬻不足比其羞無乃其實與其名不相符哉今世皆知髙賢良于進士矣不知賢良之害于俗甚于進士何以言之耶人有言曰南城之澤有焉可逐而取也彼聞之者必爭先致力焉然其至也必遊手惰農耳又有言曰有鹿焉可逐而取之也則不獨遊手惰農而後爭之也必將有舍業而往者矣則小而鹿大故也夫進士也賢良鹿也二者皆以動貪利之心而賢良之所動者多可不慎哉故女以自媒為醜士以自獻為汚今朝廷使公卿大臣舉賢良方正則名實當矣太守縣令宰民之官久則民愛之畏之不久則威不下德不及令數移易少及三年者至于善郡或數月而一改人知當遷懷苟且之心吏見其上當去又欺罔之或因緣為姦不可考較如此朝廷雖欲使二千石宣布教化勢不可得二千石雖欲為朝廷宣布勢亦不可得而民吏奉承長上又非獨易也或嗜好不同或寬急異術或趣舍殊路或懲勸相駮期年一變法數月一易政雖有百心不知所從若不如指鞭撲隨之豈不可憐也哉宜一以九年為限又須令守宰募兵滿率者賞之如此則守宰去字民之任而更當主兵也夫守宰以占民田户口衆寡為殿最久矣今一日以募兵為事若不籍流人將安取之哉流人不復田畝而為兵守宰貪募賞格為無禦之者不出數年天下喪失户口必甚復安得人而充之乎若滿率不賞則棄信也方欲用兵而先棄信不可為也若滿率必賞之則欲賞者必多誰欲朝廷安集飢餓之人乎又宜假守長以權使輕重有所出惡逆自劾盜賊不生要在任之以久耳書云謀及卿士庶人蓋以通下情慎事機也今天下之事惟決兩府假令盡得賢智猶當詢衆况又未必得賢乎夫民吏上書或興建利害朝廷大事可以唐漢故事令百官雜議議而行之以法洪範往者詔書有所為或一年或二年或三年或數月之間又輒取格此皆謀之不審議于苟且方行之時以為萬世之䇿也事未及半乃知不便因而止之耳故數下不信之令輕損神明之威非朝廷之福也若謀而後行議而後決安得此患乎又頃兵興以來調度不足吏民獻攻戰之䇿富國之術者不可勝紀髙得入幕下猶恭軍抑豈無碩畫竒效可施之當世者乎然浮偽猥多善惡不分時議皆謂懲張元吳皓姑息此輩以故扇習更求試用造作怨謗興出事端欲以恫愒主上規取貨利此不可不察也盡禁其端則衆情壅塞苟有至者而輒賞之則姦偽滋長宜取所言下賢臣考較驗可用者則聼待詔其不可用者罷之所待詔者或必試用則敕近臣問狀若䇿試時務審無虛偽然後隨其器用之則留者必自以得上心失者必自不恨今者雷同一槩無所玉石或長材異謀不見旌别雖被國恩猶以為耻其庸庸者則又過幸或私相假借文字竄竊姓名或密從左右刺取前人所上書巳嘗奏御者認為巳有所以規中上意百端千緒不可不察也其言興利除害者類無逺識以掊克為智以斂怨為德以一切為便以米鹽為能有司樂之輒為行下于國术有毫毛之益而于民有邱山之損此豈可持久哉凡若此類尤宜與衆議也議必可行之議之不可奈何行也今朝廷非無議事之典也所議數事而已誅大臣則議之諡大臣則議之皆有司成其文而郎吏以下唱唯而巳非能有所指發異同也而諸近臣輒移疾自便不赴其期如此孰與不議也名存實亡何益詩曰詢于芻蕘芻蕘猶可詢况諸大夫乎議事丞相下九卿卿下州州下郡郡下縣縣下鄉百工説百工之事聖人智也百子之術聖人治也百工殊智而同巧百子殊術而同治作車以行陸作舟以行水鑠金以為刃凝土以為器鞣革以為韋合異以為繢甲欲其堅也刃欲其利也弓欲其規也矢欲其直也其意舛馳其務相反其智不一能并而容之并而任之者司空也或為楊或為墨或為刑名或為從橫或為道德或為法術為人欲其棄已也為巳欲其忘人也其意亦舛馳其務亦相反其智亦不一能并而容之并而任之者聖人也故司空氏得其人百工者咸安其職勉其業居其次司空失其人百工者起而相時之好惡以巧相傾以利相排以説相勝聖人在上百子者各輸其術陳其力守其官聖人隱王道廢百子者不得其用起而察時之治亂深念而逺慮之以智相多以學相非以法相厲天下于是大亂人自為教家自為治則上無聖王而使人不得其材賢者在下而業不試故也著之其書傳之其徒以謂若已而治矣此一官之事一器之用譬猶鼎之可烹罍之可盛使相易而不能行矣其淺深度量規矩措置適其所宜而巳矣楊氏思天下之亂以謂亂生於利彼也故為我墨氏思天下之亂以為亂生於私巳也故兼愛申韓思天下之亂以謂亂生於民分之不定也故尚刑名蘇秦張儀之徒思天下之亂以謂亂生於患難之不排紛揉之不解也故為縱橫莊老思天下之亂以謂亂生於多欲也故教以清淨陳仲史鰌思天下之亂以謂生於貪曲也故教以亷直許行陳相思天下之亂以謂亂生于逐末也故教以稼穡孫武吳起思天下之亂以謂亂生於不教民戰故立兵法此皆其美者也是以言之或相擯也或相尚也雖然尚之非也擯之又不是也聖人者立數子者得其欲而言止矣故言者生于不用也術者生于不試也言而皆得其用天下安有言術而皆得其試天下安有術故仲尼之門德行顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子遊子夏聖人之能盡人之材也知人之能止其分也使治天下亦若是矣使世而無仲尼德行者或為老莊或為陳史言語者或為秦儀或為惠施政事者或為刑名或為法術故曰非百子之害也無聖人之害也聖人不息王政不滅百子者不起夏有天下四百餘嵗傳之啇啇有天下六百餘嵗傳之周聖人治之仁人接之百子者不得作周有天下八百餘嵗文敝極矣仲尼生而無位百子者紛然而起由是言之百子出于周衰也周之前固未有也及至今之時道無所主治無所出學者喪其性而萬物失其體而欲復三五之治何可得哉故曰世之敝必鄉原也相悅以名相飾以利而巳矣世之所向而為之世之所背而去之因主為操因俗為度因偽為禮滑稽而無法誕漫而無家世之敝必鄉原也鄉原不及百子百子不及中庸中庸者聖人之治也堯舜所以君也周公所以臣也仲尼所以師也子思孟軻所以救敝也惟仁人能知聖人子思孟軻之謂也説犬馬由漢以來苟進言於天子無不以犬馬自豫者嗚呼犬馬之賤誠若是甚矣使夫治國守道之臣進以義退以禮而犬馬之説不已貶乎使夫亂國偷容之臣進以利退以刑而犬馬之説不以僣乎今夫犬之為人用也不過受一器之食然而外則有獲獸之效內則有禦冦之猛斯可謂適其材矣今夫馬之為人用也不過盡一鈞之芻然而外則有兵戰之捷內則有馳獵之奉斯亦可謂適其材矣故功著而利不益身勤而事不害此雖亷能之士盡瘁不二何有能過焉若夫亂世偷容之臣享五鼎祿萬鍾非特一器之食也髙堂華宇寵章美服非特一鈞之芻也挾虛譽而邀利竊主權以移國外之無獲獸之效內之無禦冦之猛者世不可勝紀也所謂功薄而罪尤身利而事害如此何以自比犬馬耶且吾聞賊臣之喪國矣未聞犬馬之亂世也誠使桓靈惠懷之君其左右前後盡若犬馬也則天下何喪焉故吾以謂亂國之臣其不若犬馬未可以為比也用貴擬賤之謂讓用賤擬貴之謂僣然而以彼亂國之臣而比犬馬吾見共僣不見其讓也公是集卷四十二

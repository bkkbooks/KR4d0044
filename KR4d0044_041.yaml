body:
  text: 公是集卷四十一敞撰議天子五門議禮説天子五門曰臯門曰庫門曰雉門曰應門曰路門此有五門之名無五門之實以詩書禮春秋考之天子有臯門無庫門有應門無雉門有畢門無路門諸侯有庫門無臯門有雉門無應門有路門無畢門天子三門諸侯三門門同也而名不同三同也而制不同何以言之耶詩曰乃立臯門臯門有伉乃立應門應門將將書曰二人雀辨執惠立于畢門之內又曰王出任應門之內此皆道天子之禮者也無道庫門雉門者非天子門故也雖然畢門或謂之虎門或謂之路門路門者建路鼓于此門之外太僕司之指路鼓而言故曰路門虎門者王在國則虎賁氏守王之宫蓋居此門故太保命仲桓南宫毛俾爰齊侯吕伋為天子虎賁也指虎賁而言故曰虎門其實一也明位堂曰庫門天子臯門雉門天子應門此言魯之庫門制如臯門魯之雉門制如應門也魯用王禮故門同王門其制雖同而名不同也諸侯有路寢路寢之門是謂路門此諸侯三門也無道臯門畢門應門者非諸侯門故也春秋曰雉門及兩觀災子家曰設兩觀乘大輅諸侯之僣禮也譏兩觀不譏雉門雉門者諸侯之禮兩觀者天子之禮也天子三朝諸侯三朝天子外朝在臯門之外諸侯外朝在庫門之內天子內朝在畢門之內諸侯內朝在路門之內其建國之神位左宗廟右社稷皆夾治朝此春秋所云間于兩社為公室輔者也禮説以為廟于庫門之內誠然者仲尼助祭于廟事畢出遊觀之上觀者雉門也雉門在內庫門在外當言入遊不當言出也祭畢而出遊乃得至觀之上明廟在治朝之左雉門之內也郊特牲曰繹之于庫門內失之矣繹當于廟即廟在庫門者無失也又曰獻命庫門之內戒百官也太廟之命戒百姓也百官踈故戒之于外朝百姓親故戒之于太廟此亦魯事也魯之有庫門審也天子無庫門也何謂畢門畢者蹕也王出于此則蹕也師氏掌焉何謂應門應者應也王居治朝正天下之政則四海之內罔不敬應也何謂臯門臯者告也王居外朝則播告萬民謀大事也此亦春秋大言天子也何謂庫門路門雉門諸侯不敢戚天子名門以其所近也庫者府庫所在也雉者治朝所在也謂之雉猶治也路者路寢所在也此亦小言諸侯也或問子之所言宫室門户之間道歟曰然固正宫室門户之道也為兄後議禮天子之廟三昭三穆與太祖而七諸侯二昭二穆與太祖而五所謂昭者父道也所謂穆者子道也天子諸侯未必皆身有子故或取于兄弟之子以為嗣親同則取其賢者賢同則取其長者長同則卜其吉者非兄弟之子則勿取故不以諸父為嗣父尊也故不以諸兄為嗣兄亦導也不以諸弟為嗣弟已之倫也此古者五廟七廟之序以昭穆不相越迭毁不相害也至乎後世國家多事或傳之諸兄或傳之諸弟蓋有不得已也則禮散久矣然既已受國家天下則所傳者雖非其子亦猶子道也傳之者雖非其父亦猶父道也以天下國家為重矣春秋僖公實閔公之兄閔公遭弒僖公書即位明臣子一體也公孫嬰齊卒春秋謂之仲嬰齊以謂為人後者為之子當下從子例不得復顧兄弟之親稱公孫也春秋之義有常有變夫取後者不得取兄弟此常也既已不可及取兄弟則正其禮使從子例此變也故僖公以兄繼弟春秋謂之子嬰齊以弟繼兄春秋亦謂之子所謂常用于常變用於變者也既正其名則僖公不得不以閔公為昭歸父不得不以嬰齊為穆既正其昭穆則迭毀之次不得不以一代一也而儒者或疑禮無後兄弟之文遂以春秋書仲嬰齊為不與子為父孫非也子為父孫誠非禮之正有不得已者春秋正其為臣子一體而巳故實公孫嬰齊而謂之仲嬰齊若春秋本不聼其為後者則當書曰公孫嬰齊卒學者問之曰此仲嬰齊曷為謂之公孫嬰齊不與為兄後也乃可矣夫春秋家猶重之况國乎國猶重之况天下乎故凡繼其君雖兄弟必使子之繼其大宗雖兄弟必使子之如繼其君繼其大宗而不使子是教不子而輕其所託也此文公所以受逆祀之貶也然春秋固為衰世法非太平正禮也太平之世未嘗有也漢時定迭毁之禮丞相玄成丞相衡引昭宣兩帝為昭獨以孫為昭而不知禮無兩昭使昭帝之天下無所傳宣帝之天下無所受失禮意也又惠帝文帝皆髙祖子惠帝親受之髙祖文帝則受之惠帝雖皆兄弟此與閔公僖公何異哉存當以臣子敘之死當以昭穆正之而漢時議者皆推文帝使上繼髙祖而惠帝親受髙祖天下者反不與昭穆之正至于光武當繼平帝又自以世次為元帝之子上繼元帝而為元帝後皆悖經違禮而不可傳者也自漢世以來其議尤衆皆曰兄弟不相為後不當以昭穆格之妄也若不以昭穆格之則天下受之誰乎凡人君以兄弟為後者必非有子者也引而為嗣臣子一體矣而當嗣者反以兄弟之故不繼所受國而繼先君則是所受國者竟莫有嗣之者也不可一矣生則以臣子事之死則以兄弟治之忘生悖死不可二矣已實受之後君不受之先君今當自繼先君者不惟棄後君命巳之命又當廢先君命兄之命不可三矣天下國家則歸之已而父子之禮則耻不為不可四矣徐邈曰若兄弟昭穆者設兄弟六人為君至其後世當祀不及祖禰此又妄之甚者禮有所極義有所繼為之後者為之子所以正授受重祖統也兄弟六人相代為君亦六代祀祖禰矣假令非兄弟相代其祖亦當遷矣不得故存也即如此言使有兄弟六人為君各自稱昭是有十三廟也又其最後一君當上繼先君而五君終為無後也豈其所以傳重授國之意乎禮為人後者降其私親設兄弟六君故當各自為嗣義不可曲顧其親何謂祀不及祖禰哉凡言禮者惡其諂時君之意苟曰益廣宗廟大孝之本而不詳受授之道春秋之義使當傳國者不忍以國與其宗曰非吾子也當受國者又不肯以臣子之禮事其君曰非吾父也至令宗廟猥衆昭穆駢積而鬼有不嗣者推生嗣死獨何悖哉獨何悖哉奔喪議臣竊見舊制官自三司副使以上及班行使臣遭父母喪者例皆有百日公除孝子雖有思慕之心猶逼于土命不得遂行此誠傷教害理無取于今臣伏以三年之喪通于天下以義制恩古人有之自謂身在軍旅躬被金革者不敢以私事辭王事爾本非承平之時遊談侍從之臣所當行也又非班行冗下之職所當預也習俗既久寖以成風其賢者則以不即人心為悲其不肖者遂以當喪墨縗為榮以之錫類是為傷恩以之教民是為忘孝今天下往往有聞哀不舉廢哀圖仕源自此始不可不慮傳曰君子不奪人之親人亦不可奪親竊謂惟在軍中者可權從變禮其舊制三司副使以上及班行使臣百日公除不合禮意宜聼行三年之服以崇孝悌之風臣又聞古者大夫去國三年然後收其田里明有恩也今丁憂臣僚即日絶其俸祿亦為大確豈有行禮之人反不及被放之臣臣往見丁憂者家貧無食乞丐糊口其皇皇傷孝子之心非所以化民成俗也臣以謂文官兩制武官自諸司使以上與給全俸其餘京官下近臣啇量可否妾為君之長子三年議李端懿卒其庶弟之母疑其服或曰妾為君之長子三年某未之聞也故議之妾為君之長子三年傳無其文而鄭玄以為禮然經大功布衰裳牡麻絰纓布帶三月受以小功衰即葛九月章曰大夫之妾為君之庶子其傳曰妾為君之黨服得與女君同故玄以謂女君三者妾亦三年矣按三年之服髽衰疏衰無妾為君之長子則君之長子未可以三年服也凡禮之所慎名為大妾不得體君是以其服也有故而遂者矣以别嫌明統也然則得體君者惟小君爾小君為長子三年妾又為之三年則安在其能別嫌明統且不得體君也難以言禮然則所謂妾為君之黨服得與女君同者殆指謂庶子以下爾為庶子大功則為長子宜期為長子期雖無明文然猶可有見者傳曰妾為女君君之長子惡笄有首布總是言服女君之笄與君之長子筓同也筓同則衰宜同矣為女君期不得不為君之長子期此文之一隅可反求者也凡服之降也不過一等其加也不過一等妾為君之庶子大功為長子三年失其等矣然則妾為君之長子疏衰裳齊不杖麻履惡笄有首布總于禮為節然康成推庶子之傳以言長子而不求其意法家因康成之言以著服制而不原其失輕重貿亂久矣某以謂九伯先帝之甥大王之子李氏世嫡也其喪也國人覘焉使庶弟之母為之三年于義未安改而從政儻亦禮之一得云為人後議孔子射于矍相之圃子路誓客曰賁軍之將亡國之大夫與為人後者不入其餘皆入蓋去者半敢問何如斯謂之與為人後矣與之也者干之也求之也庶子奪其宗非干歟嫡子不後族人攴子後族人嫡子而後其族非干歟諸父諸兄尊也諸弟倫也義不可為後非干歟禮不後異姓異姓不為子異姓而為人子非干歟庶子而奪其宗則篡其祖也嫡子而後其族則輕其親也諸父諸兄諸弟而後其子兄弟則亂昭穆也異姓而後于人則背其姓也當周之衰賁軍之將亡國之大夫與為人後者蓋多此仲由所惡也曰禮不後異姓異姓何以有為人子者曰禮所言者方其治世也世衰禮廢必首于夫婦之間夫死子幼莫之安其室矣于以適人少則依其居長則從其姓貴則利其祿富則利其貨而莫之自外矣此亂之甚者也或曰繼父期日繼父者有父道也非其實也妻稚子幼子無大功之親而與之適人所適者為之築宗廟于門外使子以四時享其先妻不敢預焉築宫于廟門外者逺其宗也妻不敢預焉正其族也如此則繼父之道矣故同居則服期異居則服三月未有能易其姓者也君子不易人之姓人亦不可易姓也或曰昔之言禮與子異曰然昔之言禮者以謂人有後矣而又往與之者也有後而又往與之是兩後矣安見有兩後者歟且人惟無後故求後焉未有後而又求副焉者也此非子路之旨或曰立後者立族人族人既為人之後矣而父晚有子立族人歟立子歟曰諸侯將立後必告於天子而見于祖大夫將立後必告于諸侯而見于祖傳曰為人後者為之子為之子者降其私親所以重之也如有子則反苟代匱而巳非立後也復讎議父不受誅子復讎可乎曰可君臣義也父子性也曰不以親親害尊尊乎曰親親內也尊尊外也親親本也尊尊末也重內而輕外先本而後末者道有在焉若是則可以報君手之亦可乎曰否非此之謂也君之于臣也固有誅道若何其可手哉然則奈何而復之曰以告于方伯方伯致其法古之事有在于是者矣書曰葛伯仇餉湯征自葛為餉者之父而仇之者也告于方伯而不從則告于天子致其法古之事有在于是者矣書曰皇帝清問下民鰥寡有辭于苖遏絶苖民無世在下為鰥寡之人而仇之者也告於天子而復不從則是上無天子下無方伯上無天子下無方伯則緣恩而疾之可也請問其人曰伍子胥是矣曰伍子胥亦嘗告諸方伯天子而不從乎曰否子胥未嘗告也未嘗告何以得專復讎曰子胥知雖告焉猶無益也當是之時周為天子而楚以王自居晉王諸侯而楚與之狎主盟周晉之下不能行于楚也久矣惡能誅之此春秋所以緣恩而疾之者也君子以謂猶告敢問師友之讎亦可通乎曰不可太上無讎莫敢亢也國君惟父母之恩逹牧長惟期之恩逹其餘力能報之則報之可也曰太上無讎則仕焉可乎曰否不謀其利亦不致其怨而巳矣仕則吾不知也處士號議劉子曰仕之有爵禮也有號非禮也古者蓋名而不字其次字之矣而死不諡其次死有諡矣而生無號號者下事上也臣事君也古者有神農氏軒轅氏非所以褒士也故士有不可臣而無不臣有隱居以求其志而無矜世以立名名之于人也大矣其亦將有叛親戚薄君父毁聖智以干于世者乎且夫士之隱也非惡富貴也為上之不我知也既知之矣貧可使富賤可使貴故有天下者斯養天下之賢有一國者斯養一國之賢士大夫不能也是以士則薦之大夫大夫則薦之君薦之者逹之也非苟增其名也養之者用之也非苟美其號也古之善為士者不敢以賢自譽是故無事而食其食不敢也無位而服其服不敢也如非其禮而踐其號何為哉不舉賢良為非議并序景祐四年詔舉賢良方正之士至者數十人明年有司試其藝獨二人應科于是宰相議以賢良猥衆多名少實欲一切罷之余在京師作此議也賢良通于古今之變政教之本豈止心辨善辭以自鬻一時哉今夫天子深居臯庫之中而洞視四海之表雖有日月之明不能隱于幡旆故外有登聞匭函內有銀臺閣門而設御史諫官是紀是綱則豈不欲盡下情而斷欺負哉雖然民能自詣登聞匭函者非必有長材異畫動主聼者也特州里細故訴困于上不則利其身以祿者也臣能自致銀臺閣門者非必有讜言切辭為國憂者也特簿書往來各守一端不則幸其遇以求位者也夫細故不舉不足為天下憂簿書不期會不足為朝廷病由是而言雖使百登聞匭函不若十賢良之盡下情也雖使十銀臺閣門不若一方正之識本務也諫官御史位隆志滿充庭取備不若使草野之士直言而極諫也夫古之取士者選之於鄉舉之於民三公賔而薦之天子拜而受之是以禮義全而亷讓作也其意蓋曰賢能重而祿位輕云爾是以或藏而不肯仕或走而不肯見其意亦曰吾之身重於祿位云爾故君人者趣于人不聞趣人今天下之仕必由進士求進士者又不謹於禮聚之如召役校之如試技意可則薦不可則黜故進士之名至卑也進士之禮至薄也進士之仕苟易也上重其祿下輕其身故潔已髙世之士不忍從也深自託于賢良而發憤今大夫之議謂賢良無益而學者顧多奔競而可廢勿舉焉嗚呼曷為其然哉大夫固患其無益歟謂進士者乃有益哉固患其多奔競歟則胡不使公卿舉之而乃使其自進也夫自進者多則忘以利為耻使待舉而動則天下之人莫不以禮自守如是而患奔競者多未之有也抑又有甚便者一焉今公卿皆祿位自廣才德自髙耻有迎師之名羞有亷士之問其來長矣今一旦敕之使為國薦賢宜人人用心而天子必有垂拱無為之安吾又以閲公卿之才忠信者進私黨者退譬若著之權衡不可誣也使上無文仲竊位之過下無伯尊攘善之禍不亦大哉所謂甚便者也然則言賢良可廢非賢良之失凡吏待之不以禮使之不自重也故禮之不謹則賢者不出待之不厚則賢者不勸其理然也又曷為廢其舉哉天下潔已髙俗之士焉所而發憤憂國濟世之士焉所而布䇿懷義願忠之士焉所而赴訴貪進苟得之士焉所而矯厲且夫賢良美稱也方正善行也方為天下而自不舉賢良始是使今之天下不得與周漢比隆也古之治國家者有益于用則存之夏后之鼎湯之典寶周之琬琰魯之大弓晉之闕鞏衛之大吕陳之石弩和之弓垂之矢離之罄胤之舞衣此其非有通古今之變明王道之本逹下情之塞然而世掌之况在其求人乎故子貢欲去告朔之餼羊仲尼不悅臧文仲廢六關君子譏其不仁然則循名而忘其實失所以廢棄大而恤其小失所以置患不使有司舉賢良不患賢良無益也張忠定諡議太常禮院諡故禮部尚書張公曰忠定太子中允直集賢院同判吏部尚書曹劉敞覆議曰尚書布衣之時任俠自喜破産以奉賔客而借軀報仇往往過直及讀書為文折節受學則表厲明白務求道真至于䇿名試吏俶儻奮發思自見於世不令巳失時蓋有古賢之風而神宗聖考知人善任使每盡其用雖專斷于外而上不疑此其所以感激慷慨能成功名者也夫英偉卓犖之人固自負其材可以意氣忠信結而不可以祿位富利取也尚書再在蜀及他臨蒞皆朝廷所倚重或兵荒之餘而言聼計從德澤下流民到于今稱之蓋君之圖任一則士之報施重不其然乎自宋興以來且百年言治者甚衆其直已以事上盡心以撫下生有榮名死有遺愛者尚書殆無與並焉末年以疾害於朝謁不至大位士君子以為恨今皇上甄德念功使有司追賜之諡而曰亷方公正安大慮竊以謂無間然矣請從博士之論以充太史之録謹議趙僖質諡議春秋之議視逺物者見其形不見其容聽逺聲者聞其疾不聞其舒此褒貶之審也少傅公厯仕三朝嘗列四輔謀謨之益施為之效蓋多有矣然而入則直論出則詭詞是以人無聞焉雖推美讓德大臣之宜亦其天性恭慎然也今太常易名謂之僖質稽論揣稱竊以為允謹議巷議人或言于巷曰吾聞國家録有功之臣訪其子孫為將用之若趙韓王冦萊公張尚書者皆謂有功矣何以反不録耶有應之曰然吾固疑之必有司失之矣謂此三公子孫已著故弗録耶則大臣有子孫在朝廷者衆甚而亦録謂此三公之烈薄故弗録耶是大不然方祖宗在側陋時韓王故人也祖宗龍飛韓王之功為多祖宗有天位地不過數州擅生殺借號命者相屬也韓王宣其股肱之力強者誅夷弱者臣從日闢國百里卒使中國為一統修法令章程傳世之具至今天下賴之以比蕭曹不可謂功薄也真宗即位日淺契丹內侵兵至澶淵上親即戎未敢渡河當是之時大臣葸葸憂懼不知所為或勸上避之秣陵或勸上避蜀漢然萊公扣馬抗辭發憤慷慨以謂棄中國而去則河北山東非朝廷所有廢興之功危于纍卵矣天子感悟遂渡河北契丹由是遁逃則萊公之謀也巴蜀再叛百姓凋弊盜賊滿野時尚書受命治之單車到府城無居民庫無金帛倉無見粟而羣孽在外尚書能安而輯之威而懷之盜賊殄滅善民得職至今蜀之人稱之若神明不可謂無功也嗚呼方韓王之時天下地狹人寡財力不足而敵國多韓王能以弱為強以小為大今天下地廣人衆財力有餘而敵國小然元昊叛不能誅也日蹙國百里方萊公之時賊兵深侵河北再三欲亡大臣懷異謀請棄中國東師可謂危急矣然萊公獨以為無能為天子用其一言而百萬之衆北首奔駭今無故兵不壓境畏其虛言嵗至巨萬以貶威損重方尚書之時乘亂敗剽劫之後公私掃地然尚書外禦冦內治民克成厥功今居平地因承平之資盜賊發輒更數十郡殺官吏辱士大夫惡不忍言長吏以下或開門送迎具牛酒過兵可哀也使此三公且在天子得而用之天下不足憂矣今此三公子孫微甚可因此大振顯以示在位者也曷為反不録吾固曰是有司之失嗚呼由元昊之叛將帥無功失律者相繼雖或貶退然皆不旋踵用之矣以此易彼而何有焉某聞其言因竊著于簡為巷議公是集卷四十一

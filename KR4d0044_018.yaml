body:
  text: 公是集巻十八宋劉敞撰七言古詩送劉涇州劉侯之弓三百斤壯氣可以摧浮雲不忍區區事狐兔自請治郡當邉塵天子外家異恩禮秋廟舊鼎多功勲少雖侍中貴省士匈奴宜避飛將軍憶昔汝南始相得十年見君我髪白可憐日月如過翼我誠儒生猶恨惜腰間寳刀手中䇿馳騖萬里須努力種桐東園方樹盈百株四桐晩種皆丈餘不縁桃李鬪顔色不為琴瑟養肌膚霜秋要成萬葉子他日與致丹山雛野人此意真不誣鳳鳥不至吾已夫懷歸操二章蟋蟀在堂嵗月除今我不樂鬱以紆豈不懐歸畏簡書蟋蟀在堂嵗月逝今我不樂濡以滯豈不懐歸朋友畏新灘行憶昔秭歸之山崩震驚千里如雷霆江水逆流洞庭竭至今蓄怒猶騰凌洄淵沈沈色如墨髣髴半露峯巒形懸波一瀉三百仭魚鼈蛟龍俱不寧天宫高居漏天隔無故設險憂羣生時無伯禹真巳矣坐念蔬鑿何由能靈椿館風折椿樹野人獨愛靈椿館館前靈椿聳危幹風柔雨練三月餘奕奕中庭蔭華傘清陰及物不自惜赤日當天損炎旱危簷宻牖清有餘翠竹猗桐何足算南山白虎嘯狂飇孤根易動枝條散芳華寂寞未及衰萎遲遂比溝中斷君不見月中紫桂天上榆有名無實安自如天河均濶易生植甘露洒葉長扶疎結根得所應自貴庇蔭雖逺真徒虚靈椿乎莊子浪叟誠爾徒爾當自取八千嵗今顛蹶矣人誰扶觀林洪範禹貢山川圖若昔文命熈帝虞大龜浮洛出元謨翍山瀉澤魑魅走四海砥定由天扶周摧嬴仆亂疆理壁中但得司空書先生始病學者惑為畫盈尺山川圖職方輿地在眼下地勢天文高下殊始驚六合可舒巻吾道指掌何難乎先生當時持此藝欲以稽古開天意命乖時背竟何為于今傳者為張宜宜生五十頭已白連蹇不為州郡辟朝廷何時舉行河合笑平當未精賾平當以經明禹貢舉行河昨日風贈王舒昨日風今日雨門前泥坑昨夜土秋懐悽愴誰最多江南秀才洛下旅十年麻衣走南北飢寒不比倉中鼠悠悠暖日庇重雲舉頭看天不得語同永叔和介甫昭君曲漢家離宫三十六宫中美女皆勝玉昭君更是第一人自知等輩非其倫耻捐黄金買圖畫不道丹青能亂真别君上馬空反顧朔風吹沙闇長路此時一見還動人可憐怏怏使之去早知傾國難再得不信傍人端自誤黄河入海能郤來昭君一去不復回青冡消摧人迹絶惟有琵琶聲正哀子直攜雜文見過王孫少年敏於筆壯如驊騮勇鸇鶻揺毫裂簡殊多端因事陳詞不専一春風吹空花滿眼秋霜縮物寒吹骨元氣回復無常形四時變化豈定律斯文法天亦自然古來逹者猶識偏今君始冠便如此後日更老當誰先憶昔孟軻有遺語取之左右逢其源乃知述作繋根本根本苟盛枝條繁君能致身取不朽得世知吾得賢友戲題歐陽公㕔前白鶴歐云此鶴畏寒常于屋中養之明公雙鶴未易知志在赤霄萬里外低頭啄泥不自聊拊翼向人幾可愛北風崩雲三尺雪側睨天池頗愁絶不忍鳬鴈争稲梁誤譏燕雀附炎熱答公厚意終一飛萬人仰首公看之大風嘈嘈大風起朔方白日不没天蒼蒼洞庭彭蠡半飛灑厚地圓天俱抑揚鵾鵬變化不可測風雲感㑹生羽異方春殺氣何時極生物悲愁少顔色同永叔哭聖俞子真之後千餘年人物寥落無幾傳聖俞晚出江海壖眉目自覺真神仙氣如陽秋和以妍文若河漢清且淵大鈞匠物豈强鐫飛黄絶塵寧俟鞭名為實賓道所捐才與時􅘅行苦邅起草建禮衰可憐掌教國子寒無氈誰不富貴君重遷誰不耄期君疾蹎長松摧壑芝焚烟誰其尸之當問天遺草大小三千篇白玉落落珠聨聨此自可敵當世權物莫兩大猶信然我家江南再世前與君通家情有連見君縂角今華顛于我莫逆好巳偏今也已矣嗟絶絃涙如翻波正淪漣翰林文章日月懸鑿石銘徳埋九泉上書立後禄紹先分宅恤窮祭有田嗚呼豈非天下賢義不背死而苟焉念子可以無悁悁魯風二首時聞孔中丞卒太山之雲朝觸石清陰油油麗空碧塵生東田禾麥槁季女呼嗟待膏澤北風吹空不成雨中道無復見形迹嗚呼天高誰問天人今相説䜛風伯新甫之栢徂徠松枯根高齊千仭峯天令爾生禀剛直夀比王喬誰與同驚霆何時發巖底堅節青姿化為燬君不見蟠木但以左右為先容能令人意尚竒詭續楊十七輓蘓子美詩吾聞蘓侯不及識内嘉孤雄世難得文如翻波氣龍虎風雲晦明在頃刻中間流落自天意今雖暫困當永適忽傳長逝既巳矣知與不知同歎息曩者避地金馬門獻書著論驚上國材豪志劇少所有倐忽變化不可測結交必皆天下士朝廷見人退自斥指揮功名力可取城郭披露曽不惜廟堂諸公交口薦天子亦稱萬人敵中道齟齬空歸來扁州東浮問損益登臨姑蘓睨滄海憤歎始覺區中窄徉狂爛醉遺日月欲乘長風掛危席安期洪厓殊髣髴蓬萊方壺定可陟浩歌秀句凌斗牛至今紫氣猶融奕若人不應逐物化吳中好事先巳惑邇來安知非形解世上蜉蝣限畛域遺編逸藁尚多有但恐靈物隨變匿君當收拾藏永久毋以交情死生易大雨行日中驟雨海上來懸流滂沱正奔猛㘭堂舊乾不濡足回頭穿鑿成方井炎凉更代如恍惚明晦回環不俄頃地形天事無久長何况人情足馳騁君不見張耳陳餘刎頸交中道相捐豈終永錦繡溪行金霞巻風漾清碧翠藻玉沙相厯厯旌旗不動蛟龍眠空濛錦繡張春色五紋婉轉沈吟香時時飛出雙鴛鴦笑窺貝闕倚瑶瑟金華射天高下光海近蓬萊郤清淺星客浮槎莫輕返齋房幾日饜華芝瑶席香殘舞燕歸錦繡溪邉春幾許欲尋清淺醉芳菲送鄰幾之官兼遊天台四明見于詩中蓬萊謫仙頭半白揺揺去為江南客長風醉送浮海航宿雨自蠟登山屐山海使人行易迷君雖吏隠歸何時若攀琪樹亦相憶三鳥飛來寄消息襃信新蔡兩令言飛蝗所過有大鳥如鸛數千為羣啄食皆盡幕府從事往按視如言因作短歌記其實廣州竒禽鴻鵠羣勁羽長翼飛蔽雲嘯儔命侣自其職飲水棲林餘不聞今年飛蝗起東國所過田疇畏蠶食神假之手天誘𠂻此鳥乃能去螟賊數十百千如合圍捜原剔藪無孑遺厯尋古記未曽有細察物理尤應稀憶昔虞舜徳動天象為耕地鳥耘田聖時多瑞亦宜爾請學春秋書有年月夜聞唱歌滿城明月中宵白淮南唱歌如淮北春風忽起高入雲餘聲卻下盤阡陌南音俚曲自相知時復一笑情熙熙誰道幽蘭白雪好只見獨謡應獨悲寄楊彦文楊窮居呉中子與楊友貧無以贍作此見意高冠長劍非一賢子獨困窮情可憐差池早為後曺掾坎砢復就東山眠昔者結交期白首邇來傾葢凡幾年窮轍決江竟寥濶緼袍共敝無由縁人生如處不如意自古富貴皆由天天門九重不可問咄嗟拊髀心拳拳寄范十九君毋走馬君竟走走馬蹶塊傷君手蹭蹬翻成折臂翁世間肯要三公否西郊敵騎非常壯年年犯邉殺邉將勁弓長劍如君徒始堪追逐青海上功名棄置時未可意氣激昻人所望側身萬里風雪寒無由贈子黄金丹劉涇州以所得李士衡觀察家寳硯相示與聖俞玉汝同觀戯作此歌李侯寳硯劉侯得上有刺史李元刻云是天寳八年冬端州東溪靈卵石我語二客此不然天寳稱載不稱年刺史為守州為郡此獨云爾奚所傳兩君盧胡為絶倒嗟爾于人幾為寳萬事售偽必眩真此固區區無足道和府公觀劉團練寳刀詩此刀新羅所貢上以劉正先為珧珌鐐琫制作絶巧也吾宗寳刀清如水東夷昔時獻天子孤光晝射滄海寒殺聲夜吼蛟龍起上為鐐琫下珧珌粲如珠璣耀朝日制度還存三代風精神未是塵中物祕藏武庫人莫窺外家將軍獨得之四方昇平竟未試流落功名翻可悲時無薛燭誰賞異廟堂宗工詩絶世丈夫要取萬里侯肯令神兵負詩意與聖俞君章樞言持國飲因以太公大刀王莽錯刀示之大刀長五寸半闊一寸正為刀形鑄作絶精巧其靣有古文三字上一字可曉曰齊下二字不可曉其背為圜法錯刀長二寸厚四分金錯篆文兩字上曰一下曰刀又其下曰平五千沂州民鑿地破古塚獲之各數十百枚稍為好事者購取王公和守沂州求得數枚以其一遺予君不見九府圜法傾東鄰齊公大刀又日新君不見黄牛白腹蕩滄海亡新錯刀忽遽改一盈一虚更貿遷勢如流波不復還邇來上下各千嵗自太公至新室千嵗自新室至今亦千嵗何異俛仰須㬰間王伯之事百存一况此錢刀握中物愚智共盡令人悲興廢相尋空史筆前有一樽酒浩歌為君夀君能識此當日醉身世悠悠復何有往年築青澗城各有得佩刀者莫知其何世物余按故史則赫連勃勃所鑄也所謂大夏龍雀者是矣客因以遺予為作七言詩赫連寳刀利且堅霜鱗錯落龍雀環當時鑄作妙一世赫赫似與天相連雷公祝融借光彩蓬飛中原鯨振海神物羞為不義屈一去人間向千載蛟蟠虎化自有時氣如投蜺世莫知力能提攜倚天外一埽雲霧君看之寒林石屏風屏風畫山皆任假寒林石屏自然者蒼紋紺脈亂交加短樹高枝自瀟灑觀者寧分畫與非但怪竒妙非人為又疑古苔著石瘦何得本末無纎遺桑田變海松柏死寒暑不及榮枯期佳哉大鈞育羣類埏鎔精巧無巨細天真通貎皆生成俗師筆墨那形似居人幽獨最相宜樸厚逺謝雕鏤姿城中雲母屏更好慎勿浪示豪家兒秋園行空園過霜無餘綠上有梧楸下蘭菊疎陰雖存不自蔽殘香已斷誰更續憶昔繁華今九秋天時人事略相侔放懐未能驚物化爛醉聊可為君謀槐陰都城廣陌如綺分緑槐左右結浮雲火輪東升又西没倒影参差朝復曛輕車重馬誰家子側肩相逢宻如蟻共看擇蔭須㬰間可憐争道尋常裏下有溝水日夜流年華視此俱悠悠春陰楚山春陰誰復數朝朝出雲暮暮雨高唐恍惚信有神晦明代謝今猶古蜀江渺渺水東流苦霧淒雨翻似秋日月高懸不可遇眼看卑濕令人愁桃源武陵谿水清無塵武陵桃樹花長春會買漁舟謝賔客來作武陵山下人秦人洞府晉人谿碧草紅桃處處迷流水至今堪悵望問津從古失端倪山川非復壼中見雞犬猶傳雲外啼頋視人間真敝屣為煩仙子託幽棲和永叔十二韻次韻愛公猶愛屋上烏何况公家手種菊憶昔重陽醉共賞已落紗帽歡不足誰令繁霜逼芳意坐使嚴風巻餘馥主人于此情不淺上客方來强令束馬聲玲瓏揺玉環屨綦參差破苔緑重尋荒徑憶五栁因咏東籬憇茅屋巳憐歸鳥有真意更覺晨風傷局促引杯大釂傾玉壺擊節應非響喬木物華瞬息暫入夢世事蚊虻一過目浮邱接袂當鳳舉俗士歌驪真狗曲衣冠頃來塵土變形貌今者毛髪秃公詩乃使我㤀老逸調何由能繼屬今城寄仲弟共城稲秧如黍禾共城木少種竹多熟聞邇來風土美貧無置錐知奈何百門蒼翠太行麓百泉清泠淇水澳長安宦遊跬步到隠居鷄黍終年足人生早念少游言燕領莫矜飛食肉即今囊空未果歸且為黎侯歌式微寄聲好在久良苦異時自檝來迎汝田家行春耕高原不辭苦晚嵗離離滿百畆豈知輸稲如輸金始信種田虚種黍持黍易金入市行粳稻踴貴黍價輕十鍾一石亦不憚三時力農空自驚去年嵗荒食丰菽今年嵗豐彌不足物理悠悠難豫謀誰謂豐荒略相覆荒田行大農棄田避征役小農挈家就兵籍良田茫茫少耕者秋來雨止生荆棘縣官募兵有著令募兵如率官有慶從今無復官勸農還逐魚鹽作亡命戯作青甆香毬歌藍田仙人採寒玉藍光照人瑩如燭蟾肪淬刀昆吾石信手鐫花何委曲濛濛夜氣清且嫮玉縷噴香如紫霧天明人起朝雲飛髣髴疑成此中去櫻桃花開留徐二飲晨暉照屋清露晞櫻桃花房開欲齊繁花先得造物巧不與衆卉爭高低参差蕚蕚相照耀恍惚滿眼令人迷鳥驚風過若無意雲起雪飛空滿蹊仰攀濃香俯玩影應接不暇昏鴉棲流光易失動壯士斗酒相勞和天倪浩歌直欲并日夜醉耳不能分鼓鼙人間出處未嘗定暫雖㑹合終當暌子今躍馬至萬里脱略塵土排雲霓豫知明年花復發悵望君子無由携少年且作後日意更使封植驚淮西萬巻生白頭書生南國賢讀書萬巻夜㤀眠陋巷簞瓢未曽飽苦心獨行竟誰憐繙經遍窮十二等陳力夐過三千年莫笑青袍學士老太平能頌連中絃公是集巻十八

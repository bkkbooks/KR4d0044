body:
  text: 公是集巻四十五宋劉敞撰書啟囘漢陽郭郎中啟右某啟廼者引嫌避親得請補外𤓰時再易續用靡升天秩不遺龍光猥及既塵右史之筆又撫東侯之封某官風義相先忠愛有素逺形慶問深諭謙亨祗佩攸深指陳焉迨尚阻晤言之適冀精沖養之方引矚為勞寤寐于是與知郡郎中啟右某竊伏下風悚聞髙義未嘗修一日之雅望先進之門故雖懷賢終失通問豈意敦尚謙徳勤渠誨言愧非所堪祗以為好伏惟某官藴志方潔得機邃深固籍甚乎中朝聊偃息于名部揆以令望宜躋近班稽之治功矧有善最兼冀衛生之術並觀進秩之榮企誦特深敷宣罔究與雜端郎中啟右某㐲審某官榮被僉俞入毗風憲伏惟慶慰竊以紀綱之地厯代難其人真清之材當時頼其用所以修厥典法樹之徽聲俾朝有肅穆之光士無苟且之患隐括所繫慎簡攸先世方得賢人用胥慶恭以某官抱嵗寒之堅操藴正始之休規徳業汪洋其無涯風采峻峙而可畏足以立懦夫之志鎮流俗之浮果升中臺實持樞要天驥首路固非邇圖元龜在庭方襲重寳冀精衛生之術以永名世之稱不任懇款之至與通判郎中啟右某伏承涓選休辰往臨善治委翼下國怪三年之不飛絶塵西郊信千里之方展忽䝉示問姑慰懷賢悵吏守之有常俯禮餞而伊阻商秋沆碭道路阻深勉精寝味之宜庸俟公侯之復傾瞻攸甚敷述罔殫上運使提刑賀冬啟右某伏以元統含三萬物将作中聲倡六衆陰其消恭惟某官味至道之醇乗和氣之運宣布上指将眀治經蹈此迎長之辰綏于積善之報某宿官有局修慶無縁瞻望旌麾不任歡欣之至謝館職啟右某啟今月某日䝉恩授前件官充職者虎闈引籍驟望清光璧府觀書遽參華列皆極盛朝之選豈伊寒士之宜承詔若驚荷䝉彌重竊以右文遘運躬聖撫辰優游太平闡繹洪業儲思天人之際垂精道徳之淵上稽漢儀下襲唐舊開闢儒館表章聖塗長育英材賓禮賢俊将使辨邦國之典參禮樂之司整齊百家是正六藝固當得純學碩聞之傑博物不覊之雄内副詳延外慰觀望今垂纓戴紱而羞管晏者繼踵搢笏修紳而希稷契者比肩淵源之所漸風流之所及雜㳫並出雍容相推自以繩契以來河洛而下厯選列辟之盛參稽信書之傳語才為難于斯莫盛若度長絜大詢事攷言必得其尤以充厥位使獲耀日月之炎垂虹蜺之光庻㡬増輝本朝洵美顧問豈宜使庸庸之介玷濟之昌實不中聲道所深忌如某者智非語上材僅及中少無聞達之求長有䝉愚之蔽浸尋壯齒汩没下流悼世守之或隳激懦衷而求晉嵗不我與㡬成從事之迷斐然成章猶及進取之望備能書于鄉老辱下第于太常自以天機不深學殖方落幸得陪士大夫之後願不過掾功曹之微豈意奏技中宸程衡乙覽許夀王之智以謂少雙擢平津之文乃居第一虚名浮實浩寵逾涯參叙廷中之平分貳方面之守孤生薄祜罔極遘凶魂離幹而僅存性遁天而将滅隙駒驟逺仕版復還手澤尚存篋書已廢親歡不洎風樹彌哀姑上里仁之廬秪索長安之米推恩給筆奏頌得覽内省骫骳之辭仰塵清閒之燕分甘投削理絶覬覦而譽生不虞惠出非望加秩青宫之屬庀職道家之山榮耀赫然聲徽籍甚夫澼洸賤技鬻萬户之封緯蕭薄資私千金之富物情攸畏天幸實多此葢伏遇某官股肱大猷陶冶庶俗推轂晚進持衡化源且聚精㑹神屬圖治世之具故拔十失五以廣得人之風底是空疎冒干東照斯誠大賢曠度盛徳至誠仰蹈嘉魚之規俯循菁莪之樂舉此錯枉其誰不欣豈伊懦夫獨享豐澤固當師平眀之理飾固陋之心帶鈎佩衡以自修守法誦數而聰事義不假器言無隐情庶以小磬策名之方次酬匠物之賜過此以往未知所裁永興到任謝隣路啟右某啟某過膺朝綍擢侍經帷仍委使符來臨雍部内惟鄙僕之質私計便安之宜就陰寡尤處逺無競省技能之至短顧榮幸之實多此葢某官推轂衆材提衡清議假陽秋之豐潤垂虹蜺之末光義均同升愛忘所短矧復土宇相錯柝聲交聞襲豈弟之風流聆中和之成頌亦足以祓飾固陋優游緒餘馳慕之深啟處寜捨伏冀上為眷倚精調寝興揚州到任謝上啟朝廷欲治未嘗輕長人之權郡國甚微亦皆有分土之寄然則宜得智力肅給器能周通上足以奉宣詔恩下可以表率方面豈伊淺薄輒誤簡求伏惟某官登翊聖期恢張王紀樂育人物因材而措之宜熈成天工授方而效以事将使懦質有資昌時昔汲黯之忠不難淮陽而眷眷于李息蕭侯之節非疎平原而汲汲于本朝此下原本缺謝知制誥啟右某啟䝉恩授前件職者望卑而寵厚能薄而選優内視缺如自量幸甚竊以三代之盛溢于詩書兩漢之隆布在史冊雖上徳獨茂時文日新亦有代言之臣謀謨于内秉筆之士發揮于朝是以墳典粲然若日星之華制度煥乎有金玉之麗兹體甚大惟賢之求而况皇圖寖昌妙慮臻極鼓天下者悉獨運于神化居廷中者舉絶望于清光将使少窺淵源進贊名命聲教所被八荒其同訓辭之傳萬世無斁則宜得當代之傑絶人之材練達古今發眀貫變矕秀龍虎垂光虹蜺庶㡬相如視草之工子産潤色之美若時述職可以無慙如某者稟生顓䝉執藝迂淺徑從諸儒之末竊售一日之長譬猶射非前期難以稱善中鑄者躍冶或以為不祥然且玷甲乙之科借交游之寵通籍省户飛纓蓬山出入輿衛之間編摩簡牘之記雖復自强已非其宜豈可參法從之嚴直右垣之祕此葢某官樂興善類出于至誠欲斵雕輪囷以成大輅之用驅策偃蹇而效秋駕之奇故俾懦姿遂肩榮選夫力不能進則雖任鄙有絶臏之憂精非所堪則雖顔生有皓髪之變然而僶俛奏技徘徊就官葢上答天施之隆次酬已知之厚過此以往未知所裁與揚州知府啟右某困于期㑹之文藐在僻陋之國顛瞑乎從政憒眊而無奇故雖當世之賢平生所慕猶疎竿牘之問徒仰雲漢之髙豈優游邇隣敦尚風義欲收一日之雅固枉八行之音伸紙慨然終夕如接矧以某官秉彛迪哲成徳鎮浮績醇醇以為文濯暠暠以為白漢武之稱嚴助海内少雙揚雄之叙子淵天下鮮儷固将大用必願自珍傾跂之深敷陳非究與新知府啟右某伏審前旌已臨近縣萬夫聳跂方有來慕之謡永道倭遲喜聞坦履之吉即期趨見増劇歡心與知府先状啟右某伏審前驅俯臨近縣某以攝符節之重守筦籥之嚴不得趨詣路傍瞻望馬首無任欣歡悚仄之極與陜府知府待制啟右某伏審受剖圭之封典分陜之命函谷天險包二周以為雄甘棠頌聲厯千嵗而復見仰惟盛徳實髙當時恭以某官素履鎮浮清規格物挺中和之正氣騰膚敏之徽聲顔氏知㡬固超殆庶之品王祥正始不在能言之流入侍清閒出屏方面雖千里之地非所以極其賢抑萬夫之雄必有以觀其政昔堯用四岳命為三公周之諸侯入掌六事葢有故實炳然風聲矧兹濟世之才必踵弼予之典望加保攝以副倚毗與參政侍郎啟右某竊覩邸報伏審某官光被制書毗參邦政伏惟慶慰恭以某官挺中和之正氣藴康濟之逺猷世襲徽名僉若令望曩者席斗樞之宥密籌帝命之深嚴不如子房天子每稱其英傑乃命申伯朝廷屢委以藩垣然而疇咨允歸衆望乆觖亟下贊元之命果先當世之賢鄭國緇衣遂彰于前烈楊公清徳彌著于後來詩書所稱簡牘所載實増輝于有國豈多讓于昔人升平之期跂足而俟某早繄鈞鑄親遘逢昌雖私頌于得臣終莫諧于趨賀瞻望符照卑情不任欣踴之極與樞密侍郎啟右某伏審循覽異方還奏北闕推股肱之隆眷撫邊徼之羣黎翕如陽春渙若時雨奮壯士之鋭氣挫狂冦之先心威暢不毛徳厚無極固神明之所勞惟啟處而益寜恭以某官文茂經天器深鎮國勤皇王之本務輸社稷之元忠動合人心言垂世範以淵衷之簡佑與蒼生之具瞻宜正保衡允作霖雨矧方叔自鎬還履上卿晉公視師旋拜真相推故事而眀白況時望之僉同敢冀上為倚毗益綏祉福與知府龍圖侍郎啟右某近者某官析圭分國秉節撫封弭駕近藩便時珍館哀嘗僚之憂困矯流俗之沈浮屢枉顧臨深形憫惻魂去幹而已乆神還觀而暫新及聞涓選休辰延見諸吏念當奉牋以修慶因使以問安禮節寖荒情意莫屬豈謂曲迂英念特貶誨音身先匹夫固非小人之望義動君子益見大雅之風捧玩以還感激并集竊惟裂壤千里雖䝉潤于京師觀政萬夫實稽用于廊廟倚毗有素圖任叵量伏冀俯踐時和仰綏天祐上副樞密侍郎啟右某伏念恪居官次逖逺符階雖涵詠洪鈞之間而寂寞滄海之上伏惟贊襄宥密翕受禎祥恭以某官藴聖相之姿有人傑之量文章盡于經緯功業著于謀猷陟降廟堂鎮安社稷運籌于樞機之内覃化于宇宙之中上所同心民實受賜尚虚玉堂之拜未専金鉉之司卿士積具瞻之誠衆庶鬱迓衡之望固當伊匪爰正弼諧敢冀上為宗祧益綏福履囘王屯田啟右某啟猥從大夫之後乆聞長者之風不以言輕輒陳公舉遽煩謝記過諭謙辭尚闊晤言宜精綏履自餘感戢曷既裁名與知府龍圖侍郎啟右某伏審陟冬卿之貳撫天黨之封簡照便蕃休譽充洽竊以某官惇大深博直清昭融自結淵中之知厯居方面之任敏以布政静以鎮浮序閥閲之髙稽聞望之重乆宜處常伯之列贊大鈞之和果膺寵章亟更劇鎮然而専地千里未能以攄妙藴之精樹風一方不足以觀逺馭之略佇升鼎席甫慰民謡敢覬上為倚毗倍寜寝膳與知縣著作啟右某伏審光被詔函寵升中祕相君薦士風烈聳聞公朝進賢聲實自稱方劇欣歡之懇忽迂巽與之文仰服周勤曷勝銘鏤伏惟某官神鋒秀達智局閎深政術自将民譽已試宜升尤異之最以結欽眀之知辟書始聞嘉慶爰下諒逺到之叵測抑漸褒之有開更希保和庸副馳詠與知縣殿丞啟右某闊對風徽驟遷時律幸隣土宇稔熟政聲雖欣䝉潤之多尚失置郵之問豈期厚睠特貶華緘銘荷良深誦玩無斁伏惟某官濟相門之美擢英彀之先方當奮飛以極妙藴然猶觀萬夫之政寄百里之封事有漸階勢必逺到勉慎攝生之術少寛引領之誠與知郡寺丞啟右某竊承宣布盛徳億寜遐藩親奉計書入踐朝著眷兹與游之舊尚闕寄聲之文忽遺玉音如款犀表愧悚既集抃笑以并矧以過人之姿豈縻待次之賞側俟休命永觀逺圖勉毓道真庸浣心曲與通理殿丞啟右某向審光被詔除來貳藩政雖未晤子英彩已前聳于休風矧復更踐之契不輕賀問之禮宜舉顧縈吏役乆墮郵音忽枉相先之辭益増無斁之服伏惟某官器幹敏濟聲猷䆳深以智自将所到皆治猶屈千里之駕以贊六條之煩某非才居前承命多幸尚賒披對側冀葆綏縷縷之誠敷述豈究與紫微舍人啟右某伏審寵膺帝綍榮陟星垣帝王之文所以鼓四方之動典謨之體有以復三代之風實曰才難必符衆允恭惟某官學猶天府徳為國基浩浩江漢之流峩峩嵩華之表曩者飛龍御厯仄席求賢首應茂亷之書髙入英雄之彀廷臣自以不及天子喜其同時猶復厯試蓬灜徊翔江海衆人觖望于留滯後進面風而咨嗟果還載筆之游復正代言之選名實相稱輝光日新且上觀紫微之躔密臨三台之次彯纓服彩繼踵秉鈞矧令望之絶倫豈登延之曠日辱知甚乆推數以懽仰冀上為宗祧載精寝餗與致政宫傅啟右某伏䝉某官猥顧宂僚特頒珍教陳公尺牘傳以榮家魯史一言寵于華衮仰軒墉而尚慕銘肺腑而弗忘伏惟某官具體上仁秉彛懿哲逢治平之休運奮保義之宏規周旦碩膚宜膺金舄之命留侯少傅遽請赤松之游望建帝廷徳為國老猶復徘徊舉吏密勿誨言誠前世之未聞實懦夫之過望屬拘印韍阻詣符階仰冀善固寝興永綏祉福與宗正舍人啟右某近託蘧廬逺馳竿牘仰料雍容之暇俯昭悃款之誠眇是固陰忽将朔易惟陟降于帝右増沭浴于天和矧復令望髙眀珍光純粹足以躋民生于仁夀謀國體于太平僉疇之期日月以繼仰希順蹈時序葆集休祥與知府密學啟右某向嘗䞇書遽辱賜教荷玉音之聲應知賢徳之謙光置以為榮服之無斁兼審鎮臨全蜀綏静羣黎犬無夜吠之驚神有來舍之福恭惟某官氣含淳勁眀照㡬微對風聲以導人敦名教以振俗曠然致君之量卓爾正始之規猶且緩歩乎邇僚厯試乎方面昔堯以四岳參領三公周之諸侯入掌六事揆盛徳之髙世加休績之殿邦必将疇咨輿人僉舉故典収冀上為宗稷精調寝興與審刑舍人啟右某沈于僻陋之鄉迷于期㑹之事雖虹蜺之絶跂亦竿牘之曠修葢恃知音庶捐小智伏惟入隆顧問出總祥刑惟愷悌之降康在興居而䝉福伏以某官禀材淵厚秉徳融眀講求王佐之資優入聖師之閫名聲表海文義薄天兹可謂後進之元龜中朝之碩望故擢從七人之列峻陟紫微之垣潤色大猷贊襄密命方将下玉堂之冊升鼎鉉之司推其仁心均之天下敢冀益綏寢履用俟都俞與和州紫微舍人啟右某近審暫辭掖垣出建侯屏下淮波而擊沃臨楚郊而弭旌清風弗遐英概如揖顧守土之罔越曽趨前而莫遑伏惟跋渉脩塗鎮撫劇部道腴自勝神宇益寜恭以某官鍾秀山川挺質珪璧擢文學之髙第贊綸綍之微言問望益髙蕃宣是屬騁神驥于千里非盡其能窺天文之三階抑為之漸仰希慎重允副傾瞻與宗正紫微舍人啟右某託傳車之倥偬望紫掖之深嚴奮不能飛惄其如渴伏惟邇凝旒之靖密味至道之醇腴履必考祥神兹來舍潤色王度已著坦眀之風彌綸國經即開太平之路伏冀上為廟祏精調寝興與徐州龍圖啟右某啟廼者剖符臨州假道詣部豈春秋之義篤于善隣何愷悌之風惠以多禮遽達麾㦸方困旅行引領已勞寄聲幾晚伏惟某官徳器渾厚智謀淵通上所自知效在已試方當謨明廟堂之地時亮柱石之功豈伊近藩能屈逺績某受署云始親仁有初馳仰清規増結丹藴與運使郎中啟一右某仰庇層雲之陰緬介外臺之府蔑瞻風表秪役襟悰伏惟輔六氣之和踐百禄之報竊以某官徳符人傑英器天成知流輠而無涯眀析毫而自照方隆朝寄暫總利權将亟陟于近班庸大攄于素藴敢冀順時良食為國自珍二右某伏以律中事統辰以析津漢修上宿之郊秦紀成冬之令恭惟某官将眀詔㫖敷繹政經愷悌之徳允隆吉祥之報斯集佇膺僉簡益踐豐恩某幸庇餘光尚賒良覿瞻望旌葢秪役懷悰三右某伏審某官被詔典州涓辰視事恭惟慶慰竊以某官髙度跨世長材出人屨駕膚使之車厯乎外臺之選風采特立聲猷逺聞復總司預之權益崇方牧之烈諒惟匪夕亟陟近班某幸守一官得因大庇再欣際託尤極歡愉冀精養氣之宜庸浣由衷之禱四右某比者幸迂使節臨撫郡封霽澄清之威以寛不逮恢宣布之澤以來至和庻懷欣然盛徳著矣遽賒眉宇増結心旍伏惟昌赫曦之藴隆味冲和之純粹優優投刃止止凝祥悵官局之不遷瞻軺駕之方逺敢希保毓少浣依棲五右某伏審秉撫封撫靡旌及境已嘗通咫尺之問道方寸之誠恭惟跋履山川綏寜弗禄偃徳風之先路􅋏符采之照人迎竚前麾不任欣附六右某縻職有常趨風無所跋非烟之流蔭増揺旆之遐心伏惟循覽屬城将眀盛業吉祥為之止止出處坦乎休休竊以某官智察未形器非近用基長材于逺到資厯試于劇司計絶差毫刃無留迹方課殊尤之等亟升嚴近之聨仰冀谷神益綏多福公是集巻四十五

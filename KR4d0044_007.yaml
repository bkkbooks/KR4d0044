body:
  text: 公是集卷七宋劉敞撰五言古詩停雲詩停停何山雲靄靄在我廬濃光賁草木潤氣下琴書望望若可親久之翳寒虛坐恐猋風來東西隨所如我道與世異里閭相見疏嗟雲亦何事低徊能慕豫諒以無心故形影暫相於華山隱者圖神仙不可學淺俗如醯雞逍遙二三叟乃獨秦遺黎避地思遠適名山得幽棲深巖紫芝秀歸路桃花迷稍逺人世隔遂忘陵谷移至今山中人往往猶見之吾聞秦皇帝甚慕真人為駕石窺蓬萊載車象雲霓沙丘往不返四海忽若遺安知全真子近在西山垂一千二百年修身未嘗衰古稱山澤臞非復萬乘期觀君此圖意有以和天倪送上元張孟侯著作避世金馬門歇直承明廬月贏一囊粟調笑騶侏儒忽憶東南行秋風熟鱸魚聞君已先我扁舟向江湖銅章垂腰問賜履雙飛鳧千室豈不憂弦歌自為娛古稱有人民無事専讀書自顧都城遊刺促轅間駒六朝若流川覽古半有無山中折瑶華千里懷離居小隱吟世道喪純粹徼名掠其美悲哉山林客過半朝市死夸誕一相習澆浮益紛起古風日飄泊末路空頽靡堯舜安得逢巢由亦已矣我歌竟誰和惆悵同心子招隱鱣鱘不容池鴻鵠常畏網全真貴逺到先覺每獨往綺皓遺泰憂季鷹樂吳壤知幾效來世前識妙難賞勿謂鳥獸羣高山適豫仰反招隱伊尹樂堯舜伯夷傲姬周顔生一簞瓢陋巷亦自休豈不困寂寞時俗非所謀脫身灑泥滓緬與前人遊嗟哉波上鳧徒為信沈浮鴻鵠假長風不能占渠溝晞羽扶桑阿刷翼滄海流世途既超邈矰繳何足愁所以狂接輿肆歌悟東丘觸時懷慷慨視世悲蜉蝣哲人有先覺達者無近憂綺皓吾所師緒言起長謳郡齋燕居寄海陵道粹儀真景休高郵不疑三太守學士尚容恥玩世畏景希就陰一麾諧微願千里非遐心平生志江海寤寐在山林及此吏如隱始知古猶今鷾鴯避落實蜎蠉安蹄涔但恐得已多尚非力可任諸公蓬萊秀夙昔交契深擊柝聲相聞照鄰光四臨清濁涇以渭離合商與參願言三秋思毋閟金玉音新作涼軒會張拱辰至張翁垂白鬚扶病過我廬向無俗客至適慰幽人居酌此瓢中泉振兹架上書雖無德與汝會有歌起豫欲識消長情願君講盈虛發桑乾河四牡懷靡及侵旦肅征騑凝霜被野草四顧人迹稀水流日邊去鴈向江南飛我行亦已久羸馬聲正悲覽物嵗華逝撫事壯心違豈伊越鄉感乃復淚沾衣寄呂侍郎呂先豫數日北行荒山逄故轍自上重岡立君車不可望君手何由執旅思隨日逺徂年背人急舞劔中夜興應知憂感集廣陵蔣生死十四年矣尸猶溫其妻與其女閉門守之未嘗與鄰里通水火或者疑其有道而杜君懿實之蓋嘗有自逺來者以書一封畀其家視之蔣生迹也故俗以為仙因作五言贈君懿仙翁棄妻子往為壺中客玉棺竟未掩人世已成昔白雲無回期三徑滅餘迹猶傳有青鳥往往寄消息新年流光無停期二十忽復五古昔如我人功烈難遽數上天終無私日月不少駐三皇與五帝回首焉得顧新年獨何為擾擾趁俗務壯羞兒女態浩歎覺已屢巍巍九重闕象魏懸法度木鐸非仲尼布衣欲何預滄溟百萬里乘桴意決去顧世聊徘徊非為取材誤子曰無所取材東風發幽滯花彩映草樹爛醉苟自娛終焉背時譽築室種樹誅茅作吾廬種樹滿百株偃仰可卒嵗優遊問誰如墨翟不暖席仲尼無安居良知聖賢貴逝與功名疏清泉可深鑿惡草須早除適意田野間誰能歎歸歟題所種金鳯花自淮北攜子種之云愛此名字佳攜之不憚逺豈惟江淮闊兼恐嵗月晚手植中庭地分破紫蘭畹緑葉紛映階紅芳爛盈眼輝輝丹穴禽矯矯翅翎展卑飛何在此寂寞難自顯按圖感形似覽物意繾綣三復接輿歌悲風動湘沔得隱直書并聞將之洛陽三月一得書始知去君逺開緘見無恙豁達百慮展秋風催時節搖落嵗向晚遲遲行旅外色瘁足更趼邉封鳴狐狸牙爪貴鷹犬儒者非所須棄置自未免上書報聞罷試吏何繾綣雖無小官羞頗貴有道卷洛陽雄王都主簿亦極選折腰得免否局促時態淺閲武堂涼風郤炎暑飛雨除氛埃旅行得興會珍館為我開主人平生舊上客自逺來何異東序賢共此中山杯留連恨落日披寫仍髙臺山川愴興廢歌舞寄歡哀徐方多賢牧天祿繼英才遊子悲故鄉為君更徘徊寄張十二時在城北讀書簡云幾至絶糧新秋意無聊多病時畏晚出門塵埃隔扶杖行步蹇雖聞一城居邈有千里逺風雨思雞鳴幽懷固繾綣食貧非余病學道與時反悲歌空相望不復能裹飯因甫移宰晉陵自我遊毗陵五年今于兹未嘗不閔雨未嘗不苦飢成湯周宣世豈復能過斯上無桑林禱下無雲漢詩赤子餓溝渠良田生蒺藜聼于閭里間愁毒不可為思得一賢人救其渴與飢上天似悔禍子乃今來尸愛民在恭儉自可為吏師但恐百里小膏澤難盡施子本湘鄉君湘人望子來下難兄弟别上顧墳墓違將母以諗君上書再三辭朝廷欣然許多士咸謂宜為政推此心可令孝者慈吾聞屠牛刀不貴于割雞思君苦道逺莞爾寄此詞同彥文送敦儒宰晉陵朝廷貴儒術子以文學顯郡國重民社子由政事選榮名信難兼衆望固不淺古人定何如壯志獨能勉由來跬步益必有千里逺去去聆絃歌吾當謝言偃九日霜薄氣早寒木落景已變佳晨事厭勝習俗推往彥憂來初無方興盡復自遣所遇無故物登臨殊非願寓言感豫常出異禦寇哀壺丘好大固纍已巢父笑許由東海有意怠飛飛何所求縱軀天地間細故紛悠悠願言不死鄉可與賢逹遊晚景結廬玩蓬藿反畏人足聞杖藜有時去入獸不亂羣踈雨洗徂暑夕陽淡微曛俯仰多物態逍遙遣塵紛興適將何述寄心孤飛雲野人致枸杞青蒿味薄時共笑野人猶相高春田有餘暇饋我杞與蒿酌酒謝其意採之亦誠勞城中多好事過半稱賢豪杯肴具五鼎珠玉輕一毫將之獻門下皆有千金褒何故背此計而反從吾曹淡泊徒自樂膏薌未能叨信知老農美頗欲耕東臯因間有餘力從爾觀芟薅春暮到小園春餘百芳歇喬木有輕隂客子成春服商絃應鳴琴獨行忤世俗長往期山林庭竹風正駛池波雨已深臨流窺躍魚倚杖聆遷禽順時寄俯仰適興契飛沈試謝及門客未慙招隱吟送雅禪師若神太湖三萬頃澄徹浮寒穹明月不可取孤帆安所窮俯弔滄浪人禪師若神與蘇子美遊子美自作滄浪亭緬懷鴟夷翁古今共灰滅得失如夢中詩興觸物逺禪心隨念空猶多碧雲句寄信東南風蒼筤源日出江氣暖步行村落間偶逄蒼筤息若在山中間緑篠既蒙密清波自回環初疑人迹絶久有笑語喧脫足涉澗水隔林叩柴關主人疏世事相見亦歡然稍覺耳目曠久之遂忘還歸來詫舟子適過武陵源樂郊陳漁臺下柏林中結茅作小亭命曰幽素本懿臣刑部之書也謝且戲之結茅更何好列柏自成林素履宜獨往幽人欣宿心炎輝翳羽蓋清吹和瑤琴稍與事物逺忽如丘壑深良無山水趣安得契知音種蔬二首時雨破膏壤荷鋤回城隂疾耕意不足覆隴力可任里巷多父兄往來迹相尋見我山野服欣然用盡簮勸我勿滅裂哀我識浮沈雖微生平故頗用愧其心採芝商於嶺食薇首陽岑念我非其人豈敢慕山林聊以資素飽身世實﨑嶔文人不我厭荷蓧時見臨種蔬南岡下地薄旱亦久抱甕出復入拮據病兩手輟耕起長歎四海萬億畝過亢今若兹我誰與糊口縣官祈雨澤四望已並走巫女歌且舞土龍矯其首上天何寥寥百請未一偶霖雨待爾輩古人亦可醜咄嗟雲漢詩萬古竟何有天地何不仁百姓為芻狗重陽勞生惜流隂徂嵗逼窮律燦燦黃菊花離離紫茱實芳香不可再採掇自有術零落勢足悲盛時亦未失登高散百慮驅馬恣所出或云避陽九可以納元吉嘉願誰間然且當醉終日浚井鑿井勿憚深汲繩欲令長鑿深源不竭汲逺氣自涼豈如潢汙水汩汩道路旁雖復不逺求飲之劇燖湯虛煩生四支淟涊不自強野語合為國願君著巖廊古寺唐殿弛棟梁空庭長荆棘坳堂客水腥壞碣苔蘚積經營東晉始逺近千嵗逼興廢紛可悲徘徊意不懌尚餘土木巧未露斤斧迹使鬼固已勞斯民忍終役悠悠競頽波擾擾非一國臺城更荒唐萬古共悽惻書候潮亭滄江浸長空天使限南北繁隂屬暮嵗波浪無時息烈風何轟豗深木騰霹靂逺吹湖中白來蔽江南碧巉巖千峯玉變化不可測恐是時向晚鬼神任胸臆燭龍銜長耀來集崑嶺側又疑吳王兵如荼壓上國勇氣吞中原晶光洞江北久望生悸栗嗟我問津客橫流豈難制路險未可得吾道固當然滔滔欲誰易徐安撫伏波喜功名南伐終不返死餘薏苡謗生恨鷦鳥晚干戈非一方智勇易謀顯富貴誰不然枯榮子何反冥冥炎州隔杳杳天道逺荆楚猶古風招魂動哀挽從人除憂謗不得志者罕石首縣叢石浮水中峻隄缺復連往往為深潭波流自回環秋山未搖落碧樹皆參天仰觀積水痕仍在高樹巔里人半巢居出入隨烏鳶令尹亦菜色市樓寂無煙皇天不純命百姓何震愆苦云耕織廢租稅尚未蠲赤子向漂蕩所存皆偶然雖知負官輸未忍更棄捐奈何唐堯世復見昏墊年何以救汝飢朝廷急憂邉召諸弟博飲今日寒頗甚淮南似京土江風既落木山雪亦帶雨幽居自無聊病卧亦寡侣壯心顧牢落出門孔多阻古人戲梟盧志氣本尚武勝來在快意百萬不足數恨無酒如澠杯盂空屢舉開顔強隱几豈必歎貧窶别和弟暫會復逺别惆悵終無極人生非神仙豈有頭不白維舟相邀宿淮水風浪黑輾轉不復眠四聼人盡息丈夫非懷安少壯宜努力況子行多歡自怪情不懌誰言冬宵永達旦才頃刻雞鳴日光出握手各南北仰謝雲中鴈羣飛接羽翼何以紓我懷作詩寄相憶舟中夜飲憶和弟聨句人生如浮雲聚散苦不定原向來詩酒歡雖唱誰與應貢蟋蟀鳴在户玉衡逼冬孟悠悠千里思寂寂中夜靜豈曰無他人不如我同姓原吁嗟繫名利有若置機穽窘然塵埃中恥無六翮徑訪戴舟已慙攀嵇駕難命貢臨觴置不飲引領起獨詠莽莽天地昏誰知我心怲原蘇安上之淮南十八舍弟之河北十九舍弟之漢中皆會豫賦三韻為送攜手常苦難傾蓋不易得今宵四面坐明日異鄉客秋風楚懷悲出處各努力鳳凰篇贈府公給事别鳯凰起北海少留南嶽巔梧桐有餘音烏鵲相回旋耳聞和聲樂目怪文采鮮雖知非儔匹慕用亦欣然祥飇卷層雲迅羽凌九天卑飛忽如縶絶迹不可攀徘徊故林下歎息高風前願及夔作韶率舞如舜年承以鳯凰篇為況謹用來韻和酬吳育和作附丹山鬱世表巖巖千仞巔自非常雛輩安得參周旋胡為此弱羽越簉祥儀鮮飛鳴過所據飇駭俄翻然退則安棲地翔風娛楚天始病孰儔侶乃與朱鸞攀英英日相照老翮徒愧前少别正傾聼覽輝當聖年深甫往固陵聞君異鄉客嵗暮江淮間山雪夜多興桂枝春可攀南風玩啙窳浮俗矜遊間安所彈長鋏何當問刀環天倫眉最白子舍衣仍斑勿學髠接輿佯狂因不還飲郇公園贈章湖州何漢州朝暉散浮隂天氣清且佳春城足行樂況此公侯家珍館深窈窕茂林揚芬葩幽禽囀新聲宿草含芳芽覽物曲池平置酒白日斜因歌雍門詩四座皆歎嗟平生布衣願不過東陵瓜致求多嬴餘竟是迷紛華一醉稱日富此風獨可嘉安能拘浮俗局若井底蛙客有章與何髙冠耀文緺方為二千石會促别且賒他日還相思當在天一涯歡極情難忘願君盡流霞雪後到薦福寺梅下行尋殘雪逺暖就梅隂坐悟彼寒氣消識此春景破留僧逮日暮聼鳥忘巾墮從此到芬芳應須數來過呈獻臣并序始四月豫來上清宮見石榴花方盛開已而復有青箱忘憂紅絲夜合蜀葵朱槿芙蕖蒲劒紫薇紅蓼金錢之屬相繼不絶而適及秋矣過此又將有雞冠拒霜黃菊為續豈神仙之居固自嘉哉因歌以寄獻臣兹心厭囂冗幸與上清鄰上清何崔嵬高靜違飆塵珍林散玲瓏寶氣浮氤氳緑華未及衰絳蘂忽復新間館賓列仙祕殿朝衆真濃香無停期豔彩驚幽人顧謝武陵子四時長見春寄吳江大博徐君章吏退簿書斂日落風景涼偶無事物纍真得逍遙鄉疏花媚空園修竹蔭廣坐濁酒不難醉磐石可徑卧何必凌江漢乃能濯埃塵何必潛山林乃能寄隱淪人多笑此言此言未易笑非君契心賞誰肯過蓬藋觀魚臺城下春池深潛魚時復躍高臺可以望暇日從爾樂散懷混飛沈適意宜丘壑始悟濠梁翁荒唐謝名爵府公射堂飲酒輒陪尊丈侍郎兼揖諸孫拜獻拙詩煌煌南極星粲粲北維斗稟齡瑞明時運柄變萬有降神非尋常希世曽一偶積善如公家于今見純佑安車告歸日三府升平久萬石均祿秩魯公拜前後茫茫周漢來此事復聞否黃金鑄大印緑絲綰長綬方為纍世滎況多後來秀戲禽試強弩勸客滿春酒賤子敢再拜願公更眉夀秋隂浮雲初無心已南復更北蕭蕭清風急忽忽白日匿時逝物稍變感集意鮮適玄蟬號庭樹蟋蟀吟四壁自古共此悲豈伊越鄉客久隂南方信卑濕風雨無時節春風仍晚寒陽和恐中絶蛟龍乘江湖雲霧欺日月驅除懷熏風悒悒生內熱蟋蟀七月鳴在野八月鳴在宇九月登我堂十月入床下滔滔嵗方晏促促聲亦苦悲秋不悲已終夜如獨語時俗有新聲誰能一聼汝送王十二還乾州窮通蓋有命富貴不能早君侯希世珍三十未為老棲遲升斗祿奔走周秦道及親固為榮捧檄豈辭小北風正凝霜千里徑無草人生貴感激豈以外物擾當為昂藏駒勿自使枯稿坐嘯亭納涼長嘯振林木半空鸞鶴聲清風蘋末來孤月海上生坐久物色改如有神仙迎王昭君嬋娟巫峽女秀色傾陽臺昔為一片雲飛入漢宫來明鏡徒自姸幽蘭誰為媒丹青固難恃逺嫁委塵埃十步一反顧百步一徘徊出門如萬里淚下成霰摧左右相娛樂絲竹聲正哀豈不強言笑鬱鬱不可開黃河入東海還從天上回嗟爾獨抱恨一往擲蒿萊重一首同聖俞鄰幾持國作用前韻昭君信絶世窈窕祕瑶臺嵗華坐將晚玉輦何當來一以畫為賞有如鴆為媒含悲下紫殿即路指黃埃光豔動左右君心再徘徊白水不可變孤芳從此摧盛時能幾何千載獨餘哀至今青冢傍積怨昏不開掖庭用色選丹青以利回寄語閨中子何憾處蒿萊憶松松隂何婆娑松蓋何偃蹇松香不堪折松色無可選旦暮青松間吟懷未嘗逺嚴霜百木死高秀初欲展泠泠海風飄輝輝甘露泫昔年豫居閩時甘露降去矣混塵滓懷哉邈林巘諒無刀斧憂千載行可踐輦轂念山海誰期共攀搴獨有風入聲琴中尚悠衍留侯張良韓孺子夙昔志未伸授書黃石公問禮倉海君契合見神助濟時效經綸指揮轉雷電顧盻定楚秦以伋三寸舌抗兹百萬軍一為帝王師晚就赤松賓富貴心不屑功名諒誰論出處何昭昭賢哉古之人録近文呈晏公麟趾感素文躍魚赴鳴琴殊類豈自識至和動其心濟世有先覺鑄人不鑄金刪詩在正始好樂非好音萬生依陶冶一氣諧飛沈賤子晚及門獨學謬知今趨隅誦所志踴躍不自任救渴而飲河栖枝以巢林量微志復小俯仰感高深讀晏子春秋并序世譏晏嬰之節逼下夫晏嬰大不治宮室細不治冠帶無衣帛之妾則信儉且陋矣至其脫左驂以濟越石父之困出倉粟以成北郭騷之孝又何其裕哉世之君子未嘗道其裕也而獨病其陋是以宮室則必修冠帶則必麗陳妾則必富所惡陋于已者從矣所能裕于賢者誰哉吾聞陋于已裕于賢之謂儉陋于賢裕于已之謂吝晏子固儉矣于聖人之道何貶焉平生實善交厚薄等新故解驂濟越石調祿謂車御猶稱禮逼下未免儉則固高風往既息頽迹後方騖陳妾輕綺紈賢士敝𥜗袴若人不重得遺論今始布吾亦太史徒執鞭所欣慕公是集卷七

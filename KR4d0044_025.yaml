body:
  text: 公是集巻二十五宋劉敞撰七言律詩寄楊子華閣老使君吾邱不樂直承明固請分符闗外行賜冊最榮批鳯尾離羣獨恨出龍城壮謀欲負腰間組愁思空揺塞外旌塵土滿衫頭半白一聞班馬不勝情風雨晩雲蒸雨瀉驚湍積水浮城五月寒卑濕向人如楚澤風塵囘首憶長安嵗華徂暑參差盡旅舘懷歸去就難自昔梁山有遺操試慿繁手一清彈重過華隂馬上口占寄李君錫王懿臣薛師政三漕三嵗重過二華間衰年彌覺厭塵喧自知碌碌初無補正是紛紛不憚煩江壁向來憂鄭客鼎湖今日望軒轅修門漸近翻鳴咽滿面風埃涕淚痕過中京後寄和貢兩弟歸鞍蹀躞㺯輕塵滿眼韶光破宿雲去國幾愁歌白紵上天真喜望緹羣華林雪盡鶯先囀廣陌風多草競熏我欲還家千日飲益湏釀酒張吾軍舎弟東還病中口占七言奉寄景仁彜唐公甫眼暗頭昬逾十旬所苦正如此涔涔終嵗髮華新幽如羑里迷天路韓退之拘幽操云朝不見日出暮尤憎日光醉似中山與鬼鄰體中憒憒如醉酒者閉閣郤憐廷掾力府事屬丞掾貴大指而已廢書彌信道家淳病眼尤不便閲書過八紙則憒悶矣修門已後君無恙試枉招魂慰滿身楚辭云願賜不肖之軀放逰志乎雲中頼皇天之厚徳還及君之無恙某自先朝三十九年出守雍都故云句容劉同年寄示游山詩及术煎江外三峯倚碧天古來相續㡬神仙自無飛骨何由到頼有新詩尚許傳餌术始知堪度世聴松真得自忘年㑹驅雞犬從君隠與擇華陽數畆田登城前嵗登城日㡬囘去年猶記隔辰來老侵筋力銖銖减慵壞心情寸寸灰幸有風光相挽引那無賓友共追陪北臺好在中秋月便是重陽菊蘂開喜春卿自陜歸休汝曾更月旦評㡬年漂泊倦塵㝠神峰好在巖巖石符采依然兩兩星天祿自嫌書尚白絳帷猶喜眼猶青召南風什知多少一一親弦更許聴聞鶯舎南舎北栁陰陰竟日啼鶯不自禁羇旅可憐還擇木間闗似欲向知音鴂鶗無事催芳草燕雀相喧守舊林幽獨閉門驚嵗晩固煩求友慰愁心寄貢甫時遷居城南水上城南風物似江湖卜築尤宜近水隅俗薄容垂真釣否庭閒得種此君無闗身調度惟存劒適意圖書略滿厨心逺地偏俱可喜免逢甲馬與塵塗中使傳宣二月一日史院賜御筵某亦預召作七言呈禹玉真孺景仁三内翰虞書紀典上稽唐魯史傳經近屬商刻玉春山瞻氣象積星東壁聚鈎芒朝思膏飫懽情洽天令中和盡刻長雖引客卿譏子墨翰林還許望清光答次道學士來詩末句及芍藥世路相逢難自期江城三嵗想瓊枝寧知邂逅驅千騎亦復東南寄一麾把酒聊同醉鄉樂看花欲後麥秋時舊都紅藥猶堪賞不負風流謝客詩送陜府祖學士氶明持槖倦徂年自陜分符得近闗人物風流二南後山河形勢兩周間莫嗟落魄書猶白共許優㳺鬢未斑數醉申湖好風月傳車行且趣君還酒席贈欽聖提刑學士棄捐不預朝廷議落莫真成老禿翁放眼能寛蜀郡禮髙賢信有古人風都門倐忽三年别樽酒淹留一笑同還有野歌隨拙舞肯敎庭炬徹明紅秋日和韻禁垣清切近雲霓楚客逢秋意亦悲拙學由來𤣥尚白敝裘何意素成緇解嘲郤笑朱丹轂迕俗兼懲百一詩短景正湏棊玩嵗薄寒寧厭酒盈巵涵虚閣晝卧池水無波清照心庭柯交讓綠成陰㳺魚自與江湖闊翔鳥不期山谷深身外悠悠日復夜世間擾擾古猶今寄愁天上從吾樂髙卧聊為招隠吟于司録東園辟疆園圃厭城闉聞道池臺事事新自置一樽消永日别留槃石待幽人雨添草色迷三徑風散花香入四鄰亦欲肩輿乘興去主人何必舊相親送劉郎中監靈仙觀盡室而往華髪星郎七十餘碧山遙訪羽人居白石不為天上藥淮南欲試枕中書長纓自濯滄浪水高葢仍瞻駟馬車福地神仙應易致㡬時南嶽候乘輿漢武帝南巡禮天柱為南嶽云奉和諸公御製後苑賞花釣魚四照䌓英拂檻開九重芝葢賞春來卿雲共和光華旦瑞霧偏凝沆瀣杯池藻躍魚波淡蕩林光傾日景徘徊淮陽閉閣頭今白夢逹鈞天惜未陪秋晩西樓微霜欲堕木葉脱積潦已収天宇清皎皎日華映林莽瀟瀟風色閉柴荆正憐邊馬秋防塞何處悲笳暮繞城囘首浮雲滿西北七哀還見古人情送劉中允渙年五十餘以頴上縣令致仕卜居廬山五栁先生厭俗紛拂衣歸去卧江濱松菊還同昔人好山川復似向時新瀑泉飛雪千巖晩仙杏蒸霞萬樹春亦欲扁舟乘興往滄浪借取濯埃塵答令狐司封求酒馮公郎隠髪蒼蒼撥棄塵煩得醉鄉富貴兩行安用聖滄浪獨醒詎非狂顧慚宿釀能千日逺愧深𠂻頌短章當就天公借北斗更傾東海益君觴持禮北庭囘示希元并寄之翰彦猷當世肅承朝命謁穹廬郤卧空牀涕滿裾不敢復論天下事更能重讀篋中書男兒戰死自無恨國勢倒懸誰為攄我本不來人強我百年空使愧相如聞鶯陰陰老樹連村路羃羃輕烟過雨天長愛禽聲能永日似于鶯友欲忘年朱纓紫椹看齊熟深巷荒城得屢遷朗詠謝公池上作勿驚春物變熏絃元日發古北口寄禹玉直孺昌言三閣老初入燕境桂酒椒盤共發春山川雖舊物華新仲尼魯史王正月泰帝河圖嵗甲寅今年嵗至甲寅與河圗天元同玉殿聳聞斟白獸火城想見接清塵應憐二使星安在北斗杓端析木津立春後逰杜城陳丞相郊園韋杜勝逰誰可尋相君舊隠對雲岑水渠婉轉蛟蛇活霜竹參差孔翠深故老能言卧龍地兒童不用滿籯金郡齋殊負青山郭空挹芳樽慰客心古詩朝離青山郭暮宿青山上青山不可上歩歩相悒悵謝眺亦云不對芳春酒還望青山郭至日登樓南極陽生天地新高樓氣色巳含春得無鴻鴈翻歸翼應有龍蛇動蟄鱗亦復書雲占楚歳不辭為夀引湘醇甘泉從祀雖能賦悵望鈎陳擁北辰是日上親郊久雨長至湏㬰二月來朔雲零雨未嘗開陰藏晝景長繡線寒奪陽和潛律灰宿翼困氷多後鴈暗香漂水惜殘梅撩晴召暖無他術安得凉風一夜囘俗云風囘則晴同鄰㡬伯鎮觀祕閣壁上蘇子美草書蘇子佯狂不自疑漢庭籍甚莫言非放歌金馬居常醉窮老滄洲不更歸蘇在吴中自為作詩曰我今窮無歸滄洲送餘生浮世功名均夢寐平生翰墨獨光輝壁間數字龍蛇動神物通神亦恐飛立春臘去春歸意可憐久為羇客海西偏溫風泛泛生卮酒和氣融融媚管絃剪綵直為兒女戲土牛向自國家傳事情爭愛新翻擲還道今年勝去年立春日紫宸拜賜歸持國見率同過江十不行蓬萊佳氣舊無時春物迎新特更宜燕識玉箱來自早漏隨宫線報還遲溝聲破凍纔通苑酒力含風易滿卮蓬鬢不堪雙綵勝懶随君向習家池賀隠直寂寞三年倦一飛知音不限向來希雖然主簿非高士猶喜分曹近太微執法在太微垣吏部銓中趨俗状京官班首望天威漢儒多有司空掾努力新書更發揮桓譚何休皆以司空椽著書送楊景修祕校歸武夷曾孫塵外仙手擕桂枝歸故山夸鄉始信一經是衣錦不湏三組還蓬萊觀書聊復爾枳棘棲鸞殊未然野人放蕩辱先進慚愧竹林諸阮間答校書郎孫侔少述金華勸講愧通經銅虎分憂強請行千騎亦知翁子貴一麾誰覺仲容輕西賓落莫空遺俗北斗闌干有舊城欲作過秦無與語故人高論憶盱衡次韻奉答屯田宋員外汗血龍文千里駒長楸未試跼庭隅一麾㡬老諸侯相五日初還建禮趨獨得鳯毛驚衆目相望花蕚照亨衢白頭漫感悲秋賦自笑妨賢此禁塗潘岳秋聲賦善乎宋生之言為轉運沈郎中題寳軸牙籖三萬餘中園華宇蔭清渠風流復見郊居賦榮觀歸乘使者車俯仰江山樂無有優㳺文籍昔誰如何當去此從君語盡得平生未見書題溪堂蘇俠遺懽小洞庭高堂殊恨曲池平山川滿目仍非昔魚鳥依人自不驚瑣細幽花相嫵媚囘環流水共澄清秋風初足江湖意不作鱸蓴萬里情和伯鎮初拜湖州君向江湖領一麾親歡自與宿心期腰間紫綬新光彩都内青錢厚寵私廐吏莫催乘傳去詔㤙方許戌瓜時碧瀾堂上青山下爛醉尋春亦未遲伯鎮歸舘待闕當以明年夏去京師和韓司諫移亳宫雙檜植于道山仙子分根白鹿檀定知髙峭出巖端濃雲借色曾無變初日移陰漸可觀風外共成蒼鶴舞夜深齊作翠幢看人今俟爾為梁棟慎勿輪囷取自安新秋七月荆人亦具裘朔風颯颯動昭丘巫峽出雲杳無定洞庭飛月絶堪愁長歌濯足滄浪水囘首開襟西北樓宇宙􅒱蒸暫瀟洒小山青桂與淹留和宿直晨出遂赴奉慈齋告寄持國子履玉殿鳴鞘闢寝闈銀臺歸騎蹀霜蹄樓光已映朝霞動樹色猶銜宿靄迷身貴承明翻厭直嵗窮樽酒幸招擕太常㡬日休齋禁亦欲從公醉似泥逰平山堂寄歐陽永叔内翰蕪城此地逺人寰盡借江南萬疉山水氣横浮飛鳥外嵐光平堕酒杯間主人寄賞來何暮逰子銷憂醉不還無限秋風桂枝老淮王先去可能攀再逰平山堂背城厯厯纔十里經嵗悠悠能一來可惜薄書捐白日強從賓客宴平臺暮雲自與千山合醉眼時令萬宇開老子誰憐興不淺黄花欲落更添杯病中口占七言奉送前成都尹吕寳臣龍圖還朝聞逺故城長樂坡三年從此送君過宦逰不道相逢少愁病何堪惨别多強敵猶知奉威信巴童莫忘習中和廟堂應趨緇衣拜少緩離亭白玉珂月夜獨酌涼月破雲涵碧霄暫憐庭宇斷塵囂露翻高樹光明滅風度踈篁影動揺驚鵲似投人處息暗蟲如恨歳華凋短歌薄酒清輝裏百感先秋不自聊奉和永叔雨中見寄泥塗后土未曾亁騎馬相過行路難卧聴鷄鳴知景晦起逢花謝惜春殘銀臺幸闋連宵直樽酒能謀盡日懽紅藥蒼苔雖寂寞多情肯作舊㳺看城樓晩望長夏淮天郤似秋居人未解白貂裘雲起岱山時漲雨風迎滄海欲横流日邉渇問長安使天際頻瞻顧客舟自是七哀宜寫望不闗非土故登樓答宋都官㳺驪山見寄華清宫殿映春暉未醉三晡莫遽歸人事廢興猶可記風光流轉不相違歌臨㶚岸朱絃脆走度章臺汗馬肥自是秦川貴公子城隅相望不能飛和孫少述題虎丘吳墟秦燼㓕遺蹤誰見千巖鎖梵宫化出樓臺雙樹外密移天地一壺中石形虎踞森相向劒氣龍盤冷射空羇宦無由蠟山屐因君詩句夢江束和孫侔鴈蕩山二首鼇翻溟漲折靈山漂落塵區莽眇間自有神仙䕶真境故令林木斷人寰碧城萬玉重重合琪樹三株寂寂間安得長風破高浪拂衣東去一躋攀天台賦後世多賢復在君家鴈蕩篇氣逸還令人聳動境幽初許俗流傳萬峯林立浮雲外一徑梯横絶海邉聞道歸艎從此逝秋風招隠特依然答羅同年憶楸花之作驅磨市易錢帛諸禁非假不得歸家勾稽嚴密不通賓因見楸花憶去春當日同僚嘗把酒于今邑子逺思人臨安草木皆䝉錦金谷池塘各鬭茵自笑癡兒了公事經年不識酒沾唇依韻謝某送行詩天涯畢昴隔烟塵風雪梁山憶侍親行記簡書聊接淅去懷印綬正逢春評依月旦情增戀行期在月末詩感蘭陔意重陳先向沙隄候歸騎郤瞻霖雨作伊晨閣下午寝晩歸高閣遥依日月光蒼苔重疉紫微芳蝉聲已覺迎秋急雲物還驚過午凉獨往山林非復昔夢為魚鳥不能忘芝泥封詔雞棲樹半落宫槐滿地黄觀沖卿所試詩賦賀府君斗城烟霧隔金鑾日破輕隂玉滴寒捷筆補天凌造化髙文驚世湧波瀾夢成白鳯飛鳴逺功就丹梯步武寛囘首蓬萊笑清淺春風前後發芝蘭嵗晩偶作不嫌臘過催人老直恐春歸惱客愁栁眼梅心俱次苐雲容雪意與淹留嵗窮楚俗依稀古氷解巴江洶湧流遣興長湏一樽酒呼兒徑典敝貂裘立春日過薦福寺一嵗還随一嵗來立春人日競相催細細谷風能破凍熙熙習俗似登臺初陽㺯色明髙桞殘雪留寒伴落梅淮北風光元自好壮心摧謝不勝哀宿齋中書外省答永叔京尹内翰朝囘馬上見寄并謝子華次韻朝罷章臺日幾竿遥聞走馬試雕鞍春風自發逰人意宿雪偏留下省寒坐乆獨知宫漏永詩成誰盡玉堂懽㑹湏一辦如泥醉從笑歸來筆向乾富谷老人臧自用云本京師兵士咸平中沒畨五十餘年矣白髪衰翁雙涕零曾随諸将戰咸平一來隴右迷歸路郤問中華似隔生思報漢㤙身已朽恥埋邉壤死無名今朝縱觀非他意得見官儀眼自明都運陳光祿自河北移陜西以病不得詣别作七言奉送西州判袂忽三年夢想城南尺五天謝病歸來真老矣傷春刻意益茫然受降塞外威名逺足食闗中寄注專北顧邯鄲復臨㶚更能一醉促哀弦漢光祿徐白為築塞外受降城也某向守雍數同杜城之㳺㳺禪智寺重岡斗上半浮雲行繞芳叢日已曛䝉頂川原眼中見揚州歌吹竹西聞梵王重壁臺先毁古佛雙林火亦焚㑹看旃檀重滿地莫悲糜鹿向成羣寄題黄州李史君韋杜山居主人朝隠望誰先卜築城南地復偏服食早知仁者夀退休前惜大夫賢封千户比蒼蒼竹畆一鍾金上上田從此去天纔尺五㡬時雞犬亦登仙大卿少時嘗遇隠者得藥服至今錬氣郤老亦有竒效和龎相公寄題白郎中鳯棲巖山居丹鳯何年此地棲蒼山流水入巖扉主人早逐長離去邑子先期駟馬歸脩竹萬竿終嵗碧蹲鴟千畆入秋肥已聞父老釃牛酒㑹看夸鄉畫錦衣次韻酬張真溫未曾相見已相知自許聞絃可識微毎信白頭于義得豈将青眼向君違坳堂仍滯三年蟄寥廓方看萬里飛誰謂夜光投道路莫因長鋏起思歸陪府公汎汝水作七言奉呈府公給事寒波略傍曲城流彩鷁遥兼翠葢浮努力濟川天下望暫時乘興鑑中㳺蓬萊清淺迷滄海河漢昭囘隔斗牛君看龍門盛賓客世間還自有仙舟公是集巻二十五

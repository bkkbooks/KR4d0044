body:
  text: 公是集巻十一宋劉敞撰五言古詩新作石林亭朝廷入忘返山林往不還念無髙世姿聊處可否間築基倣崔巍鞭石輕險艱羣玉相磊落萬峯正孱顔種樹亦蒼蒼激流復潺潺湡浯歘在眼崐閬若可攀自我嬰世網邇来鬚毛斑邱壑成弱喪簿書常自環及爾滅聞見曠如逺塵寰豈敢同避世庶㡬善閉闗子牟困懐魏謝傅悲徂山兹焉可遺老詎厭終嵗閒樊口回舟武昌郭暫往樊水上樊水何清冷樊山亦孤壮壽藤驗百嵗􅔬木過十丈絶俗殊崎嶇攀縁幸可傍林端見漁舍户牖相背向雞犬鳴雲中神仙豈殊状昔聞元次山於焉寄荒浪鄰里俱已非陵谷平得喪茅茨固㣲物蕪滅不可訪向乏數巻書終隨衆人葬清時易直道末俗擯髙尚陳迹成渺茫孤吟屢惆悵宿州道中逢聖俞入京翩翩河中船一西復一東相逢且不留相别何時逢黄鵠安稻粱有時顧池籠一為滄浪去不復思樊中哀君蒼髪白擾擾悲途窮努力千萬乗寄聲謝醉翁謝學士赴闕還京師謝之先徳嘗典記注公提史臣筆記注天子側日成唐虞風噩噩在典策家聲繼純粹論著多切直周南未成書流涕嘗感激忽從東溟飛上拱宸斗極清淮净無波歸馬閑且奕帝宫青冥間白日升曉色儒人相慶語文道宜乆職公歸演綸誥制度期能覿和甫自京師至過事與日多歡憂兩如夢安知盈樽酒此國今宵共寸心不如昔感遇每易動孤笑破羣愁强顔不為用天河轉屋角缺月照樑棟燼落屢繽紛良時亦倥偬􅌐駒晨在門十里起相送暫醉醒不遲舊愁来更重得鄰㡬書君乗使者車我為列郡守地理秦與越天文井兼斗夢寐且不通言笑安得同忽傳咫尺書逺愧西南風衰老容貌遷憂患志氣落聞君白紛如我亦不如昨捨書計離别忽忽三四年一日成九秋此語猶信然天地大逆旅外物不可必出處多舛馳相逢定何日尚禽晚且㳺沮溺長耦耕此意雖未合且當勤寄聲答李谷同年書歸客江南来迢迢數千里故人遺我書細字三四紙上言平生懐伐木義所倚下道相知心結綬方獨喜寧知淮陽翁棄外甘卧理不預朝廷議何由發吾子楊彦文過病起時節改遶池飛脊令賓交絶来往門户常晝扄朔風捭閶闔凍雨翻滄溟泥塗墊后土氣象昏圓靈局促乆増欷據梧目思瞑窅然顧環堵嗒若亡我形夫子亦何事羇旅復伶仃孔懐在接淅過我不遑寧嵗晏絶晤語誰當慰長醒晩過深甫忽忽衡門下㡬希田舍翁有時寄一笑目送南飛鴻今旦天正佳草樹揺春容忽驚枝上花飄落隨西風偶然幽興展思樂古人同塵埃比殊深杖屢亦可通誰謂車馬多澹如初不逢讀鄰㡬泰山十二詩宿心慕鄒魯寤寐泰山杪慷慨念遐觀滯留想輕矯人寰何鼎鼎羣動困擾擾安知有神靈獨立萬物表圓天似車葢滄海稱池沼丹梯無留迹絶壑通過鳥古今更廢興萬事論莽眇七十二家舊永興耳目窅羡君能自力窮覽謝煩湫超然昔賢趣處覺兹世少吐詩状竒䴡思與雲縹緲忽如按圖畫所向得了了悠哉仲尼意信彼天下小休復謹次韻和呈垂覽拙詩之作朝躋天門路暮宿白雲杪超然六合外如翼鸞鳯矯運眸極遐曠收念息奔擾盤盤上絶頂獨立顥氣表天壁涌神泉玉龜泳靈沼凌奥無螫蟲集灌盡百鳥勝境窮賞踐陳迹嗟緬眇接遯終焉託真仙事殊窅雲路相飄颻塵途忘湫湫躡屐㳺已屢操觚才患少思軋㡬沈伏神馳空縹緲謝客興不淺尚子計未了何時出塵籠重看衆山小送從兄東門楊栁深下有還鄉路之子千里行春風三月暮旅心常草草飄忽不可駐居者空徘徊行者亦反顧丈夫方貧賤四海無所遇不如轍中魚猶以沫相喣悠悠大江水日夕自東注何當激風雷慰爾饑渴慕山光寺送獻臣嘉集常苦難送歸豈辭逺檥舟故相逐携手行自挽古寺何崔巍深林象巖巘幽尋取乗興造適非素選寒泉冰深池衰草被長坂嵗窮景蕭條僧老意繾綣勝賞竟誰同相知幸非晩離懐自無極日暮仍忘返燕譽堂飲别朱著作嵗晚節物變㑹難羇旅悲踈燈照四座殘菊醉空巵歌闋風雨起舞餘冠佩攲天明念陳迹忽忽叢予思以石為玉梧臺有沈璞由来非一春時無司南駕自比連城珍寧如崑邱叟相與笑緇磷勿以名夸世而将暗投人夜分東牕見月逾望月彌晩宵分在東牕隨風漏踈隙散彩奪寒釭留翫坐忘寐啓書對空缸惜哉皆陳迹誰為足經邦酬某讀書與博簺亡羊信多岐何以消煩憂謝墅觀奕棋寓物多歡適吾道有張弛誰能長刺促屈首就鞅羈陳遵嗜盃酒柏松見誚嗤袁絲沈里閭劇孟相追隨君方總府事吏牘正紛披走見固所願清閒在他時酬林國華先輩昔吾臨汝南休騎思俊賢此邦號多士今世猶依然奉詔選計偕至者皆比肩子時避逃我常獨懐悁悁豈我非其人長鯨隘蹄泉将由求之失黄鵠去不還察亷未塞責負課終彌年解印歸卧家百憂正纒綿聞子来仕門華裾燦雲烟手携一巻書金碧紛蟬聨慰我平生懐意好何深堅始知向難進非以相棄捐鄉評讓父兄觀國氣無前翰飛果自致大笑諸老先毫末為豫章衆流成深淵物常積於乆念子亦勉㫋令名百世榮文學貴本元愛至相期深愧無長者言夜雨盛陽爍微陰五月氣藴隆天地為大爐萬物皆廢銅俯欲濯江漢仰思凌蒼穹縮身投蝸角救暍號天公天亦哀人謀𤣥雲送雷風須臾雨如瀉一埽萬里空有似脱炮烙又如逃祖龍大哉造化力因見王霸功登吕屯田清暑亭日永雖徂暑虚堂自清幽主人意未展改席兹城樓嘉樹逺近合清川縱横流好風萬里至浩蕩開客愁長嘯欲飛動勞生局逺逰眇然不自愜目極孤雲浮許州西湖羇旅懐江湖氛埃願臯壤及兹已俱適初意恨獨往樓觀湧參差軒欞豁髙爽清光見毛髪衆影兼俯仰昔者廊廟客於兹濯塵網疏源不憚逺勝事日以廣美矣流水意當為知音賞晩過西湖日暮無與適緩帶此逍遥湖光悦我心步上西城橋逺烟被林莽樓閣隱岧嶤歸鳥先後飛夕風正飄飄悵然念逺渚興盡復行謡睡起日午更稍休池上逍遥眠水木澹相映庭户清無喧時有山中禽来鳴髙樹巔㣲風拂徑過㑹意成翛然有生滯形役萬物安静便愧無淮陽績髙卧亦終年奉和府公新作盆山激水若泉見招十二韻誰謂山水秀忽登君子堂乃知仁智樂不與冠葢妨濃靄萬叠碧懸流百尺長列峯映落落遶溜含蒼蒼氣爽變衡霍聲幽激瀟湘意真景自逺趣逸累已忘鳴玉無時續翠屏終日張賞音得虛寂寓興成軒昂夙昔慕邱壑邇来倦簪裳欣符洗耳願遽有尋源狂縱目寄歴覽挟琴寫鏗鏘但疑主人厭應接殊未央逰五嶽觀寄鄰㡬聖俞五嶽神仙境可聞不可攀安知采真逰近在都城間樓觀横飛雲虎豹司重闗車馬自兹止始覺非人寰層波漲滄溟參差出三山金銀䴡宫闕日月相循環東来復㡬時花草紛斑斑長楊垂輕絲若委千髻鬟氛埃無由及魚鳥相與閒造適不自知忽如脱沈􅟂那得窺壺中逍遥去塵闤主人自瑶盃勸客流霞殷此中可遺老豈獨聊忘還嗟嗟二三子世路迷險艱流光競奔走俯仰移朱顔誰肯委俗紛相從解朝班濯君冠與纓春谷水潺潺谿上避暑滴瀝松下雨清㣲萍際風欣然此時賞我與斯人同倦鳥墮水上㳺魚翔鑑中不言閲羣動未覺幽興窮東館避暑虚館含微風髙梧散層陰逍遥敞户牖曠蕩披煩襟雲光壓孤城火氣連千岑四海俱探湯獨清亦何心願傾西湖水起就三日霖落落抱寸誠此志誰能任得隱直書庭柯結浮陰深竹聴鳴鵙晚凉愛軒宇黙念得佳客適有南逰鳥墮君一封帛眷予方幽獨慰我正相憶洛中輕肥地子復顦顇色富貴若可求吾從執鞭役隱直近詣闕獻書報聞炎暉若探湯周道行倭遲之子忍重跰斯人方病痱上書蒼龍闕移副鼎足司卓躒動羣聴謂言即張弛虞卿萬乗相子房帝王師古事可髣髴世塗實參差天閽虎豹深棄我忽若遺却走國西門素衣化為緇行行屢回首未忍從此辭賢者愛其君肯如悻悻為吾聞先逹語進退自有時版築不為辱飯牛豈嫌遲男兒建功名或與老大期努力梁甫吟古人不予欺将入京得淮南王工部書及遣壽州官船以来五言寄之生理厭漂蕩三年若棲苴春深感松柏流涕望京華誰言數舍近局滯成天涯鬢色新二毛悵然空復嗟明侯平生意雖逺不云遐叩君金玉音眷我需於沙旭日明清川扁舟問貧家雖非方外逰此亦海上槎盡日庇短篷不慙負舍蝸愧君濟川才引領隔雲霞何由一乗興世累紛如麻答君章譽兩兒見寄窺鏡見二毛自憐憂患餘豈惟壮心盡方與功名踈終嵗不捉筆歴時長束書顧常念絶學正復傷離居忽忽莫自聊悠悠空嵗除過壮而無聞我其衆人歟故人来江南丹轂映隼旟尚持平生意期我相得初殷勤作新詩爛漫聨瓊琚溢美及兒曹伻来問起予雖知非其實但愧情相於矧乃筆力雄駸駸逼曹徐一讀必三歎何由望儲胥故人昔流落襟抱乆不攄乃者始再遷通直承明廬蒼龍脱韝絏快馬從輕車神至氣自豪心廣體亦舒淵源未易測變化天池魚寧獨揚子雲其工似相如苟能哀顦顇有似慰空虗月寄三四幅窮愁直見祛答無逸秀才寄示新文金華神仙境山川天下無之子復清發自與常人殊問學當世賢不違智如愚歸来守桑梓寂寞安故廬此風足蠣俗有以光吾儒如何卧空谷自樂詩與書我辱廷中臣一麾寄江湖薦賢力不足相望空長吁對酒憶諸子此酒自足飲胡為坐無歡念我意中人四顧用長歎平生交逰少而復聚㑹難萬古膠漆姿各在天一端用兵輕文儒諸子俱小官物生繫所逢窮逹何足言但恨適有酒共醉乃無縁出塞曲三首桓桓良家子趫趫羽林兒恩讐乆未報感激氣拂霓無用丈二組不須一丸泥獨身斬敵首手攬封王圭丈夫不懼死所懼潛闒茸出身義許國桀石賈餘勇豈無親戚憐决去甘登隴人生在奮發将相寧有種茫茫郊塞逺木落原野空鼔鼙濕前雨笳吹悲後風山川行無極敵窟未可窮生當取榮名死當為鬼雄移葦蕭蕭江上葦夏老叢已深悠悠文王死常懼牛羊侵遷根横汙池慰我江湖心清風日夕過白鷺時見臨疎響拂琴瑟緑華曠衣襟處卑節不改習静情足欽炎暉已堪愛秋景坐可尋願及搆明堂甘心辭故林欲於舊州石橋作偶浯臺以備逰覽先為五言河決鉅野溢此時吾山平百川㑹兩澤千里圍孤城桑野就蕪漫石橋尚峥嶸往往有白鶴飛来羣悲鳴我欲覽風土因之省民耕誰能同我樂誰肯從我行楚人哀江南倚沼而畦瀛臨髙誦斯語正復傷人情當築十丈臺偶浯為之名上可容宴豆下堪列斾旌棹歌出中流簫鼓㑹前楹浮雲来東山落日隱北溟此樂或難忘請公為我評章華臺楚子志方盛築臺臨章華度髙累百尋計産逾萬家參差蔽日月煥爛生烟霞侍酒皆列侯佐歡盡名娃嬉逰未云樂荆棘紛已芽奈何竭民力用此為盗誇蔓草匿頽基長風巻飛沙廢興若糾纒故老猶咨嗟曲水臺杖履不能逺逍遥池上林㣲風起衆響炎日隔繁陰斐亹激流泉間闗語鳴禽放懐在離人寄賞欣㑹心既謝朝市喧亦忘山谷深雖知非吾室猶以開煩襟暖景偶作垂楊欲吐花芳草遍抽芽低風動簾幕細雨濕堤沙暖景蕩愁思一城千萬家冬雨偶作江上朝来雨城中起寒色凄凄濕塵土漠漠蔽空碧築場看已晚及物悵無益苞蓍怨下泉客子長太息豫章儒者豫章有儒者讀書三十年但識上古風不知時俗遷一聞西戎叛有意摧羣頑詣闕上封章臣知用兵權不在勞士卒不須役戈鋋要先正其本本正末自安臣觀朝廷中或有可廢員臣觀草澤中或有可用賢國家既失此奸吏隨矯䖍吏奸萬事隳外患隨因縁所以子玉存文公積愁顔所以汲黯亡淮南為無難天子覽表歎當朝常拳拳迴頭謂羣公可付史館編可使靡好爵以補風化源豈知貴臣忌投爾南海壖不得面指陳胸襟曷由宣卒走驅使行行行酌貪泉名與囚𨽻俱位乃胥校聨九重竟不知猶謂列王官奈何樂堯舜乃是取危顛誰云遇明主未免遭棄捐遂令天下士齚舌戒勿言寧有死壑中安有議君前浮雲蔽白日自古同所歎豈為此生悲我歌願臚傳賀尹學士辟經略府年来方苦兵邊氛蕩區夏西陲亭障盡人骨蔽荒野漢家飛将多程李相上下試問誰董之王朝大司馬分廷授斧鉞號令從此把主憂臣當辱開府納儒雅堂堂䝉山舊乃是謫仙者謀畫當代無胸襟一朝寫誠知鑠鉛鑛不合煩大冶要使借前籌非公諒誰假鷹饑肯擇肉驥逸始流赭由来抱軒昂可得不脱灑昨聞負芻粟中户困楚檟此事已大急哀哉動鰥寡兵家尚神速世務忌苟且願公更深謀郤敵如破瓦䲔鯢埽封境疲瘵沐純嘏豈令魯仲尼獨贊王孫賈鷾鴯巾余率意作之以便當暑其形制如燕也逺思意而子因作鷾鴯中慮世本遺物全生翻近人輕凉便肌髪瀟灑外埃塵山林有獨往此亦陶唐民望洞庭洞庭七百里浩蕩敵溟渤雲夢開其胸巴陵束喉舌東流匯羣川盛漲五六月飄颻浮乾坤倚葢低兀臲吾行寰海間未見此水濶峡流下衣帶島嶼盡毫末髙秋巻氛翳兩涯浴日月何得徑寸珠晦明互出沒蒼茫蛟龍宅溷雜魚鼈窟太古到於今沈潛孰分别風帆引北極波浪限百越國絶南顧憂獻琛各通逹山川非一險此實輔明哲俯笑三苖愚竟為獨夫滅逺逰世俗隘偶此耳目豁淅瀝臨清風滂沱濯炎熱蕭蕭霜林暮藹藹芳草歇壮觀激我懐當歌意復咽寂寥軒轅樂萬古逸響絶慘淡虞帝魂九疑莽嵽嵲况聞屈賈輩各賜楚漢玦至徳無復還後王寝衰缺滔滔更南征鬱鬱抱㣼怛太湖雖云深未救懐古渴公是集巻十一

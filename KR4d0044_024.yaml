body:
  text: 公是集巻二十四宋劉敞撰七言律詩招友上清宫脩竹髙松無俗塵全然不似近城闉黄冠習靜多藏客野鳥忘機郤傍人高閣切雲銜落日廣庭霏雨濕清珉北牕固有逍遥地來讀離騷戴角巾聞范饒州移疾汲黯亷平漢主知淮陽移病苦情羸偃藩政事應無及伏閣精神定未衰天欲期人身必乏帝疑飛将數多竒何當半夜開宣室獨使雍容對受釐編杜子美外集少陵詩筆㨗懸河亂後流傳簡策譌樂自戴公全廢壞書從魯壁幸增多斯文未䘮㣲而顯吾道猶存嘯也歌病肺悲愁情自失苦吟時復望江沱子美詩云病肺卧江沱予亦有此疾鼓角樓宴集周城百雉擁中軍阿閣三間麗白雲燕雀總知依盛徳山河相與助雄文此樓府公作自為之記輕裘緩帶居多暇旨酒嘉肴客易醺還識魏牟懷北醺正逢長日扇南熏夏日上府公紅芳過盡綠陰多索寞無如長日何午影遲留成藴暑熏風飄蕩作清和夢餘欲騐松生腹棊罷眞知斧爛柯還想髙吟酬美景訟庭岑寂長青莎府公有詩云髙吟酬永晝痛飲嘆華年故及之賀司馬君實何濟川得寵公炭上府愛才天下聞兩軍素出将軍門欲正大闕慰民望豫排寒風作春溫不煩束縕資逰説聊復逰賢報國㤙自笑野人卧窮巷負暄方擬獻天閽獨宿直舎談笑從容宫漏稀髙軒去盡掩重屝風含玉宇霜威勁月上疎牕燭影微周衞相望諠夕警爐香不斷䕶朝衣塵軀更覺仙山峻旅夢端從江海歸五月望日赴紫宸謁待旦假寐半夜北風天反寒倒衣驚問紫宸班雲容不辨陰晴際月色猶迷爽晦間獨喜鳴鷄應鐘漏正憐殘夢識江山濯纓簪筆初無補空愧紛紛數往還送李留後守東平少壮去人如水流似君那作待祠侯高談毎及功名際出守真寛聖主憂麾下百城包海岱道旁千騎擁貔貅家聲時論俱輝赫世将寧為好畤羞題連理亭唐乾符中所建其棟梁頗宏壮云自盧龍渉海致之也靈光蕪滅泮宫平三百年中獨此亭無復喬林見連理尚傳髙棟出窮溟疎簾清簟宜炎日菀栁長梧半廣庭卧向汶篁慙薊植燕山都欲負刋銘答陳州通判廷評同年黄門獻賦接羣賢上國知名獨累年不謂招徠從隗始至今慚愧在盧前簿書幾廢三餘學繩墨空勤一割鉛還喜遷喬友聲近高山流水入清絃麃子嶺帳館寄隠直離腸易感嵗華催更雪龍沙望紫台持節不眠宵自永聴笳無事淚空摧扁舟何處山陰雪驛使他年嶺上梅欲寄一書愁已亂天邊應候客星囘過中京走馬上平安奏状載驅冬嵗拯河源北庭在横水北云自天潢也状奏今朝欵帝閽目斷白雲浮魏闕心先飛騎向中原揣摩詎試衡人術感激空銜國士㤙猶使匈奴戴黄屋南歸慚弔陸公魂冀州正月十六日飲席月缺雪殘雲亂飛千燈相照續長輝寒欺短夜禁杯酒春入東風試舞衣老惜佳辰經嵗得醉驚陳迹出門非漁陽鼓節尤悲壮知我心從萬里飛無雙亭觀瓊花贈聖民東風萬木競紛華天下無雙獨此花那有靈霙凌暖日不為琪樹隔流沙祠城寂寂春空老江雨㝠㝠日易鈄仙品國香俱絶妙少傾髙興盡流霞園人獻芍藥淮海由來草木夭春工殊復自嬌嬈始知隋苑多佳麗未覺呉宫久寂寥氷雪肌膚明綽約雲霞衣服潤飄蕭一枝漫取堪誰贈老去風情不自聊雨中北軒晩寝樹色禽聲相與閒吾廬仍共一枝安浮雲蔽日綿綿雨積水嬰城慘慘寒還恐百芳從此歇不知后土㡬時乾閉闗髙枕交㳺絶一夢江湖意緒寛和府公多葉榴花翠條紅蘂映貧家笑倚熏風拂露華重疉火雲燒落日淺深金鼎矗丹砂多情強自含春恨不語那能學舘娃但寄一枝共醉賞試将顔色比裙紗寄謝霍丘靜樂亭城西陵谷幾推移仍有中亭玉樹枝從政真同傲吏隠賞心能與古人期誅茅改築成芳榭引水交流漲曲池聞道小山多麗句還因春草夢新詩晝寝屋邊髙樹綠雲陰堂下清池碧玉深卧想溪山迷逺近夢為魚鳥或飛沉治逢平日如無事老覺衰容稍見侵聊取南華寄齊物不為東武極悲吟雨中家人致酒急雨連宵晝不收草堂晨起似新秋山歌倚瑟清無賴野饌隨樽特自優追古最宜真渾沌旁騷仍有畔牟愁綸巾搭腦醒還醉得此堯民已甚休答令狐司封使君舟中見寄汝潁相從彌十年江樓今日遲歸船自驚物役還如昔但覺詩情更爽然寥落鶯花千騎裏蒼茫烟雨萬山前未知後㑹仍何地彊醉春風酒似泉某戊子春與使君㑹汝南到今適千年次韻和春卿城西同歩夕光郤射戍樓紅野色遥瞻百里中玉帳坐休鈴下衛春衣行試舞雩風招擕直許威儀略戲笑深矜意氣融流水髙山俱在眼知公令望共無窮往得南嶽𤣥猿特善嘯立秋後風雨頗凉聲尤清絶憐其山林之思為作七言薄雲疎雨濕風枝衡岳猿啼憶此時囘首那無萬里感向人時作一聲悲鍾儀故有南冠恨荘舄猶多舊國思車馬紛紛九域客路傍翻笑斷腸為過思鄉嶺南茂林清溪啼鳥㳺魚頗有佳趣山下囘溪溪上峯清輝相映㡬千重㳺魚出沒穿青荇斷蝀蜿蜒奔白龍盡日浮雲横暗谷有時喧鳥語髙松欲忘旅思行行逺無奈春愁處處濃過臨波亭綠楊芳草舊無蹊竹隖花源敵剡溪水影時翻高檻動天形略抱曲城低逢迎野興鷗雙下㸃綴春愁鶯亂啼宿雨楚山雲正滿髙樓莫上使人迷至日宴水上嘔吐先醉上府公南極微陽中夜新碧池風物曉來春鼓鼙似動魚龍伏旌斾不驚鷗鷺馴東閣于今待賢士西曹不意吐車茵博陽氣度平津學雖賤猶堪頌得人次韻奉和給事中知蔡州呉育作附律上陽和雖始煦罇前人意已生春濠梁且欲觀魚樂淮郡何能致鹿馴為訪心朋猶縱棹況逢時雋與均茵别車豈必辭沈醉更有髙陽倒載人送沈康學士知常州沈自博士出郡某少時居客此州甚久三科妙選漢臺臣君去分符牧逺人富貴湏為千騎長中和好布萬家春山川陽羡由來勝謡俗延陵自古淳曾是倦逰覉旅地送行曽羡兩朱輪送栁舒州金馬宿儒當世賢著書天祿自忘年中和屢以樂職用九次方為耆老遷何恨一囘仍出守㑹湏千室看鳴絃祗因閉閣江湖上正想遥心象魏前送張蘇州始上蓬邱肅羽儀舊更臺省著清規懷章又下芙蓉闕候騎先瞻鳥隼旂楚澤潦収騰駕逺廣陵濤起渡江遲呉中事事皆竒勝還見風流太守詩送刁越州笑持符印下瀛州真得千巖萬壑㳺父老為郎無自苦鑑中行樂不知秋居人舊俗多姚姒幕府連城半斗牛太守㑹兼四千石璽書寧復久淹留送修撰張待制知越州倦簪華筆直承明自請分符江外行真得蓬萊為治所徑從雲漢濯塵纓山㳺訪古窮書穴春事劭農見象耕若向鑑中望明月㑹吟還肯寄新聲送張兵部知遂州錦帳郎官錦里賢皁衣休直綵衣還懷章過邸驚羣吏建節乘春感舊闗道側壺漿積遺愛里中牛酒慶承顔朝廷孝治君先布更聴傳歌太學間送彭待制知瀛州趙北燕南如掌平定知臺選寄長城雅歌不廢軍中樂緩帶能令塞外清傾葢由來欣意氣著鞭從此想功名㶚池送目邯鄲道倚瑟空多惜别聲同鄰幾持國過杜和州江南太守水齋居殘雪層氷正滿渠忽憶山陰乘興往可憐心抱向人攄放歌浩蕩驚狂客換酒從容解佩魚四座歡𠂻兩傾倒歸鞍欲犯夕鐘初寄獻臣通塞由來自有期奏書未上莫嗟咨錐藏勉後三千客舌在湏強百萬師固有青雲堪自致暫虚丹桂不為遲如今相府聞名甚章丞相雅知君應以雄文薦赤墀離京後寄貢甫隠直哉生魄後一日雨中作清川如帶屢囘環信宿猶居百里間敢恨淹留同桂渚正憐風雨似梁山月殘虚魄無由共雲映高樓不可攀郤怪夢中翻識路化為蝴蝶一飛還伯鎮出都後見寄疉鼓鳴笳太守船都人傾注似登仙舊逰俯仰成陳迹離思紛紜遶别絃愁目青楓空自極素書雙鯉不忘傳恐君未得江湖樂追詔方将急用賢寄劉景烈前寄新詩未及答移商陽闗部署漢設重闗斥塞垣詔移飛将護秋屯邊庭無復窺南牧燕客時應祭北門清酒肥牛宴長日輕車精騎獵平原窮途何必多垂淚况復詩書盛討論寄隠直江漢相思山萬里君家少室定西東年華過去如流水心事差池似老翁一世共爭蝸角上微生多付酒杯中窮途何必多垂淚吾更㝠㝠笑阮公寄王二十先借王杜甫外集㑹集未及錄近從呉生借本増多于王所收因悉抄冩分為五巻又為作序故報之昔借君家杜甫集無端卧疾不曾編近從霅上呉員外復得遺文數百篇夫子刪詩吾豈敢古人同疾意相憐子美亦有肺疾也新書不惜傳将去悵望秦城北斗邊新居陳州城下讀書作誅茅負郭楚人居泌水衡門自有餘數困米鹽希辟榖素輕農圃重捐書絶糧尼父期先進畫卦羲皇序古初千世風流尚在眼百年貧病不欺予讀漢書賈誼求為典屬國終軍願得使匈奴和親不及當時策慷慨猶為大丈夫百年強敵輕中國一世竒功悲腐儒聞道邊民尚嚴警異時囘首恨江湖連雨三日東軒讀書雨中無復故人居寂寞閉門三日餘郤信袁安似有道未知原憲定何如浮雲極目無由巻積蘚侵堦不易除正賴髙眠堪自遣時時紛亂滿床書次韻滕岳州謝王南郡酒誰信專城千騎居空齋圗籍兩三厨銷憂盡付鴟夷酒乘興兼忘阮籍塗愛客誰先魏公子長貧郤愛范萊蕪歸軒仍有東門餞顯父還湏至百壺和章伯鎮南上湘潭誰記初北還宣室受釐餘共憐賈傅才無敵真作揚雄老著書調笑羣騶飢欲死去來千騎樂何如洞庭木下鱸魚熟三嘆新詩重起予和滕巴陵寄張虢州明府功名期壮年滯留中路鬢成斑豈知汲黯輕為郡真為劉伶善閉闗歸夢未嘗離帝所謫仙寧久混人間㑹看使者持三節緩帶輕裘且自閒公是集巻二十四

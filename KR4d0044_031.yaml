body:
  text: 公是集卷三十一宋劉敞撰奏疏土仁宗論辨邪正臣伏䝉聖造擢居儒館雖步履尚艱稍稽入覲屢得寬告跧局私門然不敢安居常思當今切務欲伸報塞而事頗紛綜固非筆墨可盡今且以一事最大者仰塵天聽伏惟聖慈更賜裁察夫君臣之道本是一體君者元首也執政者股肱心膂也諫官御史侍從論思者耳目也內外羣有司者筋肌支節血脈也體若具備方能成人為君者上下之官亦具而無陽不能成國者正如為人之體也人之體一脈不和則為疾矣君之國一官不和則為害矣體之不和為疾最大者股肱心膂也國之不和為害最大者執政也夫執政者輔贊萬幾為國大臣日至君前議論天下之事賞善罰惡進賢退不肖喜怒繫乎人情之舒慘邪正繫乎朝廷之盛衰是執政者天下之所觀望羣有司之所師表也執政不和則羣有司安得而和哉羣有司不和則萬務安得而治哉萬務不治則天下之民受其弊矣民既受弊則國家衰亂隨之此萬萬必然之理也是故為國者欲求治且安非天下人和不可也欲天下人和非中外官司皆和不可也欲中外官司皆和非執政先和不可也執政者朝廷教令之所出而天下治亂之所繫也安得不和也尚書皋陶曰同寅協恭和衷哉周武王曰紂有億兆人離心離德豫有亂臣十人同心同德康王曰三后協心同底于道夫三后皆當時聖賢此足見聖賢若不和亦不能同致其道也且夫執政者和則類無猜嫌所議皆合事必極其理盡其善然後行下人固悅服而稟從之承流宣化風動草偃遂使天下䝉其利豈有不治而安者乎及其至也乃能致升平而令國家享祚于數百年者矣昔西漢陳平為右相周勃為左相勃既誅諸吕平以勃功高遂以右相推勃及平對文帝決獄治粟事有條理勃自知能不如平復推平為右相也唐太宗召宰相房喬以杜如晦能斷大事如晦復謂喬善嘉謀而太宗卒用喬策兹四相者非用心至和以天下為任安肯互相推薦為國逺慮如是之切而不自爭勝耶此乃臣前所謂執政者和則致世升平使國家享祚數百年之明效也若執政者不和則議事之間動有疑二或忿爭于官府或辨列于君前咸蓄不平之心必無至當之論假使彊自牽合終或乖戾互相厭苦陰肆傾擠門下賔朋助為搖撼彼此窺伺是非紛拿忿逞私憾之讐何恤公家之事既行于下人不悅服而不肯稟從淪胥展轉遂至天下受其弊則豈有不衰而亂者乎其甚者至有賈禍召亂為國大患而不可救者矣昔唐憲宗相裴度時方鎮跋扈度勸帝用兵諸道叛亂者悉皆歸服憲宗遂成中興之業王室大振既而誤用李逢吉為相逢吉大姧邪嫉度功業令門下朋黨號八關十六子者興造謗訕百般中傷以至撰作謡䜟謂度有天分憲宗既惑度遂罷去尋致河朔徐汴再陷賊庭王室復弱矣僖宗用鄭畋盧攜為相爭黃巢邀請節旄事攜以畋語至切遂拂袂授硯而起喧于都下然衆議畋語為是攜議為非時議用宰相王鐸為都統出討黃巢攜大不悅益固執不與巢節旄只授以率府其意欲激黃巢之怒使鐸功不成以快己志殊不以天下安危為慮而僖宗不明終用攜議黃巢大怒擁衆百萬自嶺表橫行天下是時大亂無一州一縣不用兵者俄而兩京陷沒僖宗幸蜀生民塗炭之極自古無比久之巢雖漸敗而朱溫自巢軍投來終移唐祚自號大梁兹二相者營私徇己用心不公擠陷忠良敗壞時政或翦弱王室覆亡宗社為臣至此隕族何償此臣前謂賈禍召亂為國家大患而不救者之明效也以此足見執政者和與不和實繫乎天下治亂之本存亡之機也如人股肱心膂之疾可以喪其生也至于諫官御史侍從論思及內外羣有司者亦不可謂其職小而容有不和也苟有不和則亦如人耳目筋肌支節血脈之疾安得謂其小而不治之使和平哉周武王曰紂有臣億萬惟億萬心豫有臣三千惟一心夫三千者舉其內外官也成王曰庶官惟和不和政龎禮曰和者天下之達道也漢劉向亦曰衆賢和于朝則萬物和于野昔賢又以烹調鼎鼐更張琴瑟操執轡馭合煉藥石設于方以為喻者或大或細未有不以和為主也為君者不可不察也不可不審其所擇也夫內外大小之官所以致其不和者何哉止由乎君子小人並處其位也蓋君子小人方圓不相入曲直不相投貪亷進退不相侔動靜語默不相應如此而望議論協和政令平允安可得耶安可幸而致耶易泰卦君子道長小人道消則時自泰矣否卦小人道長君子道消則時自否矣若使君子小人並位而處其時之否泰必無兩立之理君子常寡小人常衆則小人必勝君子不勝君子不勝則奉身而退樂道無悶萬一小人不勝則陰陽交結互為朋蔽駕虛鼓扇白黑雜糅千岐萬轍眩惑主聽必得其勝然後能己也小人既勝則益復肆毒于良善梟心虺志無所不為所以自古泰而治世少否而亂世多者亦止乎小人常勝君子常不勝之所致也小人但能為亂不能致治若小人或能致治則易更九聖必不于小人道長之時謂之為否也凡六十四卦三百八十四爻大抵諸聖以意象配君子小人而分善惡至多不可悉數也易曰小人不恥不仁不畏不義不見利不動不威不懲夫小人者聖賢無不鄙而惡之故易曰小人而乘君子之器盜思奪之矣詩曰憂心悄悄愠于羣小此皆聖賢鄙惡小人之甚者也書曰君子在野小人在位民棄不保天降之咎此謂用小人則民叛而天降咎也仲尼曰君子中庸小人反中庸荀子亦曰君子小人相反也夫小人所為既與君子相反戾則安可使之並處哉所議安能得其協和哉夫天子無官爵無職事但能辨别君子小人而進退之乃天子之職也自古稱明王明君后者無他惟能辨别君子小人而用舍之方為明矣至于煩思慮親細故則非所以用明之要也夫前車者後車之所望也古事者今事之所鑒也仲尼刪書于堯舜大禹皆稱曰若稽古傅說戒高宗亦曰事不師古以克永世匪說攸聞恭惟皇帝陛下稟上聖之資嗣纍朝之業纘服未久勤勞己至更望考前世盛衰治亂之迹近代安危存亡之機凡所選求力辨邪正所喜者未可遽用之所怒者未可遽棄之禮曰愛而知其惡憎而知其善者是也又人所毁者未必為惡人所譽者未必為善人仲尼曰衆惡之必察焉衆好之必察焉者是也孟子尤于進退善惡之說至詳齊宣王問曰吾何以識不才而舍之孟子對曰國君進賢如不得已將使卑踰尊疏踰戚可不慎歟左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之左右皆曰不可勿聽國人皆曰不可然後察之見不可焉然後去之夫一國之人皆曰賢皆曰不可亦不可不謂之出于衆議而不可不從之也孟子尚以謂未可信而進退之猶復躬自察焉直俟王親見其果賢則用之親見其果不可則去之此所以大防姧人朋比毁正譽邪亦所以防偏見者以丹素甘辛而好惡之差也蓋恐用舍或爽則所損多也實懼之至也苟如是而失之者尚恐不免然亦鮮矣陛下君臨天下必不如孟子之辭盡聞天下所議論若夫左右之說及在廷諸人之語則皆可聞之矣然固未可遽信而遽行更在博詢而參校之也所詢者須詢于可詢者也詢之必不肯誤陛下也若詢及姧險浮薄不正之人則向所謂愛憎毁譽偏見者皆有焉有之則邪正錯亂是非混淆陛下至英至睿亦莫得而辨之也兹事雖自古聖王亦以為至難皋陶曰在知人在安民禹曰惟帝其難之帝謂堯也仲尼獨取堯舜比之如天尚以知人安民為難況自堯而後者哉由是而語陛下可不慎之又慎之大抵有天下得人可治而安不得人則亂而危至甚則又遂繫乎存亡也臣前所援據特一二而己但且欲證臣狂瞽非臆說焉其有在方策者比比皆是不可彈引陛下開卷則見之矣惟望慎之慎之又慎之也臣昨䝉陛下召從僻左之外起于衰病之中秪是念其舊人授以國鈞辭不獲免夙夜驚惶若非旁假衆賢共成大政則臣虛薄老朽立見敗事夫四海至廣萬幾至煩更藉天下之才以濟天下之務所以不避煩瀆之罪願陛下持古鑑今選賢與能者乃犬馬之至誠也惟聖情開納則非臣之幸乃宗廟之慶生靈之福也臣死罪死罪論邪正臣伏以馭臣之道在分别邪正正臣當親而近之邪臣當疏而逺之至于天下之人亦皆以此窺朝廷若正臣聚于朝則姧雄屏息治平可望若邪臣聚于朝則僥幸競進傾敗可待二者不可不深察也臣伏觀朝廷太平積久賢能衆多然其間邪正亦雜有之或愛君憂國非公正不發憤或朋黨比周背公樹私亦有循默自守不能為善又不敢為惡陛下臨御三十餘年矣以上聖之姿鑒羣下所為固無遁形固無隱情然有可戒慎者在此而己凡正臣常難進而易退邪臣常易進而難退何以言之正臣者惟義所在言則逆君之耳是所以難進也言或不用不欲自顯因事而去是所以易退也邪臣者惟利所在言則逢君之欲是所以易進也行雖惡不顧禮義名雖醜不知愧恥患失之耳是所以難退也此兩臣者願陛下參伍觀之毋使當親者疏當疏者親則朝廷尊榮而社稷安矣近者翰林侍讀學士蔡襄繼出典郡今又聞御史中丞孫抃翰林學士歐陽修知制誥賈黯韓絳並乞補外此其人等皆有直質無流心議論不阿執政有益當世者也誠不宜許之使四方有以窺朝廷而姧佞僥幸之雄因而競起此則分别邪正之一端也臣以孤拙忝官侍從日夜思維無以少禆聰明恐陛下忽于正臣之易退而忘左右前後直道之不容也不勝其愚謹獻所聞惟賜采擇論聽政臣近曽密獻愚忠乞特降手詔諭與閣門前後殿聽政稍增數刻足以廣聰明收衆心未䝉采納伏念九月以後晝漏益短日始東出己涉辰初比至百官起居二府奏事逡巡俯仰便及辰正實恐羣臣因此請對稀少習俗既成下情壅隔甚非陛下憂勤萬幾之意臣謂自九月以後用已初為限三月以後用辰正為限雖升降止于數刻之間其于收斂羣情已無量矣臣又竊聞頃來奏事者雖有可否罕聞德音君臣之情亦似未通且萬乘至尊羣下至卑以至卑接至尊甚難也皆考據條制齊戒沐浴乃得一見自以為千載之遇而曽不䝉少垂察問盡其忠藴則人人抑默退而失望臣願陛下延見上殿臣僚仍賜委曲訪問侍從之臣則問以治體言事之臣則問以所言財利之臣則問以國計守土之臣則問以民俗如此則朝廷得失人情善惡無不聞者矣易曰惟君子能通天下之志能通天下之志而天下不治者未之有也臣忝近列無補聰明輒貢所聞伏增戰恐取進止上仁宗論睦親宅不當建神御殿臣伏見古之正禮諸侯不祖天子公廟不可設于私家所以明正統尊一人也今睦親宅興建神御殿不合王制不應經義竊聞聖慈以天寒人勞權罷役徒臣謂若于禮當作則不可以人勞之故而止何則祖宗至尊也役徒至賤也恤至賤之衆而輟至尊之廟非所以為名也若禮本不當作則不如遂止之耳何以權罷哉伏乞令禮官詳議其事使下不爽于名上不愆于禮上仁宗論修商胡口臣聞天有時地有勢民有力聖王之建功謀事者不與天分時不與地分勢不與民分力則功成而事立今朝廷以河決商胡議必塞之臣竊謂過矣乃者霖雨淫溢山谷發泄經川橫潰或衝冒城郭此天時也澶魏之掃如商胡者多矣咸決而商胡獨敗此地勢也淮汝以西關陜以東數千里之間罹干水憂者甚則溺死不甚則流亡夫婦愁痛無所控告路計百萬人未聞朝廷有以振業之也而議塞河强疲病之餘以極其力乘殘耗之後以略其財重為事而罰所不勝急為期而誅所不至上則與天爭時下則與地爭勢此臣所謂過也臣聞河之為患于中國久矣其在前代或塞或不塞今塞之為仁不塞不為不仁此有時而否者也以堯為君以舜為臣以禹為司空十有三年而後僅能勝水患耳今朝廷之無禹明矣而欲以數月之間塞決河不權于時不察于民不亦甚乎議者以為不塞河則冀州之水可哀甚不然夫河未決之時能使水不病冀州則己矣既決之後縣邑則己沒矣人民則已亡矣府庫則己喪矣雖塞河不能有救也今且縱水之所欲往而利導之其不能救與彼同而可以息民何嫌而不為詩云民亦勞止汔可小康惠此中國以綏四方夫中國者固四方之本也惟陛下與知道者慮之上仁宗論天久不雨臣伏以古今之通義主逸而臣勞陛下親聽萬幾日昃不倦與羣臣等勤矣今又聞以天下久不雨之故降服徹膳躬自暴露夜輒升壇禱祠達旦不寐此則聖躬之勞過于羣臣羣臣實未有及陛下者也臣竊聞之不勝其憂且水旱之數未可前測設復彌月連旬不如聖意陛下何能専以萬乘之體為羣臣代勞哉如今萬一冒風寒霜露之苦有所不怡陛下當使誰受其責而宗廟社稷之憂獨在陛下陛下不可不自愛也詩書百家聖賢精論皆曰人者天地之心人和則天地之和致矣近者大赦恩及四海解宿逋裁減常稅宥過除罪與之自新德厚如此和氣宜應而愆亢尤甚者臣之愚竊意今日政事所褒進所刑罰所施舍所廢置猶有未合人心不當天意者故令陰陽否隔也陛下誠少加聖恩延問正直日新其德則和氣可致時雨可望何必降服徹膳躬自暴露涉風寒霜露之險增宗廟社稷之憂非計之安者也陛下視羣臣百姓如子羣臣百姓望陛下如父父以子將失所之故深自克責不避災疾而子方晏然自若不可謂孝臣雖賤竊不勝犬馬之心又以謂救旱之術在彼不在此故敢冒昧陳聞惟陛下裁幸論孟陽河公事臣伏見軍巡院現勘孟陽河公事准中書劄子惟只取勘後來檢計官吏壕寨等臣竊聞衆議皆云相度此河本由楊佐所役人夫七八千人掘破丘墓百五十餘處生者勞敝死者暴露百姓怨痛謗議沸騰今捨佐不問専罪餘人未審出于聖意將由有司之誤以此斷獄恐不合人情況自正月以來和氣不應風雪為沴人多死亡未必非政役失中刑罪乖當之變臣忝司刑獄既有所見不敢不陳其孟陽河公事伏乞斷自聖衷以相度者為首檢計者為從一例取勘重行貶黜少謝勞敝之衆粗慰暴露之魂且匹夫匹婦精誠有以動天伏望不以臣言為迂取進止論邊臣臣伏以豫備不虞軍之善政曩者元昊畔亂西邊震驚騷動之患延被天下賴陛下神聖與宗廟之靈元昊殞滅國內多故其子幼弱委政舅氏故邊鄙得以復安百姓飬老長幼早寢晏起此誠天道助善中國之福也然自爾以來又十餘年矣其子益壯竊謂虎狼野心未可待以不疑設使一旦發狂能為風塵而邊備少懈又如曩時甚非豫慮制勝之策臣望朝廷申敕邊臣常若冦至城郭必固甲兵必修倉廪必實賞罰必明候望必謹威信必立使疆場凛凛無可乘之隙則邊患逺矣頃者邊吏頗以飲食之費役使之傭得罪即今武吏多不願臨邊有不得己就職者皆畏避微文情不自聊居常救過苟免而已緩急恐不足以責效又非所以明朝廷大體也孫沔吕溱皆貴重之臣有功名于時猶以此見廢設復有孟舒魏尚之徒臣固知議者不能容之此乃馮唐所以疑漢文帝不能用亷頗李牧也鄉飲酒之禮一獻百拜其為修慤至矣然而終不可以治軍旅則治軍旅者姑亦取其大節而已邊臣有材者寡可用者少臣願陛下容養此輩濶略細過無甚督以微法使得樂職嗜事展力效用人人思報上恩則折衝逺矣臣所部不當邊劇然而言此者欲推明聖德駕馭智勇之一端非敢為邊吏游說也不勝區區取進止論張茂實臣伏以為國之道防患于未然逺嫌于萬一所以安羣情止邪謀也伏聞張茂實本周王乳母子嘗養宫中故往年市人以狂言動茂實頗駭物聽近者韓絳又以讒說傾宰相重搖人心則是一茂實之身逺則為小人所指目近則為羣臣所欵懼雖聖心坦然于物無猜恐未能家至户曉使人人不惑也假令茂實其心如丹必無他腸亦未能家至户曉使人人不憂也如此則備宿衛典兵馬適足以啓天下之惑動天下之憂甚非重宗廟安臣民備萬一之計臣謂今日之宜要令兩善莫若解茂實兵權處以外郡于茂實不失富貴而朝廷得逺嫌疑此最策之善者也昔王郎自稱劉子輿盧芳自號劉文伯因疑飾僞未必皆有犯上之心但流言驅扇羣情眩惑使之然耳臣忝近列方當逺出心之所疑不敢不極論乞以臣言密付執政商量取進止論元日合朔避寢太早臣竊聞朝議以元旦合朔欲自二十一日避正殿臣以謂天明雖有可畏之道然亦當稽古率禮然後為允按三代之典日食無豫避之事左氏傳稱避移時曽子問諸侯入門不得行禮者日食居其一此皆覩有變而戒非蚤備也先王制禮過之者猶不及其制法先時者與不及時者均貴得中而己漢唐素服寢兵卻朝㑹不視事及求直言大率皆在合朔之辰未有先時旬日者也兆憂太過春秋所譏今敵使來朝逺方觀禮舉措失中或輕為所覘伏乞詳求舊典折衷于禮取進止公是集卷三十一

body:
  text: 公是集巻三十宋劉敞撰制誥龍圖閣直學士兵部郎中涇原路經畧使王素可諫議大夫朕臨御天下賴宗廟之靈方内乂安元元䝉福而往者戎狄窺間緣隙時入為暴患皆在守圉之臣文不能附衆武不足威敵使貪暴之民震驚朕師具官王素假節剖符居邊三年内鎮撫百姓外教戰士令行禁止惠于鰥寡爰及疆外羈縻之國咸懐服集不失朝貢中國以安朝廷益尊此蕃衛之勲也詩不云乎大邦維翰其議遷秩升于諫列以慰吏士出車東山之思前邠州觀察推官李育可著作佐郎前趙州軍事推官許林宗可大理寺丞古之禮珪璋特達而璧琮有藉寶非不同也所從用之異豈惟寶哉士亦宜然育用文學進有以自見林宗由吏材選稱于知巳夫蓬丘圖書之府廷尉法理之本往為之屬各踐爾位思所以報毋隳而守前秀州崇徳縣尉左惟温可漣水軍錄事參軍天下無事人得養老長幼修孝悌之行甚善而猾惡民起為盜賊奪攘以侵擾之郡縣所患者也汝以邑尉捕擊如律尚書條上閥閱遷爾紀曹祇服明命益思自奮西京左藏庫使忠州刺史髙陽闗路駐泊兵馬鈴轄時明可文思使執干戈典兵馬之臣當以戰多勇功受賞于朝而但累嵗月計資攷以此取髙位壯士之恥也然今天下乂安士無所試其能故偏禆将帥例以恩進遷爾使列以觀來效爾亦毋謂易而得之因易而守之盍亦竭節顧義思所以報國者乎宰相富弼奏試國子四門助教王淵宰相韓琦奏鄉貢進士李常並可試将作監主簿曩者朕親祀清廟推恩延賞而大臣得薦其門下之士置之仕籍今丞相以淵等聞夫與吾陶冶萬物長育人材者非丞相歟何惜一命以慰士大夫之望其慎所履毋辱已知内殿崇班唐詢可内殿承制邊吏欲其奉法守職以安吾民而不欲其徼功興事以撓王畧也故嵗滿無負者輒遷其秩爾有治狀協于賞格進承制命無墮常守定武軍節度推官衛觀可大理寺丞常州團練推官沈披可衛尉寺丞昔唐有天下諸侯自辟幕府之士惟其材能不問所從來而朝廷常收其俊偉以補王官之缺是以號稱得人今州郡從事皆吏部旨授然其試之臨政而不苟察之行已而有立亦皆一時之選也故吾亦且命以九卿之屬使漸而升于朝觀與披也既厯試于外又亟稱于知已得人之聲庶必能勉焉禮部侍郎參知政事曽公亮可加正奉大夫進封開國公食邑五百戶賜推忠佐理功臣朕承七廟之光繼三聖之緒惟慎祀時享未足副盛徳委亊有司未足盡誠孝故稽曠典厯吉日親率公卿躬執豆籩昭見祖宗並受祉福若乃裒時之對申錫無疆天㝢之内莫不受慶而況一二耄老肅雍顯相者乎具官曽公亮徳器渾厚智謨閎達予欲觀于雅頌參𤣥鳥清廟之詩以追孝于前人汝明予欲謹于王亊極四海九州之美以備物于大饗汝圖予欲時和年豐以薦厥嘉生登黍稷之馨汝翊予欲制禮協樂以對越太室交神人之雍汝助夫賞國之典不可廢也進階中朝頒爵上公衍食加田勒忠甲令使百執事粲然皆知輔徳政治之報焉不其偉歟将作監林洙可司農卿自周以來稷為大官今吾非廢稷不務也而官益輕豈居其職者未能勉乎具官林洙資禀通裕臨履修潔擢正卿位尚宜其事昔乃先正實領大農之任以迪文考今年穀未充邊人望哺爾其勤身敏行無沗名實于以勸穡劭民庶有賴焉濟爾世美不其多乎都官貟外郎邢夢臣可侍御史殿中丞沈起可監察御史裏行御史執憲轂下紀綱國體非雅亮勁正之士不足參論議廣聰明拯與景初吾所信也使之慎簡厥僚必皆其人而拯也以起間景初也以夢臣可稽之閥閱察之望譽人咸曰允哉予甚嘉之夫鑒以明故可正容繩以直故可形枉毋勤小補而遺大體毋忽近務而隳常守事君盡禮其可以報知已乎屯田貟外郎胡揆除都官貟外郎朝廷鎮撫四夷以綏中國貴于息民而不務佳兵故常敕邊吏毋邀竒功五嶺已南蠻夷雜居其俗剽悍尤為易動而桂州一都㑹也前通州軍州事尚書屯田貟外郎胡揆承用詔旨悉心疆事終揆之任恬然無虞亦可謂善吏能宣明威信者矣夫守邊之患常在見小利不達大體以侵迫驅奪之為故至大亂貽憂吾民則若揆者不可以不賞也稍増其秩以示褒寵陜西路都轉運使兵部郎中天章閣待制傅求可右諫議大夫河北轉運使工部郎中天章閣待制周沆可兵部郎中依舊岐畢吾西土也被山帶河百二之險而有昆夷之虞燕亳吾北土也平原廣牧四戰之地而有玁狁之警贍足兵食綱領郡縣将命宣指甚難其人具官傅求明智敏察表以文雅具官周沆深中篤厚居以名檢並委節傳分按州郡皆有述職之勤美俗之風夫較攷陟明其來尚矣或正諫省之列或遷夏卿之屬所以襃善勸能爾其欽哉司門員外郎張鞏可開封府推官京師者舉衆大之辭名之者也風俗雜而獄市繁治稱浩穰吾令襄為尹急吏緩民甚有文理其僚虚席思得敏才以左右之具官張鞏嘗使行河決川滁源衆工胥作輓漕以通其精力幹用效在已試俾贊輦轂之政尚克有立夫都邑翼翼四方是則無習苟且違道干譽則子一人汝嘉太子中舍通判衡州張兊可殿中丞郡有倅貳闗決衆務所以優民事示重慎也俗吏不察大體而矜勢怙權以争重輕吏民反苦之甚非朝廷意爾居職自若奏課亦善通籍循省以疇嵗勞方天之休爾其朂哉兵部貟外郎張中庸可開封判官京師衆大之居其俗具五方而諸侯所視法也號稱難治蓋自古記之為之尹者專用擊㫁則網密俗敝崇之以寛則威信不立故常擇精明疏通之人以參其職具官張中庸材劇而用博行修而志堅處煩決疑必有餘裕俾贊浩穰之政當適寛猛之中根本之地爾惟欽哉度支郎中李碩可三司戶部判官財賦大計一出于民取之寡則用不足然而民逸取之多則用有餘然而民困此三司之難也術不能通輕重智不能調盈虚則吾不以為之僚具官李碩嘗以名字典郡風采奉使敏以為政精于檢下所到而治有迹可紀使之參計耗登贊舉籌策庶可以不傷財不害民乎往即㑹府毋乏乃事龍圖閣直學士趙師民包拯刑部郎中任莫重于有土功莫美于宜民故周設加地進律之典而漢著増秩賜金之令以勸能者朕折衷焉拯識清氣勁直而不撓凛乎有嵗寒之操師民經明行修敏而好學浩乎若天府之富俱備顧問並參法從屢獻切直之議講聞絶出之業而勤請為郡期于報政曽未期月翕然治聲昔望之自以諫臣恥于補外而龔勝進以儒者窘于撥煩我圖傑材無愧往哲宜程功次之久俾踐刑曹之屬褒善陟明孚我休命樞密直學士右諫議大夫權三司使包拯加上輕車都尉食邑祀者國之大事也而祫又加大焉朕既親饗祖考承致多福慶賜所被自公卿大夫六師庶衛執干戈之人外薄四海罔不畢及搢紳歡呼士卒鳧藻其調度費用一出大農固亦勤矣某强志盡瘁夙夜匪解任重權專不可以非理撓使吏謹其職下安其業民不加賦而國有餘財以成朝廷之大禮可無褒乎古者敘六勲之等藏乎天府者固以旌有勞頒五爵之封衍以真食者固以優有徳有司其明按舊事申錫休命以稱朕意程戡檢校太傅宣徽南院使判延州西戎即敘方外無警然而襟帶之地重兵所集欲守衛中國宣明威信非股肱舊徳帷幄宿望豈足與朕同西顧之憂哉某識量閎博猷為靖密政事之幹長于治人忠厚之誠形于事上陟降二府勤勞厯年所以翊亮國體裁成機畧為益多矣其誰間然乃者辭劇就閒委權謝事雖嘉沖尚之意俾逺侍從之列而風力克壯問譽攸屬方且修邊備以憺逺俗豈宜輟老謀以忽外慮參榮四貴視秩三師衍以爰田之封畀以元戎之寄文武惟憲爾其勉焉罷諸路同提㸃刑獄使臣置轉運判官國家兼覆㝢内疆理天下分立州邑十有八路惟吏之不平民之失職政之頗類獄之糾紛未能獨察也故設糾䖍之司使奉欽恤之寄專屬朝寀貳以武吏誠欲審疑察枉釋冤決滯納民于不冤流化于無訟而武吏或起世家或由軍功文墨期㑹未必深究監司背項適増其繁夫非其習而望其效違其方而冀其功不亦難乎其罷諸路同提㸃刑獄使臣令樞密院勘㑹已及二年者即令赴闕未及二年者與就移合入差遣及于河北河東陜西緣邊兵馬多處相度添置路分都監以次補用庶幾人盡所長官不虚受夫轉運使之任所寄耳目治財賦集事功也江南東西荆湖南北廣南東西福建益梓利䕫等十一路此其去京師逺者萬里近者數千里或跨帶山海嶇﨑蠻夷而皆一貟主之處則無與參慮出則無與僇力設有緩急之警調輸之煩機㑹一失民受其敝甚非豫慮先事之策其各増置轉運判官一貟以三年為一任選差第二任以上知州資序人候一任滿日提㸃刑獄差遣初入知州及第任通判資序人候滿兩任日與提㸃刑獄差遣若居部無狀隳職敗事亦重行其罰蓋士常患任之不當其材無以見長用之不久其任無以見功今朕别異文武使得自試選擢賢能使得次進吾于士大夫可謂無負矣其各竭力悉心勉成功名布告中外咸諭朕意太常少卿張鑄可光祿卿致仕古者有司年至則致仕所以恭讓而不盡其力也具官張鑄履尚夷粹足以檢俗精力强敏足以濟物而能顧禮畏義願上印紱朕閔勞以官職之煩今聽其請夫佚老之士雖不能輸力于朝其矯厲風節不亦過絶保祿持寵不知止者乎俾列九卿以榮其歸祗若休命思底終譽無為軍錄事參軍馬易簡可太子中舍致仕控搏祿利者至于遷籍損年飾貌匿衰以綏退休之期爾齒未耄仕無缺行能決于去庸非亷乎自下郡掾升東宫屬歸安鄉閭足為榮觀矣權郴州軍事判官楊永可右贊善大夫致仕前岳州平江縣張正已可大理寺丞致仕年至還政典也而貪祿者或不能止能止者皆好禮者也至于以亷自嘉者有不待年去矣今永也禮而正巳也亷忽而不錄何以慰其子弟之心或升籍朝閨或丞事卿寺歸榮鄉閭以樂暮齒韓通贈中書令易姓受命王者所以循至公臨難不苟人臣所以明大節周故天平軍節度使檢校太尉同中書門下平章事侍衛親軍馬步軍副都指揮使韓通定交霸府委質前朝荷戈共厯于艱貞錫壤迭分于戎律朕以三靈睠祐百姓樂推言念元勲方疇異渥蒼黄遇害良用憮然追升浴鳳之池式表潛龍之舊皇伯故右武衛大将軍漢州團練使世榮可特贈密州觀察使追封髙密侯敕禮以稱情而立文榮以哀死而加厚贈䘏之典在于有司具官某地近屬尊身修行治翺翔膴仕表儀公姓内聨環衛之嚴外假州符之重奄至大故未究營途眷言悼傷良用惻楚追賁亷車之秩仍疏侯社之封尚其有知對越休命可皇叔故右武衛大将軍漢州刺史叔豹可特贈䕫州觀察使追封雲安侯敕具官某贈襚之典古有加等所以追賁材徳而示愍䘏也我朝緣惇睦之恩崇哀榮之冊褒贈宗室厥有異數以某托居近屬生有懿行開環衛之幕府領名城之符章惜其不永遐齡遽違昭世追錫亷車之寵仍啟侯社之封眷惟有知歆此休命可皇叔故右監門衛大将軍叔奢可贈濟州防禦使追封濟陽侯敕具官某莫逺具邇公族之恩也生榮沒哀有司之事也以某身居近屬居有顯譽未及修齡遽辭昭世愍焉傷悼良以為軫建侯禦侮是為寵秩濟陽之區實為奥壤錫命幽穸用寧潛魄可皇伯故龍武軍大将軍滁州團練使世經可贈洺州防禦使追封廣平侯敕具官某公族之恩莫逺具邇雖有疵吝粲而不殊某庀職環尹領符要郡不淑而夭良用惻悼追崇贈典申錫休命防禦廣平因授侯印泉壤有知歆此光寵可皇叔右武衛大将軍忻州刺史世枚皇叔右武衛大将軍舒州團練使叔婼並可贈觀察使追封侯敕生著令譽沒有餘榮所以好善而不忘觀功而無忽矧吾近屬宜有嘉寵具官某等謹身自修學古敏志為宗室之令望若都士之素守夭閼不淑愍悼良深亷車按俗之名茅土賜國之貴俾推贈典併示優恩尚其有知膺此殊渥可皇兄故右監門衛大将軍士穎可特贈洺州防禦使追封廣平侯敕莫逺具邇所以厚睦族之恩生榮沒哀所以隆宜賵之禮眷惟近屬庸有加等具官某資性好善始終寡尤享年不永早世無祿興悼于再思有以稱俾崇䘏典下慰九泉使麾領州之盛侯印啟封之貴併疏密章用光壤户可皇姪右監門衛将軍克孝妻某氏可封仁和縣君常棣之詩其輯之亂曰宜爾室家樂爾妻孥知其為治内之本也今夫宗婦有湯沐之邑封君之號此其所以稱宜且樂不亦光大章顯乎具官克孝妻某氏憑慶良奥作嬪懿近柔静之操足儀閨壼荘肅之風能承祭祀俾疏列壤且擇令名尚無懈于夙夜思能對于休寵參知政事程戡曽祖守瓌贈太子少保徳厚者流廣徳薄者流狹朕親建配天之祀對越祖考而股肱大臣恩不及三世則非重本追逺之義也某以鴻漸之翼屈歌之政治加其民而攄藴不盡教施其族而慶鍾方逺肆爾曽孫毗予大政朕嘉與之同徳協義丕承宗廟故若稽貴始之典推本貽謀之實且欲申人後之寵教天下以孝褒加愍冊列于孤卿九原而有知也其尚榮我丕顯休命乎曽祖母某氏追封郡太夫人迺者朕以戡有英濟之器謨明之望故選于衆置諸丞弼而中外翕然咸以為宜夫源深者其流永根固者其枝茂朕以此知程氏之世家聲壼彛必有積仁累慶沒而不朽者矣夫用人之子遺人之先豈示民訓俗之道哉戡于國制得贈三代故以褕狄顯而廟室和氣猶存歆後于有祖某贈太子少傅人之情為父祖則欲其子孫之貴為子孫則欲其父祖之榮朕所矜式大臣表顯先正申錫異數追加寵爵庶曰有以慰其孝思乎某處幽履素抱徳懷和才能見遺于時文采不表于世然而于公仁恕髙門有待太邱道廣奕葉方起不有褒崇之冊豈稱燕貽之心哉有司其判密章以少傅之靸襚之雖戡哀往奉先可以無憾也妻曹氏追封安定郡夫人召南歌賢者風而鵲巢美夫人之徳此言朝廷之教必先始于近而公侯之貴得以榮其家也某氏生於茂族有温惠淑懿之禀歸于君子有夙夜警戒之益夫善同者報等體敵者禮均今戡積徳累行參榮宰路而其妻車服命號未之能稱則禮有不答豈典也哉詩不云乎如山如河象服是宜期疏善郡之封以章有家之慶曽祖母平原郡太夫人田氏追封某國太夫人樞機之任下所具瞻必使澤副其爵服稱其禮而後可以一統類美風俗矣故吾于股肱之良加禮貌之重申錫寵數逮于曽門某氏具體聖善作嬪良家奥宫無違梱教兼備既成蕃衍之祉實啟燕翼之訓肆其裔孫服在存輔原鍾慶于有後知積善之攸從俾疏大國之封以極小君之寵襚服愍榮泥書密章足以光賁泉壤流美厥後矣祖太子少傅思義贈太子太傅卿士之孝念祖修已則福祿從之朝廷之選尚賢報功而典教備焉若其不懈于位無沗所生膺受光寵増益天秩宜徇追逺之志以著率親之典某徳操昭融業履純茂久幽而不改有聞而無聲乃其元孫嗣承休緒陟降四輔之密左右萬事之㣲懿厥勲勞既覃三錫之命推夫燕翼實有先世之謀是宜崇飾愍章増賁幽穸陟春宫前傅之烈茂宗彞時享之華志氣尚有膺我休寵祖母彭城郡太夫人劉氏追封某國太夫人朕聞自仁率親至于祖而義備立愛廣孝始于家而道逺然惟位崇者可以充其數徳盛者可以如其志眷吾鼎臣進執機柄俾増寵命以副具瞻某氏幽閒挺操婉嫕成徳珩珮之節光乎女圖山河之質宜是象服雖假褕翟之寵領湯沐之封未從開國之崇尚觖宜孫之慶函疏奥壤薦錫愍章庸俾寵光増賁泉路母京兆郡太夫人王氏追封某國太夫人褕翟小君之命湯沐六郡之封王澤下流國人稱願在乎多士可謂盛矣其有梱教甚茂子貴増進薦錫寵章以輔孝治某氏淑慎之質禀乎天性柔順之美居為少師委蛇山河之徳積累閨壼之慶雖萬鍾之養弗待而二南之風藹存是宜疏成國之榮加襚服之貴将俾海内化母慈之善廷臣懷子養之極往告其室尚兹歆顧祖太師尚書令兼中書令楚王彬封吳王古之禮于異姓固重矣而況國有大祀恩被天下而椒房之貴别子之宗積善遺徳鍾美儲慶而無漏泉之澤及祖之榮則非王者之智矣某元精所生佐命之首昔王業始基國命猶跼而能宣力股肱敬届吳蜀謀無遺策忠協成筭外之濟干城之安内之保帷幄之勝功兼三傑聲冠羣后朕躬執圭瓚親祀太室觀于庭享之列籍于景鐘之銘慨然敘不朽之迹興可作之感雖哀榮義極褒襚禮備猶欲追以義王之封稱兹元勲之舊吳大國也尚云享之祕書丞范純仁父仲淹贈吏部尚書朕親執圭瓚昭見祖考還御端門發號施慶昭天漏泉恩靡不逮誠欲慰士大夫立身揚名奉先追逺之思況王室舊徳功在盟府者乎某英亮特達宏正深雅文學自奮忠義事上故入贊機政出董邊師朝廷以尊四裔畏之可謂股肱心膂大臣之表矣不幸早世棟折梁壊衋然傷之至今不忘聞其有後庶能濟美夫積善必報顯親無逺追命之典自春秋固行矣苟可以旌忠臣之節申孝子之感豈非崇勵風教通于神明者乎其以天官冡卿告其封襚公是集巻三十

body:
  text: 公是集卷十九宋劉敞撰五言律詩野望重陽去寥落小雪碧蒼茫獸起駭枯草鳥歸橫夕陽薄雲低引白衰菊暗消黃佇立何為久愴人非故鄉蕪城間望二首幽尋古城上秋景日悽悽落照映原沒陰蟲當路啼隋宫變蕪蔓楚分失端倪自是傷亡國非關醉眼迷春草忽更緑荒城陰霧滋風存鮑昭賦秋益宋生悲慨想秦兵出傳聞羽檄馳江湖嵗將晚空羡逐鴟夷夏晚閏餘時候早夏晚似新秋月出空堂靜蟬鳴深樹幽健逢鷹學習喜見火傾流早晚涼飈起重修白罽裘聽鐘陋巷客回轍夕陽鐘送秋寒聲滿空谷暝色下髙樓陡逐悲風起微兼逺角收旅懷傷急景聽此愧淹留野望江水不可越扁舟浮夕陽高秋露寥落逺樹出毫芒澗水清兼濁山苖緑映黃漁翁豈招隱何待唱滄浪觀南戍士卒作樂簫鼓軍中樂旌旗嵗晚過激昂雙劒舞慷慨萬人歌睥睨荆衡小騰凌虎兕多北風隨殺氣橫絶洞庭波聞聖俞移官霅上以便歸養親老不擇祿此心如古人戴星捐吏事戲綵過鄉鄰若下開新酌汀邊詠白蘋醉吟俱入手亦未負青春西域請平三首西域請都護崆洞獻凱歌兩階增羽籥萬里肅山河甲第旃裘少春宫苜蓿多雌雄雙匣劍棄置欲如何禦戎傳上策不戰屈人兵逐斷祁連臂何須萬里城出車非逺略高枕得升平戰骨翻空死吁嗟壯士名單于貪漢物自古號天驕賜豫金銀貴行來玉帛遙悲傷賈太傅慷慨霍嫖姚慟哭辭新第英雄未可招雪後登觀風樓雪帶郊原闊城橫碧玉齊夕陽寒似落逺樹望如迷旅鴈情更急棲鳥飢亂啼強歌非郢客竟日戀危梯開竹下小徑招君章翠竹生無數蕭蕭一徑新陰繁催短日地僻斷飛塵磐石兼容客幽禽不避人君能爛漫醉當及七賢真贈刁十八自蜀還鄉昔與此君别於福唐瘴海三年别巴山萬里迷相逢欣邂逅即事恨睽攜夢減清江外愁寬太白西知君偃鄉墅巳忘子規啼送李監丞致仕還鄉前漳州縣尉耄期吏隱倦歸去上恩榮國子瞻師保鄉人慶父兄揮金慰遊舊擊壤傲升平逺笑吳門叟何為變姓名懷陳州舊居所種桐寄黃翁忽憶南軒樹春風空復來陳亡韶已矣孔老鳳悠哉不作溝中斷應隨㸑下灰舊居阡陌並君到為徘徊荷華水國非人境芙蕖五月秋亂香清宿醉濃豔破征愁魚戲都堪數鷗飛絶自由會須窮一賞詰曲任扁舟七月二日西風入庭樹天氣颯然秋細雨才成潤高雲淡不流平分感一葉逺興憶扁舟蟋蟀何須急羇人始欲留秋雨所居漏濕皇天不愛物風雨害秋成未恨泥塗辱端憂柱石傾淹留驚嵗宴堅臥悵雞鳴吾道還如此商歌天未明秋雨采蕭逼晚嵗飛雨度高雲暝色空窗見秋聲墜葉聞過螢低似滅逺岫望如分蟋蟀悲虛織輕絲競欲棼始涼北風吹過雨晚景留新秋高臥來一笑如棼寬百憂精神露鷹隼意氣激驊騮自覺亦飛動江湖思逺遊八月旦始涼騷騷北風急杳杳白雲飛江漢波新起蒹葭露欲睎狂歌聞鳳鳥楚製見荷衣歷歷先賢趣南浮亦庶幾重到謝氏園亭寄裴博士俊叔王主簿宗傑時裴往淮南王詣京師徘徊逺林下幽草為誰芳前日同遊客今朝俱異鄉東風雖淡蕩陳迹似淒涼何用江千里春心故易傷送朝殿丞僉判鄭州世德緇衣美天倫玉樹溫于君如舊識曽子欲奚言東里賢能宅成臯戰伐原從容訪耆老遺迹尚多存檀州正月二日窮谷回看盡孤城平望遙自古北口山至此都盡市聲衙日集此州衙日市集海蓋午時消每旦海氣如霧至午消盡士人謂之海蓋冠帶才通漢山川更入遼春風解氷雪最覺馬蹄驕雨中聞鐘疏鐘不隔雨迢遞入重城倦客未能寐歸禽初不驚霏微通暮色颯沓隱秋聲簾幕鮮風起明朝應早晴珍簟珍簟平鋪水珠簾半捲風勞生高枕裏多事劇棋中性僻非朝隱民淳賴嵗豐翛然對松菊但覺訟庭空蟬微軀定誰恨清嘯不知勞屈宋悲秋苦夷齊臥隱高風林含咽絶露葉動蕭騷何必催搖落人今巳二毛臨雨亭秋至感人思登臨成惘然浮雲帝鄉外落日古城邉歸鴈聲相别幽花色可憐名山負獨往觸物見徂年同梅二十五飲永叔家觀所抄集近事陶公一畝宅尤愛北窗風心逺地成僻客來樽不空觀書太史氏全性市門翁豫亦何為者于兹清賞同伏波伏波志慷慨南涉武溪深銅柱功一跌壺傾悲至今吾聞威四海亦有失前禽試察兩階舞應如丹浦心客有遺豫注輦國鸚鵡素服黃冠語音甚清慧此國在海西距中州四十一萬里舟行半道過西王母三年乃逺番禺也四十萬里外孤舟天與鄰應誇王母使更遇越裳人素質宜姑射黃冠即羽民那將籠禽比蕭灑絶埃塵九月十四日于雍熙院為舅氏齋設作他時傷逺别渭北遽成悲今作終天恨悠悠奈我思平生華屋處回首不勝悲寂寞西州路何堪再到時晦日是月佳遊勝兹辰舊俗同會須陶一醉相與送諸窮江栁參差緑林花點染紅春期猶大半作意競東風新蟬五月微隂始鳴蟬高樹幽倚風偏送曉迎露欲先秋孤管清兼濁么絃斷復留年華自當爾羇客浪多愁和江學士聞蟬微陰變潛律濃霧引疏音時化能無感清吟獨有心蕭條映落日斷續響中林秋風忽滿眼嘆息嵗華深寄隱直避人非故土帶郭喜幽居淺俗情多畏新知意尚疏負暄勝構火汲井足滋疏二物關身外悠悠謝里閭寄袁陟與陟去年約夏初相見時陟自蜀江下南郡巫峽行雲外春江落日邉隔年雞黍具萬里孝亷船逺道比何若相思長渺然郢中輕白雪逸響待君傳寄范佑之時病似狂吾子世罕識他時醒亦狂由來韻高逸固自得軒昂阮籍哭道路接輿歌鳳凰之人亦豈病相嘆不能忘寄王二十纍纍煩書札悠悠感别離平生義繾綣相憶路逶迤羇旅老將至江湖天一涯佯狂人事絶乘興爾難期寄蘇州張六西風入簾幕遊子念江湖丹橘垂珠實肥魚薦玉腴他時肯招隱快意欲乘桴物色煩相候佯狂興不無寄隱直時寓汝州僧舍豫亦居輦寺俱為異鄉客似伴老僧禪虛室矜生白時流笑草玄嵗寒差自若生理直翛然無術能乘興蒼茫欲雪天寄張獻臣締交從若水百里絶相過平日相離索期年見揣摩從容席上客清絶郢中歌擬屬陽春和伊豫獨在薖寄張晉卿時棄官還家聞道新安尉清􅌡只自如歸來陶令賦養性子真書情在交遊厚心于仕進疏人憂棄妻子獨入剡中居寄范佑之范子三年别長安北望深相知非勢利寄信各浮沉勇鋭百夫敵軒昂萬里心何時殺羣賊自取肘邊金寄梅山陰縣與吳門近居家識舊遊山回江表盡水入鑑中流勝事皆高古詩懷易滿眸春風花又發能寄北人不寄蘇頌兄弟秋風生眼前客子思悠然羇旅獨無友别離私自憐賦甘傖父誚詩許俗人傳他日梁王客偏懷太子賢寄因甫昔别大梁下至今三嵗餘豈無萬里使不寄一行書風俗與時薄交遊于義疏知君淡如水非是故忘豫寄張仲謀張也真吾友今年見老成自強雖不息積習亦諸兄曲講聞師泛題詩使客驚莫如班定逺投筆笑諸生和直孺夜涼急雨逐雲過微風吹月生寥寥天宇濶粲粲葛衣輕展轉漏將永昭回河正橫秋槎舊有信忽憶泛滄瀛送楘州王學士春草碧將歇江南鶯亂飛王孫去有適綵服粲生輝古郡富山水斯人歌海沂惟應布寬詔談笑樹風徽素屏簡拙違時好丹青謝爾工坐看居士室想見古人風當戶月常入過春霜未融物情忌太白少自晦塵中城樓望春高樓新雪後春意已端倪繞石泉聲急圍城栁色齊滯流貪適興幽僻懶招攜舊種桃千樹春遊豫恐迷桃谷在樓下送邵武張學士待詔勤穿履承明厭直廬一麾從此去千騎上頭居嵗事畬田早風謡鴂舌餘班春急乘傳知不為鱸魚野思野色行行逺春輝樹樹繁看花頻落帽聼鳥久能言遣興惟詩句開懷獨酒樽誰能顧名利終嵗不窺園訪楊異寺丞楊所居在城外甚多雅致三徑向松菊始疑元亮居但多栁五樹復對隼雙旟相識是傾蓋劇談能起豫樵蘇不用㸑耳目且清虛楊新得鬱林州黃寺丞風雨中見過節物重陽晚風雲萬里陰君來慰孤憤語次豁愁心名下如舊識人間仍陸沈獨醒感庭菊蕭索萬黃金送洛南周寺丞不知商洛道空慕紫芝歌從事老將至送君情獨多雙鳧尚方去駟馬故鄉過想見揮弦樂春風初扇和弔南宜守尉百越誰生禍南宜遂不師干戈傷耋老守尉死城陴荒洞招魂逺官軍請救遲弱妻携稚子嗟爾欲何之弔亡卒厲俗侵王略祅冤積楚氛民荒誰念亂功敗失圖勳天子憂南土戈船促大軍何時收爾骨委祭越江濆和楊備國博弔屈原知音不恨逺異代忽同聲靈魂自識路幽遇亦含情􅐹記屬揚子臨淵悲賈生鬲文激頽俗會使衆人清楊前嵗夢中作詩後數月招除歸守既署事過謁屈平祠相見物色如夢中所覩作文祭之刻之于石聞夏太尉自長安徙備西邉防秋未得還戰士出長安地利山河險天時關塞寒羌夷避飛將天子倚良翰見説成功近秦中意似寬三月四日上方寺送隨州十一屯田載酒憐春盡尋芳到翠微綿綿芳草逺揚揚雜花飛俯仰悲陳迹淹留恨落暉青楓千里目那復送將歸嘯臺尚有高臺在遺名幸未空不時嗟眼白失所念途窮已矣先生意蕭然烈士風清芬定誰嗣漫嘯白雲中日晚夜步過孫監丞幽居巷南北雞犬略相聞乘興偶有適杖藜聊復勤高城秋草落密樹夕光曛微爾開三徑悠悠麋鹿羣浮舟西陽池中愛水都成癖浮舟不厭頻寒泉清見底刳木略容人故故乘流往飄飄得意真槎頭尺許地鷗鳥欲相馴乏酒搖落偏悲客清寒昜中人寂寥那自守淡泊亦殊真浮俗仍皆醉虛談浪飲醇高歌傲燕市忽憶重千鈞西戎乞降南國傳消息西戎送好音懷柔知帝力啓佑亦天心御酒葡萄逺離宫苜蓿深仍聞編舊里五嶽望君臨壽山在中京南云多老人往往百餘嵗白隰見層峯白隰即中京巉巖倚碧空上多千嵗木下有百年翁櫟社不材永東陵非義終太史公云盜跖日殺不辜竟以夀終吾聞仁且夀故在太平中爾雅距齊州以東至日出為太平太平之人仁也山寺野竹檀欒翠孤峯杳靄青山樓隨詰曲石路上青冥雲色移時合鐘聲隔水聼似聞堪避世遊子未嘗經城南泛舟三首乘興隨所適出郊聊泛然青波能照髮白鷺巧迎船老樹悲秋雨高風急暮蟬孤城隱不見落日暝浮煙不踏城南陌從春及素秋蕭條非復昔顧眄莾堪愁白露蒹葭老清風蘭杜幽佯狂驚楚俗應識棹夷猶高岸看為谷通波幾覆城橧巢非太古野俗競偷生雨逐行雲過山依返照明楚歌搖落際更動北歸情斁除蘇州掾三年不相見萬里比何如聞道詞曹掾新承選部書弓裘傳習在簪笏抗塵初努力人間世毋為薄詔除叔父初任鏑廳及第思亦修進士業皆在蘇州故略見意第五句中黃州臨臯亭春秋黃子國楚越穆陵關比屋皆編竹孤城半踐山岸泥觀虎迹雲水暗荆蠻三入承明客那能鬢不斑暴雨山晚雲霧合江秋風雨多憑夷何事舞楚水忽翻波黯黯夕陽盡翩翩暮鳥過輕舟送兩槳聞唱石城歌驟雨炎日大冶沸清風愁意蘇黑雲過山嶽白雨覆江湖倣佛鬼神戰騰凌車騎趨森然異氣象真復慰泥塗夏夜暴雨大暑積炎夏沈陰昏楚天疾雷五河裂飛電萬星懸漲澤通南國孤城鬭百川似傳黃鳥語欲反濯龍淵久雨秪憶風回雪俄驚地出雷沈隂連甲子春事總歸來湖水寒侵夜江雲去復回開年厭卑濕不待熟黃梅久雨二首江雨黃梅實湖雲起蟄龍寒生夜牀簟聲絶暮山鐘藥裹添新粉書編坼舊縫雖知恨卑濕涼夜尚吾容頗憶家居日朝眠一事無邇來趨幕府曙雨踏泥塗城郭飛鳴鶴階除戲浴鳧秋風殊不逺行欲問江鱸茶山送道粹海上相逢少山中别恨多浮雲自向闕秋水更增波攜手意不盡班荆情若何徘徊強一醉且勿奏驪歌招晉卿時晉卿到丹陽識心非識面常恨不相從那作經年别曽無一日逢興來清剡雪吟出暮山峯淨掃門前路期君馬繫松女郎臺城郭臨湖盡樓臺此地偏動搖浮積水高絶近諸天應接都無暇虛空足悟禪塵中故易厭興盡惜回船閔雨風伯會何憾高雲不少留聲如鬼神過勢卷日星浮河漢漠無象魚龍方自憂古書難盡信雩舞竟悠悠砧婦清霜石上乾孤響耳中酸嵗逼秋芳盡風量板屋寒君行自悠逺妾意亦艱難此夜關山月應知帶日寬李太傅挽詞三首數聞伏閣議屢上薦賢書任重道空逺名榮身反疏異鄉悲鵩鳥清詔隔公車招隱真虛語江湖萬里餘漢清詔使以故大夫為之報國念推轂逢憂甘噬臍孤鳴一垂翅舉俗競吹齋山鬼離居逺靈魂失路迷天高不可問愁意日淒淒識理未曾誤疾邪惟過深豈忘事反覆不忍俗浮沈去國尚回顧埋名方自今異時山水意惻惻弔鳴琴豫殿試程文特為君激賞署天下第一議者乃皆決魯拾遺挽詞二首君晉初狀元及第至其曽孫始葬市朝非故日年代屬傳聞始兆滕公室來觀季子墳埋名書故事編簡屬遺文苦恨相如賦俱隨諫草焚西晉登賢日東堂第一人競推天下士爭辟幕中賓故國無喬木流風及搢紳新阡廣陵上荒草欲含春庶幾堂閉門吾自足況亦近墻東滴滴階鳴雨梢梢竹過風緑苔侵杖屨秋色近梧桐高臥殊多興詩成寂寞中晝寢豫自注云甲子四月十七日午時作據甲子為元豐七年公是年屬奏乞以宅為寺疾愈僦居城中井徑從蕪漫青藜亦倦扶百年惟有且萬事總無如詩載芟匪且有且注且此也梵志出家白首而歸鄰人見之曰昔人尚存乎梵志曰吾猶如也昔人非昔人也棄置焦中鹿列子穆王篇鄭人有薪于野者遇駭鹿擊而斃之恐人見之也遽而藏之隍中覆之以焦不勝其喜俄而遺其所藏之處遂以為夢焉順塗而詠其事旁人有聞者用其言而取之既歸告其室人曰向薪者夢得鹿而不知其處吾今得之彼直真夢者矣室人曰若將是夢見薪者之得鹿耶詎有薪者耶今真得鹿是若夢之真耶夫曰吾據得鹿何用知彼夢我夢耶驅除屋上烏此掃除外纍也劉向説苑愛其人者兼屋上之烏杜詩主人屋上烏人好烏亦好獨眠窗日午往往夢華胥列子黃帝篇帝退而間居大庭之館齋心服形三月不親政晝寢而夢逰于華胥氏之國延州沈待制挽詞詩書謀國體談笑卻邉塵巳矣今成昔歸來悲故人餘忠焚諫草遺恨畫麒麟禁角聞鼙鼓能無憶虎臣祠部王郎中送山水枕屏作枕上萬峯合蒼蒼驚夢魂如浮武林水臥向桃花源杖屨幾時士茅茨何處村悠然獨往意欲問復忘言城樓望水是日龍挂影逺水全無地高城略近天龍吟忽半見虹飲競相鮮魚鱉爭乘渚兒童狹濟川秋風只昨日物意已蕭然送南昌郭主簿楚劒炟照地梅真從吏鄉簿書非急務鴻鴈試高翔貍品牛尾貴茶牙鷹瓜長因君訪風土遊子不能忘公是集卷十九

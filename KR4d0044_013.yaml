body:
  text: 公是集巻十三宋劉敞撰五言古詩幽懐山梁鳴雌雉節物春已深故花稍辭枝新葉漸成隂流光不可挽四序密相尋今晨已非昔明日豈復今自我愜幽獨放言冥此心胡為復屢嘆孔聖有遺音送隱直侍行陜郊相如忽將老推輓竟無力如何羇旅後棄我復逺適貧病束我身送子恨不得時登髙邱望塵土蔽西北山河繞秦隴闗陜入胸臆形勝懸眼前顧盼生感激指陳出圖像踴躍効功績朝廷厭兵久勉上平戎策九月三日逰樂郊作五言贈同逰昔在西省直常有中園思今來非吾室猶稱宣城詩芳郊後揺落秋初尚華滋丹寳何纂纂黄花復離離俯見淵魚翔仰觀雲鳥嬉物性附所適吾生亦爾期置酒得同好追勝不知疲和歌涼風起看舞白日移興言想邱壑弱喪慚旌麾負郭如辦此懐金寧足為夜月露卧微月翳西林繁星燦如錦歡言戀清景展席不遑寢涼風能相期沆瀣若可飲勞生傷局促徂嵗急苒荏為君捐萬慮髙卧且安枕因季㸃同幕中諸君過車輞湖歩行野間山野宜獨往出郭愧賓從終為吏事役猶與賢者共平湖色清淺霜落冰始凍逺郊氣氤氲臘近春稍動鳥飛甚閒暇獸起或驚縱愛此去人逺相勸解君鞚崇岡象崤阪宿莽似雲夢游目際天地褰裳凌菰葑吟非騷人怨賞及舞雩誦塗逺意逾適笑彼阮籍慟適野夏至無與適驅馬出東城漸去市井喧稍増耳目明風勁山瘦髙露寒水澄清造景不及言暢然得此生姓名謝朝隠出處與物冥豈伊漁樵合鳥獸亦不驚待此用卒嵗優㳺諧我情挽葉翰林翰林氣英發博學起徒歩初射東堂策巳稱濟時具出入三千嵗差池千一遇青雲得自致白眼與俗迕勁節凌秋旻𤣥文匿深霧尺璧可令毁堅石難使鑄董生膠西相賈子長沙傅終疑希世才良用制作誤銜悲去修門觖望動行路落落長松姿嵗晏悴霜露平生慕髙名邂逅隔清晤心許千金劍無由挂君墓端居端居亦無賴幽賞每多違扁舟試獨泛鷗鳥肯相依日暮無所詣興盡復還歸答黄寺丞九月二十一日出郊閉闗予非用適野子能謀勿言雅俗異卒嵗共優㳺清詩狀景物秀氣豁霜秋篇終寄一笑因以緩心憂讀三國志獨夜一巻史上尋千嵗間咄嗟興廢更俯仰朝市遷古人病無聞愚智矜後先共樂無窮中正如朝露然向觀功名際自以皆萬年邇來令人悲蚊蚋過目前安得謝浮俗髙舉凌九天捐書以絶學寄心崆峒仙十二月二十一日雪中早朝海風水羣飛中夜滿城雪聞雞倒衣起猶謂庭下月出門望天地髙下同瑩潔念非汗漫期驅馬正迷轍我本江湖人雲端想華闕今來怳自失旅唱空愁絶得彦文書將遊呉中微霜下芳草日月逝逾邁青青松與柏嵗暮兩相對念我平生逰孤懐用慷慨誰言干里近引領若海外清潁流東南浮雲向呉㑹臨風意莫展將子多自愛寄王子堅時在寢邱治東臯達人視天下輕重如浮雲震雷不經聽蟲飛寜足分吾慕龎徳公谷口自耕耘身世兩相棄放言麋鹿羣此風久難尚之子今復聞我亦問津者滔滔逺慙君菊花枕鮮鮮秋菊花粲粲黄金錢採掇時苦晚棄遺情所憐道人教為枕示可以延年早昧攝生術恐為多病纒又從省俗事視聽苦不便往往發昬憒未知所除蠲但使寐無覺不謂藥可痊今者誠有遇祕之愼其傳愈風得難老髙卧齊古賢作詩叙終始物薄戒輕捐答張洞推官憂患使志衰羇旅哀年邁夙昔仰髙山邇來得傾葢孤㳺幸無恨三益良有待惠我金玉音醒如濯聾瞶悵然反自感久矣病昬憊微君念氣臭誰與振菅蒯聆弦感英韶觀海憚珍怪内省終懸罄無由報雜佩洪州黄推官江表山水區南昌神仙宅固宜生賢俊邈與塵土隔昔在君伯氏實為萬夫特文采何輝煌聲名盛赫奕差池中道夭冥漠神理黙徳業誰與倫天倫自準的龍蟠豈終潛鳥伏必逺擊君今鍾其美逺到未可測聞官輸竹箭毛翎邊兵未云備競矜弓弩强斯人久銜恩獻力固所當上山伐檀欒入林候飛翔豈無解網心大義須勤王安得㑹稽嶺集居共工旁安得解羽澤在君禮義鄉山海經羣鳥解羽有大澤剪翎副之箭一一堅且良朝發摧西戎夕發斃東𦍑不煩天下民萬里坐寧康秋日平日日在簷今日日在堂西風稍已急百草不復芳蟋蟀何獨悲戚戚鳴四牆客子多所感中夕起徬徨貧病自早衰何必秋氣涼心憂不能眠非惟寒夜長桐軒晚坐孤軒遶危桐颯颯聞閙雨驚起視前除飛花亂如舞輕香密伊席晚景容當户玉粉散㳺蜂珠華濺髙宇紛紛綠苔上半已隨泥土邈彼丹穴鳥何年翥文羽芳時不可驟嵗晏聊容與李覯以太學助教召曾鞏以進士及第歸俱㑹郡下素聞兩人之賢留飲涵虚閣孤鸞方北㳺威鳳復南翔邂逅中道遇其音何鏘鏘太平向百年此固多美祥擾擾都人士爭先顯輝光雖無醴泉流江水清且長雖無朝陽桐翠樹茂且芳念將萬里逝願得少徬徨為君賦巻阿因以謝楚狂秋晴浮飆解重陰白日麗青天凛凛秋氣肅蕭蕭風景鮮脂車駕我馬覽物往于田幽興未能盡中途復來旋古人不可及獨往秖自憐豈若偃吾室優游以忘年曉晴朝光出屋角鳥雀聲正喧天寒未能起緼袍有餘温智士困朝市勇士敝中原自古貴髙卧豈嫌長閉門送蔡奕同年功名貴早達時俗輕小官念子兩未適出門何獨歡古賢有祿仕先聖戒色難義慊固為美勢卑豈足歎采蘭嵗云暮接淅心不安宛轉腰間絲崔嵬頭上冠車馬有光輝里閭有聳觀勉旃愛玉體自致青雲端送裴煜同年裴侯江海士往者未相識但聞太學生素號萬人敵羣雄㑹南宫精鑒動宗伯先鳴氣軒昂一日聲烜赫青雲開岐路黄鵠張羽翮多幸旅後陳同時被親策指縦聽髙論洒落駭餘力不意沈下僚于予有愧色蘭臺校中書幕府贊婉畫起家固多榮負米輕逺役此心古人少于義吾子得秋風感羇旅道逺思自適送楊闢同年昔在谷子雲語妙氣縦横遨逰五侯間談笑臨公卿丈夫伸知巳未必老一經懐寳迷其邦古人誰謂平楊侯東州客三嵗不飛鳴雜沓二府書繽紛委弓旌結靷西入闗長揖謝諸生風霜豈不永意氣故自輕伊昔惟一劍蒯緱吐悲聲當令代舍長見我珠履榮秋月暮歸欲投息明月强我行越陌復度阡古人知此情叩門童奴走升堂兒女驚呼酒徑就醉益復招友生不可不與飲子眞勝公榮顧聞四壁間絲竹金石聲此非孔子居那得爾鏗轟夜䦨興不盡積雲解我醒噫嘻王子猷浪得千載名韓文公畫像分題微言昔廢絶大道隨荒榛上下千嵗間天將復斯文若人實命世述作參鬼神横制萬里波不為流俗珍大音破昬聾有若雷霆震惜乎世莫用竟以竒怪聞哀哉揭陽貶勢屈道則伸孔子亦有言求仁而得仁我昔讀其書固常見其人邇來觀遺像忽若平生親輪扁不言巧丹青豈復真尚存髙山意俯仰冀日新楊十一沒後重登見山樓有感平生交一臂觀化此山川俯仰成陳迹髙低俱絶弦浮雲杳何處衰病兀蕭然擾擾紅塵合誰予慰目前卧北牕下讀書髙枕北牕下柴門晝仍闗偶有微風至欣然解人顔瞑目恣逺想超遥出塵寰自昔太古來幾人得此閒讀書取適心名譽非所攀堯跖本不辨況乃章句間牛羊死牢筴麋鹿安深山牧性有不齊何知智與頑寄贑相去不在逺百里若異方相别不在久一日如嵗長我昔不願仕㑹知出處妨因循竟不免密勿猶自强黙黙抱逺志悠悠視流光豈知豢雞鶩止欲歸稻粱飛鳥呼其儔羈馬憶故鄉況兹平生懐奔走非所望朝吟在子邊夕夢居子旁嵗暮菽可採云誰助傾筐桑落酒當熟誰復共稱觴忽忽無一歡昬昬坐中堂拂衣告言歸念彼穉且狂作此聊自娯我思不能忘八月六日寄鄰幾諸君謬為天官屬得與選事親略計三百州綠衣九千人今日以前在曹人數較材迷長短守法愧因循救末知不足澄源力難伸諸君備鄉老多士競國賓鑒形肖止水播物參洪鈞解論皆造微詳延必逢眞仰成寛吏責端本慰吾民功則太平始任非百職倫聚精㑹冠劍重鑰閟埃塵寄重地必禁問迹疎無因風雨何蕭蕭雞鳴夜將晨一日如三月況兹别累旬寄王深甫前日君逺逰相憐每獨悲寧知君未返自笑還若兹賢者易姓逃聖者微服馳聖賢不必容吾道其如飴浮舟潁水清逺與塵囂違卜鄰西郊郭得近樵漁期主人文章伯聲望髙一時平生莫往還見我如舊知勢與年俱忘胸中坦無疑人當意氣展何有憂寒飢反思萬類情紏纒未易推向者雖定居睽孤常不怡邇來暫奔走師友足自持物或損而益吾又何怨為且苟無陳人吾豈能至斯嵗窮景蕭條多感令志衰須君濟其弱嗟子何當來風雨寄貢甫積雨不自巳季秋聞驚雷行子方逺道憔悴感我懐流潦紛縱横髙岡蔚崔嵬左右無所覩出入蒿與萊百歩一躑躅十歩一徘徊村墟斷人煙沈竈或産蛙日月懸一隅雲霧安得開天逺人事邇勞生使心哀獨不如鳧鵠奮翼超髙飛相望空長歎撫襟泣如頺寄王深甫城東與城西相去咫尺耳不得同朝夕譬如隔山水況兹歴三秋正復累百里念我誰與逰悵然豈能已古人稱莫逆未必居密邇自嫌感豫深更失笑談理寡陋使心憂空虚見人喜觀過而知仁且當謝君子寄論翊走馬平舒道初日明三峯嵐光共淡蕩千丈青芙蓉伊昔臨畫圖但愛神仙蹤安知復壯麗翰墨難為工我行天地間異景曾此逢至今想見之秀氣常沖融世事勞人生壯年成老翁山中定見佳恨未與君同寄永叔永叔後予數日使北俱持强漢節共下承明殿相從不相及相望不相見平生慕儔侣宿昔異鄉縣展轉多逺懐恍惚猶對面桑乾北風度冰雪捲飛練古來戰伐地慘澹氣不變贈君貂襜褕努力犯霜霰一尺握中策無由奉深眷寄鄰幾昨日非今日今吾非故吾蠱鳴知嵗晚鬚變哀年徂萬事異俯仰達者與化俱故人千里外髙義獨何如眷眷尺素書湛湛雙酒壺勸我加餐食示我長相於可憐平生好不異東西居我今心如結那得從公舒寄佑之長安風塵地見子若舊交意氣何激昻骨幹真蒲梢戎馬擾邊封殺氣連二崤丈人國長城多壘憂四郊勁兵向海西千里沸鼓鐃共傳校尉印勇略如虎虓功業繫感激念當覆妖巢秋風日夜清敵人知折膠努力張國家寄聲慰衡茅寄貢甫貧别書信闊接壤如天涯沉憂心膓窄少日如嵗時食荼苦在味集蓼辛在外百感従中生通夕不遑寐世路豈飄風游子常轉蓬鏡中見二毛何啻非老翁晚慕馬少游結廬守鄉井簡略或易足長當並形影寄張宜福州人敎弟子數百人多成進士者張君于福樂先進野人也曩者吾見之大驚彼何者鬚眉交蒼白被服必儒雅故善殷周間不居王鄭下諸士多及門之子獨在野食有脱粟飯出無欵段馬鄉閭行雖髙時俗知亦寡昨聞修庠序造士繫陶冶斯人宜聘起可以專楚檟養賢須勤渠風教隨用舍望君萬里餘誰謂我心寫寄阮二舉之楊十七彦文我昔居宋都潛有伐樹憂不期得君子卒嵗同優㳺楊生舊相知情分故綢繆阮公出傾葢而肯如白頭古人有忘年嗟我非此儔譬如羔袖微豈可參狐裘知人視其友孔聖稱焉廋所以梁楚間亦聞東家丘相從未云厭相别難自留贈我數百言精神露蛟虬楊子期我用謂當佐王侯阮公推我文云可齊尹歐斯言豈易當斯道豈易求奈何千金珠中夜而暗投書紳願自勗雜佩非可酬欲知相憶心淮水清悠悠寄楊阮中堂明華燈宥坐湛清酒筆硯居我前史籍在我後君知我不樂我念平生友强醉誰與歡悵然夜將久温柑后皇富佳樹柑實掩羣衆磊落驪珠圓參差金壺重剖丹瓊瑶碎蓄潤霜雪凍封苞萬里險照耀髙堂供憶昔伯禹籍蒼茫闕斯貢及乎騷人賦流落遺爾頌反登橘柚輩海物隨錯綜圖諜迷萬世不平竟誰訟頗疑古未有彼故得豪縦溟海通蓬萊近由仙者種又疑美過絶䜛口斥不用寂寥三王時此理彌可痛安得舉其族北遷越巖洞嵗比萬户封蠲煩與人共贈山僧貧病不出門趣與時俗乖髙卧謝賓客秋葉忽滿階今旦為誰埽釋子逺見懐問我平安否曠然外形骸貌疎意如眞語淡情反諧旅人非一感及爾能安排聞道常愧晚智也豈有涯他日更解榻虚談慰心齋達師師雖支離流于道乃全人未嘗事感豫來者自欲親時時平是非往往動精神縱横及萬事慷慨驚四隣乃知全一身不必山野民乃知憂當世不必朝廷臣語黙兩有適動静皆可循彼哉小丈夫孰能識吾眞喜晴寄彦猷積陰向十日不見江南山何意浮雲盡依然庭户間芳草晚巳歇瑶華初可攀故人在逺道悵望凋朱顔永叔西齋送沖卿知陜府得華字我求一州牧竟至無津涯相看佩銅虎似欲凌青霞分陜本相事憩棠成棣華君元兄大資政于陜有遺愛優游山河勝肯厭多風沙後出郊二首人逺地形曠氣收天宇髙不辭乘興出直恐應接勞送雁時揮弦羨魚復臨濠君知適意樂未悟生二毛歳晚農事畢里閭競歡然相見有餘情獨游頗忘年上懐羲皇世下感沮溺賢豈以六金印而輕二頃田黄詩中頗有田野意故及涼榭許道寧畫山許生擅邱壑融結隨毫端醉埽堂上壁參差皆可觀飛雪暗連峯對之中夏寒吾能捐萬事于此聊盤桓公是集巻十三

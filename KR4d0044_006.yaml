body:
  text: 公是集巻六宋劉敞撰五言古詩今古路出門道路多縱横不可測我今欲逺行須問曽行客徐徐逄路人借問青松側客曰今何徃答之遊京國客乃指要路而言行有益古路雖大道不如今路直但行今人路猶如假羽翼彼客别我去獨自躊躇立為見今古路信乃無差忒今路足輪蹄古路多荆棘欲行今人路恐背古人迹欲行古人路今人笑迂僻又擬不出門奈何飢寒逼哀哀此時路悠悠蒼天色不避今人嫌路須行古陌古陌雖然逺且保無蹶失勉哉自勉哉前去難云適不獲見楊朱萬古凝愁魄曉至池上宿雨墜高葉薄雲麗朝陽園林澹澹秋庭户蕭蕭凉水淺魚怫鬱荷深鷺低昂幽懐欣自得住賞契所望忽恐羣動作深林沸蜩螗晚凉落日蔽崑崙微風起閶闔蟲聲語悽惻樹影翻離合蚤露結明珠圓蟾瑩塵匣浩歌始自放喟此區中狹金山東崖北望海門憑高仍一望北固何崔嵬地形東吳越江險通卭崍英雄既已矣壮觀空在哉寂寥寒潮上孤帆當檻來屏上兩賢二首謝公樂山水不以官爵間天機有所賦世俗從爾訕上躡巉巖峯下㺯清冷澗吾生慕如此敢避刺疎慢寜為途中龜勿作蒿下鷃謝靈運人在誰不如妄為世所束興來當自徃興盡期自復大雪暗溪路新晴月微燭去非之子慕返豈斯人辱優游便所適偃蹇媚幽獨王子猷贈梅聖俞耳聞梅聖俞及此将十載洛下聚英豪文章富如海聖俞昔與銭丞相歐陽公尹洙王復㑹洛中皆名士聲名動冠劔久合參朝寀何意幕中客新違江上宰聖俞以諸侯從事知建徳縣罷歸京師材高雖用晚大器終有在三公識者多薦抜可立待棲棲九衢裡塵土増厭殆相逄恨知晩乍似去貧餒鄰居幸見過沃此胷礧磈登禪智寺上方贈同遊諸公重岡抱城起清川帶野回舊都遷陵谷遺寺空池臺脩竹入晻靄荒溪轉崔嵬鳴禽畏人起故老驚客來置酒感興廢浩歌寄歡哀伊昔游此人于今安在哉谷深春先覺地爽景後頽造適假一笑願君盡餘盃楊白花飛飛楊白花随風渡江水江水來不極楊花去無已鴉啼淺深樹雪落千萬里春風傷人心緜緜復如此涵虚閣玩𤣥猿孔雀清池明夕景高樹含凉風巴猿戯前檻越鳥安深籠悲吟激清漲文繡揮䝉茸弱喪不自非全生或為容曠然感真樂逹哉濠梁翁雨霽同望民登西北樓雨餘暑氣滅日出浮雲開高樓極逺目百里無纎埃山形西北騖江勢東南來舊都尚能記北觀多可哀微風激清嘯浩霧侵寒杯亦知非吾土聊復樂徘徊秋典三首微風起閶闔秋意日已滋隂蟲羣悲鳴草木同變衰天道雖茫昧平分為四時功名自當去揺落獨何悲魏牟貴公子沉没功名間一浮江湖水惨戚頽朱顔魯連揖萬乘蹈海如忘還棄世脱敝屣風流安可攀耿耿河漢輝中夜西南流牛女永相望婉孌悲素秋安知乘槎翁徑出海外遊天路或幽險神仙非所求留城子房廟大風起豊沛海水羣飛揚逐鹿未有歸飛熊猶道旁一見契千載立談開八荒蛟龍不可羈鴻鵠得新翔昔為黄石師智䇿無與䨇晩蹈赤松賞功名忽如忘由來神仙流理與天地長陵谷自有遷若人豈復亡我行覧遺蹟城邑空蒼蒼感古追逺遊白雲杳無鄉同介甫和聖俞贈狄梁公裔孫陳平智有餘周勃勇無敵兩人相提衡終復漢社稷梁公柱石姿獨立謝羣力匡居多直言薦士有深畫既扶将頽運復起未然䇿事業兼二子浩然雪霜白偏材戒獨徃特達見令徳誰謂十世逺風義猶不隔末孫何支離畎畆有餓色明詔問樂鄉布衣列士籍名垂天壤間氣使懦夫激聞君啇聲歌更若出金石贈聖從待制君居御街西我居御街東如何百步間十日不相從君非園中植落落千丈松我亦湖海人庶㡬孤飛鴻俱逰人世間俛仰豈不同蕭蕭髪向白哀哀嗟轉蓬仕固不期逹貧亦不諱窮行當一麾去幸識攖寜翁早至凉榭觀芙蕖林深池亦淺日出光晩及粲粲花尚含漙漙露猶浥良魚潛復躍幽鳥翔又集物情怳如慕心賞浩難戢誰能贈逺人采采空佇立同客飲涪州薛使君佚老亭百尺井底泉激輪乍飛流潺湲入庭户宛轉如奔虬主人三署即持節西南州棄之臥故里富貴安足留郤埽長閉門贏餘非所求官來坐林下樽酒相獻酬未嘗語朝市餘亊良悠悠乃知獨徃意不必山林幽衣冠多雋才繼踵公與侯誰能懸其車五十未白頭嗟嗟賢大夫此風可鎮浮為問三輔間何如馬少遊曲水臺竹間黙坐杖履不能逺逍遥池上林微風起衆響炎日隔繁隂斐亹激流泉間闗語鳴禽放懐在離人寄賞欣㑹心既謝朝市喧亦忘山谷深雖知非吾室猶以開煩襟永興軍中凉風響高樹清露墜明河誰復夏夜短已覺秋氣多豔膚麗華燭皓齒揚清歌臨觴不作意奈此粲者何北軒手種竹兩竿近輒有甘露降其上作五言示諸同舍秋來手種竹憔悴不成林復此雪霜晩空驚孤直心如何沾瑞露似欲慰窮隂珠華粲将墜玉色潤還深含春乍荏苒載日尚蕭森𤣥澤非人力樵蘇無見侵舅氏見索新詩賤子本不學大賢宜見踈奈何手賜教反謂詩起予高義終炯然内慙良闕如得非魯仲尼不廢狂接輿羇旅習荆楚荒唐存簡書敢驚和者稀長恐歳已徂雲漢回天章圖書祕石渠瓊瑶落咳唾寒暑随吹嘘百年渭陽悲萬古秦風餘嗟我送舅氏終焉非路車贈蘇頌犬豕䝉虎革氣能懾羣雌衆人見之美蘇生見之嗤褐客懐寶玉精神暗塵緇他人望而唾蘇生望而知知之竟何補位下容貌卑雷同世方尚獨異誠難施嗟子豈不謬拳拳心不移拜我呼我兄問我謂我師奔蜂負藿蠋誰道當其宜憫子空慕古且為世人非古人亦如此如此名已垂但當勵行習慰我千里思雪後城上作雪後原野曠春生風氣和藹藹林表色輝輝池上波形閒境逾静望逺意更多年華適可玩不醉将謂何寄因甫君雖委計吏官似宣尼公貧賤更何恨優游聊與同忘懐䲭夷酒乘興松江風此亦隠柱下何用臥隆中寄聖俞徘徊帝城裏獨詠有所思故人昔别此秋風今古兹流水去不已新鴈來有期寄聲可相及一見慰天涯秋雨天道去人逺好惡常若違始耕苦炎旱既穫雨過時憔悴兩無補飢寒方自兹素飽猶可恃眷言采其薇寄密令楊彦文再舉學官皆中正三年不相見相見當何時曩别不謂久後期庸可知周南滯留地宿昔太史悲春草愁山中王孫髪垂絲懐寶常若迷獻玉常若疑聞君已屢薦終歳獨差池得鹿在詭遇亡羊實多岐著書成自樂回首空相思贈黄子温别䨇鴻俱異鄉來集清川流鳴聲偶邂逅形影共沉浮一以風波去一以罦網留去留雖殊趣失侣自懐愁五里一斂翼十里一回頭有情同覆載誰免顧朋儔南國江海闊豐年稻梁優力弱霜霰繁無因攜汝遊同謝十三賦盆池碧沼含白水動揺明鏡光浮沉見魚樂舒巻聞荷香賞翫兹有適紛囂因以忘多君江湖意不復疑坳堂庭前箭竹冉冉東南美託根郡在兹鳯凰不可待歳月方屢移非復山林意空餘霜霰姿清風有時至獨與幽人期新置盆池種蓮荷菖蒲養小魚數十頭終日玩之甚可愛偶作五言詩采芳未盈手積潤不滿尋游魚亦何樂幽客同此心安排在所寓相與忘浮沉濟理趣自足孰知慕高深鵬翻蕩滄海龍起焚山林體妨反多累豈若終蹄涔送鬱林楊守鴻鵠懐逺心不畏霜露寒鷄鶩守樊籠朝遊暮來還人生感意氣朋友死一言况分社稷憂復在君臣間楊侯一麾守萬里蒼梧山瘴海不可游衆人昔云難升車獨慷慨即路無險艱乃知抱忠信可以居夷蠻昔賢尚功名天子憂南蕃報國恩汲汲勿令歳月遷送春莫埽林下花花存春尚在一随南風散飄忽不可待四時相乘凌萬物随變改不如玩三秀忘年蹈雲海答舅氏時詔不就學官者郡勿舉故見督赴期飛鳥知深林潛魚樂淵濬升沉久相笑出處各自殉漆雕不願仕孟子恥獨進軒冕世所榮吾斯未能信辟雍焕文章王國聚英俊及門足自喜内省媿多吝且将事畎畝亦以樂堯舜悠悠謝知音當識斯言訒送張宗道崇班自潁徙秦不樂于行宛馬來東道燕鴻起南飛適時必有遇去逺不獨迷左攬繁弱絃右拂青萍輝笑作千里别出門亦依依人生何新故行道情有違勉率歌清風以慰君永懐陳元龍元龍湖海士固有湖海氣自臥百尺樓羣兒仆諸地大賢資逺到高節邁一世四野為戸庭九河乃衣帶靈機有時屈英識豈獨閉蛟龍随波游恥與魚鼈計撃劒歌啇聲捐書謝俗議功名留當年異代見君意一月贈深甫一月三過公此非兒女情詩人感伐木相鳥猶嚶鳴尚友百世近結交千里輕矧惟生並時况復居同城攜手未宜少興發從公行開口露肝膽觧衿頓塵纓心親愛自至外物都忘形赤日留中天火雲正崢嶸頗復哀老子安眠枕羣經懷歸徃昔佩觽日童䝉幸相求中間萬里别倐忽二十秋人事固契濶歳華易如流聞君尚黄綬失意成白頭奄速不可期升沉亦難謀寜知及門晩忽辱從政優感舊勞心腸相逄恨淹留寄聲不盡意何以紓離憂同寄題康州陳生連理木幽人吉素履佳瑞應精誠蕭蕭衡門下珍木為之榮連理出高榦交隂庇前庭顧恐俗未知天方表其閎太邱徃千歳慈孝復騰聲誰言報施逺有若晝夜明世悲上留田吾慕董生行作詩寄南州且以慰父兄雪後雪銷吐膏潤日出春意歸藹藹多時趣融融含夕暉徘徊終林下髣髴田野期天歡頗不減吏隠亦庶㡬歳宴竟何事濁酒但當揮和彦文秋興商飊零枯林疎雨堕中夕覧物愴已驚懐人𣺌難得明發聆逸唱願言慰幽寂胡為抱紆鬱更使動悽惻蜚鴻識來賔鷹隼知所撃物微有逄辰子北獨失職高夭終難問淺俗每忌直浮沉豈非智器逺固難識贈周生騏驥能千里不能走䑕穴猛虎拘穽中不如狗善齧周生學干禄强進屢顚蹶時不用周生周生亦不屑行年過五十頗就知命説未嘗畜妻子名利敢貪竊所憂道未能欲辨孔與桀人知如此鮮况不厭藜蕨與我始相見便覺抱高節人皆用其巧子獨趨所拙春秋舉逸民蔽善尚貶絶誰期大夫賢薦使在班列嘯亭納凉翻翻竹梢葉習習蘋末風水氣稍澄澈雲隂反䝉籠解襟面虛曠幽興欲飛冲得意恥獨善慨然環堵中過澶州陽橋有感河水東赴海還從天上回寕知今日波還復前時來岸栁亦已荑原田正莓莓念我平生歡悵然使心哀春晩小園歳華一何速春物俱已老緑柳低映墻臯蘭生滿道郊居止幽曠野色慰懐抱入鳥不亂羣閉門但郤埽平生佯狂性更覺高臥好不及古之人吾誰玩芳草公是集巻六

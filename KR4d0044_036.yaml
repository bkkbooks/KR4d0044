body:
  text: 公是集卷三十六宋劉敞撰記天台山記汝陽地理書有天台山在今縣北三里所其高尺餘傳自古至今莫有能損者其上土其下石也亦曰天中山以為豫州于四方最中汝南故刺史治于豫州亦最中是山于汝南又最中蓋處天地三萬里之極自古考日景測分至者皆莫正于此以是名之其傍有祠其主山也其神為蛇黑文而赤章其見無常或修或短或幽或明民有不恭事不信不飭則變怪動之其地居屯營營之士嵗時獻享之夏丞相之為此州嘗親至其處祝曰蛇若使吾見之吾力能大而祠莫見丞相去未能數十步遂見從騎多見者猶蛇也其修尺丞相亦遂不復顧然吏民亦以故加嚴畏之或夸誕過其真要之有山之名無山之情而民不厭以山稱之蓋得四方之中易所謂地中之山謙尊而光卑不可踰者也故作記表其地雙廟記淮西于古為豫州唐武氏改制稱受命諸李多失職越王正以刺史與所部兵討不當立既而兵敗王自殺吏蹤迹黨與窮治之數千人皆列大逆于時武氏方以刑立威大臣坐飛語不問曲直皆族夷以故知越事多濫無敢救者狄梁公為刺史獨倡言脅從非首惡不當坐奏疏免之竟全此數千人其後百餘嵗當憲宗時豫州已更號察節度使吳元濟據城反天子引天下兵征之不順攻之不勝戍之不服丁壯苦軍旅老弱疲轉餉士大夫咸共怒而將顔將重將古將武將通四面擊之以盡力戰盡誅為意而李太尉獨任智策夜入其城縛之不殺一人所以使百姓復見禮義脫于戮死嗚呼梁公可謂賢相太尉可謂賢將矣其恩厚其施博尸而祝之不亦宜也哉開元中刺史元通理始作感德碑載梁公之仁其後段文昌作平淮西碑明太尉之功而俱不為祠堂使民無所追享宋興八十載知軍州事王質詢問其故歎曰善為後慕之也豈可使二公不祀哉度地以作廟異室而同宇南面上左未及成質遷又十餘嵗數換守帥莫克就者今太守至遂就之庭宇甚設儀衛甚飾嵗時報焉水旱禱焉嗚呼德之不朽者如此夫使凡相者而皆若梁公則治安得不平使凡將者而皆若太尉則功安得不成然則廟此者非徒思昔人而已亦為來者允蹈之也不可不刻石以謹其始故于是乎書質者丞相旦弟子清淨慈惠為政不煩苛官至天章閣待制尚書郎中所居見稱云某月某日劉某記王沂公祠堂記齊魯雖皆稱貴文學尚禮義之國然其俗亦與時升降小白右功力任權數則其敝多匿智伯禽尊尊親親至其衰也洙泗之間長幼相揖讓其失蓋以逺矣然仲尼稱之曰齊一變至于魯魯一變至于道由此論之非明君賢師扶世導民孰能反其本哉五代之亂儒術廢絶宋受命垂七十年矣天下得養老長幼無兵革之憂庶且富矣然未有能興起庠序致教化之隆者也自齊魯之間弦誦闕然況其外乎丞相沂公之初守青也為齊人建學其後守鄆也為魯人建學由是二國之俗始益知貴詩書之業而安其性之所樂老師宿儒幼子童孫粲然自以復見三代之美禮讓日興刑罰日衰嗚呼君子之盛德大業哉孔子所謂至于道者非耶沂公薨于鄆且二十年鄆人愛慕而悲思之僉曰不可使文正之德不享于世前太守錢公子飛聞之因即學宫而建祠堂以稱士大夫之意錢公去位之五年堂乃成其廣若干修若干崇若干凡皆錢公之素也甘棠之詩曰勿翦勿伐召伯所茇亦諸侯之正風哉序其語于石以詔後世又作登歌一章并刻之云文武維周天命郅隆孰相其成周公太公周公冢宰太公尚父遜厥碩膚惠于齊魯維此齊魯聖賢之緒尊德樂道四方爰茹不振不競靡則靡定既晦而明在我文正天子是毗諸侯是師賦政于外俾民不迷乃設學校乃敦詩書翼翼齊魯若周之初二公之位文正履之二公之治文正以之周厯千嵗二公實使之文正之功後亦將似之徂徠之松新甫之柏我作此堂以告無斁待月亭記春卿劉侯監兵于兗之明作作新基移舊亭于園池之亷名之曰待月一日燕賔友之酒三行客有長揖主人請問待月之旨答曰先是置有西園園有舊亭昔人尸之荒榛與并栖雞于垣間馬于楹或寢以羊或宿以兵有風至止林籟少清有月來思池光不盈一日植足于園縱觀而嘆曰景物否閉久矣將祈泰于豫乎由是呼卒夫具啚挶輦糞穢鉏蒿茅一之日培竹與松育美材也二之日浚池及泉養清德也三之日因池土以封其基四之日即亭材而廣其構不役于民不擾于公以潰于厥成魯山巖巖惠我蒼翠魯水湯湯遺豫潺湲而又周公之宇仲尼之鄉聖賢遺迹盡畫于壁若有神物陰來相之或疑化工私以與之夫亭以池遷盡能事也月以水鑑取善類也豫今是亭西南去天空曠千尺不植草木為月之地若秋之夕夏之夜素魄初上納于清池嬋娟淪漣相與為一如金在鎔如圭在磨忽憶湘江之流若洞庭之波登斯亭對斯景發吾之浩歌則待月之名不有當歟主人之詞既畢客有舉觴而言曰春卿吾聞士間燕相與言則及仁與義又曰文武之道未墜于地在人賢者志其逺者大者君今揭亭待清月宜乎禮賢材廣賔友求仁義之説與文武之用內則思建明堂興辟雍與三代之故事外則思復河湟平薊壤續漢唐之舊服用之則為事業為功名垂光册書不用之則有孚在道以畜其實與夫晏安之流遊西園寢北堂同心而異志焉主人曰晉人善禱或譏輪奐周人落成秖美寢興吾子博吾以王道勤我以功名君之言古人不如顧謂敞曰先生業文為我書今日賔主之辭與亭成之嵗月敞固不讓云東平樂郊池亭記古者諸侯雖甚陋必有苑囿車馬鐘鼓之好池臺鳥獸魚鱉之樂然後乃能為國非以娛意崇不急也以合士大夫交賔客賢者而同吏民也蟋蟀山樞車鄰駟驖有駜之詩是已不然則觳觳者墨術也不侈于禮樂不暉于度數曰人我之養畢足而止亦瘠矣夫東平蓋古之建國又有州牧連率之政于今為重其地千里其四封所極南則梁東則魯北則齊三者皆大國也其土沃衍其民樂厚其君子好禮其小人趨本其俗習于周公仲尼之遺風餘教可馴以詩書而不可詭以朱墨詭以朱墨鄙矣鄆故有負城之園其廢蓋久士大夫無所于遊四方之賔客賢者無所于觀吏民無所于樂殆失車鄰駟驖有駜之美而況于蟋蟀山樞之陋敞以謂非敦詩書節禮樂之意也據舊造新築之鑿之增之擴之營之闢之有堂有臺有池有榭有塢有亭有館有南北門堂曰燕譽臺曰陳戲池曰芹藻榭曰博野塢曰吾竹亭曰玩芳館曰樂遊南門曰舞詠北門曰熙春其制名也或主于禮或因于事或寓于物或諭于志合而命之以其地曰樂郊所以與上下同棨者也其草木之籍松梧槐柏榆栁李梅梨棗梬柿安榴來檎木瓜櫻桃葡萄太山之竹汶丘之篠嶧陽之桐雍門之荻蒲圃之檟孔林之香草奇藥同族異名洛之牡丹吳之芍藥芙蓉菱芡亭蘭菊荇茆可玩而食者甚衆孟子曰賢者而後樂此不賢者雖有此不樂也吾其敢自謂賢乎抑亦庶幾焉後世將必有追數吾過者矣吾請以此謝漢中三亭記五年伯父以選為興元既至平獄訟時賦役協羣吏程百工政事備舉矣明年作亷讓弭節漢三亭于是相攸面勢或因或創高其閈閎厚其垣墉謹其塈塗以交賔客以休王人以燕僚友屬役于其二蔣侯瓦木之費不出于府而財有餘板築之任不求于民而力有餘壯麗之度不越于法而巧有餘處者欣欣來者熏熏而是嵗大有年禾合穎木連理牛兩犢百姓胥慶吏請著記患不得其説伯父因舉圖授某某以為凡南面而聽治者皆公侯公侯之于其國有所興無不記者其在春秋作南門新延廏築王姬之館或以得其制書或以得其宜書或以得其時書嗚呼聖人治天下必自人道始而世或以為不然靳于財嗇于力陋于禮故郡國廢送勞之節簡燕豫之樂夫興元固都會也使四方之賔來而無所于接三監之大夫至而無所于息執政之士勞而無所于遊又何以觀政也哉作三亭而可以觀政非得其宜乎有因有創因者無絶也創者無侈也非得其制乎不傷財不害民而嵗以有年非得其時乎是三者有一焉固書于春秋矣況其參也哉某請進此説以示後世之君子後世之君子將大有得于三亭焉爾若夫風土之樂山川之美耳目可及者不足道也某年月日某記嵗寒堂記天聖中伯父為蕭山去十二嵗而吾弟和亦為蕭山蕭山之人固望而喜矣和至官盡復修伯父之政而不敢有加焉居數月作嵗寒堂者故便廳之廢為庖者也因其牆壁而堊墁之因其棟宇而端治之因其松竹而封植之為之令名以寵嘉之而吏民乃皆喜曰果也吾侯善起廢者縣故無射堂和乃益其東偏作求已亭以交賔客接賢者修弓矢射侯之禮而從之遊者皆歡然忘歸或遊揚侯聲浸尋達于淮泗之間長老聞者咸悅和于是欲記其指于石以示越人吾曰凡有百里之地者皆曰國君國君之所為百姓之所視也將由乎愛民勤政之為乎則百姓喜將由乎廣已造大之為乎則百姓怨是故不可不慎也今和嵗寒堂能使吏民信之作求己亭能使賔客樂之是亦足稱矣始伯父為蕭山鑿鄭渠以便國漕嵗省度支錢纍百萬而不名其功君子以為難百姓歌美之今和益樹政又能使百姓不忘者吾見嵗寒求已與鄭渠偕矣嗚呼吾因此又有感者凡天下之事先王之政其己廢可起如嵗寒堂者衆甚凡當世之俗聖人之禮其已忘可舉如求己亭者亦衆甚誰為君子果而行之乎此非今所得及也姑以書于石達吾心焉爾慶厯三年十一月劉某記欣欣亭記劉子作欣欣亭先是𢎞農楊異亦為欣欣亭自為之記序其所以欣欣之意或曰子之欣欣楊之欣欣歟劉子曰否可得聞歟劉子曰何為其不可也吾得所以居此者達亦欣欣也窮亦欣欣也富亦欣欣也貧亦欣欣也人知之亦欣欣也人不知亦欣欣也欣欣之實盡于此矣吾又嘗聞夫戚戚之實未盡于此嗚呼戚戚之實窮亦戚戚也達亦戚戚也貧亦戚戚也富亦戚戚也人不知亦戚戚也人知之亦戚戚也窮而戚戚者為達也達而戚戚者其又有大不達者存貧而戚戚者為富也富而戚戚者其又有大不富者存人不知戚戚者為知也人知之亦戚戚者其又有大不知者存嗚呼吾敢為戚戚毋欣欣乎吾請以欣欣之實為終身之居豈直亭也而道之哉伯父寶書閣記初伯父以尚書郎致政歸築室于蘇之長洲曰吾昔為之宰矣賦役吾未嘗不均也因其力而時使之獄訟吾未嘗不謹也察其情而恕思之人皆思我後世居之安室既成聚書數千卷覆以重閣指之示子孫曰此先帝以賜先子者也此先子所以教後嗣者也吾嘗以此事親以此事君矣行年八十無悔于心者今以遺汝吳中士大夫聞若言皆記以為惇史某以為古之君子莫難于擇所處擇所處而當故令聞長世其身休焉伯父之卜居也于人之我思其遺子孫也以己之事親與君而歸于無悔心忠信學問而己矣牛羊倉廩金玉之富不預焉頌不云乎在彼無惡在此無斁雖龐氏之義何以逺過于是名其閣曰寶書閣而刻其語于石使後生有述焉若夫棟宇之制奢約之度智者可以觀其則仁者可以見其志非為者所及也嘉祐三年正月右正言知制誥知揚州軍州事某記三脊茅記古之祭祀無不用茅者而至于封禪則必三脊茅以為神藉三脊茅出于江淮之間蓋非其地不生而江淮之間則皆楚越國也有王者則後服無王者則先叛自三代之君莫不患之故封禪者必三脊茅其意以為能服楚越使以其職來貢則三脊茅可致三脊茅可致而封禪乃宜矣古之人非輒貴異物也事理相起知其必然爾周衰齊桓公霸天下其功大而自矜欲遂封太山故管仲亦以三脊茅止之是所以不能致者也三脊茅既非世所常玩又封禪之禮希闊不講故學者往往不能得其名先帝將封太山責三脊茅于荆荆人莫識有一老父識之然後得貢于天子天子竟至太山而還以老父為有人助賜九品之服嗚呼非明天子不能封禪告成功非封禪無所用三脊茅久矣天下之無明天子也彼其不為時用可勝言耶余令畫工圖之以示學者壺公祠大樹記壺公祠在縣西北十里其中庭有大樹潔之蔽牛壺公者費長房之師當東漢時賣藥汝南市中歸輒挂其壺而躍入焉長房為市掾見而怪之就傳其方一旦别長房去莫知所終蓋神仙人也其所挂壺處則此樹是也至今百姓道之疑以為仙者不死故其物亦夀也漢以來九百餘嵗矣常草木所不能待也此獨存是其異者一也察其根則虯結而膠緻察其幹則空虛而穿穴察其葉則柔弱而繁澤是其異者二也條之下垂蒂之上屬側穿復出大者合抱小者徑尺環之成林是其異者三也挾可異者三汝南人世世傳之而莫能正其名故通謂之大樹云夫天下之物未可以理窮則未可以類推也彭祖歟冥靈歟其或使之歟吾惡乎知之咸平二年有為壺公祠者不能久遂廢慶厯初夏丞相守此邦乃益新之于是民之祈福祥者士之考技術者吏之覽方俗者常至其下嗚呼能使此樹不朽未必非壺公也能使壺公益聞者未必非丞相故作記以信來者刻之廟中先秦古器記先秦古器十有一物制作精巧有欵識皆科斗書為古學者莫能盡通以他書參之乃十得五六就其可知者校其世或出周文武時于今蓋二千有餘嵗矣嗟乎三王之事萬不存一詩書所記聖王所立有可長太息者矣獨器也乎哉兑之戈和之弓離磬崇鼎三代傳以為寶非賴其用也亦云上古而已矣孔子曰多見而識之知之次也衆不可概安知天下無能盡辨之者哉使工模其文刻于石又并圖其象以俟好古博雅君子焉終此意者禮家明其制度小學正其文字譜牒次其世諡乃為能盡之林華觀行鐙記某獲一銅器刻其側曰林華觀行鐙五鳳二年造第一不知何所用按漢書五鳳宣帝年號其嵗丙寅到今嘉祐壬寅一千一百一十七年矣又刻其柄上為扶字皆秦小篆也龍雀刀記右一刀往年築青澗城掘得之其鐵精利其環為龍身而鳥喙蓋赫連勃勃所作大夏龍雀者也勃勃使其臣作銘曰大夏龍雀威服九區然今不見銘處或嵗久磨滅歟將其時雖有銘亦不皆刻之歟貞觀刀記右一刀以金錯其背曰真觀十六年并州都督府造鍔刀匠蘇四等造専當參軍事王某物勒工名蓋古制也其字體徑金亦精好足以明當時總核名實百工所制作後世鮮及之公是集卷三十六

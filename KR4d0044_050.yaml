body:
  text: 公是集卷五十宋劉敞撰文鄆州謁廟文維年月日起居舍人知制誥知鄆州軍州兼勸農羣牧使京東西路按撫使劉某謹以清酌庶羞祭于天齊仁聖帝某受朝命來守兹土四履之內山林川澤苟民所瞻仰者皆得以禮秩祭而況岱宗乎故躬執豆籩進見廟貌神亦昭于厥誠大庇下民鄆州禱雨文某年月日某官某謹以清酌庶羞祭于東嶽天齊仁聖帝某初署政周詢民事僉曰春夏閔雨至于六月非不雨也下雨而不甚此乃春秋所記聖人所憂故祗祓厥身分遣有司將以吉日丁酉乞靈于爾大神未及厥期而雨三降豈謂至誠能昭于天惟爾大神實監其衷曷敢隱神之賜使人不聞躬執祀事以彰靈德神亦顧哀下民永終厥惠秋賽諸廟謝雨文某年月日某官某謹以清酌庶羞告于某神曩者自春不雨至于夏六月毛澤將竭人力將盡神惠而福之優之渥之長之育之爰及秋成遂以有年恭薦常事以答靈德謝雨文維年月日某官某謹遣某官以清酌特羊之具賽禱于太一湫之神乃者天久不雨百姓恫恐用乞靈于爾有神顧哀下民鑒其至誠惠厥所求浹辰之間既優既渥既霑既足嵗庶幾以登民庶幾以安吏庶幾以免責山川社稷上下之祀庶幾以無乏敢不薦陳苾芬以答明德禱雨文年月日某官某謹率官屬恭禱于某神曰天子憂閔元元數下詔令並遣使者則勸耕務穡亦惟是上下空匱無以供億百神之故今天弗雨毛澤竭矣大懼無以庇民事神不敢不請惟爾有神克相天子敷惠于下下民其康神以永享牲幣不敢愛罪戾不敢祈惟爾有神鑒之謝雨文旱氣為虐神能已之百榖將瘁神能起之民將困于食神能濟之吏將負其殿神能庇之敢不備苾芬新潔以答靈德祭帝堯廟文昔帝光被四表格于上下然當時之民猶無能名況纍千嵗之後有窺至德者乎百姓區區奉事廟貌某也守土敢不進見舍人院為中書作祭土地文伏以五祀之神莫尊中霤三公之府爰設種祠今兹土氣含收天明昌作于國俗有賽禱之舊顧人間仰司察之靈恭敬苾芬肅瞻廟貌神其鑒善記惡佑直糾邪毋誤聰明永享祈報告城隍土地文某也守土之臣方將宣布朝廷之德惠兹黎庶罔或不若惟爾有神克相其志祭勾芒文今兹立春農事將興爰出土牛曉寤耕者惟爾有神克相黎庶是顧是歆無有後艱秋賽祝文今兹風雨協序疵癘不作昆蟲之災他邑頗甚犬牙相入不及此邦嵗以有成人受其福此皆神之賜也守土何功封羊索豕潔陳鼎爼簫鼓畢具馨香上達以告民樂以揚靈德祗祗嚴嚴無敢二請蔡州秋賽祝文某年月日某官某謹以清酌庶羞祭于某神往嵗大旱道殣相望賴天之仁與神之賜風雨適時百榖順成民以安其居吏以守其業不敢忘德恭薦苾芬以答靈貺以興嗣嵗禱炭谷湫文維年月日某官某謹遣莭度推官王伋以清酌時果量幣恭禱太一湫之神今兹仲春農事方興而天久不雨生物歉然勾者不盡逹萌者不盡出百姓新罹旱災衆心恫恐某也上無以佐天子施德惠下不能存鰥寡平政刑和氣并隔罪戾是懼惟南山雍州之鎮惟神南山之靈足以興雲致雨紀綱天下惠而澤之使百榖奮興物不疵癘豈獨守土之吏免于罪而已其亦俾兹下民丕承靈德永享無極禱湫文年月日某官某云云恭禱于某神嵗既單矣上者宿麥未秀下者嘉榖未布百姓喁喁惟雨之望是用乞靈于爾大神詩不云乎有淹淒淒興雨祁祁無使鰥寡重困吏嬰其責二年月日某官某謹率府屬申禱于某神某所以乞靈神湫者以百榖闕雨也自癸丑至乙未七日之間而四得雨神之貺則厚矣然而潤澤猶不足民心猶不寧故復少留神輿當滿十日願神終賜之俾黎民庶充其所望永庇休祐三某為百姓祈年恭謁神湫自六七日至于旬時雖常得雨而潤不足神豈忘我民哉殆守土之人德薄誠淺無以自媚于神也雖然百姓乏困則將不能事神神失百姓亦將亡其依歸願神有以哀之詩云神之格思不可度思矧可斁思不敢淹留以䙝神貺其亦使甘雨時至毋困我民四自春至于秋七月凡三請雨矣賴神之惠罔不響答今時禾稼被野苖者待秀秀者待實而雨不降民心喁喁無所歸命不敢不重以告古人有言曰狐埋之而狐搰之是以無成功惟爾有神顧哀下民無乏常祀謝湫文前日某憂旱甚故遣從事乞靈于爾有神蓋汋之也以甲子始至雲氣回復載暘載隂若有慿依乃丁邜旦卒獲嘉㴻宿麥賴以復全秋稼幸而就藝豈某淺誠能有感通繄神之明不忘下民恭薦芳潔丕昭靈德天旱宿麥將槁秋稼未布太守政刑放紛誠志淺薄故至于是賴神之惠膏雨沾足不敢久留神貺率僚屬拜送惟爾有神永庇下民春祈諸神文維年月日謹以清酌庶羞之奠祭于某神曰協風既至百物奮作故擇吉旦以迎休祥維神聰明正直依人而行將蠲其祅災俾無乏祀百姓之願也有司之幸也不敢不告謁諸廟神文某年月日某官某謹以庶羞清酌謁見某神某始署政謹循舊禮封內之神敢不恭事洋洋在上明明在側薦此令芳以答正直弔海文有序襄賁之城在淮上東走大海八十里余日夕登焉美其壯觀可以為賦而土俗無足語者又悲前世君昏政亂而賢者往往自放于海恨不出于今世使效能事職也乃為文弔徐衍而下四人以舒吾懷亦楚辭招魂之意矣北望滄海兮哀逝者之如斯陽既赴而不反兮襄絶世而自怡衍沈石以信邁兮仲連又辭貴而不為嗟呼遭世不幸賢智竄伏寧不足以自全兮誠恥羣乎貪俗黃鵠之潔身而高飛兮知厠鼠之為辱視九淵之潛龜兮孰與夫太廟之孤犢易明夷之象兮貴于飛而欲速四海豈其無君兮羌異心而同欲嗟乎彼茫茫之窮波也上乎無天下乎無地長蛟巨魚狂搏貪噬卉服左衽逐臭為類言語不通衣服殊制非先王之故鄉胡為久安此憔悴嗟乎先生之意我知之矣上暗下塞是非罔詔孰若晞髮陽阿之耀讒疾背憎人懷其憂孰若自放至清之流行乎無朋言乎無伍孰若高蹈與世無覩是皆先生之心已嗟柬夷之溷濁兮孰有慕夫先生之所為誠自託于聖人兮名磨滅而無期胡生不辰兮曽不及今之世也寬賢容衆兮得夫子之志也禮樂明備兮大人位也胡今之望兮古棄反也嗚呼逺哉兮是可哀也夫子之魄兮儻還來也禱廟文維年月日具官某謹再拜禱于天齊仁聖帝之神曰聞之于經觸石而起膚寸而合不崇朝而遍天下者惟泰山爾今也天久不雨江漢之間十二都之地方數千里黍稷枯槁百姓顒顒無所控語執事之臣是以為憂神苟恤而安之猶反手也生物將絶而神濟之是非仁乎濟物不窮配天之明是非聖乎則豈獨顒顒者鼓舞靈德終嵗而已是明經之言者雖亘萬世可信而不可誣也敢告揚州賽廟文年月日某官某謹以清酌庶羞祭于城隍之神乃十二月晦某以自冬無雪愆陽為災大恐害嵗事以乏上下之祀用乞靈于爾有神惟爾有神實鑒厥衷其夕雨雪若響之答益之以霡霂既優既渥既霑既足小大欣欣罔不逸豫謹擇良日薦此苾芬以報靈德示人不欺弔二嶽生文并序今年有詔州郡皆立學乃命處士有不受學者勿舉之其受學者吏為設員程日夜不休有疾病慶弔輒書其日為後按視當償之滿日如律令乃可舉嶽有兩生自下邑辭其親而來為博士弟子既久告歸當渡洞庭時方大風不可渡兩生畏失期而吏黜之遂渡溺死豫悲其意而弔之其文曰蓋君子道而不徑舟而不游所以為孝也彼洞庭之天險兮夫何二子之乘舟路幽昧以不顧兮委死生其若浮自古皆有死兮獨失乎江流意有所恨兮而曽不得其由魂放蕩而無歸兮骨沈潛而不收父母悲于堂上兮妻子號乎中洲諒行險之來患兮信徼幸之為尤且使子而無學兮又安得此之憂是以君子溺名小人死利夸者沒權貪夫踣勢豈獨二子兮又吾以悲于今之世競進之為悅兮靜退之為愚干祿之為敏兮守節之為迂一世之皆然兮固若人以喪軀昔重華之事叟兮躬秉耒乎歷山之下受帝禪之不喜兮夫孰欣于進取乘沅湘以南征兮吾知重華之絶汝生泛泛而無名兮死惸惸而終古故君子審乎自得安乎幽貞道德為爵仁義為滎不以貴故學問不以賤故自輕悠悠兮江波奈何乎二生祭梅聖俞文年月日具官某謹以清酌庶羞致祭于聖俞二十五兄之靈曰乃者鄰幾病革君問之退而過我相對咨嗟我視君色異于他時自為君診勸君從醫君雖我信其中猶疑明日大饗四方來賀奉觴上夀戎客在坐百辟相趨敢或私卧賜食上前謹懼已過疾果大作仆不能起俗醫控摶以表為裏中涸外乾翕翕如燬勢一大跌不得中止俯仰晨夕遂有生死痛駭驚呼曷云能已孰云旬日殺二賢士嗚呼哀哉物固有生生固有命豈曰吾子獨天其性君之文學信于友朋君之孝友鄉黨是稱仕不過庸夀不百齡一至于此何其不平喪還故鄉義從此訣哭送道周情豈能絶祭觀文吳左丞文年月日具官某謹以清酌庶羞祭于觀文殿學士左丞吳公之靈曰嗚呼德不蚤服譽不素聞雖富且貴其猶浮雲公起布衣望重一時鱗躍翰飛邈不可追乃謀帷幄乃和鼎飪深識逺䇿四方爰禀曰剛曰柔奚吐奚茹上弼下爭匪躬之故謝劇就閒以德偃藩所居而治小大晏然帝曰徽猷惟汝豫宣汝撫朕師于時西遷功業未究以疾去位天又奪之人其殄瘁公昔臨蔡某備府屬忘勢與年分逾骨肉意氣之感豈獨知音柱石頽矣行道隕心陳此薄奠爰申我辭公歸不復云何其悲祭天章許待制文維年月日某官某謹遣某人以清酌庶羞之奠祭于天章閣待制許公之靈曰嗚呼惟公孝友克施其親强力自喜敏于事君進退不懈赫然有聞始命漕輸西給京師足食與兵外禦四夷十有二年積焉如坻功勞位尊名優望充上意攸屬宜在崇近公讓莫居自請治郡淮南朞月亦既有成改命浙東肅然治聲亟以疾聞歸居海陵天不可問道不可豫孰是人斯至于大故自古有死于公為遽昔我先人薦公于朝意氣之感期以後凋公今永歸孔音昭昭陳此苾芬以寫我誠莫哭于堂莫弔于庭魂也不亡庶幾自聼祭崔侍郎文年月日某官某謹以肴酒果蔬祭奠于故刑部侍郎致仕崔公之柩曰少壯從官耆艾歸政善始令終君子之慶公既蹈焉猶有不幸攜子弄孫采組光輝築室肆耕阡陌東西可以佚老不能耄期歌也于斯哭也于斯九原無憾鄉黨實悲音備外廷從公步武今守京兆接公壤土一日之雅忽焉千古春秋善鄰義不薄死申薦令芳以告惻楚告伯父殯文古者庶人之喪鄰里執事其在士夫千里赴義及其送葬塗潦毋避焉有至親而或不至某獨不幸受命典城戎馬是司匍匐不能不哭于堂不祖于庭窆不復土虞不奉牲回望萬里悲號失聲門外之治王命實行蓋古亦云不即人情于奠陳詞以昭哀誠江休復祭文嗚呼當今之時學不為人仕不期通養不恥貧吾于鄰幾獨謂得之何辜于天而至于斯嗚呼哀哉君始遘疾物不甚治固曰吾命將有所制笑語作書命子後事其處夀夭可謂不二某之得交從蔡汝南待我忘年不恥不堪直諒多聞所益者三十有餘年若青依藍亦有出處東西南北意氣之合常若在側亦有毁譽蒼蠅紅紫論議之同流言以止君今永歸使我從誰伐木之感悽其孔悲酌酒陳肴叙心以詞平生之歡從此而違嗚呼哀哉胡因甫哀辭冥冥上天固愛賢歟賢者則死何其偏歟生殺豫奪豈無權歟宜淑而罰獨不可遷歟謂物有其數其又信然歟莫重乎生莫全乎夀莫美乎貴莫厚乎富人或逄之子獨大謬鬼神虛無誰執其咎終孝且慈有志不就惟彼惸惸令妻夀母是故悲莫悲于失志禍莫禍于夭生痛莫痛于不嗣惜莫惜于喪情子皆罹之終身不平嗚呼哀哉是可奈何雖有神知亦安以為公是集卷五十
